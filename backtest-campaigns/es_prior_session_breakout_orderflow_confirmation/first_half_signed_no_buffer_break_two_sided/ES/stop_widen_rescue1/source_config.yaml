research_metadata:
  academic_source: Brock, Lakonishok, and LeBaron (1992); Kavajecz and Odders-White (2004); Osler (2005); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Prior-session high/low breakout continuation should be more robust when completed aggregate orderflow confirms same-direction participation.
  mechanic: From 09:35 through 13:30 ET, trade the first fresh prior-high/low close break when total signed flow confirms the break; no close buffer is added.
  timeframe_rationale: The first-half window focuses on the part of RTH where prior-level stop cascades and directional repricing should be most active while still leaving several hours for exit before flatten.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: The variant requires a public prior-session high/low breakout expression and same-direction signed aggregate flow before entry. The prior level supplies the price-action boundary; orderflow confirmation supplies evidence that the break has participation rather than being only a thin probe.
    entry_logic_rationale: The signal waits for a completed 5-minute bar to close outside the prior RTH level, then checks only that same completed bar for aggregate orderflow. Because the signal uses bar close, the engine enters no earlier than the next bar open.
    stop_loss_rationale: A percent-from-entry stop is fixed before testing and rounded to the ES tick. If an accepted prior-level break cannot avoid a modest adverse move, the continuation thesis is invalid for that parameter row.
    target_exit_rationale: A fixed-R target tests whether the breakout continuation can pay enough relative to the predeclared stop before same-day forced flatten. The exit does not use future orderflow, future VWAP, or discretionary chart reading.
    profitability_rationale: This variant tests whether the same edge is more durable before late-day liquidity changes. It remains non-sparse because it is two-sided and uses only a direction-confirmation flow threshold.
    known_failure_modes: The setup should fail if aligned aggregate flow marks exhaustion, if prior-level breaks are mostly false after costs, if performance concentrates in a few trend days, or if bar-level signed-volume is too noisy.
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_rationale: Original first-half rows had the strongest top metrics but failed parameter robustness; rescue preserves no-buffer first-half signed-flow confirmation and tests neighboring stop/target values around the plausible 1.5R region.
  rescue_constraints: Parameter-space/fixed-parameter rescue only; entry, stop, target modules, edge thesis, timeframe, data window, costs, fills, sessions, and validation gates unchanged.
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_prior_session_breakout_orderflow_confirmation
    source_variant_id: first_half_signed_no_buffer_break_two_sided
    source_run_id: rescue1
    source_config_path: campaigns/es_prior_session_breakout_orderflow_confirmation/rescue_attempts/parameter_space_rescue_1/first_half_signed_no_buffer_break_two_sided/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.002
      - 0.0025
      - 0.003
      new: &id002
      - 0.003
      - 0.00375
      - 0.0045
