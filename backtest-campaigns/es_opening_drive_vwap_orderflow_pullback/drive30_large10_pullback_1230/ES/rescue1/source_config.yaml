research_metadata:
  academic_source: Holmberg, Lonnback, and Lundstrom (2013); Bialkowski, Darolles,
    and Le Fol (2008); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Opening-drive auction imbalance may continue after a VWAP pullback
    when completed aggregate orderflow confirms resumption in the drive direction.
  mechanic: 30-minute opening-drive bias, large-10-lot aggregate-flow VWAP pullback/reclaim
    through 12:30 ET.
  timeframe_rationale: 5-minute bars are liquid enough for intraday ES execution while
    reducing one-minute VWAP/orderflow noise; signal bars are completed and entries
    occur next bar or later.
  mechanics_review_required: true
  mechanics_review_version: 2026-06-18-rescue1
  mechanics_review:
    mechanic_expresses_edge: The opening-drive window establishes the auction direction
      before any pullback trade can exist. The later VWAP touch/reclaim tests whether
      price accepts intraday value without breaking the drive thesis. The orderflow
      filter requires completed reclaim-bar participation in the same direction, so
      this is not a pure VWAP or pure flow signal.
    entry_logic_rationale: The module starts collecting state at 09:30 ET, waits for
      the opening-drive window to complete, then permits at most one same-session
      trade through the variant-specific cutoff. A trade requires drive direction,
      VWAP pullback, reclaim close, and aligned aggregate flow using only completed
      bars.
    stop_loss_rationale: The sweep-extreme stop sits beyond the observed pullback
      extreme. If price violates the pullback that was supposed to hold VWAP value,
      the opening-drive continuation thesis is invalidated.
    target_exit_rationale: A fixed-R target keeps the post-entry exit predeclared
      and lets the grid test whether drive/VWAP resumption can cover ES costs and
      slippage before the forced flatten.
    profitability_rationale: The setup should only be profitable if opening auction
      imbalance creates persistent inventory pressure and VWAP pullbacks act as continuation
      entries when aggregate flow confirms resumption. The strict pre-PnL density
      check exceeded 50 signals/year in both full history and the seeded limited-core
      window.
    known_failure_modes: The opening drive may be exhausted by the time VWAP is retested;
      VWAP pullbacks may be crowded; aggregate signed flow may confirm too late; losses
      may concentrate in reversal days.
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: All original combinations failed limited core. Rescue keeps the opening-drive
    VWAP pullback/reclaim plus aligned aggregate-orderflow mechanic, but tests a wider
    VWAP pullback tolerance, narrower stop offsets, and lower fixed-R targets where
    the original top rows clustered.
  rescue_constraints: No entry module, stop module, target module, timeframe, data
    window, costs, fills, sessions, prop rules, validation gates, or economic edge
    changed.
