variant_id: high_1d_illiq_stress_short_1030
test_run_id: stop_widen_rescue1
research_metadata:
  academic_source: Amihud (2002); Acharya and Pedersen (2005); Amihud, Mendelson,
    and Pedersen (2005)
  edge_thesis: High lagged price impact may represent persistent liquidity stress
    rather than compensated premium.
  mechanic: At 10:30 ET, short ES when the prior completed RTH session's Amihud illiquidity
    rank is in the high tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve the completed-bar decision time and
    next-bar-open execution while using prior-session illiquidity state.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves
      the existing es_amihud_illiquidity_price_impact/high_1d_illiq_stress_short_1030
      entry mechanic: At 10:30 ET, short ES when the prior completed RTH session''s
      Amihud illiquidity rank is in the high tail; flatten by 15:55 ET unless stop
      or target is hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid
      source run; no signal, direction, time-window, filter, data, or execution rule
      is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the
      best existing core-grid variant was being rejected because the stop was too
      tight for ES noise. This is a user-authorized additional rescue and not a new
      edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so
      any improvement must come from stop-distance tolerance rather than post-result
      take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature
      stop-outs dominated, a wider stop may allow the intended move to develop after
      next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide
      a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged
      gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_amihud_illiquidity_price_impact
    source_variant_id: high_1d_illiq_stress_short_1030
    source_run_id: run1
    source_config_path: campaigns/es_amihud_illiquidity_price_impact/variants/high_1d_illiq_stress_short_1030/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass
      flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR,
      and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: strategy.entry.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0015
      - 0.0025
      - 0.004
      new: *id001
strategy:
  entry:
    module: amihud_illiquidity_state
    params:
      setup_mode: high_1d_illiq_stress_short
      direction_mode: high_short
      feature_csv: data/external/es_amihud_illiquidity_features_20110103_20260609.csv
      value_column: prior_amihud_illiq_1d
      rank_column: illiq1_rank_252
      illiq_rank_threshold: 0.35
      entry_time: '10:30:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.00375
      target_r_multiple: 1.5
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.00375
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
