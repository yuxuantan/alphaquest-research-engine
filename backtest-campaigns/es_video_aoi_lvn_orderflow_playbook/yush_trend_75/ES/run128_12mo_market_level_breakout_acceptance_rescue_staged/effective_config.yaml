research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush orderflow level-break mechanics supplied by user/video
    checklist, expressed as intrabar breakout acceptance rather than reclaim/reversal.
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Visible prior-session and opening levels may produce directional continuation
    when price breaks beyond them, holds on the far side, and current-bar orderflow
    initiates in the breakout direction.
  rescue_scope: one_time_result_informed_rescue_from_yush_trend_74
  rescue_decision: 'yush_trend_74 failed the predeclared 12-combo limited core grid.
    This variant is a one-time diagnostic rescue using the best-performing risk/target
    area observed in that failed grid: 1.0 second breakout hold, 8 point max signal
    risk, and 2R target. Because this is result-informed, it must be rejected if any
    official staged gate fails and should be treated as manual-review evidence rather
    than a clean independent discovery even if later stages pass.

    '
  mechanic: 'Two-sided SCID-record breakout acceptance around PDH/PDL/PDC/ONH/ONL/ORH/ORL.
    A long setup requires the developing 3-minute record path to trade above a level
    by at least probe_ticks, then hold at or beyond the level for breakout_hold_seconds
    while a positive initiation delta bucket remains confirmed. Shorts mirror the
    logic below the level. Stops are two ticks back through the broken level, and
    the target is fixed at 2R.

    '
  timeframe_rationale: Three-minute bars provide the session context while SCID records
    provide the sequential break, hold, and orderflow confirmation path before entry.
  mechanics_review:
    mechanic_expresses_edge: This does not introduce a new edge; it is the allowed
      single rescue of the yush_trend_74 breakout-acceptance branch after the wider
      parameter grid failed core stability.
    entry_logic_rationale: 'The only levels used are known before or during the decision:
      prior RTH high/low/close, overnight high/low, and the first 32 seconds of RTH
      for ORH/ORL. Breakout, hold, initiation, and risk cap are evaluated from SCID
      records in timestamp order.

      '
    stop_loss_rationale: The stop is the broken market level plus/minus two ticks,
      encoded as signal_stop_price and applied by the signal_price stop module.
    target_exit_rationale: The target is fixed at 2R as a rescue setting inherited
      from the strongest yush_trend_74 rows.
    profitability_rationale: Passing requires staged core, monkey, walk-forward, Monte
      Carlo, incubation, and acceptance evidence. A core pass alone is not enough.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than
      exchange MBO sequencing. ORH/ORL from 32 seconds can be noisy. Since this is
      result-informed, reject if profit is concentrated, risk exceeds the configured
      cap, or any staged gate fails.
    pre_test_decision: approve_for_testing
