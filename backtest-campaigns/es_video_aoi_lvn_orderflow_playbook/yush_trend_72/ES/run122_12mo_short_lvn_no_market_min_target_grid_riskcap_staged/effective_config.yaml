research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video
    transcript
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Short-trend pullbacks into developing LVN pockets may continue lower
    when buy-side countertrend absorption fails, but the signal should only be accepted
    when the known stop risk and structural downside target quality are both adequate.
  mechanic: Target-quality/risk-cap diagnostic from the yush_trend_59 near-miss. It
    keeps the yush_trend_21 no-market Model 2 short LVN pullback entry, forbidden_aoi_criteria=[market_level],
    sweep_extreme stop, and one signal per session. The tested mechanics are max known
    signal risk 4/6 ES points and structural target quality 1.5R/2.0R before falling
    back to 3R. This is result-informed from yush_trend_59's limited-monkey near miss
    and must be rejected if it does not survive the official staged gates.
  timeframe_rationale: The strategy uses 3-minute bars for trend/LVN context and enters
    at SCID-record timestamp granularity inside the developing 3-minute bar when the
    pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether the no-market short-LVN continuation
      signal needs both a tighter known-risk cap and a minimum structural target distance,
      and whether that target-quality mechanic survives the repo staging gates across
      a full contiguous year.
    entry_logic_rationale: Entry uses only prior completed 3-minute profile/context
      plus sequential SCID records seen up to the decision timestamp. It rejects any
      candidate whose AOI confluence includes market_level and rejects candidates
      whose known stop distance exceeds 6.0 ES points.
    stop_loss_rationale: The stop remains beyond the intrabar rejection path high
      with a fixed two-tick offset. The entry filter only prevents opening positions
      whose known stop distance is already too wide.
    target_exit_rationale: Structural targets below the selected 1.5R or 2.0R threshold
      are treated as insufficient reward for the modeled stop and are replaced by
      the 3R fallback. This isolates target quality from entry selection while leaving
      stop mechanics unchanged.
    profitability_rationale: This should only pass if low-distance structural targets
      and wide known-risk entries were the source of the prior random-entry weakness,
      and if the target/risk quality grid produces robust economics rather than isolated
      six-month positives.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print
      ordering, queue behavior, and true footprint-at-price absorption are approximations.
      This target-quality branch is result-informed from earlier Yush failures; reject
      if any official staged gate fails, if concentration dominates, or if the edge
      cannot beat random-entry monkey controls.
    pre_test_decision: approve_for_testing
