research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption mechanics supplied by user, PDL reclaim-failure
    morning negative-RR funded-account diagnostic
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Failed upside retests of the previous RTH low may trap aggressive buyers
    below prior-day value. This branch tests whether the liquidation impulse is primarily
    an early-session reaction rather than an all-day setup.
  mechanic: Morning-only negative-RR funded-account branch from the yush_range_22
    PDL reclaim-failure entry. It keeps short-only PDL sweep/reclaim-failure continuation,
    positive 1-point delta bucket >=300, maintained three-second hold below the bucket,
    entry within 2 ATR of PDL, known bucket-edge signal risk <=3.0/4.0 ES points,
    one trade per day, five ES contracts, and a fixed $75 per-contract target. New
    entries are cut off at either 11:30:00 or 12:00:00 ET. The stop grid remains $150/$200/$250
    per contract, so every tested stop is wider than the target.
  timeframe_rationale: The strategy uses 3-minute bars for ATR and PDL sweep context
    while entering at SCID-record timestamp granularity inside the developing 3-minute
    bar.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether PDL reclaim-failure absorption
      has a morning-only liquidation impulse that can support a high-hit-rate 50k
      payout-day profile without relying on late-day continuation.
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the
      decision timestamp and only before the selected morning cutoff. It enters short
      when PDL has been swept, trapped-buyer positive delta remains above threshold,
      price has held below the triggering bucket for three seconds, and entry-to-bucket
      stop distance is within the selected 3.0/4.0 point signal-risk cap.
    stop_loss_rationale: The tested stop is a fixed-dollar per-contract stop, rounded
      to ES ticks, deliberately wider than the fixed target. The original bucket-edge
      signal stop remains logged and capped only as an entry-quality/risk-awareness
      filter.
    target_exit_rationale: The target is fixed at $75 per contract because five ES
      contracts generate a $287.50 net target day after modeled commission/slippage,
      which is the smallest tested target that clears the user-requested $250 payout-day
      threshold.
    profitability_rationale: This can pass only if the morning PDL reclaim-failure
      short impulse reaches the minimum payout-day target often enough to overcome
      wider fixed stops, costs, random-entry controls, WFA decay, Monte Carlo robustness,
      and 50k funded-account consistency constraints.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing. Morning-only
      filters can overfit time-of-day noise; reject if the cutoff grid is not broadly
      profitable, if any staged gate fails, if losses breach 50k constraints, or if
      monkey/WFA/acceptance evidence does not separate from random entries.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 1
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days
      are >= $250 net PnL, best profitable day is more than 50% of total net profit,
      validation is not clean, daily loss exceeds the configured 50k limit, or any
      official staged gate fails. Treat any pass as a candidate strategy requiring
