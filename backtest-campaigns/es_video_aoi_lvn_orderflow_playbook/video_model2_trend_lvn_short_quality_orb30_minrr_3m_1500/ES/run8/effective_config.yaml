research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 4
  source_video: https://www.youtube.com/watch?v=hvyf6frvCcA
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material
  edge_thesis: Result-informed but predeclared search for video-grounded ES AOI/LVN
    orderflow variants after exact run7 failure.
  mechanic: Short-only Model 2 trend LVN pullback with at least 3 AOI confluences,
    optional directional delta threshold, exact 30-second ORB market levels, and minimum
    structural target distance before fixed-R fallback.
  timeframe_rationale: The video states Yush uses 3-minute ES structure. Run8 keeps
    native 3-minute Sierra footprint/VAP rows and next-bar-open execution.
  mechanics_review:
    mechanic_expresses_edge: Short-only Model 2 trend LVN pullback with at least 3
      AOI confluences, optional directional delta threshold, exact 30-second ORB market
      levels, and minimum structural target distance before fixed-R fallback.
    entry_logic_rationale: 'Run8 keeps the video AOI framework: current-session developing
      VAP/LVN, RTH PDH/PDL, overnight high/low, exact 30-second ORB, large-200 aggregate
      proxy, delta activity, absorption/trapped traders, and next 3-minute open entry
      after a completed signal bar.'
    stop_loss_rationale: Stop remains beyond the completed signal-bar wick/AOI invalidation
      with a small predeclared tick offset grid.
    target_exit_rationale: Target remains the video structural level where usable,
      otherwise a predeclared fixed-R fallback because partial trims and dynamic trailing
      are not supported by the current engine.
    profitability_rationale: The strategy should only work if same-session auction
      structure plus visible large records or delta identify trapped traders whose
      exit flow continues the move after the pullback or false break.
    known_failure_modes: The video is discretionary and uses live tape/DOM speed that
      is unavailable in the cache. Large-200 fields are bar aggregates, not exact
      vendor bubble sequencing. 30-second ORB is derived from raw Sierra prints from
      09:30:00-09:30:30 ET and is available as an exact market-level confluence. No
      partial exits or dynamic trailing are simulated.
    pre_test_decision: approve_for_testing
  video_transcript_mechanics:
    aoi_rule: At least two of market-generated levels, volume profile, big trades,
      and delta activity must align before waiting for price to return.
    market_levels: PDH/PDL RTH, overnight high/low from 21:00-09:29 ET, and 30-second
      ORB high/low. This cache includes PDH/PDL, overnight high/low, and exact raw
      Sierra 30-second ORB high/low.
    volume_profile: Current RTH developing volume profile, including value area and
      LVN/low-volume pockets.
    model1_range: In balance/chop, wait for price at value-area edge, false break/look
      above-or-below and fail, absorption/trapped aggressive traders, then target
      midpoint or opposite value edge.
    model2_trend: In trend, wait for pullback into low-volume pocket/LVN, look for
      absorption/trapped traders and delta/large-record confirmation, then target
      highs/lows and trail remainder when discretionary trading allows.
    unsupported_in_engine:
    - live tape speed
    - DOM queue behavior
    - partial trim
    - dynamic trailing stop
    - average-up add-on entries
  supersedes_test_run_ids:
  - run7
  supersession_reason: Run8 is an explicitly user-authorized variation search after
    run7 failed; mechanics remain inside the video AOI/orderflow family and use the
    exact ORB cache.
