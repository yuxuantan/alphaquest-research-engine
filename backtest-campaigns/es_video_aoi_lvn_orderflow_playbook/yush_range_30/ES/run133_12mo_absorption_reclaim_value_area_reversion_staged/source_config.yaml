research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range AOI/failed-breakout mechanics supplied by user/video checklist, recast as a
    market-level reclaim plus developing value-area mean-reversion test.
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: Failed stop-runs through visible market levels should be more meaningful when they occur in a balanced
    developing range, near the relevant value-area edge, and show absorption of the failed-break side before reverting
    toward the opposite value-area edge.
  mechanic: >
    Two-sided SCID-record failed-breakout reclaim around PDH/PDL/PDC/ONH/ONL/ORH/ORL. A long setup requires a sweep
    below a known level, reclaim/hold above it, absorption delta confirmation, stable 30-minute range, centered POC, at
    most one LVN inside value area, and current price within an ATR multiple of developing VAL. Shorts mirror the logic
    around VAH. Stops use the swept extreme plus two ticks. Targets use the opposite developing value-area edge with a
    minimum-R filter and 2R fallback.
  timeframe_rationale: Three-minute bars supply session context while SCID records provide the sequential sweep,
    reclaim, range/profile state, and absorption confirmation before entry.
  mechanics_review:
    mechanic_expresses_edge: This is not another yush_range_29 rescue. It keeps the value-area range-reversion structure
      but changes the orderflow proof from initiation to absorption, testing trapped failed-break participants rather
      than post-reclaim momentum.
    entry_logic_rationale: >
      Entry uses only data available at the decision: prior RTH high/low/close, overnight high/low, first 32 seconds of
      RTH for ORH/ORL, current developing SCID profile/range snapshots, and current-bar absorption buckets in timestamp
      order.
    stop_loss_rationale: The stop remains the swept extreme plus two ticks, matching the falsification point of the
      failed-breakout thesis.
    target_exit_rationale: The target is the opposite developing value-area edge if it is beyond entry and satisfies the
      configured minimum R; otherwise the signal_price target module falls back to 2R.
    profitability_rationale: Passing requires staged core stability and monkey separation. The prior fixed-R reclaim
      branch failed monkey and the initiation value-area branch was sparse, so this absorption version must prove the
      trapped-flow condition adds robust edge rather than more concentrated timing.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than exchange MBO sequencing. Developing
      value-area levels are path-dependent and may differ from charting packages. Reject if trade count is sparse,
      profit is concentrated, or any staged gate fails.
    pre_test_decision: approve_for_testing
