research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 1 range value-edge mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    In balanced ES auctions, false breaks at current developing value-area edges may revert to the profile
    midpoint when at least two AOI criteria align and the SCID-record path confirms probe-and-reclaim behavior.
  mechanic: >-
    yush_range_16 isolates the long-side VAL version of the May 2026 SCID-intrabar Model 1 range midpoint POC
    mechanics under a yush-named wrapper. It uses prior completed 3-minute cached developing VAP context, enters
    intrabar on the first qualifying SCID record after a VAL probe-and-reclaim, requires at least two AOI criteria,
    uses a sweep-extreme stop, and targets the developing value-area midpoint with a 3R fallback if no signal target
    is present. The flatten time is moved to 15:53 so 3-minute bar-close flattening can validate by 15:54.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for profile/AOI context while entering at SCID-record timestamp granularity
    inside the developing 3-minute signal bar.
  mechanics_review:
    mechanic_expresses_edge: >-
      This is a result-informed long-only falsification branch from yush_range_15. The direction split is tested on
      a different older contiguous six-month window, and the flatten time is adjusted only to make 3-minute bar-close
      flattening comply with validation timing.
    entry_logic_rationale: >-
      Entry uses only prior completed 3-minute profile context plus sequential SCID records seen up to the decision
      timestamp. It requires same-bar VAL probe/reclaim behavior and at least two AOI criteria from volume_profile,
      market_level, big_trades, and delta_activity.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar signal path extreme with a fixed two-tick offset, matching the frozen
      Model 1 POC mechanics.
    target_exit_rationale: >-
      The target is the signal's developing value-area midpoint target; the signal_price TP module falls back to
      3R only if no signal target is emitted.
    profitability_rationale: >-
      The branch should only survive if the long-side value-low reclaim effect is not slice-specific and if midpoint
      reversion after SCID-record VAL probe/reclaim repeats in older unseen months.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so record order, queue behavior, and original DOM/tape
      cues are approximations. The one-month POC had no validation export, so this run must fail closed on warning
      contamination or weak economics.
    pre_test_decision: approve_for_testing
