research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush orderflow level-break mechanics supplied by user/video checklist, one-time negative-RR
    funded-account rescue of the opening-range breakout acceptance branch.
  academic_source: Chart Fanatics / Trader Yush video; Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov
    (2014); opening-range breakout practitioner literature and CME market profile educational material.
  edge_thesis: Early RTH range boundaries can become directional reference levels when price breaks outside the opening
    range, holds on the far side, and same-direction orderflow initiates. This rescue tests whether that entry has
    enough short-horizon impulse to support a small fixed target with a wider fixed stop for a 50k funded-account payout
    profile.
  mechanic: >
    Result-informed one-time rescue of yush_trend_76. The entry is frozen: two-sided SCID-record opening-range breakout
    acceptance, ORH/ORL built from the first 32 or 120 seconds of RTH, 2-tick breakout probe, 0.5s/1.0s acceptance hold,
    and same-direction initiation delta confirmation. Trade management changes to five ES contracts with fixed-dollar
    per-contract targets of $50/$75/$100 and fixed-dollar per-contract stops of $150/$200/$250. Every target is smaller
    than every stop, so this is intentionally negative-RR.
  timeframe_rationale: Three-minute bars provide session context while SCID records provide the timestamp-ordered OR
    construction, breakout, hold, and orderflow path before entry.
  mechanics_review:
    mechanic_expresses_edge: This is a trade-management rescue of the OR-only yush_trend_76 entry, not independent
      discovery evidence. It is allowed one attempt only and must pass staged gates without further narrowing.
    entry_logic_rationale: ORH/ORL are complete before the 09:35 ET entry window. Breakout, hold, initiation, and risk
      cap are evaluated from SCID records in timestamp order.
    stop_loss_rationale: The stop is fixed-dollar per contract, rounded to ES ticks, and deliberately wider than all
      target choices to test a high-win-rate payout profile rather than structural continuation.
    target_exit_rationale: The target is fixed-dollar per contract, rounded to ES ticks, with all values intended to
      make one 5-contract win exceed the $250 funded-payout-day threshold before costs.
    profitability_rationale: >
      Passing requires staged core stability, random-entry separation, WFA/Monte Carlo survival, and funded-account
      consistency: at least five $250-plus winning session days and no largest winning day above 50% of total profits.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than exchange MBO sequencing. Negative-RR
      exits can manufacture win rate while hiding tail losses. Reject if daily loss risk approaches the 50k rule, profit
      is concentrated, random-entry separation fails, or any staged gate fails.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 3
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days are >= $250 net PnL, best profitable
      day is more than 50% of total net profit, validation is not clean, daily loss exceeds the configured 50k limit,
      or any official staged gate fails. Treat any pass as a candidate strategy requiring manual review because this
      is a negative-RR rescue branch after prior failure.
