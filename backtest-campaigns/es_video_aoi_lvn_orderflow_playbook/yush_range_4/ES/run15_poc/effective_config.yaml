research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption-initiation mechanics supplied by user, value-area-edge sweep rescue
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material
  edge_thesis: In a balanced ES auction, failed sweeps of the current developing value-area edge may reverse after
    trapped absorption, or continue after strong initiation, when a 4-tick delta-profile bucket holds beyond its
    edge for several seconds.
  mechanic: Fixed-mechanics POC for yush_range_4. The evaluator keeps a developing 1-tick session volume profile
    from Sierra SCID records, confirms balance via stable 30-minute session range and centered POC, requires at most
    one low-volume bucket inside value, confirms that the current developing 3-minute bar has swept the developing
    VAL for long setup or VAH for short setup, and enters on the first SCID record between 09:30 and 11:30 ET after
    either an absorption or initiation 4-tick delta bucket has held for three seconds. It keeps the yush_range_3
    0.5 ATR value-edge proximity, flat-only re-entry, 5-point stop, and 10-point target rules.
  timeframe_rationale: The strategy uses 3-minute bars for ATR and current developing value-area-edge sweep context
    while entering at SCID-record timestamp granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: This POC expresses a range value-edge rejection/drive edge by combining a balanced
      developing profile state, a fresh sweep of the current developing VAH/VAL edge, proximity to that edge, and
      a same-bar 4-tick delta bucket that identifies either trapped aggression or initiating aggression before entry.
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the decision timestamp. It does not
      wait for the 3-minute bar close; it enters when range state, profile state, current developing VAH/VAL sweep,
      ATR proximity, and the three-second post-absorption or post-initiation hold are simultaneously true.
    stop_loss_rationale: >-
      The stop module places the stop exactly 5.0 ES points away from the actual simulated entry price.
      This uses the user's fixed-distance invalidation instead of the prior bucket-edge stop.
    target_exit_rationale: The target module places the target exactly 10.0 ES points away from the actual
      simulated entry price. This keeps the requested 2:1 fixed-distance reward:risk without discretionary exits.
    profitability_rationale: The mechanism should only work if developing value-area-edge sweeps in a balanced
      auction attract aggressive traders who either become trapped at the edge or initiate a valid drive away from
      the edge after price holds outside the 4-tick delta bucket.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior,
      and true footprint-at-price absorption are approximations. The POC uses RTH replay for the 30-minute range
      state because the selected 3-minute cache is RTH scoped. The value-area edge is developing and can move while
      price trades around it; this variant therefore tests current-tick edge rejection, not a fixed prior-session
      profile edge. One month of data is not enough for a research pass.
    pre_test_decision: approve_for_testing
