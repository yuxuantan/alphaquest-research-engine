research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video
    transcript
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Short-trend pullbacks into developing LVN pockets may continue lower
    when buy-side countertrend absorption fails and the developing 3-minute SCID record
    replay also shows materially negative same-bar delta ratio.
  mechanic: Frozen bounded older-window staged candidate from yush_trend_47/yush_trend_49.
    It keeps the no-market risk-capped Model 2 short LVN pullback entry, min_trend_move_ticks=8,
    max_signal_risk_points=6.0, forbidden_aoi_criteria=[market_level], sweep_extreme
    stop, one signal per session, cumulative same-bar signed volume divided by total
    same-bar volume <= -0.10, the 12:00:00 through 12:59:59 ET lunch entry block,
    and rejects short candidates when cumulative same-bar signed volume is more negative
    than -800 contracts. The exit remains the gross fixed 1R target and sizing remains
    two ES contracts. This config uses the disjoint older 2024-09-01 through 2025-08-31
    window with one-combination staged grids so the frozen yush_trend_47 mechanics
    receive an official economic verdict without the full-history runtime problem
    that blocked yush_trend_49.
  timeframe_rationale: The strategy uses 3-minute bars for trend/LVN context and enters
    at SCID-record timestamp granularity inside the developing 3-minute bar when the
    pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether the validated six-month yush_trend_47
      fixed-1R signed-cap mechanics survive an older disjoint year through the repo
      staging gates, without adding a new filter or target after seeing failures.
    entry_logic_rationale: Entry uses only prior completed 3-minute profile/context
      plus sequential SCID records seen up to the decision timestamp. It rejects any
      candidate whose AOI confluence includes market_level, rejects candidates whose
      known stop distance exceeds 6.0 ES points, and requires same-bar signed-volume
      ratio to be directionally aligned by at least 10% of cumulative same-bar volume
      at the decision tick. Candidate SCID records with timestamps from 12:00:00 through
      12:59:59 ET are filtered before entry evaluation. For shorts, cumulative same-bar
      signed volume must also be at least -800 contracts; for longs, the symmetric
      cap is +800.
    stop_loss_rationale: The stop remains beyond the intrabar rejection path high
      with a fixed two-tick offset. The entry filter only prevents opening positions
      whose known stop distance is already too wide.
    target_exit_rationale: The target is a predeclared fixed 1R reward measured from
      entry to the modeled sweep_extreme stop. This keeps the branch inside the repo's
      minimum-RR guard while testing whether structural-target misses were the main
      weakness in yush_trend_39.
    profitability_rationale: This should only hold up if the no-lunch short-LVN continuation
      edge reaches 1R often enough in an older year to beat costs, random-entry monkey
      controls, and later WFA/Monte Carlo/acceptance gates at two contracts.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print
      ordering, queue behavior, and true footprint-at-price absorption are approximations.
      The lunch block, fixed target, signed-volume cap, and two-contract sizing are
      inherited from result-informed prior branches; reject if any official staged
      gate fails, even if the later yush_trend_47 POC looked strong.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 2
    max_entries_per_day: 1
    target_r_multiple: 1.0
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days
      are >= $250 net PnL, best profitable day is more than 50% of total net profit,
      validation is not clean, daily loss exceeds the configured 50k limit, or any
      official staged gate fails. Treat a full-stage pass only as a candidate strategy
      requiring manual review.
