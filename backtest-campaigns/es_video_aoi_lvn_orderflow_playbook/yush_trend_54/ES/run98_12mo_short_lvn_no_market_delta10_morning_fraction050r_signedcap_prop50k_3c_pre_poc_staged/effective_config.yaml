research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video
    transcript
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Short-trend pullbacks into developing LVN pockets may continue lower
    when buy-side countertrend absorption fails and the developing 3-minute SCID record
    replay also shows materially negative same-bar delta ratio.
  mechanic: Morning-only pre-POC staged robustness branch from yush_trend_53. It keeps
    the no-market risk-capped Model 2 short LVN pullback entry, min_trend_move_ticks=8,
    max_signal_risk_points=6.0, forbidden_aoi_criteria=[market_level], sweep_extreme
    stop, one signal per session, cumulative same-bar signed volume divided by total
    same-bar volume <= -0.10, an 11:59:59 ET latest entry cutoff, and rejects short
    candidates when cumulative same-bar signed volume is more negative than -800 contracts.
    The exit changes to a gross fixed 0.50R target rounded conservatively to the ES
    tick, and fixed position sizing remains three ES contracts for explicit 50k funded-account
    payout-day testing. This config keeps the 2025-03-01 through 2026-02-28 staged
    robustness window and supplies one-combination staged grids so the repo's staged
    gates test frozen mechanics rather than tune new parameters.
  timeframe_rationale: The strategy uses 3-minute bars for trend/LVN context and enters
    at SCID-record timestamp granularity inside the developing 3-minute bar when the
    pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether the result-informed yush_trend_52
      prop-payout mechanics are more stable when restricted to the morning RTH continuation
      window. The cutoff is a pre-noon session/time-of-day expression of the same
      short-LVN continuation thesis, not a target/stop rewrite.
    entry_logic_rationale: Entry uses only prior completed 3-minute profile/context
      plus sequential SCID records seen up to the decision timestamp before 11:59:59
      ET. It rejects any candidate whose AOI confluence includes market_level, rejects
      candidates whose known stop distance exceeds 6.0 ES points, and requires same-bar
      signed-volume ratio to be directionally aligned by at least 10% of cumulative
      same-bar volume at the decision tick. Candidate SCID records with timestamps
      from 12:00:00 through 12:59:59 ET are filtered before entry evaluation. For
      shorts, cumulative same-bar signed volume must also be at least -800 contracts;
      for longs, the symmetric cap is +800.
    stop_loss_rationale: The stop remains beyond the intrabar rejection path high
      with a fixed two-tick offset. The entry filter only prevents opening positions
      whose known stop distance is already too wide.
    target_exit_rationale: The target is a predeclared 0.50R reward measured from
      entry to the modeled sweep_extreme stop and rounded outward to an executable
      ES tick. This is a deliberately negative-RR prop-payout experiment using the
      separate prop_fixed_fraction_r module rather than weakening the repo's default
      fixed_r minimum-RR guard.
    profitability_rationale: This should only hold up if the no-lunch short-LVN continuation
      edge reaches 0.50R often enough to overcome the deliberately unfavorable reward:risk
      after costs and if the directional-volume cap removes enough exhaustion failures.
      It must also produce at least five $250-plus winning session days without having
      the largest winning day exceed 50% of total profit.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print
      ordering, queue behavior, and true footprint-at-price absorption are approximations.
      The lunch block, fixed target, signed-volume cap, and three-contract funded-account
      sizing is a result-informed payout-day sizing check from yush_trend_52 within
      the configured max-contract rule. The sub-1R target is intentionally easier
      to hit but can still fail through poor expectancy, random-entry monkey comparators,
      WFA decay, acceptance OOS, off-tick modeling if rounding is disabled, or payout
      concentration. The morning cutoff is result-informed from yush_trend_53's shortlist
      failure and must be rejected unless the staged workflow passes without further
      mechanics changes.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 3
    max_entries_per_day: 1
    target_r_fraction: 0.5
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days
      are >= $250 net PnL, best profitable day is more than 50% of total net profit,
      validation is not clean, or daily loss exceeds the configured 50k limit.
