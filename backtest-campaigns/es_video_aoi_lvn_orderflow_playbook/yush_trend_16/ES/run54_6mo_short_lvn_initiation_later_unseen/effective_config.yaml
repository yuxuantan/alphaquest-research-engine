research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN continuation mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    Short-trend moves through developing LVN pockets may continue when aggressive selling initiates through the
    LVN and price holds below a 1-point delta bucket, but the setup should be rejected when the intrabar path has
    already made the modeled stop too wide.
  mechanic: >-
    Frozen later-window robustness check for yush_trend_16. Mechanics are unchanged from run49: Model 2 short LVN
    trend state, cached developing profile context, sweep-extreme stop, fixed 1R target, 6.0-point maximum known
    signal risk, and a same-bar negative 1-point delta bucket below -300 followed by a three-second hold below the
    bucket bottom before entry.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record timestamp granularity inside
    the developing 3-minute bar when the initiation hold is confirmed.
  mechanics_review:
    mechanic_expresses_edge: >-
      This check tests whether the weak positive yush_trend_16 run49 result persists in the next contiguous
      six-month window without any parameter or mechanics changes.
    entry_logic_rationale: >-
      Entry uses only the prior completed 3-minute profile/context plus sequential SCID records seen up to the
      decision timestamp. A short signal requires trend-state confirmation, an actionable LVN, AOI confluence, a
      confirmed negative delta bucket hold below its lower edge, and known stop distance <= 6.0 ES points.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar path high with a fixed two-tick offset. The entry filter prevents
      opening positions whose known stop distance is already wider than the configured risk cap.
    target_exit_rationale: >-
      The target remains fixed at 1R from actual entry and modeled stop to isolate whether initiation improves the
      entry trigger without changing both entry and exit at once.
    profitability_rationale: >-
      This should only remain under consideration if the later window maintains positive net, positive expectancy,
      and acceptable drawdown after costs. Otherwise the run49 result should be treated as weak/sample-specific.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price initiation are approximations. Large-trade confluence is a Sierra record-volume proxy.
      The delta bucket is reconstructed from close-only SCID records, so this is a diagnostic branch, not a
      production-quality footprint implementation.
    pre_test_decision: approve_for_testing
