research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush value-area/orderflow checklist supplied by user, adapted into a completed-bar trend
    acceptance branch after range-rejection branches failed or were too sparse.
  academic_source: Chart Fanatics / Trader Yush video; Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov
    (2014); CME market profile educational material.
  edge_thesis: >
    A completed 3-minute close accepting outside developing VAH/VAL or through a nearby developing LVN, confirmed by a
    same-direction large200 orderflow burst, may capture short-horizon continuation. The fixed small target and wider
    stop intentionally test a high-win-rate funded-account payout profile.
  mechanic: >
    Completed-bar only. The signal uses the just-closed 3-minute bar and enters no earlier than next bar open. Unlike
    yush_range_31, this branch does not require a stable range or centered POC. Value acceptance buys above developing
    VAH and sells below developing VAL; LVN acceptance buys through developing LVN near high and sells through
    developing LVN near low. Large200 signed flow and bar signed imbalance must agree with the entry direction. Five ES
    contracts use a fixed $75/contract target and wider fixed-dollar stop grid, intentionally negative-RR.
  timeframe_rationale: Three-minute bars are the native cache timeframe and avoid SCID replay runtime. Completed-bar
    decisions enforce next-bar-open execution and avoid intrabar lookahead.
  mechanics_review:
    mechanic_expresses_edge: This is a trend/acceptance branch, distinct from yush_range_31's stable range rejection
      branch and from the prior SCID market-level breakout/reclaim branches.
    entry_logic_rationale: Developing VAP, large200 aggregate fields, OHLC, and signed volume are taken from the
      completed decision bar. Entry is deferred by the engine to the next bar open.
    stop_loss_rationale: Fixed-dollar stop is deliberately wider than the $75/contract target to test a high-win-rate
      prop payout profile. The signal records the completed-bar extreme stop for audit, but the configured stop is
      fixed-dollar.
    target_exit_rationale: Fixed $75/contract target makes one 5-contract win exceed the $250 funded-payout-day
      threshold before costs.
    profitability_rationale: Passing requires staged core stability, random-entry separation, WFA/Monte Carlo survival,
      no prop-rule violations, at least five $250-plus winning days, and acceptable best-day concentration.
    known_failure_modes: Large200 fields are Sierra aggregate proxies rather than exchange MBO prints. Completed-bar
      entry may be late after fast acceptance bars. Negative-RR exits can hide large tail losses; reject if random-entry
      separation, concentration, WFA, Monte Carlo, or prop rules fail.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 3
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days are >= $250 net PnL, best
      profitable day is more than 50% of total net profit, validation is not clean, daily loss exceeds the configured
      50k limit, or any official staged gate fails. Treat any pass as a candidate strategy requiring manual review.
