test_run_id: run132_12mo_public_edge_breakout_retest_continuation_staged
research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush orderflow level-break mechanics supplied by user/video
    checklist, restricted here to outside public-edge breakout-retest continuation
    with orderflow confirmation.
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Public outside levels may attract stop flow and then provide support/resistance
    on the first retest when the breakout is real. Waiting for a retest of the broken
    edge should reduce chase entries and test whether orderflow can identify continuation
    from the retest rather than from the initial extension.
  mechanic: 'Two-sided SCID-record outside-edge breakout-retest continuation. A long
    setup can only break above PDH, ONH, or ORH by at least two ticks, then pull back
    to within retest_tolerance_ticks of the broken edge and hold on or above that
    edge for retest_hold_seconds while positive initiation delta is confirmed. A short
    setup mirrors below PDL, ONL, or ORL. PDC and wrong-side crossings such as long-through-PDL
    are excluded before a pending retest can form. Stops are two ticks back through
    the broken level, and targets use a fixed-R continuation grid.

    '
  timeframe_rationale: Three-minute bars provide the session context while SCID records
    provide the sequential break, retest, hold, and orderflow confirmation path before
    entry.
  mechanics_review:
    mechanic_expresses_edge: This is not another yush_trend_75 or yush_trend_77 rescue.
      It changes the entry event from immediate breakout acceptance to a retest of
      the broken outside edge, testing whether retest continuation has cleaner expectancy
      than chasing the initial break.
    entry_logic_rationale: 'The only levels used are known before or during the decision:
      prior RTH high/low, overnight high/low, and the first 32 seconds of RTH for
      ORH/ORL. Breakout, retest, hold, initiation, and risk cap are evaluated from
      SCID records in timestamp order.

      '
    stop_loss_rationale: The stop is the broken outside level plus/minus two ticks,
      encoded as signal_stop_price and applied by the signal_price stop module. Entry
      after retest should keep risk compact without selecting rows after the result.
    target_exit_rationale: Fixed-R targets in {1.5, 2.0} require continuation beyond
      the public edge. The 1.0R branch is intentionally excluded because the declared
      edge is directional expansion rather than quick mean-reversion payout.
    profitability_rationale: Passing requires staged core stability and monkey separation.
      Strong isolated trend days or high concentration are rejection evidence, not
      a candidate.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than
      exchange MBO sequencing. ORH/ORL from 32 seconds can be noisy. The retest requirement
      may be too sparse, or it may miss genuine one-way trend days. Reject if profit
      is concentrated, risk exceeds the configured cap, or any staged gate fails.
    pre_test_decision: approve_for_testing
