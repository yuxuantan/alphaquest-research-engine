research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption mechanics supplied by user, VAL-only value-edge diagnostic
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    In a balanced ES auction, failed sweeps of the developing value-area low may reverse when sell-side delta is
    absorbed at a local bucket and price holds above the bucket edge. This diagnostic explicitly rejects the
    VAH/short side after yush_range_13 showed that side was economically poor.
  mechanic: >-
    yush_range_14 is the result-informed long-only counterpart to yush_range_13. It requires stable 30-minute
    range, a balanced developing 1-point profile, current developing VAL sweep, absorption-only 1-point delta
    bucket confirmation, entry within 2 ATR of VAL, a two-tick bucket-edge stop, and fixed 2R target.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for ATR and developing value-area-edge sweep context while entering at
    SCID-record timestamp granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: >-
      This variant is a falsification check for whether the weaker but less-bad long/VAL side from yush_range_13
      has any robustness on a different older six-month window. It is result-informed and should fail closed unless
      performance is both economically strong and validation clean.
    entry_logic_rationale: >-
      Entry uses only sequential SCID records seen up to the decision timestamp. It enters long after the current
      developing 3-minute bar sweeps VAL and the negative delta absorption bucket remains beyond threshold while
      price holds above the bucket edge for three seconds.
    stop_loss_rationale: >-
      The stop is read from signal metadata and placed two ES ticks below the absorption bucket edge, preserving
      the local orderflow invalidation used by the parent bucket-risk branch.
    target_exit_rationale: >-
      The target is fixed at 2R from actual entry and the signal stop, matching yush_range_13 for isolated
      comparison of the long-only direction filter.
    profitability_rationale: >-
      This should only work if developing VAL sweeps in stable ranges repeatedly trap sellers tightly enough for
      a 2R reversal before the bucket edge fails.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price absorption are approximations. The long-only direction filter is result-informed from a
      failed parent run and must not be promoted on a narrow or sparse result.
    pre_test_decision: approve_for_testing
