research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush orderflow range-to-trend mechanics supplied by user/video
    checklist, expressed as intrabar developing value-area acceptance rather than
    public-level reclaim/reversal.
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: A balanced developing auction may transition into directional trend
    when price breaks beyond the current developing value-area edge, holds outside
    value, and current-bar orderflow initiates in the breakout direction.
  mechanic: 'Two-sided SCID-record breakout acceptance around the current developing
    value-area edge. A long setup requires a balanced developing profile, stable 30-minute
    range, the developing 3-minute record path to trade above VAH by at least probe_ticks,
    then hold at or beyond VAH for acceptance_hold_seconds while a positive initiation
    delta bucket remains confirmed. Shorts mirror the logic below VAL. Stops are two
    ticks back inside the value-area edge, and targets use a fixed-R grid.

    '
  timeframe_rationale: Three-minute bars provide the session context while SCID records
    provide the sequential break, hold, and orderflow confirmation path before entry.
  mechanics_review:
    mechanic_expresses_edge: This is deliberately different from yush_range_28 failed-breakout
      reclaim, yush_trend_74 public-level breakout acceptance, and the short-LVN pullback
      family. It tests transition from balanced developing value to directional acceptance
      outside value.
    entry_logic_rationale: 'The value-area edge is recalculated only from SCID records
      seen up to the decision timestamp. Breakout, hold, initiation, range stability,
      balanced profile, and risk cap are evaluated in timestamp order.

      '
    stop_loss_rationale: The stop is the developing value-area edge plus/minus two
      ticks back inside value, encoded as signal_stop_price and applied by the signal_price
      stop module.
    target_exit_rationale: Fixed-R targets in {1.0, 1.5} test whether value-area acceptance
      has enough continuation without sub-1R payout shaping.
    profitability_rationale: Passing requires staged core stability and monkey separation.
      Strong isolated trend days or high concentration are rejection evidence, not
      a candidate.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than
      exchange MBO sequencing. Developing value-area levels are path-dependent and
      can move during the breakout. Reject if profit is concentrated, risk exceeds
      the configured cap, trade count is too sparse, or any staged gate fails.
    pre_test_decision: approve_for_testing
