research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video
    transcript
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and
    Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile educational
    material.
  edge_thesis: Short-trend pullbacks into developing LVN pockets may continue lower
    when buy-side countertrend absorption fails and the developing 3-minute SCID record
    replay also shows materially negative same-bar delta ratio.
  mechanic: Predeclared max-size negative-RR grid branch from yush_trend_55. It keeps
    the morning-only no-market risk-capped Model 2 short LVN pullback entry, min_trend_move_ticks=8,
    max_signal_risk_points=6.0, forbidden_aoi_criteria=[market_level], sweep_extreme
    stop, one signal per session, an 11:59:59 ET latest entry cutoff, and cumulative
    same-bar signed-volume ratio <= -0.10. The tested grid varies only the same-bar
    directional signed-volume cap (500 or 800 contracts) and the sub-1R target fraction
    (0.20R, 0.25R, 0.33R, or 0.50R), all rounded conservatively to the ES tick, with
    five ES contracts for explicit 50k max-size funded-account payout-day testing.
    This is a position-size sensitivity test, not a new edge claim.
  timeframe_rationale: The strategy uses 3-minute bars for trend/LVN context and enters
    at SCID-record timestamp granularity inside the developing 3-minute bar when the
    pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether the morning short-LVN continuation
      impulse remains distinguishable from random entry timing when the high-hit-rate
      negative-RR target is paired with the maximum configured 50k ES size.
    entry_logic_rationale: Entry uses only prior completed 3-minute profile/context
      plus sequential SCID records seen up to the decision timestamp before 11:59:59
      ET. It rejects any candidate whose AOI confluence includes market_level, rejects
      candidates whose known stop distance exceeds 6.0 ES points, requires same-bar
      signed-volume ratio to be directionally aligned by at least 10% of cumulative
      same-bar volume, and tests a predeclared cap where short candidates with cumulative
      same-bar signed volume more negative than the selected cap are rejected.
    stop_loss_rationale: The stop remains beyond the intrabar rejection path high
      with a fixed two-tick offset. The entry filter only prevents opening positions
      whose known stop distance is already too wide.
    target_exit_rationale: The target is selected only from the predeclared 0.20R,
      0.25R, 0.33R, and 0.50R grid, measured from entry to the modeled sweep_extreme
      stop and rounded outward to an executable ES tick. All choices remain negative-RR
      and explicitly test hit-rate/payout-day mechanics rather than structural payoff.
    profitability_rationale: 'This can pass only if the short-LVN morning continuation
      impulse reaches small targets often enough to overcome costs, random-entry monkey
      controls, and funded-account payout constraints at five contracts: at least
      five $250-plus winning session days and no largest winning day above 50% of
      total profit.'
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print
      ordering, queue behavior, and true footprint-at-price absorption are approximations.
      Five-contract sizing can manufacture payout-day counts by scaling both winners
      and losers; reject if any staged gate fails, if daily loss risk approaches the
      configured 50k rule, if profit is concentrated, or if monkey/WFA/acceptance
      evidence does not separate from random entries.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 1
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days
      are >= $250 net PnL, best profitable day is more than 50% of total net profit,
      validation is not clean, daily loss exceeds the configured 50k limit, or any
      official staged gate fails. Treat any pass as a candidate strategy requiring
      manual review because this branch is position-size sensitivity after prior negative-RR
      failures.
