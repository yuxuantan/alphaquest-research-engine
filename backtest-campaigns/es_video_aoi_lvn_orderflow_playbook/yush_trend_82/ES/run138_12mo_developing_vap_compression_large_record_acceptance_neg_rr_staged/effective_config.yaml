research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush value-area/orderflow checklist supplied by user, adapted
    into a completed-bar compression breakout/acceptance branch.
  academic_source: Chart Fanatics / Trader Yush video; Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); range-compression breakout practitioner literature;
    CME market profile educational material.
  edge_thesis: 'A developing value area that is narrow relative to its recent same-session
    history may mark auction compression. A completed 3-minute close accepting above
    VAH or below VAL with same-direction large200 flow should have better short-horizon
    continuation odds than raw acceptance after a broad value area.

    '
  mechanic: 'Completed-bar only. The signal uses the just-closed 3-minute bar and
    enters no earlier than next bar open. Current developing value-area width is ranked
    against prior same-session completed bars only; current width must be in the configured
    low-rank compression band. A long requires a completed-bar probe/close above developing
    VAH with same-direction large200 signed flow and signed-volume imbalance. Shorts
    mirror below VAL. Five ES contracts use a fixed $75/contract target and wider
    fixed-dollar stop grid, intentionally negative-RR.

    '
  timeframe_rationale: Three-minute bars are the native cache timeframe and avoid
    SCID replay runtime. Completed-bar decisions enforce next-bar-open execution and
    avoid intrabar lookahead.
  mechanics_review:
    mechanic_expresses_edge: This is a compression-specific trend branch. It is distinct
      from yush_trend_81 raw acceptance and from yush_range_31 stable-range rejection.
    entry_logic_rationale: Value-area width rank is computed from prior completed
      bars in the same RTH session; current bar width is appended only after the decision.
      Developing VAP, large200 fields, OHLC, and signed volume all come from the completed
      decision bar.
    stop_loss_rationale: Fixed-dollar stop is deliberately wider than the $75/contract
      target to test a high-win-rate prop payout profile. The signal records the completed-bar
      extreme stop for audit, but the configured stop is fixed-dollar.
    target_exit_rationale: Fixed $75/contract target makes one 5-contract win exceed
      the $250 funded-payout-day threshold before costs.
    profitability_rationale: Passing requires staged core stability, random-entry
      separation, WFA/Monte Carlo survival, no prop-rule violations, at least five
      $250-plus winning days, and acceptable best-day concentration.
    known_failure_modes: Large200 fields are Sierra aggregate proxies rather than
      exchange MBO prints. Compression can be too sparse, and completed-bar entry
      can be late after fast acceptance bars. Negative-RR exits can hide tail losses;
      reject if random-entry separation, concentration, WFA, Monte Carlo, or prop
      rules fail.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 3
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days
      are >= $250 net PnL, best profitable day is more than 50% of total net profit,
      validation is not clean, daily loss exceeds the configured 50k limit, or any
      official staged gate fails. Treat any pass as a candidate strategy requiring
      manual review.
