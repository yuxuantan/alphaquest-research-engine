timeframe: 5m
research_metadata:
  academic_source: Fama and French (1989); Keim and Stambaugh (1986); FRED DAAA/DBAA; Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Lagged default-spread changes may identify both credit relief and credit stress; ES direction is selected only when price movement and large-10 orderflow agree with the credit-change tail.
  mechanic: Two-sided default-spread-change state with large-10 ES orderflow confirmation.
  timeframe_rationale: The morning window keeps both sides early enough for same-day continuation while avoiding the cash-open minute itself.
  pre_pnl_density: 1510 full-sample pre-PnL signals, about 97.77 per year; limited-core reference 160 signals, about 103.99 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the same default-spread change edge on both sides: lower-tail spread change plus ES/large-10 buying allows longs, while upper-tail spread change plus ES/large-10 selling allows shorts.

      '
    entry_logic_rationale: 'Direction is mechanically selected from the lagged spread-change tail and completed ES confirmation at 10:00, 10:30, or 11:30 ET. Larger-print flow is used to reduce weak marginal signals.

      '
    stop_loss_rationale: The rescue tests wider percent stops because original top rows frequently sat at the widest tested stop, which suggests the declared signal may need more intraday noise tolerance without changing its economic trigger.
    target_exit_rationale: The fixed-R target logic and target grid are intentionally unchanged. All tested target_r_multiple values are at least 1.0R, so the corrected RR rule permits no TP widening; any rescue effect must come from entry-threshold and stop-distance robustness.
    profitability_rationale: If default-spread changes identify credit relief/stress and larger ES participants confirm the same direction, the aligned sessions should have better continuation than unfiltered ES moves.
    known_failure_modes: Two-sided logic may combine asymmetric long and short behavior, spread changes may lag ES, and the high signal count may include weaker marginal setups.
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: Original best rows used stricter credit-change and large-10 confirmation but failed concentration checks, so the rescue preserves the two-sided change mechanic while testing adjacent strictness and more breathing room.
  rescue_constraints: Same default-spread/orderflow edge, entry module, setup mode, flow bucket, signal times, timeframe, data window, costs, stop module, target module, target grid, flatten rule, prop rules, and validation gates. Only existing credit threshold, orderflow threshold, and stop-distance fixed values/parameter grids are changed. TP is unchanged because all target_r_multiple values are already >= 1.0R.
  source_run_report: backtest-campaigns/es_default_spread_orderflow_risk_premium/two_sided_spread_change_large10_1130/ES/run1/campaign_test_summary.json
