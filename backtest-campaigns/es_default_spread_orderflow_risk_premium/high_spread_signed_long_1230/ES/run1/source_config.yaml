research_metadata:
  academic_source: Fama and French (1989); Keim and Stambaugh (1986); FRED DAAA/DBAA; Cont, Kukanov, and Stoikov (2014)
  edge_thesis: A high lagged Baa-minus-Aaa default spread can proxy elevated expected equity risk premium; ES longs are only allowed when completed ES price movement and signed orderflow confirm risk-on participation.
  mechanic: High default-spread rank gates long-only ES continuation with completed signed-volume confirmation.
  timeframe_rationale: Five-minute bars provide enough completed RTH evidence after 10:00 without reacting to one-minute noise or using same-day credit data.
  pre_pnl_density: 812 full-sample pre-PnL signals, about 52.58 per year; limited-core reference 128 signals, about 83.19 per year.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-20"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the default-spread risk-premium edge by requiring a
      high 252-day rank in the lagged Baa-minus-Aaa spread, ES to move at least
      two ticks up from the RTH open, and cumulative signed volume to confirm
      buying pressure before a next-bar long entry.
    entry_logic_rationale: >
      The credit state is available only through session_date minus two business
      days, while the intraday trigger uses completed ES bars at 10:00, 10:30,
      11:30, or 12:30 ET. The entry should only fire when slow credit-risk
      premium and current ES participation agree.
    stop_loss_rationale: A percent-from-entry stop is simple, predeclared, and does not reference future support, final range, or post-entry orderflow.
    target_exit_rationale: A fixed-R target keeps payoff tied to the initial risk and starts at 1.0R because sub-1R targets are invalid.
    profitability_rationale: If high default spreads represent compensation for bearing equity risk, then same-day ES upside continuation with aligned orderflow should have a better after-cost distribution than unfiltered continuation.
    known_failure_modes: High spreads can also indicate unresolved stress, the signal may be too slow for intraday ES, and profits may concentrate in post-crisis recovery regimes.
    pre_test_decision: approve_for_testing
