research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Liu, Liu, Wang, Zhou, and Zhu (2016);
    Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Opening gaps may continue when the market accepts the gap instead of
    filling it and completed aggregate orderflow remains aligned with the gap direction.
  mechanic: 10:45-11:00 ET large10-flow continuation after a held opening gap.
  timeframe_rationale: Late morning avoids the opening burst and asks whether the
    prior-close gap remains accepted after early liquidity has repriced.
  mechanics_review_required: true
  mechanics_review_version: 2026-06-18-rescue1
  mechanics_review:
    mechanic_expresses_edge: This variant expresses gap continuation because a trade
      cannot occur unless ES opens away from the prior RTH close, the completed source
      window holds on the gap side of that prior close, and `large10_imbalance` aggregate
      orderflow is aligned with the gap direction. The price-action condition defines
      accepted gap state; orderflow confirms participation.
    entry_logic_rationale: The entry waits until the configured 10:45:00 to 11:00:00
      ET source window is complete. It then checks the known prior close, current
      RTH opening gap, whether the source window avoided a gap fill, and only completed
      source-window aggregate flow. Since the signal uses completed-window data, the
      engine fills no earlier than the next bar open.
    stop_loss_rationale: The opening-gap boundary stop sits on the other side of the
      prior RTH close using a predeclared tick offset. A continuation trade is invalid
      if price fills the gap back through the prior close after entry; the stop uses
      no post-entry future information.
    target_exit_rationale: The fixed-R target tests whether accepted gaps continue
      far enough relative to the prior-close invalidation distance before the same-day
      flatten. It does not use future highs/lows, final VWAP, or discretionary chart
      levels.
    profitability_rationale: A gap that survives into late morning with larger-trade
      flow still aligned should have less gap-fill pressure and more continuation
      sponsorship. The 1-3 point gap grid is frequent enough for the 50 trades/year
      rule while still requiring a visible prior-close dislocation. Pre-PnL density
      reformulation lowered the strict maximum gap/flow corner without changing the
      gap-hold continuation mechanic so the variant remains eligible for the 50 trades/year
      rule. Rescue1 keeps the same gap-hold continuation mechanic and changes only
      declared gap, flow, boundary-stop, and target parameter spaces after the original
      failed limited core.
    known_failure_modes: The gap can fill despite early acceptance, aligned flow can
      be exhaustion, boundary stops can be too wide for good MAR, or profits can concentrate
      in a few event days.
    pre_test_decision: approve_for_testing
