research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); Moskowitz, Ooi, and Pedersen
    (2012); Barndorff-Nielsen, Kinnebrock, and Shephard (2010); Patton and Sheppard (2015)
  edge_thesis: Elevated MES smaller-contract participation during a completed ES trend pullback may mark crowded temporary
    pressure, and high prior downside semivariance may create larger same-day unwind payoffs.
  mechanic: From 10:00:00 through 11:30:00 ET, take the first completed one-minute bar per session where MES trade participation
    is elevated, ES has pulled back at least 4 ticks over the completed 15-minute lookback, the prior completed ES trend window
    of 30 minutes points opposite the pullback, and prior-session downside-semivariance rank is in the upper-half regime.
    Entry is next bar open.
  timeframe_rationale: One-minute bars preserve completed ES/MES participation ranks, exact next-bar execution, and fixed
    intraday windows while keeping stop/target conflict handling on the native bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge through morning trade-count MES participation during fast 15-minute
      pullbacks and requires all three components: MES crowding, completed ES trend-pullback price action, and lagged high
      downside semivariance.'
    entry_logic_rationale: From 10:00:00 through 11:30:00 ET, take the first completed one-minute bar per session where MES
      trade participation is elevated, ES has pulled back at least 4 ticks over the completed 15-minute lookback, the prior
      completed ES trend window of 30 minutes points opposite the pullback, and prior-session downside-semivariance rank is
      in the upper-half regime. Entry is next bar open. The first-signal-in-window rule was selected before PnL because fixed-time
      high-semivariance versions failed the 50 trades/year density floor. Max one trade per day prevents repeated window firing.
    stop_loss_rationale: The percent-from-entry stop is declared before testing and rounded to the ES tick. It invalidates
      the pullback-reversal thesis if ES continues through the crowded pullback after next-bar execution.
    target_exit_rationale: The fixed-R target uses no future MES/ES bars, future orderflow, VWAP, or discretionary levels.
      Target reward:risk is always at least 1.0, and unresolved trades flatten at the configured intraday cutoff.
    profitability_rationale: The setup is convincing enough to test because the prior MES trend-crowding family showed robust
      OOS structure but insufficient prop-style payoff robustness; high downside semivariance is a predeclared risk regime
      that may increase payoff size while the trend-pullback condition keeps direction disciplined.
    known_failure_modes: High downside semivariance can also mark informed trend continuation, MES participation can be noisy,
      windowed signals can dilute the best fixed-time signal, and drawdown can expand in volatile sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/es_high_semivariance_mes_trend_pullback_crowding_density_audit_20260620.md
    entry_combo_count: 6
