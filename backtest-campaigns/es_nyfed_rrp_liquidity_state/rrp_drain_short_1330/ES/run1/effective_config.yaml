  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: market_plumbing_priority
    params:
      feature_file: data/external/nyfed_rrp_liquidity_state_lag1_features_20140811_20260529.csv
      direction: short
      bar_interval_minutes: 5
      max_trades_per_day: 1
      academic_source_key: brunnermeier_pedersen_2009_market_liquidity_funding_liquidity
      external_dataset: nyfed_on_rrp_lag1_local_feature_file
      priority_order:
      - rrp_drain
      legs:
      - key: rrp_drain
        source: nyfed_on_rrp
        feature_name: reverserepo_total_bil_diff5_z504
        operator: '>='
        threshold: 0.125
        entry_time: '13:30:00'
        flatten_time: '15:55:00'
        stop_pct: 0.005
        target_r_multiple: 1.5
        availability_rule: Local feature file shifts the RRP z-score by one listed
          trade_date before ES eligibility.
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
