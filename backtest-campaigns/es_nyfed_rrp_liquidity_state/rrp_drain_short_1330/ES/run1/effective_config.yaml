timeframe: 5m
research_metadata:
  academic_source: Brunnermeier and Pedersen (2009); Federal Reserve Bank of New York
    RRP FAQ
  edge_thesis: Lagged changes in NY Fed overnight reverse-repo usage proxy changes
    in private-market funding-liquidity capacity; RRP increases may drain reserves/risk
    appetite while RRP declines may release cash back toward private markets and support
    ES intraday risk appetite.
  mechanic: At the completed 13:30 ET bar, short ES when the prior-day lagged five-day
    ON RRP increase z-score is nonnegative to moderately high, testing whether funding-liquidity
    drag appears after the lunch liquidity lull.
  timeframe_rationale: Five-minute bars reduce one-minute noise for a daily funding-liquidity
    state signal while preserving deterministic completed-bar timing and next-bar
    execution with one-minute detail data for same-bar stop/target handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: At the completed 13:30 ET bar, short ES when the prior-day
      lagged five-day ON RRP increase z-score is nonnegative to moderately high, testing
      whether funding-liquidity drag appears after the lunch liquidity lull. The prior-day
      RRP state is the only edge variable and directly maps to the funding-liquidity
      balance-sheet channel.
    entry_logic_rationale: The entry module reads the lag-one local feature file,
      checks the single RRP leg with operator `>=` at the completed 13:30:00 ET 5-minute
      bar, and emits at most one signal per day. The feature value is known before
      RTH because source rows were shifted by one listed trade date.
    stop_loss_rationale: A fixed percent-from-entry stop is used because the edge
      is a daily funding-liquidity state rather than a discrete chart boundary. The
      stop is declared before testing, tick-rounded, and subject to pessimistic same-bar
      stop/target ordering.
    target_exit_rationale: A fixed-R target with same-day flatten tests whether the
      lagged liquidity state produces enough intraday premium to pay at least 1.0R
      before the configured cutoff. The target grid never goes below 1.0R.
    profitability_rationale: If RRP balances are rising, cash is being absorbed into
      a Fed liability and private-market risk capacity may be weaker, favoring a short
      ES intraday risk-premium test. Neighboring RRP thresholds should stay profitable
      if the balance-sheet liquidity mechanism is real rather than one threshold artifact.
    known_failure_modes: RRP usage can measure abundant cash rather than stress, the
      state may be too slow for intraday ES, the 2014-start feature span gives fewer
      WFA windows than full ES history, and results may be dominated by one rate cycle.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    full_history_min_signals_per_year: 74.0
    limited_core_window_min_signals_per_year: 85.8
    density_method: PnL-free count of one possible signal per session over all RRP
      threshold grid corners using the lag-one feature file.
