research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Same-day cyclical sector upside opening breadth should identify risk-on equity demand; ES long continuation is only tested when completed ES movement and signed flow confirm that demand.
  mechanic: Long ES after cyclical sector-up cash opens, positive ES morning movement, and positive aggregate signed-volume confirmation.
  timeframe_rationale: Five-minute bars avoid reacting to a single cash-open print while keeping the signal early enough for a same-day continuation attempt.
  pre_pnl_density: 1020 full-sample pre-PnL signals, about 66.04 per year; limited-core reference 104 signals, about 67.59 per year.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-20"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge through cyclically sensitive sector breadth:
      growth, discretionary, financials, and industrials must open broadly higher,
      ES must confirm upward movement from the RTH open, and cumulative signed volume
      must align before entry.
    entry_logic_rationale: Cyclical-up breadth is a more economically focused risk-on signal than all-sector breadth. The entry still requires completed ES price and orderflow confirmation at 10:00, 10:30, or 11:30 ET, with next-bar execution.
    stop_loss_rationale: A fixed percent stop keeps the risk definition independent of any future sector or ES level.
    target_exit_rationale: A fixed-R target uses the same initial risk budget as the stop and respects the 1.0R minimum.
    profitability_rationale: If cyclical cash-market buying signals real risk appetite, ES should continue upward more often after the initial confirmation bars than in sessions where the cash open is mixed.
    known_failure_modes: Cyclical sectors can open higher from overnight news that is already priced in ES, signed flow can lag the move, and inflation/rate regimes can invert cyclical leadership.
    pre_test_decision: approve_for_testing
