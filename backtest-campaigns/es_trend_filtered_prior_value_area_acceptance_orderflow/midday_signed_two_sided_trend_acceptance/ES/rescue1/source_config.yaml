research_metadata:
  academic_source: Osler (2000); Lo, Mamaysky, and Wang (2000); Cont, Kukanov, and Stoikov (2014); Moskowitz, Ooi, and Pedersen
    (2012)
  edge_thesis: Midday prior value-area acceptance should be tradable when broad signed flow and a slower completed-bar trend
    state confirm that value migration persisted past the open.
  mechanic: From 11:00 through 14:00 ET, trade either direction after a completed 5-minute close accepts beyond prior VAH/VAL,
    broad signed-volume imbalance confirms the direction, and 3-bar plus 6-bar completed trend windows agree.
  timeframe_rationale: Midday signals avoid the opening auction adjustment and require a slower six-bar trend window, which
    should reduce one-bar false acceptance while preserving intraday trade density.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses persistent accepted-value migration. A signal requires price outside prior
      value, broad signed flow in the direction of the value migration, and slower completed-bar trend structure that confirms
      the move is not only an opening-range probe.
    entry_logic_rationale: Prior VAH/VAL are frozen before the current session. The 11:00 to 14:00 ET signal reads only completed
      5-minute close, high, low, and signed-volume values, then the engine enters at the next bar open. The slower trend windows
      are fixed before testing and do not use future bars.
    stop_loss_rationale: A tick-rounded percent stop gives the trade a fixed invalidation point after entry and avoids any
      future-derived stop such as final VWAP, final value area, or post-entry swing levels.
    target_exit_rationale: The fixed-R target tests whether midday value migration has enough continuation after costs. Same-day
      forced flatten handles any unresolved trade before the configured cutoff.
    profitability_rationale: This should be profitable only if midday acceptance outside prior value reflects institutional
      inventory migration rather than a transient probe, and if broad signed flow plus slower market structure separates persistent
      moves from chop.
    known_failure_modes: Midday ES can be mean-reverting and low-volatility, slower trend filters can lag, broad signed flow
      can be noisy, and results may be dominated by a few large trend days.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_trend_filtered_prior_value_area_acceptance_orderflow_rescue_attempt_1_density_audit_20260618.md
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter_space_and_fixed_parameters_only
    reason: Original limited core least-bad cells favored stricter breakout buffers, modest signed-flow threshold, and larger
      targets. Rescue narrows to that adjacent parameter space with wider stops only, preserving the midday two-sided value
      acceptance mechanic.
    mechanics_changed: false
    modules_changed: false
