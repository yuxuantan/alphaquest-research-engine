research_metadata:
  academic_source: Gatev et al. (2006); Huth and Abergel (2014); Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile education.
  edge_thesis: When ES probes a market-generated AOI on the side of prior true VAP context but NQ does not confirm the ES extension, a completed reclaim/reject bar with adverse ES signed delta may identify trapped initiative flow and short-horizon reversion after next-bar entry.
  mechanic: Requires a deeper fixed two-tick probe through prior RTH or opening-range AOIs before reclaim, testing whether shallow stop-runs are too noisy.
  timeframe_rationale: One-minute bars preserve completed ES footprint/VAP fields and rolling ES/NQ divergence fields while enforcing next-bar execution after the signal bar closes.
  mechanics_review_required: true
  mechanics_review_version: 1
  mechanics_review:
    mechanic_expresses_edge: Requires a deeper fixed two-tick probe through prior RTH or opening-range AOIs before reclaim, testing whether shallow stop-runs are too noisy.
    entry_logic_rationale: The AOI is from completed prior/session/opening information, the VAP context is frozen prior-session context, and ES/NQ non-confirmation plus ES adverse delta are evaluated on completed bars only.
    stop_loss_rationale: The sweep-extreme stop is beyond the completed probe/reclaim bar plus a tunable tick offset.
    target_exit_rationale: The cost-adjusted fixed-R target uses only entry, stop distance, and configured ES costs.
    profitability_rationale: If ES stop-runs are unsupported by NQ and reclaim a public AOI from the wrong side of prior value, trapped initiative flow may revert enough to overcome costs.
    known_failure_modes: The NQ divergence may be information-driven, VAP context may be too broad, ES adverse delta can be noisy, and the setup can fail during trend days.
    pre_test_decision: approve_for_testing
