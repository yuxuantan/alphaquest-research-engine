campaign_id: es_semivariance_orderflow_confirmation
title: ES Realized Semivariance With Price and Orderflow Confirmation
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: realized_semivariance_orderflow_confirmation
hypothesis: Lagged realized semivariance state should be tradable intraday only when same-session price
  action and completed aggregate orderflow confirm the direction before entry.
rationale: This is a constrained composite campaign. The primary edge is lagged good-vs-bad realized semivariance
  from completed prior RTH sessions. The execution layer requires the current session to confirm the semivariance
  direction with open-to-signal price movement and rolling aggregate orderflow. It is not a rescue of
  the failed semivariance campaign because semivariance state alone cannot trigger any trade.
sources:
- title: Measuring Downside Risk - Realized Semivariance
  authors: Ole E. Barndorff-Nielsen, Silvia Kinnebrock, Neil Shephard
  year: 2010
  link: https://academic.oup.com/book/5659/chapter/148715572
  relevance: Introduces realized semivariance as a high-frequency downside/upside risk measure.
- title: 'Good Volatility, Bad Volatility: Signed Jumps and the Persistence of Volatility'
  authors: Andrew J. Patton and Kevin Sheppard
  year: 2015
  doi: 10.1162/REST_a_00503
  link: https://doi.org/10.1162/REST_a_00503
  relevance: Shows negative-return volatility has different predictive content from positive-return volatility.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as short-horizon price-pressure evidence; this campaign uses
    Sierra completed-bar aggregate flow, not quote-level OFI.
data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- data/external/es_realized_semivariance_features_20110103_20260609.csv
- 5-minute bars with rolling trade_orderflow_imbalance and large10 imbalance features
lookahead_risks:
- Semivariance features are shifted one completed RTH session; no current-session semivariance is used.
- The current-session price confirmation uses only the RTH open and the completed signal bar close.
- Orderflow confirmation uses rolling completed bars ending at the signal bar close.
- Signals generated from bar close are filled no earlier than next bar open.
- No final session high/low, final VWAP, future orderflow, or future returns are used.
failure_modes:
- The semivariance literature forecasts volatility more directly than intraday direction.
- Same-session confirmation may arrive after the edge has decayed.
- Orderflow confirmation may mark exhaustion rather than informed continuation.
- The signal may still fail WFA if the bad-volatility premium changes sign across regimes.
- Performance may concentrate in crisis periods or a small number of high-volatility sessions.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_realized_semivariance_asymmetry
  - es_daily_reversal_orderflow_confirmation
  - es_signed_orderflow_persistence
  - es_trend_aligned_orderflow_continuation
  - es_realized_vol_of_vol_state
  conclusion: Eligible as a constrained composite campaign. Existing semivariance variants trade from
    lagged risk state alone, while this campaign requires same-session price and aggregate orderflow confirmation
    before any signal can occur.
variants:
- badvol_signed_multitime_short
- downside_share_signed_multitime_short
- badvol_signed_multitime_twosided
- semivar_balance_signed_multitime_twosided
- low_badvol_signed_multitime_long
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change core semivariance plus price/orderflow confirmation mechanic
  - change feature construction shift rule
  - add or remove filters after seeing results
  - alter costs, fills, sessions, data windows, or validation gates
