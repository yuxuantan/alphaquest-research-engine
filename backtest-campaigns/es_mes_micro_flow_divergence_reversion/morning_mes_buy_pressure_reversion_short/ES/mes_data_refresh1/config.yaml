campaign_id: es_mes_micro_flow_divergence_reversion
variant_id: morning_mes_buy_pressure_reversion_short
test_run_id: mes_data_refresh1
strategy_name: trade_orderflow_pressure
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Kaniel, Saar, and Titman (2008); Barber, Odean, and Zhu (2009);
    Hasbrouck (1995)
  edge_thesis: MES/ES aggressive-flow divergence can mark temporary liquidity demand
    in the smaller-notional contract; trade ES for same-session mean reversion.
  mechanic: At 10:00 ET, use only completed 09:30-09:59 ES and MES bars. Go short
    ES when MES-minus-ES 30-minute imbalance exceeds the threshold, then flatten at
    11:31 ET unless the fixed percent stop or fixed-R target is hit first.
  data_refresh_retry: Local Sierra MES parquet data added; rerun uses the same strategy
    mechanic, parameter grid, costs, fills, and stage gates with a longer completed-bar
    ES/MES feature cache.
  source_config_before_refresh: campaigns/es_mes_micro_flow_divergence_reversion/variants/morning_mes_buy_pressure_reversion_short/config.yaml
  data_refresh_source_kind: original
data:
  dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
  source_timeframe: 1m
  source: csv
  raw_csv: data/cache/orderflow/es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny.csv
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: 09:30:00
  rth_end: '15:59:00'
  eth_start: '17:00:00'
  eth_end: 09:29:00
  data_subset:
    start_date: '2019-05-06'
    end_date: '2026-06-09'
    session_labels: &id001
    - RTH
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: trade_orderflow_pressure
    params:
      setup_mode: morning_mes_buy_pressure_reversion_short
      bar_interval_minutes: 1
      entry_time: '10:00:00'
      flatten_time: '11:31:00'
      flow_column: mes_minus_es_imbalance_30
      flow_threshold: 0.02
      positive_flow_direction: short
      allow_long: false
      allow_short: true
      return_confirmation: none
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '11:31:00'
core:
  data_subset:
    start_date: '2019-05-06'
    end_date: '2026-06-09'
    session_labels: *id001
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: '11:31:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.04
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset:
    start_date: '2019-05-06'
    end_date: '2026-06-09'
    session_labels: *id001
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.flow_threshold:
    - 0.01
    - 0.02
    - 0.03
    - 0.04
    sl.params.stop_pct:
    - 0.0025
    - 0.004
    - 0.006
    tp.params.target_r_multiple:
    - 1.0
    - 2.0
    - 3.0
monkey:
  data_subset:
    start_date: '2019-05-06'
    end_date: '2026-06-09'
    session_labels: *id001
  runs: 300
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset:
    start_date: '2019-05-06'
    end_date: '2026-06-09'
    session_labels: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_exclusive_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: window_grid
  parameters:
    entry.params.flow_threshold:
    - 0.01
    - 0.02
    - 0.03
    - 0.04
    sl.params.stop_pct:
    - 0.0025
    - 0.004
    - 0.006
    tp.params.target_r_multiple:
    - 1.0
    - 2.0
    - 3.0
campaign_tests:
  walk_forward_analysis:
    data_window:
      mode: first_fraction
      fraction: 0.9
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: stitched_oos_metrics.profit_factor
      min: 1.2
    - metric: stitched_oos_metrics.mar
      min: 0.4
    - metric: stitched_oos_metrics.trades_per_year
      min: 50
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: window_grid
      workers: 6
  acceptance_oos_test:
    train_months: 24
    test_months: 6
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.trades_per_year
      min: 50
    - metric: metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: grid
      workers: 6
  wfa_oos_monkey_test:
    beat_threshold: 0.8
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: runs
      workers: 6
  simulated_incubation_core:
    train_months: 48
    test_months: 12
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.trades_per_year
      min: 50
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    beat_threshold: 0.8
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: runs
      workers: 6
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      valid_parameter_combination_count: true
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_fraction
      fraction: 0.1
      avoid_last_fraction: 0.1
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    parallel:
      enabled: true
      scope: grid
      workers: 6
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_fraction
      fraction: 0.1
      avoid_last_fraction: 0.1
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    parallel:
      enabled: true
      scope: runs
      workers: 6
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
    parallel:
      enabled: true
      scope: runs
      workers: 6
