campaign_id: es_mes_micro_flow_divergence_reversion
variant_id: afternoon_mes_large20_buy_pressure_short
test_run_id: run1
strategy_name: trade_orderflow_pressure
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Kaniel, Saar, and Titman (2008); Barber, Odean, and Zhu (2009);
    Hasbrouck (1995)
  edge_thesis: MES large-trade buy pressure without enough ES follow-through can mark
    temporary liquidity demand; trade ES short for afternoon mean reversion.
  mechanic: At 14:00 ET, use only completed 13:55-13:59 ES and MES bars. Go short
    ES when MES large-20 imbalance is above the threshold and ES five-minute return
    is capped, then flatten at 15:31 ET unless the fixed percent stop or fixed-R target
    is hit first.
  data_refresh_retry: Local Sierra MES data now extends the paired ES/MES feature
    cache back to 2019-05-06; this rerun keeps the same strategy mechanic, parameter
    grid, costs, fills, and stage gates while widening only the available completed-bar
    data window.
  source_config_before_refresh: campaigns/es_mes_micro_flow_divergence_reversion/variants/afternoon_mes_large20_buy_pressure_short/config.yaml
  data_refresh_source_kind: original
  mechanics_review_required: true
  mechanics_review_version: '2026-06-21'
  mechanics_review:
    mechanic_expresses_edge: This data-refresh rerun preserves the original ES/MES
      micro-flow divergence edge. At 14:00 ET the strategy uses only completed 13:55-13:59
      ES and MES bars and tests whether unusually positive MES large-20 buy pressure
      without ES follow-through mean-reverts in ES.
    entry_logic_rationale: Entry logic is unchanged from the original variant. The
      signal remains a completed five-minute MES large-20 imbalance threshold with
      an ES return cap, short-only direction, next-bar-safe timing at 14:00 ET, and
      at most one trade per RTH session.
    stop_loss_rationale: Stop-loss mechanics are unchanged and remain a percent-from-entry
      stop rounded to ES tick size. The rerun is intended to test the same predeclared
      stop parameter space on the longer paired cache rather than tune risk after
      seeing results.
    target_exit_rationale: Take-profit and exit mechanics are unchanged. The fixed-R
      target grid and the 15:31 ET forced strategy flatten are retained so any result
      comes from the wider sample, not a post-result change to profit-taking or holding
      period.
    profitability_rationale: If MES large-trade demand temporarily leads only liquidity
      pressure instead of durable ES buying, short ES should earn positive expectancy
      after costs when the imbalance is extreme and ES has not already moved too far
      in the same direction.
    known_failure_modes: The edge may be a microstructure artifact, may depend on
      stale Sierra aggregate large-trade proxies, may decay across contract regimes,
      may fail after commissions and slippage, or may pass only in a narrow parameter
      pocket that should be rejected or flagged.
    pre_test_decision: approve_for_testing
