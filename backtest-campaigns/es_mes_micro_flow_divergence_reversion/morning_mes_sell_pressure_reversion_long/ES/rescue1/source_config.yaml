campaign_id: es_mes_micro_flow_divergence_reversion
variant_id: morning_mes_sell_pressure_reversion_long
test_run_id: rescue1
strategy_name: trade_orderflow_pressure
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Kaniel, Saar, and Titman (2008); Barber, Odean, and Zhu (2009);
    Hasbrouck (1995)
  edge_thesis: MES/ES aggressive-flow divergence can mark temporary liquidity demand
    in the smaller-notional contract; trade ES for same-session mean reversion.
  mechanic: At 10:00 ET, use only completed 09:30-09:59 ES and MES bars. Go long ES
    when ES-minus-MES 30-minute imbalance exceeds the threshold, then flatten at 11:31
    ET unless the fixed percent stop or fixed-R target is hit first.
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: Original variant passed core at 26/36 profitable combinations and
    passed actual trade-path stress, but failed the random-placebo monkey profitability
    and median gates; test the same 10:00 ET long reversion mechanic in a denser adjacent
    lower-threshold neighborhood.
  rescue_constraints: Same entry module, setup mode, signal time, direction, timeframe,
    stop module, target module, costs, data window, and stage criteria. Only existing
    flow-threshold parameter space is changed.
  data_refresh_retry: Local Sierra MES data now extends the paired ES/MES feature
    cache back to 2019-05-06; this rerun keeps the same existing parameter-space rescue
    mechanic, parameter grid, costs, fills, and stage gates while widening only the
    available completed-bar data window.
  source_config_before_refresh: campaigns/es_mes_micro_flow_divergence_reversion/rescue_attempts/parameter_space_rescue_1/morning_mes_sell_pressure_reversion_long/config.yaml
  data_refresh_source_kind: rescue
  mechanics_review_required: true
  mechanics_review_version: '2026-06-21'
  mechanics_review:
    mechanic_expresses_edge: This data-refresh rerun preserves the existing existing
      parameter-space rescue for morning_mes_sell_pressure_reversion_long. At 10:00
      ET, use only completed 09:30-09:59 ES and MES bars. Go long ES when ES-minus-MES
      30-minute imbalance exceeds the threshold, then flatten at 11:31 ET unless the
      fixed percent stop or fixed-R target is hit first. The only intended change
      is replacing the stale one-year cache with the longer paired ES/MES completed-bar
      cache.
    entry_logic_rationale: 'Entry logic is unchanged: module trade_orderflow_pressure
      keeps setup_mode=morning_mes_sell_pressure_reversion_long, entry_time=10:00:00,
      flow_column=es_minus_mes_imbalance_30, flow_threshold=0.02, and the same direction
      flags. Signals use completed bars before the decision time.'
    stop_loss_rationale: 'Stop-loss mechanics are unchanged: module percent_from_entry
      with params {''stop_pct'': 0.004, ''round_to_tick'': True}. The data refresh
      does not tune risk after seeing results; it tests the same declared stop parameter
      space on a longer sample.'
    target_exit_rationale: 'Take-profit and exit mechanics are unchanged: module fixed_r
      with params {''target_r_multiple'': 2.0}, plus strategy flatten_time=11:31:00.
      Any improvement must come from sample length, not changed profit-taking.'
    profitability_rationale: MES/ES aggressive-flow divergence can mark temporary
      liquidity demand in the smaller-notional contract; trade ES for same-session
      mean reversion. A valid result must survive commissions, slippage, neighbouring
      parameters, monkey tests, WFA, prop-rule simulation, and acceptance OOS without
      special exclusions.
    known_failure_modes: The apparent edge may be a Sierra aggregate-orderflow artifact,
      may depend on stale large-trade proxy semantics, may decay across regimes, may
      fail after costs, or may only work in a narrow parameter pocket that should
      be rejected.
    pre_test_decision: approve_for_testing
