timeframe: 5m
research_metadata:
  academic_source: Overnight/intraday return separation and overnight-demand reversal literature
  edge_thesis: NQ overnight returns may partially reverse after the cash open when overnight inventory
    and liquidity imbalances normalize.
  mechanic: Two-sided NQ overnight return reversal using a completed 15-minute opening confirmation window
    and a 10:00 ET signal; confirm_mode=confirm_reversal.
  timeframe_rationale: Five-minute bars align the completed opening confirmation windows with a deterministic
    10:00 next-bar entry.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  pre_pnl_density:
    artifact: research_artifacts/nq_overnight_intraday_reversal_density_audit_20260622.md
    entry_combo_count: 6
    strict_corner_min_signals_per_year: 64.9664
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_overnight_intraday_reversal
  nq_port_note: Side-only variants were excluded before PnL because they failed the density floor.
  mechanics_review:
    mechanic_expresses_edge: The variant expresses overnight-intraday reversal by fading the sign of the
      completed overnight return after the RTH open, using only prior RTH close, current RTH open, and
      the predeclared opening confirmation window.
    entry_logic_rationale: The signal is evaluated at 10:00 after the opening confirmation window is complete;
      fills are next bar open or later, so no future RTH information is used.
    stop_loss_rationale: The fixed percent stop is predeclared, rounded to NQ tick size, and rejects the
      reversal thesis when overnight pressure continues after entry.
    target_exit_rationale: The fixed-R target monetizes mean reversion without using future session range,
      VWAP, or discretionary exits.
    profitability_rationale: NQ has large overnight moves and cash-open liquidity shocks, making reversal
      plausible, but it must survive the full staged workflow.
    known_failure_modes: Overnight moves may trend all day, confirmation windows can be noisy, and any
      apparent reversal can fail WFA or monkey perturbations.
    pre_test_decision: approve_for_testing
