dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Johnson (2016); Takahashi (2025); Chordia, Roll, and Subrahmanyam
    (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Extreme same-clock aggressive signed-flow plus same-direction price
    movement may be temporary inventory pressure that mean-reverts after the completed
    impulse.
  mechanic: At 10:00 ET, use the completed rolling 5-minute NQ signed-flow rank and
    return. If flow rank and return point the same way, fade that impulse at the next
    1-minute bar open.
  timeframe_rationale: One-minute bars preserve the completed 5-minute signal window,
    next-bar execution, and pessimistic same-bar stop/target handling.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: 'This variant directly expresses the orderflow-impulse
      reversal thesis: the setup requires an extreme same-clock signed-flow rank and
      a same-direction completed 5-minute return, so it only fires after a visible
      liquidity-taking impulse rather than during quiet noise. The trade then fades
      the impulse, which matches the inventory/liquidity-provision rationale rather
      than the rejected continuation thesis.

      '
    entry_logic_rationale: 'The 10:00 ET slot gives enough post-open history for a
      completed 5-minute pressure window while still testing the active morning liquidity
      period. The signal is generated only after the 09:59-10:00 bar closes and the
      engine must enter at the next bar open, so the setup cannot use intra-bar or
      future information.

      '
    stop_loss_rationale: 'The signal-bar high or low is the natural invalidation point
      for a reversal trade because continuation beyond that completed impulse extreme
      means liquidity providers did not absorb the pressure. A small tick offset avoids
      rejecting the thesis on a one-tick probe while keeping risk tied to observable
      price action rather than a curve-fit dollar amount.

      '
    target_exit_rationale: 'The target is a fixed-R retracement because the edge expects
      a short inventory correction, not a long trend. The grid keeps target multiples
      modest so the campaign tests whether the immediate reversal is large enough
      after costs without requiring a discretionary hold or future VWAP/level.

      '
    profitability_rationale: 'If extreme morning flow impulses partly reverse after
      liquidity providers absorb inventory, next-bar fades can earn a small retracement
      while risking only the completed impulse extreme. The trade count should be
      high enough because same-clock flow ranks and small return thresholds produce
      recurring opportunities across many RTH sessions.

      '
    known_failure_modes: 'The most likely failure is that extreme signed flow is informed
      and continues, especially after news or at the cash open. The Sierra aggregate
      signed-volume proxy can also misclassify aggressor pressure, and a one-minute
      next-bar entry may be too late after slippage and pessimistic same-bar ordering.

      '
    pre_test_decision: approve_for_testing
