research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Easley, Lopez de Prado, and
    O'Hara (2012); Madhavan, Richardson, and Roomans (1997)
  edge_thesis: 'Two midday slots fade low-toxicity extensions: 12:30 down-extension
    long and 13:30 up-extension short.'
  mechanic: 'Two midday slots fade low-toxicity extensions: 12:30 down-extension long
    and 13:30 up-extension short.'
  timeframe_rationale: Five-minute bars let the campaign form 15/30/60-minute completed
    orderflow-state windows while preserving next-bar execution and enough yearly
    observations.
  pre_pnl_density: 1559 full-sample pre-PnL signals, about 101.03 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'Two midday slots fade low-toxicity extensions: 12:30
      down-extension long and 13:30 up-extension short. Each slot requires low same-clock
      absolute orderflow imbalance plus a completed price extension, so the entry
      expresses weak-pressure extension fade rather than raw orderflow momentum.'
    entry_logic_rationale: The entry waits until the configured 5-minute bar is complete,
      checks that absolute orderflow imbalance ranks in the lower same-clock tail
      versus prior sessions, and then fades only if the completed return window extended
      far enough in the opposite direction. This keeps the state, extension, and entry
      timing auditable.
    stop_loss_rationale: A percent-from-entry stop is predeclared and independent
      of future orderflow. It rejects the fade if the supposedly low-toxicity extension
      continues far enough to invalidate the reversion premise after costs.
    target_exit_rationale: A fixed-R target keeps the payoff tied to initial risk
      rather than future intraday levels. The target grid starts at 1.0R because sub-1R
      targets are invalid under the methodology.
    profitability_rationale: The setup should be profitable only if low same-clock
      imbalance identifies extensions with weak informed pressure and therefore better
      odds of reversion. Pre-PnL density was 1559 signals, about 101.03 per year,
      so this is not a rare-event thesis.
    known_failure_modes: Low imbalance may simply mean quiet continuation, same-clock
      ranks may fail in new regimes, fixed slots may encode intraday seasonality,
      and costs may consume small fades even when direction is often right.
    pre_test_decision: approve_for_testing
