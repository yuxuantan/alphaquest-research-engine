timeframe: 5m
research_metadata:
  academic_source: Admati and Pfleiderer (1988); Harris (1986); Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: The completed low-liquidity NQ midday range may act as a temporary
    inventory boundary; a post-lunch close outside the range with aligned aggregate
    orderflow may identify expansion rather than random lunch drift.
  mechanic: completed 11:30-13:00 ET lunch range breakout with large-10 signed-flow
    confirmation through 14:30 ET; enter on the next 5-minute bar open and flatten
    at 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars match the lunch-range auction horizon while preserving
    completed-bar orderflow confirmation; execution remains next-bar open or later.
  pre_pnl_port_note: Direct NQ port of the ES midday range orderflow breakout family
    before any NQ PnL inspection. NQ range caps were scaled from signal-count density
    only, not returns.
  source_es_config_path: campaigns/es_midday_range_orderflow_breakout/variants/lunch_1130_1300_large10_breakout_1430/config.yaml
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This variant freezes the completed 11:30:00-13:00:00
      ET NQ midday range before any entry can occur, then requires a completed 5-minute
      close outside that frozen range with large10 orderflow aligned with the breakout
      direction.
    entry_logic_rationale: The range high/low are unavailable until the configured
      range window is complete. Breakout and orderflow confirmation use only the completed
      confirmation bar, and fills must occur no earlier than next bar open.
    stop_loss_rationale: The stop is placed back through the broken range boundary
      with a predeclared NQ-scaled maximum stop cap; if price cannot hold the boundary,
      the breakout thesis is wrong.
    target_exit_rationale: The fixed-R target tests whether post-lunch expansion can
      travel far enough beyond the frozen range boundary after costs; unresolved trades
      flatten at 15:55 ET.
    profitability_rationale: The setup can pass only if NQ low-activity midday consolidation
      stores inventory pressure and aligned aggregate orderflow marks tradable expansion
      across neighboring range/flow/stop/target parameters.
    known_failure_modes: Lunch-range breaks can be stop probes, Sierra aggregate flow
      can be noisy, recent high-volatility NQ sessions can widen stops, and profits
      can concentrate in trend days.
    pre_test_decision: approve_for_testing
