  conclusion: Not a duplicate of active failed campaigns. This campaign uses overnight
    return as the predictor for a late-day entry, not early overnight reversal or
    first-window intraday momentum. Archived tests are ignored and not used for tuning.
variants:
- two_sided_overnight_sign_continuation_1530
- positive_overnight_long_1530
- negative_overnight_short_1530
- opening_reversal_confirmed_1530
- penultimate_alignment_1530
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change core economic edge
  - change timeframe or data window
  - add or remove filters after seeing results
