campaign_id: es_overnight_return_late_day_momentum
title: ES Overnight Return Late-Day Momentum
decision: failed
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Overnight returns in stock-index futures may positively forecast the last
  half-hour of the RTH session; ES may therefore continue in the overnight-return
  direction near 15:30 ET after costs while staying flat before the prop cutoff.
rationale: This campaign tests the Liu-Tse overnight-return/last-half-hour relation.
  It is not the active overnight-intraday early reversal campaign, which trades near
  the open, and it is not the active late-day intraday momentum campaign, which keys
  off first-window intraday returns rather than overnight return from prior close
  to RTH open.
sources:
- title: 'Overnight returns of stock indexes: Evidence from ETFs and futures'
  authors: Qingfu Liu and Yiuman Tse
  year: 2017
  venue: International Review of Economics & Finance 48, 440-451
  doi: 10.1016/j.iref.2017.01.005
  link: https://ideas.repec.org/a/eee/reveco/v48y2017icp440-451.html
  relevance: Reports that overnight returns can forecast last-half-hour trading-hours
    returns with a positive relation in US ETF and futures markets.
- title: 'Intraday Time Series Momentum: International Evidence'
  authors: A. Urquhart and coauthors
  year: 2020
  venue: International intraday momentum research
  link: https://centaur.reading.ac.uk/95566/1/Accepted-Version.pdf
  relevance: Provides broader evidence for last-half-hour intraday predictability
    and motivates strict separation between first-window ITSM and overnight-return
    predictors.
- title: The Overnight Drift
  authors: Federal Reserve Bank of New York Staff Report
  year: 2020
  venue: New York Fed Staff Report 917
  link: https://www.newyorkfed.org/medialibrary/media/research/staff_reports/sr917.pdf
  relevance: Provides context on overnight/intraday return segmentation and mechanisms;
    used as background rather than direct ES evidence.
data_needs:
- timezone-aware ES RTH 1-minute bars aggregated to 5-minute strategy bars
- previous RTH close available only after the prior RTH session completes
- RTH open and completed first/penultimate windows for conditional variants
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- The test uses RTH-only prior close/open relationships from local bars; overnight
  path details are not traded.
- Signal is generated on the completed 15:25-15:30 ET bar and enters next bar open.
- Same-bar stop/target conflicts use pessimistic OHLC handling.
lookahead_risks:
- Prior RTH close is from the completed prior RTH session only.
- RTH open, first-window return, and penultimate-window return are known before the
  15:30 signal.
- No final session return, future last-half-hour return, final VWAP, or future high/low
  is used.
failure_modes:
- The documented effect may not survive ES costs/slippage or may have decayed after
  publication.
- Late-day entries may have too little time before forced flatten for robust targets.
- The edge may be dominated by a few macro-event days or by one side only.
