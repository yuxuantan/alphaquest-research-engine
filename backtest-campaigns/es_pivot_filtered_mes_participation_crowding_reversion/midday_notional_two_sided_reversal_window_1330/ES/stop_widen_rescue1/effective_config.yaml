research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets
    (2024); CME Micro E-mini documentation; Lo, Mamaysky, and Wang (2000); Moskowitz,
    Ooi, and Pedersen (2012)
  edge_thesis: High MES participation during a completed ES move may mark temporary
    smaller-contract crowding only when the reversal direction agrees with the last
    completed multi-timeframe pivot market-structure pattern.
  mechanic: From 11:00 through 13:30 ET, use completed 1-minute bars to find the first
    high-MES-notional-share 30-minute ES move. Fade only in the direction supported
    by carried 5/15-minute completed pivot structure. Enter next bar and flatten by
    14:30.
  timeframe_rationale: 1-minute bars preserve completed ES/MES participation features
    and next-bar execution while the fixed pivot filter builds higher-timeframe structure
    only from completed 1-minute bars. Carrying completed pivots across RTH sessions
    implements the predeclared last-pattern-found bias without using any future bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Midday participation shocks are tested as temporary pressure
      after the open, with the completed pivot filter forcing the fade to be a pullback
      in the current structure rather than a standalone reversal bet. The base MES
      crowding condition must trigger first; the pivot filter cannot create a trade
      by itself.
    entry_logic_rationale: The entry uses completed rolling 30-minute ES return and
      prior-history MES participation rank on each completed 1-minute bar inside a
      fixed window. A signal is accepted only if the carried completed pivot bias
      has the same direction as the proposed fade. Engine execution remains next-bar
      open or later.
    stop_loss_rationale: The stop remains percent-from-entry, rounded to the ES tick,
      so the composite does not use a future swing or post-entry structure level for
      invalidation.
    target_exit_rationale: The fixed-R target remains predeclared and target_r_multiple
      is never below 1.0R. Any unresolved position flattens at the configured intraday
      cutoff.
    profitability_rationale: This is convincing enough to test because high smaller-contract
      participation can reflect crowded late reaction, while completed pivot structure
      should filter those fades to pullbacks in the prevailing intraday structure
      instead of opposing persistent repricing.
    known_failure_modes: MES participation may be informed rather than crowded; carried
      pivot structure may lag regime changes; the window may select weak first signals;
      costs and one-tick slippage may erase the mean-reversion effect.
    pre_test_decision: approve_for_testing
    rescue_attempt: 'stop_widen_rescue_1: parameter-only rescue after original run
      failed staged validation. Entry mechanics, signal windows, pivot filter, data
      windows, costs, and target grid are unchanged; only stop_pct fixed value/grid
      is widened.'
