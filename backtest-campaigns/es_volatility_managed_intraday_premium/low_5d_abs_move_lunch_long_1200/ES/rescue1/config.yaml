campaign_id: es_volatility_managed_intraday_premium
variant_id: low_5d_abs_move_lunch_long_1200
test_run_id: rescue1
strategy_name: volatility_managed_intraday_premium
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Moreira and Muir (2017); Fleming, Kirby, and Ostdiek (2001); Cederburg,
    O Doherty, Wang, and Yan (2020)
  edge_thesis: Lagged realized volatility can condition the equity risk premium; ES
    intraday long exposure may perform better when recent volatility or downside volatility
    is low or falling.
  mechanic: At 12:00 ET, enter long ES only when the prior-session 5-day average absolute
    RTH return rank is at or below the configured threshold; flatten by 15:55 ET unless
    stop or target is hit.
  timeframe_rationale: The noon decision tests whether low recent realized movement
    supports intraday premium capture after the morning has traded, with next-bar-open
    execution.
  rescue_reason: Original low-5-day-absolute-move noon long failed core with zero
    profitable combinations; rescue keeps the same low-abs-move mechanic and tests
    a nearby stricter/tighter-exit neighborhood.
  rescue_scope: parameter_space_only_no_mechanic_change
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  exchange_timezone: America/New_York
  feature_set: none
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  rth_end: '15:59:00'
  rth_start: 09:30:00
  source: parquet
  source_timeframe: 1m
  symbol: ES
  timezone: America/New_York
  warmup_days: 0
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: volatility_managed_intraday_premium
    params:
      setup_mode: low_absret5_long
      feature_csv: data/external/es_lagged_volatility_features_20110103_20260609.csv
      entry_time: '12:00:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      vol_rank_max: 0.2
      vol_ratio_max: 0.8
      stop_pct: 0.002
      target_r_multiple: 1.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.002
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
core:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
