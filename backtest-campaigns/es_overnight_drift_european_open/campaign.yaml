campaign_id: es_overnight_drift_european_open
title: ES Overnight Drift Around European Open
symbol: ES
market: CME E-mini S&P 500 futures
status: authored_for_testing
created_at: '2026-06-19'
edge_family: overnight_drift_european_open
hypothesis: 'ES futures may earn a positive return during the overnight European-open transfer window, especially
  after the prior U.S. RTH session declined, because global investors and intermediaries rebalance risk after the
  U.S. close and before European cash-market liquidity fully normalizes.

  '
sources:
- title: The Overnight Drift
  authors: Nina Boyarchenko, Lars Larsen, and Paul Whelan
  year: 2020
  venue: Federal Reserve Bank of New York Staff Reports No. 917
  url: https://www.newyorkfed.org/medialibrary/media/research/staff_reports/sr917.pdf
  relevance: 'The paper studies S&P 500 futures and documents a concentrated positive overnight return component
    around the 02:00-03:00 ET European-open window, with a mechanism linked to imbalances generated by prior U.S.
    trading.

    '
rationale: 'This campaign is deliberately distinct from active RTH overnight-return and gap-reversal campaigns.
  It does not use an overnight return to predict a later RTH trade. It directly tests the ETH overnight drift window
  identified in the source, uses existing local ES ETH/RTH OHLCV data, enters only after a completed ETH bar, and
  flattens inside the same early-morning ETH window.

  '
data_needs:
  primary: data/cache/databento/es_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll.parquet
  cost_policy: Uses already-local Databento OHLCV cache only; no paid data download is required.
  required_fields:
  - timestamp
  - open
  - high
  - low
  - close
  - volume
  - contract_symbol
  generated_fields:
  - session_date
  - session_label
  - is_eth
  - prev_rth_open
  - prev_rth_close
execution_and_risk_notes: 'This is an ETH/overnight-session research branch. The configs explicitly keep prop-rule
  checks enabled but use an ETH-specific 04:00 ET cutoff and allow non-RTH positions. Any pass would still need
  manual review for broker/prop session eligibility, liquidity, funding, and operational feasibility.

  '
lookahead_risks:
- Signals use only completed ETH bars through the declared signal clock.
- Prior RTH open/close are available before the ETH signal window.
- No future overnight high/low, final session range, future VWAP, or future RTH information is used.
- Entry is next-bar open after the completed signal bar, handled by the engine.
- Stop/target conflicts use the existing pessimistic same-bar handling unless 1-minute detail resolves the path.
failure_modes:
- The published overnight drift may have decayed after publication or after changes in global futures participation.
- The expected move may be too small after ES commissions and one-tick slippage.
- Daylight-saving differences between U.S., London, and continental Europe can blur a fixed ET window.
- The strategy trades during thinner ETH liquidity and may understate live spread/market-impact costs.
- Prop-firm or broker rules may disallow the tested overnight-session exposure even if the backtest flattens before
  04:00 ET.
variants:
- eu_open_unconditional_long_0200
- eu_open_prior_down_long_0200
- eu_open_down_no_recovery_long_0200
- eu_open_prior_down_long_0230
- london_open_prior_down_long_0300
parameter_policy:
  max_entry_tunables: 2
  max_stop_tunables: 1
  max_target_exit_tunables: 1
  minimum_target_r_multiple: 1.0
  combinations: 9 to 81 depending on variant
  rescue_policy: 'If variants fail, only one parameter-space or fixed-parameter rescue is allowed per failed variant
    unless the user explicitly authorizes an additional rescue. Mechanics may not change after seeing results.

    '
rescue_attempts:
- id: parameter_space_rescue_1
  created_at: '2026-06-19'
  scope: one rescue for each failed original variant
  type: parameter_space_only
  mechanics_unchanged: true
  target_r_multiple_floor: 1.0
  variants:
  - eu_open_unconditional_long_0200
  - eu_open_prior_down_long_0200
  - eu_open_down_no_recovery_long_0200
  - eu_open_prior_down_long_0230
  - london_open_prior_down_long_0300
  rationale: All five original variants failed limited core grid with 0% profitable combinations. This rescue keeps
    the same overnight-drift mechanics and tests only declared fixed/grid parameter alternatives before any rescue
    results are known.
