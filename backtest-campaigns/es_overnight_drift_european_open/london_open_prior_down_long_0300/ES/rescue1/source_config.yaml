timeframe: 5m
research_metadata:
  academic_source: Boyarchenko, Larsen, and Whelan (2020), Federal Reserve Bank of New York Staff Reports No. 917
  edge_thesis: ES futures may earn a positive overnight return around the European-open transfer window because
    prior U.S. trading imbalances are absorbed after the U.S. close.
  mechanic: Enter long after the completed 02:55-03:00 ET ETH bar on prior-RTH-down sessions and hold through 04:00
    ET, testing whether the documented European-open drift extends into the London/cash-market handoff.
  timeframe_rationale: Five-minute ETH bars keep the European-open window auditable while avoiding one-minute noise;
    all signals use completed bars and the engine enters at the next 5-minute open.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  eth_session_risk_caveat: This variant is not RTH-only. Apex-style checks remain enabled with an explicit 04:00
    ET ETH cutoff and no_overnight_positions=false.
  mechanics_review:
    mechanic_expresses_edge: Enter long after the completed 02:55-03:00 ET ETH bar on prior-RTH-down sessions and
      hold through 04:00 ET, testing whether the documented European-open drift extends into the London/cash-market
      handoff. This is a direct test of the published overnight drift window, not an RTH gap reversal or late-day
      continuation setup.
    entry_logic_rationale: The signal clock is fixed before testing and uses only the completed ETH bar ending at
      the declared signal time plus prior RTH open/close values already known before the overnight session. The
      next-bar execution rule prevents entering on the same close that creates the signal.
    stop_loss_rationale: A fixed percent stop is used because the source defines a time-window risk premium rather
      than a chart level. The stop grid spans realistic short ETH-window ES movement and is declared before testing.
    target_exit_rationale: A fixed-R target plus a strict time flatten tests whether the overnight drift can monetize
      inside the source window without discretionary exits or holding into the RTH session.
    profitability_rationale: A later window is plausible only if the same overnight imbalance is still being transferred
      as European cash liquidity opens; the prior-RTH-down filter keeps it tied to the paper's imbalance mechanism
      rather than generic overnight seasonality.
    known_failure_modes: The anomaly may have decayed, the average window return may be too small after one-tick
      slippage and commissions, ETH liquidity may make fills worse than modeled, and broker or prop rules may reject
      the overnight-session exposure.
    pre_test_decision: approve_for_testing
    rescue_attempt_rationale: Original London-open variant had zero profitable combinations but its best-ranked
      run used the highest tested target. Rescue keeps the same 03:00 ET prior-down mechanic and tests only a wider
      stop/target geometry, with no target below 1.25R. This rescue is logged before testing and does not change
      the core strategy mechanic.
  rescue_attempt: parameter_space_rescue_1
  rescue_parent_run_id: run1
  rescue_type: parameter_space_only
  rescue_reason: Original London-open variant had zero profitable combinations but its best-ranked run used the
    highest tested target. Rescue keeps the same 03:00 ET prior-down mechanic and tests only a wider stop/target
    geometry, with no target below 1.25R.
  rescue_constraints: Entry, stop, target modules, economic thesis, timeframe, data window, signal time, and flatten
    time are unchanged. Only existing strategy parameters and declared parameter grids were adjusted. No target_r_multiple
    below 1.0 is allowed.
