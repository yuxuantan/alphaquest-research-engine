campaign_id: es_overnight_drift_european_open
variant_id: eu_open_prior_down_long_0200
test_run_id: run1
strategy_name: overnight_drift
symbol: ES
dataset_id: es_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll
timeframe: 5m
research_metadata:
  academic_source: Boyarchenko, Larsen, and Whelan (2020), Federal Reserve Bank of
    New York Staff Reports No. 917
  edge_thesis: ES futures may earn a positive overnight return around the European-open
    transfer window because prior U.S. trading imbalances are absorbed after the U.S.
    close.
  mechanic: Enter long after the completed 01:55-02:00 ET ETH bar only when the prior
    completed RTH session closed down by the declared tick threshold, then flatten
    by 03:00 ET.
  timeframe_rationale: Five-minute ETH bars keep the European-open window auditable
    while avoiding one-minute noise; all signals use completed bars and the engine
    enters at the next 5-minute open.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  eth_session_risk_caveat: This variant is not RTH-only. Apex-style checks remain
    enabled with an explicit 04:00 ET ETH cutoff and no_overnight_positions=false.
  mechanics_review:
    mechanic_expresses_edge: Enter long after the completed 01:55-02:00 ET ETH bar
      only when the prior completed RTH session closed down by the declared tick threshold,
      then flatten by 03:00 ET. This is a direct test of the published overnight drift
      window, not an RTH gap reversal or late-day continuation setup.
    entry_logic_rationale: The signal clock is fixed before testing and uses only
      the completed ETH bar ending at the declared signal time plus prior RTH open/close
      values already known before the overnight session. The next-bar execution rule
      prevents entering on the same close that creates the signal.
    stop_loss_rationale: A fixed percent stop is used because the source defines a
      time-window risk premium rather than a chart level. The stop grid spans realistic
      short ETH-window ES movement and is declared before testing.
    target_exit_rationale: A fixed-R target plus a strict time flatten tests whether
      the overnight drift can monetize inside the source window without discretionary
      exits or holding into the RTH session.
    profitability_rationale: The source links the overnight drift to order imbalances
      after prior U.S. trading. Conditioning on a prior RTH selloff should isolate
      sessions where European-open investors absorb or rebalance prior U.S. risk-off
      pressure.
    known_failure_modes: The anomaly may have decayed, the average window return may
      be too small after one-tick slippage and commissions, ETH liquidity may make
      fills worse than modeled, and broker or prop rules may reject the overnight-session
      exposure.
    pre_test_decision: approve_for_testing
