campaign_id: es_vix_term_structure_orderflow_pullback
variant_id: contango_morning_signed_vwap_reclaim_long_1300
test_run_id: rescue1
strategy_name: vix_term_structure_orderflow_pullback
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Mixon (2007); Johnson (2017); Cont, Kukanov, and Stoikov (2014);
    official Cboe VIX term-structure histories
  edge_thesis: Lagged Cboe VIX term-structure states may identify risk-on or risk-off
    ES sessions, but entries should require same-session ES price-action acceptance
    around VWAP and completed aggregate orderflow confirmation before taking intraday
    exposure.
  mechanic: Contango/risk-on state plus morning-to-midday ES VWAP reclaim with signed
    aggregate buy-flow confirmation.
  timeframe_rationale: One-minute bars keep VWAP pullbacks, orderflow confirmation,
    next-bar execution, stop/target fills, and forced flattening directly auditable
    without higher-timeframe intrabar reconstruction.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the composite edge by first requiring
      lagged Cboe term-structure setup `contango_long` from a prior daily close, then
      requiring ES to show a completed VWAP pullback/rejection continuation with `signed_volume`
      orderflow aligned to the allowed long direction.
    entry_logic_rationale: The entry can occur only between 09:30:00 and 13:00:00
      ET after a completed 1-minute bar. The VIX state is known before the ES session,
      VWAP uses only completed current-session bars, and the engine can fill only
      on the next 1-minute bar or later.
    stop_loss_rationale: The sweep-extreme stop uses the completed pullback bar extreme
      plus a small tick offset. If price breaks beyond the VWAP pullback extreme,
      the continuation/rejection thesis is invalidated without needing future levels.
    target_exit_rationale: A fixed-R target and forced flatten at 15:00:00 ET test
      whether the state-confirmed VWAP/orderflow continuation resolves intraday without
      overnight exposure or discretionary exits.
    profitability_rationale: Low VIX/VIX3M rank states proxy easier equity-risk conditions.
      A same-session ES trend that pulls back to VWAP and reclaims it with net buying
      flow should represent institutions using VWAP-area liquidity to continue risk-on
      exposure rather than a blind timed long. Rescue parameter space keeps the same
      mechanic but requires stronger VIX regime ranks and tests whether quicker fixed-R
      exits or slightly wider sweep-extreme offsets reduce cost sensitivity while
      preserving density.
    known_failure_modes: The volatility state can be stale by RTH, VWAP pullbacks
      can be crowded, aggregate orderflow can be late/noisy, and the composite filter
      may become too sparse in WFA windows or too cost-sensitive under one-tick slippage.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    trigger: Original variant failed limited_core_grid_test.
    scope: parameter_space_and_fixed_parameters_only
    mechanic_preserved: true
    changed_parameters:
    - entry.params.term_rank_threshold
    - entry.params.min_orderflow_imbalance
    - sl.params.stop_offset_ticks
    - tp.params.target_r_multiple
    forbidden_changes_respected:
    - entry module unchanged
    - stop module unchanged
    - target module unchanged
    - timeframe unchanged
    - data window unchanged
    - costs/fills/gates unchanged
