campaign_id: es_vix_term_structure_orderflow_pullback
title: ES VIX Term-Structure State With VWAP/Orderflow Pullback Confirmation
decision: FAIL
created_at: '2026-06-18'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe VIX term-structure states may identify risk-on or risk-off ES sessions, but entries
  should require same-session ES price-action acceptance around VWAP and completed aggregate orderflow
  confirmation before taking intraday exposure.
rationale: 'The active timed VIX-term campaign tested a daily volatility-state signal at fixed entry times.
  This composite tests a stricter mechanism: the volatility term structure supplies only the prior-close
  risk regime, while ES must independently show current-session VWAP pullback/rejection continuation and
  aligned aggregate orderflow on a completed bar before next-bar entry.'
sources:
- title: The Implied Volatility Term Structure of Stock Index Options
  authors: Scott Mixon
  year: 2007
  venue: Journal of Empirical Finance, 14(3), 333-354
  link: https://ideas.repec.org/a/eee/empfin/v14y2007i3p333-354.html
  relevance: Documents information in stock-index option implied-volatility term structure across maturities.
- title: Risk Premia and the VIX Term Structure
  authors: Travis L. Johnson
  year: 2017
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.travislakejohnson.com/pdfs/Johnson%20VIXTS%202017%20%28JFQA%29.pdf
  relevance: Shows the VIX term-structure slope summarizes variance-risk-premium information; this campaign
    uses it only as a lagged regime state.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates order-flow imbalance as a short-horizon pressure proxy. This campaign uses completed
    Sierra aggregate signed-volume buckets, not full-depth LOB OFI.
- title: VIX Term Structure and Historical Volatility Index Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe volatility-index data
  link: https://www.cboe.com/tradable-products/vix/term-structure/
  relevance: Official free source and definitions for VIX maturity-term-structure indices used by the
    local lagged feature file.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV and aggregate signed-volume bars in America/New_York
- official free Cboe VIX9D, VIX, VIX3M, and VIX6M daily historical values already cached locally
- derived VIX term-structure session feature file using only Cboe observations strictly before the ES
  session date
- completed session VWAP from current-session bars only, aggregate signed/large10/large20 flow, next-bar
  execution, costs, slippage, tick size, point value, pessimistic fills, and forced flatten from config
data_quality_caveats:
- VIX maturity indices are daily closing SPX option-implied values, not intraday option snapshots.
- Same-day Cboe closes are unavailable to intraday ES signals and are not used.
- Sierra orderflow is aggregate bid/ask-volume proxy data, not quote-level queue or TBBO data.
- VWAP is computed from completed current-session bars only and is not final-session VWAP.
lookahead_risks:
- Using the Cboe close from the same ES session date would leak unavailable data and is forbidden.
- The VIX term-state feature file uses latest Cboe volatility-index close strictly before ES session_date.
- The ES entry requires a completed VWAP pullback/reclaim or rejection bar and completed aggregate orderflow
  before next-bar execution.
- No final session high/low, final VWAP, future orderflow, future VIX values, future returns, or overnight
  exposure is used.
failure_modes:
- The VIX term-structure regime may already be priced into ES by the RTH open.
- VWAP pullbacks can be crowded and cost-sensitive after one-tick slippage and commissions.
- Aggregate orderflow confirmation may arrive after most of the continuation has already occurred.
- The composite filters may reduce density below 50 trades/year in some WFA windows.
- Risk-off term states can mean either continuing sell pressure or rebound risk premium, so direction
  may be unstable.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_cboe_vix_term_structure_intraday
  - es_vwap_orderflow_pullback_continuation
  - es_vwap_pullback_continuation
  - es_vwap_deviation_orderflow_reversion
  - es_trend_aligned_orderflow_continuation
  - es_ema_pullback_orderflow_continuation
  - es_cboe_vix_level_state_intraday
  - es_vvix_tail_risk_intraday
  - es_variance_risk_premium_intraday
  conclusion: Eligible as a composite campaign under the user-approved mix-and-match rule. It is not a
    duplicate timed VIX-term campaign because VIX state only gates trades; every entry still requires
    current-session ES VWAP pullback/rejection and aggregate orderflow confirmation. It is not a duplicate
    VWAP/orderflow campaign because the prior-close VIX term-state determines allowed direction and sessions
    before the ES mechanics can trade.
variants:
- contango_morning_signed_vwap_reclaim_long_1300
- contango_large10_vwap_reclaim_long_1500
- curve_flattening_signed_vwap_reject_short_1500
- front_stress_large10_vwap_reject_short_1500
- backwardation_surge_signed_vwap_reject_short_1500
parameter_space:
  total_combinations_per_variant: 81
  entry_tunables:
  - term_rank_threshold
  - min_orderflow_imbalance
  stop_tunables:
  - stop_offset_ticks
  target_tunables:
  - target_r_multiple
  parameters:
    entry.params.term_rank_threshold: variant-specific 3-point lower-half or upper-half rank grid
    entry.params.min_orderflow_imbalance:
    - 0.0
    - 0.03
    - 0.06
    sl.params.stop_offset_ticks:
    - 1
    - 2
    - 4
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change core VIX-state plus VWAP/orderflow pullback mechanic
  - change timeframe or data window
  - add or remove filters after seeing results
  - alter costs, fills, sessions, validation gates, or prop rules
