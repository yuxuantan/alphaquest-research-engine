timeframe: 5m
research_metadata:
  academic_source: Liu et al. (2016); Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: NQ opening gaps may fade when completed signed-volume is counter to the opening-gap direction.
  mechanic: 10:15:00-10:30:00 ET counter-gap signed-volume fade toward a fraction of the prior RTH close gap.
  timeframe_rationale: Five-minute bars preserve completed source-window timing while reducing one-minute orderflow noise and leaving execution to the engine's next eligible bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant cannot trade unless NQ opens away from the prior RTH close and completed signed-volume from the source window is against the gap direction.
    entry_logic_rationale: The signal waits until the configured 10:15:00 to 10:30:00 ET source window is complete. Prior close, RTH open, and counter-gap flow are known before the signal; the engine handles next-bar execution.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to NQ tick size, and varied only through sl.params.stop_pct.
    target_exit_rationale: The target is a predeclared fraction of the known gap back toward the prior RTH close, varied only through tp.params.fill_fraction.
    profitability_rationale: A real NQ gap-absorption fade should survive neighboring gap, flow, stop, and fill-fraction settings after costs, random-entry monkey controls, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: Counter-gap flow may be transient, larger gaps may continue despite absorption, partial gap-fill targets may be cost-sensitive, and returns may concentrate in event regimes.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    decision: PASS
    method: Entry-condition count only; no PnL, stop, target, WFA, monkey, Monte Carlo, prop simulation, or holdout result was inspected.
    note: morning signed counter-gap broad/strict corners range about 51-107 signals/year for gap thresholds 20-60
