timeframe: 1m
research_metadata:
  academic_source: Bollerslev, Tauchen, and Zhou (2009); Cboe VIX history; FRED VIXCLS
    documentation
  edge_thesis: Lagged implied-minus-realized variance-risk-premium can proxy compensation
    for market volatility risk and may condition same-day NQ intraday returns.
  mechanic: At 10:00 ET, enter short NQ when the lagged variance-risk-premium rank
    is in the low tail; flatten by 15:55.
  timeframe_rationale: The 10:00 decision tests whether low compensation-for-variance-risk
    states underperform after the open.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_variance_risk_premium_intraday_density_audit_20260630.md
    selected_grid_min_signals_per_year: 62.764187
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 10:00 ET, enter short NQ when prior-session VRP ranks
      in the lower tail. This tests whether low compensation for variance risk predicts
      weak or negative same-day NQ returns.
    entry_logic_rationale: The signal reads only shifted prior-session VIX and NQ
      realized variance features. The completed 09:59 bar is the decision clock, and
      any fill occurs no earlier than the next bar open.
    stop_loss_rationale: A percent-from-entry stop is used because VRP is a broad
      volatility-compensation state, not a discrete intraday level.
    target_exit_rationale: A fixed-R target plus strict 15:55 ET flatten tests same-day
      monetization without discretionary exits or overnight exposure.
    profitability_rationale: The variant can only work if low lagged VRP predicts
      enough NQ weakness to survive realistic costs and fill ordering.
    known_failure_modes: The ES source family failed; this NQ transfer can fail if
      low VRP is not bearish, if VRP mostly overlaps with broad realized-volatility
      state, or if the edge requires a longer holding period.
    pre_test_decision: approve_for_testing
