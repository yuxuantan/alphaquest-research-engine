research_metadata:
  academic_source: Bollerslev, Tauchen, and Zhou (2009); Cboe VIX history; FRED VIXCLS
    documentation
  edge_thesis: Lagged implied-minus-realized variance-risk-premium can proxy compensation
    for market volatility risk and may condition same-day NQ intraday returns.
  mechanic: At 13:30 ET, enter long NQ when the lagged 5-session VRP change rank is
    high; flatten by 15:55.
  timeframe_rationale: The afternoon decision tests whether a recent rise in compensation-for-variance-risk
    carries into late RTH trading.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_variance_risk_premium_intraday_density_audit_20260630.md
    selected_grid_min_signals_per_year: 61.080112
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 13:30 ET, enter long NQ when the prior five-session
      VRP change ranks in the upper tail. This tests a rising compensation state
      without using current-session VIX or realized variance.
    entry_logic_rationale: The signal reads only shifted prior-session VRP-change
      features. The completed 13:29 bar is the decision clock, and any fill occurs
      no earlier than the next bar open.
    stop_loss_rationale: A percent-from-entry stop is used because VRP change is
      a broad volatility-compensation state, not a discrete intraday level.
    target_exit_rationale: A fixed-R target plus strict 15:55 ET flatten tests same-day
      monetization without discretionary exits or overnight exposure.
    profitability_rationale: The variant can only work if rising lagged VRP predicts
      enough late-session NQ premium to survive costs, slippage, and same-bar pessimism.
    known_failure_modes: The ES source family failed; this NQ transfer can fail if
      rising VRP is risk-off continuation, if the afternoon entry is too late, or
      if results concentrate in a small number of volatility shocks.
    pre_test_decision: approve_for_testing
