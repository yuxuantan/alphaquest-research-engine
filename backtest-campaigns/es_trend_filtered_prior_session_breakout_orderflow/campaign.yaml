campaign_id: es_trend_filtered_prior_session_breakout_orderflow
title: ES Trend-Filtered Prior Session Breakout With Aggregate Orderflow
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: trend_filtered_prior_session_breakout_orderflow
hypothesis: ES prior-RTH high/low acceptance should have better continuation odds when the completed hold
  bar has same-direction aggregate orderflow and the current session has already formed deterministic
  higher-high/higher-low or lower-high/lower-low structure.
rationale: This is a constrained composite campaign. The primary edge is prior-session support/resistance
  acceptance/continuation. The secondary filters are fixed completed-bar market-structure trend alignment
  and same-bar aggregate orderflow confirmation. A stricter first-break/retest formulation was rejected
  before PnL because every variant fell below the 50 signals/year density floor; the retained hold formulation
  preserves the edge while clearing pre-PnL density.
sources:
- title: Simple Technical Trading Rules and the Stochastic Properties of Stock Returns
  authors: William Brock, Josef Lakonishok, Blake LeBaron
  year: 1992
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1992.tb04681.x
  link: https://onlinelibrary.wiley.com/doi/10.1111/j.1540-6261.1992.tb04681.x
  relevance: Supports testing trading-range and support/resistance breakout rules as mechanical price-action
    signals.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical
    Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, Jiang Wang
  year: 2000
  venue: Journal of Finance
  doi: 10.1111/0022-1082.00265
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/0022-1082.00265
  relevance: Formalizes systematic chart-pattern detection; this campaign uses deterministic higher-high/higher-low
    and lower-high/lower-low trend states rather than discretionary chart reading.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon price-pressure proxy; this campaign uses
    completed Sierra aggregate trade-side flow, not quote-depth OFI.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2011.11.003
  link: https://ideas.repec.org/a/eee/jfinec/v104y2012i2p228-250.html
  relevance: Documents persistence across liquid futures; this campaign uses only intraday completed-bar
    trend alignment as a filter, not the monthly TSMOM anomaly itself.
data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- 5-minute strategy bars aggregated from local 1-minute RTH Sierra bars
- completed prior RTH high/low and fresh-level flags from pdh_pdl_sweep features
- completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume, and
  large20_volume
lookahead_risks:
- Prior RTH high and low are known only after the prior RTH session is complete.
- Trend alignment uses only completed bars already observed in the current session before the signal is
  emitted.
- Breakout/retest confirmation and orderflow confirmation use only the completed signal bar.
- Signals generated from a completed bar are filled no earlier than the next bar open by the engine.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, future trend
  state, or future daily range is used.
failure_modes:
- Trend filtering may still reduce effective trade count after fills below the required 50 trades/year
  even though pre-PnL signal density passed.
- Same-direction aggregate flow may still represent exhaustion into liquidity rather than informed continuation.
- Higher-high/higher-low filters may select mature trends that are ready to reverse.
- The effect may remain concentrated in crisis trend days or one market side.
- Bar-level signed volume may be too noisy to distinguish stop cascades from informed flow.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_prior_session_breakout_orderflow_confirmation
  - es_prior_session_level_breakout_continuation
  - es_trend_aligned_orderflow_continuation
  - es_prior_day_stop_run_reclaim
  - es_prior_level_delta_dislocation
  - es_opening_range_trend_orderflow_breakout
  - es_range_compression_orderflow_breakout
  conclusion: Eligible as a constrained composite campaign because neither prior-session breakout/orderflow
    nor generic trend-aligned orderflow alone can trigger. A signal requires prior RTH level acceptance/retest,
    deterministic completed-bar market-structure trend alignment, and same-bar aggregate orderflow confirmation,
    all declared before PnL testing.
