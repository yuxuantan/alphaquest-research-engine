        new:
        - 0.0
        - 1.0
      wfa.parameters.entry.params.min_session_return_bps:
        old:
        - 0.0
        - 1.0
        - 2.0
        new:
        - 0.0
        - 1.0
    unchanged:
    - entry module
    - setup mode
    - signal time
    - flow column
    - stop module
    - stop grid
    - target module
    - target_r_multiple grid
    - data window
    - timeframe
