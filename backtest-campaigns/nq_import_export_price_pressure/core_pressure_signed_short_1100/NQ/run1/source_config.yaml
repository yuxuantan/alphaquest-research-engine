research_metadata:
  academic_source: Chen, Roll, and Ross (1986); Fama and Schwert (1977); Amiti, Itskhoki, and Weinstein (2024);
    BLS Import and Export Price Indexes; Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Lagged import/export price-index pressure should only be traded when completed NQ price action and
    aggregate orderflow confirm the macro direction.
  mechanic: Short NQ at 11:00 ET when core-vs-headline import-price momentum is at or above its 45th percentile
    and NQ has a completed negative session return with non-positive cumulative signed flow.
  timeframe_rationale: 11:00 ET allows enough post-open price discovery for weakness to confirm but avoids waiting
    until any pressure has already exhausted.
  pre_pnl_density: 'post-reform audit PASS: min full-history 57.83/year; min latest-252 67.00/year; artifact research_artifacts/nq_import_export_price_pressure_density_audit_20260623.md'
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the import/export price-pressure edge by using the lagged monthly
      core import-price pressure state as the regime filter, then requiring completed NQ price movement and cumulative
      signed_volume confirmation before a 11:00:00 next-bar entry.
    entry_logic_rationale: The monthly price-index feature is frozen by conservative availability date before the
      session. The intraday trigger uses only the completed 1-minute bar immediately before the declared entry time
      plus cumulative same-session orderflow up to that bar; the engine enters at the next bar open or later.
    stop_loss_rationale: 'Parameter-space rescue after original limited-core failure: entry mechanics, macro thresholds,
      signal time, flow column, target module/grid, data, costs, fills, sessions, and validation gates are unchanged.
      Only the percent-from-entry stop grid is widened from [0.0015, 0.0025, 0.004] to [0.004, 0.006, 0.008] to
      test whether the same predeclared signal needs more NQ noise room.'
    target_exit_rationale: Target module and target_r_multiple grid are unchanged from the original run. No target_r_multiple
      below 1.0R is allowed, and no already-valid target is widened as a TP rescue.
    profitability_rationale: Core import-price pressure is a broad input-cost/inflation signal. If NQ is already
      weak and signed aggregate flow is not supporting buyers, equity-index continuation lower is economically plausible.
    known_failure_modes: The macro state may be stale, the orderflow condition may reduce to generic intraday continuation,
      the inflation-equity relationship can flip by regime, trades may concentrate in 2021-2022, and after-cost
      edge may disappear under slippage and commissions.
    pre_test_decision: approve_for_testing
  source_es_rescue_attempt:
    id: parameter_space_rescue_1
    created_at: '2026-06-20'
    source_config: campaigns/es_import_export_price_pressure/rescue_attempts/parameter_space_rescue_1/core_pressure_signed_short_1100/config.yaml
    source_run: rescue1
    scope: per_failed_variant
    allowed_change_scope: stop_distance_parameter_space_only
    reason: All original variants failed limited core. Several top non-passing combinations used the widest original
      stop, so the only generic, non-mechanics rescue is a wider stop-distance grid.
    changed:
      strategy.entry.params.stop_pct:
        old: 0.0025
        new: 0.006
      strategy.sl.params.stop_pct:
        old: 0.0025
        new: 0.006
      core_grid.parameters.sl.params.stop_pct:
        old:
        - 0.0015
        - 0.0025
        - 0.004
        new:
        - 0.004
        - 0.006
        - 0.008
      wfa.parameters.sl.params.stop_pct:
        old:
        - 0.0015
        - 0.0025
        - 0.004
        new:
        - 0.004
        - 0.006
        - 0.008
    unchanged:
    - entry module
    - setup mode
    - macro rank threshold
    - entry time
    - flow column
    - min_session_return_bps grid
    - target module
    - target_r_multiple grid
    - data window
    - timeframe
    - costs
    - session rules
    - prop rules
    - stage criteria
  source_es_campaign: es_import_export_price_pressure
  source_es_config: campaigns/es_import_export_price_pressure/rescue_attempts/parameter_space_rescue_1/core_pressure_signed_short_1100/config.yaml
  source_es_run_id: rescue1
  nq_port_note: Pre-PnL NQ port of the existing ES import/export price-pressure rescue configs. Only symbol/data,
    NQ feature CSV path, contract economics, end date, and wording changed before NQ PnL.
  post_nq_rescue_authorized: false
  pre_pnl_density_reformulation:
    created_at: '2026-06-23'
    reason: Initial NQ pre-PnL density audit failed before any NQ PnL because the ES rescue port was too sparse
      for several NQ large-flow rows.
    initial_rejected_artifact: research_artifacts/nq_import_export_price_pressure_initial_density_rejected_20260623.md
    allowed_scope: density-only pre-PnL NQ port adjustment inside the same import/export price-pressure mechanics
    changed:
