test_run_id: run2
research_metadata:
  academic_source: de Roon, Nijman, and Veld (2000); CFTC Traders in Financial Futures
  edge_thesis: Broad positive SPX TFF open-interest pressure may mark equity-index
    risk-transfer demand that earns a same-day long premium after the CFTC feature
    is available.
  mechanic: At the completed 11:00 ET 5-minute bar, enter long when shifted SPX TFF
    open-interest change is above a broad positive threshold; flatten at 15:55 ET
    unless stop or target is hit.
  timeframe_rationale: 5-minute bars align the weekly positioning signal to deterministic
    same-session RTH execution, next-bar-open fills, and pessimistic OHLC stop/target
    handling.
strategy:
  entry:
    module: cftc_tff_hedging_pressure
    params:
      feature_file: data/external/cftc_tff_hedging_pressure_features.csv
      feature_name: SPX_open_interest_chg13
      operator: '>='
      threshold: 47442.0
      direction: long
      entry_time: '11:00:00'
      bar_interval_minutes: 5
      max_trades_per_day: 1
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
core_grid:
  data_subset:
    start_date: '2013-04-15'
    end_date: '2026-06-09'
