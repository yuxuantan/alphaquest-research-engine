research_metadata:
  academic_source: Connors and Alvarez (2009); StockCharts ChartSchool RSI(2); WH
    SelfInvest (2010); Ready (2002)
  edge_thesis: Intraday NQ RSI2 overbought extremes above running VWAP may mark short-horizon
    bounces inside a downtrend that mean-revert before the RTH flatten.
  mechanic: Use completed 5-minute bars. Short when RSI2 is overbought while price
    remains below the moving-average trend filter and above cumulative VWAP by the
    configured tick extension.
  timeframe_rationale: Five-minute bars test the fast oscillator edge while still
    requiring a completed signal bar and next-bar execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: Use completed 5-minute bars. Short when RSI2 is overbought
      while price remains below the moving-average trend filter and above cumulative
      VWAP by the configured tick extension.
    entry_logic_rationale: The entry module updates RSI2 and MA/VWAP state only after
      each completed bar, records the signal timestamp at the completed bar close,
      and depends on the engine for next-bar-open execution.
    stop_loss_rationale: Percent-from-entry stops avoid discretionary level fitting
      and reuse the ES Connors grid before NQ PnL inspection. Same-bar stop/target
      ambiguity remains pessimistic in the engine.
    target_exit_rationale: Fixed-R targets test whether the short-horizon RSI2 mean-reversion
      impulse is large enough after costs without discretionary exits or overnight
      exposure.
    profitability_rationale: If short-horizon oscillator extremes reflect temporary
      liquidity pressure rather than trend continuation, neighboring RSI/MA or RSI/VWAP
      parameter settings should remain profitable after NQ commissions and slippage.
    known_failure_modes: NQ trend days may keep RSI2 extreme, volatility may make
      percent stops too tight or too wide, and any positive branch may be narrow,
      regime-specific, or concentrated in a small number of days.
    pre_test_decision: approve_for_testing
  nq_transfer_note: Direct ES Connors transfer authored before NQ PnL. Variant mechanics
    and parameter grids are frozen after duplicate-edge and density checks.
