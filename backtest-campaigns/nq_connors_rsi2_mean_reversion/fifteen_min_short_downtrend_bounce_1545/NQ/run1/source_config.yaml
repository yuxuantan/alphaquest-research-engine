research_metadata:
  academic_source: Connors and Alvarez (2009); StockCharts ChartSchool RSI(2); WH SelfInvest (2010); Ready
    (2002)
  edge_thesis: RSI2 overbought bounces on completed 15-minute NQ bars can mark temporary buying pressure
    while the intraday MA trend remains negative.
  mechanic: Use completed 15-minute bars. Short when RSI2 is overbought while price remains below the
    configured moving-average trend filter.
  timeframe_rationale: Fifteen-minute bars reduce fast-bar noise and test whether overbought bounces mean-revert
    in a downtrend before flatten.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: Use completed 15-minute bars. Short when RSI2 is overbought while price remains
      below the configured moving-average trend filter.
    entry_logic_rationale: The entry module updates RSI2 and MA/VWAP state only after each completed bar,
      records the signal timestamp at the completed bar close, and depends on the engine for next-bar-open
      execution.
    stop_loss_rationale: Percent-from-entry stops avoid discretionary level fitting and reuse the ES Connors
      grid before NQ PnL inspection. Same-bar stop/target ambiguity remains pessimistic in the engine.
    target_exit_rationale: Fixed-R targets test whether the short-horizon RSI2 mean-reversion impulse
      is large enough after costs without discretionary exits or overnight exposure.
    profitability_rationale: If short-horizon oscillator extremes reflect temporary liquidity pressure
      rather than trend continuation, neighboring RSI/MA or RSI/VWAP parameter settings should remain
      profitable after NQ commissions and slippage.
    known_failure_modes: NQ trend days may keep RSI2 extreme, volatility may make percent stops too tight
      or too wide, and any positive branch may be narrow, regime-specific, or concentrated in a small
      number of days.
    pre_test_decision: approve_for_testing
  nq_transfer_note: Direct ES Connors transfer authored before NQ PnL. Variant mechanics and parameter
    grids are frozen after duplicate-edge and density checks.
