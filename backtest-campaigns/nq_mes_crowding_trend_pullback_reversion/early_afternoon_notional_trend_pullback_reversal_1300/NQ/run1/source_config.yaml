timeframe: 1m
research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); Moskowitz,
    Ooi, and Pedersen (2012)
  edge_thesis: MES smaller-contract participation may proxy broad equity-index micro crowding during completed
    NQ trend pullbacks; this is a cross-index proxy and must survive staged NQ validation.
  mechanic: At 13:00:00 ET, take a two-sided NQ trend-pullback fade when MES notional participation is
    elevated over the completed 60-minute pullback and the prior completed 120-minute NQ trend points
    opposite the pullback. Entry is next bar open.
  timeframe_rationale: One-minute bars preserve completed NQ/MES participation ranks, fixed signal timing,
    next-bar-open execution, and stop/target ordering on the native NQ bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by requiring completed-bar MES micro-participation
      crowding during a completed NQ pullback that moves against a prior completed NQ trend.
    entry_logic_rationale: The signal uses only completed NQ bars and same-clock prior MES rank history.
      The prior trend window ends before the pullback/crowding window starts; entry is no earlier than
      next bar open.
    stop_loss_rationale: A fixed percent-from-entry stop is declared before testing, rounded to the NQ
      tick, and uses pessimistic same-bar stop/target ordering.
    target_exit_rationale: A fixed-R target with reward:risk >= 1.0 monetizes expected snapback without
      future orderflow, VWAP, or discretionary exits.
    profitability_rationale: The ES source family reached deeper staged gates than most available ES campaigns;
      this NQ port is only convincing if the MES proxy survives full NQ validation.
    known_failure_modes: MES crowding may be ES-specific, NQ may need native MNQ crowding, and removing
      the volatility veto may increase path risk.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_mes_crowding_trend_pullback_reversion_density_audit_20260622.md
    entry_combo_count: 9
    strict_corner_min_signals_per_year: 57.8711
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_trend_filtered_mes_participation_crowding
  nq_port_note: NQ is the execution leg; MES is a cross-index micro-participation proxy because no native
    MNQ participation cache is available locally.
