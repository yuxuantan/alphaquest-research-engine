timeframe: 1m
research_metadata:
  academic_source: Baker and Wurgler (2006); Brown and Cliff (2005); NAAIM Exposure
    Index
  edge_thesis: 'Weekly active-manager exposure sentiment may support NQ contrarian
    intraday pressure. At 11:30 ET, trade NQ contrarian to the latest available weekly
    change in NAAIM exposure: rising exposure shorts, falling exposure buys.'
  mechanic: 'At 11:30 ET, trade NQ contrarian to the latest available weekly change
    in NAAIM exposure: rising exposure shorts, falling exposure buys.'
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open
    NQ execution while weekly NAAIM exposure state is lagged by two business days.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_naaim_exposure_sentiment_density_audit_20260630.md
    density_basis: 806 weekly NAAIM signal sessions mapped to first eligible NQ RTH
      session
    selected_grid_min_signals: 806
    selected_grid_min_signals_per_year: 52.206331
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: 'At 11:30 ET, trade NQ contrarian to the latest available
      weekly change in NAAIM exposure: rising exposure shorts, falling exposure buys.'
    entry_logic_rationale: The signal reads only the latest NAAIM observation mapped
      to the first NQ RTH session at least two business days after the survey observation
      date plus the completed 1-minute bar immediately before entry. Same-week unreleased
      survey data, current-session future bars, and post-entry returns are unavailable
      and unused.
    stop_loss_rationale: A percent-from-entry stop is used because NAAIM exposure
      is a weekly sentiment and positioning state, not a discrete intraday price level
      with a natural invalidation tick.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten tests same-day NQ
      expression of weekly active-manager sentiment while forbidding overnight exposure
      and leaving prop-rule flatten enforcement explicit.
    profitability_rationale: The variant can only work if lagged NAAIM active-manager
      exposure predicts enough same-day NQ contrarian pressure to overcome commission,
      one tick of slippage, and pessimistic same-bar stop-target ordering.
    known_failure_modes: The ES source family failed original and rescue grids with
      zero profitable combinations, so this NQ transfer is weak-prior. It can fail
      if active-manager exposure is coincident with trend, if weekly cadence is too
      sparse, if survey revisions create manual-review risk, or if the effect needs
      multi-day holding periods.
    pre_test_decision: approve_for_testing
