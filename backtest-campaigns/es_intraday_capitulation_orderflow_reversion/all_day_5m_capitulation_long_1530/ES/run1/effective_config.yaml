research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Llorente, Michaely, Saar,
    and Wang (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Downside ES capitulation bars with completed aggregate selling pressure
    may mean-revert after temporary liquidity demand is absorbed.
  mechanic: Long-only 5-minute capitulation from 09:30 to 15:30 ET using close-near-low,
    below-VWAP, session-local RSI, elevated volume, and sell-imbalance filters.
  timeframe_rationale: A 5-minute bar is short enough to produce sufficient trades
    but long enough to require a completed pressure window before entry.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the capitulation-reversal edge
      by requiring a completed 5-minute downside bar that closes near its low, below
      session VWAP, with session-local oversold RSI, elevated volume versus prior
      completed 5-minute bars, and completed aggregate selling imbalance. The trade
      is long-only because the thesis is liquidity-demand exhaustion after forced
      selling, not symmetric breakout fading.

      '
    entry_logic_rationale: 'The signal is evaluated only after the 5-minute bar is
      complete. VWAP, RSI, average volume, and signed imbalance are all known at that
      bar close, and the engine can only enter on the next 5-minute bar open. The
      09:30-15:30 window keeps the setup intraday and leaves time before the 15:55
      flatten.

      '
    stop_loss_rationale: 'The stop is beyond the completed capitulation bar low using
      a predeclared tick offset. A break below that low means the selling pressure
      was not exhausted, so the trade premise is invalidated without using future
      price information.

      '
    target_exit_rationale: 'The target is a fixed multiple of the realized distance
      from next-bar entry to the capitulation-low stop. This tests whether the rebound
      compensates for the observed invalidation risk without using final VWAP, final
      range, or discretionary resistance.

      '
    profitability_rationale: 'If sellers demand immediate liquidity and push ES below
      VWAP into a close-near-low bar, liquidity providers may require a discount that
      later reverses once the pressure is absorbed. The pre-PnL density audit shows
      the strict grid corner produced 143.09 signals/year full-history and 157.28/year
      in the seeded limited-core window.

      '
    known_failure_modes: 'The selloff can be information-driven and continue, aggregate
      sell imbalance can be adverse selection rather than exhaustion, stops can be
      too tight during volatility spikes, and profits may cluster in crisis rebounds.

      '
    pre_test_decision: approve_for_testing
