campaign_id: nq_spx_0dte_trend_aligned_pressure
variant_id: all_0dte_trend_continuation_1330
strategy_name: nq_spx_0dte_trend_aligned_pressure
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Cboe SPX Weeklys launch history; Brogaard, Han, and Won (SSRN 4426358);
    Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: SPX 0DTE sessions may create broad-index pressure; NQ is traded only
    when completed NQ short and medium intraday trend structure agree.
  mechanic: 'Pre-PnL NQ port of the ES trend-aligned 0DTE mechanic. Rescue attempt
    1 keeps the 13:30 all-0DTE trend-continuation mechanic unchanged and removnq the
    losing tight-stop neighborhood while adding adjacent middle stops. Original mechanic
    retained: Trade all known SPX 0DTE sessions from 2016 onward, excluding standard
    monthly OPEX, at 13:30 ET only when completed 30-minute and 120-minute NQ high/low
    trend statnq align and the open-to-signal move is already in that same direction
    by the declared tick threshold.'
  timeframe_rationale: 1-minute bars preserve completed-bar signal timing and next-bar-open
    execution while allowing same-day flattening.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: The primary SPX 0DTE calendar-pressure edge is expressed
      through ex-ante same-day-expiration sessions, while completed NQ 30-minute and
      120-minute trend states set direction.
    entry_logic_rationale: The signal waits for the configured NQ one-minute bar to
      close, uses only completed NQ history plus the ex-ante SPX 0DTE calendar, and
      relies on the engine for next-bar-open entry.
    stop_loss_rationale: The fixed percent-from-entry stop caps failed trend alignment
      without using future highs, lows, VWAP, option-flow, or realized post-entry
      path information.
    target_exit_rationale: The fixed-R target is declared before NQ testing and stays
      linked to initial stop distance, avoiding future-derived exit levels.
    profitability_rationale: If SPX 0DTE pressure transmits to higher-beta NQ, trend-aligned
      sessions should show after-cost performance that survives neighboring stop/target
      settings and full staged validation.
    known_failure_modes: Reject if 0DTE direction is ambiguous for NQ, if completed
      trend alignment selects exhausted moves, if costs dominate, or if results concentrate
      in a few event sessions.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    attempt: 1
    scope: parameter_space_only
    mechanic_changed: false
    note: Rescue attempt 1 keeps the 13:30 all-0DTE trend-continuation mechanic unchanged
      and removes the losing tight-stop neighborhood while adding adjacent middle
      stops.
  source_es_campaign: es_spx_0dte_trend_aligned_pressure
  source_es_config: campaigns/es_spx_0dte_trend_aligned_pressure/rescue_attempts/parameter_space_rescue_1/all_0dte_trend_continuation_1330/config.yaml
  nq_port_note: Only data source, symbol, event-calendar path, contract economics,
    and NQ wording were changed before NQ PnL.
