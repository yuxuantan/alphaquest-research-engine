research_metadata:
  academic_source: Fama and French (2015); Kenneth French Data Library daily five factors
  edge_thesis: Lagged robust-minus-weak profitability factor strength may identify quality-led equity risk appetite that supports Nasdaq-100 futures despite the index's growth concentration.
  mechanic: At 11:30 ET, buy NQ when the 45-calendar-day-lagged 63-day RMW rank is in the upper tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: One-minute bars provide deterministic completed-bar timing and next-bar-open execution while the Fama-French factor state is daily and conservatively lagged.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the profitability-factor thesis by buying NQ only when lagged RMW quality strength is in its upper tail, testing whether quality-led risk appetite carries into Nasdaq futures.
    entry_logic_rationale: The RMW state is computed before the futures session with a 45-calendar-day lag, and the 11:30 ET signal uses only the completed 11:29 ET NQ bar before any possible entry.
    stop_loss_rationale: The percent stop is declared before any PnL inspection, rounded to the NQ tick by the engine, and evaluated under the existing pessimistic same-bar stop-target ordering.
    target_exit_rationale: The fixed-R target and 15:55 ET flatten are declared before testing and do not depend on final VWAP, final session range, future factor values, or discretionary exits.
    profitability_rationale: If high-quality factor leadership is a tradable risk-appetite state, the long NQ expression should remain profitable across neighboring thresholds and stop-target combinations.
    known_failure_modes: RMW strength may be defensive rather than risk-on, may not map to Nasdaq futures, may be stale because of the publication lag, or may pass only in isolated quality-rotation periods.
    pre_test_decision: approve_for_testing
strategy:
  entry:
    module: fama_french_style_factor_state
    params:
      setup_mode: rmw_quality_strength_long
      feature_csv: data/external/nq_fama_french_style_features_20110103_20260612.csv
      factor_name: RMW
      value_column: rmw_63d
      rank_column: rmw_63d_rank_252
      factor_rank_threshold: 0.30
      entry_time: '11:30:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '15:55:00'
