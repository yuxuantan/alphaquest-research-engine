research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets
    (2024); Moskowitz, Ooi, and Pedersen (2012); Moreira and Muir (2017); Fleming,
    Kirby, and Ostdiek (2001)
  edge_thesis: MES smaller-contract participation may proxy broad equity-index micro
    crowding; if NQ completes a trend-pullback against a prior NQ trend while lagged
    NQ volatility is not extreme, the crowded pressure may mean-revert on the NQ execution
    leg.
  mechanic: 'At 10:30 ET, take a two-sided NQ trend-pullback fade only when MES trade
    participation is elevated over the completed 15-minute pullback, the prior completed
    30-minute NQ trend points opposite the pullback, and the lagged NQ volatility
    filter passes: vol5_over_vol20 <= 1.25. Entry is next bar open.'
  timeframe_rationale: One-minute bars preserve completed NQ/MES participation ranks,
    exact 10:30 ET signal timing, next-bar-open execution, and stop/target ordering
    on the native NQ bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by requiring completed-bar
      MES micro-participation crowding during a completed NQ pullback, plus an ex-ante
      lagged NQ volatility veto.
    entry_logic_rationale: The signal is evaluated on the completed 10:29-10:30 ET
      bar. MES trade-share rank and NQ 15-minute pullback return are completed-bar
      features; the prior 30-minute NQ trend window ends before the pullback window
      starts; the volatility feature is shifted one prior session. Entry is therefore
      next bar open without current-session volatility lookahead.
    stop_loss_rationale: A fixed percent-from-entry stop is declared before testing,
      rounded to the NQ tick, and tested with pessimistic same-bar stop/target ordering.
    target_exit_rationale: A fixed-R target with reward:risk >= 1.0 monetizes expected
      snapback without using future orderflow, VWAP, option state, or discretionary
      levels. Any unresolved trade is force-flattened at 12:00 ET.
    profitability_rationale: The ES source edge reached deeper robustness gates than
      most available ES campaigns; this NQ port is only convincing if the cross-index
      MES proxy survives full NQ staged validation.
    known_failure_modes: MES crowding may be ES-specific, NQ may require native MNQ
      crowding, lagged volatility gates may not predict same-day NQ path risk, and
      the fixed 10:30 reversal may remain too weak after costs.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_mes_crowding_vol_filtered_trend_pullback_reversion_density_audit_20260622.md
    entry_combo_count: 9
    strict_corner_min_signals_per_year: 50.5492
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_extreme_vol_filtered_mes_trend_pullback_crowding
  nq_port_note: NQ is the execution leg. MES is used only as a cross-index micro-participation
    proxy because a native MNQ participation cache is not available locally.
