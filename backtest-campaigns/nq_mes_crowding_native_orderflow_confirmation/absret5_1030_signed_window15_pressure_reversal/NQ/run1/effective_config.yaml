campaign_id: nq_mes_crowding_native_orderflow_confirmation
variant_id: absret5_1030_signed_window15_pressure_reversal
test_run_id: run1
strategy_name: nq_mes_crowding_orderflow_window_confirmation
symbol: NQ
dataset_id: nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets
    (2024); Moskowitz, Ooi, and Pedersen (2012); Moreira and Muir (2017); Fleming,
    Kirby, and Ostdiek (2001); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: MES micro-participation crowding during an NQ trend-pullback is more
    informative for NQ when native completed-window NQ orderflow confirms pressure
    in the pullback direction before the fade entry.
  mechanic: At 10:30 ET, fade a completed NQ 15-minute trend-pullback when MES trade-share
    crowding is elevated, prior NQ trend is opposite the pullback, lagged absret5
    volatility is not extreme, and completed native NQ 15-minute signed flow confirms
    pullback pressure.
  timeframe_rationale: One-minute bars preserve completed NQ/MES crowding ranks, exact
    10:30 ET signal timing, completed native NQ orderflow-window confirmation, next-bar
    execution, and deterministic stop/target ordering.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the edge by requiring the existing
      MES-crowding volatility-filtered NQ pullback setup plus native completed-window
      NQ signed-flow pressure before the reversal entry.
    entry_logic_rationale: The signal is evaluated on the completed 10:29-10:30 ET
      bar. MES ranks, NQ pullback, NQ orderflow window, and volatility gate are all
      known at signal close; the prior trend window ends before the pullback window
      starts.
    stop_loss_rationale: The fixed percent-from-entry stop is declared before testing,
      rounded to the NQ tick, and varied only through the stop grid.
    target_exit_rationale: The fixed-R target is declared before testing and unresolved
      positions flatten at 12:00 ET.
    profitability_rationale: The prior NQ MES-crowding port had strong limited-core
      aggregates but failed monkey; requiring native NQ signed-flow pressure is intended
      to reduce random-timing sensitivity without post-result parameter pruning.
    known_failure_modes: MES may not proxy NQ/MNQ crowding, native NQ flow may represent
      trend persistence rather than exhaustion, and the 10:30 reversal may still fail
      monkey or WFA.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_mes_crowding_native_orderflow_window_confirmation_density_audit_20260623.md
    extra_artifact: research_artifacts/nq_mes_crowding_native_orderflow_window_confirmation_extra_density_20260623.csv
    fixed_min_abs_return_ticks: 16
    grid_min_median_max_signals_per_year: 40.55/50.13/58.86
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_extreme_vol_filtered_mes_trend_pullback_crowding
  source_nq_failed_campaign: nq_mes_crowding_vol_filtered_trend_pullback_reversion
