research_metadata:
  academic_source: Gatev, Goetzmann, and Rouwenhorst (2006); Huth and Abergel (2014);
    Cont, Kukanov, and Stoikov (2014); Schmidt, Cestonaro, and Bender (2024)
  edge_thesis: Fade a slower 60-minute ES/NQ divergence in the afternoon only when
    ES aggregate signed flow is already counter to the extended ES price leg.
  mechanic: From 13:00:00 through 14:30:00 ET, take the first completed one-minute
    bar per session where ES/NQ relative-value divergence meets the configured spread
    threshold and ES signed-flow absorption over the same completed lookback is counter
    to the ES price leg. Entry is next bar open.
  timeframe_rationale: One-minute bars preserve completed ES/NQ rolling return spreads
    and rolling ES signed-flow imbalance while allowing exact next-bar execution after
    the decision minute closes.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses a cross-index relative-value reversion
      edge plus aggregate orderflow absorption. ES must be the dislocated leg versus
      NQ, and ES signed flow must be counter to that ES price leg, so price divergence
      alone cannot trigger.
    entry_logic_rationale: From 13:00:00 through 14:30:00 ET, take the first completed
      one-minute bar per session where ES/NQ relative-value divergence meets the configured
      spread threshold and ES signed-flow absorption over the same completed lookback
      is counter to the ES price leg. Entry is next bar open. The rolling return and
      signed-imbalance columns are completed at the signal bar close; max one trade
      per day prevents repeated firing inside the window.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and rounded
      to the ES tick. It rejects the convergence thesis if the ES leg continues away
      from NQ after next-bar execution rather than mean-reverting.
    target_exit_rationale: The fixed-R target is independent of future ES/NQ bars,
      future orderflow, VWAP, or discretionary spread levels. Any unresolved trade
      is flattened at the predeclared intraday cutoff.
    profitability_rationale: The setup should be profitable only if ES/NQ divergences
      are temporary and if counter-price ES signed flow identifies absorption before
      convergence. The windowed formulation was selected before PnL because exact-minute
      signals were too sparse for the 50 trades/year methodology floor.
    known_failure_modes: The ES/NQ divergence may be information-driven, signed flow
      can be noisy or late, trading only ES may not monetize true pair convergence,
      and profits can concentrate in a narrow regime or one side.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: min_spread_bps=6 and min_absorption_imbalance=0.03
    artifact: research_artifacts/es_nq_relative_value_orderflow_absorption_reversion_rescue_attempt_1_density_audit_20260618.md
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter_space_and_fixed_parameters_only
    reason: Original had benchmark-passing pockets around spread 4-6, absorption 0.03,
      wide stop, and larger target; rescue tests the adjacent wide-stop/large-target
      neighborhood without changing the windowed absorption mechanic.
    mechanics_changed: false
    modules_changed: false
