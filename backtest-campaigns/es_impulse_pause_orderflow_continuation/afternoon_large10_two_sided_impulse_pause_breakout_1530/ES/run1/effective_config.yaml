research_metadata:
  academic_source: Llorente et al. (2002); Cont, Kukanov, and Stoikov (2014); Bouchaud,
    Farmer, and Lillo (2009); Lo, Mamaysky, and Wang (2000)
  edge_thesis: Completed impulse-pause-breakout sequences with aligned aggregate orderflow
    may continue intraday if order splitting or liquidity-taking pressure persists
    after the breakout close.
  mechanic: From 12:30:00 through 15:30:00 ET, wait for 5 completed 5-minute bars
    to move at least the declared impulse threshold, then require 2 completed pause
    bars whose retrace is no more than 60% of that impulse. A trade is signaled only
    when the next completed bar closes beyond the pause boundary with same-direction
    large10 imbalance; direction is long and short.
  timeframe_rationale: Five-minute bars reduce one-minute noise but still keep the
    completed breakout close close enough to the pressure event for realistic next-bar
    execution and enough annual opportunities.
  pre_pnl_density: 'pass: strict entry-grid corners >= 120.60/year on full history
    and >= 67.56/year on limited-core window 2011-02-22 to 2012-09-06; artifact research_artifacts/es_impulse_pause_orderflow_continuation_density_audit_20260620.md'
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses impulse-pause continuation because
      it separates the setup into three completed phases: directional impulse, shallow
      pause, and breakout close. From 12:30:00 through 15:30:00 ET, wait for 5 completed
      5-minute bars to move at least the declared impulse threshold, then require
      2 completed pause bars whose retrace is no more than 60% of that impulse. A
      trade is signaled only when the next completed bar closes beyond the pause boundary
      with same-direction large10 imbalance; direction is long and short.'
    entry_logic_rationale: The entry decision uses only completed 5-minute RTH bars.
      The impulse and pause are prior completed bars; the breakout and large10 confirmation
      are known only at the signal bar close, so execution is no earlier than the
      next bar open. The afternoon version targets renewed directional participation
      after the lunch lull and demands larger-trade flow on the breakout to reduce
      false late-session pushes.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, independent
      of future session levels, and invalidates the continuation premise if the post-breakout
      move cannot tolerate ordinary ES noise. The stop is the only stop tunable.
    target_exit_rationale: The fixed-R target uses the initial stop distance and starts
      at exactly 1.0R, satisfying the hard rule that no target_r_multiple below 1.0
      may be tested. It avoids fitting exits to future highs, lows, VWAP, or orderflow.
    profitability_rationale: The variant should be profitable only if a shallow pause
      after a real impulse marks absorption of counterflow and the breakout close
      with aligned aggregate flow captures unfinished order splitting or liquidity-taking
      pressure after costs.
    known_failure_modes: The breakout bar can be terminal exhaustion, the pause can
      be random noise rather than absorption, aggregate orderflow may lag price, and
      the edge can disappear under one-tick worse slippage, delayed entry, or low-volatility
      regimes.
    pre_test_decision: approve_for_testing
