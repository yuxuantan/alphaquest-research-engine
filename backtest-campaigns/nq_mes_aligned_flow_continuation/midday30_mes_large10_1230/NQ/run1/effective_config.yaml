    params:
      setup_mode: midday30_mes_large10_1230
      signal_time: '12:30:00'
      bar_interval_minutes: 1
      return_window_minutes: 30
      flow_window_minutes: 30
      mes_flow_mode: large10
      min_mes_flow_imbalance: 0.02
      allow_long: true
      allow_short: true
      max_trades_per_day: 1
      flatten_time: '15:55:00'
      primary_prefix: nq
      min_primary_return_ticks: 4
  sl:
    module: sweep_extreme
    params:
      stop_offset_ticks: 2
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
