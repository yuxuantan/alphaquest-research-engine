campaign_id: nq_mes_aligned_flow_continuation
variant_id: midday30_mes_large10_1230
test_run_id: run1
strategy_name: nq_mes_aligned_flow_continuation
symbol: NQ
dataset_id: nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: NQ midday continuation may improve when MNQ large-10 completed imbalance
    confirms the same 30-minute direction.
  mechanic: At the completed 12:30 ET signal, require 30-minute NQ return and 30-minute
    MNQ large-10 imbalance to point in the same direction, then trade NQ in that direction.
  timeframe_rationale: The NQ/MNQ feature cache is built on completed 1-minute aligned
    bars, so the strategy stays on 1-minute bars to preserve feature semantics and
    next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: 'This variant focuses on larger MNQ prints, requiring
      NQ price direction and MNQ large-10 imbalance to agree before a midday continuation
      entry. That makes the signal a cross-contract participation confirmation, not
      an NQ-only trend or generic large-trade persistence test.

      '
    entry_logic_rationale: 'The 12:30 ET decision occurs after the morning trend is
      established but before the late-day flatten risk dominates. It uses completed
      30-minute NQ return and completed 30-minute MNQ large-10 imbalance, both known
      at the signal close.

      '
    stop_loss_rationale: 'The signal-bar extreme stop is a direct invalidation level:
      continuation should not immediately trade through the bar that showed MNQ large-trade
      confirmation. The stop is offset only by predeclared ticks.

      '
    target_exit_rationale: 'A fixed-R target avoids using later orderflow or discretionary
      exit logic. The target grid tests whether confirmed midday continuation can
      cover costs before the configured same-day flatten.

      '
    profitability_rationale: 'This should be profitable if MNQ large-10 pressure captures
      meaningful participation in the same direction as NQ. The pre-PnL density audit
      showed the selected grid retains more than 80 signals/year in the random limited
      window at the strict declared corner.

      '
    known_failure_modes: 'Large-10 MNQ flow may still be noisy, midday conditions
      can compress, and same-direction large flow may represent chase exhaustion rather
      than continuation.

      '
    pre_test_decision: approve_for_testing
data:
  dataset_id: nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny
  source_timeframe: 1m
  source: csv
  raw_csv: data/cache/orderflow/nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny.csv
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
