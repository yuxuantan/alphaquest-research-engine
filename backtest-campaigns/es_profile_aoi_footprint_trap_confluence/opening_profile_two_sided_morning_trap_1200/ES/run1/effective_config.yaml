variant_id: opening_profile_two_sided_morning_trap_1200
test_run_id: run1
research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market profile educational material
  edge_thesis: The first post-opening auction can trap breakout traders at ORH/ORL
    when those levels overlap prior profile structure and the footprint shows absorption
    rather than continuation.
  mechanic: Trade morning ORL seller traps and ORH buyer traps when the opening-range
    boundary is close to a prior profile level, limiting the test to the first post-open
    auction decision window.
  timeframe_rationale: The validated Sierra footprint imbalance fields are defined
    at the completed 1-minute bar level, so this variant stays on 1-minute bars to
    avoid invalid aggregation and preserve next-bar-open execution.
  mechanics_review:
    mechanic_expresses_edge: The variant only triggers when a market-generated area
      of interest is close to a frozen prior-session profile level and the completed
      footprint bar shows absorption of aggressive buyers or sellers. This directly
      expresses the proposed confluence edge rather than a standalone level touch
      or standalone imbalance signal.
    entry_logic_rationale: The entry waits for the signal bar to sweep or probe the
      AOI, close back away from the absorbed side, and satisfy the footprint absorption-volume
      requirement. Prior profile levels are built from the previous completed RTH
      session, and opening-range levels are not available until the first 30 one-minute
      bars have closed.
    stop_loss_rationale: The sweep-extreme stop places the stop beyond the completed
      probe bar with a tunable tick offset. That is the mechanical invalidation point
      for the trapped-buyer or trapped-seller thesis and keeps stop placement tied
      to observed auction structure rather than optimized dollar loss.
    target_exit_rationale: The cost-adjusted fixed-R target keeps the reward/risk
      definition explicit after slippage and commissions. It avoids using future profile,
      VWAP, session range, or discretionary target selection after the signal is known.
    profitability_rationale: If trapped aggressive flow at an AOI/profile confluence
      has short-horizon predictive value, the next bars should move away from the
      failed probe often enough to overcome ES costs and pessimistic same-bar ordering.
      The grid tests neighboring confluence distance, absorption-volume, stop-offset,
      and target-R values without changing mechanics.
    known_failure_modes: The confluence can be too common, too imprecise, or descriptive
      rather than predictive. True profile locations may differ from the OHLCV approximation,
      Sierra footprint fields may not equal queue-level absorption, trend days can
      continue through traps, and performance may fail random-entry, WFA, Monte Carlo,
      incubation, or acceptance gates.
    pre_test_decision: approve_for_testing
strategy:
  entry:
