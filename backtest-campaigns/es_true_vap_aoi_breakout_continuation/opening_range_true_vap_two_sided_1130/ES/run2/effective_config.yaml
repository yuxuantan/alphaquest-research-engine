research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market profile educational material.
  edge_thesis: Opening-range breakouts should be more selective when the opening boundary
    overlaps frozen previous-session true volume-at-price and completed signed flow
    confirms participation.
  mechanic: Trade either opening-range high breakout longs or opening-range low breakdown
    shorts through 11:30 ET with true VAP confluence, completed signed-flow confirmation,
    footprint imbalance, and fixed-R exits.
  timeframe_rationale: The Sierra footprint and VAP profile fields are built at the
    completed 1-minute bar level, so this variant stays on 1-minute bars and enters
    no earlier than the next bar open.
  mechanics_review:
    mechanic_expresses_edge: The signal requires the completed opening-range high
      or low AOI, proximity to a frozen previous-session true volume-at-price level,
      and same-direction orderflow on the completed breakout bar.
    entry_logic_rationale: Opening-range levels are unavailable until the first 30
      RTH one-minute bars have closed, prior VAP is shifted from the previous session,
      and entry waits until after the signal bar close.
    stop_loss_rationale: The sweep-extreme stop sits beyond the completed breakout
      or breakdown bar with a tunable tick offset, preserving a clear auction invalidation
      point for the OR continuation thesis.
    target_exit_rationale: The cost-adjusted fixed-R target explicitly accounts for
      ES tick value, slippage, and commission while avoiding future profile, VWAP,
      or discretionary target information.
    profitability_rationale: Opening range breakouts aligned with prior true VAP may
      catch accepted directional auctions where same-direction flow confirms participation
      strongly enough to overcome costs.
    known_failure_modes: OR breakouts often fail back into range, true VAP confluence
      can be too common, Sierra aggregate flow can confirm late, and a few volatile
      opens can dominate apparent profitability.
    pre_test_decision: approve_for_testing
