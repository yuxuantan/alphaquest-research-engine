timeframe: 1m
research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Kavajecz and Odders-White (2004);
    Campbell, Grossman, and Wang (1993)
  edge_thesis: Fresh NQ RTH highs or lows that are not confirmed by cumulative aggregate
    signed-volume progress may represent exhausted liquidity-taking pressure or absorption
    at the new extreme, making same-session mean reversion plausible after costs.
  mechanic: From 13:00 through 15:15 ET, buy NQ when a completed one-minute bar makes
    a fresh current-session low by the grid threshold, closes back within eight ticks
    of the prior completed low, and cumulative signed-volume progress since that prior
    low is not confirming downside pressure. Flatten by 15:55 ET unless the stop or
    target is hit.
  timeframe_rationale: Afternoon one-minute bars test whether late fresh lows with
    weak signed-volume progress mean-revert before the same-day flatten cutoff.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant starts with a fresh current-session NQ price
      extreme. The aggregate-orderflow condition asks whether cumulative signed-volume
      progress from the prior completed extreme confirms that extension. A weak progress
      ratio means price stretched without proportional aggressive flow, which is the
      intended exhaustion expression.
    entry_logic_rationale: From 13:00 through 15:15 ET, buy NQ when a completed one-minute
      bar makes a fresh current-session low by the grid threshold, closes back within
      eight ticks of the prior completed low, and cumulative signed-volume progress
      since that prior low is not confirming downside pressure. The entry uses only
      completed bars, and execution is no earlier than the next one-minute bar boundary.
    stop_loss_rationale: A percent-from-entry stop is observable at entry and does
      not depend on future highs/lows. It tests whether the non-confirmed extreme
      can reverse before adverse continuation overwhelms the setup.
    target_exit_rationale: A fixed-R target keeps exits independent of future session
      levels and lets the grid test modest mean-reversion payoffs without changing
      the entry edge.
    profitability_rationale: If fresh NQ extremes without cumulative signed-volume
      confirmation mark failed liquidity-taking attempts, the next bars should revert
      often enough that fixed 1R exits overcome NQ commission, one-tick slippage,
      and pessimistic same-bar stop/target handling. The pre-PnL density audit must
      pass before any PnL is inspected.
    known_failure_modes: The apparent divergence may be hidden continuation, signed-volume
      may be too noisy, NQ directional days may run through the fade, or costs and
      pessimistic fills may dominate. The ES source family failed, so the NQ transfer
      is treated skeptically.
    pre_test_decision: approve_for_testing
  source_es_config_path: campaigns/es_session_extreme_delta_divergence/variants/afternoon_low_delta_divergence_long/config.yaml
  pre_pnl_port_note: This NQ transfer uses the ES declared mechanics and entry grid
    before any NQ PnL inspection; no NQ rescue attempt is authorized.
