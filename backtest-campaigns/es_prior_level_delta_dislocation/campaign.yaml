campaign_id: es_prior_level_delta_dislocation
title: ES Prior-Level Delta Dislocation
decision: failed
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: At prior RTH high/low levels, a completed rolling 60-minute disagreement
  between price progress and aggressive trade-side signed volume may identify absorption
  or exhaustion around clustered liquidity, creating a same-day ES opportunity after
  costs.
rationale: This campaign tests prior-level price/orderflow dislocation. It is distinct
  from the active prior-day stop-run reclaim campaign, which requires a completed
  close back inside the level, and from the active prior-session breakout continuation
  campaign, which follows confirmed breaks without requiring opposing signed trade
  flow. It is also distinct from fixed-time signed-flow persistence because the signal
  only exists at prior RTH levels.
sources:
- title: Currency Orders and Exchange Rate Dynamics
  authors: Carol L. Osler
  year: 2003
  venue: Journal of Finance
  link: https://www.newyorkfed.org/research/staff_reports/sr125.html
  relevance: Documents clustering of stop-loss and take-profit orders around support/resistance
    levels and the dual possibility of reversal at levels or rapid continuation after
    levels break.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=315660
  relevance: Finds that support/resistance levels can align with limit-order-book
    depth, motivating prior-session high/low as liquidity reference points rather
    than arbitrary price levels.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates order-flow imbalance as a short-horizon price-pressure proxy.
    This campaign uses Sierra aggregated trade-side signed volume, not full quote-level
    OFI.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV and Sierra aggregated trade-side orderflow
  bars in America/New_York
- previous RTH high/low available only after the prior RTH session is complete
- fresh prior-level flags computed without future bars
- completed rolling 60-minute return and signed-volume windows on 1-minute bars
- exchange session labels and no-overnight prop-rule flatten checks
data_quality_caveats:
- The Sierra cache is aggregated bar-level trade-side flow, not full depth order-book
  OFI.
- Same-bar stop/target conflicts must use the pessimistic OHLC assumption.
- The rolling delta signal is a proxy for aggressive trade pressure and cannot observe
  hidden liquidity directly.
lookahead_risks:
- Prior RTH high/low are from the fully completed previous RTH session only.
- The rolling 60-minute return and signed volume use completed 1-minute bars ending
  at the signal bar close.
- Signals use bar close and the engine must enter on the next bar open or later.
- No final current-session high/low, final VWAP, final volume profile, future orderflow,
  or future daily range is used.
- All variants flatten the same day before the configured prop cutoff.
failure_modes:
- Orderflow dislocation may be noise in aggregated signed-volume bars and may not
  survive realistic ES costs.
- Prior-level reactions may be dominated by macro/news days or a small number of volatility
  regimes.
- Long and short resolution of price/orderflow disagreement may be asymmetric.
- Fresh-level filters may make variants too sparse to satisfy trade-count requirements.
- Bar-level OHLC may overstate fills during fast prior-level breaks, requiring pessimistic
  same-bar ordering.
