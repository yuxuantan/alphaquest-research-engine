  conclusion: Not a duplicate in active scope. This campaign requires a completed
    rolling price/orderflow dislocation at prior RTH extremes. Active prior-level
    campaigns tested reclaim fade and breakout continuation without opposing signed
    trade-flow; active orderflow campaigns were fixed-time persistence, opening-drive
    inventory, ES/MES divergence, or toxicity proxies rather than prior-level dislocation.
