campaign_id: es_intraday_invariance_dislocation_reversion
variant_id: morning_15m_two_sided_dislocation_fade_1130
test_run_id: rescue1
strategy_name: intraday_invariance_dislocation_reversion
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Andersen, Bondarenko, Kyle, and Obizhaeva (2018); Kyle and Obizhaeva
    (2016); Ane and Geman (2000)
  edge_thesis: Completed ES bars with unusually large price movement per transaction,
    scaled by average trade size and ranked against prior same-clock observations,
    may identify temporary liquidity dislocations that mean-revert when aggregate
    signed flow does not strongly sponsor the move.
  mechanic: From 09:50 through 11:30 ET, fade either direction of a completed 15-minute
    move when the intraday trading-invariance dislocation score is high versus prior
    same-clock observations and aggregate signed flow is not strongly aligned with
    the move.
  timeframe_rationale: One-minute bars are required because the edge uses completed-bar
    trade count, volume, signed volume, and price displacement. The strategy does
    not use print sequencing or intra-minute fills.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: From 09:50 through 11:30 ET, fade either direction of
      a completed 15-minute move when the intraday trading-invariance dislocation
      score is high versus prior same-clock observations and aggregate signed flow
      is not strongly aligned with the move.
    entry_logic_rationale: The entry computes a completed rolling return, completed
      rolling trade count, completed rolling volume, completed average trade size,
      and completed signed-flow imbalance. The invariance dislocation score is ranked
      against prior same-clock observations only; the current score is appended after
      the decision, so the rank is not lookahead. The trade fades the move only when
      signed flow is not strongly aligned with the move.
    stop_loss_rationale: A fixed percent stop is used because the edge is a statistical
      liquidity-dislocation state rather than a discrete chart level. The stop is
      predeclared, tick-rounded by the engine, and subject to pessimistic same-bar
      target/stop handling.
    target_exit_rationale: Rescue target grid remains fixed-R and never below 1.0R.
      The grid tests 1.0R, 1.25R, and 1.5R without adding discretionary exits.
    profitability_rationale: The morning version should work only if early-session
      price dislocations without signed-flow sponsorship are temporary liquidity transfers
      rather than durable information.
    known_failure_modes: The dislocation may be informed price discovery, signed flow
      may be too noisy, high-rank scores may cluster in crisis regimes, and one-tick
      slippage plus commissions can erase short-horizon reversion.
    pre_test_decision: approve_for_testing
    rescue_rationale: Parameter-space-only rescue after all original variants failed
      limited core. Entry mechanic, module, data, session window, costs, fills, and
      stage gates are unchanged; the grid shifts away from sparse extreme-rank settings
      toward still-high same-clock dislocation ranks and uses only 1.0R+ targets.
  rescue_attempt:
    id: parameter_space_rescue_1
    source_config: campaigns/es_intraday_invariance_dislocation_reversion/variants/morning_15m_two_sided_dislocation_fade_1130/config.yaml
    source_run: run1
    allowed_change_scope: parameter_space_and_fixed_defaults_only
    mechanics_changed: false
    entry_module_changed: false
    stop_module_changed: false
    target_module_changed: false
    data_window_changed: false
    costs_or_fills_changed: false
    target_rr_floor: All target_r_multiple values are >= 1.0R.
    changed_parameters: &id002
      entry.params.invariance_rank_threshold:
      - 0.85
      - 0.9
      - 0.95
      entry.params.min_return_ticks:
      - 4
      - 5
      - 6
      sl.params.stop_pct:
      - 0.0025
      - 0.0035
      - 0.0045
      tp.params.target_r_multiple:
      - 1.0
      - 1.25
      - 1.5
    fixed_default_changes:
      entry.params.invariance_rank_threshold: 0.9
      entry.params.min_return_ticks: 5
      sl.params.stop_pct: 0.0035
      tp.params.target_r_multiple: 1.25
