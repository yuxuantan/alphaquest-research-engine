research_metadata:
  academic_source: Osler (2000); Holmberg, Lonnback, and Lundstrom (2013); Brock,
    Lakonishok, and LeBaron (1992); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: The 30-minute initial balance can attract larger participants; failed
    breaks with large10 reclaim flow may identify a more durable trap than all-print
    signed flow.
  mechanic: Build the first 30-minute RTH opening range. From range completion through
    15:30 ET, require a completed close outside the range and a reclaim back inside
    within eight bars. Enter in the reclaim direction only when the pre-breakout 3-bar
    and 6-bar trend windows agree and same-direction large10 signed-volume imbalance
    confirms the reclaim.
  timeframe_rationale: One-minute bars preserve the outside-close then reclaim sequence
    without merging the trap and reclaim into a larger bar, while the full-session
    cutoff supplies enough qualifying sessions for the 50 trades/year screen.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the edge by combining a completed
      opening-range public reference, a completed outside close that can trap breakout
      traders, a reclaim back inside the range, pre-breakout 3-bar and 6-bar trend
      agreement in the reclaim direction, and completed aggregate orderflow confirmation
      on the reclaim bar.
    entry_logic_rationale: The entry is allowed only after the reclaim bar closes.
      The opening range is already known, the failed-breakout candidate is defined
      by a completed close outside the range, the trend context is frozen before that
      candidate, and the reclaim requires same-direction completed orderflow. This
      keeps the trade from using future range, final VWAP, final session extremes,
      or post-entry movement.
    stop_loss_rationale: The opening-range-edge stop anchors risk to the failed/reclaimed
      boundary plus a predeclared tick offset. A return back through the failed-breakout
      side invalidates the trap-reclaim thesis, and max_stop_points prevents accepting
      unusually wide opening-range risk.
    target_exit_rationale: The fixed-R target is declared before testing and scales
      the exit to the accepted stop distance. It avoids future-derived targets such
      as final session highs, lows, VWAP, or volume profile and keeps same-bar stop/target
      handling under the engine pessimistic fill rules.
    profitability_rationale: The formulation is worth testing only if public opening-range
      traps that reclaim in the direction of already visible short-term structure
      and completed orderflow have enough continuation to overcome ES commissions,
      one-tick slippage, next-bar entry, and forced-flatten constraints. Full-session
      monitoring is justified because opening-range levels remain visible reference
      points after the morning and the pre-PnL density audit showed shorter windows
      were too sparse.
    known_failure_modes: The setup may be a descriptive chart pattern with no net
      edge, full-session OR levels may decay after the morning, the loosened trend
      threshold may admit chop, signed and large10 flow can be noisy, and even a core-grid
      pass can still fail monkey, WFA, Monte Carlo, or frozen validation.
    pre_test_decision: approve_for_testing
