research_metadata:
  academic_source: Osler (2000); Holmberg, Lonnback, and Lundstrom (2013); Brock,
    Lakonishok, and LeBaron (1992); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: The 30-minute initial balance can attract larger participants; failed
    breaks with large10 reclaim flow may identify a more durable trap than all-print
    signed flow. Rescue 1 keeps the same opening-range failed-breakout reclaim edge
    and changes only fixed parameters/parameter space to address the original low
    trade-count and negative small-rotation diagnostics.
  mechanic: Build the first 30-minute RTH opening range. From range completion through
    15:30 ET, require a completed close outside the range and a reclaim back inside
    within eight bars. Enter in the reclaim direction only when the pre-breakout 3-bar
    and 6-bar trend windows agree and same-direction large10 signed-volume imbalance
    confirms the reclaim. Rescue 1 preserves the outside-close, reclaim, frozen pre-breakout
    trend, and completed orderflow requirements; it allows a longer reclaim window
    and tests a smaller target grid for the same rotation thesis.
  timeframe_rationale: One-minute bars preserve the outside-close then reclaim sequence
    without merging the trap and reclaim into a larger bar, while the full-session
    cutoff supplies enough qualifying sessions for the 50 trades/year screen.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'Rescue 1 still expresses the same edge: a completed
      opening-range break fails, reclaims inside the public OR level, agrees with
      the pre-breakout trend context, and has completed aggregate orderflow in the
      reclaim direction. Only the allowed fixed parameters and parameter space are
      changed.'
    entry_logic_rationale: The rescue does not add or remove entry filters. It keeps
      next-bar execution after a completed reclaim, freezes trend before the failed-breakout
      candidate, and uses the same completed orderflow confirmation. The fixed changes
      only acknowledge that full-session failed breaks can take longer than eight
      bars to reclaim and that a zero-tick trend threshold still requires non-opposing
      HH/HL or LH/LL structure.
    stop_loss_rationale: The same opening-range-edge stop module is retained. The
      max_stop_points cap is widened modestly as an allowed fixed stop parameter so
      wider full-session OR reclaims are not mechanically rejected before testing;
      stop offset remains a declared grid.
    target_exit_rationale: The same fixed-R target module is retained. The rescue
      target grid shifts toward smaller rotations because original runs showed no
      profitable combinations and the edge thesis is a trap-reclaim rotation, not
      a full trend-day continuation. This is a parameter-space rescue, not a new exit
      mechanic.
    profitability_rationale: The rescue is only defensible if the original failure
      was partly caused by sparse eligible entries and targets that were too ambitious
      for a full-session OR reclaim. A longer reclaim allowance, non-opposing trend
      threshold, and smaller fixed-R targets may better match a short-horizon trap
      rotation while still paying ES costs and respecting next-bar execution.
    known_failure_modes: The rescue can still fail if the original negative edge is
      structural, if later reclaims are stale OR references, if looser trend admits
      chop, if smaller targets cannot overcome costs, or if results fail monkey, WFA,
      Monte Carlo, or frozen validation.
    pre_test_decision: approve_for_testing
