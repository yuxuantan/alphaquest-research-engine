research_metadata:
  academic_source: Pagonidis (2014); Ronnback (2023)
  edge_thesis: Prior-session NQ Internal Bar Strength may identify completed-session overreaction that
    mean-reverts during the next RTH session without overnight exposure.
  mechanic: At 09:35 ET, go long after a completed prior session with low IBS, using the first completed
    5-minute RTH bar only for timing.
  timeframe_rationale: 5-minute bars preserve next-bar execution after a completed signal bar while avoiding
    same-close fills; the prior-session IBS inputs are complete before the current RTH session begins.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: At 09:35 ET, go long after a completed prior session with low IBS, using
      the first completed 5-minute RTH bar only for timing. The prior high, low, and close are completed
      before the current session, so the variant expresses prior-session IBS mean reversion without future
      current-session information.
    entry_logic_rationale: The entry module calculates IBS from prev_rth_high, prev_rth_low, and prev_rth_close
      already available at the next RTH open. The signal waits for the configured completed 5-minute bar
      and then relies on the engine for next-bar-open execution.
    stop_loss_rationale: A fixed percent-from-entry stop is used because the IBS edge is a session-state
      mean-reversion hypothesis rather than a discrete orderflow level. The stop grid is frozen before
      NQ PnL and uses pessimistic same-bar ordering when the path is ambiguous.
    target_exit_rationale: A fixed-R target and 15:55 ET flatten test whether IBS mean reversion appears
      intraday without discretionary exits or overnight exposure. The target grid is shared across all
      variants before any staged NQ result is known.
    profitability_rationale: If a prior close near the completed prior-session extreme reflects late-session
      liquidity demand or overreaction, the next RTH session should partially reverse enough to survive
      NQ costs across neighboring stop and target settings.
    known_failure_modes: IBS may not transfer from ETFs to NQ futures, the edge may need overnight exposure,
      the low and high sides may be asymmetric or too sparse, and intraday fixed stops may truncate a
      slow reversal before same-session flattening.
    pre_test_decision: approve_for_testing
  nq_transfer_note: Pre-PnL NQ density audit pruned only sparse IBS threshold/range corners. No NQ PnL
    was inspected before these grids were frozen.
