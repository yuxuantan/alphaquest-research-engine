research_metadata:
  academic_source: "Holmberg, L\xF6nnbark, and Lundstr\xF6m (2012); Osler (2000); Cont, Kukanov, and Stoikov (2014)"
  edge_thesis: Compressed overnight ranges can leave unresolved inventory around known overnight boundaries; a completed RTH close through the boundary with aligned aggregate flow should be more likely to continue than a boundary touch without pressure confirmation.
  mechanic: Morning two-sided breakout outside the completed overnight high/low after the overnight range ranks in the lower-to-middle part of its 252-session history.
  timeframe_rationale: A 5-minute bar reduces one-minute boundary noise while still allowing a dense morning breakout sample before lunch liquidity changes.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The variant waits until the overnight high/low and 252-session overnight range rank are fully known before RTH, then trades in the direction of a completed 5-minute close outside either overnight boundary with same-direction signed aggregate flow. This is compression expansion through a known boundary, not a sweep-reclaim or gap fade.
    entry_logic_rationale: The overnight features are loaded from a local CSV whose values are available by 09:30 New York time. The breakout close and orderflow are completed-bar fields, so the engine must place the entry at next-bar open or later with configured slippage.
    stop_loss_rationale: The sweep-extreme stop sits below the completed signal-bar low/high. If the next bars reverse through the breakout bar that carried the confirmed pressure, the continuation thesis is invalidated.
    target_exit_rationale: A fixed-R target avoids using future VWAP, final day range, or discretionary targets. The morning flatten time keeps this as a short-horizon RTH breakout test.
    profitability_rationale: The setup should be profitable only if narrow overnight ranges store enough directional energy that a confirmed morning break through either overnight boundary attracts continuation flow before liquidity replenishes.
    known_failure_modes: Breakouts after lower-range overnight sessions can fail immediately; signed flow can be informed exhaustion rather than continuation; signal-bar stops may be too tight; side-specific behavior can be regime-dependent.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    trigger: original run failed limited_core_grid_test before monkey, WFA, Monte Carlo, or validation
    allowed_scope: parameter_space_and_fixed_parameters_only
    pnl_seen_before_rescue: true
    mechanics_changed: false
    entry_module_unchanged: true
    stop_module_unchanged: true
    target_module_unchanged: true
    changes:
    - max_overnight_range_rank grid changed to [0.5, 0.6, 0.7]
    - min_orderflow_imbalance grid changed to [0.0, 0.01, 0.03]
    - stop_offset_ticks grid changed to [1, 2, 3]
    - target_r_multiple grid changed to [0.5, 0.75, 1.0]
    rationale: Original grids had adequate signal density but no profitable combinations. The one allowed rescue keeps the completed overnight compression breakout with aggregate orderflow confirmation intact and tests whether the edge, if present, is shorter-horizon follow-through that needs quicker fixed-R exits and a less extreme lower-to-middle overnight range state.
