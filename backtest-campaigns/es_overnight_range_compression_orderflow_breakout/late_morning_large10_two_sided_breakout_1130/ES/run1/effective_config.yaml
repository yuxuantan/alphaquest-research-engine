research_metadata:
  academic_source: "Holmberg, L\xF6nnbark, and Lundstr\xF6m (2012); Osler (2000);\
    \ Cont, Kukanov, and Stoikov (2014)"
  edge_thesis: Compressed overnight ranges can leave unresolved inventory around known
    overnight boundaries; a completed RTH close through the boundary with aligned
    aggregate flow should be more likely to continue than a boundary touch without
    pressure confirmation.
  mechanic: Late-morning two-sided breakout through the completed overnight high or
    low after overnight compression, confirmed by large10 aggregate flow.
  timeframe_rationale: A 5-minute late-morning bar keeps the breakout decision away
    from the noisiest open while preserving enough observations before midday.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The variant allows either direction but only after a
      completed bar closes outside the compressed overnight range and the large10
      aggregate flow imbalance points in the breakout direction. This expresses range
      expansion confirmed by larger participant pressure.
    entry_logic_rationale: Overnight range compression is known before RTH. The completed
      RTH close determines whether the overnight boundary has been broken, and completed
      same-bar large10 flow confirms direction. Entry is at next-bar open with costs
      and slippage.
    stop_loss_rationale: The signal-bar extreme is used as the invalidation level,
      because a reversal through that bar means the breakout pressure failed to sustain
      immediately.
    target_exit_rationale: Fixed-R targets make the reward target independent of future
      session calculations and keep the mechanics comparable across sides.
    profitability_rationale: If larger trades participate in a breakout from a narrow
      overnight range after the opening auction settles, the move should have enough
      follow-through to beat ES transaction costs across neighboring parameters.
    known_failure_modes: Large-trade flow can be late; the market can rotate around
      overnight levels instead of expand; late-morning liquidity can reduce follow-through;
      two-sided logic can hide side-specific weakness.
    pre_test_decision: approve_for_testing
