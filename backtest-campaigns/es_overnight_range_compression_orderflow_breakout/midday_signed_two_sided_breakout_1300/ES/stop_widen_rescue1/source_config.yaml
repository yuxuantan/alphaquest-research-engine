research_metadata:
  academic_source: "Holmberg, L\xF6nnbark, and Lundstr\xF6m (2012); Osler (2000); Cont, Kukanov, and Stoikov (2014)"
  edge_thesis: Compressed overnight ranges can leave unresolved inventory around known overnight boundaries; a completed RTH close through the boundary with aligned aggregate flow should be more likely to continue than a boundary touch without pressure confirmation.
  mechanic: Midday two-sided breakout through the completed overnight high or low after overnight compression, confirmed by signed aggregate flow.
  timeframe_rationale: A 5-minute midday window tests whether the overnight boundary remains a valid compression-release reference after the open has stabilized.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The variant uses the same pre-known overnight compression state and completed overnight high/low levels, but waits until the midday window for a completed close outside the boundary with same-direction signed flow. It expresses continuation from a persistent overnight reference level.
    entry_logic_rationale: No intraday future levels are computed. The entry signal only knows the completed overnight range, completed close, and completed bar aggregate flow, with next-bar-open execution handled by the engine.
    stop_loss_rationale: The completed signal-bar high/low provides the nearest objective invalidation for a breakout continuation attempt.
    target_exit_rationale: Fixed-R exits and a fixed flatten time prevent using final session range or discretionary level selection.
    profitability_rationale: If overnight compression creates levels watched through the full RTH session, a midday directional close through those boundaries with aligned flow should still produce continuation often enough to survive costs.
    known_failure_modes: Midday liquidity can be mean-reverting; overnight levels may lose relevance after the open; aggregate flow can lag price; two-sided results can mask asymmetric behavior.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    trigger: original run failed limited_core_grid_test before monkey, WFA, Monte Carlo, or validation
    allowed_scope: parameter_space_and_fixed_parameters_only
    pnl_seen_before_rescue: true
    mechanics_changed: false
    entry_module_unchanged: true
    stop_module_unchanged: true
    target_module_unchanged: true
    changes:
    - max_overnight_range_rank grid changed to [0.5, 0.6, 0.7]
    - min_orderflow_imbalance grid changed to [0.0, 0.01, 0.03]
    - stop_offset_ticks grid changed to [1, 2, 3]
    - target_r_multiple grid changed to [0.5, 0.75, 1.0]
    rationale: Original grids had adequate signal density but no profitable combinations. The one allowed rescue keeps the completed overnight compression breakout with aggregate orderflow confirmation intact and tests whether the edge, if present, is shorter-horizon follow-through that needs quicker fixed-R exits and a less extreme lower-to-middle overnight range state.
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_overnight_range_compression_orderflow_breakout
    source_variant_id: midday_signed_two_sided_breakout_1300
    source_run_id: rescue1
    source_config_path: campaigns/es_overnight_range_compression_orderflow_breakout/rescue_attempts/parameter_space_rescue_1/midday_signed_two_sided_breakout_1300/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_offset_ticks
      old: 2
      new: 3
    - path: core_grid.parameters.sl.params.stop_offset_ticks
      old:
      - 1
      - 2
      - 3
      new: &id002
      - 2
      - 3
      - 5
