campaign_id: nq_max_daily_return_lottery_reversal
variant_id: high_5d_max_fade_short_1000
test_run_id: run1
strategy_name: max_daily_return_lottery_reversal
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Bali, Cakici, and Whitelaw (2011) MAX daily-return lottery anomaly;
    Journal of Financial Economics.
  source_title: 'Maxing Out: Stocks as Lotteries and the Cross-Section of Expected
    Returns'
  source_authors: Turan G. Bali, Nusret Cakici, and Robert F. Whitelaw
  source_year: 2011
  source_link: https://econpapers.repec.org/RePEc:eee:jfinec:v:99:y:2011:i:2:p:427-446
  source_doi: 10.1016/j.jfineco.2010.08.014
  edge_thesis: Lagged maximum daily return can proxy lottery-like salience or overreaction;
    high prior-MAX states may underperform while low prior-MAX states may retain a
    quiet-premium expression.
  mechanic: 'At 10:00 ET, short NQ when the prior 5-session maximum daily return rank
    is in the high tail.

    '
  timeframe_rationale: 'The 10:00 ET decision waits for the opening half hour while
    expressing the lagged prior-session MAX state intraday.

    '
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  pre_pnl_density:
    status: PASS
    artifact: research_artifacts/nq_max_daily_return_lottery_reversal_density_audit_20260701.md
    summary_csv: research_artifacts/nq_max_daily_return_lottery_reversal_density_summary_20260701.csv
    p_n_l_inspected: false
    rows_passing_density: 45
    entry_rows: 45
  duplicate_edge_check:
    active_scope_only: true
    checked_edges:
    - nq_realized_skewness_reversal
    - nq_realized_jump_variation_premium
    - nq_realized_vol_of_vol_state
    - nq_daily_short_term_reversal
    - nq_daily_time_series_momentum
    - nq_52week_anchor_momentum
    - nq_intraday_capitulation_mean_reversion
    conclusion: Eligible as a distinct MAX daily-return salience state before PnL,
      not a realized moment, jump variation, total-return momentum, one-day reversal,
      or price-anchor edge.
  mechanics_review:
    mechanic_expresses_edge: 'At 10:00 ET, short NQ when the prior 5-session maximum
      daily return rank is in the high tail.

      '
    entry_logic_rationale: The entry reads only a strict-prior shifted daily-return
      MAX feature and evaluates the completed 1-minute bar immediately before the
      configured decision time.
    stop_loss_rationale: A percent-from-entry stop is fixed before testing because
      the edge is a lagged daily state rather than a discrete intraday level.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten tests whether the
      MAX state monetizes intraday without discretionary exits or overnight exposure.
    profitability_rationale: The variant can only work if MAX salience/overreaction
      survives costs, same-bar pessimism, and neighboring parameter checks on NQ futures.
    known_failure_modes: The source evidence is cross-sectional equity research, not
      direct NQ futures evidence; MAX may proxy volatility already tested elsewhere
      or may not transfer to index futures.
    pre_test_decision: approve_for_testing
  rescue_status: none
