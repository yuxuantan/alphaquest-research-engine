variant_id: low_bab_daily_rebound_long_0935
test_run_id: run1
research_metadata:
  academic_source: Frazzini and Pedersen (2014); AQR Betting Against Beta Equity Factors
    Daily
  edge_thesis: Poor lagged BAB factor state may proxy defensive-factor stress, deleveraging,
    or leverage-constraint pressure that can condition ES intraday risk appetite.
  mechanic: At 09:35 ET, long ES when the lagged AQR USA BAB one-day return rank is
    in the lower tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar decision timing and next-bar-open
    execution while using a 45-calendar-day-lagged public BAB factor state.
strategy:
  entry:
    module: aqr_bab_factor_state
    params:
      setup_mode: low_bab_rebound_long
      feature_csv: data/external/es_aqr_bab_features_20110103_20260609.csv
      value_column: bab_usa_return_1d
      rank_column: bab_usa_return_rank_252
      bab_rank_threshold: 0.3
      entry_time: 09:35:00
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.0025
      target_r_multiple: 1.5
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
