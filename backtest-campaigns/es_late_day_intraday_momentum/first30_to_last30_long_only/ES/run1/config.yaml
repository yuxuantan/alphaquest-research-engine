campaign_id: es_late_day_intraday_momentum
variant_id: first30_to_last30_long_only
test_run_id: run1
strategy_name: late_day_intraday_momentum
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018)
  edge_thesis: The positive side of first-window market intraday momentum may survive ES costs better than the short side because equity-index intraday drift can be asymmetric.
  mechanic: At the completed 15:25-15:30 ET 5-minute bar, go long only when the 09:30-10:00 ET return versus prior RTH close is positive enough; flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars preserve completed-bar signal timing for the 15:30 ET decision and next-bar-open execution.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: pdh_pdl_sweep
  warmup_days: 10
  rth_start: '09:30:00'
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: late_day_intraday_momentum
    params:
      setup_mode: first_half_hour_sign
      rth_start: '09:30:00'
      last_window_start: '15:30:00'
      first_window_minutes: 30
      penultimate_window_minutes: 30
      bar_interval_minutes: 5
      tick_size: 0.25
      min_signal_return_ticks: 4.0
      min_penultimate_return_ticks: 0.0
      max_trades_per_day: 1
      allow_long: true
      allow_short: false
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
core:
  data_subset: &data_subset
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels: [RTH]
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:55:00'
  max_trades_per_day: 1
benchmarks: &benchmarks
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.10
  min_cagr: 0.0
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid: &grid
  data_subset: *data_subset
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &parameters
    entry.params.min_signal_return_ticks: [0.0, 4.0, 8.0]
    sl.params.stop_pct: [0.0015, 0.0025, 0.004]
    tp.params.target_r_multiple: [0.75, 1.0, 1.5]
monkey:
  data_subset: *data_subset
  runs: 300
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *data_subset
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_exclusive_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: window_grid
  parameters: *parameters
campaign_tests:
  acceptance_oos_test:
    train_months: 24
    test_months: 6
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 10
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 300
  seed: 11
  path_months: 6
  skip_trade_probability: 0.05
  adverse_slippage_per_trade: 12.5
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: true
  retain_path_trades: false
  retain_path_events: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
