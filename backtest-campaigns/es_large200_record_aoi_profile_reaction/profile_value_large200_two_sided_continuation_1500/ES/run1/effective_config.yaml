variant_id: profile_value_large200_two_sided_continuation_1500
test_run_id: run1
research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Chart Fanatics / Trader Yush video notes; Osler (2000); Kavajecz
    and Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile
    educational material
  edge_thesis: Same-direction large-record proxy flow through completed prior VAH
    or VAL may indicate value migration rather than a failed auction.
  mechanic: Trade continuation through prior VAH on the long side or prior VAL on
    the short side after a completed bar accepts beyond value with same-direction
    large-record proxy flow.
  timeframe_rationale: The variant uses completed one-minute profile and orderflow
    features and schedules entries on the next bar to avoid bar-close execution leakage.
  mechanics_review:
    mechanic_expresses_edge: This variant tests whether large-record proxy flow through
      prior value edges marks accepted value migration, the continuation counterpart
      to the profile trap expression.
    entry_logic_rationale: VAH and VAL are frozen from the completed prior session,
      the signal requires the current completed bar to cross and close beyond the
      value edge, and execution is deferred to the next bar.
    stop_loss_rationale: The sweep-extreme stop protects beyond the completed continuation
      bar with a fixed tick offset, giving a simple invalidation point for failed
      acceptance.
    target_exit_rationale: The target uses predeclared cost-adjusted fixed-R settings
      and therefore cannot benefit from future value-area expansion, final session
      profile, or discretionary target fitting.
    profitability_rationale: If accepted large-record flow through prior value edges
      persists, the variant should produce positive expectancy across neighboring
      distance, stop, and target settings after ES costs.
    known_failure_modes: Value-edge continuations may be fade-prone, the large-record
      proxy may be noisy, profile levels are approximate, and any in-sample strength
      can fail WFA, monkey, Monte Carlo, or prop rules.
    pre_test_decision: approve_for_testing
