campaign_id: nq_sector_rotation_risk_appetite
variant_id: growth_lead_long_1030
test_run_id: run1
strategy_name: sector_rotation_risk_appetite
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002);
    Molchanov and Stangl (2024)
  edge_thesis: Lagged sector ETF leadership may proxy Nasdaq-specific growth/risk-appetite
    state for NQ intraday drift.
  mechanic: At 10:30 ET, buy NQ when lagged growth-minus-defensive 5-day sector return
    rank is in the upper tail.
  timeframe_rationale: A one-minute completed-bar signal keeps the sector state lagged
    by one business day and leaves execution to the next eligible bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  pre_pnl_density:
    artifact: research_artifacts/nq_sector_rotation_risk_appetite_density_audit_20260622.md
    screen: research_artifacts/nq_sector_rotation_risk_appetite_density_audit_20260622.csv
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_sector_rotation_risk_appetite
  nq_specific_note: NQ is more directly exposed to growth/technology sector rotation
    than ES; current NQ thresholds were approved only by pre-PnL density counts.
  mechanics_review:
    mechanic_expresses_edge: At 10:30 ET, buy NQ when lagged growth-minus-defensive
      5-day sector return rank is in the upper tail.
    entry_logic_rationale: The sector feature file joins only ETF observations available
      on or before one business day before the NQ session; the signal is emitted on
      a completed RTH bar.
    stop_loss_rationale: The fixed percent stop is declared before testing, varied
      only through sl.params.stop_pct, and rounded to NQ tick size.
    target_exit_rationale: The fixed-R target is declared before testing and varied
      only through tp.params.target_r_multiple.
    profitability_rationale: A true NQ growth/risk-appetite state should survive neighboring
      sector-rank thresholds, stop distances, and target multiples after costs.
    known_failure_modes: Sector ETF closes may be stale for intraday NQ; adjusted
      ETF data can revise; sector rotation can invert during rate/inflation shocks;
      results can fail WFA or monkey robustness.
    pre_test_decision: approve_for_testing
data:
  dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: sector_rotation_risk_appetite
    params:
      feature_csv: data/external/nq_sector_rotation_features_20110103_20260612.csv
      setup_mode: growth_lead_long
      bar_interval_minutes: 1
      entry_time: '10:30:00'
      flatten_time: '15:55:00'
      max_trades_per_day: 1
      stop_pct: 0.0025
      target_r_multiple: 1.5
      rank_min: 0.6
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
core:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2026-06-12'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  point_value: 20.0
  tick_value: 5.0
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:55:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 12
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset: *id001
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &id002
    entry.params.rank_min:
    - 0.55
    - 0.6
    - 0.65
    sl.params.stop_pct:
    - 0.0015
    - 0.0025
    - 0.004
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
monkey:
  data_subset: *id001
  runs: 8000
  seed: 53
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_exclusive_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: window_grid
  parameters: *id002
campaign_tests:
  acceptance_oos_test:
    train_months: 24
    test_months: 6
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.trades_per_year
      min: 50
    - metric: metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: grid
      workers: 3
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      valid_parameter_combination_count: true
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_fraction
      fraction: 0.1
      avoid_last_fraction: 0.1
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    parallel:
      enabled: true
      scope: grid
      workers: 3
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_fraction
      fraction: 0.1
      avoid_last_fraction: 0.1
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    runs: 8000
    parallel:
      enabled: true
      scope: runs
      workers: 3
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: stitched_oos_metrics.profit_factor
      min: 1.2
    - metric: stitched_oos_metrics.mar
      min: 0.4
    - metric: stitched_oos_metrics.trades_per_year
      min: 50
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: first_fraction
      fraction: 0.9
    parallel:
      enabled: true
      scope: window_grid
      workers: 3
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    runs: 8000
    parallel:
      enabled: true
      scope: runs
      workers: 3
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.mean_net_pnl
      exclusive_min: 0.0
    parallel:
      enabled: true
      scope: runs
      workers: 3
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.trades_per_year
      min: 50
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 48
    test_months: 12
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    runs: 8000
    parallel:
      enabled: true
      scope: runs
      workers: 3
