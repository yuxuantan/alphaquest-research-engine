research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); CME market profile
    documentation; Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Prior-session accepted-value boundaries can reject failed probes when
    liquidity provision and aggregate counterflow push price back inside value.
  mechanic: afternoon two-sided rejection of prior value boundaries with large-20
    trade-size counterflow between 13:00:00 and 15:30:00; enter at the next 5-minute
    bar open after the completed rejection bar.
  timeframe_rationale: Five-minute bars reduce one-minute noise around approximate
    value-area boundaries while retaining next-bar execution and using 1-minute detail
    for pessimistic same-bar stop/target ordering where available.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses prior value-area rejection by
      requiring afternoon two-sided rejection of prior value boundaries with large-20
      trade-size counterflow. The prior VAH/VAL are frozen from the previous completed
      RTH session, and the trade only fires after the current completed bar probes
      outside value and closes back inside with counterflow, which is the actual failed-acceptance
      mechanism.
    entry_logic_rationale: The entry waits for a completed 5-minute rejection bar
      and then relies on the engine for next-bar-open execution, so it cannot assume
      the reversal path inside the signal bar. The signal is allowed only within a
      predeclared RTH window and at most once per session to avoid repeated probing
      of the same boundary.
    stop_loss_rationale: The signal-bar high for VAH rejection shorts or signal-bar
      low for VAL rejection longs is the natural invalidation point because price
      continuation beyond the completed probe means value rejection failed. A small
      tick offset grid keeps the stop tied to observable price action instead of a
      fitted dollar amount.
    target_exit_rationale: The target is a fixed-R retracement because the hypothesis
      is a short return-to-value after failed acceptance, not an all-day trend forecast
      or a target based on future VWAP/profile information. The grid tests modest
      retracement distances that could plausibly survive costs.
    profitability_rationale: If prior value-area boundaries attract liquidity and
      a failed outside probe traps breakout traders, counterflow back into value should
      produce a repeatable short-horizon reversal. Using aggregate flow confirmation
      may filter random touches while preserving enough opportunities for the 50 trades/year
      floor.
    known_failure_modes: The approximate value profile may be too crude versus true
      volume-at-price, and a close back inside value can be a pause before a second
      breakout. Aggregate Sierra flow can lag price, and one-tick worse slippage or
      pessimistic same-bar ordering may erase any small return-to-value edge.
    pre_test_decision: approve_for_testing
