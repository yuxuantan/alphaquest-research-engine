timeframe: 1m
research_metadata:
  academic_source: Dennis and Mayhew (2002); Cboe SKEW historical data
  edge_thesis: Lagged Cboe SKEW option-implied downside-tail state may identify NQ
    intraday risk-off or risk-on pressure after the cash open.
  mechanic: At 10:00 ET, short NQ when the latest prior Cboe SKEW close rank is in
    the upper tail, expressing elevated implied downside-tail risk.
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open
    NQ execution while using only prior Cboe SKEW closes.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_cboe_skew_tail_risk_intraday_density_audit_20260630.md
    density_basis: skew_rank_min grid [0.55,0.60,0.65]
    selected_grid_min_signals: 1503
    selected_grid_min_signals_per_year: 97.3525
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 10:00 ET, short NQ when the latest prior Cboe SKEW
      close rank is in the upper tail, expressing elevated implied downside-tail risk.
    entry_logic_rationale: The signal reads only the latest Cboe SKEW close strictly
      before the NQ session date plus the completed 1-minute bar before entry; same-session
      Cboe closes and post-entry bars are unavailable and unused.
    stop_loss_rationale: A percent-from-entry stop is used because implied tail-risk
      state is not a discrete intraday price level.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten tests same-day expression
      without overnight exposure.
    profitability_rationale: The variant can only work if option-implied skew/tail-risk
      state predicts enough same-day NQ pressure or relief to overcome commission,
      one tick of slippage, and pessimistic same-bar ordering.
    known_failure_modes: The ES source family failed; this NQ transfer can fail if
      SKEW prices longer-horizon tail insurance rather than same-day futures direction,
      or if the state overlaps already failed broad volatility regimes.
    pre_test_decision: approve_for_testing
