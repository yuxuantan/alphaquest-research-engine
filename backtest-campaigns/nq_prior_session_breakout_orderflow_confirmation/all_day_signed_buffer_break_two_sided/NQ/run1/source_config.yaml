campaign_id: nq_prior_session_breakout_orderflow_confirmation
variant_id: all_day_signed_buffer_break_two_sided
test_run_id: run1
strategy_name: pdh_pdl_orderflow_breakout_continuation
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Brock, Lakonishok, and LeBaron (1992); Kavajecz and Odders-White (2004); Osler (2005); Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: NQ prior-RTH high/low fresh breaks may continue when completed signed flow confirms the breakout direction
    across the main RTH session.
  mechanic: All-day two-sided fresh close break of prior RTH high/low with signed-flow confirmation and close-buffer grid.
  timeframe_rationale: 5-minute bars reduce one-minute noise while preserving completed prior-level acceptance, signed-flow
    confirmation, and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: The variant cannot trade unless NQ interacts with the prior RTH high/low and completed signed
      orderflow confirms the breakout or gap-hold direction.
    entry_logic_rationale: Prior RTH high/low and freshness are derived from completed previous RTH sessions. The signal uses
      a completed 5-minute bar and enters no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and rounded to the NQ tick; it rejects continuation
      if the breakout fails after entry.
    target_exit_rationale: Fixed-R target is declared before testing with no target below 1.0R; unresolved trades flatten
      at 15:55 ET.
    profitability_rationale: A real NQ prior-level breakout/orderflow effect should survive neighboring orderflow, buffer/volume/gap-hold,
      stop, and target settings after costs, monkey controls, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: Aligned flow may be exhaustion, prior-level breaks may fail after costs, gap-hold is borderline sparse,
      and results may concentrate in trend regimes.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    method: Prepared 5-minute NQ strategy bars through the same `pdh_pdl_sweep` feature path; counted entry-condition sessions
      only. No PnL, stop, target, monkey, WFA, Monte Carlo, prop simulation, or holdout result was inspected.
    all_day_signed_buffer: about 57.2 signals/year at buffer 0 and threshold 0.0; about 51.8/year at buffer 1 and threshold
      0.02
    first_half_signed_no_buffer: about 51.6/year at threshold 0.0; about 48.6/year at threshold 0.02
    all_day_signed_high_volume: about 55.6/year at volume ratio 0.75 and threshold 0.0; about 47.9/year at volume ratio 1.0
      and threshold 0.02
    morning_signed_no_buffer: included as a window-distinct expression; expected lower density than first-half but same parameter
      grid
    opening_gap_hold_signed_continuation: 'borderline sparse: about 48.1/year at threshold 0.0 and 37.1/year at threshold
      0.02; retained as a distinct acceptance expression with fail-closed caveat'
    excluded: large10, large20, and retest-hold variants were excluded before PnL because NQ pre-PnL density was materially
      below the 50 trades/year screen.
