research_metadata:
  academic_source: Pan and Poteshman (2006); Cboe put/call ratio CSVs
  edge_thesis: Lagged public Cboe put/call volume imbalance can proxy option-market directional demand or sentiment pressure
    that may spill into same-day NQ RTH returns after the cash open.
  mechanic: At 12:00:00 ET, short NQ when latest prior total Cboe put/call ratio one-day change rank is in the upper tail;
    entry is next bar open.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the Cboe state
    is already from a prior daily close.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the put/call sentiment edge through a single lagged Cboe rank state and
      fixed NQ intraday exposure.
    entry_logic_rationale: The Cboe state is from the latest prior observation strictly before the NQ session; the signal
      uses the completed configured 1-minute bar and enters no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is declared before any NQ PnL testing, rounded to the NQ tick, and varied
      only through the predeclared stop_pct grid. It is appropriate for this edge because the Cboe state is a directional
      daily sentiment proxy rather than a price level; adverse intraday movement invalidates the fixed-horizon sentiment spillover
      without using future support, resistance, VWAP, or post-entry option-flow data.
    target_exit_rationale: The fixed-R target is declared before any NQ PnL testing, kept at or above 1.5R in the grid, and
      paired with the same stop distance used for risk. This avoids selecting exits from future intraday highs/lows, final
      VWAP, or post-entry orderflow, while allowing the staged tests to reject the setup if the lagged put/call sentiment
      effect cannot produce sufficient asymmetric payoff before the 15:55 flatten.
    profitability_rationale: A real NQ option-sentiment spillover should survive neighboring Cboe-rank, stop, and target settings
      after costs and robustness tests.
    known_failure_modes: Public Cboe ratios may be noisy, may require overnight exposure, and may switch between contrarian
      and continuation behavior by regime.
    pre_test_decision: approve_for_testing
