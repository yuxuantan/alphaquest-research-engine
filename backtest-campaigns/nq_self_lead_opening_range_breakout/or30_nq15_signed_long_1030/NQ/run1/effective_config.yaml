research_metadata:
  academic_source: Gao et al. (2018) intraday momentum; Huth and Abergel (2014) lead-lag;
    Cont, Kukanov, and Stoikov (2014) orderflow imbalance.
  edge_thesis: NQ upside opening-range continuation should improve when NQ is already
    leading ES in the breakout direction and NQ aggregate flow confirms the breakout.
  mechanic: 30-minute NQ opening-range upside breakout before 10:30 ET with 15-minute
    NQ-over-ES leadership and NQ signed-flow confirmation.
  timeframe_rationale: 1-minute bars preserve the opening-range boundary, completed
    ES/NQ lead-lag features, and next-bar-open execution on the native cache.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant freezes the completed 30-minute NQ opening
      range, then trades only a completed upside close beyond that range when NQ flow
      confirms and NQ has outpaced ES over the completed 15-minute window.
    entry_logic_rationale: The opening-range boundary is unavailable until 30 RTH
      minutes have completed. Later completed bars before 10:30:00 ET can trigger
      one long NQ trade; entry is next-bar open.
    stop_loss_rationale: The stop uses the opposite opening-range edge with a predeclared
      NQ max-risk cap; unusually wide opening ranges are rejected by the stop module.
    target_exit_rationale: The fixed-R target is declared before testing and varied
      only through tp.params.target_r_multiple; unresolved trades flatten at 15:55
      ET.
    profitability_rationale: A real NQ self-lead breakout effect should remain profitable
      across neighboring flow, lead-gap, stop-cap, and target settings after commission
      and slippage.
    known_failure_modes: NQ leadership may be contemporaneous rather than predictive,
      the first breakout can be an exhaustion event, OR-edge stops may be too wide,
      and upside momentum may be regime concentrated.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    decision: PASS
    method: Entry-only session signal-count audit over declared entry grids; no PnL,
      stop, target, WFA, monkey, Monte Carlo, or holdout result was inspected.
    full_min_signals_per_year: 88.16
    limited_core_min_signals_per_year: 89.37
    limited_core_period: 2011-02-22 to 2012-09-07
