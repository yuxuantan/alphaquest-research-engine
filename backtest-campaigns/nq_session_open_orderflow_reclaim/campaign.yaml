  - min_orderflow_imbalance
  stop_tunables:
  - stop_pct
  target_tunables:
  - target_r_multiple fixed at 1.0
  parameters:
    entry.params.min_open_extension_ticks: *id001
    entry.params.min_orderflow_imbalance:
    - 0.2
    - 0.3
    - 0.4
    sl.params.stop_pct:
    - 0.001
    - 0.0015
    - 0.0025
    tp.params.target_r_multiple:
    - 1.0
rescue_policy:
