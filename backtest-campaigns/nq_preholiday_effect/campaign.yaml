timeframe: 1m
hypothesis: NQ futures may earn abnormal positive intraday returns on the last regular
  RTH session before full NYSE holidays, reflecting documented pre-holiday futures/equity-index
  return premia and lower holiday-adjacent risk bearing.
rationale: This is a direct NQ transfer of the ES pre-holiday effect family before
  any NQ PnL inspection. It is distinct from NQ weekday, turn-of-month, turn-of-year,
  Halloween, FOMC, OPEX, and volatility-managed seasonal families because the signal
  date is the deterministic final regular RTH session before a full NYSE holiday.
sources:
- title: Holiday Trading in Futures Markets
  authors: Frank J. Fabozzi, Christopher K. Ma, and James E. Briley
  year: 1994
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1994.tb04432.x
  relevance: Documents pre-holiday return effects in futures markets.
- title: 'High Stock Returns before Holidays: Existence and Evidence on Possible Causes'
  authors: Robert A. Ariel
  year: 1990
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1990.tb03731.x
  relevance: Documents unusually high U.S. stock returns on trading days before holidays.
- title: Are Seasonal Anomalies Real? A Ninety-Year Perspective
  authors: Josef Lakonishok and Seymour Smidt
  year: 1988
  venue: Review of Financial Studies
  doi: 10.1093/rfs/1.4.403
  relevance: Provides long-sample evidence on calendar seasonal anomalies including
    holidays.
