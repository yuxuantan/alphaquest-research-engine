research_metadata:
  academic_source: Donaldson and Kim (1993); Osler (2003, 2005)
  edge_thesis: NQ may react around fixed 25/50/100-point psychological handles through
    clustered stops, targets, and discretionary liquidity.
  mechanic: resistance_reject_short on completed 5-minute NQ bars from 09:35:00 to
    11:30:00, using fixed ex-ante round-number barriers and next-bar execution.
  timeframe_rationale: Five-minute bars reduce one-minute noise around fixed psychological
    handles while preserving completed-bar next-open execution.
  rescue_status: none
  pre_pnl_density:
    artifact: research_artifacts/nq_round_number_barrier_reaction_density_audit_20260622.md
    entry_combo_count: 6
    strict_corner_min_signals_per_year: 78.0504
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_round_number_barrier_reaction
  nq_port_note: NQ-specific barrier intervals were selected from pre-PnL density only.
  mechanics_review:
    mechanic_expresses_edge: 'morning_round_resistance_reject_short expresses the
      fixed psychological barrier edge by using only price handles that are known
      before the session: 25, 50, and 100 NQ points. The setup mode resistance_reject_short
      tests either failed probes that reclaim/reject a barrier or completed crosses
      that may trigger clustered stops; no prior high/low, VWAP, volume profile, orderflow-derived
      level, or post-entry information defines the level.'
    entry_logic_rationale: The entry condition is evaluated only after a completed
      5-minute RTH bar inside the predeclared time window. The intended fill is the
      next bar open or later, so a bar close that creates the signal is not filled
      on the same close. Breakout variants use only the previous completed bar close
      and current completed bar close around the fixed barrier.
    stop_loss_rationale: The stop is a predeclared percent-from-entry distance rounded
      to the NQ tick. It is not fitted to a particular barrier, day, or volatility
      regime after results, and it is intended to reject the premise when a reclaim/reject
      fails or a breakout reverses back through the clustered-liquidity zone. Same-bar
      stop/target conflicts remain pessimistic under the staged engine.
    target_exit_rationale: The take-profit is a predeclared fixed-R multiple tied
      to the initial stop distance. It does not use future price action, final VWAP,
      session range, discretionary barrier extensions, or orderflow after entry, keeping
      the exit auditable across neighboring barrier and buffer parameters.
    profitability_rationale: The NQ index level is highly visible and frequently crosses
      salient handles, so clustered discretionary orders, stops, and targets could
      create either reversal after failed probes or continuation after completed breaks.
      The campaign is still only a candidate test and must pass the full staged validation
      before any manual-review promotion.
    known_failure_modes: The pattern may be obvious and arbitraged, 25-point handles
      may be too noisy, 100-point handles may be regime-dependent, and OHLC bars may
      not reveal the true tick path around a fast barrier touch. Breakout and reclaim
      behavior can also flip sign across volatility regimes, causing a strong-looking
      top combo to fail neighboring-parameter and monkey robustness gates.
    pre_test_decision: approve_for_testing
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
strategy:
  entry:
    module: round_number_barrier
    params:
      setup_mode: resistance_reject_short
      start_time: 09:35:00
      end_time: '11:30:00'
      max_trades_per_day: 1
      tick_size: 0.25
      bar_interval_minutes: 5
      barrier_interval_points: 50.0
      buffer_ticks: 1
      max_close_distance_ticks: 12
      min_bar_range_ticks: 2
      stop_pct: 0.0025
      target_r_multiple: 1.5
  sl:
