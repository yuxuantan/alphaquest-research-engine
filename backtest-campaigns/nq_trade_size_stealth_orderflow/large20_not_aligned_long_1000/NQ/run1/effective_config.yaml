timeframe: 1m
research_metadata:
  academic_source: Barclay and Warner (1993); Easley and O'Hara (1987); Chakravarty
    (2001)
  edge_thesis: NQ large/medium trade-size signed flow can carry more information than
    residual smaller-flow pressure when the two segments disagree.
  mechanic: Uses the completed 09:45-09:59 ET rolling large20 and residual flow windows,
    enters long at the next 1-minute bar open when large20 flow dominates residual
    smaller flow.
  timeframe_rationale: 1-minute bars preserve completed rolling orderflow windows,
    next-bar-open execution after close-based signals, and pessimistic same-bar stop/target
    handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: At 10:00 ET, the variant follows positive completed 15-minute
      large20 signed-flow imbalance only when residual smaller-flow is not strongly
      aligned with the same-side large-trade pressure. This directly expresses the
      campaign edge by requiring completed-bar trade-size segmented disagreement rather
      than total signed-flow, price-only reversal, or future session information.
    entry_logic_rationale: The entry module uses only rolling trade_orderflow signed
      and bucket-volume fields through the completed signal bar. It computes total,
      large-trade, and residual smaller-flow imbalances from completed 1-minute bars,
      then enters no earlier than the next bar open at the configured fixed signal
      time.
    stop_loss_rationale: A fixed percent-from-entry stop is used because the edge
      is an informational orderflow-state hypothesis rather than a discrete chart
      boundary. The stop is declared before testing, tick-rounded by the engine, and
      subject to pessimistic same-bar stop/target ordering when intrabar path is ambiguous.
    target_exit_rationale: A fixed-R target plus same-session forced flatten tests
      whether the trade-size segmented information state monetizes quickly without
      discretionary exits or overnight exposure. The target multiple grid is frozen
      before NQ PnL and is shared across all five variants.
    profitability_rationale: If large20 buying represents informed or institutionally
      split demand while residual smaller-flow is weaker, the next short window should
      continue upward before 10:45 ET flattening. A robust result should appear across
      neighboring imbalance, disagreement, stop, and target settings, not from one
      isolated threshold corner or date range.
    known_failure_modes: Sierra large10 and large20 fields are aggregate bucket proxies,
      not parent-order reconstruction. Large-versus-residual disagreement may indicate
      liquidity-taking exhaustion instead of continuation, effects may be side- or
      time-slot-specific, and pessimistic same-bar handling can erase short-horizon
      profits after costs.
    pre_test_decision: approve_for_testing
