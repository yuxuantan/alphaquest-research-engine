research_metadata:
  academic_source: Osler (2003, 2005); Kavajecz and Odders-White (2004)
  edge_thesis: Completed NQ RTH sweeps and reclaims of pre-known overnight highs/lows may identify failed
    stop runs or stale-inventory reference points that mean-revert intraday without holding overnight.
  mechanic: From 09:30 through 12:30 ET, allow a longer reclaim window for a completed NQ sweep above
    the overnight high and close back below that high. Enter short next bar and flatten same day.
  timeframe_rationale: Five-minute bars reduce open-noise false positives while preserving completed-bar
    signal timing, next-bar-open execution, and 1-minute detail handling for higher-timeframe stop/target
    conflicts.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: From 09:30 through 12:30 ET, allow a longer reclaim window for a completed
      NQ sweep above the overnight high and close back below that high. Enter short next bar and flatten
      same day. The overnight high/low are completed before RTH and the signal waits for a completed RTH
      reclaim bar, so the trade directly expresses the failed-overnight-extreme sweep thesis.
    entry_logic_rationale: The entry module only reads completed overnight high/low values mapped to the
      RTH session and completed 5-minute RTH bars. It records a sweep beyond the overnight extreme, then
      requires a completed close back through the relevant level before any next-bar entry can occur.
    stop_loss_rationale: A fixed percent stop is predeclared because the edge is a failed reference-level
      sweep rather than a precise tick-path fill. The backtest engine rounds the stop to NQ tick size
      and uses pessimistic handling for same-bar stop/target conflicts with 1-minute detail where available.
    target_exit_rationale: A fixed-R target of at least 1.0R tests whether the post-sweep reversion is
      large enough to survive NQ costs without discretionary exits, future VWAP, final daily range, or
      future orderflow. Unresolved trades are force-flattened the same day.
    profitability_rationale: NQ overnight highs/lows are widely visible reference levels. Failed morning
      sweeps can reflect consumed stop orders or opening inventory imbalance; a robust edge should appear
      across neighboring overnight-range and reclaim-buffer thresholds rather than one isolated setting.
    known_failure_modes: Sweeps can be informed breakouts, 5-minute bars can hide adverse intra-bar path,
      the edge can concentrate in crisis sessions, and the translated NQ roll calendar must be manually
      reviewed before any candidate promotion.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_overnight_inventory_sweep_reversion_density_audit_20260623.md
    detail_csv: research_artifacts/nq_overnight_inventory_sweep_reversion_density_audit_20260623.csv
    initial_rejected_csv: research_artifacts/nq_overnight_inventory_sweep_reversion_density_reform_candidates_20260623.csv
    grid_fixed_before_pnl: true
