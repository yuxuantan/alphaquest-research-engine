research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market profile education; practitioner video supplied
    by user for mechanics only.
  edge_thesis: Completed opening-session VAP levels define auction areas of interest;
    when ES reaches those levels and completed-bar orderflow shows absorption, trapped
    traders, or same-direction acceptance, next-bar entries may have positive expectancy
    after realistic ES costs.
  mechanic: Low-volume-node reaction model using completed 60-minute opening LVNs,
    requiring adverse delta and footprint absorption to indicate trapped counterparty
    pressure.
  timeframe_rationale: One-minute bars preserve completed ES footprint and opening
    VAP fields while enforcing next-bar execution after the signal bar closes.
  mechanics_review_required: true
  mechanics_review_version: 1
  mechanics_review:
    mechanic_expresses_edge: Low-volume-node reaction model using completed 60-minute
      opening LVNs, requiring adverse delta and footprint absorption to indicate trapped
      counterparty pressure. The setup keeps the common edge intact by requiring a
      completed opening VAP area of interest plus completed-bar orderflow evidence
      before entry.
    entry_logic_rationale: The opening VAP levels are built only from the completed
      opening window and are null before their ready time; the signal bar is complete
      before evaluation and entry is no earlier than the next one-minute open.
    stop_loss_rationale: The sweep-extreme stop is placed beyond the completed signal
      bar high or low plus the configured tick offset, so stop placement depends only
      on prices known at signal time.
    target_exit_rationale: The cost-adjusted fixed-R target uses only entry price,
      stop distance, ES tick value, commission, and configured slippage, avoiding
      final profile, VWAP, or future range information.
    profitability_rationale: A wider opening window may identify more stable thin-auction
      pockets; failed tests of those pockets can create sharp rotations with bounded
      stop distance.
    known_failure_modes: Opening VAP levels may be too reactive, absorption flags
      may describe exhaustion rather than reversal or continuation, broad trend days
      can run through trap entries, and dense acceptance variants may overtrade index-wide
      news impulses.
    pre_test_decision: approve_for_testing
