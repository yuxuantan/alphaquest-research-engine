  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: daily_short_term_reversal
    params:
      setup_mode: close_to_close_reversal
      direction_mode: gain_short
      signal_time: '10:00:00'
      rth_end: '16:00:00'
      bar_interval_minutes: 5
      lookback_sessions: 1
      max_trades_per_day: 1
      min_abs_reversal_return_pct: 0.01
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
