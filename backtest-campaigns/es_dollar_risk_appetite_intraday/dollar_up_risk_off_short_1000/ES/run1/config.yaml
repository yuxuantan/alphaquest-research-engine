campaign_id: es_dollar_risk_appetite_intraday
variant_id: dollar_up_risk_off_short_1000
test_run_id: run1
strategy_name: dollar_risk_appetite
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Avdjiev, Du, Koch, and Shin (2019); Lustig, Roussanov, and Verdelhan (2011); FRED DTWEXBGS
  edge_thesis: Lagged broad-dollar strength may proxy global risk-capacity contraction and risk-off pressure for ES.
  mechanic: At 10:00 ET, short ES when the prior-business-day broad dollar one-day return ranks in the upper tail.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the dollar state is lagged by one business day.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: "09:30:00"
  rth_end: "15:59:00"
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: dollar_risk_appetite
    params:
      feature_csv: data/external/es_dollar_risk_appetite_features_20110103_20260609.csv
      setup_mode: dollar_up_short
      bar_interval_minutes: 1
      entry_time: "10:00:00"
      flatten_time: "15:55:00"
      max_trades_per_day: 1
      dollar_return_rank_min: 0.6
      stop_pct: 0.0025
      target_r_multiple: 1.5
  sl: {module: percent_from_entry, params: {stop_pct: 0.0025, round_to_tick: true}}
  tp: {module: fixed_r, params: {target_r_multiple: 1.5}}
  flatten_time: "15:55:00"
core:
  data_subset: &data_subset {start_date: "2011-01-03", end_date: "2026-06-09", session_labels: [RTH]}
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing: {mode: fixed_contracts, contracts: 1}
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: "15:55:00"
  max_trades_per_day: 1
benchmarks: &benchmarks
  min_trades_per_year: 50
  preferred_min_total_trades: 80
  min_profit_factor: 1.2
  min_total_net_profit: 0
  min_expectancy_r: 0.03
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.4
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.45
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid: &grid
  data_subset: *data_subset
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel: {enabled: true, workers: 6, scope: grid}
  parameters: &params
    entry.params.dollar_return_rank_min: [0.55, 0.6, 0.65]
    sl.params.stop_pct: [0.0015, 0.0025, 0.004]
    tp.params.target_r_multiple: [1.0, 1.5, 2.0]
monkey:
  data_subset: *data_subset
  runs: 300
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel: {enabled: true, workers: 6, scope: runs}
  constraints: {trade_count_tolerance_pct: 0.05, long_short_ratio_tolerance: 0.05, average_bars_tolerance_pct: 0.1, duration_shape: 0.7, rth_only: true, enforce_non_overlapping: true, enforce_max_trades_per_day: false}
wfa:
  data_subset: *data_subset
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_exclusive_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  parallel: {enabled: true, workers: 6, scope: window_grid}
  parameters: *params
campaign_tests: {acceptance_oos_test: {train_months: 24, test_months: 6}}
prop_rules: {starting_balance: 150000, daily_loss_limit: 4000, trailing_drawdown: 4000, max_contracts: 10, max_best_day_profit_percentage: 0.5, min_trading_days: 10, payout_threshold: 188.9, profit_target_pct: 0.06, drawdown_limit_pct: 0.0267}
monte_carlo: {trade_source: core, runs: 300, seed: 11, path_months: 6, skip_trade_probability: 0.05, adverse_slippage_per_trade: 12.5, position_sizing: {mode: fixed_contracts, contracts: 1}, cluster_losses: true, retain_path_trades: false, retain_path_events: false}
