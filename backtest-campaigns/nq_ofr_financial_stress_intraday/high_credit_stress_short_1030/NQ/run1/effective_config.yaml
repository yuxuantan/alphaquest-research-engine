campaign_id: nq_ofr_financial_stress_intraday
variant_id: high_credit_stress_short_1030
test_run_id: run1
strategy_name: nq_ofr_financial_stress
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Monin (2017); Office of Financial Research OFR FSI; Fama and French
    (1989)
  edge_thesis: Lagged daily OFR systemic financial-stress states may identify risk-off
    pressure that spills into same-day NQ RTH returns.
  mechanic: 'Pre-PnL NQ port: At 10:30 ET, short NQ when the lagged OFR credit-stress
    contribution rank is in the upper tail; flatten by 15:55.'
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open
    execution while the OFR state is already two business days old.
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: Original failed limited core grid with zero profitable combinations;
    test the adjacent upper stress-threshold neighborhood and wider same-module stop/target
    space without changing the OFR credit-stress short mechanic.
  rescue_constraints: Same entry module, setup mode, direction, signal time, data
    window, costs, stop module, target module, flatten rule, OFR two-business-day
    availability lag, and validation gates. Only existing stress threshold, stop,
    and target parameter spaces are changed.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: The edge is expressed by shorting NQ at a fixed intraday
      time when the lagged OFR stress contribution rank for the configured component
      is in its upper tail.
    entry_logic_rationale: Entry uses the configured completed NQ one-minute bar and
      an OFR feature row whose observation is available no later than session_date
      minus two business days; entry is no earlier than next bar open.
    stop_loss_rationale: The percent-from-entry stop caps adverse moves without using
      future highs, lows, VWAP, or realized post-entry path.
    target_exit_rationale: The fixed-R target is tied to the predeclared stop distance
      and avoids future-derived exit levels.
    profitability_rationale: If systemic stress creates intraday risk-off pressure
      in high-beta Nasdaq futures, the state should survive costs and neighboring
      stress/stop/target parameters.
    known_failure_modes: Reject if the stress state is already priced, mean-reverting
      intraday, crisis-concentrated, or unstable across WFA/monkey validation.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_ofr_financial_stress_intraday
    source_variant_id: high_credit_stress_short_1030
    source_run_id: rescue1
    source_config_path: campaigns/es_ofr_financial_stress_intraday/rescue_attempts/parameter_space_rescue_1/high_credit_stress_short_1030/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass
      flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR,
      and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.006
      new: 0.009
    - path: strategy.entry.params.stop_pct
      old: 0.006
      new: 0.009
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.004
      - 0.006
      - 0.008
      new: &id002
      - 0.006
      - 0.009
      - 0.012
  source_es_campaign: es_ofr_financial_stress_intraday
  source_es_config: campaigns/es_ofr_financial_stress_intraday/rescue_attempts/stop_distance_rescue_1/high_credit_stress_short_1030/config.yaml
  nq_port_note: Only symbol/data, feature CSV path, contract economics, and NQ wording
    changed before NQ PnL.
data:
  dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
