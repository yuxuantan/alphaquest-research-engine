research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Gould et al. (2013); Osler
    (2000)
  edge_thesis: Absorption around objective ES 25-point handles can identify failed
    liquidity probes and short-horizon initiation away from round-number barriers.
  mechanic: Two-sided round-number rejection. The completed signal bar must probe
    beyond the nearest 25-point handle, show the corresponding footprint absorption,
    and close back through the handle. Entry is at the next 1-minute bar open.
  timeframe_rationale: One-minute bars preserve the local footprint feature semantics
    and avoid falsely aggregating at-price imbalance across multiple bars.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant uses round numbers as an objective AOI
      where discretionary traders often expect liquidity. It only triggers when a
      probe through the handle leaves footprint evidence of absorbed aggression and
      the completed bar closes back away from that absorbed pressure.
    entry_logic_rationale: The long case needs a probe below the lower 25-point
      handle with sell imbalance below the close; the short case needs a probe above
      the upper 25-point handle with buy imbalance above the close. The close must
      confirm the rejection before the next-bar entry is allowed.
    stop_loss_rationale: The signal-bar extreme invalidates the failed-round-number
      absorption read because a further move through that extreme means the barrier
      did not hold.
    target_exit_rationale: A fixed-R target is appropriate because the expected move
      is a short-horizon rejection from a visible barrier, not a forecast of full
      session direction.
    profitability_rationale: ES quarter-hundred handles can concentrate resting
      orders and discretionary attention. If aggressive pressure through a handle
      is absorbed and price closes back away from it, trapped participants may create
      enough follow-through to pay costs.
    known_failure_modes: Round-number effects can be weak after costs; the nearest
      handle may not be a real liquidity area on all days; and trend days can slice
      through handles without reversal.
    pre_test_decision: approve_for_testing
