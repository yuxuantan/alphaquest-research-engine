symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: High-volume first-60-minute downside opening drives with aligned aggressive sell flow may continue after the first hour if cumulative delta remains supportive.
  mechanic: Use only the completed 09:30-10:29 ET opening window. At 11:30 ET, go short when opening return, opening signed-flow imbalance, opening volume rank, and current cumulative delta remain aligned; flatten at 13:30 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve next-bar-open execution and expose same-bar stop/target conflicts to the pessimistic OHLC handler.
