research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); CME Micro E-mini
    product documentation; Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Elevated MES smaller-contract participation during an NQ pullback may mark crowding; require the
    fade to align with a prior completed NQ trend.
  mechanic: 10:30 ET two-sided NQ pullback fade using MES trade-count participation over the completed 15-minute
    pullback window and a prior 30-minute NQ trend filter.
  timeframe_rationale: One-minute bars preserve the fixed 10:30 completed-bar checkpoint, the 15-minute pullback
    window, the prior 30-minute trend window, and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: 10:30 ET two-sided NQ pullback fade using MES trade-count participation over the completed
      15-minute pullback window and a prior 30-minute NQ trend filter.
    entry_logic_rationale: The signal is evaluated at the completed 10:29-10:30 bar close. MES trade-share rank
      and NQ pullback return are completed-bar fields; the trend window ends 15 minutes before the signal so the
      trend filter cannot see the pullback itself.
    stop_loss_rationale: A fixed percent stop is used because the setup is a timed trend-pullback/crowding condition
      rather than a discrete chart boundary. The stop is declared before NQ testing, tick-rounded by the engine,
      and evaluated with pessimistic same-bar ordering.
    target_exit_rationale: A fixed-R target with same-day forced flatten tests whether the pullback reversal can
      monetize without overnight exposure, discretionary exits, or post-entry orderflow conditions.
    profitability_rationale: If smaller-contract participation marks crowded temporary pressure, then fading that
      pressure should be most defensible when the trade rejoins the prior NQ trend rather than fights it. The pre-PnL
      density audit cleared every declared entry-grid corner before NQ PnL was inspected.
    known_failure_modes: MES participation may not represent NQ-specific uninformed crowding, the prior trend can
      already be exhausted, pullbacks may continue after news shocks, and the average reversal may be too small
      after NQ commission, slippage, and pessimistic OHLC stop-target sequencing.
    pre_test_decision: approve_for_testing
    source_es_template: campaigns/es_trend_filtered_mes_participation_crowding/rescue_attempts/parameter_space_rescue_1/morning_trade_trend_pullback_reversal_1030/config.yaml
    ported_before_nq_pnl: true
  pre_pnl_density:
    artifact: research_artifacts/nq_trend_filtered_mes_participation_crowding_density_audit_20260622.md
    status: approved_for_testing
    variant_min_signals_per_year: 60.546453
    variant_max_signals_per_year: 80.400058
