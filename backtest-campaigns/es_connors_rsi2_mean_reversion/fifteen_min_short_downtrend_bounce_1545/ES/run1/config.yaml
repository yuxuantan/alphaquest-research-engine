campaign_id: es_connors_rsi2_mean_reversion
variant_id: fifteen_min_short_downtrend_bounce_1545
test_run_id: run1
strategy_name: connors_rsi2_mean_reversion
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 15m
research_metadata:
  academic_source: Connors and Alvarez (2009); StockCharts ChartSchool RSI(2)
  edge_thesis: RSI2 overbought bounces in an intraday ES downtrend can mean-revert before the RTH close.
  mechanic: Use completed 15-minute bars. Short ES when RSI2 is overbought while price remains below the configured moving-average trend filter.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: pdh_pdl_sweep
  warmup_days: 10
  rth_start: "09:30:00"
  rth_end: "15:59:00"
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: connors_rsi2_mean_reversion
    params:
      setup_mode: short_bounce_downtrend
      trend_filter: ma
      rsi_period: 2
      moving_average_period: 100
      tick_size: 0.25
      bar_interval_minutes: 15
      oversold_rsi: 10
      overbought_rsi: 90
      min_vwap_extension_ticks: 0
      earliest_entry_time: "10:00:00"
      latest_entry_time: "15:15:00"
      flatten_time: "15:45:00"
      max_trades_per_day: 1
      allow_long: false
      allow_short: true
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: "15:45:00"
core:
  data_subset: &data_subset
    start_date: "2011-01-03"
    end_date: "2026-06-09"
    session_labels: [RTH]
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: "15:45:00"
  max_trades_per_day: 1
benchmarks: &benchmarks
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.10
  min_cagr: 0.0
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid: &grid
  data_subset: *data_subset
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &parameters
    entry.params.overbought_rsi: [85, 90, 95]
    entry.params.moving_average_period: [50, 100, 200]
    sl.params.stop_pct: [0.0025, 0.004, 0.006]
    tp.params.target_r_multiple: [1.0, 1.5, 2.0]
monkey:
  data_subset: *data_subset
  runs: 300
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *data_subset
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_exclusive_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  parameters: *parameters
  parallel:
    enabled: true
    workers: 6
    scope: window_grid
campaign_tests:
  acceptance_oos_test:
    train_months: 24
    test_months: 6
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 10
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 300
  seed: 11
  path_months: 6
  skip_trade_probability: 0.05
  adverse_slippage_per_trade: 12.5
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: true
  retain_path_trades: false
  retain_path_events: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
