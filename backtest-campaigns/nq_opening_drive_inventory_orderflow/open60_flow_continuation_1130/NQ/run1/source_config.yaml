research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Heston, Korajczyk, and Sadka (2010); Cont, Kukanov,
    and Stoikov (2014)
  edge_thesis: High-volume first-60-minute NQ downside opening drives with aligned aggressive sell flow
    may persist into late morning when cumulative delta remains aligned.
  mechanic: Use only the completed 09:30-10:29 ET opening window. At 11:30 ET, go short when opening return,
    signed-flow imbalance, prior-session opening-volume rank, and current cumulative delta remain aligned;
    flatten at 13:30 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve next-bar-open execution and expose same-bar stop/target
    conflicts to the pessimistic OHLC handler.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: The opening_drive_flow_continuation setup uses only the completed first-60-minute
      NQ RTH opening window, completed aggregate signed-volume imbalance, and opening-volume rank computed
      from prior sessions before the 11:30:00 signal.
    entry_logic_rationale: The entry module evaluates the due slot at the completed 11:30:00 bar-close
      timestamp; the backtest engine handles next-bar execution and no current-session opening-volume
      value is appended to rank history until after the signal decision.
    stop_loss_rationale: The fixed percent-from-entry stop is declared before testing, varied only through
      sl.params.stop_pct, and rounded to NQ tick size.
    target_exit_rationale: The fixed-R target is declared before testing, varied only through tp.params.target_r_multiple,
      and unresolved trades flatten at 13:30:00 ET.
    profitability_rationale: A real NQ opening-drive inventory effect should survive neighboring opening-return
      thresholds, opening-volume-rank thresholds, stops, and targets after commission and slippage for
      this short short-pressure setup.
    known_failure_modes: NQ opening drives may reverse violently, aggregate Sierra signed-volume is not
      quote-level OFI, opening-volume rank can select sparse regimes, and edge performance may concentrate
      in a few volatility regimes or crisis dates.
    pre_test_decision: approve_for_testing
