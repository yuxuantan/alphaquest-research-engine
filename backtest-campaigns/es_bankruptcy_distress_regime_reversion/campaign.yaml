  - es_volume_shock_liquidity_reversal
  - es_prior_day_stop_run_reclaim
  - es_vwap_pullback_continuation
  - es_cftc_tff_hedging_pressure
  - es_market_plumbing_liquidity_capacity
  conclusion: Not a duplicate of active failed campaigns. Archived bankruptcy/distress
    tests are historical context only and do not block this fresh active campaign
    under the current policy.
