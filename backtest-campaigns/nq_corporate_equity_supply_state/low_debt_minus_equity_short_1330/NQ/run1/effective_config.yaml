research_metadata:
  academic_source: Baker and Wurgler (2000) equity share in new issues; FRED Z.1 corporate
    financing series
  edge_thesis: Lagged aggregate corporate equity issuance and financing mix may mark
    equity supply pressure that weakens same-day NQ intraday drift.
  mechanic: At 13:30 ET, short NQ when the 180-calendar-day-lagged debt-minus-equity
    financing mix rank is depressed. Flatten by 15:55 ET unless stop or target is
    hit.
  timeframe_rationale: One-minute bars provide deterministic completed-bar timing
    and next-bar-open execution while the corporate financing state is quarterly and
    conservatively lagged.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the same edge through the mirror
      image of financing mix: debt issuance is low relative to equity issuance, implying
      an equity-heavy financing regime.'
    entry_logic_rationale: The corporate financing state comes from a feature table
      that requires a 180-calendar-day availability lag, and the intraday signal is
      emitted only on the completed one-minute bar ending at the configured entry
      time.
    stop_loss_rationale: The percent stop is declared before any PnL inspection, rounded
      to the NQ tick by the engine, and evaluated under the existing pessimistic same-bar
      stop-target ordering.
    target_exit_rationale: The fixed-R target and 15:55 ET flatten are declared before
      testing and do not depend on final VWAP, final session range, future corporate
      financing values, or discretionary exits.
    profitability_rationale: If high aggregate equity supply or equity-heavy financing
      reflects market timing and future return pressure, the short branch should survive
      staged validation after costs.
    known_failure_modes: The quarterly signal may be too stale for intraday NQ, may
      overlap valuation/sentiment/credit regimes, or may concentrate in a few issuance
      regimes and fail robustness.
    data_availability_caveat: FRED publishes Z.1 quarterly observations after quarter
      end; all staged tests use a conservative 180-calendar-day lag, but real-time
      release calendars still require manual review if this passes.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_corporate_equity_supply_state_density_audit_20260701.md
    status: passed_before_pnl
strategy:
  entry:
    module: corporate_equity_supply_state
    params:
      setup_mode: low_debt_minus_equity_short
      feature_csv: data/external/nq_corporate_equity_supply_features_20110103_20260612.csv
      state_name: low debt-minus-equity financing mix
      value_column: debt_minus_equity_to_market_4q
      rank_column: debt_minus_equity_to_market_4q_rank_40q
      supply_rank_threshold: 0.25
      entry_time: '13:30:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  flatten_time: '15:55:00'
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
