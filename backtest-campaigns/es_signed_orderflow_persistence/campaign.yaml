campaign_id: es_signed_orderflow_persistence
title: ES Signed Orderflow Persistence
decision: failed
created_at: "2026-06-15"
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: >
  Completed-bar aggressive signed orderflow in ES can persist over short
  intraday horizons when price movement confirms the imbalance, because large
  orders are split over time and liquidity providers demand compensation for
  adverse-selection risk.
rationale: >
  The campaign tests ES's own aggregate signed volume, not MES/ES divergence and
  not a fixed time-of-day long premium. Each variant waits for a completed
  RTH 1-minute bar whose rolling signed-flow imbalance and rolling return agree,
  then enters on the next bar open with explicit costs and flatten timing.
sources:
  - title: The Price Impact of Order Book Events
    authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
    year: 2014
    venue: Journal of Financial Econometrics
    doi: 10.1093/jjfinec/nbt003
    link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
    relevance: >
      Documents short-horizon price impact from order-flow imbalance. This
      campaign uses a Sierra aggregate trade-side proxy for aggressive flow,
      not full limit-order-book OFI.
  - title: Flow Toxicity and Liquidity in a High-frequency World
    authors: David Easley, Marcos Lopez de Prado, Maureen O'Hara
    year: 2012
    venue: Review of Financial Studies
    doi: 10.1093/rfs/hhs053
    link: https://academic.oup.com/rfs/article-abstract/25/5/1457/1569929
    relevance: >
      Supports the idea that order-flow imbalance can identify adverse-selection
      pressure. The implementation uses signed-volume imbalance, not VPIN proper.
  - title: How Markets Slowly Digest Changes in Supply and Demand
    authors: Jean-Philippe Bouchaud, J. Doyne Farmer, Fabrizio Lillo
    year: 2009
    venue: Handbook of Financial Markets
    link: https://arxiv.org/abs/0809.0822
    relevance: >
      Reviews persistent order-flow and gradual incorporation of supply-demand
      information. The strategy translates this into intraday ES continuation
      tests with short forced holds.
data_needs:
  - timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
  - signed_volume, buy_volume, sell_volume, large10/large20 signed and total volume
  - deterministic trade_orderflow_features built from completed bars only
lookahead_risks:
  - Rolling imbalance and return columns must use only completed bars ending at the signal timestamp.
  - A signal at HH:MM uses the bar that closed at HH:MM and can only enter at the HH:MM next-bar open.
  - No future session totals, future VWAP, final daily ranges, or final volume profile values are used.
  - Flatten and no-overnight checks are config-driven and must remain earlier than the prop cutoff.
failure_modes:
  - Signed-volume classification from Sierra aggregate bars is a proxy and may be weaker than print-level aggressor labels.
  - Apparent edge may come from one volatile regime, one side, or one time window.
  - Flow imbalance may be too autocorrelated to beat costs after next-bar execution and slippage.
  - Late-day variants can fail if same-bar stop/target ordering or forced flatten dominates expectancy.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_mes_micro_flow_divergence_reversion
    - es_prior_session_ibs_reversion
    - es_connors_rsi2_mean_reversion
    - es_range_compression_breakout
    - es_rth_intraday_risk_premium
    - es_overnight_intraday_reversal
  conclusion: >
    Not a duplicate of the active failed campaigns. It tests own-ES signed-flow
    continuation from aggregate orderflow, not MES/ES divergence, prior-session
    IBS, Connors RSI2, range compression, fixed RTH premium, or overnight gap
    reversal.
variants:
  - early_5m_signed_flow_continuation_1000
  - late_morning_15m_signed_flow_continuation_1130
  - midday_30m_signed_flow_continuation_1230
  - afternoon_60m_signed_flow_continuation_1400
  - late_large20_30m_flow_continuation_1500
result_summary:
  decision: FAIL
  report: backtest-campaigns/es_signed_orderflow_persistence/campaign_test_summary.json
  original_runs: 5
  rescue_runs: 5
  wfa_reached: 0
  monte_carlo_reached: 0
  failure_reason: >
    All five original variants and all five per-failed-variant
    parameter-space-only rescues failed the limited core-grid profitable-combo
    gate before monkey, WFA, Monte Carlo, or frozen validation.
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
    - change fixed parameters inside existing strategy modules
    - change tunable parameter space inside existing strategy modules
  forbidden_changes:
    - change entry module
    - change stop-loss module
    - change take-profit module
    - change core economic edge
    - add or remove filters after seeing results
