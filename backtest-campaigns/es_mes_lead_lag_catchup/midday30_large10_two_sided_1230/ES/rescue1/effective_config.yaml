campaign_id: es_mes_lead_lag_catchup
variant_id: midday30_large10_two_sided_1230
test_run_id: rescue1
strategy_name: es_mes_lead_lag_catchup
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: ES may catch up when completed MES price movement and MES aggregate
    large-trade flow lead ES over a short intraday window.
  mechanic: From 12:00 through 14:00 ET, use completed rolling 30-minute MES and ES
    windows. Trade ES in the MES direction only if MES moved materially, ES lags MES
    by the configured gap, and MES large10 flow confirms the MES direction.
  timeframe_rationale: The ES/MES feature cache is built on completed aligned 1-minute
    RTH bars, so the strategy stays on 1-minute bars to preserve the lead-lag window
    semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: 'This variant tests the same MES-to-ES catch-up mechanism
      using MES large10 aggregate flow. MES must lead over a completed 30-minute price
      window, ES must lag by a configured tick gap, and larger MES flow must confirm
      the MES direction.

      '
    entry_logic_rationale: 'The 12:00-14:00 ET window tests the quieter midday period
      where cross-contract catch-up may take longer because ES liquidity is less concentrated
      than at the open. Large10 flow is fixed as confirmation to avoid relying only
      on noisy small flow.

      '
    stop_loss_rationale: 'The stop is beyond the completed signal-bar extreme with
      a fixed tick offset. That level is known before the next-bar entry and invalidates
      the catch-up thesis if price immediately moves against the MES-led direction.

      '
    target_exit_rationale: 'The fixed-R target keeps the exit tied to predeclared
      risk rather than a future level. The 14:30 ET flatten gives a midday catch-up
      enough time while still forcing same-session exposure control.

      '
    profitability_rationale: 'If larger MES trades sometimes reveal same-underlying
      pressure before ES has fully adjusted, this variant should show broad parameter
      stability instead of depending on one exact lag threshold or target multiple.

      '
    known_failure_modes: 'MES large10 flow may be sparse, the midday signal may select
      stale cross-contract differences, and ES may not need to catch up because the
      markets are already synchronized by the next open.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameters and declared parameter grids inside
    existing modules: increased the required MES-vs-ES lag grid, used a quicker fixed-R
    target grid, and modestly strengthened fixed MES flow confirmation where applicable.
    Entry module, stop module, target module, data, timeframe, direction logic, costs,
    fill assumptions, stage criteria, and prop rules are unchanged.'
