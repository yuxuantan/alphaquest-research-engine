campaign_id: es_mes_lead_lag_catchup
variant_id: afternoon60_signed_two_sided_1400
test_run_id: run1
strategy_name: es_mes_lead_lag_catchup
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: ES may catch up when completed MES price movement and MES aggregate
    signed flow lead ES over a longer intraday window.
  mechanic: From 13:00 through 15:00 ET, use completed rolling 60-minute MES and ES
    windows. Trade ES in the MES direction only if MES moved materially, ES lags MES
    by the configured gap, and MES signed flow confirms the MES direction.
  timeframe_rationale: The ES/MES feature cache is built on completed aligned 1-minute
    RTH bars, so the strategy stays on 1-minute bars to preserve the lead-lag window
    semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses a slower MES-to-ES catch-up.
      It requires a completed 60-minute MES price lead, a still-visible ES lag, and
      same-direction MES signed aggregate flow before ES is allowed to enter in the
      MES direction.

      '
    entry_logic_rationale: 'The 13:00-15:00 ET window asks whether a larger, more
      persistent MES lead matters after midday liquidity has developed. The ES-lag
      requirement prevents the rule from trading when ES has already fully absorbed
      the MES move.

      '
    stop_loss_rationale: 'The sweep-extreme stop uses only the completed signal bar
      and a fixed tick offset. It rejects the trade if the first post-signal ES movement
      breaks the adverse side of the bar that defined the MES catch-up setup.

      '
    target_exit_rationale: 'A fixed-R target and 15:55 ET flatten match the short
      remaining RTH window. The exit does not use future session highs, lows, VWAP,
      or any post-signal data to optimize the target.

      '
    profitability_rationale: 'If MES leadership survives beyond the opening and ES
      reacts slowly to same-underlying pressure, a larger 60-minute lead should be
      visible across neighboring thresholds, not only at one exact parameter point.

      '
    known_failure_modes: 'A 60-minute MES lead may be stale by 14:00 ET, late-day
      flows may reverse before ES catches up, and the shorter post-entry runway may
      make targets difficult to hit after costs.

      '
    pre_test_decision: approve_for_testing
