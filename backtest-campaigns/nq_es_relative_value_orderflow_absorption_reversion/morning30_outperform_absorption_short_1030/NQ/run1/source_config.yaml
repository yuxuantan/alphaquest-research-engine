research_metadata:
  academic_source: Gatev, Goetzmann, and Rouwenhorst (2006); Huth and Abergel (2014); Cont, Kukanov, and Stoikov (2014); Schmidt,
    Cestonaro, and Bender (2024)
  edge_thesis: From 10:00:00 through 11:00:00 ET, short NQ only when NQ has outperformed ES over 30 completed minutes and
    NQ signed flow is already negative.
  mechanic: 30-minute short-only NQ outperformance fade with NQ sell-absorption confirmation and next-bar execution.
  timeframe_rationale: One-minute bars preserve completed ES/NQ rolling return spreads and rolling NQ signed-flow imbalance
    while allowing exact next-bar execution after the decision bar closes.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: NQ must be the dislocated leg versus ES, and completed NQ signed flow must be counter to the
      NQ price leg, so price divergence alone cannot trigger.
    entry_logic_rationale: From 10:00:00 through 11:00:00 ET, take the first completed one-minute bar per session where the
      NQ/ES return spread meets the configured threshold and NQ signed-flow absorption over the same completed lookback is
      counter to the NQ price leg. Entry is next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and rounded to the NQ tick. It rejects the convergence
      thesis if NQ continues away from ES after next-bar execution rather than mean-reverting.
    target_exit_rationale: The fixed-R target is independent of future ES/NQ bars, future orderflow, VWAP, or discretionary
      spread levels. Any unresolved trade is flattened at the predeclared intraday cutoff.
    profitability_rationale: A real NQ/ES absorption reversion effect should survive neighboring spread, absorption, stop,
      and target settings after costs, random-entry monkey controls, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: The NQ/ES divergence may be information-driven, signed flow can be noisy or late, trading only NQ
      may not monetize true pair convergence, and profits can concentrate in a narrow regime or one side.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    decision: PASS
    method: Entry-condition session count only over declared windows and entry grids; no PnL, stop, target, monkey, WFA, Monte
      Carlo, prop simulation, or holdout result was inspected.
    common_strict_corner: min_spread_bps=8 and min_absorption_imbalance=0.01
    strict_corner_signals_per_year:
      morning15_two_sided_absorption_1000: 115.7
      morning30_underperform_absorption_long_1030: 50.8
      morning30_outperform_absorption_short_1030: 68.3
      late_morning30_two_sided_absorption_1130: 108.3
      midday60_two_sided_absorption_1400: 76.3
