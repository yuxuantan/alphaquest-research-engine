      flatten_time: '15:55:00'
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 1.5
      change_rank_max: 0.425
      setup_mode: vix_crush_rebound_long
      entry_time: '12:00:00'
      availability_market: NQ
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
