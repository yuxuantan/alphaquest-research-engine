campaign_id: nq_cboe_vix_level_state_intraday
variant_id: persistent_high_vix_long_1330
test_run_id: run1
strategy_name: cboe_vix_level_state
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Whaley (2000); Cboe VIX historical data; practitioner VIX risk-regime
    research
  edge_thesis: Lagged VIX level and change states may identify same-day NQ intraday
    risk pressure or rebound because Nasdaq futures are highly sensitive to broad
    equity volatility repricing.
  mechanic: At 13:30 ET, buy NQ when the latest prior five-day VIX mean rank is high,
    expressing risk-premium rebound after persistent stress.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open
    execution while the VIX state is already from a prior daily close before the NQ
    session date.
  rescue_reason: Original persistent high-VIX long failed core with 0/27 profitable
    combinations; rescue preserves the same 5-session VIX mean high-state long mechanic
    and tests the adjacent rank neighborhood with wide-stop/high-R exits.
  pre_pnl_port_note: This NQ port uses the latest relevant ES rescue/parameter-space
    grid before any NQ PnL inspection; no NQ rescue attempt is authorized in this
    run.
  source_es_config_path: campaigns/es_cboe_vix_level_state_intraday/rescue_attempts/parameter_space_rescue_1/persistent_high_vix_long_1330/config.yaml
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the VIX level/change edge by using
      only lagged Cboe VIX closes and rolling ranks available strictly before the
      NQ session date. Direction and entry time are fixed before testing and do not
      use future NQ price, final session range, VWAP, or same-session VIX close.
    entry_logic_rationale: The signal is evaluated after a completed 1-minute RTH
      NQ bar at the configured decision timestamp, with intended execution at the
      decision timestamp/next-bar boundary as handled by the staged engine. The daily
      VIX feature is lagged by one session, so the intraday decision has no same-day
      VIX close leakage.
    stop_loss_rationale: The stop is a predeclared percent-from-entry distance rounded
      to the NQ tick. It is not changed after NQ results, and same-bar stop/target
      conflicts are left to the pessimistic OHLC fill policy.
    target_exit_rationale: The take-profit is a predeclared fixed-R multiple tied
      to the initial stop distance, with forced flatten by 15:55 ET. It does not use
      post-entry VIX observations, final daily range, or discretionary exits.
    profitability_rationale: If VIX level or daily VIX changes proxy broad equity
      risk pressure, NQ may show stronger intraday response because of high beta and
      duration/growth sensitivity. This remains only a candidate test unless the full
      staged validation passes.
    known_failure_modes: VIX is a broad SPX option state and may be too slow, already
      priced overnight, or redundant with already rejected VIX term-structure and
      VVIX edges. A core-only pass may be schedule luck and must clear monkey and
      WFA.
    pre_test_decision: approve_for_testing
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
