variant_id: opening_5m_volume_flush_reclaim_long_1100
research_metadata:
  academic_source: Lehmann (1990); Llorente, Michaely, Saar, and Wang (2002); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: NQ high-volume sell-flush bars below cumulative VWAP may reflect temporary
    liquidity pressure that mean-reverts after next-bar execution.
  mechanic: '5-minute opening sell-flush long from 09:30 to 11:00 ET: completed down
    bar below cumulative VWAP, close near low, high relative volume, and oversold
    session RSI.'
  timeframe_rationale: The entry module aggregates completed 1-minute NQ bars into
    the declared flush window while preserving native 1-minute execution and stop/target
    ordering.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: opening_5m_volume_flush_reclaim_long_1100 expresses the
      capitulation mean-reversion edge by requiring a completed down bar that closes
      near its low, below cumulative session VWAP, with high relative volume and oversold
      session RSI. The signal is long-only and does not use future high/low, final
      VWAP, or post-entry orderflow.
    entry_logic_rationale: The entry condition is evaluated only after the completed
      sell-flush bar. The module builds RSI and average volume from completed bars
      in the current session, and the backtest engine enters no earlier than the next
      bar open after the signal bar close.
    stop_loss_rationale: The percent-from-entry stop is predeclared and rounded to
      the NQ tick. It rejects the snapback thesis when selling pressure continues
      after the completed capitulation signal; same-bar stop/target conflicts remain
      pessimistic.
    target_exit_rationale: The fixed-R target monetizes a bounded snapback without
      using a discretionary level, future VWAP, final daily range, or orderflow after
      entry. Unresolved trades are force-flattened at the declared same-day time.
    profitability_rationale: NQ often has sharp intraday de-risking bursts around
      growth and mega-cap exposure; if some high-volume sell bars represent temporary
      liquidity pressure rather than information, next-bar snapback could survive
      costs across broad neighboring thresholds.
    known_failure_modes: The completed down bar may be early in a real trend day,
      RSI can stay oversold, volume-only filters may be too broad, and a narrow top
      combo can still fail monkey, WFA, Monte Carlo, or incubation gates.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_intraday_capitulation_mean_reversion_density_audit_20260623.md
    entry_combo_count: 9
    nq_grid_fixed_before_pnl: true
    density_reformulation: signed-sell imbalance was removed from the grid before
      PnL because it failed latest-year signal density.
  nq_only_note: This campaign is formulated directly for NQ sell-flush snapback, not
    ported from an ES pass.
