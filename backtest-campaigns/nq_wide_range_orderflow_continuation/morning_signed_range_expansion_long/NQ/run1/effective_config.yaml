timeframe: 5m
research_metadata:
  academic_source: Llorente, Michaely, Saar, and Wang (2002); Cont, Kukanov, and Stoikov
    (2014); Bouchaud, Farmer, and Lillo (2009)
  edge_thesis: Morning upside range expansion with aligned signed aggregate flow may
    continue intraday.
  mechanic: From 09:35 through 11:30 ET, enter long only after a completed 5-minute
    NQ bar has a wide range, a positive body, closes near its high, has at least normal
    relative volume, and has same-direction completed signed-volume imbalance.
  timeframe_rationale: Five-minute bars reduce one-minute noise while keeping the
    signal close enough to the pressure event for next-bar execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge because price action
      must first show a completed upside range-expansion bar closing near the high;
      aggregate signed flow is only a confirmation that the expansion had participation
      rather than being a thin-price print.
    entry_logic_rationale: The morning window is liquid and captures post-open information
      digestion after the first print. Long-only direction avoids mixing upside and
      downside behavior, and the 4-12 tick range grid keeps the strict corner dense
      enough before PnL is inspected.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, independent
      of future levels, and invalidates continuation when the post-entry move cannot
      withstand ordinary NQ noise.
    target_exit_rationale: A fixed-R target is predeclared, avoids fitting to future
      session highs or lows, and lets WFA and monkey tests decide whether the continuation
      impulse has enough payoff after costs.
    profitability_rationale: It should be profitable only if morning upside range
      expansion with aligned completed flow reflects order splitting or information
      pressure that continues after the next-bar entry rather than immediate exhaustion.
    known_failure_modes: The bar may be exhaustion rather than continuation, the aggregate
      flow proxy may lag price, the effect may concentrate in volatile regimes, and
      one-tick worse slippage can erase a narrow edge.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    full_history_min_signals_per_year: '>=140.62 across the strictest declared corners'
    limited_core_random_window_min_signals_per_year: '>=134.29 across the strictest
      declared corners'
    latest_window_min_signals: '>=118 across the strictest declared corners'
    artifact: research_artifacts/nq_wide_range_orderflow_continuation_density_audit_20260630.md
