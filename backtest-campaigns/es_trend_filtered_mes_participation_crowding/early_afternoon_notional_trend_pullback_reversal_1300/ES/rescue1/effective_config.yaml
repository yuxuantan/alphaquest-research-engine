research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets
    (2024); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Elevated MES smaller-contract participation during an ES pullback may
    mark crowding; require the fade to align with a prior completed ES trend.
  mechanic: 13:00 ET two-sided ES pullback fade using MES notional-equivalent participation
    over the completed 60-minute pullback window and a prior 120-minute ES trend filter.
  timeframe_rationale: 1-minute bars preserve completed ES/MES participation features,
    exact fixed-time signal evaluation, and next-bar-open execution timing.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the composite crowding-pullback
      edge by requiring elevated MES notional participation during a completed 60-minute
      ES pullback and then fading only when the reversal is back in the direction
      of a completed prior ES trend window that ends before the pullback starts.
    entry_logic_rationale: The signal is evaluated at the completed bar close for
      13:00:00 ET. The MES participation rank and ES pullback return are completed-bar
      features, while the trend return is computed from closes ending 60 minutes before
      the signal, preventing the trend filter from seeing the pullback or future bars.
    stop_loss_rationale: A fixed percent stop is used because the setup is a timed
      trend-pullback/crowding condition rather than a discrete chart boundary. The
      stop is declared before testing, tick-rounded by the engine, and evaluated with
      pessimistic same-bar ordering.
    target_exit_rationale: A fixed-R target with forced flatten at 15:00:00 ET tests
      whether the pullback reversal can monetize inside the intended same-day window
      without overnight exposure, discretionary exits, or post-entry orderflow conditions.
    profitability_rationale: If smaller-contract participation marks crowded temporary
      pressure, then fading that pressure should be most defensible when the trade
      rejoins the prior ES trend rather than fights it. The pre-PnL density audit
      found 51.5 to 69.6 signals/year across the declared entry grid before any PnL
      was inspected.
    known_failure_modes: MES participation may not represent uninformed crowding,
      the prior trend can already be exhausted, pullbacks may continue after news
      shocks, and the average reversal may be too small after ES commission, slippage,
      and pessimistic OHLC stop-target sequencing.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    scope: parameter_space_only
    reason: Original variant failed before WFA; rescue changes only declared parameter
      grids and fixed default parameters inside the same entry/stop/target modules.
    density_audit: research_artifacts/es_trend_filtered_mes_participation_crowding_rescue_attempt_1_density_audit_20260618.md
    forbidden_changes_observed: false
