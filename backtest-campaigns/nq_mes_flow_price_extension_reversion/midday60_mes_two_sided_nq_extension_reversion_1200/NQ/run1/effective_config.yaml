campaign_id: nq_mes_flow_price_extension_reversion
variant_id: midday60_mes_two_sided_nq_extension_reversion_1200
test_run_id: run1
strategy_name: trade_orderflow_pressure
symbol: NQ
dataset_id: nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  edge_thesis: A completed 60-minute MES/NQ flow-pressure imbalance plus same-direction
    NQ price extension can mark a two-sided midday fade.
  mechanic: At 12:00 ET, fade the direction of completed 11:00-11:59 MES-minus-NQ
    flow pressure when NQ's same 60-minute return extends in that direction; flatten
    at 14:00 ET.
  no_lookahead_note: Uses only completed rolling features on the 11:59 ET bar; entry
    is next-bar-open or later.
  density_audit: research_artifacts/nq_mes_flow_price_extension_reversion_density_audit_20260623.md
  mechanics_review_required: true
  mechanics_review:
    pre_test_decision: approve_for_testing
    mechanic_expresses_edge: Completed 60-minute MES/NQ flow pressure must coincide
      with same-direction NQ price extension before a two-sided fade is allowed.
    entry_timing: The signal consumes the completed 11:59 ET bar; entry is no earlier
      than the next bar open.
    failure_mode: Reject if the added price-extension gate does not survive core,
      monkey, WFA, Monte Carlo, incubation, and acceptance.
    entry_logic_rationale: 'The entry uses only the completed 11:00-11:59 ET MES-minus-NQ
      flow imbalance and NQ return. Positive flow plus positive return is faded short,
      while negative flow plus negative return is faded long.

      '
    stop_loss_rationale: 'The percent stop is fixed before testing and tick-rounded
      by the engine, limiting losses when a two-sided midday extension continues instead
      of reverting.

      '
    target_exit_rationale: 'The fixed-R target and 14:00 ET flatten are intraday-only
      and do not use future session high/low, VWAP, final range, or post-entry discretionary
      information.

      '
    profitability_rationale: 'A real two-sided extension-reversion edge should survive
      costs and show stability across neighboring flow, return, stop, and target parameters,
      with balanced long/short behavior reviewed by downstream reports.

      '
    known_failure_modes: 'The signal may simply select trend continuation hours, one
      side may carry all returns, MES may not proxy NQ crowding, or monkey/WFA/Monte
      Carlo validation may show the edge is timing noise.

      '
