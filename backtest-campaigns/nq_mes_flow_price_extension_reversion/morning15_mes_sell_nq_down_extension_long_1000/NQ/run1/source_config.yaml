timeframe: 1m
research_metadata:
  edge_thesis: Completed MES sell pressure versus NQ plus completed NQ downside extension can mark temporary risk-off crowding to fade.
  mechanic: At 10:00 ET, long NQ when completed 09:45-09:59 NQ-minus-MES imbalance indicates relative MES sell pressure and NQ's same 15-minute return is down enough; flatten at 11:31 ET.
  source_campaign_context: Distinct price-extension gate on top of the rejected NQ MES micro-flow divergence family.
  no_lookahead_note: Uses only completed rolling features on the 09:59 ET bar; entry is next-bar-open or later.
  density_audit: research_artifacts/nq_mes_flow_price_extension_reversion_density_audit_20260623.md
  mechanics_review_required: true
  mechanics_review:
    pre_test_decision: approve_for_testing
    mechanic_expresses_edge: Completed MES/NQ sell-pressure proxy must coincide with completed NQ downside extension before a long fade is allowed.
    entry_timing: The signal consumes the completed 09:59 ET bar; entry is no earlier than the next bar open.
    failure_mode: Reject if the added price-extension gate does not survive core, monkey, WFA, Monte Carlo, incubation, and acceptance.
    entry_logic_rationale: >
      The entry requires a completed 15-minute relative MES sell-pressure proxy
      and a completed NQ downside return by the 10:00 ET signal close. This
      tests whether downside flow/price extensions mean-revert without using
      future bars.
    stop_loss_rationale: >
      The percent-from-entry stop is fixed before testing, tick-rounded by the
      engine, and limits adverse losses when the downside extension continues
      rather than reverts.
    target_exit_rationale: >
      The fixed-R target and 11:31 ET flatten are declared before testing and
      avoid final-session VWAP, high/low, range, or discretionary post-entry
      information.
    profitability_rationale: >
      A valid liquidity-demand fade should remain profitable after NQ costs
      across neighboring flow thresholds, return-extension thresholds, stop
      distances, and target multiples.
    known_failure_modes: >
      The relative MES sell-pressure proxy may be informed, the NQ selloff may
      persist, the result may be regime-concentrated, or randomized timing may
      explain the observed core edge.
