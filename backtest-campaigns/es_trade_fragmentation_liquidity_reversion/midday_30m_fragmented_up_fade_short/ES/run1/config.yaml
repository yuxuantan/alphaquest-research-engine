campaign_id: es_trade_fragmentation_liquidity_reversion
variant_id: midday_30m_fragmented_up_fade_short
test_run_id: run1
strategy_name: trade_fragmentation_liquidity_reversion
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hendershott, Jones, and Menkveld (2011); Hasbrouck and Saar (2013); Brogaard, Hendershott, and Riordan (2014)
  edge_thesis: High trade-count rank with low average-trade-size rank can proxy fragmented algorithmic liquidity activity; after a completed up move, the pressure may be transitory and mean revert.
  mechanic: Uses completed 30-minute rolling trade count, average trade size, and return at 11:30, 12:30, and 13:30 ET; enters short on the next 1-minute bar open only when fragmentation ranks and upward return confirmation are present.
  timeframe_rationale: 1-minute bars preserve completed rolling trade-count and average-trade-size windows while enforcing next-bar-open execution after close-based signals.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 60
  rth_start: 09:30:00
  rth_end: '15:59:00'
  trade_orderflow_features:
    enabled: true
    windows: [15, 30, 60]
    large_trade_sizes: []
    min_period_fraction: 1.0
    tick_size: 0.25
    same_clock_ranks:
      enabled: true
      columns:
        - trade_orderflow_trades_15
        - trade_orderflow_avg_trade_size_15
        - trade_orderflow_trades_30
        - trade_orderflow_avg_trade_size_30
        - trade_orderflow_trades_60
        - trade_orderflow_avg_trade_size_60
      rank_windows: [42]
      rank_min_periods:
