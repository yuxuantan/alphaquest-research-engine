research_metadata:
  academic_source: Lou, Yan, and Zhang (2013); FiscalData Treasury Securities Auctions Data
  edge_thesis: Anticipated nominal Treasury Note/Bond auction supply can create temporary risk-capacity
    and discount-rate pressure that spills into NQ intraday returns on auction days, with possible post-auction
    recovery after inventory is absorbed.
  mechanic: On previously announced nominal Treasury Note/Bond auction days, buy NQ after the completed
    14:29-14:30 ET bar and flatten by 15:55. This tests late-day absorption and recovery after auction
    supply pressure.
  timeframe_rationale: One-minute bars allow exact completed-bar event timing, next-bar-open execution,
    and same-day forced flattening for an event-calendar edge.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-02'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the Treasury auction-pressure edge using only preannounced
      nominal Treasury Note/Bond auction calendar membership and a fixed completed-bar NQ signal time.
      It does not read auction outcomes, same-day Treasury yield moves, NQ future bars, final session
      statistics, or discretionary filters.
    entry_logic_rationale: The auction calendar row is included only when the Treasury announcement date
      is before the auction date. The signal is evaluated on a completed one-minute NQ RTH bar at the
      fixed time, and the engine can fill no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is declared before NQ testing, rounded to the NQ
      tick, and varied only through sl.params.stop_pct so adverse auction-day spillover is capped without
      using future highs, lows, Treasury outcomes, or realized trade-path information.
    target_exit_rationale: The fixed-R target is declared before NQ testing and tied to the initial stop
      distance. It uses no future price, volume, orderflow, auction result, or Treasury-yield information,
      and all tested targets are at least 1.0R.
    profitability_rationale: If anticipated Treasury supply temporarily tightens dealer risk capacity
      or raises discount-rate pressure, NQ may show same-day directional spillover or late absorption
      that is visible even with only ex-ante auction dates and strict same-day flattening.
    known_failure_modes: The effect may be confined to Treasury securities, have an unstable equity sign
      across inflation and growth regimes, be arbitraged before the NQ signal time, or be too sparse after
      transaction costs and prop-style drawdown constraints.
    pre_test_decision: approve_for_testing
  source_es_campaign: es_treasury_auction_pressure
  pre_pnl_event_density: research_artifacts/nq_treasury_auction_pressure_event_density_20260702.md
  nq_port_note: Direct NQ transfer authored before NQ Treasury auction PnL inspection. Mechanics, signal
    times, directions, auction scopes, stop/target grid, costs, sessions, and validation gates are frozen
    for this NQ test; no rescue is authorized.
