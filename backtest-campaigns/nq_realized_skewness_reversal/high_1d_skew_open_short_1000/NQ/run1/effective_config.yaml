research_metadata:
  academic_source: Amaya, Christoffersen, Jacobs, and Vasquez (2015); Jondeau, Wang,
    Yan, and Zhang (2020); Boyer, Mitton, and Vorkink (2010)
  edge_thesis: Lagged realized skewness can proxy return-asymmetry preference; low
    skewness may earn a subsequent NQ premium while high skewness may underperform.
  mechanic: At 10:00 ET, enter short NQ only when the prior completed RTH session's
    realized-skewness rank is in the high tail; flatten by 15:55 ET unless stop or
    target is hit.
  timeframe_rationale: 1-minute bars preserve the 10:00 completed-bar decision and
    next-bar-open execution while using a prior-session skewness state.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_realized_skewness_reversal_density_audit_20260630.md
    selected_grid_min_signals_per_year: 62.958503
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: 'At 10:00 ET, enter short NQ only when the prior completed
      RTH session''s realized-skewness rank is in the high tail. This tests whether
      lottery-like realized upside asymmetry is overpaid and vulnerable to same-day
      reversal.

      '
    entry_logic_rationale: The signal reads only the shifted prior-session 1-day skewness
      rank. The 09:59 completed bar is used as the decision clock for a 10:00 signal,
      and any fill occurs no earlier than the next bar open.
    stop_loss_rationale: A percent-from-entry stop is used because the edge is a lagged
      higher-moment state rather than a discrete intraday chart level.
    target_exit_rationale: A fixed-R target plus strict 15:55 ET flatten tests whether
      the high-skewness reversal can monetize intraday without discretionary exits
      or overnight exposure.
    profitability_rationale: The variant can only work if high realized skewness predicts
      enough same-day NQ underperformance to overcome realistic costs and fill ordering.
    known_failure_modes: The ES source family failed; this NQ transfer can fail if
      high skewness is trend continuation, if the effect is cross-sectional rather
      than time-series, or if profits depend on a single threshold.
    pre_test_decision: approve_for_testing
