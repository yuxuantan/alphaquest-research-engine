timeframe: 5m
research_metadata:
  academic_source: Donaldson and Kim (1993); Osler (2003); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Completed downside breaks of ES round-number barriers may continue when aggressive selling confirms the break.
  mechanic: Trade short after a completed 5-minute close crosses below a 25- or 50-point round-number barrier from above while the same bar has negative signed-volume imbalance.
  timeframe_rationale: 5-minute bars require a visible close through the barrier and reduce single-print noise around the level.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'The setup expresses stop-order continuation at a fixed psychological barrier. The prior completed close must be above the barrier and the signal close below it, while signed flow confirms aggressive selling participation.

      '
    entry_logic_rationale: 'The completed signal bar defines the break and flow confirmation; execution is next-bar open. Barrier interval and flow threshold are the only entry tunables.

      '
    stop_loss_rationale: 'A fixed percent stop fails the trade if price snaps back above the barrier, which means the stop-cascade thesis is not holding.

      '
    target_exit_rationale: 'A fixed-R target tests whether confirmed downside barrier breaks extend enough before the intraday flatten, without using future lows or volatility.

      '
    profitability_rationale: 'This should be profitable only if clustered stops and aggressive selling after a round-number break create short-horizon continuation after realistic costs. The strictest declared entry corner still exceeded 65 signals/year.

      '
    known_failure_modes: 'Downside breaks may be liquidity sweeps, signed flow can represent capitulation that reverses, and short-side edge may be dominated by rare high-volatility sessions.

      '
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_round_number_orderflow_barrier
    source_variant_id: round_number_downside_flow_breakout_short
    source_run_id: run1
    source_config_path: campaigns/es_round_number_orderflow_barrier/variants/round_number_downside_flow_breakout_short/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0015
      - 0.0025
      - 0.004
      new: &id002
      - 0.00225
      - 0.00375
      - 0.006
