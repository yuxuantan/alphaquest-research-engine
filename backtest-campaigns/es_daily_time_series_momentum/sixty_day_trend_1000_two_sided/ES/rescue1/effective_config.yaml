campaign_id: es_daily_time_series_momentum
variant_id: sixty_day_trend_1000_two_sided
test_run_id: rescue1
strategy_name: daily_time_series_momentum
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Moskowitz, Ooi, and Pedersen (2012); Hurst, Ooi, and Pedersen (2017)
  edge_thesis: ES may continue in the direction of its own prior 60- to 120-session
    trend, consistent with intermediate-horizon futures time-series momentum.
  mechanic: Use prior completed RTH closes only. At the completed 10:00 ET 5-minute
    bar, trade in the direction of the configured intermediate trend; flatten at 15:55
    ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars preserve completed-bar signal timing, next-bar-open
    execution, and pessimistic OHLC same-bar stop/target handling.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 160
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: daily_time_series_momentum
    params:
      setup_mode: close_to_close_trend
      rth_end: '16:00:00'
      signal_time: '10:00:00'
      bar_interval_minutes: 5
      lookback_sessions: 60
      confirmation_sessions: 1
      min_abs_trend_return_pct: 0.015
      min_trend_zscore: 0.0
      max_trades_per_day: 1
      allow_long: true
      allow_short: true
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
core:
  data_subset:
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
