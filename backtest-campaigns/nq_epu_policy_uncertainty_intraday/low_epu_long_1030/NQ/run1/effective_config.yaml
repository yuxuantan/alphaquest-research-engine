campaign_id: nq_epu_policy_uncertainty_intraday
variant_id: low_epu_long_1030
test_run_id: run1
strategy_name: epu_policy_uncertainty
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Baker, Bloom, and Davis (2016); Brogaard and Detzel (2015); Pastor
    and Veronesi (2012); PolicyUncertainty.com Daily U.S. EPU
  edge_thesis: Lagged Daily U.S. EPU states may identify NQ risk-off pressure or compensating
    growth-equity risk-premium states after the cash open.
  mechanic: Rescue attempt 1 changed only declared EPU threshold and stop/target parameter
    space; original mechanic retained. At 10:30 ET, long NQ when the 30-day-lagged
    Daily U.S. EPU index rank is in the lower tail; flatten by 15:55.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open
    execution while the EPU state is already at least 30 calendar days old.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: 'This NQ port preserves the ES EPU setup family: setup_mode=low_epu_long,
      entry_time=10:30:00, 30-calendar-day-lagged EPU rank state, next-bar execution,
      same-day flatten.'
    entry_logic_rationale: Entry logic is unchanged from the selected ES source config
      except for the NQ execution leg and NQ feature-session mapping; no NQ PnL was
      inspected before authoring.
    stop_loss_rationale: This NQ port inherits the ES stop-distance rescue config
      because it was the strongest ES low-EPU evidence; this is provenance, not an
      authorized NQ post-result rescue.
    target_exit_rationale: Target/exit logic is fixed before any NQ PnL inspection;
      the added 1.5R neighbor only keeps the density-trimmed grid within the runner's
      valid combination floor.
    profitability_rationale: If policy-uncertainty states proxy risk appetite or compensation
      for bearing growth-equity risk, the effect may transfer more strongly to NQ
      than ES.
    known_failure_modes: Daily EPU is slow and revised, the 30-day lag may make it
      stale, and any NQ profits may be regime-concentrated or vanish after costs.
    pre_test_decision: approve_for_testing
  pre_pnl_density: PASS after density-only pre-PnL grid trim; see research_artifacts/nq_epu_policy_uncertainty_intraday_density_audit_20260623.md.
  source_run_report: backtest-campaigns/es_epu_policy_uncertainty_intraday/low_epu_long_1030/ES/stop_widen_rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_epu_policy_uncertainty_intraday
    source_config_path: campaigns/es_epu_policy_uncertainty_intraday/rescue_attempts/stop_distance_rescue_1/low_epu_long_1030/config.yaml
    source_run_role: strongest ES low-EPU stop-distance rescue config, ported before
      any NQ PnL inspection
    ported_before_nq_pnl: true
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
  nq_density_reform:
    reform1:
      created_at: '2026-06-23'
      reason: remove declared entry-grid corners with latest-252 signal count below
        50 before any NQ PnL inspection
      changed_path: core_grid/wfa.parameters.entry.params.epu_rank_max
      new_values: &id001
      - 0.35
      mechanics_changed: false
      pnl_inspected_before_change: false
    reform2_grid_size:
      created_at: '2026-06-23'
      reason: add one non-signal target neighbor before NQ PnL so the density-trimmed
        grid keeps at least 8 combinations required by the runner
      changed_path: core_grid/wfa.parameters.tp.params.target_r_multiple
      new_values:
      - 1.0
      - 1.25
      - 1.5
      mechanics_changed: false
      pnl_inspected_before_change: false
data:
  dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
