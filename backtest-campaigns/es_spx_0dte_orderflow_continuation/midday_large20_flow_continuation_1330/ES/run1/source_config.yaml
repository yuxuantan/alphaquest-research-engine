research_metadata:
  academic_source: Brogaard, Han, and Won (2023); Cboe (2024); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: SPX 0DTE sessions may create directional ES hedging pressure when a completed intraday ES source window has both price movement and same-direction aggregate signed flow.
  mechanic: On non-standard-monthly SPX 0DTE sessions, enter in the direction of the completed 09:30-13:30 ES move only if large20 trade imbalance confirms that direction.
  timeframe_rationale: 1-minute bars preserve a completed morning-to-midday source window and next-bar-open execution at 13:30 ET.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant tests whether 0DTE pressure persists into midday only when the cumulative ES move and cumulative large20 trade imbalance agree. It avoids trading isolated morning noise by requiring a completed multi-hour pressure state.
    entry_logic_rationale: The source window ends at 13:30 ET and includes no bars after the signal timestamp. The entry can only be generated after the completed 13:29 bar, preserving next-bar-open execution and avoiding final-session information.
    stop_loss_rationale: A fixed percent stop keeps risk comparable across volatility regimes without referencing future levels or option-derived strikes. The stop is predeclared and unchanged across staged tests.
    target_exit_rationale: The fixed-R target asks whether midday 0DTE orderflow pressure still has enough continuation before the 15:55 flatten. It is a mechanical same-day exit and uses no final VWAP or closing auction information.
    profitability_rationale: Persistent large20 imbalance through midday may indicate ongoing hedging or institutional participation rather than a transient opening move. The pre-PnL strict corner stayed above the 50 trades/year target.
    known_failure_modes: Midday signals can be late, cumulative flow can hide reversals inside the window, and 0DTE pressure can switch from trend reinforcement to pinning as the close approaches.
    pre_test_decision: approve_for_testing
