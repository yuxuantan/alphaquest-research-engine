    params:
      setup_mode: downside_share_signed_multitime_short
      direction_mode: high_short
      feature_csv: data/external/es_realized_semivariance_features_20110103_20260609.csv
      value_column: prior_downside_share_1d
      rank_column: downside_share1_rank_252
      semivar_rank_threshold: 0.45
      flatten_time: '15:55:00'
      bar_interval_minutes: 5
      tick_size: 0.25
      flow_mode: signed
      flow_window_bars: 12
      min_orderflow_imbalance: 0.0
      min_session_move_ticks: 1
      max_trades_per_day: 1
      entry_times:
      - '10:30:00'
      - '11:30:00'
      - '13:00:00'
      - '14:30:00'
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
