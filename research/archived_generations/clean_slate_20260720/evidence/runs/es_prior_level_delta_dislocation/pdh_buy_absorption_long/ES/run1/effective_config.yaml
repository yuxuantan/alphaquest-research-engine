campaign_id: es_prior_level_delta_dislocation
variant_id: pdh_buy_absorption_long
test_run_id: run1
strategy_name: prior_level_delta_dislocation
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Osler (2003); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014)
  edge_thesis: Buy-side trade pressure during a pullback above the prior RTH high
    may indicate absorption/support at a broken resistance level rather than failed
    continuation.
  mechanic: From 10:30 through 15:30 ET, enter long when price is freshly above the
    prior RTH high while the completed rolling 60-minute price return is negative
    and signed trade flow is positive; flatten at 15:55 ET unless stop or target is
    hit.
  timeframe_rationale: The entry module uses completed rolling 60-minute trade-side
    signed-volume and return features. The repo builds these features after timeframe
    aggregation, so the campaign is fixed at 1-minute bars to make the 60-window exactly
    60 minutes and preserve next-bar-open execution.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: pdh_pdl_sweep
  warmup_days: 30
  rth_start: 09:30:00
  rth_end: '15:59:00'
  trade_orderflow_features:
    enabled: true
    windows:
    - 60
    tick_size: 0.25
    large_trade_sizes:
    - 10
    - 20
    min_period_fraction: 1.0
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: positive_delta_dislocation
    params:
      setup_mode: pdh_buy_absorption_long
      reference_side: pdh
      direction: long
      signal_start: '10:30:00'
      signal_end: '15:30:00'
      hour_window_minutes: 60
      min_close_above_prev_high_ticks: 1
      max_close_above_prev_high_ticks: 16
      min_negative_hour_ticks: 1
      min_hour_delta: 250
      max_trades_per_day: 1
      require_fresh_prev_high: true
      require_fresh_prev_low: false
      tick_size: 0.25
      bar_interval_minutes: 1
      flatten_time: '15:55:00'
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
core:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:55:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
