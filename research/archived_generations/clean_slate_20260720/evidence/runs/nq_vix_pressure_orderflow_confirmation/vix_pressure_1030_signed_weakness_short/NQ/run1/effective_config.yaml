campaign_id: nq_vix_pressure_orderflow_confirmation
variant_id: vix_pressure_1030_signed_weakness_short
test_run_id: run1
strategy_name: cboe_vix_orderflow_confirmation
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Whaley (2000) VIX fear gauge plus Cont, Kukanov, and Stoikov (2014)
    orderflow imbalance.
  edge_thesis: Lagged broad-equity volatility pressure should only be tradable on
    NQ when the current RTH session confirms downside pressure through completed price
    action and aggregate orderflow before entry.
  mechanic: At 10:30 ET, short NQ only when lagged VIX-change pressure is present
    and the completed RTH open-to-signal move plus signed aggregate orderflow are
    not bullish.
  timeframe_rationale: One-minute bars preserve exact completed-bar signal timing,
    next-bar execution, and deterministic stop/target ordering on the native NQ bar
    stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: The variant only trades when a prior-session VIX-change
      pressure state and completed NQ price/orderflow confirmation point in the same
      downside direction.
    entry_logic_rationale: The signal emits at the configured completed bar close;
      the engine handles entry no earlier than the next-bar boundary.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to the
      NQ tick, and not changed after results.
    target_exit_rationale: The fixed-R target is predeclared and unresolved positions
      flatten at the configured same-day time.
    profitability_rationale: If VIX pressure is tradable for NQ, the same-session
      completed orderflow gate should reduce random-risk drawdowns relative to VIX-state-only
      entries.
    known_failure_modes: Broad VIX pressure may be too weak, orderflow confirmation
      may be late, and Sierra aggregate flow may not identify informed pressure.
    pre_test_decision: approve_for_testing
