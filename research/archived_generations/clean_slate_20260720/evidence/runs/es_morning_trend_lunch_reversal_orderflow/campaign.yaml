campaign_id: es_morning_trend_lunch_reversal_orderflow
title: ES Morning Trend Lunch Reversal With Aggregate Orderflow
decision: TEST
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: morning_trend_lunch_reversal_orderflow
hypothesis: Strong ES morning directional pressure can partially reverse into late morning or lunch when the completed signal bar turns against the morning move and completed aggregate orderflow confirms counter-direction pressure. The setup treats the morning move as possible liquidity/inventory pressure rather than a level breakout.
sources:
- title: 'A Theory of Intraday Patterns: Volume and Price Variability'
  authors: Anat R. Admati and Paul Pfleiderer
  year: 1988
  venue: Review of Financial Studies
  doi: 10.1093/rfs/1.1.3
  link: https://academic.oup.com/rfs/article-abstract/1/1/3/1601212
  relevance: Models predictable intraday concentration of liquidity and informed trading, supporting time-of-day segmentation around late morning and lunch.
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, and Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Motivates reversal after liquidity-driven trading pressure and inventory risk.
- title: Intraday Patterns in the Cross-section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2010.01573.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2010.01573.x
  relevance: Documents systematic intraday predictability and short-term reversal linked to temporary liquidity imbalances.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports orderflow imbalance as a short-horizon pressure proxy. This implementation uses completed Sierra aggregate trade-side flow, not quote-depth OFI.
rationale: This is a bounded price-action plus aggregate-orderflow composite. The primary condition is a same-session morning extension from the RTH open; the reversal condition requires the completed signal bar body to turn against that extension; the orderflow condition requires completed aggregate counterflow. It is distinct from downside capitulation/VWAP/RSI reversion, daily reversal, opening-range, prior-level, VWAP, and standalone signed-flow persistence campaigns.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline
- completed-bar signed, large-10, and large-20 aggregate flow columns
- same-session flatten rules from config
data_quality_caveats:
- Sierra signed volume is completed-bar aggregate bid/ask-volume flow, not LOB OFI or print-level aggressor truth.
- The strategy uses completed 5-minute bars and next-bar execution; intra-bar stop/target ordering remains pessimistic with 1-minute detail when available.
lookahead_risks:
- The session-open reference is known from the first completed RTH bar only.
- Morning extension, signal-bar body, and orderflow confirmation use only the completed signal bar.
- Signals using bar close are filled no earlier than the next bar open by the engine.
- No final session high/low, final VWAP, future range, future orderflow, or post-entry bar is used.
failure_modes:
- Morning pressure may represent information and continue rather than reverse.
- Counterflow may be late liquidity-taking into a stronger trend rather than inventory reversal.
- Lunch-period spreads/slippage and pessimistic same-bar ordering may erase small reversals.
- The effect may be side-specific or concentrated in high-volatility regimes.
- Open-position overlap may reduce tradable frequency below raw signal counts.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_intraday_capitulation_orderflow_reversion
  - es_daily_reversal_orderflow_confirmation
  - es_orderflow_impulse_reversal
  - es_trend_aligned_orderflow_continuation
  - es_opening_drive_inventory_absorption
  - es_midday_range_orderflow_breakout
  - es_vwap_deviation_orderflow_reversion
  conclusion: Eligible as a distinct active campaign. It is time-of-day inventory/liquidity reversal after a same-session morning extension, not a fixed level, VWAP deviation, opening range, prior-session level, daily reversal, downside capitulation, or orderflow-only impulse fade.
