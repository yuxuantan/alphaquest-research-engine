research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002);
    Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Lagged defensive leadership should indicate risk-off allocation pressure;
    the trade waits for ES to reject VWAP with large-10 sell flow before entering
    short.
  mechanic: Defensive sector leadership gates short-only morning VWAP rejection continuation
    entries confirmed by large-10 aggregate sell flow.
  timeframe_rationale: Five-minute bars reduce noisy open auction behavior and keep
    the VWAP reference live, completed, and auditable.
  pre_pnl_density: 914 full-sample pre-PnL signals, about 59.23 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Defensive sector leadership gates short-only morning
      VWAP rejection continuation entries confirmed by large-10 aggregate sell flow.
      The sector feature is lagged by one business day, so it acts as a pre-session
      directional state, while the VWAP/EMA pullback and orderflow confirmation require
      current ES participation before the next-bar entry.
    entry_logic_rationale: This is the mirror image of the risk-on VWAP continuation
      variant. It requires the prior sector state to favor defensives, then waits
      for ES to remain below or reject VWAP and for large-10 sell flow to confirm
      the completed signal bar before any short entry.
    stop_loss_rationale: Parameter-space rescue 1 keeps the same entry and target
      logic but gives the trade a wider predeclared volatility budget. The original
      core surfaces often selected the widest available stop, so this tests whether
      the same sector-gated pullback signal was being stopped by normal ES noise rather
      than invalidated immediately.
    target_exit_rationale: A fixed-R target keeps payoff distance tied to the initial
      risk and avoids optimizing exits around future intraday levels. The grid starts
      at 1.0R because sub-1R targets are now invalid under the methodology.
    profitability_rationale: The setup should be profitable only if lagged sector
      rotation improves the base rate of ES pullback continuation and if same-bar
      aggregate orderflow identifies the subset with current participation. Pre-PnL
      density was 914 full-sample pre-PnL signals, about 59.23 per year.
    known_failure_modes: The sector state may be stale, the ES pullback may be a crowded
      continuation pattern, aggregate signed volume may confirm too late, and the
      apparent edge may concentrate in a small number of high-volatility regimes or
      one directional side.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    created_at: '2026-06-20T00:00:00'
    source_config_path: campaigns/es_sector_rotation_orderflow_pullback/variants/defensive_vwap_reject_large10_short_1130/config.yaml
    source_run_id: run1
    reason: All original variants failed before WFA; original top core rows generally
      favored the widest available stop, so the one allowed rescue tests a larger
      predeclared volatility budget.
    allowed_change_scope: stop_parameter_space_only
    changed:
      strategy.sl.params.stop_pct: 0.004
      core_grid.parameters.sl.params.stop_pct:
      - 0.0025
      - 0.004
      - 0.006
      wfa.parameters.sl.params.stop_pct:
      - 0.0025
      - 0.004
      - 0.006
    unchanged:
    - entry module
    - entry mechanics
    - entry parameter grid
    - take-profit module
    - take-profit parameter grid
    - data source
    - timeframe
    - costs
    - fills
    - sessions
    - validation gates
    - target reward:risk floor
