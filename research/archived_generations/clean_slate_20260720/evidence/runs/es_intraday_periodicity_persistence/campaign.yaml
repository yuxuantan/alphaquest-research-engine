campaign_id: es_intraday_periodicity_persistence
title: ES Intraday Periodicity Persistence
decision: TEST
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: >
  Same-clock ES half-hour return tendencies may persist across nearby sessions.
  If the prior 10, 20, or 40 sessions for a specific clock slot have a signed
  mean return above a predeclared threshold, the next occurrence of that slot may
  continue in the same direction after costs.
rationale: >
  This campaign tests conditional same-clock return persistence, not an
  unconditional RTH long premium, current-day intraday momentum, opening-range
  breakout, orderflow absorption, signed-flow persistence, daily trend, or daily
  reversal. It uses only prior sessions' same-slot returns to forecast the
  current slot and exits at the slot boundary.
sources:
  - title: Intraday Patterns in the Cross-Section of Stock Returns
    authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
    year: 2010
    venue: Journal of Finance, 65(4), 1369-1407
    doi: 10.1111/j.1540-6261.2010.01573.x
    link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2010.01573.x
    relevance: >
      Documents return continuation at half-hour intervals that are exact
      multiples of a trading day, lasting at least 40 trading days.
  - title: Intraday Patterns in the Cross-Section of Stock Returns
    authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
    year: 2010
    venue: SSRN working paper
    link: https://ssrn.com/abstract=1509466
    relevance: >
      Provides the public working-paper version and abstract describing
      same-clock intraday return continuation, volume, imbalance, volatility,
      and bid-ask effects.
data_needs:
  - timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
  - local Sierra aggregate RTH bar cache
  - derived same-clock slot feature file with prior-session-only rolling means
  - same-day flatten before the configured prop cutoff
data_quality_caveats:
  - Sierra bars are completed-bar OHLCV aggregates, not tick-replay truth.
  - This campaign does not require print-level sequencing or book depth.
  - Same-bar stop/target conflicts must use pessimistic OHLC handling.
lookahead_risks:
  - Current-session slot returns must never be used to form the signal.
  - Rolling same-clock means are shifted one session inside each slot.
  - Signals use only the completed bar at the entry time and enter next bar open.
  - The strategy must flatten at the predeclared slot end time.
  - No future session high, low, VWAP, volume profile, or final daily range is used.
failure_modes:
  - A stock-level cross-sectional anomaly may not transfer to ES index futures.
  - Same-clock slot means may be too noisy after costs and slippage.
  - Performance may concentrate in crisis years or a narrow clock slot.
  - Short half-hour holds may be erased by pessimistic same-bar stop/target ordering.
  - The signal may pass density but fail WFA because slot persistence is regime-dependent.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_rth_intraday_risk_premium
    - es_late_day_intraday_momentum
    - es_daily_time_series_momentum
    - es_daily_short_term_reversal
    - es_overnight_intraday_reversal
    - es_orderflow_absorption_exhaustion_reversal
    - es_trade_fragmentation_liquidity_reversion
    - es_opening_drive_inventory_absorption
  conclusion: >
    Not a duplicate in active scope. The failed RTH premium campaign tests
    unconditional fixed-time long exposure. This campaign tests conditional
    same-clock signed return persistence using only prior sessions' returns for
    the exact slot being traded.
feature_construction:
  builder: tools/build_es_intraday_periodicity_features.py
  source: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  output: data/external/es_intraday_periodicity_features_20110103_20260609.csv
  rows: 19085
  valid_mean20_rows: 18995
  lookahead_control: shift(1) within each slot excludes the current session slot return
density_check:
  artifact: research_artifacts/es_intraday_periodicity_persistence_density_audit_20260617.md
  conclusion: >
    All proposed slot/lookback/threshold combinations exceed 50 prospective
    signals/year before fills, so the campaign is eligible for staged testing.
session_assumptions:
  timezone: America/New_York
  rth_start: '09:30:00'
  rth_end: '15:59:00'
  no_overnight_positions: true
  latest_variant_flatten: '15:00:00'
parameter_space:
  lookback_days: [10, 20, 40]
  min_mean_return_bps: [0.5, 1.0, 1.5]
  stop_pct: [0.001, 0.0015, 0.0025]
  target_r_multiple: [0.75, 1.0, 1.25]
  combinations_per_variant: 81
variants:
  - morning_1000_slot_persistence
  - morning_1030_slot_persistence
  - late_morning_1130_slot_persistence
  - afternoon_1330_slot_persistence
  - late_afternoon_1430_slot_persistence
rescue_policy:
  rescue_scope: failed_variant
  max_rescue_attempts_per_failed_variant: 1
  allowed_changes:
    - fixed parameters inside existing strategy modules
    - tunable parameter space only
  forbidden_changes:
    - core strategy mechanic
    - slot definitions
    - setup mode
    - direction rule
    - entry module
    - stop-loss module
    - take-profit or exit module
    - edge thesis
    - stage criteria
    - data window
    - timeframe
    - costs or fill assumptions
