research_metadata:
  academic_source: Osler (2000); Cont, Kukanov, and Stoikov (2014); CME market profile documentation
  edge_thesis: Prior-session NQ accepted-value boundaries, approximated from completed RTH OHLCV, may act as objective intraday
    support/resistance when a completed close outside prior value is confirmed by same-direction aggregate orderflow.
  mechanic: From 13:00 through 15:30 ET, enter long above prior VAH or short below prior VAL after a completed 5-minute close
    beyond the buffer with same-direction large-20 imbalance.
  timeframe_rationale: Five-minute bars reduce single-print noise while preserving completed-bar signal timing; the engine
    enters no earlier than the next 5-minute bar open.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: From 13:00 through 15:30 ET, enter long above prior VAH or short below prior VAL after a completed
      5-minute close beyond the buffer with same-direction large-20 imbalance. Prior VAH/VAL/POC are computed only from the
      previous completed RTH session and frozen before current-session signals.
    entry_logic_rationale: The entry uses only completed 5-minute bars. The prior value area is unavailable until the prior
      RTH session is complete, and current-session acceptance is evaluated only after the signal bar closes, so entry occurs
      next bar open or later.
    stop_loss_rationale: The percent-from-entry stop is fixed before NQ testing, rounded to tick, and varied only through
      the predeclared ES-derived grid.
    target_exit_rationale: The fixed-R target and same-day flatten are predeclared and do not use final VWAP, final range,
      final volume profile, or discretionary exits.
    profitability_rationale: If acceptance outside prior value reflects value migration rather than a stop probe, same-direction
      completed aggregate orderflow should help identify continuation after next-bar execution and costs.
    known_failure_modes: The value-area profile is an OHLCV approximation, not true volume-at-price; boundary breaks can be
      exhaustion probes; aggregate orderflow can lag; NQ behavior may differ from ES.
    pre_test_decision: approve_for_testing
    source_es_template: campaigns/es_prior_value_area_orderflow_acceptance/rescue_attempts/parameter_space_rescue_1/afternoon_large20_two_sided_acceptance/config.yaml
    ported_before_nq_pnl: true
  pre_pnl_density:
    artifact: research_artifacts/nq_prior_value_area_orderflow_acceptance_density_audit_20260622.md
    status: approved_for_testing
    limited_core_min_signals_per_year: 207.23
    full_history_min_signals_per_year: 213.39
