research_metadata:
  academic_source: Holmberg, Lonnback, and Lundstrom (2013); Gao, Han, Li, and Zhou
    (2018); Moskowitz, Ooi, and Pedersen (2012); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: 30-minute opening-range breakout confirmed by total signed flow and
    15/30-minute HH/HL or LH/LL structure.
  mechanic: Build the completed first 30-minute RTH opening range, then trade the
    first two-sided breakout before 11:00:00 ET only if the completed 5-minute breakout
    bar closes beyond the range, the 15/30-minute completed-bar trend structure agrees
    with breakout direction, and aggregate signed-volume imbalance confirms the same
    direction.
  timeframe_rationale: 5-minute bars reduce one-minute opening noise while preserving
    next-bar-open execution and allowing 1-minute detail data for same-bar stop/target
    ordering.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'The variant requires three independently meaningful
      completed-bar facts before entry: a first 30-minute opening-range breakout,
      15/30-minute HH/HL or LH/LL trend structure in the breakout direction, and same-direction
      aggregate signed-volume. The opening range supplies the public price-action
      level, the trend filter avoids counter-regime breakouts, and orderflow confirms
      aggressive participation.'
    entry_logic_rationale: The signal waits for a completed 5-minute close outside
      the opening range before 11:00:00 ET. The trend filter uses only completed bars
      ending at the signal close, and the aggregate signed-volume filter uses only
      the same completed breakout bar, so the engine can enter no earlier than the
      next bar open without lookahead.
    stop_loss_rationale: The stop is the opposite opening-range edge plus a small
      offset grid. If a trend-confirmed breakout cannot preserve the opening auction
      boundary, the continuation thesis is invalid; the max-stop cap rejects unusually
      wide openings.
    target_exit_rationale: A fixed-R target keeps exits independent of future flow
      or discretionary chart reading. The target grid tests whether trend-filtered
      ORB continuation can pay enough relative to the opening-range-edge risk before
      forced flatten.
    profitability_rationale: The mechanic is convincing enough to test because it
      combines a literature-supported opening-range breakout with a predeclared trend-direction
      filter and same-bar flow participation. The density screen showed 111.4 to 180.6
      raw signals/year across the declared entry grid, so it is not a rare-event test.
    known_failure_modes: The setup should fail if the trend filter merely selects
      exhausted breakouts, if Sierra aggregate orderflow is noisy, if profits concentrate
      in a small set of crisis sessions, or if OR-edge risk is too wide for the continuation
      captured after costs.
    pre_test_decision: approve_for_testing
