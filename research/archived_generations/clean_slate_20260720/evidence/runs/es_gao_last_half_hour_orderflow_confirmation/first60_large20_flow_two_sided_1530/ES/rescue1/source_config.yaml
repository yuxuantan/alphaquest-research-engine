research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: First-window ES price action may predict last-half-hour continuation when completed aggregate orderflow
    confirms the early move.
  mechanic: First 60-minute price return and large-20 signed-flow imbalance point the same way; enter for last-half-hour
    continuation.
  timeframe_rationale: 5-minute bars make first-window aggregation auditable while preserving 1-minute detail data
    for same-bar stop/target conflict handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the Gao intraday momentum edge by using the completed first
      60-minute RTH price return as the price-action predictor for the last half-hour. It only permits a trade when
      the selected aggregate orderflow mode, large20_imbalance, confirms the same direction in that completed first
      window.
    entry_logic_rationale: The signal is evaluated at 15:30 ET, long after the first-window return and first-window
      aggregate orderflow are fully known. The entry is therefore a last-half-hour continuation test, not an opening-range,
      VWAP, prior-level, or generic trend-following rule.
    stop_loss_rationale: A tight percent-from-entry stop is realistic for a 15:30 to 15:55 intraday holding window
      and does not use any future swing or final session statistic. The stop grid changes risk width only, preserving
      the underlying Gao price-action plus orderflow confirmation mechanic.
    target_exit_rationale: A small fixed-R target is appropriate because the trade has only the last portion of
      RTH to work. It keeps exits mechanical, comparable across variants, and independent of post-entry orderflow
      or discretionary late-day price action.
    profitability_rationale: This should be profitable only if early price action with aligned aggressive participation
      contains information that institutions continue to express into the last half-hour. The pre-PnL density audit
      showed every declared entry corner comfortably above 50 trades/year.
    known_failure_modes: The setup can fail if the Gao effect has decayed in ES, if orderflow confirmation selects
      exhaustion rather than continuation, if late-day slippage overwhelms the edge, or if results are concentrated
      in a small number of high-volatility sessions.
    pre_test_decision: approve_for_testing
    rescue_attempt: 'parameter_space_rescue_1: changed only fixed defaults and declared parameter grid; modules,
      signal time, first-window length, flow mode, data, costs, sessions, and validation gates are unchanged.'
