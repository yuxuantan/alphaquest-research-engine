campaign_id: es_prior_session_benchmark_orderflow_reaction
title: ES Prior-Session Benchmark Open/Close Orderflow Reaction
decision: FAIL
created_at: '2026-06-18'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: ES may reject completed previous RTH open and close benchmark levels intraday
  when a completed bar probes through the level, closes back across it, and carries
  aggregate trade-side counterflow in the rejection direction.
rationale: This campaign tests benchmark-level reaction at prior RTH open/close, not
  prior high/low stop runs, prior value-area boundaries, VWAP, opening range, round
  numbers, or generic signed-flow persistence. The levels are fully known before the
  current RTH session; the signal requires a completed probe-and-reclaim/reject bar
  plus completed aggregate orderflow before next-bar entry.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Shows that externally supplied support/resistance levels can predict
    intraday trend interruptions, motivating objective tests of widely watched previous-session
    benchmarks.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://ideas.repec.org/a/oup/rfinst/v17y2004i4p1043-1071.html
  relevance: Finds technical support/resistance can align with limit-order-book depth,
    supporting a liquidity-provision interpretation of reactions at visible benchmark
    levels.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates order-flow imbalance as a short-horizon pressure proxy. This
    campaign uses completed Sierra aggregate signed volume, not full-depth LOB OFI.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV and aggregate signed-volume bars in America/New_York
- deterministic 5-minute aggregation with previous RTH open and close shifted from
  completed sessions only
- completed-bar signed_volume, large10, and large20 aggregate orderflow buckets
- next-bar execution, tick size, point value, commission, slippage, pessimistic same-bar
  fills, and forced flatten from config
data_quality_caveats:
- Sierra signed volume is an aggregate bid/ask-volume proxy, not full quote-level
  OFI or queue-position truth.
- Prior RTH open/close are benchmark levels, not guaranteed resting liquidity; failed
  probes can still be informed breakouts.
- Same-bar stop/target conflicts must use 1-minute detail when available and pessimistic
  fallback otherwise.
lookahead_risks:
- Previous RTH open and close are shifted from the completed prior RTH session only.
- Probe, reclaim/rejection close, and aggregate orderflow use only the completed signal
  bar.
- Signals generated from a completed 5-minute bar are filled no earlier than the next
  bar open.
- No current-session final high/low, final VWAP, final volume profile, future orderflow,
  or future session return is used.
- All variants flatten on the same RTH session before the configured prop cutoff.
failure_modes:
- Prior open/close probes may be true acceptance through the benchmark rather than
  failed breakouts.
- Counterflow on a completed 5-minute bar may arrive too late after most of the rejection
  has already occurred.
- The effect may be one-sided, time-of-day specific, or too cost-sensitive after one-tick
  ES slippage.
- Large-trade buckets may be sparse or noisy in Sierra aggregate bars.
- Profits may concentrate around specific volatility regimes or news sessions.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_prior_day_stop_run_reclaim
  - es_prior_level_delta_dislocation
  - es_prior_value_area_orderflow_rejection
  - es_prior_value_area_orderflow_acceptance
  - es_prior_session_flip_retest_orderflow
  - es_session_open_orderflow_reclaim
  - es_round_number_orderflow_barrier
  - es_vwap_deviation_orderflow_reversion
  - es_opening_range_retest_orderflow
  conclusion: Eligible as a distinct active campaign. Existing prior-level campaigns
    use prior highs/lows, value-area boundaries, opening range, session open, round
    numbers, or VWAP. This campaign uses previous RTH open and close as benchmark
    auction references and requires completed-bar counterflow rejection at those levels.
