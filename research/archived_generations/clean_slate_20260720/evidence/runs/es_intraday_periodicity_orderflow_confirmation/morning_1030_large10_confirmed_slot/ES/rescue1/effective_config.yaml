research_metadata:
  academic_source: Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov
    (2014)
  edge_thesis: Prior same-clock ES slot return tendency may continue when completed
    aggregate ES orderflow immediately before the slot confirms the predicted direction.
  mechanic: 10:30 ET slot with prior same-clock return persistence confirmed by completed
    10:00-10:30 large10 imbalance.
  timeframe_rationale: 1-minute bars preserve the completed pre-entry source window
    and next-bar-open execution at the slot entry time.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the Heston-Korajczyk-Sadka same-clock
      persistence edge by using only prior occurrences of slot_1030_1100 to select
      direction, then requiring the completed 10:00:00-10:30:00 ES orderflow window
      to confirm that direction before any trade can occur.
    entry_logic_rationale: The signal is evaluated at the completed bar close for
      10:30:00 ET. The prior-slot feature is shifted by construction, and the orderflow
      window ends exactly at the signal timestamp, so execution can only occur at
      the next bar open.
    stop_loss_rationale: A fixed percent stop is used because the edge is a time-slot
      pressure effect rather than a discrete chart boundary. The stop is predeclared,
      tick-rounded by the engine, and does not reference future highs or lows.
    target_exit_rationale: A fixed-R target with forced flatten at 11:00:00 ET tests
      whether the same-clock plus orderflow pressure can monetize inside the intended
      slot without overnight exposure or discretionary close handling.
    profitability_rationale: If same-clock return persistence reflects recurring liquidity
      demand or institutional scheduling, current aligned orderflow before the slot
      should identify days when that historical tendency is active rather than stale.
      The entry grid was density-checked before PnL. Rescue attempt 1 requires a stronger
      prior same-clock mean and gives the trade more room to express within the same
      slot; this is a parameter-space correction only, not a mechanics change.
    known_failure_modes: The same-clock tendency can be noise in ES, orderflow can
      confirm exhaustion instead of continuation, and the short holding window may
      leave too little room after commissions, slippage, and pessimistic same-bar
      ordering.
    pre_test_decision: approve_for_testing
  rescue_attempt: 1
  rescue_scope: parameter_space_and_fixed_parameters_only
  rescue_changes:
  - Keep intraday-periodicity plus completed-orderflow confirmation mechanics unchanged.
  - Increase fixed min_mean_return_bps from 0.5 to 0.75 to require a stronger prior
    same-clock tendency without starving trade density.
  - Replace stop_pct grid [0.001, 0.0015, 0.0025] with [0.0015, 0.0025, 0.0035] to
    test more realistic room for half-hour slot continuation.
  - Replace target_r_multiple grid [0.75, 1.0, 1.25] with [1.0, 1.25, 1.5] to test
    whether only larger R capture can overcome costs.
  rescue_rationale: Original runs failed limited core, with most variants losing across
    the grid. The rescue does not add filters or alter the edge. It strengthens the
    prior same-clock return requirement and widens fixed risk/reward geometry because
    a weak 0.5 bp historical slot tendency and tight stops may under-express a continuation
    edge after costs. A pre-PnL density replay confirmed the stricter threshold remains
    above the 50 signals/year floor in the shortlist and latest-year slices.
  pre_test_decision: approve_rescue_for_testing_after_density_audit
