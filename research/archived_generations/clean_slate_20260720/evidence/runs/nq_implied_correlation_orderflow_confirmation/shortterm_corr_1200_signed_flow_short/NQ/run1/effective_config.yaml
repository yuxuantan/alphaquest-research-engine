campaign_id: nq_implied_correlation_orderflow_confirmation
variant_id: shortterm_corr_1200_signed_flow_short
test_run_id: run1
strategy_name: cboe_implied_correlation_orderflow_confirmation
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Driessen, Maenhout, and Vilkov (2009, 2013); Cont, Kukanov, and
    Stoikov (2014); Cboe implied correlation history
  edge_thesis: Lagged SPX implied-correlation stress states may transmit broad-index
    risk pressure into NQ only when completed same-session NQ orderflow confirms downside
    pressure.
  mechanic: At 12:00 ET, short NQ when lagged COR1M-minus-COR3M rank is high and completed
    cumulative signed NQ flow confirms downside pressure.
  timeframe_rationale: One-minute bars preserve completed-bar signal timing, next-bar
    execution, and deterministic stop/target ordering on the native NQ bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: The variant trades only when a lagged implied-correlation
      stress state and completed NQ sell-flow confirmation align.
    entry_logic_rationale: The Cboe state is known before the NQ session and the flow
      gate uses only completed current-session bars through the configured signal
      close.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to the
      NQ tick, and varied only through the stop grid.
    target_exit_rationale: The fixed-R target is predeclared and unresolved positions
      flatten at the configured same-day time.
    profitability_rationale: If implied-correlation stress is tradable for NQ, completed
      sell-flow confirmation should reduce random-risk drawdowns relative to state-only
      entries.
    known_failure_modes: Daily correlation state may be slow, flow confirmation may
      be late, or the effect may fail WFA robustness.
    pre_test_decision: approve_for_testing
