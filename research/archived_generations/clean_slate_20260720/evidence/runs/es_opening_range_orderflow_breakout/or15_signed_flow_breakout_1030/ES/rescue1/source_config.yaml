timeframe: 5m
research_metadata:
  academic_source: Holmberg, Lonnback, and Lundstrom (2013); Gao, Han, Li, and Zhou
    (2018); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES opening-range breakouts may continue when the completed breakout
    bar has aligned aggregate signed orderflow.
  mechanic: Build the completed first 15-minute RTH opening range, then trade the
    first two-sided breakout before 10:30 ET only if the completed 5-minute breakout
    bar closes beyond the range and has aligned signed-volume imbalance.
  timeframe_rationale: 5-minute bars reduce one-minute opening noise while the staged
    engine still uses 1-minute detail data for same-bar stop/target conflict resolution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'The variant expresses the edge by requiring two independent
      completed-bar facts: price must close outside the first 15-minute opening range,
      and aggregate signed volume in that same 5-minute confirmation bar must point
      in the breakout direction. The opening range creates the price-action level;
      signed flow is the participation filter that should reduce weak stop probes.

      '
    entry_logic_rationale: 'A 15-minute opening range is short enough to trigger frequently
      but long enough to define an early auction boundary. Waiting for a completed
      5-minute close beyond the boundary avoids intra-bar peeking, and requiring signed-volume
      alignment makes the trade depend on observable aggressive flow rather than price
      alone.

      '
    stop_loss_rationale: 'The stop is the opposite opening-range edge with a maximum
      risk cap. If the breakout cannot hold the full opening auction, the participation
      thesis is wrong; the cap rejects unusually wide openings where the natural OR
      stop would create poor prop-style risk geometry.

      '
    target_exit_rationale: 'A fixed-R target keeps the exit independent of post-entry
      discretion and lets the grid test whether the breakout can deliver enough continuation
      relative to the OR-edge risk. Forced flatten remains predeclared for trades
      that neither hit stop nor target intraday.

      '
    profitability_rationale: 'This should be profitable only if aligned aggressive
      flow after the first 15 minutes marks real inventory repricing rather than transient
      liquidity seeking. The pre-PnL density screen showed every declared entry corner
      exceeded 90 trades per year before stop-cap filtering, so the test is not dependent
      on rare events.

      '
    known_failure_modes: 'The setup can fail if signed-volume classification is noisy,
      if opening breakouts reverse after stops are triggered, if the edge is concentrated
      in crisis trend days, or if the OR-edge stop is too wide for the average continuation
      captured before the 15:55 flatten.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    scope: failed_variant
    reason: Original variant failed limited_core_grid_test. Rescue keeps the same
      opening-range breakout plus aggregate-orderflow-confirmation mechanic and changes
      only fixed/default parameters and declared parameter space.
    allowed_changes:
    - entry parameter space
    - stop parameter space
    - target parameter space
    forbidden_changes:
    - entry module
    - stop module
    - target module
    - edge thesis
    - timeframe
    - data window
    - costs
    - fills
    - validation gates
