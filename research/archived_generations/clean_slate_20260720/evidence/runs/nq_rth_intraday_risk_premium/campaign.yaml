campaign_id: nq_rth_intraday_risk_premium
title: NQ RTH Intraday Risk Premium
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: NQ may earn a positive regular-trading-hours intraday premium after completed early-session bars, with risk controlled by explicit same-day stops, targets, and flattening.
rationale: This is a direct NQ transfer of the ES RTH intraday risk-premium family. It is distinct from NQ weekday calendar bias because all weekdays are long and the tested edge is unconditional RTH equity-index carry, not day-of-week seasonality. It is also distinct from volatility-managed, macro-conditioned, overnight, late-day, and orderflow-confirmed risk-premium families.
sources:
- title: Intraday Patterns in the Cross-section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2010.01573.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2010.01573.x
  relevance: Documents persistent intraday return structure and motivates fixed clock-time testing without future information.
- title: 'A Tug of War: Overnight Versus Intraday Expected Returns'
  authors: Dong Lou, Christopher Polk, and Spyros Skouras
  year: 2019
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2019.03.011
  link: https://ideas.repec.org/a/eee/jfinec/v134y2019i1p192-213.html
  relevance: Shows that overnight and intraday expected-return components can differ persistently, requiring direct intraday testing.
- title: 'Intraday Time Series Momentum: International Evidence'
  authors: Andrew Urquhart and coauthors
  year: 2020
  venue: International intraday momentum research
  link: https://centaur.reading.ac.uk/95566/1/Accepted-Version.pdf
  relevance: Supports that intraday timing effects can be economically meaningful but must survive out-of-sample validation.
data_needs:
- NQ Sierra RTH one-minute OHLCV cache in America/New_York
- deterministic 5-minute aggregation from completed one-minute bars
- same-day stop, target, and config-driven forced-flatten checks
lookahead_risks:
- The fixed signal time is known before the session, but the signal may emit only after the configured 5-minute bar has closed.
- Entry must occur at the next bar open or later after the signal bar close.
- No future session high, low, VWAP, final RTH return, or future orderflow is used.
- Positions must flatten at 15:55 ET and never carry overnight.
