  - nq_leveraged_etf_rebalance_pressure
  - nq_default_spread_orderflow_risk_premium
  - nq_epu_policy_uncertainty_intraday
  conclusion: Eligible as a separate NQ edge because it tests unconditional all-weekday RTH long exposure from fixed completed bars, not weekday selection, volatility management, macro conditioning, overnight-to-late-day momentum, ETF rebalance pressure, or orderflow confirmation.
