timeframe: 5m
research_metadata:
  academic_source: Heston Korajczyk Sadka (2010); Lou Polk Skouras (2019); Urquhart et al. intraday timing evidence
  edge_thesis: NQ may retain a positive RTH intraday drift after a completed early-session 5-minute bar.
  mechanic: Fixed long entry after the completed 12:55-13:00 ET RTH bar; no tunable entry, stop, or target parameters.
  timeframe_rationale: '5-minute bars match the source ES campaign and make signal availability explicit: entry can occur only after the configured 5-minute bar has closed.'
  pre_pnl_port_note: Direct NQ port of the ES RTH intraday risk-premium family before any NQ PnL inspection; no rescue is authorized.
  source_es_config_path: campaigns/es_rth_intraday_risk_premium/variants/early_afternoon_1300_long/config.yaml
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant tests unconditional same-session NQ long exposure from a fixed completed RTH bar through a same-day flatten, directly expressing the RTH intraday risk-premium thesis.
    entry_logic_rationale: Weekday and signal time are known before entry. The entry module emits only after the configured completed 5-minute RTH bar, and engine execution must occur no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to tick, and independent of future highs/lows.
    target_exit_rationale: The fixed-R target is predeclared; unresolved positions flatten at the same-session 15:55 ET cutoff.
    profitability_rationale: The setup can pass only if a broad NQ RTH long premium survives costs, pessimistic fills, fixed entry timing, and the staged robustness gates.
    known_failure_modes: The equity risk premium may be earned mostly overnight, NQ intraday drift may be dominated by a few rebound days, or fixed stops/targets may erase any drift after costs.
    pre_test_decision: approve_for_testing
