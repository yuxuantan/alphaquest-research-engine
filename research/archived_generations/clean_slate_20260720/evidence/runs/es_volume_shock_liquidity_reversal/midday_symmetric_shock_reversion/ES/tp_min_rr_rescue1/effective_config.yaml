timeframe: 5m
research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Llorente, Michaely, Saar,
    and Wang (2002)
  edge_thesis: Midday high-volume shocks may be temporary liquidity events rather
    than information, creating short-horizon reversion.
  mechanic: From 11:30 through 13:30 ET, fade a completed high-volume 5-minute shock
    bar in either direction; flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars preserve completed-bar signal timing and next-bar-open
    execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized minimum-RR rescue preserves the
      existing es_volume_shock_liquidity_reversal/midday_symmetric_shock_reversion
      entry mechanic: From 11:30 through 13:30 ET, fade a completed high-volume 5-minute
      shock bar in either direction; flatten at 15:55 ET unless stop or target is
      hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected tested source
      run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Stop-loss logic and parameter space are unchanged. This rescue
      is isolated to a take-profit RR floor so the failure/success attribution remains
      auditable.
    target_exit_rationale: Only target_r_multiple values below 1.0R are raised to
      1.0R. Sub-1R variants can have their gross edge consumed by slippage, commissions,
      and exchange fees; this tests whether the same signal needs at least 1R payoff
      distance to survive costs.
    profitability_rationale: If the original edge produces directional follow-through
      beyond a sub-1R target, a 1R floor should improve average win size without changing
      signal causality.
    known_failure_modes: A 1R floor may reduce win rate, increase holding time, miss
      too many exits, or simply expose that the signal has no sustained follow-through;
      all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_volume_shock_liquidity_reversal
    source_variant_id: midday_symmetric_shock_reversion
    source_run_id: run1
    source_config_path: campaigns/es_volume_shock_liquidity_reversal/variants/midday_symmetric_shock_reversion/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose
      limited-core target grid used sub-1R target values and showed stronger performance
      at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.5
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.5
      top_target_is_grid_max: true
      higher_target_net_slope: -1994.3518518518517
      higher_target_pf_slope: -.inf
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 2.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.5
      new: &id002
      - 1.0
      - 1.5
