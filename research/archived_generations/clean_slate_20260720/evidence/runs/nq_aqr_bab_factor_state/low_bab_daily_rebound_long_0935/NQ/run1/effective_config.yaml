variant_id: low_bab_daily_rebound_long_0935
test_run_id: run1
research_metadata:
  academic_source: Frazzini and Pedersen (2014); AQR Betting Against Beta Equity Factors
    Daily
  edge_thesis: Poor lagged BAB factor state may proxy defensive-factor stress, deleveraging,
    or leverage-constraint pressure that can condition NQ intraday risk appetite.
  mechanic: At 09:35 ET, long NQ when the lagged AQR USA BAB one-day return rank is
    in the lower tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar decision timing and next-bar-open
    execution while using a 45-calendar-day-lagged public BAB factor state.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: At 09:35 ET, long NQ when the lagged AQR USA BAB one-day
      return rank is in the lower tail; flatten by 15:55 ET unless stop or target
      is hit.
    entry_logic_rationale: The BAB state is known before the session from a feature
      table that requires a 45-calendar-day AQR publication lag. The intraday signal
      is emitted only on the completed bar immediately before the configured entry
      timestamp, so the engine can enter no earlier than the next bar open.
    stop_loss_rationale: A fixed percent stop is declared before NQ testing, tick-rounded
      by the engine, and evaluated with pessimistic same-bar stop/target ordering.
    target_exit_rationale: The fixed-R target and 15:55 ET flatten are declared before
      NQ testing and do not use final VWAP, final range, future BAB values, or discretionary
      exits.
    profitability_rationale: If lagged BAB stress proxies leverage-constraint risk
      appetite, NQ may show same-day rebound or two-sided state behavior after the
      conservative availability lag. The pre-PnL density audit cleared every declared
      threshold before NQ PnL was inspected.
    known_failure_modes: The BAB state may be too stale, may predict only cross-sectional
      equity returns rather than NQ direction, or may be dominated by a few crisis
      days. WFA and monkey gates must reject unstable variants.
    pre_test_decision: approve_for_testing
    source_es_template: campaigns/es_aqr_bab_factor_state/rescue_attempts/parameter_space_rescue_1/low_bab_daily_rebound_long_0935/config.yaml
    ported_before_nq_pnl: true
  pre_pnl_density:
    artifact: research_artifacts/nq_aqr_bab_factor_state_density_audit_20260622.md
    status: approved_for_testing
    variant_min_signals_per_year: 58.553999
    variant_max_signals_per_year: 70.407297
strategy:
  entry:
    module: aqr_bab_factor_state
    params:
      setup_mode: low_bab_rebound_long
      feature_csv: data/external/nq_aqr_bab_features_20110103_20260612.csv
      value_column: bab_usa_return_1d
      rank_column: bab_usa_return_rank_252
      bab_rank_threshold: 0.275
      entry_time: 09:35:00
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  sl:
