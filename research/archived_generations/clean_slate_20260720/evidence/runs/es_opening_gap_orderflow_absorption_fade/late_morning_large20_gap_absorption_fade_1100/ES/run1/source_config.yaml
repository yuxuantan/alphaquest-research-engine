research_metadata:
  academic_source: Liu, Liu, Wang, Zhou, and Zhu (2016); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES opening gaps may mean-revert when completed post-open large-20 aggregate orderflow shows absorption against the gap.
  mechanic: >
    If ES opens 1-3 points away from the prior RTH close, aggregate large-20
    signed flow from 10:45 through 11:00 ET must be against the gap direction.
    The strategy then fades the gap and flattens same day.
  timeframe_rationale: 5-minute bars preserve completed-bar timing for the 10:45-11:00 absorption window while reducing one-minute orderflow noise.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-17"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge by waiting until the first hour has mostly
      resolved and then requiring completed large-20 flow against the original
      opening gap. It tests slower absorption rather than a reflexive open fade.
    entry_logic_rationale: >
      The 10:45-11:00 ET window is still liquid but far enough from the open to
      let continuation pressure reveal itself. Counter-gap large-20 imbalance
      should be economically meaningful only if inventory is being absorbed.
    stop_loss_rationale: >
      A percent-from-entry stop keeps the risk rule simple and avoids using any
      future session range or final VWAP.
    target_exit_rationale: >
      A fixed-R target tests whether the remaining intraday window can convert
      absorption into enough reversal before the same-day flatten.
    profitability_rationale: >
      The setup should be profitable if the original gap is not accepted by the
      market and larger trades continue pressing against it after the first
      hour. Pre-PnL density showed 64.48 to 102.20 raw signals per year across
      the entry grid.
    known_failure_modes: >
      The late signal can miss the best reversal, counterflow can be short-covering
      noise, or the trade can be dominated by crisis sessions.
    pre_test_decision: approve_for_testing
