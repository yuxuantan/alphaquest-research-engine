timeframe: 5m
research_metadata:
  academic_source: Liu, Liu, Wang, Zhou, and Zhu (2016); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES opening gaps may mean-revert when completed post-open large-20 aggregate orderflow shows absorption against the gap.
  mechanic: 'If ES opens 1-3 points away from the prior RTH close, aggregate large-20 signed flow from 10:45 through 11:00 ET must be against the gap direction. The strategy then fades the gap and flattens same day.

    '
  timeframe_rationale: 5-minute bars preserve completed-bar timing for the 10:45-11:00 absorption window while reducing one-minute orderflow noise.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by waiting until the first hour has mostly resolved and then requiring completed large-20 flow against the original opening gap. It tests slower absorption rather than a reflexive open fade.

      '
    entry_logic_rationale: 'The 10:45-11:00 ET window is still liquid but far enough from the open to let continuation pressure reveal itself. Counter-gap large-20 imbalance should be economically meaningful only if inventory is being absorbed.

      '
    stop_loss_rationale: 'A percent-from-entry stop keeps the risk rule simple and avoids using any future session range or final VWAP.

      '
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics are unchanged, while any existing target_r_multiple below 1.0R is raised to 1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: 'The setup should be profitable if the original gap is not accepted by the market and larger trades continue pressing against it after the first hour. Pre-PnL density showed 64.48 to 102.20 raw signals per year across the entry grid.

      '
    known_failure_modes: 'The late signal can miss the best reversal, counterflow can be short-covering noise, or the trade can be dominated by crisis sessions.

      '
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_opening_gap_orderflow_absorption_fade
    source_variant_id: late_morning_large20_gap_absorption_fade_1100
    source_run_id: run1
    source_config_path: campaigns/es_opening_gap_orderflow_absorption_fade/variants/late_morning_large20_gap_absorption_fade_1100/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.5
      - 0.75
      - 1.0
      target_grid_values_below_1r:
      - 0.5
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.0
      top_target_is_grid_max: true
      higher_target_net_slope: 223.14814814814827
      higher_target_pf_slope: 0.15674536180656612
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: strategy.tp.params.target_r_multiple
      old: 0.75
      new: 1.0
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.5
      - 0.75
      - 1.0
      new: &id002
      - 1.0
