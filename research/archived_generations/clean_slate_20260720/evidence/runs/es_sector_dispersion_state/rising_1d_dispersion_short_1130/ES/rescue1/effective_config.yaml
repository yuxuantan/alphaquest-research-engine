campaign_id: es_sector_dispersion_state
variant_id: rising_1d_dispersion_short_1130
test_run_id: rescue1
strategy_name: sector_dispersion_state
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Stivers and Sun (2010); Duffee (2001); Verousis and Voukelatos
    (2015)
  edge_thesis: A sharp lagged increase in sector-return dispersion may proxy deteriorating
    breadth and negative ES intraday drift.
  mechanic: At 11:30 ET, short ES when prior-business-day 1-day sector dispersion
    change ranks in the upper tail.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open
    execution while the dispersion state is lagged by one business day.
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: parameter-space-only; mechanics, modules, data, session, costs, and
    validation gates unchanged
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: sector_dispersion_state
    params:
      feature_csv: data/external/es_sector_dispersion_features_20110103_20260609.csv
      setup_mode: rising_1d_dispersion_short
      bar_interval_minutes: 1
      entry_time: '11:30:00'
      flatten_time: '15:55:00'
      max_trades_per_day: 1
      rank_min: 0.7
      stop_pct: 0.0025
      target_r_multiple: 1.5
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '15:55:00'
core:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:55:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 80
  min_profit_factor: 1.2
  min_total_net_profit: 0
  min_expectancy_r: 0.03
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.4
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.45
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset: *id001
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &id002
    sl.params.stop_pct:
    - 0.003
    - 0.004
    - 0.006
    tp.params.target_r_multiple:
    - 1.5
    - 2.0
    - 2.5
    entry.params.rank_min:
    - 0.65
    - 0.7
    - 0.75
monkey:
  data_subset: *id001
  runs: 300
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_exclusive_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: window_grid
  parameters: *id002
campaign_tests:
  acceptance_oos_test:
    train_months: 24
    test_months: 6
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.trades_per_year
      min: 50
    - metric: metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: grid
      workers: 6
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      valid_parameter_combination_count: true
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_fraction
      fraction: 0.1
      avoid_last_fraction: 0.1
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    parallel:
      enabled: true
      scope: grid
      workers: 6
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_fraction
      fraction: 0.1
      avoid_last_fraction: 0.1
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    parallel:
      enabled: true
      scope: runs
      workers: 6
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: stitched_oos_metrics.profit_factor
      min: 1.2
    - metric: stitched_oos_metrics.mar
      min: 0.4
    - metric: stitched_oos_metrics.trades_per_year
      min: 50
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: first_fraction
      fraction: 0.9
    parallel:
      enabled: true
      scope: window_grid
      workers: 6
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: runs
      workers: 6
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
    parallel:
      enabled: true
      scope: runs
      workers: 6
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.trades_per_year
      min: 50
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 48
    test_months: 12
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    parallel:
      enabled: true
      scope: runs
      workers: 6
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 10
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 300
  seed: 11
  path_months: 6
  skip_trade_probability: 0.05
  adverse_slippage_per_trade: 12.5
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: true
  retain_path_trades: false
  retain_path_events: false
  parallel:
    enabled: true
    scope: runs
    workers: 6
