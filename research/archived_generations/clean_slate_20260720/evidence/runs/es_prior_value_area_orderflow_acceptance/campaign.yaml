campaign_id: es_prior_value_area_orderflow_acceptance
title: ES Prior Value-Area Orderflow Acceptance
decision: FAIL
created_at: '2026-06-18'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Prior-session accepted-value boundaries, approximated from completed RTH volume profile levels, can act as objective intraday support/resistance. A completed ES close outside prior value with aligned aggregate orderflow may identify value migration and short-horizon continuation after next-bar execution.
rationale: This is a price-action-first aggregate-orderflow campaign. The prior session creates VAH, VAL, and POC before the current session starts; the current-session trigger is acceptance outside that prior value area. Orderflow is only a confirmation that the boundary break has same-direction participation.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Shows intraday support/resistance levels can have statistically significant predictive content; this campaign tests objective prior value-area boundaries as support/resistance-like accepted-value levels.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics, 12(1), 47-88
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Documents the price-impact role of order-flow imbalance; this campaign uses completed-bar Sierra signed-volume imbalance as a coarse aggregate participation proxy, not true LOB OFI.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  venue: Exchange market profile/liquidity analytics documentation
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supports market-profile style analysis of volume, market activity, and liquidity across historical intervals; this campaign adapts the concept to ES completed RTH bars.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline from that local 1-minute source
- prior-session approximate VAH, VAL, and POC computed only after the previous RTH session is complete
- signed, large-10, and large-20 aggregate flow columns for completed signal bars
data_quality_caveats:
- Sierra aggregate orderflow is completed-bar research data, not LOB OFI or tick-path truth.
- The module approximates volume-at-price by distributing each completed 5-minute bar volume uniformly across its high-low tick range; this is not true volume profile.
- Same-bar stop/target conflicts remain governed by pessimistic OHLC handling with 1-minute detail when available.
lookahead_risks:
- Prior VAH, VAL, and POC are computed only from the previous completed RTH session and are frozen before current-session entries.
- A signal uses the completed 5-minute bar close and the engine enters at the next bar open or later.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
- All variants flatten same-day before the configured cutoff and do not hold overnight.
failure_modes:
- Prior value-area boundaries may be too imprecise when approximated from OHLCV bars instead of true volume-at-price.
- Breaks beyond prior value may be exhaustion or stop probes rather than acceptance.
- Aggregate signed flow may lag price or misclassify participation direction.
- Profits may concentrate in high-volatility regimes or a small number of trend days.
- One-tick worse slippage may erase a narrow continuation effect.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_prior_session_breakout_orderflow_confirmation
  - es_prior_level_delta_dislocation
  - es_prior_session_level_breakout_continuation
  - es_opening_range_orderflow_breakout
  - es_opening_range_retest_orderflow
  - es_vwap_orderflow_pullback_continuation
  - es_round_number_orderflow_barrier
  - es_session_extreme_delta_divergence
  - es_wide_range_orderflow_continuation
  conclusion: Not a duplicate in active scope. This campaign uses prior-session accepted-value boundaries derived from approximate volume profile, not prior high/low, opening range, VWAP, round-number, rolling range, session extreme, or single-bar range expansion levels.
