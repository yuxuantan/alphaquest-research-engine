campaign_id: nq_gao_last_half_hour_orderflow_confirmation
variant_id: first30_signed_flow_long_only_1530
test_run_id: run1
strategy_name: gao_last_half_hour_orderflow
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: NQ upside leadership and index drift may make first-window upside continuation
    more persistent than symmetric long/short rules.
  mechanic: Long-only 15:30 ET continuation after a completed positive first-30-minute
    NQ return with positive signed-volume imbalance.
  timeframe_rationale: Five-minute bars make the completed first-window aggregation
    auditable while preserving an exact 15:30 ET signal close and same-bar stop/target
    conflict handling in the runner.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant isolates the long side of the Gao/orderflow
      mechanism to test whether NQ upside pressure carries cleaner late-day information
      than symmetric continuation.
    entry_logic_rationale: The signal is evaluated at 15:30 ET, after the declared
      first-window aggregate is fully known. The entry is a last-half-hour continuation
      test, not a VWAP, prior-level, opening-range, or future-session-statistic rule.
    stop_loss_rationale: The percent-from-entry stop is declared before testing, rounded
      to NQ tick size, and varied only through sl.params.stop_pct.
    target_exit_rationale: The fixed-R target is declared before testing, varied only
      through tp.params.target_r_multiple, and contains no target below 1.0R.
    profitability_rationale: A real NQ first-window-to-last-half-hour effect should
      survive neighboring return, imbalance, stop, and target settings after commissions,
      slippage, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: The edge may be absent in NQ futures, orderflow confirmation
      may pick exhaustion instead of continuation, strict neighboring settings can
      be sparse, and results may concentrate in high-volatility sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    decision: PASS_WITH_SPARSE_NEIGHBORS
    method: Entry-condition count over raw NQ RTH sessions only; no PnL, stop, target,
      WFA, monkey, Monte Carlo, prop simulation, or holdout result was inspected.
    full_min_signals_per_year: 11.4
    note: Worst declared entry corner before PnL is about 11.4 signals/year; broad
      long-only corners are above 50/year.
