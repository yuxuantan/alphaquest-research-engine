research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: >-
    Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov
    (2014); CME Market Profile educational material
  edge_thesis: >-
    Failed sweeps of prior-day RTH extremes can reverse when they occur near
    the current-session developing value edge and aggressive flow is absorbed instead of
    accepted beyond the level.
  mechanic: >-
    Trade both directions. Short after a PDH sweep fails back below PDH near
    developing VAH with strong positive four-tick delta absorbed. Long after a PDL sweep
    fails back above PDL near developing VAL with strong negative four-tick delta absorbed.
  timeframe_rationale: >-
    Three-minute bars define structure and pivots, while the Sierra
    SCID-derived feature builder emits intrabar release price and release timestamp so
    entry does not wait for the 3-minute bar close.
  mechanics_review:
    mechanic_expresses_edge: >-
      The variant encodes the requested range-trading behavior directly:
      prior-day RTH extremes define the public sweep level, the same-day developing VAP defines
      the auction-market context, and the four-tick signed-volume failure defines absorbed
      breakout pressure before entering the snapback.
    entry_logic_rationale: >-
      Entry requires three previously formed one-bar pivots, a same-session
      range above 0.2 percent of the session open, no LVN inside the developing 70 percent value
      area where an LVN is defined as a price level with volume less than or equal to 10 percent
      of POC volume, a sweep and reclaim of PDH or PDL, proximity to VAH or VAL within 0.05 percent of
      the release-time session open, and a five-second failed delta-zone check from Sierra prints.
    stop_loss_rationale: >-
      The stop is placed at the sweep extreme with no optimized dollar value.
      For shorts this is the release-time session high after the PDH sweep; for longs it is the
      release-time session low after the PDL sweep. This is the stated invalidation point of the
      failed-breakout thesis.
    target_exit_rationale: >-
      The target is exactly 1R from the entry after the sweep-extreme stop
      is known. It does not use future value-area levels, final session profile, final daily
      range, or discretionary target selection after the entry has triggered.
    profitability_rationale: >-
      If the breakout pressure was absorbed near the value edge after
      a meaningful morning range has formed, price should often rotate at least one unit of
      risk before retesting the sweep extreme. The rule is intentionally strict and may be too
      sparse after costs.
    known_failure_modes: >-
      The exact conjunction can be so sparse that it produces too few trades
      for validation. Sierra bid/ask volume is not queue-level absorption, the five-second
      release check may not reproduce discretionary tape reads, and the first-minute fill path
      is still approximate without tick-level execution replay.
    pre_test_decision: approve_for_testing
