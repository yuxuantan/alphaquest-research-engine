timeframe: 1m
research_metadata:
  academic_source: Giot (2005); Kablan, Emiroglu, and Danisoglu (2021); official Cboe VIX/VXN histories
  edge_thesis: Lagged Nasdaq-versus-S&P implied-volatility dispersion may identify same-day ES intraday risk-off pressure or rebound.
  mechanic: At 12:00 ET, buy ES when the latest prior 1-day change in the Cboe VXN/VIX ratio ranks in the lower tail; flatten by 15:55.
  rescue_attempt: 1
  rescue_scope: parameter_space_only
  rescue_reason: Original falling VXN/VIX ratio long failed limited core below the 70% profitable-combo gate, with its only positive neighborhood at lower change-rank thresholds and wide stops; rescue preserves the same signal, direction, time, modules, data, costs, and gates while testing the adjacent lower-tail/wider-stop grid.
  timeframe_rationale: A prior-day contraction in relative Nasdaq volatility can proxy easing technology-sector stress; the noon completed-bar signal tests the midday expression while preserving next-bar execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_cboe_vxn_vix_dispersion_intraday/falling_vxn_vix_ratio_long_1200 entry mechanic: At 12:00 ET, buy ES when the latest prior 1-day change in the Cboe VXN/VIX ratio ranks in the lower tail; flatten by 15:55..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_cboe_vxn_vix_dispersion_intraday
    source_variant_id: falling_vxn_vix_ratio_long_1200
    source_run_id: rescue1
    source_config_path: campaigns/es_cboe_vxn_vix_dispersion_intraday/rescue_attempts/parameter_space_rescue_1/falling_vxn_vix_ratio_long_1200/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.006
      new: 0.009
    - path: strategy.entry.params.stop_pct
      old: 0.006
      new: 0.009
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.004
      - 0.006
      - 0.008
      new: &id002
      - 0.006
      - 0.009
      - 0.012
