research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market profile education.
  edge_thesis: Afternoon closes outside prior true value with aligned signed flow may capture continuation after the market has accepted a new value area.
  mechanic: Afternoon two-sided true-VAP value acceptance with completed signed-volume confirmation.
  timeframe_rationale: One-minute bars preserve cached prior_vap fields that higher-timeframe aggregation drops, while still enforcing next-bar execution after the completed signal bar.
  mechanics_review_required: true
  mechanics_review_version: 1
  mechanics_review:
    mechanic_expresses_edge: This variant tests whether prior true value boundaries remain useful after morning discovery by requiring completed afternoon acceptance outside VAH or VAL with signed-flow alignment.
    entry_logic_rationale: From 12:30 through 15:00 ET, the completed one-minute close must be outside prior value and signed-volume imbalance must align with the breakout direction before next-bar entry.
    stop_loss_rationale: The percent-from-entry stop is declared before testing, does not depend on future session extremes, and rejects the migration thesis when price quickly returns into prior value.
    target_exit_rationale: The fixed-R target is computed only from entry and stop distance, uses no future profile or range information, and unresolved positions flatten before the configured cutoff.
    profitability_rationale: If afternoon outside-value acceptance reflects durable institutional repricing, the continuation should remain detectable even after the initial morning auction.
    known_failure_modes: Afternoon signals can be late, reversals into the close can erase continuation, and same-day flattening may cut winners before a larger value-migration move develops.
    pre_test_decision: approve_for_testing
