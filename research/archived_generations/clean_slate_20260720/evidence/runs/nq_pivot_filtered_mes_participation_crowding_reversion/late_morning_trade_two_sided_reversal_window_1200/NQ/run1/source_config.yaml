research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); Lo, Mamaysky, and
    Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: High MES participation during a completed NQ move may mark temporary smaller-contract crowding only
    when the reversal direction agrees with the last completed multi-timeframe pivot market-structure pattern.
  mechanic: From 10:30 through 12:00 ET, fade the first completed 30-minute NQ move in either direction when MES
    trade-share participation is high and carried completed pivot structure agrees with the fade; flatten by 13:00
    ET.
  timeframe_rationale: 1-minute bars preserve completed NQ/MES participation features and next-bar execution while
    the fixed pivot filter builds higher-timeframe structure only from completed 1-minute bars. Carrying completed
    pivots across RTH sessions implements the predeclared last-pattern-found bias without using any future bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: From 10:30 through 12:00 ET, fade the first completed 30-minute NQ move in either direction
      when MES trade-share participation is high and carried completed pivot structure agrees with the fade; flatten
      by 13:00 ET.
    entry_logic_rationale: The base MES crowding condition is evaluated on completed NQ return and prior-history
      MES participation rank inside the fixed window. A signal is accepted only when the completed carried pivot
      bias matches the proposed fade direction. Engine execution remains next-bar open or later.
    stop_loss_rationale: The percent-from-entry stop is declared before NQ testing, rounded to the NQ tick, and
      does not use future swing or post-entry structure levels.
    target_exit_rationale: The fixed-R target and intraday flatten are predeclared; target_r_multiple is never below
      1.0R.
    profitability_rationale: If high smaller-contract participation reflects crowded late reaction, completed pivot
      structure may filter NQ fades to pullbacks in the prevailing intraday structure rather than opposing persistent
      repricing.
    known_failure_modes: MES participation may be informed, carried pivot structure may lag, first-window signals
      may be weak, and costs/slippage may erase any mean reversion.
    pre_test_decision: approve_for_testing
    source_es_template: campaigns/es_pivot_filtered_mes_participation_crowding_reversion/variants/late_morning_trade_two_sided_reversal_window_1200/config.yaml
    ported_before_nq_pnl: true
  pre_pnl_density:
    artifact: research_artifacts/nq_pivot_filtered_mes_participation_crowding_reversion_density_audit_final_20260622.md
    status: approved_for_testing
    variant_min_signals_per_year: 73.359773
    variant_max_signals_per_year: 101.239302
