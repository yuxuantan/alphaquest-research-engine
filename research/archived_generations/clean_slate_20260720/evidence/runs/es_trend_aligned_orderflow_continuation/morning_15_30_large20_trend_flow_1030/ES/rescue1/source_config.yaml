dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014); Moskowitz, Ooi, and Pedersen
    (2012)
  edge_thesis: ES may continue in the direction of completed multi-timeframe intraday trend structure when same-bar
    aggregate orderflow confirms direction.
  mechanic: At the 10:30 ET completed bar, require 15-minute and 30-minute HH/HL for longs or LH/LL for shorts,
    plus aligned large-20 signed-flow imbalance.
  timeframe_rationale: 5-minute bars keep the price-action state completed and auditable while preserving enough
    intraday observations for one daily signal and 1-minute detail conflict handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by requiring two completed price-action trends, a
      15-minute structure and a 30-minute structure, to point in the same direction before the first post-open hour
      is over. The large-20 signed-flow condition then asks whether larger aggressive traders are participating
      in that direction on the completed signal bar.

      '
    entry_logic_rationale: 'The 10:30 ET signal gives the RTH auction a full hour to reveal whether price is making
      higher highs and higher lows or lower highs and lower lows. The entry does not rely on the opening range or
      future session levels; it trades only after the completed 10:25-10:30 bar confirms both price structure and
      large-trade aggregate flow.

      '
    stop_loss_rationale: 'A percent-from-entry stop is appropriate here because the entry is a directional continuation
      state rather than a fixed reference-level reclaim. The stop grid brackets normal intraday ES noise without
      using a future low, swing, VWAP, or session-derived level that would introduce ambiguity.

      '
    target_exit_rationale: 'A fixed-R target keeps the exit independent of post-entry orderflow and avoids optimizing
      around later session paths. The forced 15:55 ET flatten exits any trade that does not reach stop or target
      inside the same RTH session.

      '
    profitability_rationale: 'This should be profitable only if early completed-bar trend structure plus large-trade
      pressure identifies genuine inventory continuation. The pre-PnL density audit showed all four declared entry
      corners above roughly 59 trades per year, so the variant is not dependent on rare signals.

      '
    known_failure_modes: 'The setup can fail if large-20 flow marks exhaustion instead of informed participation,
      if the one-hour trend is already overextended, or if generic percent stops are too wide or too tight for the
      realized continuation captured before the same-day flatten.

      '
    pre_test_decision: approve_for_testing
    rescue_attempt: 'parameter_space_rescue_1: changed only fixed min_trend_move_ticks and the declared parameter
      grid; entry module, stop module, target module, data, costs, sessions, signal time, trend horizons, and flow
      mode are unchanged.'
