campaign_id: es_vwap_orderflow_pullback_continuation
variant_id: morning_large20_trend_reclaim_two_sided
test_run_id: stop_widen_rescue1
strategy_name: vwap_orderflow_pullback_continuation
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Bialkowski, Darolles, and Le Fol (2008); McCulloch and Kazakov
    (2007); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: VWAP-side ES pullbacks may continue when the completed reclaim bar
    has aligned large-20 aggregate orderflow.
  mechanic: From 09:45 through 12:00 ET, enter with the VWAP-side trend after a completed
    pullback/reclaim only when same-bar large-20 signed-flow imbalance confirms direction.
  timeframe_rationale: 5-minute bars reduce one-minute VWAP noise while preserving
    completed-bar signal timing and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by requiring the price-action
      setup first: ES must already have a completed VWAP-side trend, then pull back
      to VWAP, and then close back on the trend side. The signed-volume filter is
      only a confirmation on that completed reclaim bar, so it does not become a pure
      orderflow timing strategy.

      '
    entry_logic_rationale: 'The 09:45-12:00 ET window gives the session enough history
      to form VWAP and trend state while keeping the test in the liquid morning auction.
      Requiring two to four completed trend closes plus positive or negative reclaim-bar
      large-20 signed flow should isolate continuation attempts that have both price
      and stricter larger-trade participation evidence.

      '
    stop_loss_rationale: 'A percent-from-entry stop is simple and independent of post-entry
      orderflow. It rejects the trade if the reclaim cannot hold enough of the VWAP-side
      move to justify continuation after costs.

      '
    target_exit_rationale: 'A fixed-R target keeps the exit predeclared and lets the
      grid test whether VWAP reclaim continuation can produce enough reward relative
      to the initial stop before the same-day flatten.

      '
    profitability_rationale: 'The setup should only be profitable if VWAP acts as
      a benchmark value area and aligned large-20 aggressive flow identifies reclaims
      with real inventory follow through. Pre-PnL density showed the full entry grid
      stayed above 50 signals per year, so the test is not dependent on rare events.

      '
    known_failure_modes: 'The edge can fail if VWAP reclaims are crowded, if large-20
      buckets are noisy, if confirmation arrives after most of the move, or if profits
      are concentrated in a small set of high-volatility trend days.

      '
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_vwap_orderflow_pullback_continuation
    source_variant_id: morning_large20_trend_reclaim_two_sided
    source_run_id: run1
    source_config_path: campaigns/es_vwap_orderflow_pullback_continuation/variants/morning_large20_trend_reclaim_two_sided/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass
      flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR,
      and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0015
      - 0.0025
      - 0.004
      new: &id002
      - 0.00225
      - 0.00375
      - 0.006
