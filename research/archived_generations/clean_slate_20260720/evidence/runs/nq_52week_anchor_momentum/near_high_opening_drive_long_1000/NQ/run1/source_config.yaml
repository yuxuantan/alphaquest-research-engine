timeframe: 5m
research_metadata:
  academic_source: George and Hwang (2004) 52-week-high anchoring/momentum; Journal
    of Finance.
  source_title: The 52-Week High and Momentum Investing
  source_authors: Thomas J. George and Chuan-Yang Hwang
  source_year: 2004
  source_link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2004.00695.x
  source_doi: 10.1111/j.1540-6261.2004.00695.x
  edge_thesis: Completed prior 252-session high acts as a salient anchor. NQ may continue
    upward when it trades from a high-nearness anchor band and completed intraday
    pressure confirms strength.
  mechanic: Prior close is in a broad top-ranked 52-week-high anchor band, then the
    completed 09:55-10:00 ET bar confirms positive same-session pressure.
  timeframe_rationale: The 10:00 ET decision waits for the first completed half hour
    after the cash open while preserving same-day flattening.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  pre_pnl_density:
    status: PASS
    artifact: research_artifacts/nq_52week_anchor_momentum_density_audit_20260701.md
    summary_csv: research_artifacts/nq_52week_anchor_momentum_density_summary_20260701.csv
    nq_grid_fixed_before_pnl: true
    entry_rows: 9
    rows_passing_density: 9
    density_audit_completed_at: '2026-07-01'
  duplicate_edge_check:
    active_scope_only: true
    checked_edges:
    - nq_daily_time_series_momentum
    - nq_daily_short_term_reversal
    - nq_chartfanatics_weekly_stage_breakout_bias
    - nq_market_structure_pivot_trend_bias
    - nq_prior_session_breakout_orderflow_confirmation
    - nq_round_number_orderflow_barrier
    conclusion: 'Eligible as a distinct anchor-level edge before PnL: the state variable
      is distance to the completed prior 252-session high, not trailing return, weekly
      stage score, prior-session levels, or round-number barriers.'
  mechanics_review:
    mechanic_expresses_edge: Prior close is in a broad top-ranked 52-week-high anchor
      band, then the completed 09:55-10:00 ET bar confirms positive same-session pressure.
    entry_logic_rationale: The entry module records completed RTH daily bars internally,
      excludes the current session from the 252-session anchor calculation, and only
      emits after a completed 5-minute signal bar.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and invalidates
      the intraday continuation thesis after adverse movement from the next-bar fill.
    target_exit_rationale: The fixed-R target monetizes same-day continuation without
      using final session range, final VWAP, or discretionary exits.
    profitability_rationale: If 52-week-high anchoring has enough index-level behavioral
      spillover, near-anchor continuation should survive costs and walk-forward tests.
    known_failure_modes: The original anomaly is cross-sectional equity research,
      not an intraday NQ futures result; the anchor band may be too broad, regime-dependent,
      or already captured by generic momentum.
    pre_test_decision: approve_for_testing
  rescue_status: none
