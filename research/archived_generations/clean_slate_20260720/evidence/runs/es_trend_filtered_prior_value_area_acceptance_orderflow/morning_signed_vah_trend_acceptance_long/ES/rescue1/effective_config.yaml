research_metadata:
  academic_source: Osler (2000); Lo, Mamaysky, and Wang (2000); Cont, Kukanov, and
    Stoikov (2014); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: A morning close above prior VAH should be more durable when completed
    signed flow and completed-bar trend structure both confirm upside acceptance.
  mechanic: From 09:35 through 11:30 ET, enter long only after a completed 5-minute
    ES bar closes above prior-session VAH plus buffer, has positive signed-volume
    imbalance, and passes two completed-bar higher-high/higher-low trend windows.
  timeframe_rationale: Five-minute bars reduce noisy one-minute value-boundary flicker
    but keep the next-bar entry close enough to the acceptance event for intraday
    continuation.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant directly expresses value-area upside acceptance.
      The prior RTH value area is frozen before the current session, the signal bar
      must close above VAH, same-bar signed flow must show buyer participation, and
      the already-completed current-session structure must be rising.
    entry_logic_rationale: The entry uses only completed 5-minute bars. Prior VAH
      is computed from the completed previous RTH session, the trend gate compares
      completed current-session high/low windows through the signal bar, and the signed-volume
      imbalance is read from the completed signal bar. The engine enters no earlier
      than the next bar open, so the acceptance close is not retroactively filled.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to the
      ES tick, and independent of future levels. It rejects the trade if price cannot
      sustain upside acceptance after next-bar execution.
    target_exit_rationale: The fixed-R target tests whether the accepted-value migration
      continues far enough after commission and one tick of slippage. It does not
      use final VWAP, final session range, or future orderflow.
    profitability_rationale: This should be profitable only if ES buyers accepting
      price above yesterday's fair-value area continue repricing after the signal,
      and if signed flow plus rising structure filters reduce false breaks above VAH.
      The one-trade-per-day cap keeps it from over-counting repeated probes of the
      same level.
    known_failure_modes: Prior VAH is an OHLCV approximation, trend confirmation may
      arrive late, signed flow can mark exhaustion, and long-only morning continuation
      may concentrate in a few strong-trend regimes.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_trend_filtered_prior_value_area_acceptance_orderflow_rescue_attempt_1_density_audit_20260618.md
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter_space_and_fixed_parameters_only
    reason: Original limited core had only a tiny profitable pocket at stricter signed-flow
      threshold, wider stop, and 1.5R target. Rescue narrows to that adjacent parameter
      neighborhood without changing the long VAH acceptance plus trend/orderflow mechanic.
    mechanics_changed: false
    modules_changed: false
