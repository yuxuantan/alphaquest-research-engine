research_metadata:
  academic_source: Osler (2000); Lo, Mamaysky, and Wang (2000); Cont, Kukanov, and
    Stoikov (2014); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Afternoon prior value-area acceptance should be more reliable when
    the largest aggregate trade segment and completed-bar trend structure confirm
    that accepted value has migrated.
  mechanic: From 12:30 through 15:30 ET, trade either direction after a completed
    5-minute close accepts beyond prior VAH/VAL, large20 signed-volume imbalance confirms
    the direction, and two completed trend windows agree.
  timeframe_rationale: The afternoon window tests whether accepted value continues
    after the morning discovery phase while still leaving time for target/stop resolution
    before 15:55 ET flatten.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge through afternoon continuation
      of accepted value. A signal requires price outside yesterday's accepted value,
      large20 flow in the same direction, and completed trend windows showing that
      the session structure has already shifted.
    entry_logic_rationale: Prior VAH/VAL are built from the completed previous RTH
      session. The afternoon signal uses only a completed 5-minute close, large20
      flow from that completed bar, and completed current-session high/low windows;
      the actual fill is the next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, rounded
      to tick, and avoids any discretionary chart adjustment. It invalidates the acceptance
      thesis if the post-entry trade cannot survive normal adverse movement.
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics
      are unchanged, while any existing target_r_multiple below 1.0R is raised to
      1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: This should be profitable only if late-session ES value
      migration persists when large-trade participation agrees with the accepted direction,
      and if trend structure prevents taking isolated afternoon probes that snap back
      into prior value.
    known_failure_modes: Large20 flow is sparse, afternoon signals may have less time
      to resolve, late-day reversals can overwhelm trend filters, and results may
      be sensitive to a small number of institutional rebalance sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.10
    artifact: research_artifacts/es_trend_filtered_prior_value_area_acceptance_orderflow_density_audit_20260618.md
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_trend_filtered_prior_value_area_acceptance_orderflow
    source_variant_id: afternoon_large20_two_sided_trend_acceptance
    source_run_id: run1
    source_config_path: campaigns/es_trend_filtered_prior_value_area_acceptance_orderflow/variants/afternoon_large20_two_sided_trend_acceptance/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose
      limited-core target grid used sub-1R target values and showed stronger performance
      at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.5
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.5
      top_target_is_grid_max: true
      higher_target_net_slope: 1068.5185185185192
      higher_target_pf_slope: 0.09516895784814416
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.5
      new: &id002
      - 1.0
      - 1.5
