research_metadata:
  academic_source: Osler (2000); Lo, Mamaysky, and Wang (2000); Cont, Kukanov, and Stoikov (2014); Moskowitz, Ooi, and Pedersen
    (2012)
  edge_thesis: A morning close below prior VAL should be more durable when completed signed flow and completed-bar trend structure
    both confirm downside acceptance.
  mechanic: From 09:35 through 11:30 ET, enter short only after a completed 5-minute ES bar closes below prior-session VAL
    minus buffer, has negative signed-volume imbalance, and passes two completed-bar lower-high/lower-low trend windows.
  timeframe_rationale: Five-minute bars dampen one-minute false probes below prior accepted value while keeping enough morning
    observations for the completed trend gate.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant directly expresses downside value-area acceptance. Prior VAL is fixed from the completed
      previous RTH session, the signal bar must close below VAL, signed flow must show seller participation, and current-session
      completed-bar structure must be falling before a short can exist.
    entry_logic_rationale: The entry uses prior-session value-area levels known before the session and completed 5-minute
      bars only. The bar close below VAL, signed flow confirmation, and trend-window comparison are all available at signal
      time; the engine then enters at the next bar open rather than filling the signal close.
    stop_loss_rationale: The tick-rounded percent stop is fixed before testing and rejects the short if price cannot remain
      below accepted value after entry. It is not tied to a future session high, final VWAP, or discretionary chart adjustment.
    target_exit_rationale: The fixed-R target gives the downside acceptance impulse a mechanical reward objective and keeps
      exits independent of post-entry information. Trades that do not hit stop or target flatten at the configured same-day
      cutoff.
    profitability_rationale: This should be profitable only if sellers accepting price below yesterday's value area continue
      pushing inventory lower after the completed-bar signal, and if negative signed flow plus falling structure filters failed
      breaks below VAL.
    known_failure_modes: Downside probes can reverse sharply, signed selling can be capitulation into buyers, the trend gate
      can enter late, and short-side returns may depend on high-volatility risk-off periods.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_trend_filtered_prior_value_area_acceptance_orderflow_rescue_attempt_1_density_audit_20260618.md
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter_space_and_fixed_parameters_only
    reason: Original limited core short variant was weakest but its least-bad cells used tighter stops and smaller targets.
      Rescue tests that adjacent risk-management neighborhood while keeping the short VAL acceptance plus trend/orderflow
      mechanic fixed.
    mechanics_changed: false
    modules_changed: false
