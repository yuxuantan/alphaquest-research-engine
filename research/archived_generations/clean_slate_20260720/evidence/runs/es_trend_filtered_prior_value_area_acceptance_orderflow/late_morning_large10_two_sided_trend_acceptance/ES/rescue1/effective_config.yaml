research_metadata:
  academic_source: Osler (2000); Lo, Mamaysky, and Wang (2000); Cont, Kukanov, and
    Stoikov (2014); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Late-morning prior value-area acceptance should be more robust when
    large-trade aggregate flow and completed-bar trend structure agree with the break
    beyond VAH or VAL.
  mechanic: From 10:00 through 12:30 ET, trade either direction after a completed
    5-minute close accepts beyond prior VAH/VAL, large10 signed-volume imbalance confirms
    the direction, and two completed-bar trend windows agree.
  timeframe_rationale: The late-morning window gives the session time to establish
    trend structure after the open while avoiding the lower-density late afternoon
    only formulation.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the same value-area acceptance
      edge through larger trade participation. Price must accept outside prior value,
      large10 flow must confirm that larger participants are active in the breakout
      direction, and completed-bar trend structure must agree before a signal can
      exist.
    entry_logic_rationale: The prior value boundary is fixed from the previous RTH
      session. The 10:00 to 12:30 ET signal window evaluates a completed 5-minute
      close outside VAH or VAL, completed same-bar large10 imbalance, and completed
      short/long trend windows. The engine enters at the next bar open, so all signal
      inputs are known before the fill.
    stop_loss_rationale: The percent-from-entry stop is fixed and tick-rounded. It
      rejects the continuation thesis when accepted price outside prior value cannot
      hold after entry, without using any future high, low, VWAP, or orderflow.
    target_exit_rationale: The fixed-R target keeps profit-taking mechanical and symmetric
      across long and short signals. Same-day flatten handles unresolved trades and
      prevents overnight exposure.
    profitability_rationale: This should be profitable only if larger ES trade flow
      confirms value migration after prior VAH/VAL acceptance and if the completed
      trend gate avoids fading strong accepted moves. The two-sided design keeps density
      viable while the one-trade-per-day cap limits repeated level probing.
    known_failure_modes: Large10 flow can still be late or exhaustionary, the trend
      gate can chase mature moves, and two-sided signals may hide asymmetry between
      upside and downside value acceptance.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.10
    artifact: research_artifacts/es_trend_filtered_prior_value_area_acceptance_orderflow_rescue_attempt_1_density_audit_20260618.md
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter_space_and_fixed_parameters_only
    reason: Original limited core least-bad cells used large10 imbalance around 0.05
      with the widest stop and larger targets. Rescue tests a wider stop/target neighborhood
      and local large10 threshold neighborhood without changing the two-sided value
      acceptance mechanic.
    mechanics_changed: false
    modules_changed: false
