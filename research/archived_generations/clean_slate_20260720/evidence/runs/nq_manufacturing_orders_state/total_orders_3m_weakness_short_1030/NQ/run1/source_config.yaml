timeframe: 1m
research_metadata:
  academic_source: Stock and Watson (1989); U.S. Census M3; FRED AMTMNO/DGORDER/NEWORDER/AMXTNO
  edge_thesis: Conservatively lagged manufacturing new-orders state may identify NQ cyclical growth, forward production-commitment, or risk-premium pressure after the cash open.
  mechanic: At 10:30 ET, sell NQ when 45-day-lagged total manufacturing new-orders 3-month growth rank is in the lower half.
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open NQ execution while the manufacturing-orders state is monthly and lagged by 45 calendar days.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  pre_pnl_density:
    artifact: research_artifacts/nq_manufacturing_orders_state_density_audit_20260701.md
    initial_rejected_artifact: research_artifacts/nq_manufacturing_orders_state_initial_density_rejected_20260701.md
    density_basis: rank_max grid [0.40, 0.45, 0.50]
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: The variant expresses broad manufacturing new-orders weakness as a possible growth-risk condition for NQ.
    entry_logic_rationale: The signal reads only FRED/Census monthly observations at least 45 calendar days before the NQ session plus the completed one-minute bar before 10:30:00 ET; same-month releases and post-entry bars are unavailable.
    stop_loss_rationale: A percent-from-entry stop is used because the macro state does not define an intraday structural price level, and only the predeclared stop_pct grid is varied.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten keeps the expression same-day, avoids overnight exposure, and varies only the predeclared target_r_multiple grid.
    profitability_rationale: A real broad-order weakness effect should survive neighboring rank, stop, and target settings after commission, one tick of slippage, and pessimistic same-bar ordering.
    known_failure_modes: The monthly state may be stale, FRED current-vintage revisions may differ from point-in-time data, and the effect may overlap with broad growth regimes even though the tested input is distinct from industrial output.
    pre_test_decision: approve_for_testing
