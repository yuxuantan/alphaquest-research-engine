timeframe: 5m
research_metadata:
  academic_source: Liu and Tse (2017); intraday momentum literature
  edge_thesis: NQ overnight return may positively forecast the last-half-hour RTH return; enter only after
    the 15:25-15:30 ET bar has completed and flatten same session.
  mechanic: At the completed 15:25-15:30 ET bar, enter NQ in the direction of the RTH open versus prior
    RTH close when the overnight return exceeds the threshold; flatten at 15:55 ET unless stop or target
    is hit.
  timeframe_rationale: 5-minute bars let the 15:30 signal use completed first/penultimate windows and
    still enter no earlier than the next bar open.
  pre_pnl_port_note: This is a direct NQ port of the ES overnight-return late-day momentum family before
    any NQ PnL inspection; the ES family failed limited-core and no NQ rescue is authorized.
  source_es_config_path: campaigns/es_overnight_return_late_day_momentum/variants/two_sided_overnight_sign_continuation_1530/config.yaml
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant uses the completed prior RTH close to current RTH open overnight
      return as the predictor and acts only at the late-day 15:30 signal point, directly expressing the
      overnight-return-to-last-half-hour thesis.
    entry_logic_rationale: 'The signal uses only completed RTH bars: prior RTH close, current RTH open,
      the completed first RTH window, and when applicable the completed 15:00-15:30 penultimate window.
      Entry can occur only on the next 5-minute bar after the 15:30 signal.'
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to the NQ tick, and independent
      of future highs/lows.
    target_exit_rationale: The fixed-R target is predeclared and unresolved positions flatten by the configured
      same-session cutoff.
    profitability_rationale: The setup can only pass if NQ overnight-return direction contains late-day
      continuation information that survives costs, pessimistic fills, and neighboring parameter settings.
    known_failure_modes: The documented effect may have decayed, late-day holding time may be too short
      for fixed-R targets, conditional variants can be sparse, and results can concentrate around macro-event
      days.
    pre_test_decision: approve_for_testing
