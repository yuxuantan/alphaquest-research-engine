research_metadata:
  mechanics_review_required: true
  academic_source: Eun and Shim (1989); Hamao, Masulis, and Ng (1990); FRED NIKKEI225 daily close
  edge_thesis: Multi-day Nikkei 225 weakness may proxy persistent Asia-session risk-off transmission into NQ RTH.
  mechanic: >
    At 10:30:00 ET, short NQ when the latest available Nikkei 225 five-day return rank is in the lower tail; entry is next bar open.
  timeframe_rationale: >
    A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the Nikkei close state is already fixed before NQ RTH.
  mechanics_review_version: "2026-07-01"
  mechanics_review:
    mechanic_expresses_edge: Nikkei five-day weakness determines a same-day risk-off NQ direction after the U.S. cash open.
    entry_logic_rationale: The entry module uses only RTH status, the completed configured 1-minute bar, and pre-RTH Nikkei rank state.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and varied only through the declared stop_pct grid.
    target_exit_rationale: The fixed-R target is declared before testing and does not use future intraday highs/lows or final session levels.
    profitability_rationale: A real Asia-equity spillover should survive neighboring Nikkei-rank, stop, and target settings after costs.
    known_failure_modes: The effect may be absorbed before RTH, may invert during U.S. macro regimes, or may fail monkey/WFA robustness.
    pre_test_decision: approve_for_testing
