campaign_id: es_range_compression_orderflow_breakout
title: ES Range Compression Breakout with Aggregate Orderflow Confirmation
decision: FAIL
created_at: '2026-06-17'
instrument: ES
market_timezone: America/New_York
edge_family: range_compression_orderflow_breakout
hypothesis: After a prior RTH narrow-range NR4 compression day, ES breakout continuation should be more reliable when the completed breakout bar has aligned aggregate orderflow, indicating real participation rather than a weak stop probe.
sources:
- title: Day Trading With Short Term Price Patterns and Opening Range Breakout
  authors: Toby Crabel
  year: 1990
  venue: Book reference
  link: book_reference
  relevance: Defines narrow-range and opening-range breakout logic used as the price-action compression component.
- title: Street Smarts
  authors: Linda Bradford Raschke and Laurence A. Connors
  year: 1995
  venue: Book reference
  link: book_reference
  relevance: Popularizes ID/NR4 and short-term breakout continuation patterns; used as practitioner source context, not acceptance evidence.
- title: Assessing the profitability of intraday opening range breakout strategies
  authors: Ulf Holmberg, Carl Lonnback, Christian Lundstrom
  year: 2013
  venue: Finance Research Letters
  doi: 10.1016/j.frl.2012.09.001
  link: https://ideas.repec.org/a/eee/finlet/v10y2013i1p27-33.html
  relevance: Academic ORB evidence supporting the use of completed opening ranges as public breakout references.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon price-pressure proxy. This campaign uses Sierra aggregate trade-side flow, not full-depth quote OFI.
rationale: This is a bounded composite edge. The primary price-action condition is a completed prior-session NR4 compression state. The breakout reference is either the prior RTH range or a completed opening range. The aggregate orderflow condition is only a same completed-bar participation filter in the breakout direction.
data_needs:
- local Sierra ES RTH 1-minute aggregate orderflow cache
- 5-minute strategy bars built from completed 1-minute RTH bars
- signed_volume, large10, and large20 aggregate flow columns
- same-day flatten and no-overnight prop-rule checks
lookahead_risks:
- Prior-session NR4 compression is known only after the prior RTH session is complete.
- Opening range high/low are known only after the configured opening window completes.
- Orderflow confirmation uses only the completed breakout bar.
- Signals using close enter no earlier than the next bar open.
- No final session high/low, final VWAP, future orderflow, or future range is used.
failure_modes:
- Plain range-compression breakouts already failed active testing and the orderflow filter may not improve robustness.
- Aligned aggregate flow can mark exhaustion or stop-run completion rather than continuation.
- The edge may depend on a narrow volatility regime or a few large trend days.
- Flow thresholds may reduce false breakouts but still leave too few WFA-qualified trades.
- Pessimistic same-bar stop/target handling can erase short-horizon breakout edge.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_range_compression_breakout
  - es_opening_range_orderflow_breakout
  - es_trend_aligned_orderflow_continuation
  - es_signed_orderflow_persistence
  - es_opening_drive_inventory_absorption
  - es_prior_session_level_breakout_continuation
  conclusion: Eligible as a composite campaign because it requires prior-session NR4 compression before any breakout, then same-bar aggregate orderflow confirmation. It is not the plain range-compression campaign, not the opening-range-only orderflow breakout campaign, and not standalone signed-flow persistence.
density_audit:
  artifact: research_artifacts/es_range_compression_orderflow_breakout_density_audit_20260617.md
  conclusion: Exactly five NR4 variants cleared strict-corner raw signal density above 50/year before any PnL testing. NR7 and inside-day variants were rejected before PnL as too sparse.
