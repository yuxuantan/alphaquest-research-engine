research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market-profile documentation
  edge_thesis: Prior-session approximate POC can behave like an accepted-value liquidity
    magnet. During midday, when directional urgency often fades, ES that remains displaced
    from prior POC but starts moving back with broad signed-flow confirmation may
    continue reverting toward prior accepted value.
  mechanic: Two-sided from 12:00 through 14:00 ET. Use the completed prior RTH session
    to freeze approximate POC, require the current session to open on the same side
    as the signal, require the completed 5-minute signal bar to remain displaced from
    POC by the configured distance, move at least one tick back toward POC, and show
    same-direction signed-volume imbalance.
  timeframe_rationale: Five-minute bars reduce one-minute flicker around an approximate
    profile level while still giving next-bar entry close to the initiation bar. The
    midday window tests the same magnet effect after opening price discovery, when
    broad signed flow may identify inventory correction rather than breakout continuation.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the POC magnet edge by using only
      the prior completed RTH session to define the POC, then allowing either long
      or short initiation back toward that level during the midday window. The price-action
      anchor is still prior POC displacement, while signed_volume confirms broad completed-bar
      participation in the return attempt.
    entry_logic_rationale: The signal is evaluated only after a completed 5-minute
      bar close from 12:00 through 14:00 ET. It requires current-session open and
      close to be on the same side of prior POC, close still displaced by the configured
      minimum distance, at least one tick of movement toward POC during the signal
      bar, and signed-volume imbalance in the direction of the POC. The engine enters
      at the next bar open, so the signal close is not filled retroactively.
    stop_loss_rationale: The sweep_extreme stop sits beyond the signal-bar high for
      shorts or below the signal-bar low for longs, plus the configured tick offset.
      That invalidates the mean-reversion thesis when price rejects the attempted
      return toward prior POC and extends away from accepted value.
    target_exit_rationale: The cost-adjusted fixed-R target uses a declared reward-risk
      multiple of at least 1.0 after commission and slippage inputs. It avoids a sub-1R
      scalp that fees can dominate, while unresolved positions are force-flattened
      at 15:55 ET.
    profitability_rationale: This should be profitable only if midday displacement
      from prior POC often reflects inventory imbalance that broad aggregate flow
      corrects back toward prior accepted value. The strict pre-PnL density corner
      cleared 50 signals/year on both full history and the limited-core window, so
      the setup is frequent enough to test without relying on rare event overfitting.
    known_failure_modes: Midday can be noisy and low range, trend days can ignore
      prior POC, the OHLCV profile approximation may misplace POC, signed-volume imbalance
      can lag price, and one-tick worse slippage can overwhelm a small magnet effect.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: min_poc_distance_ticks=12 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_prior_poc_orderflow_magnet_density_audit_20260620.md
