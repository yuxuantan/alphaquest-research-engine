research_metadata:
  academic_source: Chart Fanatics Stage Analysis Strategy; Brock, Lakonishok, and
    LeBaron (1992); Moskowitz, Ooi, and Pedersen (2012); Han, Yang, and Zhou (2016)
  edge_thesis: Prior completed weekly Stage 2 trend state may improve the distribution
    of same-day NQ continuation entries.
  mechanic: Pullback through prior close followed by reclaim while prior completed
    week is Stage 2.
  timeframe_rationale: Five-minute RTH bars keep entries on completed intraday bars
    while weekly stage state uses only completed prior weeks and same-day flattening
    avoids overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: This stage2_prior_close_reclaim variant expresses the
      same weekly Stage 2 edge by requiring the prior completed NQ weekly state to
      have moving-average and structure alignment before any intraday trigger is eligible.
      The five-minute trigger then tests whether that higher-timeframe trend state
      improves same-day continuation without using current-week or post-signal information.
    entry_logic_rationale: The entry module aggregates completed RTH sessions into
      completed weeks, excludes the current incomplete week, scores Stage 2 using
      10/20/30/40-week moving averages and weekly structure, and then requires a completed
      five-minute trigger bar.
    stop_loss_rationale: The sweep-extreme stop anchors invalidation to the completed
      signal bar extreme plus a predeclared tick offset.
    target_exit_rationale: A fixed-R target keeps Chart Fanatics discretionary target
      language auditable under the existing staged framework.
    profitability_rationale: The edge should work only if Stage 2 weekly trend state
      improves follow-through enough to overcome NQ costs and same-day flattening.
    known_failure_modes: Weekly stage state can be too slow, intraday breakouts can
      chase exhausted moves, and same-day flattening may remove the swing-horizon
      payoff described by the source.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/stage-analysis-strategy
  rescue_status: none
  pre_pnl_density:
    status: PASS
    artifact: research_artifacts/nq_chartfanatics_weekly_stage_breakout_bias_density_audit_20260701.md
    summary_csv: research_artifacts/nq_chartfanatics_weekly_stage_breakout_bias_density_summary_20260701.csv
    entry_combos: 9
    combos_passing_all_windows: 9
strategy:
  entry:
    module: weekly_stage_analysis
    params:
      setup_mode: stage2_prior_close_reclaim
      start_time: 09:45:00
      end_time: '12:00:00'
      rth_start: 09:30:00
      flatten_time: '15:55:00'
      max_trades_per_day: 1
