      min_breakout_ticks: 2
      consolidation_lookback_days: 5
      consolidation_max_range_pct: 0.03
      support_proximity_pct: 0.015
  sl:
    module: sweep_extreme
    params:
      stop_offset_ticks: 4
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
