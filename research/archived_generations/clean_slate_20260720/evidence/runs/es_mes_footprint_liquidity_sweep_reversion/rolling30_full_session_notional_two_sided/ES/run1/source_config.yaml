research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Completed rolling intraday high/low sweeps in ES are more likely to reverse when the reclaim bar
    shows footprint absorption against the sweep and MES participation is crowded in the sweep direction.
  mechanic: Fade completed one-minute sweeps of the prior 30-minute rolling high/low using notional-equivalent MES
    participation crowding plus footprint absorption on the reclaim bar.
  timeframe_rationale: The one-minute timeframe aligns the footprint imbalance, MES notional participation rank,
    and next-bar execution without reconstructing lower-timeframe sequencing.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: Fade completed one-minute sweeps of the prior 30-minute rolling high/low using notional-equivalent
      MES participation crowding plus footprint absorption on the reclaim bar. The rolling level is built from prior
      completed bars only, while footprint absorption and MES crowding confirm that the completed reclaim bar absorbed
      the failed sweep pressure.
    entry_logic_rationale: The signal evaluates only the completed one-minute bar and the prior rolling range maintained
      inside the entry module. Because the signal uses the bar close, the existing engine enters no earlier than
      the next bar open.
    stop_loss_rationale: The sweep-extreme stop is beyond the actual signal-bar high or low with an offset grid.
      If price trades beyond the failed sweep extreme after entry, the absorption/reversion thesis is invalid.
    target_exit_rationale: A fixed-R target with a 1.0R floor keeps exits independent of future highs/lows, future
      orderflow, or discretionary chart reading, and every position flattens before the configured cutoff.
    profitability_rationale: This version tests whether broad MES notional participation, rather than just MES large-trade
      flow, marks crowded liquidity-taking pressure that fails at local rolling extremes.
    known_failure_modes: The setup may fail if MES crowding identifies informed continuation instead of weak-hand
      exhaustion, if footprint absorption proxies are too noisy, if rolling levels overfit micro noise, or if the
      reversal is too small after one-tick slippage and commissions.
    pre_test_decision: approve_for_testing
