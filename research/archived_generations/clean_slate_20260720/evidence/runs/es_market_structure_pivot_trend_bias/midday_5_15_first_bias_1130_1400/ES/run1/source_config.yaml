research_metadata:
  academic_source: Lo, Mamaysky, and Wang (2000); Brock, Lakonishok, and LeBaron (1992); Moskowitz, Ooi, and Pedersen (2012);
    Hurst, Ooi, and Pedersen (2017)
  edge_thesis: Confirmed multi-timeframe swing-pivot market structure may identify persistent intraday ES trend direction
    after the signal bar closes.
  mechanic: Between 11:30:00 and 14:00:00 ET, trade the first completed-bar ES signal where 5/15-minute confirmed swing-pivot
    states align. Long requires HH/HL; short requires LH/LL; no trade is allowed if structure is mixed, insufficient, or opposite.
  timeframe_rationale: 5-minute strategy bars preserve intraday detail while allowing completed 5/15/30-minute pivot states
    to form often enough for the 50-trades/year gate and still use 1-minute detail for stop/target conflict handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge as pure completed-pivot market structure. Midday variant waits
      past the first two RTH hours, then trades the first confirmed 5/15-minute aligned swing state. The first-bias rule avoids
      arbitrary clock sampling while still requiring completed HH/HL or LH/LL sequences before any next-bar entry.
    entry_logic_rationale: The entry window from 11:30:00 to 14:00:00 ET is fixed before testing. A pivot state is updated
      only after a higher-timeframe bucket and the right-side confirmation bars are complete, so the signal cannot use future
      swing information.
    stop_loss_rationale: A percent-from-entry stop is used because the research question is whether the pivot state has directional
      value, not whether a hand-picked swing invalidation level can be optimized. The stop grid is declared before testing
      and does not use future lows or highs.
    target_exit_rationale: A fixed-R target keeps reward tied to initial risk, uses no future intraday level, and enforces
      the methodology rule that target_r_multiple is never below 1.0 reward:risk. Unresolved trades are flattened before the
      configured cutoff.
    profitability_rationale: The variant is convincing enough to test because a confirmed HH/HL or LH/LL sequence is a direct
      local definition of trend persistence, and multi-timeframe agreement should reduce countertrend trades while the windowed
      first-bias design preserves sufficient opportunity count.
    known_failure_modes: The signal can fail if confirmed pivots arrive too late, if ES intraday structure mean-reverts after
      costs, if stops are poorly matched to swing noise, or if apparent profitability concentrates in a few high-volatility
      sessions.
    pre_test_decision: approve_for_testing
