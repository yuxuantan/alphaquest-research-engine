strategy_name: spx_0dte_orderflow_continuation
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Brogaard, Han, and Won (2023); Cboe (2024); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: SPX 0DTE sessions may create directional ES hedging pressure when a completed intraday ES source window has both price movement and same-direction aggregate signed flow.
  mechanic: On non-standard-monthly SPX 0DTE sessions, enter in the direction of the completed 09:30-10:00 ES move only if total signed-volume imbalance confirms that direction.
  timeframe_rationale: 1-minute bars preserve the completed 09:30-10:00 source window and next-bar-open execution at 10:00 ET.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses 0DTE pressure by allowing trades only on known SPX same-day expiration sessions and only when the completed first 30 minutes of ES price movement is confirmed by completed total signed-volume imbalance. A non-0DTE day or an unconfirmed move cannot trade.
    entry_logic_rationale: The signal waits for the 09:30-10:00 ET source window to close, then checks the open-to-signal tick move and signed-flow imbalance from completed bars only. Because the signal uses the completed 09:59 bar close, the engine can fill no earlier than the 10:00 next-bar open.
    stop_loss_rationale: A fixed percent stop is used because the edge is calendar/orderflow pressure rather than a discrete chart boundary. The stop size is predeclared and rounded to tick, so it does not use future highs, lows, or option-market information.
    target_exit_rationale: A fixed-R target tests whether the 0DTE plus signed-flow pressure can continue far enough before same-day flatten to overcome costs. The exit is mechanical and does not use final VWAP, final range, or discretionary option levels.
    profitability_rationale: If 0DTE hedging demand is directional, the first completed half-hour should reveal both price displacement and aggressive trade-side participation. The loose-to-strict grid was checked before PnL and preserves enough expected opportunities for the 50 trades/year rule.
    known_failure_modes: Total signed flow may be noisier than large-trade flow, same-direction pressure may already be exhausted by 10:00, 0DTE effects may be volatility-only, and the partial-week pre-2022 regime may not transfer to the full-week regime.
    pre_test_decision: approve_for_testing
