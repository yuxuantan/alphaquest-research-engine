research_metadata:
  academic_source: Osler (2000); Holmberg, Lonnback, and Lundstrom (2013); Cont, Kukanov,
    and Stoikov (2014)
  edge_thesis: Opening-range boundaries can become intraday support/resistance after
    a breakout. A later retest with aggregate orderflow confirmation may identify
    when the S/R flip is accepted rather than immediately faded.
  mechanic: Build the completed first 30-minute RTH opening range, wait for a completed
    close outside the range, then trade the first later two-sided retest that holds
    the broken boundary before 11:30:00 ET with large10-flow absorption.
  timeframe_rationale: 5-minute bars reduce one-minute noise around the opening-range
    boundary while the engine still enters only after the completed signal bar and
    applies configured pessimistic fill rules.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'The variant requires three completed-bar facts: an opening
      range is fully known, price closes outside it, and a later bar retests the broken
      boundary without reclaiming the old range. The orderflow condition is large10-flow
      absorption, so the signal is not a generic breakout or generic flow impulse.'
    entry_logic_rationale: 'Large-trade flow should make the absorption read stricter:
      visible aggressive size probes back into the OR boundary but cannot reverse
      the breakout. The signal is generated only after the retest bar closes; execution
      is deferred to the next bar open.'
    stop_loss_rationale: The stop sits just back through the broken opening-range
      boundary. If the market cannot hold the S/R flip after retest confirmation,
      the edge thesis is wrong and the trade should be rejected quickly.
    target_exit_rationale: A fixed-R target keeps the exit independent of future session
      highs/lows and tests whether the S/R flip produces enough follow-through relative
      to boundary-stop risk before forced flatten.
    profitability_rationale: This should be profitable only if opening-range participants
      defend the broken boundary after retest and aggregate orderflow helps separate
      accepted breakouts from weak probes. The pre-PnL density audit kept only two-sided
      variants whose declared entry corners exceeded 50 signals/year.
    known_failure_modes: The retest may be chop, the flow proxy may classify pressure
      incorrectly, tight boundary stops may be hit before continuation, or any apparent
      edge may concentrate in a few trend days.
    pre_test_decision: approve_for_testing
