research_metadata:
  academic_source: Bialkowski, Darolles, and Le Fol (2008); McCulloch and Kazakov (2007); Gueant and Pu (2015); Lo, Mamaysky,
    and Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: VWAP pullback continuation may improve when continuation direction agrees with completed 5/15-minute swing-pivot
    market structure and is not opposed by either checked timeframe.
  mechanic: From 10:30 to 14:30 ET, require a completed VWAP-side trend and a pullback/reclaim sequence back in the trend
    direction. Accept only when carried 5/15-minute completed pivot structure supports the continuation and no checked timeframe
    opposes it.
  timeframe_rationale: 5-minute bars reduce single-minute VWAP noise while preserving completed-bar next-bar execution. The
    pivot filter uses carried completed 5/15-minute swing structure built only from completed bars.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Midday VWAP trend reclaim continuation, filtered to avoid continuation signals that fight completed
      structure. The base VWAP module must emit first; the pivot filter cannot create trades by itself.
    entry_logic_rationale: VWAP, opening-drive/trend context, pullback, reclaim/rejection, and pivot structure are all based
      on completed bars at signal close. The wrapper accepts only same-direction completed pivot bias with no opposite checked
      timeframe. Engine execution remains next-bar open or later.
    stop_loss_rationale: The stop remains a percent-from-entry stop rounded to ES tick size. It is tied to actual fill price
      and does not use future swing levels or post-entry VWAP information.
    target_exit_rationale: The target remains a predeclared fixed-R exit with target_r_multiple at or above 1.0R. Unresolved
      positions flatten at the configured intraday cutoff.
    profitability_rationale: VWAP is a widely used execution benchmark, and reclaiming/rejecting VWAP back in the direction
      of completed pivot structure may identify continuation of benchmark-driven participation rather than random VWAP noise.
    known_failure_modes: VWAP reclaims may be late after costs, pivot structure may lag reversals, broad windows may admit
      weak first signals, and trend days can still whipsaw through VWAP before continuation.
    pre_test_decision: approve_for_testing
