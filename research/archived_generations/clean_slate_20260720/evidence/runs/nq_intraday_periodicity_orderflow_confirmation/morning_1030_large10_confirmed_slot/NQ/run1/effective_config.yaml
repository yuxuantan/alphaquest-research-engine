research_metadata:
  academic_source: Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov
    (2014)
  edge_thesis: Prior same-clock NQ slot return tendency may continue when completed
    aggregate NQ orderflow immediately before the slot confirms the predicted direction.
  mechanic: 10:30 ET slot with prior same-clock return persistence confirmed by completed
    10:00-10:30 large10 imbalance.
  timeframe_rationale: One-minute bars preserve the completed pre-entry source window,
    exact signal timestamp, next-bar-open execution, and stop/target ordering during
    the short slot hold.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  pre_pnl_density:
    artifact: research_artifacts/nq_intraday_periodicity_orderflow_confirmation_density_audit_20260623.md
    selected_grid_min_signals_per_year: 72.415233
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the Heston-Korajczyk-Sadka same-clock
      persistence edge by using only prior occurrences of slot_1030_1100 to select
      direction, then requiring the completed 10:00:00-10:30:00 NQ orderflow window
      to confirm that direction before any trade can occur.
    entry_logic_rationale: The prior-slot feature file is shifted by construction
      so the current slot return cannot enter its own signal. The orderflow source
      window ends exactly at the signal timestamp, and execution can only occur on
      the next one-minute bar open.
    stop_loss_rationale: A fixed percent stop is used because the edge is a short
      time-slot pressure effect rather than a discrete chart boundary. The stop grid
      is declared before PnL, rounded to the NQ tick, and does not reference future
      highs or lows.
    target_exit_rationale: A fixed-R target with forced flatten at 11:00:00 ET tests
      whether same-clock plus orderflow pressure can monetize inside the intended
      slot without overnight exposure, discretionary exits, or future slot information.
    profitability_rationale: If same-clock return persistence reflects recurring liquidity
      demand or institutional scheduling, aligned completed NQ orderflow before the
      slot should identify days when the historical tendency is active rather than
      stale. NQ is a tech-index futures market with strong recurring cash-open and
      portfolio-flow timing, so this NQ-only test is economically distinct from generic
      ES periodicity.
    known_failure_modes: The same-clock tendency can be noise in NQ, orderflow can
      confirm exhaustion instead of continuation, the short holding window may leave
      too little room after commissions and one-tick slippage, and any apparent edge
      may concentrate in a narrow clock slot or regime.
    pre_test_decision: approve_for_testing
