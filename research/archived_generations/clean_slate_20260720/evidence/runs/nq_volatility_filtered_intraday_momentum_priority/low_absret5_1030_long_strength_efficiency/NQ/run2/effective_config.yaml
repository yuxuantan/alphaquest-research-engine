campaign_id: nq_volatility_filtered_intraday_momentum_priority
variant_id: low_absret5_1030_long_strength_efficiency
test_run_id: run2
strategy_name: volatility_filtered_intraday_momentum_priority
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Gao et al. (2018) intraday momentum plus Moreira and Muir (2017)
    volatility-managed portfolios.
  edge_thesis: Trade the completed 09:30-10:30 ET NQ upside momentum window only when
    the lagged five-session average absolute-return percentile is not elevated.
  mechanic: Completed first-hour long-only strength-efficiency signal gated by lagged
    absret5_rank_252, next-bar entry, fixed percent stop, fixed-R target, and 15:59
    ET flatten.
  timeframe_rationale: Five-minute bars match the current NQ archive retest shape,
    keep the source window complete at the 10:30 ET signal close, and leave execution
    to the engine's next eligible bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: The signal uses completed 09:30-10:30 ET NQ RTH bars
      and a lagged average absolute-return percentile shifted to the current session
      before RTH opens.
    entry_logic_rationale: The entry module emits a candidate signal at the 10:30
      ET bar close only; the volatility gate uses pre-session features and the engine
      handles next-bar execution.
    stop_loss_rationale: The fixed percent-from-entry stop is declared before testing,
      varied only through sl.params.stop_pct, and rounded to the NQ tick size.
    target_exit_rationale: The fixed-R target is declared before testing, varied only
      through tp.params.target_r_multiple, with no target below 1.0R.
    profitability_rationale: A real volatility-conditioned NQ momentum effect should
      survive neighboring lagged absolute-return thresholds, return thresholds, stops,
      and targets after commission and slippage.
    known_failure_modes: Quiet absolute-return regimes can have poor trend follow-through,
      NQ trend days can concentrate in a few dates, and the entry signal metadata
      stop/target fields are informational while execution uses the configured stop
      and target modules.
    pre_test_decision: approve_for_testing
data:
  dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  external_feature_csv: data/external/nq_lagged_volatility_features_20110103_20260612.csv
  warmup_days: 10
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: volatility_filtered_intraday_momentum_priority
    params:
      setup_mode: low_absret5_1030_long_strength_efficiency
      feature_csv: data/external/nq_lagged_volatility_features_20110103_20260612.csv
      volatility_gate_column: absret5_rank_252
      volatility_gate_max: 0.6
      rth_start: 09:30:00
      bar_interval_minutes: 5
      tick_size: 0.25
      max_trades_per_day: 1
      slots:
      - slot_id: nq_1030_long_strength_efficiency
        param_prefix: main
        direction: long
        source_start: 09:30:00
        signal_time: '10:30:00'
        min_signal_return_bps: 40
        min_signal_return_ticks: 0
        min_source_efficiency: 0.55
        min_close_location: 0.55
        min_source_range_bps: 0
        max_source_range_bps: 220
        stop_pct: 0.0035
        target_r_multiple: 2.5
        flatten_time: '15:59:00'
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0035
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.5
  flatten_time: '15:59:00'
