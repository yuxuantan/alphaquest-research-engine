research_metadata:
  academic_source: Lo and MacKinlay (1988); De Bondt and Thaler (1985); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Rolling completed-bar variance ratio identifies whether short-horizon ES price action is
    in a persistent or anti-persistent state; aggregate orderflow confirmation should improve trade selection
    by requiring pressure to align with the serial-dependence state.
  mechanic: From 11:00 through 14:30 ET, fade completed 15-minute ES moves in low variance-ratio states
    when large-10 signed flow presses into a move that does not close near the bar extreme.
  timeframe_rationale: 5-minute bars reduce one-minute microstructure noise while preserving intraday
    completed-bar timing, aggregate orderflow confirmation, and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: From 11:00 through 14:30 ET, fade completed 15-minute ES moves in low variance-ratio
      states when large-10 signed flow presses into a move that does not close near the bar extreme.
    entry_logic_rationale: The variance ratio is computed from a rolling in-session history of completed
      5-minute closes. The signal then requires a completed recent return and completed aggregate orderflow
      over the same recent bars. Continuation variants require VR above the declared threshold; reversion
      variants require VR below the declared threshold and a weak extreme close-location condition.
    stop_loss_rationale: A fixed percent stop is used because the edge is a statistical serial-dependence
      state rather than a discrete chart boundary. The stop is declared before testing, tick-rounded by
      the engine, and subject to pessimistic same-bar TP/SL ordering.
    target_exit_rationale: A fixed-R target plus forced intraday flatten tests whether the serial-dependence/orderflow
      state can monetize before the configured cutoff without discretionary exits or overnight exposure.
    profitability_rationale: Midday low-serial-dependence states should favor liquidity-provision reversals,
      and large-trade pressure into a weak close location is a completed-bar proxy for exhausted pressure.
    known_failure_modes: The variance-ratio estimate can be noisy, orderflow confirmation is only a Sierra
      aggregate proxy, high-VR states can reverse after news, low-VR states can continue during regime
      shifts, and average movement may be too small after ES costs.
    pre_test_decision: approve_for_testing
