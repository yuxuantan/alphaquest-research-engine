campaign_id: es_credit_etf_orderflow_risk_appetite
variant_id: hyg_5d_two_sided_signed_1230
test_run_id: rescue1
strategy_name: credit_etf_orderflow_state
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Keim and Stambaugh (1986); Fama and French (1989); Cont, Kukanov,
    and Stoikov (2014); free Yahoo HYG/LQD chart data
  edge_thesis: five-day HYG credit-risk momentum defines a slower risk-appetite tail
    state, with ES confirmation required intraday.
  mechanic: Trade ES in the direction of same-session price/flow when five-day HYG
    return rank is in either tail.
  timeframe_rationale: Five-minute bars provide completed ES movement and aggregate
    signed-flow confirmation after the cash open without using intraday HYG/LQD data.
  pre_pnl_density: 1532 full-sample signals, about 99.28/year; limited-core reference
    160 signals, about 103.99/year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the credit ETF risk-appetite edge
      by using the lagged hyg_5d HYG return rank as the credit state and requiring
      completed ES price movement plus signed aggregate orderflow before entry.
    entry_logic_rationale: The rescue keeps the same prior-day HYG state and completed
      ES confirmation logic. It only shifts the declared HYG rank threshold and signed-flow
      threshold to adjacent values suggested by the original core surface, without
      adding filters or using any post-result data window.
    stop_loss_rationale: The rescue tests wider percent stops because the original
      best rows consistently used the widest tested stop, suggesting the same signal
      may need more intraday noise tolerance rather than a different mechanic.
    target_exit_rationale: The fixed-R target logic and target grid are intentionally
      unchanged. All target_r_multiple values are already at least 1.0R, so the corrected
      RR rule permits no TP widening for this rescue.
    profitability_rationale: If high-yield credit appetite contains information about
      near-term equity-index risk bearing, then ES sessions where price and signed
      flow already confirm that state should have a better after-cost continuation
      distribution than unfiltered ES movement.
    known_failure_modes: HYG may lag ES rather than lead it, ETF moves can be rate-driven
      instead of equity-risk-driven, the confirmation bar may enter too late, and
      profitable days may concentrate in credit-stress regimes.
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: Original five-day two-sided variant was strongest but still far below
    the 70% core gate; rescue tests whether stricter HYG tail ranks and wider stops
    broaden robustness while leaving TP unchanged.
  rescue_constraints: Same HYG credit-ETF risk-appetite edge, entry module, setup
    mode, rank mode, flow mode, signal times, timeframe, data window, costs, stop
    module, target module, target grid, flatten rule, prop rules, and validation gates.
    Only existing HYG rank threshold, signed-flow threshold, and stop-distance fixed
    values/parameter grids are changed. TP is unchanged because all target_r_multiple
    values are already >= 1.0R.
  source_run_report: backtest-campaigns/es_credit_etf_orderflow_risk_appetite/hyg_5d_two_sided_signed_1230/ES/run1/campaign_test_summary.json
