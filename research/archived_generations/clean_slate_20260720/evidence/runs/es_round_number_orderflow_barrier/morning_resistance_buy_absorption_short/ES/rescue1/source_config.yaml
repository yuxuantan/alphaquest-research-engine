research_metadata:
  academic_source: Donaldson and Kim (1993); Osler (2003); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Fixed ES round-number resistance barriers may reverse failed probes when aggressive buying is absorbed by passive liquidity.
  mechanic: Trade short after a completed 5-minute bar probes a fixed 25-point round-number resistance barrier and closes back below it while the same completed bar has positive signed-volume imbalance.
  timeframe_rationale: 5-minute bars reduce one-minute barrier noise while preserving enough frequency for the 50 trades/year benchmark.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-17"
  mechanics_review:
    mechanic_expresses_edge: >
      The variant uses an ex-ante 25-point resistance handle and requires the market
      to reject it on a completed bar despite positive signed flow. That combination
      expresses buy-pressure absorption rather than generic short bias.
    entry_logic_rationale: >
      The signal occurs only during the liquid morning window and after a completed
      rejection bar. Entry is deferred to the next bar open, so the close that proves
      rejection is not used as an executable fill.
    stop_loss_rationale: >
      A fixed percent stop fails the trade if price continues through the barrier,
      which would contradict the absorption thesis.
    target_exit_rationale: >
      The fixed-R target measures whether absorbed resistance produces enough
      downside movement before forced flatten without relying on future levels.
    profitability_rationale: >
      If round-number resistance attracts liquidity and aggressive buyers are trapped
      by rejection, the next intraday leg should have positive short expectancy after
      costs. The density audit kept all declared corners above 50 signals/year.
    known_failure_modes: >
      Resistance rejections may be pauses before continuation, signed flow may lag
      price, and short-side ES behavior can be regime dependent.
    pre_test_decision: approve_for_testing
