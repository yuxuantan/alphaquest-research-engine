campaign_id: es_volume_shock_liquidity_reversal
title: ES Volume-Shock Liquidity Reversal
decision: failed
created_at: '2026-06-15'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: ES may mean-revert after high-volume intraday price shocks when the
  move reflects liquidity-demand or inventory-risk pressure rather than new
  information.
rationale: This campaign tests a volume-conditioned intraday liquidity-reversal
  edge. It is not a daily trend, fixed intraday risk premium, overnight gap,
  prior-session IBS, RSI2, range-compression, calendar, opening-drive, late-day
  intraday momentum, ES/MES divergence, or signed-orderflow persistence edge.
  Each variant uses only a completed high-volume shock bar, enters on the next
  bar open, and exits same day by stop, target, or forced flatten.
sources:
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Models how liquidity-trader pressure and market-maker inventory
    risk can make high-volume returns more likely to reverse.
- title: Dynamic Volume-Return Relation of Individual Stocks
  authors: Guillermo Llorente, Roni Michaely, Gideon Saar, Jiang Wang
  year: 2002
  venue: Review of Financial Studies
  link: https://ideas.repec.org/a/oup/rfinst/v15y2002i4p1005-1047.html
  relevance: Separates volume-return continuation from reversal depending on
    whether trading is information-driven or risk-sharing/liquidity-driven.
- title: Market Liquidity and Trading Activity
  authors: Tarun Chordia, Richard Roll, Avanidhar Subrahmanyam
  year: 2001
  venue: Journal of Finance
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=237674
  relevance: Documents time variation in market liquidity and trading activity,
    motivating explicit volume conditioning and realistic cost gates.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- deterministic 5-minute aggregation from completed 1-minute bars
- rolling volume ratio computed only from prior completed bars
- exchange session labels and no-overnight prop-rule flatten checks
data_quality_caveats:
- The Sierra cache is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use the pessimistic OHLC assumption.
- Volume ratio is a bar-level proxy; it cannot distinguish informed trades from
  liquidity or inventory trades.
lookahead_risks:
- The shock signal uses only the completed bar's open, close, high, low, and
  volume ratio.
- The rolling volume denominator shifts prior bars and does not include future
  volume.
- No future high/low, final VWAP, final session return, or future session state
  is used.
- All variants flatten the same day before the configured prop cutoff.
failure_modes:
- High-volume ES shocks may be information-driven and continue rather than
  reverse.
- Apparent profits may be concentrated in rare volatility regimes or single
  event days.
- Tight stops in high-volume bars may be unrealistic if slippage/entry-delay
  stress fails.
- Long and short shock reversals may be asymmetric after ES costs.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_mes_micro_flow_divergence_reversion
  - es_prior_session_ibs_reversion
  - es_connors_rsi2_mean_reversion
  - es_range_compression_breakout
  - es_rth_intraday_risk_premium
  - es_overnight_intraday_reversal
  - es_signed_orderflow_persistence
  - es_opening_drive_inventory_absorption
  - es_turn_of_month_seasonality
  - es_daily_time_series_momentum
  - es_late_day_intraday_momentum
  conclusion: Not a duplicate of active failed campaigns. This campaign tests
    completed high-volume shock-bar liquidity reversal, not gap reversal,
    oscillator mean reversion, prior-day IBS, compression breakout, calendar
    timing, fixed-time drift, early-to-late intraday momentum, daily trend, or
    aggregate orderflow persistence/divergence.
variants:
- all_day_symmetric_shock_reversion
- morning_down_shock_reversal_long
- morning_up_shock_reversal_short
- midday_symmetric_shock_reversion
- afternoon_symmetric_shock_reversion
