research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Same-day broad sector ETF opening breadth should proxy immediate cash-market risk appetite; ES continuation is only tested when completed ES movement and aggregate signed flow align with that breadth.
  mechanic: Long ES after broad sector-up cash opens, positive ES morning movement, and positive aggregate signed-volume confirmation.
  timeframe_rationale: Five-minute bars let the cash ETF open settle and give ES enough completed bars for cumulative price/orderflow confirmation without using same-day ETF closes.
  pre_pnl_density: 943 full-sample pre-PnL signals, about 61.06 per year; limited-core reference 95 signals, about 61.74 per year.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-20"
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the sector-opening-breadth edge by requiring at least four of seven sector ETFs to open higher, non-negative average sector opening breadth, ES to trade at least two ticks above its RTH open on completed bars, and aggregate signed volume to confirm buying pressure before the next-bar entry.
    entry_logic_rationale: The entry does not use ETF high, low, close, or future ES data. It waits until 10:00 or 10:30 ET so the same-day cash opens and ES confirmation bars are observable, then enters only if breadth, ES price movement, and cumulative signed orderflow point long.
    stop_loss_rationale: A percent-from-entry stop is simple, predeclared, and does not use future levels. It rejects the thesis if a risk-on breadth continuation cannot hold a fixed risk budget after realistic ES costs.
    target_exit_rationale: A fixed-R target ties reward to the initial stop distance and avoids optimizing around future intraday levels. The target grid starts at 1.0R because sub-1R targets are invalid.
    profitability_rationale: The setup should only be profitable if broad cash-sector risk-on breadth is not fully priced into ES and if completed ES orderflow identifies the sessions with real participation rather than a fading opening move.
    known_failure_modes: Sector ETF opening breadth can be stale by 10:00, dividend gaps can contaminate breadth, ES may already price the overnight news, and signed volume may confirm too late or concentrate profits in high-volatility regimes.
    pre_test_decision: approve_for_testing
