lookahead_risks:
- Front contract selection must use the explicit roll calendar, not same-day volume
  after the session is known.
- Deferred contract selection must use the next explicit roll-calendar contract, not
  the most active deferred contract chosen with future information.
- Rolling features must use only completed current-or-prior bars at the signal timestamp.
- No final session high, low, VWAP, volume profile, future roll information, or post-entry
  path is used by the signal.
