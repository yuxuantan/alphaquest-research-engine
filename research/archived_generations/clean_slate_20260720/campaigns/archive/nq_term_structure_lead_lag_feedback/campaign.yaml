campaign_id: nq_term_structure_lead_lag_feedback
title: NQ Front-vs-Next Contract Term-Structure Lead-Lag Feedback
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
market: CME E-mini Nasdaq-100 futures
dataset_id: nq_term_structure_lead_lag_1m_20100607_20260529_full_rth_ny
timeframe: 1m
edge_family: futures_term_structure_lead_lag_spread_feedback
source_campaign_id: es_term_structure_lead_lag_feedback
hypothesis: Near roll, the front NQ contract and next quarterly NQ contract may temporarily
  diverge over completed intraday windows. A sufficiently large front-vs-next return
  gap could predict short-term reversion in the tradable front contract.
rationale: This is an ES-derived transfer of the already-tested front-vs-deferred
  term-structure lead-lag edge. It is distinct from NQ/ES cross-index lead-lag, opening-range,
  liquidity, AOI, prior-level, and volume-profile campaigns because it uses same-underlying
  NQ maturity-basis dislocation rather than another index or a price level.
research_sources:
- title: 'High-frequency lead-lag relationships in the Chinese stock index futures
    market: tick-by-tick dynamics of calendar spreads'
  author: Guanlin Li, Xiyan Chen, and Yingzheng Liu
  year: 2025
  link_or_doi: https://arxiv.org/abs/2501.03171
  expected_mechanism: Near-month and longer-dated stock-index futures can show maturity-based
    lead-lag and spread-feedback effects.
- title: A GCN-LSTM Approach for ES-mini and VX Futures Forecasting
  author: Nikolas Michael, Mihai Cucuringu, and Sam Howison
  year: 2024
  link_or_doi: https://arxiv.org/abs/2408.05659
  expected_mechanism: Equity-index futures across expirations can have connected return,
    volatility, and volume structures that support term-structure signal propagation.
- title: High Frequency Lead/Lag Relationships - Empirical Facts
  author: Nicolas Huth and Frederic Abergel
  year: 2014
  link_or_doi: https://ideas.repec.org/p/hal/wpaper/hal-00645685.html
  expected_mechanism: High-frequency lead-lag asymmetry is a documented market-microstructure
    effect, but naive market-order strategies can fail after costs.
source_quality_note: Academic sources support the existence of futures lead-lag and
  term-structure feedback effects, but they do not establish that this specific NQ
  front-vs-next implementation is tradable after costs. The NQ transfer therefore
  fails closed on pre-PnL density.
