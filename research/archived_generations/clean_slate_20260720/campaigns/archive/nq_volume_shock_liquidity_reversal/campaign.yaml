timeframe: 5m
hypothesis: NQ may mean-revert after completed high-volume intraday price shocks when
  the move reflects liquidity-demand or inventory-risk pressure rather than new information.
rationale: This is an NQ transfer of the ES volume-shock liquidity-reversal campaign.
  It tests completed high-volume 5-minute shock-bar reversion, not NQ sell-flush capitulation,
  signed-flow persistence, prior-session IBS, opening-drive inventory, or large-trade
  stealth flow.
sources:
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Models liquidity-trader pressure and inventory-risk reversals after high-volume
    returns.
- title: Dynamic Volume-Return Relation of Individual Stocks
  authors: Guillermo Llorente, Roni Michaely, Gideon Saar, Jiang Wang
  year: 2002
  venue: Review of Financial Studies
  link: https://ideas.repec.org/a/oup/rfinst/v15y2002i4p1005-1047.html
  relevance: Separates volume-return continuation from reversal depending on information
    versus risk-sharing/liquidity-driven trading.
- title: Market Liquidity and Trading Activity
  authors: Tarun Chordia, Richard Roll, Avanidhar Subrahmanyam
  year: 2001
  venue: Journal of Finance
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=237674
  relevance: Motivates explicit volume conditioning and realistic cost gates.
data_needs:
- NQ RTH one-minute OHLCV bars aggregated to completed 5-minute bars
- rolling volume ratio computed only from prior completed bars
- config-driven no-overnight forced flatten checks
lookahead_risks:
- The shock signal uses only the completed 5-minute bar open, close, high, low, and
  volume ratio.
- The rolling volume denominator shifts prior bars and does not include the current
  bar or future volume.
- No future high/low, final VWAP, final session return, or future session state is
  used.
