campaign_id: nq_treasury_term_premium_state
title: NQ Treasury Term Premium State
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: treasury_term_premium_state
hypothesis: Strict-lag Treasury term-premium states may identify discount-rate risk pressure
  or relief in growth-heavy Nasdaq-100 futures.
rationale: This campaign tests the model-implied 10-year Treasury term premium, distinct from
  observed Treasury yield level, rate shock, real-yield, breakeven, MOVE, VIX, credit-spread,
  or Treasury-auction pressure campaigns.
research_sources:
- title: Term Premium on a 10 Year Zero Coupon Bond (THREEFYTP10)
  authors: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  venue: FRED
  link_or_doi: https://fred.stlouisfed.org/series/THREEFYTP10
  expected_mechanism: Provides a daily model-implied 10-year Treasury term-premium series,
    separating duration-risk compensation from observed yield level.
- title: An Arbitrage-Free Three-Factor Term Structure Model and the Recent Behavior of Long-Term
    Yields and Distant-Horizon Forward Rates
  authors: Don H. Kim and Jonathan H. Wright
  year: 2005
  venue: Federal Reserve FEDS paper
  link_or_doi: https://www.federalreserve.gov/pubs/feds/2005/200533/200533abs.html
  expected_mechanism: Motivates decomposing long-term yields into expected short-rate and
    term-premium components.
- title: Treasury Term Premia
  authors: Federal Reserve Bank of New York
  year: 2026
  venue: NY Fed Data and Indicators
  link_or_doi: https://www.newyorkfed.org/research/data_indicators/term-premia-tabs
  expected_mechanism: Documents Treasury term-premium estimates as a financial-stability and
    fixed-income risk-premium data family.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York.
- Public FRED daily THREEFYTP10 CSV cached under data/external/fred_treasury_term_premium.
- Derived strict-lag feature CSV data/external/nq_treasury_term_premium_features_20110103_20260612.csv.
duplicate_edge_check:
  checked_edges:
  - nq_treasury_rate_shock_intraday
  - nq_treasury_rate_orderflow_confirmation
  - nq_real_yield_breakeven_state
  - nq_move_treasury_volatility_state
  - nq_default_spread_orderflow_risk_premium
  - nq_treasury_auction_pressure_density_screen
  caveat: Existing Treasury/rates campaigns use observed nominal yields, real yields, breakevens,
    MOVE volatility, auction calendars, or orderflow confirmation. This campaign uses the
    model-implied term premium component of long rates and applies a separate strict-lag feature
    construction.
  conclusion: Eligible as a distinct duration-risk-premium state rather than a yield-level
    or rate-shock sibling.
lookahead_risks:
- A session dated D can only use the latest THREEFYTP10 observation on or before D minus 7
  calendar days.
- Rolling ranks are computed in the term-premium table before the session-level as-of join.
- Signals use a completed NQ RTH bar and enter no earlier than the next bar open.
- No same-day term-premium row, final NQ session range, final VWAP, or post-entry path is
  used.
failure_modes:
- The term premium may affect NQ mainly over multi-day horizons, not same-day RTH.
- The 7-calendar-day lag may stale the signal.
- The state may duplicate broad discount-rate or volatility regimes in practice and fail robustness.
- If the edge only survives a narrow threshold or one regime, it must be rejected.
