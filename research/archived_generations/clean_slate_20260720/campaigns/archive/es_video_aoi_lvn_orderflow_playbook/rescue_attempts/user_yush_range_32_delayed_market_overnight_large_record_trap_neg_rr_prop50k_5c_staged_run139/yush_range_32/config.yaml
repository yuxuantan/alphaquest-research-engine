research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush visible-level sweep and big-trade-bubble checklist, adapted into a completed-bar delayed
    confirmation branch.
  academic_source: Chart Fanatics / Trader Yush video; Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov
    (2014); stop-run/market-profile practitioner literature.
  edge_thesis: >
    A large200 print cluster into a visible prior-day or overnight level is not enough by itself; requiring the next
    completed 3-minute bar to reclaim in the opposite direction may better isolate absorption/trap behavior while
    avoiding SCID replay sparsity.
  mechanic: >
    Completed-bar delayed trap. Event bar must sweep a prior RTH or overnight level with large200 signed flow against
    the eventual entry direction and with the level on the correct side of prior VAP POC. The next 3-minute bar must
    close back through the level in the entry direction, optionally with confirming signed-volume imbalance. Entry is
    next bar open after that confirmation. Five ES contracts use fixed $75/contract target and wider fixed-dollar stop
    grid, intentionally negative-RR.
  timeframe_rationale: Three-minute bars are the native cache timeframe and avoid SCID replay runtime. The delayed
    confirmation bar prevents entering on the same completed bar that detected the large-record event.
  mechanics_review:
    mechanic_expresses_edge: This is a delayed visible-level trap branch, distinct from exact SCID reclaim variants
      and from completed-bar developing value-area acceptance/compression branches.
    entry_logic_rationale: Prior RTH levels, overnight levels, prior VAP context, large200 aggregate fields, and the
      confirming bar are all known before next-bar-open entry.
    stop_loss_rationale: Fixed-dollar stop is deliberately wider than the $75/contract target to test a high-win-rate
      prop payout profile.
    target_exit_rationale: Fixed $75/contract target makes one 5-contract win exceed the $250 funded-payout-day
      threshold before costs.
    profitability_rationale: Passing requires staged core stability, random-entry separation, WFA/Monte Carlo survival,
      no prop-rule violations, at least five $250-plus winning days, and acceptable best-day concentration.
    known_failure_modes: Large200 fields are Sierra aggregate proxies rather than exchange MBO prints. The module can
      be sparse because it requires a two-bar event/confirmation sequence. Negative-RR exits can hide large tail losses;
      reject if random-entry separation, concentration, WFA, Monte Carlo, or prop rules fail.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 3
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days are >= $250 net PnL, best
      profitable day is more than 50% of total net profit, validation is not clean, daily loss exceeds the configured
      50k limit, or any official staged gate fails. Treat any pass as a candidate strategy requiring manual review.
