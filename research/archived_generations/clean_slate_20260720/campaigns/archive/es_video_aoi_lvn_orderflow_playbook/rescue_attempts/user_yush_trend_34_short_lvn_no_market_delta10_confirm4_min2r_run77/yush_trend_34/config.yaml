research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    Short-trend pullbacks into developing LVN pockets may continue lower when buy-side countertrend absorption
    fails and the developing 3-minute SCID record replay also shows materially negative same-bar delta ratio.
  mechanic: >-
    yush_trend_34 is a target-quality branch from yush_trend_33. It keeps the no-market
    risk-capped Model 2 short LVN pullback entry, min_trend_move_ticks=8, max_signal_risk_points=6.0,
    forbidden_aoi_criteria=[market_level], cumulative same-bar signed-volume ratio <= -0.10, sweep_extreme stop,
    one signal per session, and 4-tick / 1.0 ES point displacement below the LVN before entry. The only target
    change is treating structural targets below 2.0R as insufficient and using the 3R fallback instead.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record timestamp granularity inside
    the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: >-
      This branch tests whether the one-point displacement short-LVN signal needs a stronger target-quality floor,
      so shallow structural targets below 2.0R do not dominate the payoff distribution.
    entry_logic_rationale: >-
      Entry is unchanged from yush_trend_33: it uses only prior completed 3-minute profile/context plus sequential
      SCID records seen up to the decision timestamp, rejects market-level AOI confluence, rejects known stop
      distance above 6.0 ES points, requires same-bar signed-volume ratio <= -0.10, and waits until price is at
      least 1.0 ES point below the LVN.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar rejection path high with a fixed two-tick offset. The entry filter only
      prevents opening positions whose known stop distance is already too wide.
    target_exit_rationale: >-
      Structural targets below 2.0R are treated as insufficient reward for the modeled stop and are replaced by the
      3R fallback. This tests whether the branch needs cleaner payoff asymmetry after costs.
    profitability_rationale: >-
      This should only hold up if shallow structural targets were truncating valid continuation pressure rather
      than if the branch depends on a few isolated 3R winners.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price absorption are approximations. The delta-ratio, displacement, and target-quality thresholds
      are result-informed diagnostics and must be rejected unless this latest holdout shows robust economics and
      clean validation, followed by frozen checks on separate windows.
    pre_test_decision: approve_for_testing
