research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption mechanics supplied by user, PDL reclaim-failure compact-risk
    scalp diagnostic
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: Failed upside retests of the previous RTH low may trap aggressive buyers below prior-day
    value. If the edge exists, the first liquidation impulse after a maintained positive delta bucket
    may be more reliable than waiting for a full bucket-risk 1R move.
  mechanic: 'Frozen staged robustness branch from yush_range_20. It keeps short-only PDL reclaim-failure
    continuation: PDL sweep in the previous/current 3-minute bar, positive 1-point delta bucket >=300,
    maintained three-second hold below the bucket, entry within 2 ATR of PDL, bucket-edge signal stop,
    known signal risk <=4.0 ES points, one trade per day, and fixed $100 gross per-contract target. This
    config moves the frozen mechanics to 2025-03-01 through 2026-02-28 and supplies a one-combination
    staged grid.'
  timeframe_rationale: The strategy uses 3-minute bars for ATR and PDL sweep context while entering at
    SCID-record timestamp granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: This staged branch tests whether the yush_range_20 PDL reclaim-failure fixed-dollar
      scalp has a robust liquidation impulse on a separate 12-month window.
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the decision timestamp.
      It enters short when PDL has been swept, trapped-buyer delta remains above threshold, price has
      held below the triggering bucket for three seconds, and entry-to-signal-stop distance is <= 4.0
      ES points.
    stop_loss_rationale: The stop is read from the signal and placed two ES ticks above the positive delta
      bucket top. This invalidates the trapped-buyer continuation if price reclaims the absorption bucket.
    target_exit_rationale: The fixed $100 target tests whether the signal is only a short impulse edge.
      This is not a structural target and must be rejected if the apparent edge is just a small-sample
      cost artifact.
    profitability_rationale: This can pass only if the PDL reclaim-failure scalp has enough immediate
      short impulse to overcome costs, random-entry monkey controls, WFA decay, Monte Carlo robustness,
      and acceptance gates.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print ordering, queue
      behavior, and true footprint-at-price absorption are approximations. The PDL-only fixed-dollar target
      is result-informed and must be rejected if any official staged gate fails.
    pre_test_decision: approve_for_testing
