research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material
  edge_thesis: In a directional ES auction, pullbacks into developing LVN pockets may continue in the trend direction
    when the pullback shows trapped countertrend absorption plus confirming large-record and delta flow.
  mechanic: Fixed-mechanics POC for yush_trend_3. The evaluator uses the prior completed 3-minute bar's cached
    developing VAP profile to identify a Model 2 long-trend LVN AOI, then enters at the first Sierra SCID record
    between 10:00 and 15:00 ET where the developing tick path has reached that LVN, shows sell-side absorption below
    the current price, and then rejects higher with directional buy delta/large-record confluence. Relative to
    yush_trend_1, this variant tests the long-side counterpart of yush_trend_2 with the same two AOI confluences and 20-contract absorption threshold. Prior completed-bar long trend variants failed, so this is only a SCID-intrabar diagnostic.
  timeframe_rationale: The strategy uses 3-minute bars for the trend/LVN context and enters at SCID-record timestamp
    granularity inside the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: This POC expresses the Yush Model 2 trend edge by requiring a long-trend state,
      pullback into a developing LVN AOI, and intrabar rejection after sell-side absorption plus at least one additional
      AOI confluence from market level, large-record pressure, or delta activity.
    entry_logic_rationale: Entry uses only the prior completed 3-minute profile/context plus sequential SCID records
      seen up to the decision timestamp. It does not wait for the 3-minute bar close; it enters when the developing
      tick path reaches the LVN and then confirms a long-side rejection.
    stop_loss_rationale: The stop remains beyond the intrabar rejection path low with a fixed tick offset, matching
      the wick/AOI invalidation logic from the completed-bar trend branch.
    target_exit_rationale: The target module uses the structural target from the signal when it is valid, otherwise
      falls back to a fixed-R target so trades are not dominated by too-close targets.
    profitability_rationale: The mechanism should only work if the intrabar pullback into an LVN traps countertrend
      sellers and resumes the trend before the completed 3-minute bar close. The lower absorption threshold is a
      source-semantics adjustment for SCID record replay, not a completed-bar footprint threshold.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior,
      and true footprint-at-price absorption are approximations. The POC still relies on cached 3-minute developing
      VAP levels for context and cannot simulate discretionary partial exits, dynamic trailing, or DOM/tape-speed
      judgment. The 3-month window is still not enough for a research pass if the signal is sparse or unstable.
    pre_test_decision: approve_for_testing
