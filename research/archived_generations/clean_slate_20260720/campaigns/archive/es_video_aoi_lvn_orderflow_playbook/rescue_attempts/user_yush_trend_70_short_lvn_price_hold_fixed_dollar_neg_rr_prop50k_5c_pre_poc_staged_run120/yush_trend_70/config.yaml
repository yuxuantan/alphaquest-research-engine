research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript,
    fixed-dollar negative-RR funded-account diagnostic
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: Short-trend pullbacks into developing LVN pockets may continue lower when buy-side countertrend
    absorption fails and the developing 3-minute SCID record replay also shows materially negative same-bar
    delta ratio.
  mechanic: Fixed-dollar price-hold negative-RR branch from the signed-cap no-market Model 2 short LVN
    family. It keeps the morning-only risk-capped short-LVN pullback entry, forbidden_aoi_criteria=[market_level],
    min_directional_delta_imbalance=0.10, max_directional_signed_volume=500, max_signal_risk_points=6.0,
    one signal per session, five ES contracts, and a fixed-dollar negative-RR payoff grid. The distinct
    payoff change versus yush_trend_69 is that targets are fixed at $75/$100 per contract while stops
    are fixed at $150/$200 per contract, so the funded-account payout-day threshold is explicit rather
    than dependent on variable modeled sweep_extreme risk.
  timeframe_rationale: The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record
    timestamp granularity inside the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether the prior negative-RR short-LVN impulse has edge
      when the first qualifying rejection is followed by price acceptance below the LVN, without requiring
      cumulative delta and signed-volume cap to remain continuously valid during the hold.
    entry_logic_rationale: Entry uses only prior completed 3-minute profile/context plus sequential SCID
      records seen up to the decision timestamp. A candidate first has to satisfy the same no-market signed-cap
      short-LVN rejection conditions as yush_trend_61. It then starts a pending state and requires price
      to remain at or below the LVN for entry_hold_seconds. Any trade back above the LVN resets the pending
      entry. At entry, the known sweep_extreme stop distance must still be <= max_signal_risk_points.
    stop_loss_rationale: The tested stop is fixed at $150 or $200 per contract and rounded to ES ticks,
      deliberately wider than the fixed target. The original sweep-extreme risk cap remains an entry-quality
      guard through max_signal_risk_points.
    target_exit_rationale: The target is selected from the predeclared $75/$100 per-contract grid and
      rounded to an executable ES tick. At five contracts, a $75 target is intended to produce a qualifying
      $250-plus winning day after modeled costs when only one trade is taken.
    profitability_rationale: 'This can pass only if held short-LVN continuation reaches sub-1R targets
      often enough to overcome costs, random-entry monkey controls, and funded-account payout constraints
      at five contracts: at least five $250-plus winning session days and no largest winning day above
      50% of total profit.'
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print ordering, queue
      behavior, and true footprint-at-price absorption are approximations. Relaxing continuous delta/signed-cap
      maintenance can admit post-trigger flow that no longer matches the initial exhaustion guard; reject
      if any staged gate fails, if daily loss risk approaches the configured 50k rule, if profit is concentrated,
      or if monkey/WFA/acceptance evidence does not separate from random entries.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 1
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days are >= $250 net PnL,
      best profitable day is more than 50% of total net profit, validation is not clean, daily loss exceeds
      the configured 50k limit, or any official staged gate fails. Treat any pass as a candidate strategy
      requiring manual review.
    target_dollars_per_contract: 75.0
