research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption mechanics supplied by user, PDL-only unseen-window check
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material
  edge_thesis: In a balanced ES auction, failed sweeps of public levels near value-area edges should reverse when
    a 1-point developing delta-profile bucket shows aggressive traders trapped and price holds beyond the bucket
    for several seconds.
  mechanic: Unseen-window check for the result-informed PDL-only yush_range_6 rescue. The evaluator keeps a developing 1-point
    session volume profile
    from Sierra SCID records, confirms balance via stable 30-minute session range and centered POC, requires at most
    one low-volume bucket inside value, requires a PDL sweep only, and enters on the first SCID record after the
    absorption bucket has held for three seconds. This keeps the yush_range_1 bucket stop, fixed 2R target, one-trade
    daily cap, and tests the earlier December 2025-February 2026 window without changing mechanics.
  timeframe_rationale: The strategy uses 3-minute bars for ATR, public-level context, and previous/current sweep
    windows while entering at SCID-record timestamp granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: This POC expresses a narrower range-fade edge by combining a balanced developing profile
      state, a fresh PDL sweep, proximity to the value-area edge, and a same-bar 1-point delta bucket that identifies
      trapped aggression before entry.
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the decision timestamp. It does not
      wait for the 3-minute bar close; it enters when range state, profile state, level sweep, ATR proximity, and
      the three-second post-absorption hold are simultaneously true.
    stop_loss_rationale: >-
      The stop is read from the signal and placed exactly two ES ticks beyond the absorption bucket edge: below the
      bottom edge for longs and above the top edge for shorts. This makes invalidation local to the delta-profile
      level that triggered the trade.
    target_exit_rationale: The POC uses a single fixed 2R target from the actual simulated entry price and exact
      bucket stop. This matches the requested take-profit rule and avoids discretionary partials or trailing logic.
    profitability_rationale: The mechanism should only work if PDL sweeps in a balanced auction attract
      aggressive traders who become trapped at the value-area edge, causing forced exit flow back toward value after
      price holds outside the absorption bucket. This run is result-informed by the yush_range_1 3-month diagnostic,
      where PDL was the only level bucket with positive net PnL; because of that, any positive result remains a
      manual-review-only rescue and must fail if it does not survive this earlier unseen window.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior,
      and true footprint-at-price absorption are approximations. The POC uses RTH replay for the 30-minute range
      state because the selected 3-minute cache is RTH scoped. This earlier three-month window is still only an
      unseen-window POC, not full staged validation.
    pre_test_decision: approve_for_testing
