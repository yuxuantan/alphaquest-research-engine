research_metadata:
  academic_source: Szakmary and Kiefer (2004); Lakonishok and Smidt (1988); Ariel
    (1990)
  edge_thesis: NQ may earn abnormal positive intraday returns around the turn of the
    year, especially during the Santa-rally window of the last five regular December
    sessions and first two regular January sessions.
  mechanic: At 10:00 ET during only the first two regular January sessions, buy NQ
    on the next bar boundary and flatten same day.
  timeframe_rationale: One-minute bars preserve completed-bar signal timing and next-bar/open-boundary
    execution on sparse turn-of-year calendar sessions while avoiding overnight exposure.
  pre_pnl_port_note: This NQ port was authored before any NQ turn-of-year PnL inspection
    and preserves the official ES source mechanics and grids.
  source_es_config_path: campaigns/es_turn_of_year_effect/variants/january_first2_open_long_1000/config.yaml
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the turn-of-year futures seasonality
      as an ex-ante calendar state using the last five regular December sessions and
      first two regular January sessions. It never uses future January returns, future
      session high/low, future volume profile, or post-entry outcomes.
    entry_logic_rationale: The entry condition is evaluated after a completed one-minute
      RTH NQ bar at the predeclared clock time. Calendar membership is known before
      the session, and intended execution is next-bar/open-boundary with no same-bar
      hindsight.
    stop_loss_rationale: The stop is a predeclared percent-from-entry distance rounded
      to the NQ tick. It is evaluated by the staged engine with pessimistic OHLC ordering
      when stop and target are both touched inside the same bar.
    target_exit_rationale: The target is a fixed-R multiple tied to the initial stop
      distance, with a mandatory 15:55 ET flatten. The variant does not hold overnight
      even though the original anomaly is often measured across daily or multi-day
      windows.
    profitability_rationale: If the seasonal equity-index futures risk premium remains
      intraday-tradable in NQ, the long-only entries should show positive expectancy
      across multiple turn-of-year windows after costs and should not depend on one
      isolated year.
    known_failure_modes: The effect may be mostly overnight or close-to-close, may
      have disappeared after publication, may be too sparse for WFA or prop-rule evidence,
      or may be dominated by one crisis/rebound year and fail concentration or monkey
      tests.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    status: failed_screen_before_pnl
    decision: FAIL
    artifact: research_artifacts/nq_turn_of_year_effect_density_audit_20260630.md
    detail_csv: research_artifacts/nq_turn_of_year_effect_density_audit_20260630.csv
    summary: Failed 50 signals/year full-history, limited-core, and latest-252-session
      density checks before any NQ PnL inspection.
