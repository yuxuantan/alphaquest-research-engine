edge_family: nq_range_compression_breakout
hypothesis: Completed prior-session range compression in NQ can precede same-day intraday volatility expansion after a completed
  breakout of the prior-session or opening-range reference.
rationale: This is an NQ port of the ES range-compression breakout family with the prior-range cap scaled from NQ completed-session
  range distribution before any NQ PnL testing.
