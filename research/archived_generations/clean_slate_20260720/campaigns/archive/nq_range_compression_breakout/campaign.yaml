data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- completed NQ RTH 5-minute bars generated by repo pipeline
- one-minute execution detail for fills
lookahead_risks:
- Prior-session compression is known only after the prior RTH session is complete.
- Opening-range levels are unavailable until the configured opening-range window is complete.
- Breakout signals use completed 5-minute bar closes and enter no earlier than next bar open.
- No final current-session high/low, final VWAP, future range, or future breakout level is used.
failure_modes:
- NQ breakouts after compression may be noise or over-arbitraged after costs.
- Same-bar stop/target conflicts may convert apparent wins into pessimistic stop exits.
- The effect may depend on a narrow volatility regime or a small number of expansion days.
- Compression filters may produce too few trades for WFA or prop-rule robustness.
