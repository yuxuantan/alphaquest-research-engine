timeframe: 5m
research_metadata:
  academic_source: Boyarchenko, Larsen, and Whelan (2020), Federal Reserve Bank of New York Staff Reports
    No. 917
  edge_thesis: ES futures may earn a positive overnight return around the European-open transfer window
    because prior U.S. trading imbalances are absorbed after the U.S. close.
  mechanic: Enter long after the completed 01:55-02:00 ET ETH bar when the prior RTH session sold off
    and the ETH session has not already recovered more than the declared pre-signal return threshold.
  timeframe_rationale: Five-minute ETH bars keep the European-open window auditable while avoiding one-minute
    noise; all signals use completed bars and the engine enters at the next 5-minute open.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  eth_session_risk_caveat: This variant is not RTH-only. Apex-style checks remain enabled with an explicit
    04:00 ET ETH cutoff and no_overnight_positions=false.
  mechanics_review:
    mechanic_expresses_edge: Enter long after the completed 01:55-02:00 ET ETH bar when the prior RTH
      session sold off and the ETH session has not already recovered more than the declared pre-signal
      return threshold. This is a direct test of the published overnight drift window, not an RTH gap
      reversal or late-day continuation setup.
    entry_logic_rationale: The signal clock is fixed before testing and uses only the completed ETH bar
      ending at the declared signal time plus prior RTH open/close values already known before the overnight
      session. The next-bar execution rule prevents entering on the same close that creates the signal.
    stop_loss_rationale: A fixed percent stop is used because the source defines a time-window risk premium
      rather than a chart level. The stop grid spans realistic short ETH-window ES movement and is declared
      before testing.
    target_exit_rationale: A fixed-R target plus a strict time flatten tests whether the overnight drift
      can monetize inside the source window without discretionary exits or holding into the RTH session.
    profitability_rationale: 'This version expresses the imbalance-transfer mechanism most tightly: prior
      U.S. selling creates potential overnight demand, but the signal is skipped if the evening ETH session
      already recovered too much before the European-open window.'
    known_failure_modes: The anomaly may have decayed, the average window return may be too small after
      one-tick slippage and commissions, ETH liquidity may make fills worse than modeled, and broker or
      prop rules may reject the overnight-session exposure.
    pre_test_decision: approve_for_testing
