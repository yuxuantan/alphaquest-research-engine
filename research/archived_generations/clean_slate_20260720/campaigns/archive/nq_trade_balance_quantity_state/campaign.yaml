campaign_id: nq_trade_balance_quantity_state
title: NQ Trade Balance Quantity State
status: completed_failed_limited_core
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Strictly lagged U.S. balance-of-payments trade balance, export, and import quantity states may proxy external-demand strength, domestic-demand weakness, and external-adjustment pressure that influence same-day NQ RTH risk appetite.
rationale: The campaign uses monthly FRED/U.S. Census/BEA BOPGSTB, BOPGEXP, and BOPGIMP with a conservative 60-calendar-day lag. It is distinct from the existing import/export price-pressure family because it tests trade quantities and balance-of-payments external-balance state rather than BLS import/export price inflation pressure and orderflow confirmation.
sources:
- title: International Financial Adjustment
  authors: Pierre-Olivier Gourinchas and Helene Rey
  year: 2005
  venue: NBER Working Paper 11155
  link: https://www.nber.org/papers/w11155
  relevance: Motivates trade-balance and external-imbalance state as related to future returns and net-export adjustment.
- title: "Trade Balance: Goods and Services, Balance of Payments Basis (BOPGSTB)"
  authors: U.S. Census Bureau and U.S. Bureau of Economic Analysis via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/BOPGSTB
  relevance: Monthly U.S. goods/services trade balance used for external-balance features.
- title: "Exports of Goods, Balance of Payments Basis (BOPGEXP)"
  authors: U.S. Census Bureau and U.S. Bureau of Economic Analysis via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/BOPGEXP
  relevance: Monthly export quantity value used for export-growth and export/import ratio features.
- title: "Imports of Goods, Balance of Payments Basis (BOPGIMP)"
  authors: U.S. Census Bureau and U.S. Bureau of Economic Analysis via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/BOPGIMP
  relevance: Monthly import quantity value used for import-growth and export/import ratio features.
behavioural_or_microstructure_rationale: Trade-balance improvement can proxy external demand and less adjustment pressure, while weak imports or deteriorating balances may proxy demand weakness or macro imbalance. Any real edge must survive next-bar execution, NQ costs, pessimistic fills, neighboring parameters, monkey robustness, WFA, Monte Carlo, prop-rule simulation, and acceptance OOS.
expected_failure_modes:
- Monthly trade data may be too stale after a 60-day lag for intraday futures trading.
- Trade quantity state may be dominated by currency, commodity, or non-tech sector effects rather than NQ.
- Effects may be regime-specific and fail neighboring parameter or monkey robustness.
- Import weakness can be ambiguous, mixing benign deficit improvement with domestic-demand weakness.
data_needs:
- timezone-aware NQ RTH 1-minute bars in America/New_York
- FRED BOPGSTB/BOPGEXP/BOPGIMP monthly data cached under data/external/fred_trade_balance_quantity_state
- 60-calendar-day as-of join from NQ sessions to monthly BOP observations
lookahead_risks:
- A session dated D may only use the latest monthly BOP trade observation on or before D minus 60 calendar days.
- Rolling ranks are computed on completed monthly observations before the NQ as-of join.
- Signals use completed one-minute bars and enter next bar open or later.
- No future NQ bar, final session range, final VWAP, final volume profile, or post-entry market state is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_import_export_price_pressure
  - es_import_export_price_pressure
  - nq_dollar_risk_appetite_intraday
  - nq_manufacturing_orders_state
  - nq_retail_inventory_demand
  conclusion: Eligible before PnL as a distinct balance-of-payments trade-quantity state edge; prior import/export campaigns used price-index inflation pressure, not trade balance or export/import quantity state.
