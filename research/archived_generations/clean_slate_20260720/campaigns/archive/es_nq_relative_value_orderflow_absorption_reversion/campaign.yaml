campaign_id: es_nq_relative_value_orderflow_absorption_reversion
title: ES/NQ Relative-Value Reversion With ES Orderflow Absorption
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: cross_index_relative_value_orderflow_absorption_reversion
hypothesis: ES/NQ return divergences are more likely to mean-revert when ES aggregate signed flow is counter to the ES price
  leg, indicating absorption rather than continuation pressure; a fixed intraday window keeps trade frequency viable while
  preserving max one signal per day.
rationale: This is a bounded composite campaign. The primary edge is ES/NQ relative-value convergence; the fixed secondary
  filter is completed ES aggregate signed-flow absorption over the same lookback window. Exact-minute timing was rejected
  before PnL for insufficient density, so the tested mechanic uses the first qualifying completed bar inside a predeclared
  window.
sources:
- title: 'Pairs Trading: Performance of a Relative-Value Arbitrage Rule'
  authors: Evan Gatev, William N. Goetzmann, and K. Geert Rouwenhorst
  year: 2006
  venue: Review of Financial Studies
  link: https://academic.oup.com/rfs/article-abstract/19/3/797/1585302
  relevance: Relative-value foundation for temporary divergence and convergence between related instruments.
- title: High Frequency Lead/Lag Relationships - Empirical Facts
  authors: Nicolas Huth and Frederic Abergel
  year: 2014
  venue: Empirical market microstructure working paper
  link: https://ideas.repec.org/p/hal/wpaper/hal-00645685.html
  relevance: Motivates high-frequency dependencies between related assets such as equity-index futures.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports imbalance as a short-horizon pressure proxy; this campaign uses completed aggregate signed trade flow,
    not quote-depth OFI.
- title: Lead-Lag Relationships in Market Microstructure
  authors: Julian Schmidt, Tino Cestonaro, and Micha Bender
  year: 2024
  venue: SSRN
  link: https://doi.org/10.2139/ssrn.5043260
  relevance: Reviews predictive cross-market relationships in microstructure data.
data_needs:
- data/cache/orderflow/es_nq_lead_lag_1m_20110103_20260609_full_rth_ny.parquet
- completed ES/NQ rolling return-spread columns
- completed ES signed-imbalance columns over 15/30/60 minute windows
lookahead_risks:
- Rolling return and signed-imbalance features must use completed bars only.
- Signal at the decision minute enters no earlier than the next one-minute bar open.
- No future ES/NQ bars, final VWAP, final daily range, or future orderflow is used.
- All variants flatten intraday before their configured cutoff.
failure_modes:
- Divergence may be information-driven rather than temporary.
- Signed flow can be noisy or mark late capitulation.
- Trading only ES may not monetize true pair convergence.
- The effect can concentrate in one side, one volatility regime, or a small number of dates.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_nq_relative_value_reversion
  - es_nq_cross_index_lead_lag
  - es_mes_lead_lag_catchup
  - es_mes_micro_flow_divergence_reversion
  - es_signed_orderflow_persistence
  conclusion: Eligible as a bounded composite because ES/NQ relative-value divergence alone cannot trigger; ES signed-flow
    absorption over the completed lookback must confirm counter-price pressure before entry.
