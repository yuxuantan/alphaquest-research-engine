timeframe: 1m
research_metadata:
  academic_source: Osler (2003); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Sell-side trade pressure during a rebound below the prior RTH low may indicate downside absorption and a failed break of support.
  mechanic: From 10:30 through 15:30 ET, enter long when price is freshly below the prior RTH low while the completed rolling 60-minute price return is positive and signed trade flow is negative; flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: The entry module uses completed rolling 60-minute trade-side signed-volume and return features. The repo builds these features after timeframe aggregation, so the campaign is fixed at 1-minute bars to make the 60-window exactly 60 minutes and preserve next-bar-open execution.
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameters and declared grid values inside existing modules: disabled fresh-level requirement, widened max distance to the prior RTH level, lowered orderflow threshold grid, and tightened stop/target grids. Entry module, stop module, target module, timeframe, data window, costs, fills, and validation gates are unchanged.'
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_prior_level_delta_dislocation/pdl_sell_absorption_long entry mechanic: From 10:30 through 15:30 ET, enter long when price is freshly below the prior RTH low while the completed rolling 60-minute price return is positive and signed trade flow is negative; flatten at 15:55 ET unless stop or target is hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_prior_level_delta_dislocation
    source_variant_id: pdl_sell_absorption_long
    source_run_id: rescue1
    source_config_path: campaigns/es_prior_level_delta_dislocation/rescue_attempts/parameter_space_rescue_1/pdl_sell_absorption_long/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0015
      new: 0.00225
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.001
      - 0.0015
      - 0.0025
      new: &id002
      - 0.0015
      - 0.00225
      - 0.00375
