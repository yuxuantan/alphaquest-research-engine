research_metadata:
  academic_source: Brock, Lakonishok, and LeBaron (1992); Lo, Mamaysky, and Wang (2000); Moskowitz, Ooi,
    and Pedersen (2012); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Prior-session level breakout continuation should be more reliable when completed-bar market
    structure and aggregate orderflow both confirm the breakout direction.
  mechanic: From 10:00 through 14:30 ET, trade completed prior-level holds only when total signed flow
    confirms direction, current completed-bar trend agrees, and the signal bar has above-normal relative
    volume.
  timeframe_rationale: The wider window offsets the fixed high-volume requirement while still avoiding
    late illiquid entries and forced-flatten pressure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the constrained composite edge because price alone
      cannot trigger. A signal must show completed acceptance outside a public prior RTH high or low,
      deterministic higher-high/higher-low or lower-high/lower-low completed-bar structure, and aligned
      aggregate orderflow before entry.
    entry_logic_rationale: The entry uses only completed 5-minute bars. The prior RTH level is known before
      the session, the trend filter compares completed current-session windows already observed before
      the signal, and orderflow confirmation is read from the completed signal bar. The hold mode deliberately
      avoids a sparse first-break-only dependency while still requiring price to be accepted outside the
      prior level before next-bar-open execution.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and rounded to the ES tick.
      It rejects the continuation thesis if a trend-aligned prior-level break cannot tolerate ordinary
      adverse movement after commission and one tick of configured slippage.
    target_exit_rationale: A fixed-R target keeps the exit rule independent of future levels, future orderflow,
      final VWAP, or discretionary chart reading. Same-day flattening before 15:55 ET prevents overnight
      exposure and preserves prop-rule compliance.
    profitability_rationale: 'The setup should be profitable only if prior-session high/low acceptance
      continues when three independent pre-entry conditions agree: price is holding outside a public prior
      RTH level, completed-bar trend structure points in the continuation direction, and same-bar aggregate
      orderflow shows participation rather than a thin probe. This reformulated hold mechanic passed the
      pre-PnL density screen before any staged PnL was inspected.'
    known_failure_modes: The filter may arrive after the breakout edge has decayed, may select overextended
      moves, or may reduce density below the methodology floor. Aggregate signed flow can still mark exhaustion
      instead of informed continuation, and results may concentrate in crisis trend days.
    pre_test_decision: approve_for_testing
