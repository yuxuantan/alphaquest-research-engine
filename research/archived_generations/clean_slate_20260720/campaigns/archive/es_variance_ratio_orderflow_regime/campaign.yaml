campaign_id: es_variance_ratio_orderflow_regime
title: ES variance-ratio serial-dependence regime with aggregate orderflow confirmation
decision: FAIL
created_at: '2026-06-19'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Rolling completed-bar variance ratio identifies whether short-horizon ES price action is in
  a persistent or anti-persistent state; aggregate orderflow confirmation should improve trade selection
  by requiring pressure to align with the serial-dependence state.
rationale: This is a bounded price-action/orderflow edge. The core edge is serial dependence measured
  by a rolling variance-ratio statistic computed only from completed ES bars. High variance-ratio states
  express trend persistence and trade with the completed return plus aligned aggregate flow. Low variance-ratio
  states express choppy overreaction and fade completed moves that show aggressive flow but fail to close
  at the extreme. Orderflow is a confirmation layer, not the primary edge.
sources:
- title: 'Stock Market Prices Do Not Follow Random Walks: Evidence from a Simple Specification Test'
  authors: Andrew W. Lo and A. Craig MacKinlay
  year: 1988
  venue: Review of Financial Studies
  doi: 10.1093/rfs/1.1.41
  link: https://doi.org/10.1093/rfs/1.1.41
  relevance: Introduces the variance-ratio test as a direct measurement of serial dependence in returns;
    this campaign uses rolling completed-bar variance ratio as the price-action regime gate.
- title: Stock Market Overreaction
  authors: Werner F. M. De Bondt and Richard Thaler
  year: 1985
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1985.tb05004.x
  link: https://doi.org/10.1111/j.1540-6261.1985.tb05004.x
  relevance: Motivates the low-variance-ratio/reversal variants as tests for overreaction and short-horizon
    mean reversion rather than unconditional trend following.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://doi.org/10.1093/jjfinec/nbt003
  relevance: Supports using contemporaneous order-flow imbalance as a short-horizon price-pressure confirmation,
    while this campaign avoids LOB claims and uses only completed aggregate Sierra trade flow.
data_needs:
- Local Sierra ES completed 1-minute RTH OHLCV and aggregate trade-orderflow cache.
- 5-minute bars resampled from completed 1-minute bars by the existing runner.
- Completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume, and
  large20_volume.
- No LOB, quote, TBBO, paid, or future-derived data.
data_quality_caveats:
- Sierra aggregate orderflow is a completed-bar proxy and cannot prove print-level sequencing or true
  LOB order-flow imbalance.
- The variance ratio is computed from rolling intraday close-to-close returns and can be noisy in low-range
  windows.
- Same-bar stop/target conflicts still require pessimistic OHLC ordering.
- The edge may collapse after ES commission and one-tick entry slippage if average continuation/reversion
  is small.
lookahead_risks:
- The variance-ratio window includes the signal bar only after that bar has closed; entry is next bar
  open through the engine.
- Orderflow confirmation uses only completed signal-window aggregate volume and signed volume.
- No final session high/low, final VWAP, final volume profile, future returns, or post-entry orderflow
  is used.
- WFA parameter selection must use in-sample windows only; no frozen validation tuning is allowed.
failure_modes:
- Variance-ratio regimes may not be stable across volatility regimes or contract-roll environments.
- High variance ratio may identify exhaustion rather than continuation after large news moves.
- Low variance ratio may identify noise with too little edge after costs.
- Aggregate signed flow may be too crude compared with true LOB order-flow imbalance.
- A few high-volatility periods may dominate profitability and fail Monte Carlo or monkey perturbations.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_signed_orderflow_persistence
  - es_trend_aligned_orderflow_continuation
  - es_orderflow_impulse_reversal
  - es_rolling_stat_envelope_orderflow_reversion
  - es_range_compression_orderflow_breakout
  - es_realized_vol_of_vol_state
  - es_realized_semivariance_asymmetry
  - es_vpin_toxicity_continuation
  conclusion: Eligible as a new bounded composite edge because the entry is gated by rolling variance-ratio
    serial dependence computed from completed price bars. It is not standalone signed-flow persistence,
    generic trend alignment, range compression, realized volatility state, or envelope reversion.
