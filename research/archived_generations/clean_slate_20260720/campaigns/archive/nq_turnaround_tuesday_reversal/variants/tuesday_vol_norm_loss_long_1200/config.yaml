timeframe: 5m
research_metadata:
  academic_source: French (1980); Carchano and Pardo (2011); Lehmann (1990)
  edge_thesis: Tuesday-only reversal may occur after Monday or prior-session pressure
    when weekend information/liquidity stress mean-reverts.
  mechanic: On Tuesday at 12:00 ET, go long when the completed three-session loss
    ending Monday is large versus its short-window volatility.
  timeframe_rationale: Five-minute bars give completed-bar Tuesday signals and enough
    same-day holding time while avoiding overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  pre_pnl_density:
    artifact: research_artifacts/nq_turnaround_tuesday_reversal_density_audit_20260701.md
    screen: research_artifacts/nq_turnaround_tuesday_reversal_density_audit_20260701.csv
    nq_grid_fixed_before_pnl: true
    note: Declared Tuesday grids failed density before staged PnL.
  source_es_campaign: none_new_nq_conditional_calendar_reversal
  nq_port_note: New NQ campaign; no PnL inspected before density rejection.
  mechanics_review:
    mechanic_expresses_edge: On Tuesday at 12:00 ET, go long when the completed three-session
      loss ending Monday is large versus its short-window volatility.
    entry_logic_rationale: The signal requires Tuesday, a completed Monday prior session,
      and completed prior RTH closes before the signal session.
    stop_loss_rationale: The percent stop is predeclared, rounded to NQ tick size,
      and rejects the reversal thesis when pressure continues.
    target_exit_rationale: The fixed-R target monetizes same-day reversal without
      using future session information.
    profitability_rationale: Weekend/Monday pressure could leave Tuesday liquidity-provision
      reversal, but sparse density must fail before PnL.
    known_failure_modes: The effect may require overnight holding, may be too sparse,
      or may duplicate raw reversal after conditioning.
    pre_test_decision: approve_for_testing
