campaign_id: nq_default_spread_orderflow_risk_premium
variant_id: high_spread_signed_long_1230
test_run_id: run1
strategy_name: default_spread_orderflow_state
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Fama and French (1989); Keim and Stambaugh (1986); FRED DAAA/DBAA; Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: A high lagged Baa-minus-Aaa default spread can proxy elevated expected equity risk premium;
    NQ longs are only allowed when completed NQ price movement and signed orderflow confirm risk-on participation.
  mechanic: High default-spread rank gates long-only NQ continuation with completed signed-volume confirmation.
  timeframe_rationale: Five-minute bars provide enough completed RTH evidence after 10:00 without reacting
    to one-minute noise or using same-day credit data.
  pre_pnl_density: FAILED pre-PnL NQ density audit; min full-history density 3.7568 signals/year
    and min latest-252 count 0. See research_artifacts/nq_default_spread_orderflow_risk_premium_density_audit_20260623.md.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the default-spread risk-premium edge by requiring
      a high 252-day rank in the lagged Baa-minus-Aaa spread, NQ to move at least two ticks up from the
      RTH open, and cumulative signed volume to confirm buying pressure before a next-bar long entry.

      '
    entry_logic_rationale: 'The credit state is available only through session_date minus two business
      days, while the intraday trigger uses completed NQ bars at 10:00, 10:30, 11:30, or 12:30 ET. The
      entry should only fire when slow credit-risk premium and current NQ participation agree.

      '
    stop_loss_rationale: The rescue tests wider percent stops because original top rows frequently sat
      at the widest tested stop, which suggests the declared signal may need more intraday noise tolerance
      without changing its economic trigger.
    target_exit_rationale: The fixed-R target logic and target grid are intentionally unchanged. All tested
      target_r_multiple values are at least 1.0R, so the corrected RR rule permits no TP widening; any
      rescue effect must come from entry-threshold and stop-distance robustness.
    profitability_rationale: If high default spreads represent compensation for bearing equity risk, then
      same-day NQ upside continuation with aligned orderflow should have a better after-cost distribution
      than unfiltered continuation.
    known_failure_modes: High spreads can also indicate unresolved stress, the signal may be too slow
      for intraday NQ, and profits may concentrate in post-crisis recovery regimes.
    pre_test_decision: reject_pre_pnl_density
  rescue_reason: Original best rows clustered around moderate high-spread rank, stricter signed-flow confirmation,
    the widest stop, and a 2R target, but the profitable-combo rate was far below the core gate.
  rescue_constraints: Same default-spread/orderflow edge, entry module, setup mode, flow bucket, signal
    times, timeframe, data window, costs, stop module, target module, target grid, flatten rule, prop
    rules, and validation gates. Only existing credit threshold, orderflow threshold, and stop-distance
    fixed values/parameter grids are changed. TP is unchanged because all target_r_multiple values are
    already >= 1.0R.
  source_run_report: backtest-campaigns/es_default_spread_orderflow_risk_premium/high_spread_signed_long_1230/ES/rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_default_spread_orderflow_risk_premium
    source_config_path: campaigns/es_default_spread_orderflow_risk_premium/rescue_attempts/parameter_space_rescue_1/high_spread_signed_long_1230/config.yaml
    source_run_role: ES parameter-space rescue config, ported before any NQ PnL inspection
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
