campaign_id: nq_pivot_filtered_prior_value_area_acceptance
title: NQ prior value-area acceptance filtered by completed pivot market structure
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: nq_pivot_filtered_prior_value_area_acceptance
hypothesis: NQ prior-session value-area acceptance should be more robust when same-direction completed aggregate orderflow
  confirms the break and carried completed 5/15-minute swing-pivot market structure agrees with the acceptance direction.
rationale: This is a bounded composite campaign. The primary edge is prior-session value-area acceptance; the fixed secondary
  condition is completed swing-pivot direction. It is not a duplicate of direct NQ value-area acceptance because the base
  signal must pass a fixed carried-pivot filter, and it is not a duplicate of NQ pivot/MES campaigns because no MES participation
  or crowding proxy is used.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports objective support/resistance-style intraday levels as testable prior-session benchmarks.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon price-pressure proxy; this campaign uses completed Sierra aggregate
    signed volume, not quote-depth OFI.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  venue: Exchange market profile documentation
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supports profile-style historical activity analysis; this campaign adapts the idea to
    completed NQ RTH OHLCV.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: Supports deterministic local-extrema pattern definitions; the pivot filter uses only completed swing pivots.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Provides futures-market support for trend persistence; this campaign only uses it to motivate fixed pivot-structure
    agreement.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- 5-minute NQ bars generated deterministically from completed 1-minute RTH Sierra bars
- prior-session approximate VAH/VAL/POC computed only after the previous RTH session is complete
- completed 5/15-minute pivot-state construction from local NQ OHLC bars
- signed, large10, and large20 aggregate flow fields on completed signal bars
lookahead_risks:
- Prior VAH, VAL, and POC are frozen from the previous completed RTH session only.
- Orderflow confirmation uses only the completed signal bar.
- Pivot structure confirms swing highs/lows only after right-side confirmation bars are complete.
- Signals generated from completed bars are filled no earlier than the next bar open by the engine.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
failure_modes:
- The prior value area is an OHLCV approximation rather than true volume-at-price.
- Breaks beyond prior value can be stop probes rather than acceptance.
- The pivot filter can lag fast NQ reversals or select overextended continuation.
- Aggregate signed flow can mark exhaustion rather than informed participation.
- One-tick worse slippage can erase a short-horizon continuation effect.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_prior_value_area_orderflow_acceptance
