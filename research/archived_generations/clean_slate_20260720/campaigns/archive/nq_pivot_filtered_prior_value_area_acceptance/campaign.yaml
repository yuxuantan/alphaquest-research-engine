  - nq_pivot_filtered_mes_participation_crowding_reversion
  - nq_pivot_mes_orderflow_confirmation
  - nq_vwap_pullback_continuation
  conclusion: Eligible as a bounded composite campaign. Existing NQ prior value-area acceptance did not require completed
    pivot direction; existing NQ pivot campaigns used MES participation/crowding or native orderflow confirmation rather than
    prior value-area acceptance. The pivot filter is fixed and non-tunable before NQ PnL.
