research_metadata:
  academic_source: Osler (2000); Cont, Kukanov, and Stoikov (2014); CME Group market-profile documentation; Lo, Mamaysky,
    and Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: NQ prior-session value-area acceptance may continue when completed same-direction aggregate orderflow confirms
    the break and carried completed 5/15-minute swing-pivot structure agrees with the acceptance direction.
  mechanic: From 13:00 through 15:30 ET, enter long above prior VAH or short below prior VAL after completed NQ value acceptance
    with same-direction large20 imbalance and completed 5/15-minute pivot agreement.
  timeframe_rationale: Five-minute bars reduce one-minute value-boundary flicker while preserving completed-bar signal timing.
    The pivot filter uses only completed 5/15-minute swing structures and carries prior completed pivots across RTH sessions
    without future data.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: From 13:00 through 15:30 ET, enter long above prior VAH or short below prior VAL after completed
      NQ value acceptance with same-direction large20 imbalance and completed 5/15-minute pivot agreement. The base prior-value
      acceptance module must emit first; the pivot filter cannot create trades and only rejects signals without same-direction
      completed structure.
    entry_logic_rationale: Prior VAH/VAL/POC are computed only from the previous completed RTH session. Current acceptance,
      orderflow, and pivot-state checks use completed bars only, and the engine enters no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before NQ testing, rounded to NQ tick size, and varied only
      through the predeclared grid.
    target_exit_rationale: The fixed-R target and same-day flatten are predeclared; target_r_multiple is never below 1.0 and
      no final VWAP, final range, or future profile information is used.
    profitability_rationale: The edge should work only if accepted-value migration persists when same-direction orderflow
      and completed swing structure agree, filtering random stop-probe breaks beyond prior value.
    known_failure_modes: The value area is an OHLCV approximation rather than true volume-at-price; NQ boundary breaks can
      be stop probes; pivot structure can lag; aggregate flow can mark exhaustion; NQ costs and slippage can erase short-horizon
      continuation.
    pre_test_decision: approve_for_testing
    source_es_campaign: campaigns/es_pivot_filtered_prior_value_area_acceptance
    source_nq_direct_campaign: campaigns/nq_prior_value_area_orderflow_acceptance
    ported_before_nq_pnl: true
  pre_pnl_density:
    status: approved_for_testing
    artifact: research_artifacts/nq_pivot_filtered_prior_value_area_acceptance_density_audit_20260630.md
    csv: research_artifacts/nq_pivot_filtered_prior_value_area_acceptance_density_audit_20260630.csv
