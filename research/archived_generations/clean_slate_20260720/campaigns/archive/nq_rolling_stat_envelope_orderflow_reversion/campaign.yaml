campaign_id: nq_rolling_stat_envelope_orderflow_reversion
title: NQ Rolling Statistical Envelope Orderflow Reversion
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: mixed_1m_5m
edge_family: rolling_stat_envelope_orderflow_reversion
hypothesis: >
  Completed intraday NQ closes outside a rolling price envelope may mean-revert when same-bar aggregate orderflow is
  pressing into the extreme, because temporary immediacy demand is being supplied rather than repriced as durable
  information.
sources:
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, and Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Models how liquidity trading and market-maker inventory risk can produce short-horizon reversal after
    volume pressure.
- title: Liquidity and Market Structure
  authors: Sanford J. Grossman and Merton H. Miller
  year: 1988
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1988.tb04594.x
  link: https://doi.org/10.1111/j.1540-6261.1988.tb04594.x
  relevance: Provides the liquidity-supplier mechanism for temporary price pressure and inventory-risk compensation.
- title: Rethinking reversals
  authors: Timothy C. Johnson
  year: 2016
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2016.01.026
  link: https://ideas.repec.org/a/eee/jfinec/v120y2016i2p211-228.html
  relevance: Supports a disciplined test of short-horizon reversal rather than assuming intraday extension is
    continuation.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon pressure proxy. This campaign uses completed Sierra
    aggregate signed volume, not quote-level OFI.
rationale: >
  This is an NQ transfer of the ES rolling statistical-envelope orderflow-reversion campaign. The primary edge is an
  intraday rolling mean/std close envelope computed from prior completed bars, with same-side aggregate orderflow
  pressure into the extension. It is not a daily Bollinger environment classifier, VWAP deviation, prior/session level
  reaction, rolling high/low sweep-reclaim, same-clock flow rank, low-toxicity extension fade, volume shock, or pure
  orderflow impulse reversal.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- timezone-aware NQ RTH OHLCV and aggregate signed-volume bars in America/New_York
- completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume, and large20_volume
lookahead_risks:
- Rolling mean/std envelope is computed from prior completed closes only and excludes the signal bar from the envelope
  statistics.
- Same-bar orderflow is used only after the signal bar has closed, so entry must occur no earlier than next-bar open.
- The signal-bar high/low stop uses an already-completed bar extreme, not future price action.
- No final session high/low, final VWAP, final volume profile, future orderflow, or future returns are used.
failure_modes:
- A close outside the rolling envelope may be informed continuation rather than temporary liquidity demand.
- Aggregate signed flow may not reliably separate liquidity demand from informed pressure.
- Stops just beyond the signal bar can be too tight during volatility expansion.
- The effect may be dominated by one side, one time of day, or high-volatility regimes.
- Short fixed-R reversion targets may not overcome NQ costs and one-tick slippage.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_chartfanatics_daily_bollinger_environment
  - nq_low_toxicity_orderflow_extension_fade
  - nq_vwap_pullback_continuation
  - nq_volume_shock_liquidity_reversal
  - nq_orderflow_impulse_reversal
  - nq_orderflow_absorption_exhaustion_reversal
  conclusion: >
    Eligible as a distinct NQ campaign. The trigger is an intraday rolling mean/std close envelope built from prior
    completed bars plus same-bar orderflow pressure, not prior daily Bollinger state, low-toxicity state, VWAP distance,
    high-volume shock, same-clock flow-rank impulse, or weak-displacement absorption.
