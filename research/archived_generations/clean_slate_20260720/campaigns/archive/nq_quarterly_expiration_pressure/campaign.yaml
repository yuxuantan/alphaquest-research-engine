  - es_quarterly_expiration_pressure
  conclusion: Eligible as a separate NQ campaign because no active NQ quarterly expiration-pressure campaign
    exists; ES quarterly expiration is prior cross-instrument evidence, not an NQ test. The edge is still
    rejected if NQ data quality or staged results fail.
