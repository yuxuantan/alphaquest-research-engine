campaign_id: nq_quarterly_expiration_pressure
title: NQ Quarterly Expiration Pressure
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Quarterly index futures/options expiration and CME equity-index roll dates may create intraday
  NQ price pressure or reversal effects from hedging, program trading, settlement, and roll activity.
rationale: This is a direct NQ transfer of the already-tested ES quarterly-expiration pressure family
  before any NQ PnL inspection. It is distinct from NQ monthly OPEX, VIX expiration, SPX 0DTE, pre-holiday,
  turn-of-month, and turn-of-year campaigns because the signal date is the deterministic quarterly equity-index
  expiration or CME equity-index roll date, not monthly equity-option OPEX outside quarterly months, VIX
  settlement, daily SPXW expiration, or generic calendar seasonality.
sources:
- title: Program trading and expiration day effects
  authors: Hans R. Stoll and Robert E. Whaley
  year: 1987
  venue: Financial Analysts Journal 43(2), 16-28
  relevance: Documents index futures/options expiration-day effects associated with program trading and
    settlement pressure.
- title: 'Program trading and individual stock returns: Ingredients of the triple-witching brew'
  authors: Hans R. Stoll and Robert E. Whaley
  year: 1990
  venue: Journal of Business 63, S165-S192
  relevance: Provides mechanism evidence that derivative expiration can affect stock and index returns
    through program-trading and expiration mechanics.
- title: Equity Index Roll Dates
  authors: CME Group
  year: 2026
  link: https://www.cmegroup.com/trading/equity-index/rolldates.html
  relevance: Defines the equity-index roll date as the Monday prior to the third Friday of the expiration
    month, a public ex-ante calendar input.
data_needs:
- NQ Sierra RTH 1-minute OHLCV cache in America/New_York
- deterministic third-Friday quarterly expiration calendar for March, June, September, and December
- same-session forced flatten and next-bar-open execution
data_quality_caveats:
- The edge is intrinsically sparse with roughly four quarterly event sets per year.
- The campaign does not observe actual option positioning, index basket imbalance, settlement imbalance,
  or roll volume.
- NQ may have weaker or different expiration pressure than ES because Nasdaq index composition and hedging
  flows differ.
lookahead_risks:
- Signal dates use only the predeclared third-Friday quarterly expiration rule and CME roll-date convention.
- Signals use the completed one-minute bar ending at the configured signal time and enter at the next
  bar open.
- No same-day high/low, final VWAP, settlement price, realized volume spike, or post-signal return is
  used to decide entry.
- Flatten and no-overnight checks are config-driven and remain before the prop-firm cutoff.
