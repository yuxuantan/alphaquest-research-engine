campaign_id: nq_preholiday_effect
variant_id: preholiday_momentum_confirmed_midday_long_1200
test_run_id: run1
strategy_name: preholiday_effect
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Fabozzi Ma and Briley (1994); Ariel (1990); Lakonishok and Smidt
    (1988)
  edge_thesis: NQ futures may earn abnormal positive intraday returns on regular trading
    sessions immediately preceding full NYSE holidays, reflecting documented pre-holiday
    return premia and holiday-adjacent risk-bearing effects.
  mechanic: At 12:00 ET on the last regular RTH session before a full NYSE holiday,
    enter long NQ only if the completed RTH return is at least the configured threshold;
    flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar signal timing and next-bar-open
    execution on sparse pre-holiday calendar sessions while avoiding overnight exposure.
  pre_pnl_port_note: Direct NQ port of the ES preholiday effect originals before any
    NQ PnL inspection. Holiday dates, setup modes, entry times, and declared parameter
    grids are unchanged.
  source_es_config_path: campaigns/es_preholiday_effect/variants/preholiday_momentum_confirmed_midday_long_1200/config.yaml
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the pre-holiday premium by trading
      only on deterministic full-NYSE-holiday pre-sessions from the predeclared calendar,
      not on generic weekday or month-end states.
    entry_logic_rationale: The entry module checks the configured completed 1-minute
      bar on the signal session date, and any momentum or range filter is computed
      only from RTH bars already completed by that signal time.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to NQ
      tick size, and does not use future high/low or holiday-period returns.
    target_exit_rationale: The fixed-R target is predeclared, and unresolved positions
      flatten at 15:55 ET on the same regular RTH session to avoid holiday or overnight
      exposure.
    profitability_rationale: The setup can pass only if the documented holiday-adjacent
      risk premium transfers to NQ intraday returns strongly enough to survive NQ
      costs, sparse-event robustness, and prop-rule gates.
    known_failure_modes: The anomaly may be close-to-close rather than intraday, may
      have decayed, may be too sparse for robust walk-forward validation, or may be
      erased by NQ costs and next-bar execution.
    pre_test_decision: approve_for_testing
