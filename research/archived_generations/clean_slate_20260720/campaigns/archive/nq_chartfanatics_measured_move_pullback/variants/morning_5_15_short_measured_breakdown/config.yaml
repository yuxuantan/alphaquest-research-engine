research_metadata:
  academic_source: Chart Fanatics Measured Move Trend Strategy; Lo, Mamaysky, and Wang (2000); Moskowitz, Ooi, and
    Pedersen (2012)
  edge_thesis: Bearish measured pullback structures may continue when price breaks the completed pullback low after
    a lower-high/lower-low sequence.
  mechanic: From 09:50 through 11:30 ET, enter short after completed NQ 5/15-minute pivot structure is bearish and
    a completed 5-minute bar breaks below the latest measured pullback trigger.
  timeframe_rationale: Five-minute bars preserve completed-bar execution while the configured pivot timeframes define
    objective pullback structures without discretionary trendline drawing.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: From 09:50 through 11:30 ET, enter short after completed NQ 5/15-minute pivot structure
      is bearish and a completed 5-minute bar breaks below the latest measured pullback trigger. The signal must
      break the completed pullback trigger and projects the measured structure distance as the target.
    entry_logic_rationale: All pivots require completed right-side confirmation bars. The breakout uses the current
      completed 5-minute close versus the completed pivot trigger and enters no earlier than the next bar open.
    stop_loss_rationale: The sweep-extreme stop anchors invalidation to the completed opposite side of the measured
      pullback plus a predeclared tick offset. No future swing or post-entry range is used.
    target_exit_rationale: The target module first uses the signal-emitted measured projection and falls back to
      a fixed-R target only if the measured target is not beyond entry or does not satisfy the 1R floor. Same-day
      flatten is fixed.
    profitability_rationale: The edge should work only if completed NQ pullback structures continue often enough
      that projected measured targets overcome commissions, one-tick slippage, and sweep-extreme risk.
    known_failure_modes: The discretionary Chart Fanatics structure may not survive objective pivots; pivots can
      lag; measured targets may be too far in chop or too close after breakout slippage; generic trend exposure
      may dominate.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/measured-move-trend-strategy
  rescue_status: none
  pre_pnl_density:
    status: FAIL
    artifact: research_artifacts/nq_chartfanatics_measured_move_pullback_density_audit_20260630.md
    summary_csv: research_artifacts/nq_chartfanatics_measured_move_pullback_density_summary_20260630.csv
    entry_combos: 9
