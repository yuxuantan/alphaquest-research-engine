campaign_id: nq_chartfanatics_measured_move_pullback
title: NQ Chart Fanatics measured-move pullback continuation
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: nq_chartfanatics_measured_move_pullback
hypothesis: NQ trend-pullback structures may continue by approximately the measured pullback distance after a completed
  breakout in the trend direction.
rationale: Chart Fanatics describes the Measured Move Trend Strategy as repeated pullback structures inside a trend,
  with the pullback distance projected forward. This campaign converts that idea into completed swing-pivot structures,
  breakout confirmation, sweep-extreme stops, and signal-price measured targets.
research_sources:
- title: Measured Move Trend Strategy
  author: Marci Silfrain / Chart Fanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/measured-move-trend-strategy
  expected_mechanism: Practitioner playbook states that trend pullback structures can be measured and projected
    for continuation targets.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  author: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  link_or_doi: https://doi.org/10.1111/0022-1082.00265
  expected_mechanism: Supports deterministic local-extrema pattern definitions; this campaign uses completed pivots
    rather than discretionary trendline drawings.
- title: Time Series Momentum
  author: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  link_or_doi: https://doi.org/10.1016/j.jfineco.2011.11.003
  expected_mechanism: Provides futures-market evidence for trend persistence, which is the economic rationale behind
    continuation after a measured pullback.
source_quality_note: The Little RZY/measured-move rule is practitioner-originated. Academic sources support only
  objective pattern extraction and futures trend persistence, so the campaign must fail closed if robustness is
  weak.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  checked_edges:
  - es_market_structure_pivot_trend_bias
  - es_pivot_filtered_vwap_pullback_continuation
  - nq_range_compression_breakout
  - nq_daily_time_series_momentum
  - nq_intraday_momentum_priority
  conclusion: Eligible as a distinct Chart Fanatics-derived NQ campaign because the entry requires a completed measured
    pullback trigger break and emits a projected measured target. It is not a plain fixed-time pivot-bias campaign,
    VWAP pullback, range compression breakout, or daily momentum state.
chart_fanatics_review:
  selected_after: 80/20 Nasdaq density failure
  selected_reason: Measured Move Trend Strategy was the next clean non-duplicate futures idea with objective OHLC
    implementation potential.
lookahead_risks:
- Pivots are usable only after right-side confirmation bars complete.
- The breakout signal uses only the completed 5-minute bar and enters no earlier than the next bar open.
- The measured target and sweep stop are computed from completed structure available at signal time.
- No final session high/low, final VWAP, future profile, or post-entry price path is used to define entry, stop,
  or target.
failure_modes:
- Discretionary trendlines may not translate to completed-pivot rules.
- Measured targets can be too close after slippage or too ambitious in choppy sessions.
- Completed pivots may lag and enter after continuation is exhausted.
- The signal can overlap with generic trend following and fail after costs.
