title: NQ MES-Crowding Trend-Pullback Reversion
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny
timeframe: 1m
hypothesis: MES smaller-contract participation may proxy broad equity-index micro crowding; when NQ completes
  a pullback against a prior completed NQ trend, elevated MES participation may mark crowded temporary
  pressure that mean-reverts on the NQ execution leg.
rationale: 'This is an NQ execution-leg port of the ES trend-filtered MES participation crowding family.
  It is tested after the lagged-volatility veto port failed, because this base family has distinct mechanics:
  no volatility gate, only completed NQ trend/pullback plus MES micro-participation ranks.'
sources:
- title: Resolving a Paradox - Retail Trades Positively Predict Returns but Are Not Profitable
  authors: Brad M. Barber, Ching-Chi Lin, and Terrance Odean
  year: 2024
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.cambridge.org/core/journals/journal-of-financial-and-quantitative-analysis/article/resolving-a-paradox-retail-trades-positively-predict-returns-but-are-not-profitable/6AAA9078F50C2597F44D73FA6A8E3F0D
  relevance: Motivates conditioning on retail-like or smaller-ticket participation intensity.
- title: Retail Traders in Futures Markets
  authors: CFTC Office of the Chief Economist
  year: 2024
  venue: CFTC staff research report
  link: https://www.cftc.gov/sites/default/files/2024-11/Retail_Traders_Futures_V2_new_ada.pdf
  relevance: Documents retail futures participation and Micro E-mini usage.
- title: Micro E-mini futures and options
  authors: CME Group
  year: 2026
  venue: CME product documentation
  link: https://www.cmegroup.com/markets/equities/micro-emini-equity.html
  relevance: Documents the Micro E-mini relationship used for notional-equivalent MES participation.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2011.11.003
  relevance: Motivates requiring the fade to align with a prior completed trend.
data_needs:
- data/cache/orderflow/nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny.csv
- completed NQ RTH 1-minute OHLCV/orderflow bars
- aligned MES completed-bar volume/trade counts used only as a cross-index micro-participation proxy
lookahead_risks:
- Entry uses completed one-minute bars and enters no earlier than the next bar open.
- MES ranks use only prior same-clock observations.
- The NQ trend window ends before the pullback/crowding lookback.
- No future NQ return, final session high/low, final VWAP, post-entry MES/NQ data, or post-entry orderflow
  is used.
failure_modes:
- MES may not proxy MNQ or NQ-specific micro crowding.
- The effect may be ES-specific and fail to transmit to NQ after costs.
- Removing the volatility veto may admit path-risk sessions that fail monkey or Monte Carlo.
- Later-day variants may have crowding that is informational rather than temporary.
