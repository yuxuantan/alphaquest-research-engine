campaign_id: nq_sector_rotation_orderflow_pullback
title: NQ Sector-Rotation Gated Orderflow Pullback
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: sector_rotation_orderflow_pullback
hypothesis: Lagged sector ETF leadership may define an NQ risk-appetite state; NQ VWAP/EMA pullback-continuation entries should
  only have value when the sector-implied direction and completed-bar NQ orderflow confirmation align.
rationale: This is an NQ port of the ES composite sector-rotation/orderflow-pullback edge. It is distinct from existing NQ
  sector-rotation risk-appetite because it does not enter from sector state alone, and distinct from NQ sector opening-breadth
  because it uses one-business-day-lag sector closes rather than same-day ETF opens. It is also distinct from pure NQ VWAP/orderflow
  pullback because the sector state gates the permitted direction.
sources:
- title: Do Industries Explain Momentum?
  authors: Tobias J. Moskowitz and Mark Grinblatt
  year: 1999
  venue: Journal of Finance
  doi: 10.1111/0022-1082.00146
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/0022-1082.00146
  relevance: Supports industry/sector leadership as a component of momentum and broad risk appetite.
- title: Momentum, Business Cycle, and Time-varying Expected Returns
  authors: Tarun Chordia and Lakshmanan Shivakumar
  year: 2002
  venue: Journal of Finance
  doi: 10.1111/1540-6261.00449
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/1540-6261.00449
  relevance: Motivates treating sector leadership as a time-varying expected-return state.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article/12/1/47/816163
  relevance: Supports contemporaneous orderflow imbalance as a short-horizon pressure proxy.
- title: The myth of business cycle sector rotation
  authors: Alexander Molchanov and Jeffrey Stangl
  year: 2024
  venue: International Journal of Finance and Economics
  doi: 10.1002/ijfe.2882
  link: https://onlinelibrary.wiley.com/doi/10.1002/ijfe.2882
  relevance: Cautionary source requiring strict fail-closed robustness for sector-rotation timing.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/nq_sector_rotation_features_20110103_20260612.csv
- NQ 5-minute completed-bar aggregation with intraday VWAP features
- same-day stop, target, forced-flatten, and no-overnight enforcement
lookahead_risks:
- Sector features for session D use only ETF observations on or before D minus one business day.
- NQ signal decisions are made on completed 5-minute bars and must enter at next bar open or later.
- No future NQ bar, future sector close, final session high/low/range, or final VWAP is allowed.
failure_modes:
- Sector leadership may be stale or already priced before NQ RTH.
- VWAP/EMA pullback continuation may be crowded and reverse after confirmation.
- Aggregate orderflow can confirm late after most of the move has already occurred.
- The ES source failed limited core, so NQ must fail closed unless stability is broad.
