research_metadata:
  academic_source: Cboe SPX Weeklys launch history; Brogaard, Han, and Won (SSRN 4426358);
    The Rise and Impacts of 0DTE Options (SSRN 4724972)
  edge_thesis: SPX same-day-expiring option activity may create tradable intraday
    ES pressure through dealer hedging, gamma feedback, pinning, and liquidity demand.
  mechanic: 'Rescue attempt 1: Tests stricter Tuesday/Thursday move-extension thresholds
    after the original broad fade failed; the two-sided new-expiry weekday fade mechanic
    is unchanged. Original mechanic retained: On Tuesday/Thursday SPXW expiration
    sessions added in 2022, fade the completed 10:30 ET open-to-signal move: long
    after a downside extension and short after an upside extension. This isolates
    the new-expiry weekdays from generic Monday/Friday calendar seasonality.'
  timeframe_rationale: 1-minute bars preserve completed-bar calendar signals and next-bar-open
    execution while enforcing same-day flattening.
