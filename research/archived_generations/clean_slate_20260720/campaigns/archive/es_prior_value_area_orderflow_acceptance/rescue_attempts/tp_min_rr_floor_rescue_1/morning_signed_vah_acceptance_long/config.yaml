research_metadata:
  academic_source: Osler (2000); Cont, Kukanov, and Stoikov (2014); CME Group market-profile/liquidity documentation
  edge_thesis: A completed morning close above the prior-session value-area high with aligned aggregate signed flow may mark upside acceptance and migration of value, not a random probe above yesterday accepted value.
  mechanic: From 09:35 through 11:30 ET, use prior-session approximate value-area levels only. Enter long after a completed 5-minute ES bar closes above prior VAH plus the configured buffer and the same completed bar has nonnegative-to-positive signed-volume imbalance above the configured threshold.
  timeframe_rationale: Five-minute bars reduce noisy one-minute boundary flicker while retaining next-bar execution close to the acceptance event.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge because the prior RTH session's approximate value area is frozen before the current session, then price must close beyond the relevant prior value boundary. The value-area boundary is the price-action level; the signed_volume condition is only the completed-bar participation confirmation.
    entry_logic_rationale: From 09:35 through 11:30 ET, use prior-session approximate value-area levels only. Enter long after a completed 5-minute ES bar closes above prior VAH plus the configured buffer and the same completed bar has nonnegative-to-positive signed-volume imbalance above the configured threshold. The signal is evaluated only after the 5-minute bar closes, and the engine enters at the next bar open, so the breakout close is not filled retroactively. The entry buffer grid tests modest acceptance without making the strict corner sparse.
    stop_loss_rationale: A percent-from-entry stop is predeclared and independent of future session levels. It invalidates the continuation thesis when price cannot remain outside prior accepted value after the next-bar entry.
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics are unchanged, while any existing target_r_multiple below 1.0R is raised to 1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: The variant should be profitable only if buyers accepting price above yesterday value continue to reprice ES after the next-bar entry, with orderflow confirmation reducing thin false breaks. The pre-PnL density audit cleared the strict parameter corner above 50 signals/year, so this is not relying on rare isolated events.
    known_failure_modes: The profile is only an OHLCV approximation, boundary breaks can be stop probes, orderflow can lag price, and continuation profits may be dominated by a small number of trend sessions or disappear under one-tick worse slippage.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_prior_value_area_orderflow_acceptance_density_audit_20260618.md
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_prior_value_area_orderflow_acceptance
    source_variant_id: morning_signed_vah_acceptance_long
    source_run_id: run1
    source_config_path: campaigns/es_prior_value_area_orderflow_acceptance/variants/morning_signed_vah_acceptance_long/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.5
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.5
      top_target_is_grid_max: true
      higher_target_net_slope: 2296.990740740741
      higher_target_pf_slope: 0.19854904188482236
      higher_target_profitable_rate_slope: 0.7407407407407407
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.5
      new: &id002
      - 1.0
      - 1.5
