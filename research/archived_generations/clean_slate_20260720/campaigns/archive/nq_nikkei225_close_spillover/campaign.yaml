  terminal_stage: limited_monkey_test
  valid_test_run_id: run2
  invalid_run_note: >
    Initial run1 halted before PnL because data.feature_set used a CSV path unsupported by the runner.
    Source configs were corrected to keep feature_set as none while preserving the same entry module,
    feature CSV, mechanics, and parameter grids; run2 is the valid staged evidence.
  runs:
    nikkei_1d_strength_long_1000: backtest-campaigns/nq_nikkei225_close_spillover/nikkei_1d_strength_long_1000/NQ/run2
    nikkei_1d_weakness_short_1000: backtest-campaigns/nq_nikkei225_close_spillover/nikkei_1d_weakness_short_1000/NQ/run2
    nikkei_5d_strength_long_1030: backtest-campaigns/nq_nikkei225_close_spillover/nikkei_5d_strength_long_1030/NQ/run2
    nikkei_5d_weakness_short_1030: backtest-campaigns/nq_nikkei225_close_spillover/nikkei_5d_weakness_short_1030/NQ/run2
    nikkei_1d_volatility_short_1130: backtest-campaigns/nq_nikkei225_close_spillover/nikkei_1d_volatility_short_1130/NQ/run2
  failure_reason: >
    Three variants failed limited_core_grid_test with profitable-iteration rates below the 0.70 stability
    threshold. Two five-day variants passed limited core, but both failed limited_monkey_test: the long
    variant had core-beats-monkey net-profit/max-drawdown rates of 0.81975/0.87175 and the short variant
    had 0.946125/0.88675, below the required 0.90 on at least one monkey criterion. No branch reached
    WFA, Monte Carlo, simulated incubation, acceptance OOS, or candidate reporting.
