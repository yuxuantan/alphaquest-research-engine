campaign_id: nq_infectious_disease_emv_state
title: NQ Infectious Disease EMV State
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: infectious_disease_emv_state
hypothesis: Strict-lag daily infectious-disease equity-market-volatility states may
  identify NQ risk-off pressure or post-shock risk-premium rebound behavior.
rationale: This campaign tests infectious-disease-specific equity-market volatility
  news intensity from the daily Baker-Bloom-Davis-Kost tracker, not the already tested
  broad EMV macro-news family, AI-GPR geopolitical risk, policy uncertainty, VIX/VVIX
  volatility state, or NQ own-price momentum.
research_sources:
- title: The Unprecedented Stock Market Reaction to COVID-19
  authors: Scott R. Baker, Nicholas Bloom, Steven J. Davis, Kyle Kost, Marco Sammon,
    and Tasaneeya Viratyosin
  year: 2020
  venue: NBER Working Paper 26945
  link_or_doi: https://www.nber.org/papers/w26945
  expected_mechanism: Documents disease-related equity-market volatility news as a
    distinct uncertainty channel during infectious-disease shocks.
- title: Daily Infectious Disease Equity Market Volatility Tracker
  authors: Economic Policy Uncertainty project / Baker, Bloom, Davis, Kost, Sammon,
    and Viratyosin
  year: 2026
  venue: policyuncertainty.com data page
  link_or_doi: https://www.policyuncertainty.com/infectious_EMV.html
  expected_mechanism: Provides a daily newspaper-count tracker of infectious-disease
    equity-market-volatility attention, available from 1985 to present.
- title: 'Infectious Disease EMV Tracker: Daily, 7-Day'
  authors: Federal Reserve Bank of St. Louis FRED
  year: 2026
  venue: FRED series INFECTDISEMVTRACKD
  link_or_doi: https://fred.stlouisfed.org/series/INFECTDISEMVTRACKD
  expected_mechanism: Publishes the daily infectious-disease EMV tracker used to build
    a strict-lag NQ session feature table.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York.
- Public FRED daily INFECTDISEMVTRACKD CSV cached under data/external/fred_infectious_disease_emv.
- Derived strict-lag feature CSV data/external/nq_infectious_disease_emv_features_20110103_20260612.csv.
duplicate_edge_check:
  checked_edges:
  - nq_emv_macro_news_intraday
  - nq_ai_gpr_geopolitical_risk_state
  - nq_epu_policy_uncertainty_intraday
  - nq_ofr_financial_stress_intraday
  - nq_cboe_vvix_tail_risk_intraday
  - nq_cboe_vix_level_state_intraday
  - nq_fama_french_style_factor_rotation
  caveat: The existing EMV campaign used broad monthly macro-news EMV categories.
    This campaign proceeds only because the daily source isolates infectious-disease
    equity-market-volatility attention and uses different feature construction and
    availability rules.
  conclusion: Eligible for an NQ source test as a distinct infectious-disease uncertainty
    edge with strict lag and explicit publication-cadence caveat.
lookahead_risks:
- A session dated D can only use the latest infectious-disease EMV daily observation
  on or before D minus 7 calendar days.
- Rolling ranks are computed in the infectious-disease EMV table before the session-level
  as-of join.
- Signals use a completed NQ RTH bar and enter no earlier than the next bar open.
- No same-day EMV row, final NQ session high/low, final VWAP, future EMV value, or
  post-entry path is used.
- Historical release cadence still requires manual review if any branch passes the
  staged tests.
failure_modes:
- Disease-related uncertainty may be absorbed before the NQ RTH session or may only
  matter across overnight/multi-day horizons.
- The 7-calendar-day lag may be conservative enough to stale the signal.
- Effects may concentrate in COVID-era crisis windows and fail breadth, monkey, WFA,
  or concentration gates.
- If the edge only survives a narrow threshold or one regime, it must be rejected.
feature_construction:
