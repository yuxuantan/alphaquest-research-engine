research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Llorente, Michaely, Saar,
    and Wang (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Afternoon downside ES capitulation bars with completed aggregate selling
    pressure may mean-revert before the same-day flatten.
  mechanic: Long-only 5-minute capitulation from 12:30 to 15:30 ET using close-near-low,
    below-VWAP, session-local RSI, elevated volume, and sell-imbalance filters.
  timeframe_rationale: The afternoon 5-minute window focuses on post-lunch liquidity
    shocks while maintaining enough pre-PnL density for staged testing.
  mechanics_review_required: true
  mechanics_review_version: 2026-06-18-rescue1
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge in the afternoon only.
      It requires a completed 5-minute downside bar with close-near-low location,
      below-VWAP price, session-local oversold RSI, high volume relative to earlier
      afternoon bars, and completed aggregate sell imbalance before a long reversal
      is allowed.

      '
    entry_logic_rationale: 'The 12:30-15:30 ET window is known before testing and
      all signal inputs are completed at the signal bar close. Next-bar execution
      prevents close-based lookahead.

      '
    stop_loss_rationale: 'The stop is below the capitulation bar low. If the afternoon
      low fails after entry, the exhaustion premise is invalidated and the strategy
      exits mechanically.

      '
    target_exit_rationale: 'The target is a fixed R multiple from the next-bar entry
      and predeclared stop, with no use of final session values or chart discretion.

      '
    profitability_rationale: 'Afternoon liquidity shocks can occur when participants
      rebalance or reduce risk before the close. If selling is temporary and pushes
      price below VWAP, a mechanical rebound can occur after immediacy demand is absorbed.
      Strict density was 106.15 signals/year full-history and 109.19/year in the limited-core
      window.

      '
    known_failure_modes: 'Afternoon sell pressure may be de-risking that persists
      into the close, and forced flatten can cut rebounds short.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: All original parameter combinations failed limited core; rescue keeps
    the same capitulation mechanic but tests stricter oversold/sell-imbalance entry
    thresholds, wider capitulation-low stop offsets, and smaller fixed-R rebound targets.
  rescue_constraints: No entry, stop, target, timeframe, data window, cost, fill,
    or stage-gate mechanics changed.
