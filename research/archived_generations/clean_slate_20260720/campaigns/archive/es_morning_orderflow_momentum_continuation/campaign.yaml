campaign_id: es_morning_orderflow_momentum_continuation
title: ES morning orderflow momentum continuation
decision: FAIL
created_at: '2026-06-19'
instrument: ES
market_timezone: America/New_York
edge_family: opening_window_price_action_confirmed_by_aggregate_orderflow_continuation
hypothesis: A completed opening-window ES price move has higher continuation odds when aggregate signed orderflow over the same completed window confirms aggressive participation in the move direction.
sources:
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  link: https://ideas.repec.org/a/eee/jfinec/v129y2018i2p394-414.html
  doi: 10.1016/j.jfineco.2018.05.009
  relevance: Documents that early intraday market information can forecast later same-day returns; this campaign tests immediate post-opening-window continuation rather than last-half-hour-only continuation.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  doi: 10.1093/jjfinec/nbt003
  relevance: Supports orderflow imbalance as a short-horizon price-pressure proxy; this implementation uses completed Sierra aggregate trade-side flow, not full-depth quote OFI.
- title: How Markets Slowly Digest Changes in Supply and Demand
  authors: Jean-Philippe Bouchaud, J. Doyne Farmer, Fabrizio Lillo
  year: 2009
  venue: Handbook of Financial Markets
  link: https://arxiv.org/abs/0809.0822
  relevance: Reviews persistent order flow and gradual supply-demand digestion, motivating continuation only when opening-window price action and aggregate flow agree.
rationale: This is a bounded price-action plus aggregate-orderflow campaign. The price-action component is the completed RTH opening-window return; the orderflow component requires completed aggregate signed flow over the same window to agree with that return. Entry is next bar open after the source window closes, with fixed intraday flattening and no overnight exposure.
data_needs:
- local Sierra ES RTH 1-minute aggregate orderflow parquet
- completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume, and large20_volume
- America/New_York timestamp handling and RTH session labels
lookahead_risks:
- Opening-window return and orderflow are complete at the signal timestamp before the engine can enter on the next bar open.
- No final session close, future VWAP, future high/low, final daily range, or post-entry orderflow is used.
- Same-bar stop/target conflicts use configured detail/pessimistic handling, and all variants flatten before the configured cutoff.
failure_modes:
- Sierra aggregate signed volume is a proxy and may not match true aggressor-side labels.
- Opening-window continuation may be too short-lived after next-bar execution, slippage, and commission.
- Large-trade filters may select exhausted participation rather than informed continuation.
- Any positive result may concentrate in high-volatility crisis windows or one market side.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_signed_orderflow_persistence
  - es_gao_last_half_hour_orderflow_confirmation
  - es_late_day_intraday_momentum
  - es_opening_range_orderflow_breakout
  - es_opening_drive_inventory_absorption
  - es_opening_gap_orderflow_continuation
  conclusion: Eligible as a narrowly defined active campaign because it trades immediate post-opening-window continuation only when the same completed opening window has aligned aggregate flow. It is not standalone rolling signed-flow persistence, not Gao last-half-hour prediction, not price-only late-day intraday momentum, and not a breakout through an opening-range level.
