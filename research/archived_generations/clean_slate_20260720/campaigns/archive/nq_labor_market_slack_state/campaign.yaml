campaign_id: nq_labor_market_slack_state
title: NQ Labor Market Slack State
status: failed
created_at: '2026-07-02'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Strictly lagged BLS/FRED labor-market slack and participation-repair state may proxy macro
  growth risk or risk appetite that affects same-day NQ RTH drift.
rationale: The campaign uses monthly UNRATE, U6RATE, EMRATIO, and CIVPART observations with a conservative
  45-calendar-day lag. It is distinct from weekly jobless-claims state, BLS release-day drift, CFNAI,
  industrial production, inflation/wage pressure, and payroll-growth event timing because it tests slow
  monthly labor-slack levels and participation repair as state variables, not weekly claims, release-day
  behavior, composite activity, production, wage inflation, or JOLTS/payroll event surprise.
sources:
- title: The Unemployment Rate and Alternative Measures of Labor Underutilization
  authors: U.S. Bureau of Labor Statistics via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/UNRATE
  relevance: Official reproducible source path for headline unemployment and U-6 underemployment state
    variables.
- title: Employment-Population Ratio and Labor Force Participation Rate
  authors: U.S. Bureau of Labor Statistics via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/EMRATIO
  relevance: Official source path for employment-population and participation state variables.
- title: Macroeconomic News and Bond Yields
  authors: John H. Boyd, Jian Hu, and Ravi Jagannathan
  year: 2005
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2004.07.006
  relevance: Supports the idea that labor-market news/state can affect equity-index pricing through growth
    and discount-rate channels, while this campaign uses lagged state rather than release surprises.
behavioural_or_microstructure_rationale: Elevated labor slack can mark recession/growth-risk pressure,
  while improving participation can mark labor-market repair. Nasdaq futures may respond to these macro
  states through growth expectations, discount-rate expectations, and risk appetite, but any usable edge
  must survive costs, neighboring thresholds, monkey robustness, WFA, Monte Carlo, prop-rule simulation,
  and acceptance OOS.
expected_failure_modes:
- Monthly labor state may be too stale or already incorporated before RTH.
- Slack variables may conflict with easier-policy expectations and produce unstable signs.
- Persistent labor regimes may reduce to broad market beta or recession-period concentration.
- JOLTS and payroll growth were not used because JOLTS was source-gated elsewhere and payroll-growth rank
  failed latest-window density.
data_needs:
- timezone-aware NQ RTH 1-minute bars in America/New_York
- FRED/BLS monthly UNRATE/U6RATE/EMRATIO/CIVPART data cached under data/external/fred_labor_market_slack_state
- 45-calendar-day as-of join from NQ sessions to monthly FRED observations
lookahead_risks:
- A session dated D may only use the latest monthly labor observation on or before D minus 45 calendar
  days.
- Rolling ranks are computed on completed monthly observations before the NQ as-of join.
- Signals use completed one-minute bars and enter next bar open or later.
- No future NQ bar, final session range, final VWAP, final volume profile, or post-entry market state
  is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_jobless_claims_state
  - nq_bls_macro_release_day_drift
  - nq_chicagofed_cfnai_activity_pullback
  - nq_industrial_production_state
  - nq_inflation_pressure_state
  - nq_productivity_unit_labor_cost_state
  - es_other_campaigns_source_gate
  conclusion: Eligible before PnL as a distinct lagged monthly labor-slack/participation state edge. It
    does not use weekly jobless claims, BLS release-day timing, CFNAI composite activity, JOLTS, payroll-growth
    momentum, or wage/inflation pressure.
