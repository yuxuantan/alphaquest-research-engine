rescue_attempts:
- id: parameter_space_rescue_1
  date: '2026-06-19'
  trigger: Original five variants failed pre-PnL density before any staged PnL was inspected.
  scope: per_failed_variant
  changes: Fixed-parameter and declared-parameter-space density rescue only. Entry module, stop module,
    target module, data, costs, sessions, fills, prop rules, and validation gates are unchanged. The rescue
    widens the fixed signal window, shortens the pre-sweep trend snapshot to one-versus-two completed
    5-minute bars, and keeps the same prior-day sweep-reclaim plus absorbed-flow plus pre-sweep trend
    mechanic.
  result: FAIL_LIMITED_CORE_GRID_TEST
  artifact: research_artifacts/es_trend_orderflow_prior_day_stop_reclaim_rescue_attempt_1_density_audit_20260619.md
  detail_csv: research_artifacts/es_trend_orderflow_prior_day_stop_reclaim_rescue_attempt_1_density_audit_20260619.csv
  summary_csv: research_artifacts/es_trend_orderflow_prior_day_stop_reclaim_rescue_attempt_1_density_summary_20260619.csv
  min_full_signals_per_year: 76.406982
  min_limited_core_signals_per_year: 61.741548
  density_audit_caveat: The standalone vectorized density audit overcounted relative to the actual entry
    module state machine. The staged runner's `signal_density` output is authoritative for final assessment.
  staged_signal_density: In rescue1 limited-core runs, max trades/year ranged from 49.787067 to 53.151059,
    median trades/year ranged from 35.171188 to 38.734815, and only 0 to 9 of 81 combinations met 50 trades/year.
  testing_decision: completed_staged_testing
  terminal_stage: limited_core_grid_test
  failure_reason: All five rescue variants failed the 70% profitable-combination gate before monkey or WFA.
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change the core prior-day sweep-reclaim plus pre-sweep trend and absorbed-flow mechanic
  - add or remove filters after seeing results
  - alter costs, fills, sessions, data windows, or validation gates
