timeframe: 5m
research_metadata:
  academic_source: Keim and Stambaugh (1986); Fama and French (1989); Cont, Kukanov,
    and Stoikov (2014); free Yahoo HYG/LQD chart data
  edge_thesis: one-day HYG strength captures immediate credit-risk appetite, with
    NQ price and signed flow required to confirm the long direction.
  mechanic: Trade NQ long when prior HYG one-day return rank is high and same-session
    NQ movement plus signed flow agree.
  timeframe_rationale: Five-minute bars provide completed NQ movement and aggregate
    signed-flow confirmation after the cash open without using intraday HYG/LQD data.
  pre_pnl_density: research_artifacts/nq_credit_etf_orderflow_risk_appetite_density_audit_20260622.md
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the credit ETF risk-appetite edge
      by using the declared lagged HYG return rank as the credit state and requiring
      completed NQ price movement plus signed aggregate orderflow before entry.
    entry_logic_rationale: The ETF state is frozen from the latest daily close strictly
      before the NQ session, while the intraday trigger uses only completed NQ 5-minute
      bars at 10:00, 10:30, 11:30, or 12:30 ET. This prevents same-day ETF lookahead
      and requires current NQ participation to agree with the lagged credit state.
    stop_loss_rationale: A fixed percent stop is used because the edge thesis is directional
      credit-risk transmission, not a future-derived level. The stop is declared before
      testing and keeps risk comparable across HYG rank thresholds.
    target_exit_rationale: A fixed-R target keeps payoff tied to initial stop distance,
      enforces the 1.0R minimum, and avoids optimizing exits from future intraday
      levels or post-entry orderflow.
    profitability_rationale: If high-yield credit appetite contains information about
      near-term NQ risk bearing, then NQ sessions where price and signed flow already
      confirm that state should have a better after-cost continuation distribution
      than unfiltered NQ movement.
    known_failure_modes: HYG may lag NQ rather than lead it, ETF moves can be rate-driven
      instead of equity-risk-driven, the confirmation bar may enter too late, and
      profitable days may concentrate in credit-stress regimes.
    pre_test_decision: approve_for_testing
  source_es_campaign: es_credit_etf_orderflow_risk_appetite
  source_es_parameter_space: campaigns/es_credit_etf_orderflow_risk_appetite/rescue_attempts/parameter_space_rescue_1/hyg_1d_strength_signed_long_1230/config.yaml
  nq_port_note: ES rescue parameter spaces were selected before this NQ test and are
    treated as the predeclared NQ baseline, not as a rescue after NQ results.
