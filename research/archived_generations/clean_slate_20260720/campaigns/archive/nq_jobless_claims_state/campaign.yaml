campaign_id: nq_jobless_claims_state
title: NQ Jobless Claims State
status: completed_failed
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Conservatively lagged weekly unemployment-insurance claims states may
  proxy labor-market stress or relief that affects same-day NQ intraday drift after
  the cash open.
rationale: This campaign tests a weekly labor-market state edge using FRED/DOL initial
  and continued unemployment-insurance claims observations at least 7 calendar days
  old. It is distinct from release-day drift and CFNAI because it uses stale weekly
  claims-state ranks rather than same-day scheduled event surprise or a broad composite
  activity index.
research_sources:
- title: Business Conditions and Expected Returns on Stocks and Bonds
  author: Eugene F. Fama and Kenneth R. French
  year: 1989
  link_or_doi: https://doi.org/10.1016/0304-405X(89)90095-0
  expected_mechanism: Business-cycle conditions motivate tests of labor-market stress
    or relief as a state variable for equity-index risk premia.
- title: Unemployment Insurance Weekly Claims Data
  author: U.S. Department of Labor, Employment and Training Administration
  year: 2026
  link_or_doi: https://oui.doleta.gov/unemploy/claims.asp
  expected_mechanism: DOL describes initial claims as emerging unemployment and continued
    weeks claimed as persons claiming unemployment benefits, giving a high-frequency
    labor-market state input.
- title: Initial Claims and Continued Claims series
  author: U.S. Employment and Training Administration via FRED, Federal Reserve Bank
    of St. Louis
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/ICSA
  expected_mechanism: Public weekly claims series provide the strictly lagged state
    features used for NQ session ranking.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fred_jobless_claims_state/fred_icsa_weekly.csv
- data/external/fred_jobless_claims_state/fred_ic4wsa_weekly.csv
- data/external/fred_jobless_claims_state/fred_ccsa_weekly.csv
- data/external/fred_jobless_claims_state/fred_cc4wsa_weekly.csv
- data/external/nq_jobless_claims_state_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_nq_jobless_claims_state_features.py
  output: data/external/nq_jobless_claims_state_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  availability_lag_days: 7
  lookahead_control: Each NQ session uses only the latest weekly ICSA/IC4WSA/CCSA/CC4WSA
    observation on or before session_date minus 7 calendar days.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-07-01'
  existing_nq_campaign_id: none
  not_duplicate_of:
  - nq_bls_macro_release_day_drift
  - nq_chicagofed_cfnai_activity_pullback
  - nq_industrial_production_state
  - nq_manufacturing_orders_state
  - nq_retail_inventory_demand
  - nq_consumer_sentiment_state_intraday
  - nq_emv_macro_news_intraday
  - nq_epu_policy_uncertainty_intraday
  - nq_orderflow_absorption_exhaustion_reversal
  conclusion: Eligible as a bounded weekly jobless-claims state edge; it does not
    reuse same-day macro-release drift, CFNAI composite activity, monthly industrial/manufacturing/retail
    state, sentiment, uncertainty, or intraday orderflow mechanics.
