campaign_id: nq_copper_growth_risk_sentiment
title: NQ Copper Growth/Risk Sentiment
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: copper_industrial_growth_risk_sentiment
hypothesis: Lagged copper futures returns and copper/gold relative strength may proxy
  industrial-growth expectations or risk appetite that spills into same-day NQ intraday
  drift.
rationale: This campaign tests an industrial-metals/growth-information channel,
  distinct from the already rejected crypto, small-cap rotation, international equity
  close spillovers, dollar/JPY/oil shock, gold/platinum tail-risk, VIX/VVIX/variance,
  ES/NQ relative-value, sector, and NQ own-momentum families.
research_sources:
- title: The Informational Role of Commodity Futures Prices
  authors: Conghui Hu and Wei Xiong
  year: 2013
  venue: EIA-hosted research presentation / academic paper
  link_or_doi: https://www.eia.gov/finance/markets/reports_presentations/WXInformationCommodity.pdf
  expected_mechanism: Finds significant information flow from lagged U.S. copper
    futures returns to East Asian stock markets after the mid-2000s, even after
    controlling for lagged S&P 500 futures returns.
- title: Copper-to-gold ratio as a leading indicator for the 10-Year Treasury yield
  authors: Dror Parnes
  year: 2024
  venue: The North American Journal of Economics and Finance
  link_or_doi: https://ideas.repec.org/a/eee/ecofin/v69y2024ipas1062940823001390.html
  expected_mechanism: Documents that the copper/gold ratio can embed short-term
    information about U.S. Treasury yields, supporting its use as a growth/risk
    state variable while warning about false signals.
- title: Copper as an Economic Indicator
  authors: CME Group OpenMarkets
  year: 2022
  venue: CME Group OpenMarkets
  link_or_doi: https://www.cmegroup.com/openmarkets/metals/2022/Copper-as-an-Economic-Indicator.html
  expected_mechanism: Exchange research describes copper as an economic-health
    indicator because of broad industrial use, while explicitly warning that the
    copper-to-stock-market linkage is unstable.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York
- Yahoo daily adjusted close and volume history for HG=F and GC=F cached under data/external/yahoo_copper_gold_futures
- Derived lagged feature CSV data/external/nq_copper_growth_risk_sentiment_features_20110103_20260612.csv
duplicate_edge_check:
  checked_edges:
  - nq_btc_crypto_risk_sentiment
  - nq_small_cap_relative_rotation
  - nq_europe_equity_close_spillover
  - nq_nikkei225_close_spillover
  - nq_dollar_risk_appetite_intraday
  - nq_usdjpy_safe_haven_spillover
  - nq_oil_price_shock_spillover
  - nq_gold_platinum_tailrisk_state
  - nq_cboe_vix_level_state_intraday
  - nq_vvix_tail_risk_intraday
  - nq_variance_risk_premium_intraday
  - nq_es_relative_value_orderflow_absorption_reversion
  - nq_daily_time_series_momentum
  conclusion: Eligible as a distinct NQ test because no local ledger/source campaign
    uses copper futures returns or copper/gold relative strength as the edge input;
    this is an industrial-growth/risk-information state, not crypto, equity-sector
    rotation, international cash equity close, FX/oil shock, precious-metals tail
    risk, volatility-index state, ES/NQ spread, or NQ-only momentum.
chartfanatics_gate:
  refreshed_after_current_campaign: true
  decision: NEEDS MANUAL REVIEW
  artifact: research_artifacts/chartfanatics_post_btc_strategy_gate_20260701.md
  conclusion: No fresh ChartFanatics ES/NQ campaign was eligible without duplicating
    an already failed edge or requiring unavailable intraday VIX/depth/DOM/overnight
    swing data; this copper campaign is therefore sourced outside ChartFanatics.
lookahead_risks:
- A session dated D can only use HG=F and GC=F observations on or before D minus
  one calendar day.
- Rolling ranks are computed before the session-level as-of join.
- Signals use a completed NQ bar and enter no earlier than the next bar open.
- No same-day commodity close, final NQ session high/low, final VWAP, future commodity
  return, or post-entry path is used.
failure_modes:
- Copper may be coincident with global risk appetite rather than leading NQ.
- Copper/gold may proxy rates or dollar regimes already tested in other campaigns.
- The copper-to-equity relationship is explicitly unstable in the CME source and
  should fail if it survives only a narrow regime or parameter island.
- Yahoo futures continuous adjusted daily data requires vendor and roll convention
  review before any promotion beyond candidate review.
