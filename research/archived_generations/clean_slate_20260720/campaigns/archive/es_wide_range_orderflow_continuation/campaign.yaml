  - es_vwap_orderflow_pullback_continuation
  - es_gao_last_half_hour_orderflow_confirmation
  - es_opening_range_trend_orderflow_breakout
  - es_session_extreme_delta_divergence
  conclusion: 'Eligible as a distinct active campaign. The mechanic is completed-bar
    range expansion with close-location and same-bar aggregate-flow confirmation.
    Existing active failures tested standalone flow persistence, high-volume shock
    reversal, HH/HL trend-flow continuation at fixed times, VWAP reclaim, first-window
    to last-half-hour momentum, opening-range breakouts, or fresh session extremes.

    '
