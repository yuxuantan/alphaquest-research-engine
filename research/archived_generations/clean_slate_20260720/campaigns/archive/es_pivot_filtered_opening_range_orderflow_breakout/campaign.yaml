campaign_id: es_pivot_filtered_opening_range_orderflow_breakout
title: ES opening-range orderflow breakout filtered by completed pivot market structure
decision: FAIL
created_at: '2026-06-20'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Opening-range breakouts with aligned completed-bar aggregate orderflow should be more robust when the breakout
  direction also agrees with the latest confirmed multi-timeframe swing-pivot market structure.
rationale: This is a bounded composite campaign. The primary edge remains opening-range breakout with aggregate orderflow
  confirmation; the fixed secondary condition is completed swing-pivot trend direction. The pivot filter cannot create trades,
  does not add tunables, and only rejects base breakout signals that lack same-direction confirmed structure or have an opposing
  checked timeframe.
sources:
- title: Opening Range Breakout Strategy as Applied to Index Futures and Crude Oil Futures
  authors: Ulf Holmberg, Christian Lonnback, and Carl Lundstrom
  year: 2013
  venue: Finance Research Letters
  link: https://doi.org/10.1016/j.frl.2013.03.001
  relevance: Motivates opening-range breakouts in index futures as a testable intraday price-action edge.
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, and Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2018.05.009
  relevance: Supports the broader idea that intraday market information can continue inside the same session.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://doi.org/10.1093/jjfinec/nbt003
  relevance: Motivates order-flow imbalance as a short-horizon pressure proxy; this campaign uses completed-bar Sierra aggregate
    signed-volume proxies, not quote-level OFI.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: Supports deterministic local-extrema pattern definitions; this campaign uses confirmed swing pivots only.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Provides futures-market support for trend persistence; here it only motivates aligning breakouts with completed
    intraday structure.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline
- opening range computed only after the declared opening window is complete
- completed 5/15/30-minute pivot-state construction from local ES OHLC bars
- 1-minute detail data for stop/target conflict handling
lookahead_risks:
- Opening range is frozen only after the configured range window has completed.
- Orderflow confirmation uses only the completed breakout bar.
- Pivot structure confirms swing highs/lows only after right-side confirmation bars are complete.
- Signals generated from completed bars are filled no earlier than the next bar open by the engine.
- No final session high/low, final VWAP, final volume profile, future orderflow, or post-entry pivots are used.
failure_modes:
- The pivot filter may select late breakouts after the move is already exhausted.
- Opening-range breakouts can be liquidity sweeps that reverse after costs.
- Aggregate signed flow can mark exhaustion rather than informed participation.
- Strict structure filtering can reduce trade count below 50 per year in WFA or incubation.
- The stop geometry can remain too wide for average post-breakout continuation.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_opening_range_orderflow_breakout
  - es_market_structure_pivot_trend_bias
  - es_trend_aligned_orderflow_continuation
  - es_pivot_filtered_vwap_pullback_continuation
  - es_pivot_filtered_prior_value_area_acceptance
  - es_pivot_filtered_mes_participation_crowding_reversion
  conclusion: Eligible as a bounded composite campaign because the base ORB campaign did not require completed pivot direction
    and the standalone pivot campaign did not require opening-range breakout/orderflow confirmation.
mechanics_gate:
  pre_test_decision: approve_for_testing
  reason: 'The mechanic is coherent before PnL: opening range defines the level, completed-bar orderflow confirms participation,
    and confirmed pivot structure acts only as a fixed direction filter. This should be profitable only if breakouts aligned
    with existing confirmed structure continue enough to overcome ES costs.'
