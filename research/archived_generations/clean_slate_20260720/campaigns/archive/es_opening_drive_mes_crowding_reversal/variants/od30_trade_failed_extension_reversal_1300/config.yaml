research_metadata:
  academic_source: Holmberg, Lonnback, and Lundstrom (2013); Gao, Han, Li, and Zhou (2018); Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024)
  edge_thesis: Opening-drive failed continuation beyond a frozen early extreme may reverse when MES participation is elevated, indicating smaller-contract crowding into the failed extension.
  mechanic: 30-minute opening drive, MES trade-count participation crowding, failed extension monitored through 13:00 ET.
  timeframe_rationale: 1-minute bars preserve completed opening-drive boundaries, exact failed-extension timing, MES participation ranks, and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by freezing the first 30 minutes of RTH as the opening-drive reference, then waiting for a completed bar to extend beyond the drive extreme and close back inside that same extreme. The entry fades only the failed continuation in the direction of the opening drive, while MES trade-count share rank supplies the crowding evidence on the completed failure bar.
    entry_logic_rationale: Opening-drive high, low, open, close, and direction are unavailable until 10:00:00 ET. After that, each completed 1-minute bar through 13:00:00 ET can signal at most once per day if it breaks the frozen drive extreme by the fixed extension amount, closes back inside it, and has prior-same-clock MES participation rank above the predeclared threshold. Entry is next-bar open, so the signal never enters on the same close it used.
    stop_loss_rationale: The stop is anchored to the failed-extension bar high for shorts or low for longs, plus a tunable tick offset. That directly invalidates the failed-extension thesis if price resumes through the exhaustion extreme. Same-bar stop/target conflicts remain pessimistic under the engine.
    target_exit_rationale: The fixed-R target tests whether the reversal away from the failed opening-drive extension monetizes before the forced flatten at 14:00:00 ET. There is no discretionary exit, overnight hold, or post-entry MES/orderflow condition.
    profitability_rationale: If the first 30 minutes create a directional reference watched by intraday traders, then a later failed push beyond that reference can trap late continuation traders. High MES trade-count share during the failed push is a plausible crowding proxy; fading that failure should have positive expectancy only if trapped pressure unwinds far enough to cover ES costs and sweep-extreme risk.
    known_failure_modes: MES participation may not indicate uninformed crowding, the failed extension can be a healthy continuation pause, stops can be wide on volatile opens, and the effect can concentrate in a few crisis sessions or disappear under slippage/delay monkey tests.
    pre_test_decision: approve_for_testing
