research_metadata:
  academic_source: Brock, Lakonishok, and LeBaron (1992); Moskowitz, Ooi, and Pedersen
    (2012); Cont, Kukanov, and Stoikov (2014); Ready (2002)
  edge_thesis: A same-session ES trend defined by completed intraday EMAs can resume
    after a controlled pullback to the prior fast EMA when the completed signal bar
    reclaims/rejects that EMA and completed aggregate orderflow confirms the trend
    direction.
  mechanic: short-only late-morning EMA pullback continuation using signed-volume
    sell pressure between 10:30:00 and 12:00:00 ET; enter at the next 5-minute bar
    open after the completed pullback/reclaim bar.
  timeframe_rationale: The short-only variant isolates downside continuation after
    a completed pullback to the fast EMA during the high-liquidity first half of RTH.
    Five-minute bars keep the dynamic EMA level responsive while avoiding one-minute
    noise.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge as short-only late-morning
      EMA pullback continuation using signed-volume sell pressure. The prior fast
      EMA acts as the dynamic pullback level, the prior fast/slow EMA gap defines
      same-session trend direction, and the completed signal bar must close back in
      the trend direction before a next-bar entry is allowed.
    entry_logic_rationale: The entry is not an EMA crossover and not flow alone. It
      requires a prior completed EMA trend, a completed bar that tags the prior fast
      EMA within a fixed tolerance, a close back on the trend side with matching candle
      body direction, and broad signed volume confirmation. This makes the setup a
      price-action pullback continuation rather than a post-hoc trend label.
    stop_loss_rationale: The signal-bar high for shorts or low for longs is the natural
      invalidation point because a move beyond the completed pullback/reclaim bar
      means the fast-EMA continuation attempt failed. The stop-offset grid is small
      and tick-based.
    target_exit_rationale: The target is a modest fixed-R continuation target because
      the hypothesis is short-horizon trend resumption after a pullback. It does not
      use future VWAP, final range, final profile, or post-entry information.
    profitability_rationale: If intraday trend-following pressure persists after temporary
      liquidity-taking into the fast EMA, and completed aggregate orderflow confirms
      renewed participation in the trend direction, the next-bar entry should capture
      enough continuation to overcome ES costs and pessimistic same-bar stop/target
      ordering across many sessions. The rescue narrows this to cleaner pullbacks
      in stronger same-session trends because the original grid had sufficient trade
      density but broad negative expectancy, especially in weaker trend-gap settings.
    known_failure_modes: The EMA pullback may be visually intuitive but not predictive;
      aggregate flow may confirm too late; the fast EMA may be a weak support/resistance
      proxy; side-specific behavior may dominate; open-position and one-trade-per-day
      limits may reduce tradable density.
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameters and declared grid values inside existing
    modules: cleaner prior EMA trend-gap grid, narrower fixed pullback tolerance,
    and wider stop/target grids while preserving density-valid orderflow thresholds.
    Entry module, stop module, target module, timeframe, data window, costs, fills,
    sessions, and validation gates are unchanged.'
