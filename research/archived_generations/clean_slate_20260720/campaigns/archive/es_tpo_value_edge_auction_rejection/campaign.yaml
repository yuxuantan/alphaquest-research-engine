campaign_id: es_tpo_value_edge_auction_rejection
title: ES Completed-Bar TPO Value-Edge Auction Rejection
created_at: '2026-07-14'
status: completed_failed
decision: FAIL
instrument: ES
market_timezone: America/New_York
edge_family: completed_bar_tpo_value_edge_auction_rejection
hypothesis: A balanced developing ES auction that rejects a TPO value-area edge near its corresponding opening-range extreme
  may rotate toward the opposite developing value-area edge before 11:00 ET.
rationale: This price-only proxy preserves the original range strategy's balanced-auction, value-edge AOI, failed-auction
  rejection, opposite-edge target, midpoint stop adjustment, and morning flatten concepts while removing all features that
  require reliable trade events, aggressor side, delta, volume profile, or sub-second sequencing.
sources:
- title: Markets and Market Logic
  authors: J. Peter Steidlmayer and Kevin Koy
  year: 1986
  link: https://archive.org/details/marketsmarketlog00stei
  relevance: Practitioner foundation for time-price opportunity profiles, value areas, and auction rotations.
- title: Trading and Exchanges - Market Microstructure for Practitioners
  authors: Larry Harris
  year: 2003
  link: https://global.oup.com/academic/product/trading-and-exchanges-9780195144703
  relevance: Microstructure basis for liquidity, failed price discovery, and reversal around public reference levels.
data_needs:
- data/cache/price_only/es_sierra_price_only_tpo_1m_20110815_20260609_0930_1100_ny.parquet
- completed one-minute ES OHLC bars from 09:30 through 10:59 ET
- internally screened regular-session capability allowlist
data_capability:
  lane: completed_bar_price_only
  sessions: 3580
  allowed: [completed one-minute OHLC, TPO/time-at-price, opening range]
  prohibited: [volume profile, delta, aggressor side, event size/count, 100ms sequencing]
  independent_event_verification_required: false
  limitations:
  - Older sessions are internally screened rather than independently event-verified.
  - Historical high-impact USD news timestamps are unavailable, so the T-5m through T news block cannot be tested.
lookahead_risks:
- The developing TPO profile and AOI used for a rejection bar exclude that rejection bar.
- Signals use completed bars and enter at the next one-minute bar open.
- The opposite-edge target is frozen at signal time and never repriced from future profile changes; the engine's predeclared
  one-R floor applies when the structural edge is closer than initial risk.
- The variable-range comparison uses only the first two-thirds of already elapsed RTH bars.
- No final-session high, low, POC, VAH, VAL, volume, or future bar is used.
failure_modes:
- TPO reconstructed from OHLC ranges assumes every tick between a bar's high and low was visited at least once.
- Opening-range confluence may make the AOI too sparse to reach the required three trades per week.
- One-minute OHLC cannot establish stop/target order within an ambiguous bar; the engine uses pessimistic stop-first ordering.
- The proxy may remove the order-flow information that supplied the original strategy's edge.
- Missing historical news timestamps can contaminate results near high-impact USD releases.
duplicate_edge_check:
  compared_campaign: es_video_aoi_lvn_orderflow_playbook
  conclusion: Separate proxy family. It tests completed-bar TPO auction rejection and expressly does not claim to be an exact
    implementation of the event-sensitive order-flow strategy.
