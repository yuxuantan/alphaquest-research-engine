campaign_id: es_nq_nonconfirming_vap_aoi_trap
title: ES NQ-Nonconfirming VAP AOI Trap Reversion
decision: FAIL
created_at: '2026-06-22'
instrument: ES
timeframe: 1m
edge_family: cross_index_nonconfirmation_vap_aoi_trap_reversion
hypothesis: When ES probes a market-generated AOI on the side of prior true VAP context but NQ does not confirm the ES extension, a completed reclaim/reject bar with adverse ES signed delta may identify trapped initiative flow and short-horizon reversion after next-bar entry.
variant_expansion_rationale: 'Eight variants are justified before PnL because the direct AOI/profile families already tested in this repository were weak, and this composite edge has several materially distinct mechanics worth testing in one controlled campaign: all-market AOIs, prior/opening-only AOIs, near-value versus beyond-POC VAP context, a deeper fixed probe, 15/30/60 minute ES/NQ non-confirmation windows, opening-range-only AOIs, and overnight-only AOIs. These are not extra parameter searches; all variants share the same two-entry-parameter grid and differ only by predeclared fixed market structure mechanics.'
