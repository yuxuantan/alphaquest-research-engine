data_needs:
- Derived local cache joining ES true VAP/overnight/footprint fields with completed ES/NQ lead-lag fields by timestamp.
- Prior VAP POC/VAH/VAL/LVN fields frozen from completed prior RTH sessions.
- Prior RTH high/low computed by the pdh_pdl_sweep feature set from completed sessions only.
- Opening range high/low available only after the first 30 completed RTH minutes.
- Completed-bar ES signed volume and completed rolling ES/NQ return divergence fields.
data_quality_caveats:
- The derived cache drops 3900 unmatched ES minutes where NQ lead-lag rows were absent; this is recorded in the validation sidecar.
- Sierra signed-volume and footprint fields are completed-bar research proxies, not exchange print sequencing or quote-depth data.
- Dense variants use VAP context such as beyond prior POC or near side of value, not exact VAP-node price confluence on every signal.
- Any passing result would remain a candidate strategy requiring manual chart review and independent data-source review.
lookahead_risks:
- Prior VAP and prior RTH levels are shifted from completed sessions before current-session use.
- Opening-range levels are unavailable until the opening range has fully closed.
- ES/NQ divergence and ES signed delta use completed bars only; entry is no earlier than the next one-minute open.
- No current-session final profile, final VWAP, future high/low, or post-entry orderflow is used.
