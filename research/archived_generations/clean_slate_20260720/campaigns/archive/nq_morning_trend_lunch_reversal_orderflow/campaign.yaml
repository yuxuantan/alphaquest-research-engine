campaign_id: nq_morning_trend_lunch_reversal_orderflow
title: NQ Morning Trend Lunch Reversal With Aggregate Orderflow
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: Strong NQ morning directional pressure can partially reverse into late
  morning or lunch when the completed signal bar turns against the morning move and
  completed aggregate orderflow confirms counter-direction pressure.
rationale: This is a direct NQ transfer of the ES morning trend lunch reversal family
  before any NQ PnL inspection. It is distinct from NQ morning orderflow momentum
  continuation, midday range breakout, VWAP pullback, session-extreme delta divergence,
  and intraday capitulation mean reversion because it requires a same-session morning
  extension from the RTH open, an opposite-colored completed reversal bar, and completed
  counterflow during late morning/lunch.
sources:
- title: 'A Theory of Intraday Patterns: Volume and Price Variability'
  authors: Anat R. Admati and Paul Pfleiderer
  year: 1988
  venue: Review of Financial Studies
  doi: 10.1093/rfs/1.1.3
  link: https://academic.oup.com/rfs/article-abstract/1/1/3/1601212
  relevance: Models intraday liquidity and information concentration, supporting time-of-day
    segmentation around late morning and lunch.
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, and Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Motivates reversal after liquidity-driven trading pressure and inventory
    risk.
- title: Intraday Patterns in the Cross-section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2010.01573.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2010.01573.x
  relevance: Documents systematic intraday predictability and short-term reversal
    linked to temporary liquidity imbalances.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports orderflow imbalance as a short-horizon pressure proxy; this
    implementation uses completed Sierra aggregate trade-side flow.
data_needs:
- NQ Sierra completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline
- completed signed, large-10, and large-20 aggregate flow columns
- same-session flatten rules from config
lookahead_risks:
- The session-open reference is known from the first completed RTH bar only.
- Morning extension, signal-bar body, and orderflow confirmation use only the completed
  signal bar.
- Signals using bar close are filled no earlier than the next bar open by the engine.
- No final session high/low, final VWAP, future range, future orderflow, or post-entry
  bar is used.
duplicate_edge_check:
  active_scope_only: true
  active_rejected_edges_checked:
  - nq_morning_orderflow_momentum_continuation
  - nq_midday_range_orderflow_breakout
  - nq_vwap_pullback_continuation
  - nq_session_extreme_delta_divergence
  - nq_intraday_capitulation_mean_reversion
  - nq_variance_ratio_orderflow_regime
  conclusion: Eligible as a separate NQ edge because it tests countertrend late-morning/lunch
    reversal after same-session morning extension and completed counterflow, not morning
    continuation, a frozen midday range breakout, VWAP pullback continuation, session-extreme
    delta divergence, capitulation flush/reclaim, or variance-ratio continuation.
