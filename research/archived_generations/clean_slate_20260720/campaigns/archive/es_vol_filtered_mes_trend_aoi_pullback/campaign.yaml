campaign_id: es_vol_filtered_mes_trend_aoi_pullback
title: ES Vol-Filtered MES Trend AOI Pullback
decision: FAIL
created_at: '2026-06-22'
instrument: ES
timeframe: 1m
edge_family: volatility_gated_trend_aligned_mes_crowding_pullbacks_at_market_generated_and_true_vap_aois
hypothesis: High MES smaller-contract participation during a countertrend ES pullback into a predefined market-generated or
  true volume-profile AOI may mark crowded weak-hand pressure; excluding extreme prior-session volatility/path-risk states
  may reduce continuation failure and prop-rule path risk.
variant_count_decision: Eight variants selected after the user-approved cap increase because the pre-PnL density audit showed
  enough signal availability across distinct AOI mechanics.
variant_expansion_rationale: 'Variants 6-8 are not parameter clones: they isolate value-area, prior-RTH-extreme, and LVN mechanics
  that target different auction reference prices from the all-AOI, market-AOI, opening-range, overnight, and profile-absorption
  variants. They were added only after a pre-PnL density audit showed usable signal counts and before any backtest result
  was inspected.'
