campaign_id: es_high_semivariance_mes_trend_pullback_crowding
title: High-Semivariance MES Crowding Trend-Pullback Reversion
decision: FAIL
created_at: '2026-06-20'
instrument: ES
market_timezone: America/New_York
edge_family: mes_participation_crowding_trend_pullback_high_downside_semivariance
hypothesis: Elevated MES smaller-contract participation during an ES pullback should be more payoff-relevant when the prior
  completed session had high downside semivariance, because crowded/inexperienced flow can be forced to unwind in larger high-risk
  ranges. Trades must still rejoin a completed ES trend window rather than fade trend direction blindly.
rationale: This is a bounded composite campaign. MES participation supplies the crowding proxy, completed ES price action
  supplies the prior-trend/pullback structure, and lagged prior-session downside semivariance requires the session to be in
  an upper-half downside-risk regime before any intraday signal can trigger.
sources:
- title: Resolving a Paradox - Retail Trades Positively Predict Returns but Are Not Profitable
  authors: Brad M. Barber, Ching-Chi Lin, and Terrance Odean
  year: 2024
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.cambridge.org/core/journals/journal-of-financial-and-quantitative-analysis/article/resolving-a-paradox-retail-trades-positively-predict-returns-but-are-not-profitable/6AAA9078F50C2597F44D73FA6A8E3F0D
  relevance: Motivates conditioning on retail-like/smaller-ticket participation intensity rather than treating all volume
    as equally informed.
- title: Retail Traders in Futures Markets
  authors: CFTC Office of the Chief Economist
  year: 2024
  venue: CFTC staff research report
  link: https://www.cftc.gov/sites/default/files/2024-11/Retail_Traders_Futures_V2_new_ada.pdf
  relevance: Documents retail futures participation and Micro E-mini usage, supporting MES participation as a smaller-contract
    proxy.
- title: Micro E-mini futures and options
  authors: CME Group
  year: 2026
  venue: CME product documentation
  link: https://www.cmegroup.com/markets/equities/micro-emini-equity.html
  relevance: Documents the 1:10 Micro E-mini to classic E-mini relationship used for notional-equivalent MES participation.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2011.11.003
  relevance: Motivates requiring the pullback fade to rejoin a completed ES trend rather than fight it.
- title: 'Measuring Downside Risk: Realised Semivariance'
  authors: Ole E. Barndorff-Nielsen, Silja Kinnebrock, and Neil Shephard
  year: 2010
  venue: Volatility and Time Series Econometrics
  link: https://doi.org/10.1093/acprof:oso/9780199549498.003.0007
  relevance: Defines lagged downside semivariance as a completed-return risk-state feature.
- title: 'Good Volatility, Bad Volatility: Signed Jumps and the Persistence of Volatility'
  authors: Andrew J. Patton and Kevin Sheppard
  year: 2015
  venue: Review of Economics and Statistics
  link: https://doi.org/10.1162/REST_a_00503
  relevance: Supports treating downside variation as a distinct regime where payoffs and risk can differ from ordinary sessions.
data_needs:
- data/cache/orderflow/es_mes_participation_crowding_1m_20190506_20260609_full_rth_ny.csv
- data/external/es_realized_semivariance_features_20110103_20260609.csv
- completed ES/MES RTH 1-minute bars and same-clock MES participation ranks
- lagged prior-session downside-semivariance ranks available before the current RTH session
lookahead_risks:
- Entry uses completed 1-minute bars only and enters no earlier than the next bar open.
- MES participation ranks are same-clock historical ranks already present in the local cache.
- The ES trend window ends before the pullback/crowding lookback, so the trend filter does not see the pullback or future
  bars.
- The semivariance feature is a prior-session lagged value and cannot use current-session returns.
- No future ES return, final daily high/low, final VWAP, post-entry MES/ES data, or post-entry orderflow is used.
failure_modes:
- MES participation may not isolate retail or less-informed crowding.
- High downside semivariance may indicate information-driven trend continuation rather than temporary pullback pressure.
- The windowed first-signal design can increase trade count but may include weaker signals than fixed-time entries.
- High-volatility payoffs may also produce larger drawdowns and fail monkey or Monte Carlo prop-rule stress.
- Profits can concentrate in a small number of high-volatility sessions.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_mes_participation_crowding_reversion
  - es_trend_filtered_mes_participation_crowding
  - es_pivot_filtered_mes_participation_crowding_reversion
  - es_realized_semivariance_asymmetry
  - es_semivariance_orderflow_confirmation
  conclusion: Eligible as a new bounded composite. Previous MES crowding campaigns could trade any prior-semivariance regime;
    previous semivariance campaigns did not require MES crowding during a completed ES trend pullback. A trade here requires
    all three conditions.
