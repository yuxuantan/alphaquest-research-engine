research_metadata:
  academic_source: Crabel (1990) narrow-range and opening-range breakouts plus Raschke and Connors (1995)
    short-term price patterns.
  edge_thesis: After a completed prior-session compression setup, trade NQ breakouts of the opening_range
    reference from 10:15:00 to 10:30:00, then flatten at 15:59 ET unless stop or target is hit.
  mechanic: After a completed prior-session compression setup, trade NQ breakouts of the opening_range
    reference from 10:15:00 to 10:30:00, then flatten at 15:59 ET unless stop or target is hit.
  timeframe_rationale: Five-minute bars match the archive NQ tests, ensure the opening range or prior-session
    reference is completed before breakout confirmation, and keep stop/target ordering visible to the
    engine.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-21'
  mechanics_review:
    mechanic_expresses_edge: After a completed prior-session compression setup, trade NQ breakouts of
      the opening_range reference from 10:15:00 to 10:30:00, then flatten at 15:59 ET unless stop or target
      is hit. The decision is made only after the source window has closed, so the signal expresses the
      archived edge without using future session highs, lows, VWAP, or final daily ranges.
    entry_logic_rationale: The entry module consumes completed bars only, emits a signal at the configured
      signal or breakout close, and leaves execution to the engine for the next eligible bar. Session
      times are explicit America/New_York values and the configured max-trades-per-day gate prevents multiple
      same-day attempts.
    stop_loss_rationale: The stop is declared before the run and is either a fixed percent-from-entry
      stop or the fixed archived slot stop carried in signal metadata. It is tick-rounded by the stop
      module and exposed to the engine's same-bar stop-target ordering assumptions.
    target_exit_rationale: The profit target is a fixed reward-risk multiple declared before testing,
      with no target below 1.0R. Hard intraday flattening remains configured independently so any open
      position is closed before the prop-rule cutoff.
    profitability_rationale: If the archived behavior is genuine rather than a historical artifact, neighboring
      thresholds should remain profitable after commission, one tick of slippage, pessimistic fill handling,
      and walk-forward selection from in-sample data only.
    known_failure_modes: Compression breakouts are vulnerable to false breaks, old archive data was Databento
      while this retest uses Sierra completed bars, and relaxing rank or range caps can create narrow-date
      overfit if neighboring parameters do not hold up.
    pre_test_decision: approve_for_testing
