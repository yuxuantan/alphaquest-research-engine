    scope: stop_target_parameter_space_only_no_mechanic_change
    config: campaigns/es_vix_expiration_pressure/rescue_attempts/parameter_space_rescue_1/vix_settlement_open_pressure_short_1000/config.yaml
    reason: Original VIX settlement open short failed core with 6/9 profitable combinations but below the 70% stability gate; rescue kept the same settlement-day 10:00 short mechanic and tested one adjacent stop/target grid.
    report: backtest-campaigns/es_vix_expiration_pressure/vix_settlement_open_pressure_short_1000/ES/rescue1/campaign_test_summary.json
    audit: research_artifacts/es_vix_expiration_pressure_rescue_attempt_1_20260616.md
