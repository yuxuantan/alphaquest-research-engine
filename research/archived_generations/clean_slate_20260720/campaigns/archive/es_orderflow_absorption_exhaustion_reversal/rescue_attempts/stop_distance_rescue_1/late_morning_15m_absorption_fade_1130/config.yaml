research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Campbell, Grossman, and Wang (1993); Bouchaud, Farmer, and Lillo (2009)
  edge_thesis: Late-morning orderflow that consumes volume without displacement may reflect absorption after the opening liquidity cycle.
  mechanic: At 11:30 ET, use the completed rolling 15-minute orderflow window. If same-clock signed-flow rank is extreme and effort-vs-result rank is high but absolute return is small, fade the flow direction at the next 1-minute bar open; flatten at 12:30 ET unless stop or target is hit.
  timeframe_rationale: The signal depends on completed rolling 1-minute orderflow windows and prior same-clock ranks; 1-minute bars preserve the intended window length and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_orderflow_absorption_exhaustion_reversal/late_morning_15m_absorption_fade_1130 entry mechanic: At 11:30 ET, use the completed rolling 15-minute orderflow window. If same-clock signed-flow rank is extreme and effort-vs-result rank is high but absolute return is small, fade the flow direction at the next 1-minute bar open; flatten at 12:30 ET unless stop or target is hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_orderflow_absorption_exhaustion_reversal
    source_variant_id: late_morning_15m_absorption_fade_1130
    source_run_id: run1
    source_config_path: campaigns/es_orderflow_absorption_exhaustion_reversal/variants/late_morning_15m_absorption_fade_1130/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: strategy.entry.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0015
      - 0.0025
      - 0.004
      new: &id002
      - 0.00225
      - 0.00375
      - 0.006
