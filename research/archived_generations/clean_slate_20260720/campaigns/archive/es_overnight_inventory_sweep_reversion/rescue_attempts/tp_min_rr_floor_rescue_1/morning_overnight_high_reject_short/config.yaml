research_metadata:
  academic_source: Osler (2003, 2005); Kavajecz and Odders-White (2004)
  edge_thesis: An upside sweep above the completed overnight high followed by a close back below that high may represent a failed buy-stop run and liquidity absorption.
  mechanic: From 09:30 through 11:30 ET, watch for a completed 5-minute bar that sweeps above the completed overnight high by the configured extension and then closes back below the overnight high. Enter short at the next bar open; flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars reduce open-noise false positives while preserving completed-bar signal timing, next-bar-open execution, and 1-minute detail handling for same-bar stop/target conflicts.
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter-space-only rescue for a failed variant
    mechanic_changed: false
    changed_fields:
    - entry.params.min_overnight_range_points grid/default
    - entry.params.reclaim_buffer_ticks grid/default
    - sl.params.stop_pct grid/default
    - tp.params.target_r_multiple grid/default
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized minimum-RR rescue preserves the existing es_overnight_inventory_sweep_reversion/morning_overnight_high_reject_short entry mechanic: From 09:30 through 11:30 ET, watch for a completed 5-minute bar that sweeps above the completed overnight high by the configured extension and then closes back below the overnight high. Enter short at the next bar open; flatten at 15:55 ET unless stop or target is hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected tested source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Stop-loss logic and parameter space are unchanged. This rescue is isolated to a take-profit RR floor so the failure/success attribution remains auditable.
    target_exit_rationale: Only target_r_multiple values below 1.0R are raised to 1.0R. Sub-1R variants can have their gross edge consumed by slippage, commissions, and exchange fees; this tests whether the same signal needs at least 1R payoff distance to survive costs.
    profitability_rationale: If the original edge produces directional follow-through beyond a sub-1R target, a 1R floor should improve average win size without changing signal causality.
    known_failure_modes: A 1R floor may reduce win rate, increase holding time, miss too many exits, or simply expose that the signal has no sustained follow-through; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_overnight_inventory_sweep_reversion
    source_variant_id: morning_overnight_high_reject_short
    source_run_id: rescue1
    source_config_path: campaigns/es_overnight_inventory_sweep_reversion/rescue_attempts/parameter_space_rescue_1/morning_overnight_high_reject_short/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.25
      - 1.75
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.75
      top_target_is_grid_max: true
      higher_target_net_slope: 1230.2314814814818
      higher_target_pf_slope: 0.1813861637780455
      higher_target_profitable_rate_slope: 0.14814814814814814
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.25
      - 1.75
      new: &id002
      - 1.0
      - 1.25
      - 1.75
    - path: wfa.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.25
      - 1.75
      new: &id003
      - 1.0
      - 1.25
      - 1.75
