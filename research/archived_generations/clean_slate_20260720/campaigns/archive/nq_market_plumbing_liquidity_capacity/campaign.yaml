campaign_id: nq_market_plumbing_liquidity_capacity
title: NQ Market Plumbing Liquidity Capacity
decision: FAIL
created_at: '2026-06-22'
status: completed_failed
instrument: NQ
market_timezone: America/New_York
edge_family: nq_market_plumbing_liquidity_capacity
hypothesis: Lagged market-plumbing and funding-liquidity capacity states may condition same-day NQ intraday risk premia under
  constrained intermediation.
rationale: This is a direct pre-PnL NQ port of the corrected ES market-plumbing liquidity-capacity campaign. The signal uses
  lagged external daily/weekly state variables and completed NQ bars, not intraday NQ price-pattern tuning.
sources:
- title: Market Liquidity and Funding Liquidity
  authors: Markus K. Brunnermeier and Lasse Heje Pedersen
  year: 2009
  doi: 10.1093/rfs/hhn098
  link: https://academic.oup.com/rfs/article-abstract/22/6/2201/1592184
  relevance: Motivates funding-liquidity and market-liquidity constraints as a state variable for risk premia.
- title: Primary Dealer Statistics
  authors: Federal Reserve Bank of New York
  year: 2026
  link: https://www.newyorkfed.org/markets/counterparties/primary-dealers-statistics
  relevance: Official source family for weekly primary-dealer activity data used in the lagged dealer-lending proxy.
- title: Cboe Futures Exchange Daily Market Statistics
  authors: Cboe Global Markets
  year: 2026
  link: https://www.cboe.com/markets/us/futures/market-statistics/daily/futures/
  relevance: Official source family for VX futures volume/open-interest statistics used in the lagged volatility-risk capacity
    proxy.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/market_plumbing_priority_features_lag1_no_lookahead.csv
- 5-minute NQ RTH bars generated from completed 1-minute bars
lookahead_risks:
- External market-plumbing features are lagged one listed trade date before being joined to an NQ session.
- Signals use completed 5-minute bars plus the lagged feature state and enter no earlier than next bar open.
- CFE daily statistics are not used on the same listed date; the lagged feature file is deliberately conservative.
- No final session high/low, final VWAP, future return, or same-row external feature value is used.
failure_modes:
- Market-plumbing states may explain broad ES risk premia better than NQ intraday returns.
- The external variables may be too slow or too indirect for same-day NQ RTH execution after costs.
- Long-only liquidity-capacity legs may fail during technology-led selloffs or event-driven NQ repricing.
- Tail thresholds may produce enough signals but unstable WFA or weak monkey robustness.
