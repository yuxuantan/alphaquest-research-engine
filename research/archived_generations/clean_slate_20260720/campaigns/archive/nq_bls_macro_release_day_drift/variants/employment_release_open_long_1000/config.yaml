variant_id: employment_release_open_long_1000
research_metadata:
  academic_source: Kurov, Sancetta, Strasser, and Wolfe (2019); Andersen, Bollerslev, Diebold, and Vega (2007);
    ALFRED/FRED BLS release dates
  edge_thesis: Known high-impact 08:30 ET BLS macro release dates may carry a positive NQ RTH drift after uncertainty
    resolution and gradual public-information incorporation; release values and surprises are intentionally unused.
  mechanic: At 10:00:00 ET on employment_situation release dates, enter long NQ at next-bar open and flatten by
    15:55 ET; setup_mode=unconditional_long.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution after known
    08:30 ET BLS releases and avoids overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: 'This NQ port preserves the ES BLS macro-release setup family: release_types=[''employment_situation''],
      setup_mode=unconditional_long, entry_time=10:00:00, direction=long, and same-day flatten by 15:55 ET. Release
      dates are known before RTH and do not use announcement values, surprises, or NQ outcomes.'
    entry_logic_rationale: Entry logic is unchanged from the original ES source config except for the NQ execution
      leg and NQ dataset/economics. No NQ PnL was inspected before authoring.
    stop_loss_rationale: The percent-from-entry stop grid is copied from the ES original family and declared before
      NQ PnL inspection; it tests release-day noise tolerance without changing the release calendar or setup mode.
    target_exit_rationale: The fixed-R target grid is copied from the ES original family and declared before NQ
      PnL inspection; exits remain same-day with configured forced flatten.
    profitability_rationale: If macro uncertainty resolution or delayed public-information incorporation supports
      equity-index risk appetite after 08:30 ET BLS releases, NQ may retain intraday upside drift after costs.
    known_failure_modes: The release effect may be exhausted before RTH, CPI and employment reactions may have different
      signs, NQ may be more rate-sensitive than ES, and results may concentrate in crisis or inflation-shock sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_event_density: PENDING; see research_artifacts/nq_bls_macro_release_day_drift_event_density_audit_20260630.md
    after audit.
  source_run_report: backtest-campaigns/es_bls_macro_release_day_drift/employment_release_open_long_1000/ES/run1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_bls_macro_release_day_drift
    source_config_path: campaigns/es_bls_macro_release_day_drift/variants/employment_release_open_long_1000/config.yaml
    ported_before_nq_pnl: true
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
strategy:
  entry:
    module: bls_macro_release_day_drift
    params:
      event_calendar_csv: data/external/bls_macro_release_dates_20110103_20260609.csv
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.0025
      target_r_multiple: 1.5
      setup_mode: unconditional_long
      release_types:
      - employment_situation
      entry_time: '10:00:00'
      flatten_time: '15:55:00'
      min_session_return_bps: -1000000
      max_session_range_bps: 1000000
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
