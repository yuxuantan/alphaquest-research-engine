  conclusion: Eligible as a distinct edge before PnL because the primary state is same-date Taiwan cash-market
    and local TSMC information, not Japan broad equity close, prior-day U.S. semiconductor ETF leadership,
    China technology ETF sentiment, Europe close, or ChartFanatics discretionary orderflow/AOI mechanics.
