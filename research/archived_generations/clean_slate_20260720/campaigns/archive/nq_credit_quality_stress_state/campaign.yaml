campaign_id: nq_credit_quality_stress_state
title: NQ Credit Quality Stress State
status: completed_failed_limited_monkey
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Strictly lagged bank delinquency and charge-off rates may proxy realized credit-quality stress or improvement that affects same-day NQ RTH risk appetite.
rationale: The campaign uses quarterly FRED bank delinquency and charge-off rates with a conservative 120-calendar-day lag. It is distinct from consumer-credit balances, H.8 bank-credit quantity, SLOOS loan demand, credit ETFs, default spreads, OFR stress, and corporate-profitability campaigns because the primary driver is realized credit-quality deterioration or improvement, not borrowing levels, loan demand, credit-price instruments, stress indexes, or profit margins.
sources:
- title: Bank Loan Delinquency and Charge-Off Rates
  authors: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/DRCCLACBS
  relevance: Official reproducible source path for bank delinquency and charge-off rate series used by the feature builder.
- title: The Financial Accelerator in a Quantitative Business Cycle Framework
  authors: Ben S. Bernanke, Mark Gertler, and Simon Gilchrist
  year: 1999
  venue: Handbook of Macroeconomics
  link: https://doi.org/10.1016/S1574-0048(99)10034-X
  relevance: Motivates realized credit conditions and balance-sheet stress as macro-financial state variables.
- title: The Credit Cycle and the Business Cycle - New Findings Using the Loan Officer Opinion Survey
  authors: Cara S. Lown and Donald P. Morgan
  year: 2006
  venue: Journal of Money, Credit and Banking
  link: https://ideas.repec.org/a/mcb/jmoncb/v38y2006i6p1575-1597.html
  relevance: Supports credit-cycle state variables while this campaign separately tests realized delinquency/charge-off quality.
behavioural_or_microstructure_rationale: Elevated realized charge-offs can mark deteriorating credit risk and risk-off pressure; falling delinquency changes can mark improving credit quality and risk appetite. Any usable NQ edge must survive costs, neighboring thresholds, monkey robustness, WFA, Monte Carlo, prop-rule simulation, and acceptance OOS.
expected_failure_modes:
- Quarterly credit-quality data may be too stale or already incorporated before RTH.
- Charge-off/delinquency effects may overlap broad recession beta or stress indexes.
- Improvement and stress variants may be asymmetric and fail robustness gates.
- Signals may be dense during persistent regimes and reduce to always-on equity beta.
data_needs:
- timezone-aware NQ RTH 1-minute bars in America/New_York
- FRED quarterly DRCCLACBS/DRCLACBS/CORCCT100S/CORBLACBS/CORALACBN data cached under data/external/fred_credit_quality_stress_state
- 120-calendar-day as-of join from NQ sessions to quarterly FRED observations
lookahead_risks:
- A session dated D may only use the latest quarterly credit-quality observation on or before D minus 120 calendar days.
- Rolling ranks are computed on completed quarterly observations before the NQ as-of join.
- Signals use completed one-minute bars and enter next bar open or later.
- No future NQ bar, final session range, final VWAP, final volume profile, or post-entry market state is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_consumer_credit_state
  - nq_bank_credit_supply_state
  - nq_sloos_bank_lending_survey_state
  - nq_credit_etf_orderflow_risk_appetite
  - nq_default_spread_orderflow_risk_premium
  - nq_ofr_financial_stress_intraday
  conclusion: Eligible before PnL as a distinct realized credit-quality/delinquency/charge-off edge; no prior delinquency, charge-off, or credit-quality campaign was found in the ledger or campaign tree.
