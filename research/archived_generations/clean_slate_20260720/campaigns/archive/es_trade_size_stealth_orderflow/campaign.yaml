  - es_term_structure_lead_lag_feedback
  conclusion: 'Not a duplicate in active scope. Active signed-flow persistence follows total or large20 signed flow when price confirms it; this campaign requires trade-size segmented disagreement between large/medium flow and residual smaller flow. Active absorption/exhaustion fades weak displacement after extreme flow; this campaign follows large-trade flow and does not require weak price response. Active VPIN/toxicity, prior-level, opening-drive, volume-shock, ES/MES, NQ, and term-structure campaigns test different economic mechanisms.

    '
