campaign_id: es_trade_size_stealth_orderflow
title: ES Trade-Size Segmented Stealth Orderflow
decision: failed
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: 'Medium/large trade-size signed flow can contain more information than residual smaller-flow pressure. When the completed rolling large-trade imbalance materially disagrees with residual small-flow imbalance, ES may continue in the large-flow direction after next-bar execution and realistic costs.

  '
rationale: 'This campaign tests trade-size information content, not raw total signed-flow persistence, VPIN toxicity, volume-shock reversal, prior-level dislocation, or opening-drive inventory. Each variant computes completed rolling total and large-trade signed-volume imbalance, derives residual smaller-flow imbalance, and follows the larger-trade imbalance only when the large-vs-residual gap is large enough before the signal bar closes.

  '
sources:
- title: 'Stealth Trading and Volatility: Which Trades Move Prices?'
  authors: Michael J. Barclay and Jerold B. Warner
  year: 1993
  venue: Journal of Financial Economics
  doi: 10.1016/0304-405X(93)90029-B
  link: https://ideas.repec.org/a/eee/jfinec/v34y1993i3p281-305.html
  relevance: 'Finds that trade-size buckets can have different price-impact content, motivating a large/medium-flow versus small-flow disagreement test.

    '
- title: Price, Trade Size, and Information in Securities Markets
  authors: David Easley and Maureen O'Hara
  year: 1987
  venue: Journal of Financial Economics
  doi: 10.1016/0304-405X(87)90029-8
  link: https://ideas.repec.org/a/eee/jfinec/v19y1987i1p69-90.html
  relevance: 'Models trade size as part of the adverse-selection signal faced by market makers, supporting explicit tests of trade-size segmented orderflow.

    '
- title: 'Stealth-Trading: Which Traders'' Trades Move Stock Prices?'
  authors: Sugato Chakravarty
  year: 2001
  venue: Journal of Financial Economics
  doi: 10.1016/S0304-405X(01)00063-0
  link: https://ideas.repec.org/a/eee/jfinec/v61y2001i2p289-307.html
  relevance: 'Finds that medium-size trades can be disproportionately associated with price movement, consistent with institutional order splitting.

    '
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- Sierra aggregate signed_volume, volume, large10 signed/total volume, and large20 signed/total volume
- completed rolling trade_orderflow features for 15, 30, and 60 minute windows
- exchange session labels and config-driven no-overnight forced flatten checks
data_quality_caveats:
- Sierra signed volume is an aggregate bid/ask-volume proxy and may differ from vendor-grade aggressor labels.
- Sierra large10/large20 fields are completed-bar aggregate buckets, not a full audit-trail reconstruction of parent orders.
- The edge is valid only for completed-bar trade-size segmentation; raw SCID files must not be used for print-level sequencing or intra-minute fill truth.
lookahead_risks:
- Rolling total, large-trade, and residual imbalances use only completed 1-minute bars ending at the signal bar close.
- A signal at HH:MM uses the bar that closed at HH:MM and can enter only at the next bar open.
- No final current-session VWAP, final daily range, future orderflow, future volume profile, or future session totals are used.
- All variants flatten on the same RTH session before the configured prop cutoff.
failure_modes:
- Sierra large-trade buckets may not map cleanly to informed institutional splitting in ES futures.
- Large-versus-residual disagreement may be a liquidity-taking artifact that reverses rather than continues.
- The effect may be asymmetric by side, time of day, volatility regime, or contract roll period.
- Thresholds may be too loose to isolate information content or too strict to maintain enough trades.
- Pessimistic same-bar stop/target handling can erase apparent short-horizon edge.
