      status: completed_failed
      scope: per_failed_variant
      variants:
        - morning_15_30_large20_trend_flow_1030
        - late_morning_15_30_signed_trend_flow_1130
        - midday_15_30_large10_trend_flow_1230
        - afternoon_30_60_large20_trend_flow_1400
        - late_day_30_60_large10_trend_flow_1430
      allowed_change_summary: >
        Fix `entry.params.min_trend_move_ticks` at 0 and retest a narrower
        parameter space: `entry.params.min_orderflow_imbalance` in `[0.01, 0.02]`,
        `sl.params.stop_pct` in `[0.00075, 0.001, 0.0015]`, and
