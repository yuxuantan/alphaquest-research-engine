campaign_id: nq_connors_rsi2_mean_reversion
title: NQ Connors RSI2 Intraday Mean Reversion
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: mixed_5m_15m_30m
edge_family: connors_rsi2_mean_reversion
source_es_campaign: es_connors_rsi2_mean_reversion
hypothesis: Very short-horizon RSI2 extremes on completed intraday NQ bars can identify temporary overextension
  that mean-reverts before the RTH flatten when filtered by same-session MA or cumulative VWAP context.
rationale: This is a pre-PnL NQ transfer of the audited ES Connors RSI2 campaign. The edge is an oscillator-extreme
  mean-reversion hypothesis, not a prior-session IBS, daily return reversal, high-volume capitulation
  snapback, VWAP-deviation/orderflow, or price-level trap edge. Signals use only completed bars and rely
  on engine next-bar execution.
research_sources:
- title: Short Term Trading Strategies That Work
  author: Larry Connors and Cesar Alvarez
  year: 2009
  link_or_doi: https://www.connorsresearch.com/short-term-trading-strategies-that-work/
  expected_mechanism: Documents RSI(2)-style short-horizon mean-reversion rules; this campaign tests whether
    a futures intraday adaptation survives costs and staged robustness.
- title: Relative Strength Index (RSI)
  author: StockCharts ChartSchool
  year: 2024
  link_or_doi: https://chartschool.stockcharts.com/table-of-contents/technical-indicators-and-overlays/technical-indicators/relative-strength-index-rsi
  expected_mechanism: Defines RSI as a bounded momentum oscillator; this campaign uses only completed-bar
    RSI2 values.
- title: Testing Connors RSI(2) on Futures Contracts
  author: WH SelfInvest
  year: 2010
  link_or_doi: https://www.whselfinvest.com/en-lu/trading-platform/free-trading-strategies/tradingsystem/36-rsi-2-connors
  expected_mechanism: Practitioner futures tests motivate checking whether RSI2 mean reversion transfers
    to liquid index futures under explicit execution costs.
- title: Profits from Technical Trading Rules
  author: Mark J. Ready
  year: 2002
  link_or_doi: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=64168
  expected_mechanism: Warns that apparent technical-rule profits can vanish under realistic timing and
    costs; this campaign separates signal-bar close from executable next-bar fills.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- completed NQ RTH OHLCV bars aggregated to 5m, 15m, and 30m by the repo pipeline
- cumulative session VWAP through completed bars for the VWAP variants
- same-session forced flatten from config and no overnight exposure
lookahead_risks:
- RSI2, moving average, and VWAP are calculated from completed bars only.
- A signal using bar close is not filled before the next bar open by the engine.
- VWAP is cumulative through the completed signal bar, not the final session VWAP.
- No final session high/low, future range, future orderflow, or post-entry bar is used in signal construction.
failure_modes:
- RSI2 can stay extreme on NQ trend days and stop out before any reversion.
- The ES-derived oscillator thresholds may not transfer to NQ volatility after costs.
- MA and VWAP filters may select crowded visual pullbacks rather than true transient pressure.
- Any apparent edge may be side-specific, regime-specific, or concentrated in a narrow parameter neighborhood.
