  conclusion: Eligible as a distinct pre-PnL NQ transfer because it tests same-session completed-bar RSI2
    extremes with MA/VWAP context, not prior-session IBS, daily return reversal, volume capitulation,
    VWAP/orderflow dislocation, rolling statistical bands, measured-move pullbacks, or EMA pullback continuation.
