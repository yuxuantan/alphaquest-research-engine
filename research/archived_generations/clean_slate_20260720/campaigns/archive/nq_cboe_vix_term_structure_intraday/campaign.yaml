campaign_id: nq_cboe_vix_term_structure_intraday
title: NQ Cboe VIX Term Structure Intraday
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe VIX maturity-slope states may identify NQ intraday risk-off
  pressure or risk-on recovery because Nasdaq futures are high-beta equity-index contracts
  that reprice quickly when SPX option-implied volatility term structure changes.
expected_mechanism: Prior-day VIX9D, VIX, VIX3M, and VIX6M closes summarize equity-index
  hedging demand and variance-risk-premium state. Extreme backwardation, near-term
  stress, or curve flattening should correspond to same-day NQ downside pressure;
  unusually calm contango should correspond to NQ risk appetite.
why_it_may_apply_to_nq: The source indices are SPX-based rather than Nasdaq-specific,
  so this is not an NQ-exclusive microstructure edge. It is still testable on NQ because
  NQ has strong broad-equity beta, concentrated duration/growth exposure, and historically
  high sensitivity to volatility-regime repricing.
rationale: This campaign is an NQ execution-leg port of the strongest remaining ES
  volatility-structure evidence that had not already been exhausted on NQ. The parameter
  grids come from the ES parameter-space rescue before NQ PnL inspection, and no NQ
  rescue attempt is authorized unless the user explicitly allows one.
sources:
- title: The Implied Volatility Term Structure of Stock Index Options
  authors: Scott Mixon
  year: 2007
  venue: Journal of Empirical Finance, 14(3), 333-354
  link: https://ideas.repec.org/a/eee/empfin/v14y2007i3p333-354.html
  relevance: Documents information in stock-index option implied-volatility term structure
    across maturities.
- title: Risk Premia and the VIX Term Structure
  authors: Travis L. Johnson
  year: 2017
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.travislakejohnson.com/pdfs/Johnson%20VIXTS%202017%20%28JFQA%29.pdf
  relevance: Shows the VIX term-structure slope summarizes variance-risk-premium information
    and predicts volatility-related returns.
- title: VIX Term Structure and VIX Maturity Index Historical Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe volatility-index pages
  link: https://www.cboe.com/tradable-products/vix/term-structure/
  relevance: Official source and definitions for VIX9D, VIX, VIX3M, and VIX6M inputs.
data_needs:
- timezone-aware NQ RTH 1-minute OHLCV bars in America/New_York
- official free Cboe VIX9D, VIX, VIX3M, and VIX6M daily historical CSVs
- derived session feature file using only Cboe observations strictly before the NQ
  session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- VIX maturity indices are daily closing SPX option-implied values, not intraday option
  snapshots.
- Same-day Cboe closes are unavailable to intraday NQ signals and must not be used.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using the Cboe close from the same NQ session date would leak unavailable data and
  is forbidden.
- Signals use only a completed NQ bar at the configured timestamp and lagged Cboe
  daily term-structure state.
- Rolling ranks are computed over the lagged session feature sequence only.
- No final session high/low, final VWAP, future returns, or post-entry VIX values
  are used.
failure_modes:
- VIX term-structure literature may target option, volatility, or broad SPX returns
  rather than same-day NQ futures direction.
- NQ may overreact or mean revert differently than ES around volatility-regime states.
- Daily term-structure states may be too slow for intraday NQ timing.
- Performance may concentrate in crisis windows or volatility shocks.
- The signal may overlap with broad volatility regimes and fail WFA stability.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_cboe_vxn_vix_dispersion_intraday
  - nq_cboe_implied_correlation_intraday
  - nq_volatility_managed_intraday_premium
  - nq_realized_semivariance_asymmetry
  - nq_spx_0dte_expiration_pressure
  conclusion: Not a duplicate of active failed NQ campaigns. This tests lagged VIX
    maturity-slope and front/back term-structure ratios, not VXN-vs-VIX dispersion,
    implied correlation, realized-volatility state, or option-expiration calendar
    pressure.
