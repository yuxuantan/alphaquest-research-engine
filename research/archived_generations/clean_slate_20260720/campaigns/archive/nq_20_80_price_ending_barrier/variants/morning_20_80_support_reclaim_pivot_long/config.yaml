research_metadata:
  academic_source: Chart Fanatics 80/20 Nasdaq Strategy; Donaldson and Kim (1993); Osler (2003); Lo, Mamaysky, and Wang (2000)
  edge_thesis: A failed downside probe of a Nasdaq 20/80 terminal level may mark liquidity provision and short-covering when
    completed pivot structure is already rising.
  mechanic: From 09:35 through 11:30 ET, enter long after a completed NQ 5-minute bar probes a terminal 20/80 level and closes
    back above it, with completed 5/15-minute pivot structure agreeing long.
  timeframe_rationale: Five-minute bars objectively approximate the Chart Fanatics 200-second execution concept while matching
    the repo staged-testing cadence; the completed 5/15-minute pivot filter supplies the required structure context without
    future bars.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: From 09:35 through 11:30 ET, enter long after a completed NQ 5-minute bar probes a terminal 20/80
      level and closes back above it, with completed 5/15-minute pivot structure agreeing long. The base level reaction must
      occur first, and the pivot filter can only reject signals without same-direction completed structure.
    entry_logic_rationale: The 20/80 reference levels are fixed modulo-100 price endings known before every bar. The signal
      uses only a completed 5-minute OHLC reaction and completed pivot state; the backtest engine enters no earlier than the
      next bar open.
    stop_loss_rationale: The fixed-dollar stop maps to fixed NQ point risk using configured tick value, including the 10-point
      source reference and modest predeclared neighboring distances. It uses no post-entry swing, final VWAP, or future range
      information.
    target_exit_rationale: The fixed-R target and same-day 15:55 ET flatten are predeclared. Target R is never below 1.0 and
      no target uses future session levels, final volume profile, final range, or post-entry orderflow.
    profitability_rationale: The edge should be profitable only if NQ terminal 20/80 reactions attract enough clustered orders
      to create continuation or rejection after objective completed structure agrees, overcoming one-tick slippage and commissions.
    known_failure_modes: The 20/80 source rule is practitioner-derived and may be a non-robust round-number variant. Five-minute
      OHLC bars can hide tick sequencing, pivot structure can lag, and profitability may concentrate in a few volatile sessions.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/80-20-nasdaq-strategy
  duplicate_edge_review: Eligible as a distinct Chart Fanatics-derived NQ terminal-price campaign. Prior round-number campaigns
    tested 25/50/100-point handles or ES orderflow barriers; this campaign freezes Nasdaq-specific modulo-100 endings 20 and
    80 and requires completed 5/15-minute pivot structure confirmation.
  rescue_status: none
  pre_pnl_density:
    status: FAIL
    artifact: research_artifacts/nq_20_80_price_ending_barrier_density_audit_20260630.md
    summary_csv: research_artifacts/nq_20_80_price_ending_barrier_density_summary_20260630.csv
    entry_combos: 9
