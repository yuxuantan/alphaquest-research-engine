research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Gould et al. (2013); Osler
    (2000)
  edge_thesis: Absorption at a prior rolling intraday range extreme can identify
    failed local liquidity sweeps and short-horizon initiation away from the sweep.
  mechanic: Two-sided rolling 60-minute range sweep. The completed signal bar uses
    only prior bars to define the rolling high/low, probes beyond that extreme, shows
    the corresponding footprint absorption, and closes back through the level. Entry
    is at the next 1-minute bar open.
  timeframe_rationale: One-minute bars preserve footprint feature semantics and keep
    rolling range construction close to the local price-action sweep being tested.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses footprint absorption at local
      liquidity, not just prior-day levels. A sweep of the prior 60 completed one-minute
      bars followed by absorbed imbalance and a close back through the level is a
      concrete absorption-then-initiation pattern.
    entry_logic_rationale: The rolling high/low excludes the current signal bar. A
      long needs a sweep below the prior rolling low with sell imbalance below the
      close; a short needs a sweep above the prior rolling high with buy imbalance
      above the close. Execution is next-bar only.
    stop_loss_rationale: The signal-bar extreme defines whether the local sweep has
      failed. A later trade beyond that extreme invalidates the absorption read.
    target_exit_rationale: The fixed-R target tests immediate snapback from a local
      liquidity sweep and avoids using any future session information.
    profitability_rationale: Intraday rolling extremes can attract stop orders. If
      those stops trade into visible footprint imbalance but price reclaims/rejects
      the level, trapped liquidity can create enough short-term movement to overcome
      costs.
    known_failure_modes: Rolling extremes may be too common and noisy; the 60-minute
      lookback could be regime-sensitive; and local sweeps may continue on trend days.
    pre_test_decision: approve_for_testing
