research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Gould et al. (2013); Osler (2000)
  edge_thesis: Price-level imbalance that cannot keep ES beyond a prior RTH extreme
    can indicate absorption followed by initiation back through that public level.
  mechanic: Two-sided prior RTH high/low rejection. The completed signal bar may probe
    below prior RTH low with sell absorption for a long, or probe above prior RTH
    high with buy absorption for a short. Entry is at the next 1-minute bar open.
  timeframe_rationale: One-minute bars are required because the local footprint imbalance
    columns are generated at the source 1-minute timeframe and are not valid after
    generic multi-minute aggregation.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant directly expresses footprint absorption
      at objective prior-session extremes. Below prior RTH low, bid-side diagonal
      imbalance below the close represents selling that failed to continue lower;
      above prior RTH high, ask-side diagonal imbalance above the close represents
      buying that failed to continue higher. A completed close back through the level
      is the initiation trigger.
    entry_logic_rationale: The entry is not triggered by footprint imbalance alone.
      It requires a prior RTH high or low sweep by at least the probe threshold, a
      completed same-bar footprint imbalance on the absorbed side, minimum absorbed
      volume, and a completed close back away from the failed pressure. The engine
      then enters on the next bar, so the close and footprint are not used for same-bar
      fills.
    stop_loss_rationale: The signal-bar extreme is the natural invalidation point.
      If price trades through the absorption bar extreme after entry, the failed pressure
      was not actually absorbed strongly enough.
    target_exit_rationale: The target is fixed-R because the expected edge is a short-horizon
      snap away from an exhausted liquidity sweep, not a prediction of final session
      range or future VWAP.
    profitability_rationale: Prior RTH high and low are visible liquidity locations.
      If stop orders and breakout pressure are absorbed there, trapped participants
      can move ES back through the level far enough to pay costs, provided the effect
      is broad across both sides and not one-regime dependent. The rescue asks for
      a cleaner close-through-level signal and more continuation-oriented targets
      because the original low-R grid was broadly unable to overcome costs.
    known_failure_modes: Prior-session extreme sweeps can become real breakouts; one-minute
      absorption can be random churn; imbalance may reflect informed trading; and
      two-sided behavior may hide asymmetric long/short results.
    pre_test_decision: approve_for_testing
    rescue_attempt: parameter_space_rescue_1
    rescue_scope: Parameter-space/fixed-parameter rescue only. Entry module, AOI mechanic,
      stop module, target module, data, timeframe, costs, fills, sessions, prop rules,
      and staged gates unchanged.
