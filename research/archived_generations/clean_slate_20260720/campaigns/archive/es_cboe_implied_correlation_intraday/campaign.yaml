campaign_id: es_cboe_implied_correlation_intraday
title: ES Cboe Implied Correlation Intraday
decision: FAIL
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe implied-correlation states may identify ES intraday risk-off or risk-on pressure
  because high expected SPX component co-movement reduces diversification benefits and can proxy no-place-to-hide
  market stress.
rationale: This campaign tests option-implied correlation, not implied skewness, volatility-of-volatility,
  VIX-minus-realized variance, put/call volume sentiment, realized volatility, order flow, ORB, VWAP,
  or prior-level mechanics.
sources:
- title: 'The Price of Correlation Risk: Evidence from Equity Options'
  authors: Joost Driessen, Pascal Maenhout, and Grigory Vilkov
  year: 2009
  venue: Journal of Finance, 64(3), 1377-1406
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2009.01467.x
  relevance: Shows marketwide correlation risk is priced using equity index and component options.
- title: Option-Implied Correlations and the Price of Correlation Risk
  authors: Joost Driessen, Pascal Maenhout, and Grigory Vilkov
  year: 2013
  venue: SSRN working paper version
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2166829
  relevance: Documents option-implied correlations and correlation risk premia as distinct from variance
    risk alone.
- title: EOD Implied Correlation Index
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe index page and daily historical CSV endpoints
  link: https://www.cboe.com/us/indices/implied/
  relevance: Official free source and definition for COR1M/COR3M implied-correlation histories.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- official free Cboe COR1M and COR3M daily historical CSVs
- derived session feature file using only Cboe observations strictly before the ES session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- COR1M/COR3M are daily closing option-implied index values, not intraday option snapshots.
- Same-day Cboe closes are unavailable to intraday ES signals and must not be used.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using the Cboe close from the same ES session date would leak unavailable data and is forbidden.
- Signals use only a completed ES bar at the configured timestamp and lagged Cboe daily state.
- Rolling ranks are computed over the lagged session feature sequence only.
- No final session high/low, final VWAP, future returns, or post-entry implied-correlation values are
  used.
failure_modes:
- Correlation risk premia in the literature may apply to option returns or monthly horizons, not same-day
  ES futures.
- High implied correlation may imply either risk-off pressure or a compensated equity risk premium; variants
  predeclare only the stated directions.
- Daily implied-correlation states may be too slow for intraday ES timing.
- Performance may concentrate in crisis windows or single volatility events.
- The signal may overlap with broad volatility regimes and fail WFA stability.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_cboe_skew_tail_risk_intraday
  - es_vvix_tail_risk_intraday
  - es_variance_risk_premium_intraday
  - es_cboe_put_call_sentiment_intraday
  - es_volatility_managed_intraday_premium
  - es_realized_vol_of_vol_state
  conclusion: Not a duplicate of active failed campaigns. This tests lagged Cboe option-implied SPX component
    correlation and correlation term-spread state, not skew/tail asymmetry, volatility-of-volatility,
    variance premium, or put/call volume sentiment.
