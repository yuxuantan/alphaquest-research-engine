campaign_id: es_sector_dispersion_state
title: ES Realized Cross-Sector Dispersion State
decision: TEST
created_at: "2026-06-17"
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: >
  Lagged realized dispersion among S&P sector ETF returns may proxy a broad
  market state. Elevated or rising cross-sector dispersion can indicate
  unstable risk appetite and poor index-level liquidity absorption, while low
  or falling dispersion can indicate coordinated risk demand. ES may therefore
  show same-day intraday drift or reversion conditional on the prior
  business-day sector dispersion state.
rationale: >
  This campaign tests realized cross-sectional sector-return dispersion, not
  directional sector rotation. The feature is computed from one-business-day
  lagged adjusted closes for SPY and major SPDR sector ETFs, then traded only
  after a completed ES RTH bar. It is distinct from active Cboe implied
  correlation/VXN-VIX dispersion campaigns because it uses realized ETF return
  dispersion rather than option-implied index correlation or implied-volatility
  spreads.
sources:
  - title: "Cross-Sectional Return Dispersion and Time Variation in Value and Momentum Premiums"
    authors: Laura Sun and Chris Stivers
    year: 2010
    venue: Journal of Financial and Quantitative Analysis
    doi: 10.1017/S0022109010000302
    link: https://www.cambridge.org/core/journals/journal-of-financial-and-quantitative-analysis/article/crosssectional-return-dispersion-and-time-variation-in-value-and-momentum-premiums/77E2E3B09BDA5992C29BBCE2CEDC08FE
    relevance: >
      Documents that cross-sectional return dispersion is a meaningful market
      state variable associated with time variation in equity factor premiums.
  - title: "Asymmetric Cross-Sectional Dispersion in Stock Returns"
    authors: Gregory R. Duffee
    year: 2001
    venue: Journal of Finance
    link: https://www.frbsf.org/wp-content/uploads/wp00-18bk.pdf
    relevance: >
      Shows that cross-sectional stock-return dispersion behaves
      asymmetrically around market moves, motivating ES tests that separate high
      dispersion, low dispersion, and changing dispersion states.
  - title: "Cross-Sectional Dispersion and Expected Returns"
    authors: Thanos Verousis and Nikolaos Voukelatos
    year: 2015
    venue: SSRN
    doi: 10.2139/ssrn.2734192
    link: https://ssrn.com/abstract=2734192
    relevance: >
      Supports treating dispersion as a priced or predictive state variable,
      while requiring strict out-of-sample testing before any ES transfer is
      accepted.
data_needs:
  - timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
  - no-cost public Yahoo chart daily adjusted close data for SPY and SPDR sector ETFs
  - derived session feature file using only sector ETF closes at least one business day old
  - 252-observation rolling ranks of realized sector dispersion and dispersion changes
  - same-day stop, target, forced-flatten, and no-overnight checks
data_quality_caveats:
  - Yahoo chart data is a public adjusted-close source, not an exchange-grade point-in-time archive.
  - ETF adjusted closes may be revised for dividends or corporate actions.
  - The implementation uses a one-business-day availability lag to avoid same-day close leakage.
  - Sierra ES data is completed bar-level OHLCV/orderflow data, not tick-path truth.
  - Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
  - A session dated D can only use sector ETF observations on or before D minus one business day.
  - Rolling sector ranks are computed before the session-level as-of join.
  - Signals use a completed ES bar and enter at the next bar open or later.
  - No future ES bar, final session VWAP, final range, future ETF close, or post-entry sector information is used.
failure_modes:
  - Cross-sector dispersion may be descriptive rather than tradable for ES.
  - Daily ETF closes may be too slow for intraday ES holds.
  - High dispersion can represent panic, opportunity, or sector-specific news depending on regime.
  - Results may concentrate in crisis years or narrow volatility states.
  - Adjusted ETF data rights or revision risk may require manual rejection even if a backtest passes.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_sector_rotation_risk_appetite
    - es_cboe_implied_correlation_intraday
    - es_cboe_vxn_vix_dispersion_intraday
    - es_dollar_risk_appetite_intraday
    - es_treasury_rate_shock_intraday
    - es_aqr_bab_factor_state
    - es_daily_short_term_reversal
    - es_realized_vol_of_vol_state
  conclusion: >
    Eligible as a fresh active campaign. This campaign uses realized sector
    ETF return dispersion and dispersion changes. It is not directional sector
    leadership, option-implied correlation, VXN/VIX implied-volatility
    dispersion, rates/dollar state, ES own-return state, or realized ES
    volatility-of-volatility.
feature_construction:
  builder: tools/build_es_sector_dispersion_features.py
  source: Yahoo public chart endpoint, cached in data/external/yahoo_sector_etfs/
  output: data/external/es_sector_dispersion_features_20110103_20260609.csv
  rows: 3817
  valid_rank_rows: 3817
  availability_lag_business_days: 1
  density_audit: research_artifacts/es_sector_dispersion_state_density_audit_20260617.md
variants:
  - high_1d_dispersion_short_1000
  - high_5d_dispersion_short_1030
  - rising_1d_dispersion_short_1130
  - low_1d_dispersion_long_1200
  - falling_5d_dispersion_long_1330
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
    - change fixed parameters inside existing strategy modules
    - change tunable parameter space inside existing strategy modules
  forbidden_changes:
    - change entry module
    - change stop-loss module
    - change take-profit module
    - change core economic edge
    - change timeframe or data window
    - add or remove filters after seeing results
    - alter costs, fills, sessions, validation gates, or prop rules
  attempts:
    - id: parameter_space_rescue_1
      status: failed
      scope: per_failed_variant
      variants:
        - high_1d_dispersion_short_1000
        - high_5d_dispersion_short_1030
        - rising_1d_dispersion_short_1130
        - low_1d_dispersion_long_1200
        - falling_5d_dispersion_long_1330
      changed_only:
        - sector-dispersion threshold parameter space
        - stop percentage parameter space
        - fixed-R target parameter space
      unchanged:
        - realized sector-dispersion edge thesis
        - entry module sector_dispersion_state
        - setup mode per variant
        - signal time per variant
        - one-business-day sector ETF availability rule
        - data source and data window
        - costs and fill assumptions
        - validation gates
        - prop rules
      audit: research_artifacts/es_sector_dispersion_state_rescue_attempt_1_20260617.md
result_summary:
