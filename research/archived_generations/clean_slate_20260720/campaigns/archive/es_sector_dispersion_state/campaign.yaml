  report: backtest-campaigns/es_sector_dispersion_state/campaign_test_summary.json
  results_csv: backtest-campaigns/es_sector_dispersion_state/campaign_results.csv
  density_audit: research_artifacts/es_sector_dispersion_state_density_audit_20260617.md
  rescue_audit: research_artifacts/es_sector_dispersion_state_rescue_attempt_1_20260617.md
  original_runs: 5
  rescue_runs: 5
  monkey_reached: 0
  wfa_reached: 0
  monte_carlo_reached: 0
  failure_reason: >
    All five original variants failed limited_core_grid_test. Each failed
    variant received exactly one parameter-space-only rescue preserving the
    same sector-dispersion mechanic, setup mode, signal time, modules, data,
    costs, sessions, prop rules, and validation gates. All five rescues also
    failed limited_core_grid_test. No run reached monkey, WFA, Monte Carlo,
    simulated incubation, frozen validation, or candidate reporting.
