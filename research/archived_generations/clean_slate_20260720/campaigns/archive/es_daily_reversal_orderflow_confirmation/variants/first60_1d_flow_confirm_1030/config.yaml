research_metadata:
  academic_source: Lehmann (1990); Nagel (2012); Dai et al. (2023); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Daily ES short-term reversal should be more reliable when completed aggregate orderflow
    at the predeclared intraday checkpoint already confirms the contrarian direction.
  mechanic: At 10:30:00 ET, use only completed bars to fade the prior 1-session RTH close-to-close
    return when the first completed 60 minutes of RTH flow has signed-volume imbalance in the reversal
    direction; enter next 5-minute bar open and flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars keep the daily close recording and intraday flow checkpoint auditable
    while reducing one-minute noise; signals still use completed bars and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The primary edge is the prior completed RTH return reversal. The variant
      does not trade every reversal; it requires completed aggregate signed-volume imbalance to point
      in the reversal direction at a fixed checkpoint, which is a plausible liquidity-absorption confirmation
      rather than an optimized exit tweak.
    entry_logic_rationale: The fixed 10:30:00 checkpoint and 1-session return lookback are declared
      before performance testing. The orderflow window is 12 completed 5-minute bars, so the signal
      uses only information available at the bar close and enters no earlier than the next bar open.
    stop_loss_rationale: A percent-from-entry stop is independent of future bars and tests whether
      the reversal-plus-flow condition can hold enough adverse movement after costs.
    target_exit_rationale: A fixed-R target keeps reward measurement predeclared and lets the grid
      test broad payoff symmetry without changing the entry mechanic.
    profitability_rationale: The setup should only earn if prior daily price pressure contains a liquidity
      component and same-session completed signed flow shows that pressure has shifted in the contrarian
      direction before entry. The pre-PnL density audit confirms the declared entry grid is not relying
      on rare events.
    known_failure_modes: The orderflow proxy may be noisy, the prior return may be informative rather
      than liquidity-driven, the flow confirmation may occur too late, or costs and pessimistic bar
      fills may erase the reversal.
    pre_test_decision: approve_for_testing
