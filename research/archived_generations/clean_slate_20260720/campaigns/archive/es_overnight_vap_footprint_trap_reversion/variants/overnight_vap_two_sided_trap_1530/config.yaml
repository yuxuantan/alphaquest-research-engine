research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014);
    CME market profile educational material.
  edge_thesis: Completed overnight high/low stop probes may revert when the AOI aligns with frozen prior-session
    true VAP levels and the completed bar shows footprint absorption.
  mechanic: Fade completed probes through either overnight high or low through 15:30 ET when VAP confluence
    and footprint absorption are present.
  timeframe_rationale: The Sierra footprint, VAP, and overnight AOI fields are completed 1-minute or completed-session
    fields, so the signal is evaluated only after bar close and enters no earlier than the next 1-minute
    open.
  mechanics_review:
    mechanic_expresses_edge: The completed overnight high and low define public AOIs from the overnight
      inventory session, prior true VAP levels supply profile confluence, and completed footprint absorption
      supplies trapped-trader confirmation before any next-bar entry is allowed.
    entry_logic_rationale: Overnight levels are complete by 09:29 ET, prior VAP is shifted from completed
      sessions, and the trap bar must sweep beyond then close back through the AOI before a next-bar entry
      can be generated.
    stop_loss_rationale: The sweep-extreme stop sits beyond the completed trap bar plus a tunable tick
      offset, which keeps the invalidation tied to the observed failed probe rather than a fitted dollar
      amount.
    target_exit_rationale: The cost-adjusted fixed-R target uses only the known entry and stop distance
      plus configured ES tick value, slippage, and commission, so reward is declared before the trade
      outcome.
    profitability_rationale: If overnight high/low stop probes trap aggressive traders at a prior VAP
      level, the reversal should occur often enough and travel far enough to overcome one-tick slippage
      and commissions across neighboring parameters.
    known_failure_modes: Overnight extremes can become true breakout levels, footprint absorption may
      be descriptive instead of predictive, VAP confluence may be too common, and any apparent edge may
      concentrate in volatile regimes or the widest distance parameter only.
    pre_test_decision: approve_for_testing
