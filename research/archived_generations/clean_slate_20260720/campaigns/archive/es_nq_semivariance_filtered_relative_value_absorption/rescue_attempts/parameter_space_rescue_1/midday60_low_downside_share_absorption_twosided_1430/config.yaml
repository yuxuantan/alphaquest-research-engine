research_metadata:
  academic_source: Gatev, Goetzmann, and Rouwenhorst (2006); Huth and Abergel (2014); Cont, Kukanov, and Stoikov (2014); Barndorff-Nielsen,
    Kinnebrock, and Shephard (2010); Patton and Sheppard (2015)
  edge_thesis: Fade ES/NQ intraday divergence only when completed ES aggregate signed flow shows absorption and prior-session
    downside semivariance is benign enough that divergence is less likely to be a persistent bad-volatility move.
  mechanic: From 13:00:00 through 14:30:00 ET, take the first completed one-minute bar per session where ES/NQ 60-minute relative-value
    divergence meets the configured spread threshold, ES signed-flow absorption over the same completed lookback is counter
    to the ES price leg, and the prior completed RTH session is in a low prior downside-semivariance share regime. Entry is
    next bar open.
  timeframe_rationale: One-minute bars preserve completed ES/NQ rolling return spreads, completed ES signed-flow imbalance,
    and next-bar execution timing; the semivariance regime is a daily lagged feature known before the session starts.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the composite edge through slower midday divergence filtered by a balanced
      prior-session semivariance mix rather than raw downside variance. It cannot trade on ES/NQ divergence alone: ES aggregate
      signed flow must confirm absorption and the lagged semivariance rank must be in the benign half of its historical distribution.'
    entry_logic_rationale: From 13:00:00 through 14:30:00 ET, take the first completed one-minute bar per session where ES/NQ
      60-minute relative-value divergence meets the configured spread threshold, ES signed-flow absorption over the same completed
      lookback is counter to the ES price leg, and the prior completed RTH session is in a low prior downside-semivariance
      share regime. Entry is next bar open. The rolling return, signed-flow, and semivariance inputs are all available at
      the signal decision time; max one trade per day prevents repeated firing inside the window.
    stop_loss_rationale: The percent-from-entry stop is declared before testing and rounded to the ES tick. It rejects the
      convergence thesis if ES keeps moving away from the relative-value/absorption setup after next-bar execution.
    target_exit_rationale: The fixed-R target uses no future ES/NQ bars, future orderflow, VWAP, or discretionary spread levels.
      Target reward:risk is constrained to 1.0 or higher, and unresolved trades flatten at the predeclared intraday cutoff.
    profitability_rationale: The setup is convincing enough to test because slower midday divergence filtered by a balanced
      prior-session semivariance mix rather than raw downside variance should be more likely to mean-revert when ES signed
      flow is already counter to price and yesterday's downside-risk state is benign. The pre-PnL density screen showed the
      strictest declared entry corner remains above 50 trades/year in the limited-core and latest-year windows.
    known_failure_modes: The ES/NQ divergence may still be information-driven, signed flow can be noisy or delayed, a benign
      semivariance regime can remove too many profitable volatile sessions, and any apparent edge may concentrate in one side
      or a small date cluster.
    pre_test_decision: approve_for_testing
    rescue_rationale: The original produced enough trades but no profitable limited-core combinations. This rescue keeps the
      same entry/stop/target modules and asks whether stricter benign-regime and spread thresholds plus a wider stop reduce
      cost-sensitive weak signals without changing the economic mechanic.
  pre_pnl_density:
    artifact: research_artifacts/es_nq_semivariance_filtered_relative_value_absorption_density_audit_20260620.md
    limited_core_min_trades_per_year: 63.58
    latest_one_year_min_trades_per_year: 67.05
    entry_combo_count: 6
    passing_entry_combos: 6
  rescue_attempt:
    attempt_id: parameter_space_rescue_1
    trigger: original_run_failed_limited_core_grid_test
    scope: parameter_space_and_fixed_parameters_only
    mechanics_changed: false
    changes:
    - tighten benign semivariance cutoff grid from [0.45, 0.50] to [0.40, 0.45]
    - adjust min_spread_bps grid to [2, 3, 4] while preserving the same ES/NQ divergence mechanic
    - widen stop grid from [0.0025, 0.004, 0.006] to [0.004, 0.006, 0.008]
    - leave target_r_multiple grid unchanged at [1.0, 1.5]
    rescue_density_check:
      limited_core_min_trades_per_year: 57.19
      latest_one_year_min_trades_per_year: 59.2
      all_entry_corners_clear_50_trades_per_year: true
