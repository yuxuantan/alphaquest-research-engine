  - nq_vvix_tail_risk_intraday
  - nq_cboe_vix_level_state_intraday
  - nq_cboe_vix_term_structure_intraday
  conclusion: This campaign uses lagged option-implied variance minus realized variance.
    It is not realized-volatility-only timing, realized volatility-of-volatility,
    jump variation, VVIX tail risk, VIX level, or VIX term-structure state.
