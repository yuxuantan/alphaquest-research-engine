campaign_name: nq_variance_risk_premium_intraday
campaign_id: nq_variance_risk_premium_intraday
instrument: NQ
status: completed
decision: FAIL
created_at: '2026-06-30'
reason_for_decision: Active NQ duplicate review found no authored NQ implied-minus-realized
  variance-risk-premium campaign. This is a weak-prior NQ symbol-transfer from the
  failed ES VRP family, not independent supporting evidence.
edge_hypothesis: High lagged variance risk premium, measured as VIX-implied annualized
  variance minus NQ realized variance, may predict positive same-day NQ intraday
  returns because investors require compensation for bearing volatility and crash-variance
  risk. Low lagged VRP may predict weak or negative NQ intraday returns.
research_sources:
- title: Expected Stock Returns and Variance Risk Premia
  author: Tim Bollerslev, George Tauchen, and Hao Zhou
  year: 2009
  link_or_doi: https://doi.org/10.1093/rfs/hhp008
  expected_mechanism: The difference between implied and realized variation predicts
    aggregate market returns, with high variance-risk premia associated with higher
    subsequent returns.
- title: Historical Price Data for VIX Index
  author: Cboe Global Markets
  year: 2026
  link_or_doi: https://www.cboe.com/tradable_products/vix/vix_historical_data
  expected_mechanism: Free official daily VIX history provides the option-implied
    volatility input for the lagged VRP feature.
behavioural_or_microstructure_rationale: The campaign treats lagged VRP as an ex-ante
  compensation state, not as a realized-volatility-only filter. VIX close and NQ
  realized variance are shifted one completed RTH session before any signal can fire.
expected_failure_modes:
- The monthly or quarterly return predictability in the literature may not transfer
  to a same-day intraday NQ holding period.
- A VIX-squared minus NQ RTH realized variance proxy may be too crude relative to
  model-free option-implied variance.
- The edge may overlap with broad volatility or crisis regimes and fail neighboring-parameter
  stability.
- High-VRP signals may be concentrated in crisis years or single rebound windows.
- The signal may require overnight exposure, which this campaign forbids.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/cboe_vix_history.csv
- data/external/nq_variance_risk_premium_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_es_variance_risk_premium_features.py
  output: data/external/nq_variance_risk_premium_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3729
  date_range: 2011-01-03..2026-06-12
  lookahead_control: VIX close and NQ realized variance are shifted one completed
    RTH session; a signal date can only use information known after the prior RTH
    close.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-06-30'
  existing_nq_campaign_id: none
  es_source_campaign: es_variance_risk_premium_intraday
  es_source_decision: FAIL
  not_duplicate_of:
  - nq_volatility_managed_intraday_premium
  - nq_realized_vol_of_vol_state
