campaign_id: nq_corporate_profitability_state
title: NQ Corporate Profitability State
status: completed_failed_limited_core
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Strictly lagged BEA/FRED corporate-profit growth and profit-margin state may proxy aggregate cash-flow strength, business-cycle profitability, and equity risk appetite that influence same-day NQ RTH drift.
rationale: The campaign uses quarterly CPROFIT, CPATAX, and GDP observations with a conservative 120-calendar-day lag. It is distinct from Fama-French factor rotation, AQR BAB, productivity/unit-labor-cost, corporate-equity-supply, SLOOS loan demand, H.8 bank-credit quantity, credit-spread, credit-ETF, and orderflow campaigns because the primary driver is aggregate corporate profitability and profit share, not cross-sectional style returns, leverage factors, labor-cost pressure, issuance, bank credit, credit prices, or intraday flow.
sources:
- title: A Five-Factor Asset Pricing Model
  authors: Eugene F. Fama and Kenneth R. French
  year: 2015
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2014.10.010
  relevance: Motivates profitability as an equity-return state variable, though this futures campaign must independently pass NQ staged validation.
- title: The Other Side of Value - The Gross Profitability Premium
  authors: Robert Novy-Marx
  year: 2013
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2013.01.003
  relevance: Supports profitability as an economically meaningful return-related characteristic.
- title: National Income and Product Accounts - Corporate Profits and GDP
  authors: U.S. Bureau of Economic Analysis via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/CPROFIT
  relevance: Official reproducible source path for aggregate corporate profits, after-tax profits, and GDP series used by the feature builder.
behavioural_or_microstructure_rationale: Stronger aggregate profitability can improve cash-flow expectations and risk appetite for equity-index futures. Nasdaq duration and growth exposure may respond to profit-growth and profit-margin regimes, but any usable edge must survive costs, neighboring thresholds, monkey robustness, WFA, Monte Carlo, prop-rule simulation, and acceptance OOS.
expected_failure_modes:
- Quarterly profits may be too stale or fully incorporated before RTH.
- Profit margins may be secular and reduce to always-on equity beta rather than timing.
- Profit growth can peak late-cycle and coincide with future tightening rather than immediate NQ upside.
- The five long-only expressions may fail monkey or WFA robustness if they only capture broad drift.
data_needs:
- timezone-aware NQ RTH 1-minute bars in America/New_York
- FRED/BEA quarterly CPROFIT/CPATAX/GDP data cached under data/external/fred_corporate_profitability_state
- 120-calendar-day as-of join from NQ sessions to quarterly BEA/FRED observations
lookahead_risks:
- A session dated D may only use the latest quarterly profit/GDP observation on or before D minus 120 calendar days.
- Rolling ranks are computed on completed quarterly observations before the NQ as-of join.
- Signals use completed one-minute bars and enter next bar open or later.
- No future NQ bar, final session range, final VWAP, final volume profile, or post-entry market state is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_fama_french_style_factor_rotation
  - nq_productivity_unit_labor_cost_state
  - nq_corporate_equity_supply_state
  - nq_sloos_bank_lending_survey_state
  - nq_bank_credit_supply_state
  - nq_credit_etf_orderflow_risk_appetite
  conclusion: Eligible before PnL as a distinct aggregate corporate-profitability/profit-margin edge; no prior corporate-profit, profit-margin, CPATAX, CPROFIT, or BEA profitability campaign was found in the ledger or campaign tree.
