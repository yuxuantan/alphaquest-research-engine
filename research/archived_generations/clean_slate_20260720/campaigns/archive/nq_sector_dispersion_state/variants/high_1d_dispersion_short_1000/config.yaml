research_metadata:
  academic_source: Stivers and Sun (2010); Duffee (2001); Verousis and Voukelatos (2015)
  edge_thesis: Lagged sector-return dispersion states may proxy fragile breadth, risk concentration, or breadth repair that affects growth-heavy NQ intraday drift.
  mechanic: At 10:00 ET, short NQ when prior-business-day 1-day sector dispersion ranks in the upper tail.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the sector-dispersion state is lagged by one business day.
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: parameter-space-only; mechanics, modules, data, session, costs, and validation gates unchanged
  pre_pnl_density: PASS; see research_artifacts/nq_sector_dispersion_state_density_audit_20260623.md.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: 'This NQ port preserves the ES sector-dispersion setup family: setup_mode=high_1d_dispersion_short, entry_time=10:00:00, one-business-day-lagged sector ETF dispersion rank state, next-bar execution, same-day flatten.'
    entry_logic_rationale: Entry logic is unchanged from the selected ES source config except for the NQ execution leg and NQ feature-session mapping; no NQ PnL was inspected before authoring.
    stop_loss_rationale: The percent-from-entry stop grid is declared before NQ PnL inspection and tests noise tolerance without changing the sector-dispersion signal, timing, direction, feature lag, or execution rule.
    target_exit_rationale: The fixed-R target grid is declared before NQ PnL inspection to test payoff-distance robustness under the same sector-dispersion signal; exits remain same-day with configured forced flatten.
    profitability_rationale: If sector-dispersion states proxy breadth deterioration or breadth repair, the effect may be stronger in NQ when growth and technology concentration dominate index risk.
    known_failure_modes: Sector ETF closes are slow daily state variables, NQ may already price breadth stress overnight, and any profits may be regime-concentrated or fail after costs.
    pre_test_decision: approve_for_testing
  source_run_report: backtest-campaigns/es_sector_dispersion_state/high_1d_dispersion_short_1000/ES/rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_sector_dispersion_state
    source_config_path: campaigns/es_sector_dispersion_state/rescue_attempts/parameter_space_rescue_1/high_1d_dispersion_short_1000/config.yaml
    source_run_role: ES parameter-space rescue config
    ported_before_nq_pnl: true
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
