campaign_id: nq_bankruptcy_distress_regime_reversion
title: NQ Bankruptcy Distress Regime Reversion
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: Realized bankruptcy/default-distress regimes may condition short-horizon NQ intraday reversal
  after prior-session directional moves because default distress changes risk appetite and equity-index
  risk compensation.
rationale: This is a direct NQ transfer of the corrected ES bankruptcy-distress regime family before any
  NQ PnL inspection. It is distinct from NQ orderflow, VWAP, opening-range, seasonal, VIX, CFTC, and same-clock
  periodicity campaigns because the primary state variable is an official quarterly U.S. legal-distress
  feature with modeled effective dates.
sources:
- title: In Search of Distress Risk
  authors: John Y. Campbell, Jens Hilscher, Jan Szilagyi
  year: 2008
  venue: Journal of Finance 63(6), 2899-2939
  doi: 10.1111/j.1540-6261.2008.01416.x
  link: https://onlinelibrary.wiley.com/doi/10.1111/j.1540-6261.2008.01416.x
  relevance: Motivates default/distress state variables as predictors of equity-return behavior and failure
    risk.
- title: Default Risk in Equity Returns
  authors: Maria Vassalou and Yuhang Xing
  year: 2004
  venue: Journal of Finance 59(2), 831-868
  doi: 10.1111/j.1540-6261.2004.00650.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2004.00650.x
  relevance: Supports default risk as a systematic equity-return state variable.
- title: Bankruptcy Filings Statistics / Table F-2
  authors: Administrative Office of the U.S. Courts
  year: 2026
  venue: U.S. Courts statistical data tables
  link: https://www.uscourts.gov/data-news/reports/statistical-reports/bankruptcy-filings-statistics
  relevance: Official source for quarterly business and nonbusiness bankruptcy filings by chapter used
    in the local derived feature file.
data_needs:
- NQ Sierra RTH 1-minute bars in America/New_York aggregated deterministically to 5-minute bars
- U.S. Courts F-2 derived feature file with period_end and effective_date
- next-bar-open entry from completed 5-minute signal bars and same-day flatten
lookahead_risks:
- Feature values are selected as-of session date using the module effective_date history; future quarters
  are unavailable.
- Signals use only completed 5-minute bars, prior recorded RTH session closes, and the latest non-stale
  bankruptcy feature effective on or before the session date.
- No future session return, final VWAP, final volume profile, future high/low, or current-quarter unreleased
  bankruptcy table is used.
