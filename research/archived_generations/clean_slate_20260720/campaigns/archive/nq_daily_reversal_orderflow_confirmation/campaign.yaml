campaign_id: nq_daily_reversal_orderflow_confirmation
title: NQ Daily Reversal With Aggregate Orderflow Confirmation
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: daily_reversal_orderflow_confirmation
source_es_campaign: es_daily_reversal_orderflow_confirmation
hypothesis: Recent completed NQ RTH close-to-close returns may partially reverse intraday when completed
  same-session aggregate signed flow has already turned in the contrarian direction.
rationale: This is a constrained ES-to-NQ composite transfer before NQ PnL inspection. It is not the already
  rejected raw NQ daily short-term reversal campaign because every entry also requires same-session completed
  orderflow confirmation in the reversal direction. It is not generic orderflow persistence because the
  primary state is a prior completed daily return that is faded.
research_sources:
- title: Fads, Martingales, and Market Efficiency
  author: Bruce N. Lehmann
  year: 1990
  link_or_doi: https://ideas.repec.org/a/oup/qjecon/v105y1990i1p1-28..html
  expected_mechanism: Short-horizon return reversals can reflect temporary price pressure.
- title: Evaporating Liquidity
  author: Stefan Nagel
  year: 2012
  link_or_doi: https://ideas.repec.org/a/oup/rfinst/v25y2012i7p2005-2039.html
  expected_mechanism: Liquidity provision can explain short-term reversal returns, motivating flow confirmation.
- title: Reversals and the Returns to Liquidity Provision
  author: Wei Dai, Mamdouh Medhat, Robert Novy-Marx, and Savina Rizova
  year: 2023
  link_or_doi: https://www.nber.org/papers/w30917
  expected_mechanism: Liquidity conditions influence reversal payoffs; this campaign requires intraday
    flow confirmation.
- title: The Price Impact of Order Book Events
  author: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  link_or_doi: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  expected_mechanism: Order-flow imbalance is a short-horizon price-pressure proxy; this implementation
    uses completed Sierra aggregate trade-side flow.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- completed NQ 5-minute RTH OHLCV/orderflow bars from the repo pipeline
- trade_orderflow_imbalance and volume windows ending at the completed signal bar
- prior completed RTH closes recorded before the signal session
lookahead_risks:
- Prior returns use only completed RTH closes before the signal session.
- Orderflow confirmation uses completed windows ending at the signal bar close.
- Signals are filled no earlier than next bar open by the engine.
- No current-session final close, future high/low, final VWAP, future volume, or future orderflow is used.
failure_modes:
- The raw reversal effect already failed on NQ and may not improve with flow confirmation.
- Aggregate signed-flow confirmation may be noisy or too late.
- The effect may be side-specific, regime-specific, or concentrated in a narrow threshold.
- Tighter NQ stops may be overwhelmed by intraday volatility after costs.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_daily_short_term_reversal
  - nq_signed_orderflow_persistence
  - nq_orderflow_absorption_exhaustion_reversal
  - nq_vwap_deviation_orderflow_reversion
  - nq_morning_trend_lunch_reversal_orderflow
  - nq_connors_rsi2_mean_reversion
  conclusion: 'Eligible as a distinct constrained composite: it fades prior completed NQ daily returns
    only when completed same-session aggregate orderflow confirms the reversal direction. It is not raw
    daily reversal, standalone orderflow persistence, absorption/exhaustion reversal, VWAP deviation reversion,
    intraday trend/lunch reversal, or RSI2 oscillator mean reversion.'
variants:
