- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  relevance: Motivates same-direction order-flow pressure around breakouts, while this
    campaign uses completed Sierra aggregate-flow proxies rather than full LOB OFI.
- title: CME Market Profile educational material
  authors: CME Group
  year: n.d.
  venue: Exchange practitioner research
  link: https://www.cmegroup.com/education.html
  relevance: Motivates POC, VAH, VAL, and LVN profile levels as auction-market context.
data_needs:
- Validated local Sierra ES 1-minute footprint/VAP cache in America/New_York.
- Completed overnight high/low merged from 18:00-09:29 ET overnight sessions by RTH session_date.
- Prior-session POC, VAH, VAL, and high/low LVNs from the true Sierra VAP cache.
- Completed-bar signed-volume and Sierra large10/large20 aggregate-flow proxies.
data_quality_caveats:
- Sierra large10/large20 fields are aggregate bar-level proxies, not vendor-equivalent
  true >200-lot ES print sequencing or trade-fragmentation analysis.
- Footprint imbalance fields are completed-bar research proxies and are not a full
  reconstruction of order-book events.
lookahead_risks:
- Overnight high/low levels end no later than 09:29 ET and are merged onto the same RTH session.
- Prior VAP levels are shifted from completed prior RTH sessions.
- Signals use only the completed breakout bar; entry is no earlier than the next 1-minute open.
- No final current-session profile, VWAP, daily range, future high/low, future footprint,
  or future orderflow is used.
