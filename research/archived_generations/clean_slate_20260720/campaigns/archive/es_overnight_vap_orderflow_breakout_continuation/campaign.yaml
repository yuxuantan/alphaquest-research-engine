campaign_id: es_overnight_vap_orderflow_breakout_continuation
title: ES Overnight VAP Orderflow Breakout Continuation
decision: FAIL
created_at: '2026-06-22'
instrument: ES
timeframe: 1m
edge_family: overnight_aoi_true_vap_orderflow_breakout_continuation
hypothesis: Breakouts through the completed overnight high or low may continue when
  the level is near a frozen prior-session true VAP level and the completed breakout
  bar shows same-direction aggregate orderflow plus footprint imbalance.
sources:
- title: 74% Win Rate Trader Shares His EXACT OrderFlow Strategy ($2M+ Payouts)
  authors: Chart Fanatics / Trader Yush
  year: n.d.
  venue: Practitioner video notes supplied by user
  link: not available in attached notes
  relevance: Defines the discretionary framework of AOIs, volume-profile confluence,
    delta pressure, large-trade interest, and trapped traders.
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports public technical levels as reference prices around which stop
    activity can cluster and sometimes continue after breaks.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  doi: 10.1093/rfs/hhg057
