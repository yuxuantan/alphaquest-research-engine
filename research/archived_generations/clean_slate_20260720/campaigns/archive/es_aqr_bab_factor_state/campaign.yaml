campaign_name: es_aqr_bab_factor_state
campaign_id: es_aqr_bab_factor_state
instrument: ES
decision: FAIL
reason_for_decision: Active-only duplicate review found no non-archived AQR BAB factor-state
  ES campaign. The edge uses a free public defensive-factor dataset with a conservative
  publication lag and is distinct from price-only momentum/reversal, volatility-state,
  option-state, Treasury, dollar, oil, and local orderflow families.
edge_hypothesis: Lagged U.S. Betting Against Beta factor weakness may identify leverage-constraint
  or defensive-factor stress states that condition same-day ES intraday risk appetite
  after the public data availability lag.
why_it_may_apply_to_es_futures: ES is the liquid futures expression of broad U.S.
  equity risk. The BAB anomaly links leverage constraints and high-beta overpricing
  to defensive-factor returns; stale but public BAB stress states may proxy risk-capacity
  regimes that affect intraday ES exposure demand.
research_sources:
- title: Betting Against Beta
  author: Andrea Frazzini and Lasse H. Pedersen
  year: 2014
  link_or_doi: https://doi.org/10.1016/j.jfineco.2013.10.005
  expected_mechanism: Documents the BAB anomaly and its link to leverage constraints,
    high-beta demand, and funding-liquidity pressure.
- title: 'Betting Against Beta: Equity Factors, Daily'
  author: AQR Capital Management
  year: 2026
  link_or_doi: https://www.aqr.com/Insights/Datasets/Betting-Against-Beta-Equity-Factors-Daily
  expected_mechanism: Provides free public daily long/short BAB equity factor returns
    for U.S. equities and international markets, updated monthly.
behavioural_or_microstructure_rationale: A poor lagged BAB state may reflect recent
  pressure in low-beta-versus-high-beta relative value and leverage-constrained positioning.
  ES trades test whether that state carries into liquid index-futures risk demand
  without requiring overnight exposure.
expected_failure_modes:
- The BAB anomaly is cross-sectional and may not predict broad ES direction.
- AQR daily factor values are updated monthly, so the 45-calendar-day publication
  lag may make the state too stale.
- The public dataset is reconstructed by AQR over time; historical publication snapshots
  are not available locally.
- Signals may only work in narrow crisis periods or concentrate in a few high-volatility
  days.
- Costs, one-tick-worse slippage, missed trades, WFA selection, or prop-style drawdown
  rules may erase any apparent edge.
data_requirements:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- data/external/aqr_bab_equity_factors_daily.xlsx
- data/external/es_aqr_bab_features_20110103_20260609.csv
feature_construction:
  builder: tools/build_es_aqr_bab_features.py
  output: data/external/es_aqr_bab_features_20110103_20260609.csv
  rows: 3817
  valid_rank_rows: 3817
  lookahead_control: Each ES session uses only the latest AQR BAB observation at least
    45 calendar days old; no same-day or prior-day AQR values are used because the
    public file is updated monthly.
session_assumptions:
  timezone: America/New_York
  rth_start: 09:30:00
  rth_end: '15:59:00'
  no_overnight_positions: true
  latest_variant_flatten: '15:55:00'
forbidden_forms_of_lookahead:
- Using an AQR BAB observation that is not at least 45 calendar days old on the ES
  session date.
- Using current-session ES OHLCV, final RTH close, or post-entry data to form the
  signal.
- Changing BAB feature columns, entry times, direction, threshold grids, stop grids,
  or target grids after seeing results.
- Treating archived scratch screens as validation evidence for this campaign.
duplicate_edge_review:
  active_scope_only: true
  archived_tests_ignored: true
  active_campaign_count_checked: 61
  not_duplicate_of:
  - es_daily_time_series_momentum
  - es_daily_short_term_reversal
  - es_volatility_managed_intraday_premium
  - es_realized_semivariance_asymmetry
  - es_cboe_vix_level_state_intraday
  - es_dollar_risk_appetite_intraday
  - es_market_plumbing_liquidity_capacity
  - es_trade_size_stealth_orderflow
  - es_trade_fragmentation_liquidity_reversion
  conclusion: This campaign is an external defensive-factor/leverage-constraint state
    test, not an ES price-momentum, local liquidity, volatility-only, option-sentiment,
    Treasury, dollar, oil, or orderflow campaign.
