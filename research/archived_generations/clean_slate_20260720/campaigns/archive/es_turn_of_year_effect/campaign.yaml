    reason: Original December-only 15:00 long had only 3/9 profitable combinations and concentration; rescue keeps the same December late-session mechanic and tests adjacent tighter stop/target ranges.
    report: backtest-campaigns/es_turn_of_year_effect/december_window_long_1500/ES/rescue1/campaign_test_summary.json
    audit: research_artifacts/es_turn_of_year_effect_rescue_attempt_1_20260616.md
