research_metadata:
  academic_source: Chart Fanatics JadeCap Intraday Liquidity & Volatility Model; Osler
    (2003); Lo, Mamaysky, and Wang (2000)
  edge_thesis: NQ may rebound after New York RTH sweeps the completed Asian session
    low and closes back above it, trapping breakout sellers.
  mechanic: Fade a completed sell-side sweep of the pre-known Asian low after the
    completed bar closes back inside the level.
  timeframe_rationale: Five-minute RTH bars give completed-bar New York execution
    while preserving enough structure for sweep/FVG confirmation and next-bar execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: Fade a completed sell-side sweep of the pre-known Asian
      low after the completed bar closes back inside the level.
    entry_logic_rationale: Asian/London levels are computed from ETH bars ending no
      later than 09:29 ET. The entry module then observes only completed RTH five-minute
      bars for sweeps, failed reclaims, FVG creation, and FVG rejection. Signals enter
      no earlier than the next bar open.
    stop_loss_rationale: The sweep-extreme stop is beyond the protected sweep high
      for shorts or protected sweep low for longs plus a predeclared tick offset.
    target_exit_rationale: Fixed-R exits and same-day flatten avoid using future session
      highs/lows or discretionary liquidity objectives after entry.
    profitability_rationale: The candidate should work only if pre-RTH session liquidity
      raids trap enough wrong-side participants to overcome one-tick slippage, commissions,
      and pessimistic OHLC stop/target ordering.
    known_failure_modes: ETH/RTH source mismatch, missing Bookmap/depth confirmation,
      noisy five-minute FVGs, overtraded session levels, and payoff concentration
      in a few volatility regimes.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/intraday-liquidity-volatility-model
  rescue_status: none
strategy:
  entry:
    module: session_liquidity_fvg_reversal
    params:
      setup_mode: asia_low_failed_sweep_long
      feature_csv: data/external/nq_asia_london_session_levels_20110103_20260529.csv
      setup_start_time: 09:30:00
      start_time: 09:30:00
      end_time: '11:30:00'
      flatten_time: '15:55:00'
      max_trades_per_day: 1
      tick_size: 0.25
      bar_interval_minutes: 5
      sweep_buffer_ticks: 0
      reclaim_close_buffer_ticks: 0
      min_gap_ticks: 2
      max_reclaim_bars: 4
      max_fvg_retest_bars: 6
