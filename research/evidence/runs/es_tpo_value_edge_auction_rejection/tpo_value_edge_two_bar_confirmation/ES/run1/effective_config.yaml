research_metadata:
  academic_source: Steidlmayer and Koy (1986); Harris (2003)
  edge_thesis: A completed failed auction at either developing TPO value edge followed
    by a second completed bar continuing toward value may reduce false rejections
    and rotate to the opposite edge.
  mechanic: Freeze the developing 70% TPO AOI after a completed VAH/VAL rejection;
    require the next completed bar to close farther toward value; enter the following
    bar, target the originally frozen opposite edge, and flatten at 11:00 ET.
  timeframe_rationale: One-minute bars preserve morning auction structure without
    using unreliable event payloads.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-14'
  mechanics_review:
    mechanic_expresses_edge: Two-bar confirmation expression of the completed-bar
      range/value-edge rejection thesis.
    entry_logic_rationale: The AOI is known before rejection; a second completed bar
      must continue toward value before next-bar entry.
    stop_loss_rationale: Stop is 2 or 4 ticks beyond the outer AOI boundary and rejected
      if wider than 5 points from entry.
    target_exit_rationale: Target is the opposite developing TPO edge frozen at signal;
      midpoint activates entry plus/minus 1.25-point stop; flatten at 11:00.
    profitability_rationale: A balanced auction should rotate after failed price discovery
      at an accepted value boundary.
    known_failure_modes: Sparse OR confluence, bar-path ambiguity, missing news calendar,
      and removal of order-flow edge.
    pre_test_decision: approve_for_testing
