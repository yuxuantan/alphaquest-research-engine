timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES may catch up when completed MES price movement and MES aggregate signed flow lead ES over a short intraday window.
  mechanic: From 10:00 through 11:30 ET, use completed rolling 15-minute MES and ES windows. Trade ES in the MES direction only if MES moved materially, ES lags MES by the configured gap, and MES signed flow confirms the MES direction.
  timeframe_rationale: The ES/MES feature cache is built on completed aligned 1-minute RTH bars, so the strategy stays on 1-minute bars to preserve the lead-lag window semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-18"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant directly expresses MES-to-ES catch-up across a fixed morning window:
      MES must move first over a completed 15-minute window, ES must lag that same-direction
      move by a tick gap, and MES signed aggregate flow must confirm the MES direction.
    entry_logic_rationale: >
      The 10:00-11:30 ET window gives the opening auction time to settle while allowing
      more than one predeclared chance for MES to lead ES. The entry follows MES only when
      ES is demonstrably behind, preventing the rule from becoming generic ES momentum.
    stop_loss_rationale: >
      The sweep-extreme stop is beyond the completed signal bar. If ES immediately breaks
      through the signal-bar adverse extreme after entry, the premise that ES is catching up
      to MES leadership is invalidated without using future swing information.
    target_exit_rationale: >
      A fixed-R target is appropriate because the expected effect is a short-horizon linked-market
      catch-up, not an open-ended trend. Any unresolved position is flattened by the configured
      same-session cutoff to avoid overnight exposure.
    profitability_rationale: >
      The variant is plausible only if MES sometimes incorporates same-underlying pressure
      before ES at the completed-bar horizon. Requiring both a MES price lead and MES signed-flow
      confirmation should filter small random divergences that cannot pay ES costs.
    known_failure_modes: >
      MES may lag rather than lead ES, the ES catch-up may finish inside the signal bar before
      next-bar execution, or the one-tick slippage and pessimistic stop/target ordering may erase
      the small cross-contract dislocation.
    pre_test_decision: approve_for_testing
