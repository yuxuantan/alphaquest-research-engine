timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: ES may catch up when completed MES price movement and MES aggregate
    signed flow lead ES over a short intraday window.
  mechanic: From 11:00 through 12:30 ET, use completed rolling 30-minute MES and ES
    windows. Trade ES in the MES direction only if MES moved materially, ES lags MES
    by the configured gap, and MES signed flow confirms the MES direction.
  timeframe_rationale: The ES/MES feature cache is built on completed aligned 1-minute
    RTH bars, so the strategy stays on 1-minute bars to preserve the lead-lag window
    semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the same MES-to-ES catch-up edge
      during a later morning window: MES must lead over a completed 30-minute window,
      ES must lag by a declared gap, and MES signed aggregate flow must agree with
      the MES price move.

      '
    entry_logic_rationale: 'The 11:00-12:30 ET signal window avoids the noisiest opening
      stretch and tests whether MES leadership persists after early liquidity has
      normalized. Requiring ES to lag keeps the entry from becoming a broad continuation
      trade after ES already moved.

      '
    stop_loss_rationale: 'The sweep-extreme stop uses the completed signal bar as
      the invalidation point. A break beyond that adverse extreme means the MES-led
      catch-up premise is wrong for the current bar sequence, with no future-derived
      stop level.

      '
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics
      are unchanged, while any existing target_r_multiple below 1.0R is raised to
      1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: 'A 30-minute MES lead with signed-flow confirmation should
      be less noisy than a single bar discrepancy and could catch slow ES adjustment
      after MES participation changes. The trade should be rejected if this delay
      is fully arbitraged away.

      '
    known_failure_modes: 'The later signal may only select stale MES moves, ES may
      have already adjusted inside the completed window, or signed-flow confirmation
      may intensify adverse selection instead of forecasting catch-up.

      '
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_mes_lead_lag_catchup
    source_variant_id: late_morning30_signed_two_sided_1130
    source_run_id: stop_widen_rescue1
    source_config_path: campaigns/es_mes_lead_lag_catchup/rescue_attempts/stop_distance_rescue_1/late_morning30_signed_two_sided_1130/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose
      limited-core target grid used sub-1R target values and showed stronger performance
      at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.5
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.5
      top_target_is_grid_max: true
      higher_target_net_slope: 1962.8472222222226
      higher_target_pf_slope: 0.21277434510889992
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.5
      new: &id002
      - 1.0
      - 1.5
