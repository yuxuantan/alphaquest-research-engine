research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014);
    Bouchaud, Farmer, and Lillo (2009)
  edge_thesis: Completed opening-window ES price action should continue more often
    when aggregate signed orderflow over the same completed window confirms aggressive
    participation in the direction of the move.
  mechanic: At the completed 10:30 ET minute, trade ES with the first-hour price move
    only when completed large-20 trade signed imbalance over 09:30-10:30 points in
    the same direction.
  timeframe_rationale: One-minute bars preserve exact completed-window timing and
    next-bar-open execution after the signal minute while exposing same-bar stop/target
    conflicts to the engine.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: At the completed 10:30 ET minute, trade ES with the first-hour
      price move only when completed large-20 trade signed imbalance over 09:30-10:30
      points in the same direction. The signal therefore requires both price action
      and aggregate orderflow to agree before the next-bar entry.
    entry_logic_rationale: The entry module accumulates only completed RTH one-minute
      bars from 09:30 ET through the bar that closes at 10:30:00 ET. It then checks
      the source-window return in ticks and the configured large20_imbalance threshold,
      emits at most one signal per session, and relies on the engine for next-bar-open
      execution.
    stop_loss_rationale: A fixed percent-from-entry stop is used because this edge
      is an opening-window pressure continuation, not a discrete support/resistance
      boundary. The stop is declared before testing, tick rounded, and exposed to
      pessimistic same-bar stop/target ordering.
    target_exit_rationale: A fixed-R target with a hard intraday flatten tests whether
      the post-opening continuation can pay at least one unit of reward for one unit
      of stop risk before the cutoff. No target below 1.0R is allowed.
    profitability_rationale: Large aggressive prints aligned with the first-hour return
      can represent informed or urgent participation; the variant tests whether that
      pressure continues after next-bar execution despite ES costs. If the condition
      is real, neighboring thresholds should remain profitable after ES commission
      and one-tick slippage.
    known_failure_modes: The first-window move can exhaust rather than continue, Sierra
      signed volume is only an aggregate proxy, larger-print imbalance may be stale
      or noisy, and costs can overwhelm a short intraday continuation window.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    full_history_min_signals_per_year: 78.0
    limited_core_window_min_signals_per_year: 59.1
    density_method: PnL-free count of one possible signal per session over all entry-threshold
      grid corners.
