campaign_id: es_round_number_orderflow_barrier
variant_id: midday_two_sided_large10_absorption_reclaim
test_run_id: run1
strategy_name: round_number_orderflow_barrier
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Donaldson and Kim (1993); Osler (2003); Cont, Kukanov, and Stoikov
    (2014)
  edge_thesis: Midday ES round-number probes may reverse when larger-trade aggressive
    flow is absorbed at fixed price handles.
  mechanic: Trade the first completed two-sided 25-point round-number reclaim or rejection
    between 10:30 and 14:00 ET when large10 signed flow is opposite the reclaim direction.
  timeframe_rationale: The midday window avoids the first-hour opening auction while
    keeping enough observations; 5-minute bars make large-trade flow less noisy than
    one-minute bars.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'The variant keeps the barrier fixed before the session
      and only uses completed large10 aggregate flow on the signal bar. A long requires
      sell-flow absorption at support; a short requires buy-flow absorption at resistance.

      '
    entry_logic_rationale: 'The two-sided logic is allowed because both sides express
      the same absorption mechanism at a known round-number barrier. The first signal
      per day prevents repeated probing from inflating trade count.

      '
    stop_loss_rationale: 'A fixed percent stop exits if the market fails to mean-revert
      away from the barrier after absorption. The stop does not depend on future session
      structure.

      '
    target_exit_rationale: 'The fixed-R target tests whether large-flow absorption
      is followed by enough intraday reversal to compensate for stop distance and
      ES costs.

      '
    profitability_rationale: 'Larger-trade flow should be more informative than small
      prints if visible size is being absorbed at a psychological handle. The density
      audit showed the strictest declared entry corner still above 129 signals/year.

      '
    known_failure_modes: 'Large-trade classification can be vendor-specific, passive
      absorption is only inferred from bar data, and midday barrier behavior may chop
      around the handle without follow-through.

      '
    pre_test_decision: approve_for_testing
