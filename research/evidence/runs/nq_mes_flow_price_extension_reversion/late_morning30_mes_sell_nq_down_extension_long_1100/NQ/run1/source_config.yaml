research_metadata:
  edge_thesis: Completed 30-minute MES sell pressure versus NQ plus NQ downside extension can mark a late-morning long fade setup.
  mechanic: At 11:00 ET, long NQ when completed 10:30-10:59 NQ-minus-MES imbalance indicates relative MES sell pressure and NQ's same 30-minute return is down enough; flatten at 12:31 ET.
  no_lookahead_note: Uses only completed rolling features on the 10:59 ET bar; entry is next-bar-open or later.
  density_audit: research_artifacts/nq_mes_flow_price_extension_reversion_density_audit_20260623.md
  mechanics_review_required: true
  mechanics_review:
    pre_test_decision: approve_for_testing
    mechanic_expresses_edge: Completed 30-minute MES/NQ sell-pressure proxy must coincide with completed NQ downside extension before a long fade is allowed.
    entry_timing: The signal consumes the completed 10:59 ET bar; entry is no earlier than the next bar open.
    failure_mode: Reject if the added price-extension gate does not survive core, monkey, WFA, Monte Carlo, incubation, and acceptance.
    entry_logic_rationale: >
      The entry consumes only completed 10:30-10:59 ET rolling features and goes
      long only after relative MES sell pressure and NQ downside extension are
      both known at the signal close.
    stop_loss_rationale: >
      The percent stop is predeclared, tick-rounded, and limits losses if the
      late-morning downside extension continues rather than reverting.
    target_exit_rationale: >
      The fixed-R target and 12:31 ET flatten are declared before testing and do
      not depend on future highs, lows, VWAP, daily range, or realized trade
      path.
    profitability_rationale: >
      If the setup captures temporary liquidity pressure, it should produce
      after-cost gains across neighboring flow, return, stop, and target
      settings and not just in one parameter corner.
    known_failure_modes: >
      MES/NQ flow may be informed, NQ downside momentum may persist, the signal
      may be crisis-specific, or randomized schedules may match or beat the
      core result.
