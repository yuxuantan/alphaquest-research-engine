research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets
    (2024); Moskowitz, Ooi, and Pedersen (2012); Osler (2000); Cont, Kukanov, and
    Stoikov (2014); Moreira and Muir (2017); Fleming, Kirby, and Ostdiek (2001).
  edge_thesis: High MES smaller-contract participation during a countertrend ES pullback
    into a predefined market-generated or true volume-profile AOI may mark crowded
    weak-hand pressure; excluding extreme prior-session volatility/path-risk states
    may reduce continuation failure and prop-rule path risk.
  mechanic: Prior POC, VAH/VAL, and LVN pullbacks using MES trade-share crowding over
    15 minutes plus completed Sierra footprint absorption, with a prior-session top-5-percent
    absolute-return volatility veto.
  timeframe_rationale: One-minute bars preserve completed MES participation ranks,
    prior trend timing, AOI/VAP/overnight fields, footprint absorption, volatility-gate
    timestamping, and next-bar execution timing.
  mechanics_review_required: true
  mechanics_review_version: 1
  mechanics_review:
    mechanic_expresses_edge: Prior POC, VAH/VAL, and LVN pullbacks using MES trade-share
      crowding over 15 minutes plus completed Sierra footprint absorption, with a
      prior-session top-5-percent absolute-return volatility veto.
    entry_logic_rationale: A completed prior ES trend is measured before the pullback
      window. The signal bar must push into a predefined AOI under high MES participation
      and close back away from the level before a next-bar signal is emitted in the
      prior trend direction. The volatility feature row is keyed by current session
      date but contains only lagged prior-session values.
    stop_loss_rationale: The sweep-extreme stop is beyond the completed reclaim/reject
      bar plus a tunable tick offset.
    target_exit_rationale: The cost-adjusted fixed-R target uses only entry, stop
      distance, and configured ES costs.
    profitability_rationale: The earlier MES trend-pullback family produced isolated
      positive pockets and later-stage near misses; this test freezes a prior-session
      volatility veto intended to reduce path-risk failures while requiring AOI confluence.
    known_failure_modes: MES participation may not isolate uninformed crowding, lagged
      volatility may remove winners or fail to reduce same-day path risk, AOIs can
      break cleanly on trend/news days, and the continuation may be too small after
      ES costs.
    pre_test_decision: approve_for_testing
