research_metadata:
  academic_source: Osler (2003, 2005); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014); Lo, Mamaysky, and Wang (2000)
  edge_thesis: Prior RTH high/low stop-runs should mean-revert more reliably when the sweep fails in the direction of an already established completed-bar trend and the completed reclaim bar shows aggregate trade pressure absorbed into the failed sweep.
  mechanic: Rescue broadens the original sparse one-sided PDH short into a two-sided prior-day high/low sweep-reclaim using the same absorbed signed-flow and pre-sweep trend mechanic. The core edge remains a failed prior-day stop-run, not a breakout or standalone orderflow signal. Price alone still cannot trigger; a completed prior-day level sweep-reclaim, absorbed aggregate flow on the completed reclaim bar, and pre-sweep completed-bar trend alignment are all required before next-bar entry.
  timeframe_rationale: 5-minute bars preserve completed prior-level sweep/reclaim decisions, completed aggregate orderflow on the signal bar, and a one-versus-two completed-bar pre-sweep trend snapshot while remaining dense enough for the 50 trades/year screen.
  mechanics_review_required: true
  mechanics_review_version: 2026-06-19-rescue1
  mechanics_review:
    mechanic_expresses_edge: Rescue broadens the original sparse one-sided PDH short into a two-sided prior-day high/low sweep-reclaim using the same absorbed signed-flow and pre-sweep trend mechanic. The core edge remains a failed prior-day stop-run, not a breakout or standalone orderflow signal. Price alone still cannot trigger; a completed prior-day level sweep-reclaim, absorbed aggregate flow on the completed reclaim bar, and pre-sweep completed-bar trend alignment are all required before next-bar entry.
    entry_logic_rationale: The rescue keeps prior RTH high/low levels fixed before the session and still records trend state only from completed bars before the sweep. The fixed signal window is widened to 09:45-15:30 ET and the trend snapshot is shortened to one-versus-two completed 5-minute bars so the same edge has enough observations before any PnL is inspected.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, tick-rounded by the engine, and evaluated with pessimistic same-bar stop/target ordering. It invalidates the thesis if a supposedly absorbed stop-run immediately extends beyond ordinary adverse movement.
    target_exit_rationale: A fixed-R target keeps the exit independent of future VWAP, future session extremes, final volume profile, or discretionary chart review. The fixed flatten time forces same-day risk removal before the configured prop cutoff.
    profitability_rationale: The rescued mechanics remain credible only if failed stop-runs into prior-day levels are most vulnerable when aggressive flow into the sweep is absorbed and very recent completed-bar trend structure already favors reversal. The shorter trend snapshot is less selective, so the staged grid and monkey/WFA gates must reject it unless the effect is broad after costs.
    known_failure_modes: The density rescue may admit many ordinary noisy level touches; one-versus-two-bar trend state may be too weak; absorbed aggregate flow may mark continuation inventory instead of failed pressure; and any apparent edge may fail under costs, slippage, or concentration gates.
    pre_test_decision: approve_for_testing
    rescue_mechanics_decision: approve_for_testing_parameter_space_rescue_only_after_pre_pnl_density_rescue
  rescue_attempt: 'parameter_space_rescue_1: density rescue before any staged PnL; changed only fixed entry parameters and declared parameter space inside the existing entry/stop/target modules. Entry module, stop module, target module, data, costs, fills, sessions, prop rules, and validation gates are unchanged.'
