campaign_id: es_prior_session_benchmark_orderflow_reaction
variant_id: prior_open_close_afternoon_signed_reclaim_reversion_1530
test_run_id: rescue1
strategy_name: prior_session_benchmark_orderflow_reaction
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014)
  edge_thesis: ES may reject completed previous RTH open and close benchmark levels
    intraday when a completed bar probes through the level, closes back across it,
    and carries aggregate trade-side counterflow in the rejection direction.
  mechanic: Afternoon failed probe of either previous RTH open or previous RTH close
    with total signed-volume counterflow confirmation.
  timeframe_rationale: Five-minute bars reduce one-minute noise while keeping prior
    benchmark probes and next-bar execution auditable with one-minute detail data
    for intrabar stop/target conflicts.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the benchmark-level rejection
      edge by using the completed previous RTH open and close as frozen auction reference
      level(s). A trade can occur only after a completed 5-minute bar probes beyond
      the benchmark, closes back across it, and shows aggregate orderflow in the rejection
      direction.
    entry_logic_rationale: The entry window 13:00:00 to 15:30:00 ET is predeclared
      for this variant. The signal uses only previous-session benchmark values and
      the just-completed bar's OHLC plus signed_volume imbalance; the engine enters
      no earlier than the next 5-minute bar open.
    stop_loss_rationale: The signal-bar sweep extreme is the natural invalidation
      point for a failed-probe thesis. If price continues beyond the bar that rejected
      the benchmark, the level was likely accepted rather than rejected; the tick
      offset only buffers that completed extreme.
    target_exit_rationale: A fixed-R target with forced flatten at 15:55:00 ET tests
      whether the benchmark rejection resolves quickly without using future VWAP,
      final range, discretionary targets, or overnight exposure.
    profitability_rationale: Late-session portfolio and benchmark flows often reassess
      whether the session is accepting value above or below yesterday benchmark levels.
      A failed afternoon probe back across prior open/close with counterflow should
      resolve quickly or be invalidated by the signal extreme. The orderflow filter
      is meant to separate passive level touches from active rejection, while the
      prior open/close levels are dense enough to plausibly meet the 50 trades/year
      rule.
    known_failure_modes: The probe may be genuine acceptance through the prior benchmark,
      aggregate flow can be noisy or late, and small rejection targets may be overwhelmed
      by ES commission, one-tick slippage, entry delay, or pessimistic same-bar ordering.
    pre_test_decision: approve_for_testing
    rescue_mechanics_decision: approve_for_testing_parameter_space_rescue_only
    rescue_parameter_space_rationale: This rescue preserves the completed prior-session
      benchmark probe/reclaim mechanic and changes only the predeclared parameter
      space. The stricter probe and orderflow thresholds require a clearer failed
      breakout before entry, while the wider target grid tests whether the same edge
      requires more asymmetric payoff after costs and next-bar execution.
