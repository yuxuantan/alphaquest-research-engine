rescue_metadata:
  rescue_attempt_id: parameter_space_rescue_1
  rescue_number_for_variant: 1
  created_at: '2026-06-18'
  trigger: Original variant failed limited_core_grid_test.
  allowed_scope: Parameter-space and fixed-parameter changes only; no mechanics, module,
    timeframe, data, cost, fill, session, benchmark, or validation-gate changes.
  mechanic_preserved: true
  changes:
  - Set default min_probe_ticks to 2 and min_orderflow_imbalance to 0.04 for the fixed-config
    core cross-check.
  - Changed entry grid to min_probe_ticks [1, 2, 3] and min_orderflow_imbalance [0.02,
    0.04, 0.06].
  - Changed stop-offset grid to [1, 2, 3] ticks and target-R grid to [1.0, 1.5, 2.0].
  rationale: The original grid admitted very loose zero-probe and zero-counterflow
    cases that are weak expressions of a failed benchmark probe. This rescue keeps
    the same benchmark-reaction mechanic but tests whether stricter completed-bar
    rejection and more asymmetric exits are necessary to overcome ES costs and next-bar
    delay.
