research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES may reject completed previous RTH open and close benchmark levels intraday when a completed bar probes through the level, closes back across it, and carries aggregate trade-side counterflow in the rejection direction.
  mechanic: Midday failed probe of the previous RTH close requiring large-10 trade-size counterflow on the reclaim/rejection bar.
  timeframe_rationale: Five-minute bars reduce one-minute noise while keeping prior benchmark probes and next-bar execution auditable with one-minute detail data for intrabar stop/target conflicts.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the benchmark-level rejection edge by using the completed previous RTH close as frozen auction reference level(s). A trade can occur only after a completed 5-minute bar probes beyond the benchmark, closes back across it, and shows aggregate orderflow in the rejection direction.
    entry_logic_rationale: The entry window 11:00:00 to 14:00:00 ET is predeclared for this variant. The signal uses only previous-session benchmark values and the just-completed bar's OHLC plus large10 imbalance; the engine enters no earlier than the next 5-minute bar open.
    stop_loss_rationale: The signal-bar sweep extreme is the natural invalidation point for a failed-probe thesis. If price continues beyond the bar that rejected the benchmark, the level was likely accepted rather than rejected; the tick offset only buffers that completed extreme.
    target_exit_rationale: A fixed-R target with forced flatten at 15:00:00 ET tests whether the benchmark rejection resolves quickly without using future VWAP, final range, discretionary targets, or overnight exposure.
    profitability_rationale: Midday revisits to the prior close are less likely to be opening auction noise. Requiring large-10 counterflow asks whether larger trade buckets participate in rejecting the benchmark rather than relying on passive drift. The orderflow filter is meant to separate passive level touches from active rejection, while the prior open/close levels are dense enough to plausibly meet the 50 trades/year rule.
    known_failure_modes: The probe may be genuine acceptance through the prior benchmark, aggregate flow can be noisy or late, and small rejection targets may be overwhelmed by ES commission, one-tick slippage, entry delay, or pessimistic same-bar ordering.
    pre_test_decision: approve_for_testing
    rescue_mechanics_decision: approve_for_testing_parameter_space_rescue_only
    rescue_parameter_space_rationale: This rescue preserves the completed prior-session benchmark probe/reclaim mechanic and changes only the predeclared parameter space. The stricter probe and orderflow thresholds require a clearer failed breakout before entry, while the wider target grid tests whether the same edge requires more asymmetric payoff after costs and next-bar execution.
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_prior_session_benchmark_orderflow_reaction
    source_variant_id: prior_close_midday_large10_reclaim_reversion_1400
    source_run_id: rescue1
    source_config_path: campaigns/es_prior_session_benchmark_orderflow_reaction/rescue_attempts/parameter_space_rescue_1/prior_close_midday_large10_reclaim_reversion_1400/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_offset_ticks
      old: 2
      new: 3
    - path: core_grid.parameters.sl.params.stop_offset_ticks
      old: &id005
      - 1
      - 2
      - 3
      new: &id002
      - 2
      - 3
      - 5
