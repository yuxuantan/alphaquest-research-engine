campaign_id: es_vpin_toxicity_continuation
title: ES VPIN Toxicity Continuation
decision: failed
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Elevated order-flow-toxicity proxy states may identify sessions where
  liquidity providers face adverse-selection pressure; if ES has already generated
  a positive same-session return by 13:30 ET, the pressure may continue into the afternoon
  after costs.
rationale: This campaign tests a VPIN/order-flow-toxicity proxy edge, not raw signed-flow
  persistence, ES/MES divergence, opening-drive inventory, VWAP pullback, prior-level
  breakout/reclaim, calendar, or gap reversal. The local implementation is an OHLCV
  volume-bucket proxy with shifted prior-session ranks, so it is deliberately treated
  as a proxy test rather than a true tick-level VPIN estimate.
sources:
- title: Flow Toxicity and Liquidity in a High-frequency World
  authors: David Easley, Marcos Lopez de Prado, and Maureen O'Hara
  year: 2012
  venue: Review of Financial Studies 25(5), 1457-1493
  doi: 10.1093/rfs/hhs053
  link: https://academic.oup.com/rfs/article-abstract/25/5/1457/1569929
  relevance: Introduces VPIN as a volume-time flow-toxicity measure based on volume
    imbalance and trade intensity.
- title: Flow Toxicity and Liquidity in a High-frequency World
  authors: David Easley, Marcos Lopez de Prado, and Maureen O'Hara
  year: 2012
  venue: SSRN working paper page
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1695596
  relevance: Provides accessible abstract and working-paper metadata for the VPIN
    toxicity mechanism.
- title: Assessing Measures of Order Flow Toxicity and Early Warning Signals for Market
    Turbulence
  authors: Torben G. Andersen and Oleg Bondarenko
  year: 2015
  venue: Review of Finance 19(1), 1-54
  link: https://ideas.repec.org/p/aah/create/2013-43.html
  relevance: Uses E-mini S&P 500 futures and questions VPIN incremental forecast power,
    a required failure-mode caveat for this campaign.
data_needs:
- timezone-aware ES RTH 1-minute bars aggregated to 5-minute strategy bars
- volume and OHLC fields sufficient for the local VPIN proxy feature builder
- shifted prior-session VPIN rank columns at 13:30 ET
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- The local feature is an OHLCV volume-bucket toxicity proxy, not tick-level VPIN
  with true buyer/seller classification.
- VPIN ranks are shifted prior-session rolling ranks to avoid same-session rank lookahead.
- Same-bar stop/target conflicts use pessimistic OHLC handling.
- The Andersen-Bondarenko critique means failure is expected unless robustness is
  strong.
lookahead_risks:
- The VPIN rank used at 13:30 is shifted from prior sessions only.
- Current-session return is known only through the completed 13:25-13:30 ET bar.
- Entry is next-bar open because the signal uses the completed 5-minute close.
- No future volatility, final session return, final VWAP, or future volume bucket
  is used.
failure_modes:
- The OHLCV proxy may be too crude versus true trade-classified VPIN.
- Toxicity may predict volatility rather than positive directional continuation.
- Any apparent edge may be dominated by a few crisis sessions.
- The 13:30 signal may be too late after costs and slippage.
