research_metadata:
  academic_source: Easley, Lopez de Prado, and O'Hara (2012); Andersen and Bondarenko (2015)
  edge_thesis: Elevated shifted prior-session VPIN proxy rank plus positive same-session return may indicate afternoon continuation under toxic-flow pressure.
  mechanic: Enter long after the completed 13:25-13:30 ET 5-minute bar when a slower VPIN proxy bucket construction has elevated shifted prior-session rank and current-session return is positive.
  timeframe_rationale: 5-minute bars keep the 13:30 signal on a completed bar and reduce one-minute proxy noise while preserving next-bar-open execution.
  rescue_attempt: parameter_space_rescue_1
  rescue_rationale: Original slow-bucket proxy passed core but failed monkey; rescue tests a stricter toxicity tail with wider stop/target neighborhood while preserving the slow-bucket expression.
  rescue_constraints: Parameter-space/fixed-parameter rescue only; entry, stop, target modules, edge thesis, timeframe, data window, costs, fills, and flatten rules unchanged.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_vpin_toxicity_continuation/slow_bucket_toxicity_long_1330 entry mechanic: Enter long after the completed 13:25-13:30 ET 5-minute bar when a slower VPIN proxy bucket construction has elevated shifted prior-session rank and current-session return is positive..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_vpin_toxicity_continuation
    source_variant_id: slow_bucket_toxicity_long_1330
    source_run_id: rescue1
    source_config_path: campaigns/es_vpin_toxicity_continuation/rescue_attempts/parameter_space_rescue_1/slow_bucket_toxicity_long_1330/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.004
      new: 0.006
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0025
      - 0.004
      - 0.006
      new: &id002
      - 0.00375
      - 0.006
      - 0.009
