campaign_id: es_treasury_auction_pressure
variant_id: all_coupon_post_auction_short_1305
test_run_id: run1
strategy_name: treasury_auction_pressure
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Lou, Yan, and Zhang (2013); FiscalData Treasury Securities Auctions
    Data
  edge_thesis: Anticipated nominal Treasury Note/Bond auction supply can create temporary
    risk-capacity and discount-rate pressure that spills into ES intraday returns
    on auction days, with possible post-auction recovery after inventory is absorbed.
  mechanic: On previously announced nominal Treasury Note/Bond auction days, short
    ES after the completed 13:04-13:05 ET bar and flatten by 15:55. This tests post-result
    continuation of auction-day risk pressure without using auction outcome data.
  timeframe_rationale: 1-minute bars allow exact completed-bar event timing and next-bar-open
    execution while enforcing same-day flattening.
