research_metadata:
  academic_source: Admati and Pfleiderer (1988); Campbell, Grossman, and Wang (1993);
    Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Strong ES morning directional pressure can partially reverse into late
    morning or lunch when the completed signal bar turns against the morning move
    and completed aggregate orderflow confirms counter-direction pressure. The setup
    treats the morning move as possible liquidity/inventory pressure rather than a
    level breakout.
  mechanic: late-morning long fade after a morning down extension, green completed
    signal bar, and buy/counterflow between 10:30:00 and 11:30:00; enter at the next
    5-minute bar open after the completed reversal/counterflow bar.
  timeframe_rationale: Five-minute bars are short enough for late-morning/lunch reversals
    while filtering one-minute noise. Signal features use completed bars only and
    the engine enters on the next bar open.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by requiring late-morning
      long fade after a morning down extension, green completed signal bar, and buy/counterflow.
      The RTH session open anchors the morning extension, the signal bar must turn
      against that extension, and completed aggregate flow must agree with the reversal
      direction before any next-bar entry.
    entry_logic_rationale: The entry is not triggered by flow alone. Price must first
      be extended from the RTH open, then the completed signal bar must reject that
      extension with an opposite-colored body. This keeps the mechanic tied to observable
      price action and avoids future session information.
    stop_loss_rationale: The signal-bar high for shorts or low for longs is the natural
      invalidation point because a move beyond the completed reversal bar means the
      morning extension has not been rejected. The stop-offset grid is small and tick-based.
    target_exit_rationale: The target is a modest fixed-R retracement because the
      hypothesis is a lunch/inventory reversal, not an all-day trend forecast. No
      target uses future VWAP, final range, or final profile information.
    profitability_rationale: If the morning move is liquidity/inventory pressure rather
      than durable information, a completed counter-bar with aligned counterflow should
      lead to a short-horizon reversal that can survive next-bar execution and costs
      often enough across sessions.
    known_failure_modes: The morning move may be informed and continue; counterflow
      may simply be liquidity-taking into trend; open-position overlap can reduce
      tradable signal density; small lunch reversals may be erased by slippage and
      pessimistic same-bar ordering.
    pre_test_decision: approve_for_testing
