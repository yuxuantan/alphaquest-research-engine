campaign_id: nq_intraday_invariance_dislocation_reversion
test_run_id: run1
strategy_name: nq_intraday_invariance_dislocation_reversion
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
variant_id: lunch_15m_two_sided_dislocation_fade_1330
research_metadata:
  academic_source: Andersen, Bondarenko, Kyle, and Obizhaeva (2018); Kyle and Obizhaeva
    (2016); Ane and Geman (2000)
  edge_thesis: Completed NQ bars with unusually large price movement per transaction,
    scaled by average trade size and ranked against prior same-clock observations,
    may identify temporary liquidity dislocations that mean-revert when aggregate
    signed flow does not strongly sponsor the move.
  mechanic: From 12:00 through 13:30 ET, fade completed 15-minute high-dislocation
    NQ moves during thinner lunch liquidity when signed flow does not sponsor the
    move.
  timeframe_rationale: One-minute bars preserve completed-bar timing for the transaction-clock
    score. The entry uses completed NQ OHLCV, aggregate signed volume, and completed
    trade count; it does not use print sequencing or intra-minute fill ordering.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: From 12:00 through 13:30 ET, fade completed 15-minute
      high-dislocation NQ moves during thinner lunch liquidity when signed flow does
      not sponsor the move.
    entry_logic_rationale: The entry computes rolling completed-bar return, volume,
      trade count, average trade size, and signed-flow imbalance. The same-clock invariance
      rank uses only prior observations because the current score is appended after
      the signal decision.
    stop_loss_rationale: A fixed percent stop is used because the edge is a statistical
      liquidity-dislocation state rather than a discrete chart level. The stop is
      predeclared, NQ tick-rounded by the engine, and subject to pessimistic same-bar
      target/stop handling.
    target_exit_rationale: A fixed-R target at 1.0R or greater tests bounded reversion
      without future VWAP, final range, discretionary chart levels, or post-entry
      orderflow. Unresolved trades are force-flattened at the declared same-day time.
    profitability_rationale: Lunch-period NQ liquidity can be shallow relative to
      large technology-index risk transfer; temporary dislocations may revert if flow
      sponsorship is weak.
    known_failure_modes: The dislocation may be informed price discovery, aggregate
      signed flow may be too noisy, NQ may trend after high movement-per-transaction
      bursts, and top performance may be concentrated in crisis regimes or narrow
      parameter neighborhoods.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_intraday_invariance_dislocation_reversion_density_audit_20260623.md
    detail_csv: research_artifacts/nq_intraday_invariance_dislocation_reversion_density_audit_20260623.csv
    entry_combo_count: 9
    nq_grid_fixed_before_pnl: true
    screen_rule: All variants must exceed 50 signals/year and 50 latest-252-session
      signals at the strictest entry-grid corner before staged PnL testing.
  nq_only_note: This campaign is formulated directly for NQ transaction-clock dislocation
    behaviour after the ES analogue failed its own validation; it is not promoted
    from ES performance.
