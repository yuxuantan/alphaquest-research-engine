research_metadata:
  academic_source: Avdjiev, Du, Koch, and Shin (2019); Lustig, Roussanov, and Verdelhan
    (2011); FRED DTWEXBGS
  edge_thesis: A broad-dollar upside shock may matter more for NQ when the dollar
    is already in a high 252-observation level regime.
  mechanic: At 11:30 ET, short NQ when prior-business-day broad dollar level and one-day
    return ranks are both elevated.
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open
    NQ execution while the broad-dollar state is lagged by one business day.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_dollar_risk_appetite_intraday_density_audit_20260630.md
    density_basis: declared dollar rank threshold grids from ES source campaign
    selected_grid_min_signals: 822
    selected_grid_min_signals_per_year: 53.242685
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 11:30 ET, short NQ when prior-business-day broad dollar
      level and one-day return ranks are both elevated.
    entry_logic_rationale: The signal reads only the latest broad-dollar index observation
      available no later than one business day before the NQ session plus the completed
      1-minute bar immediately before entry. Same-date FRED observations, current-session
      NQ future bars, and post-entry returns are unavailable and unused.
    stop_loss_rationale: A percent-from-entry stop is used because the broad-dollar
      state is a cross-asset macro risk proxy, not a discrete NQ intraday price level
      with a natural invalidation tick.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten tests same-day NQ
      expression of the lagged dollar risk-state while forbidding overnight exposure
      and leaving prop-rule flatten enforcement explicit.
    profitability_rationale: The variant can only work if lagged broad-dollar risk-appetite
      state predicts enough same-day NQ drift to overcome commission, one tick of
      slippage, and pessimistic same-bar stop-target ordering.
    known_failure_modes: The ES source family failed with zero profitable original
      and rescue combinations, so this NQ transfer is weak-prior. It can fail if dollar
      effects are slower than intraday holding windows, if the one-business-day lag
      removes the edge, or if NQ responds mainly through tech-specific factors rather
      than broad dollar risk capacity.
    pre_test_decision: approve_for_testing
