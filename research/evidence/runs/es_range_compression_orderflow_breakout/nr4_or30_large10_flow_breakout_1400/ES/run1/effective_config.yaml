research_metadata:
  academic_source: Crabel (1990); Raschke and Connors (1995); Holmberg, Lonnback,
    and Lundstrom (2013); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: NR4 range compression may precede ES intraday breakout continuation
    when the completed breakout bar has aligned aggregate orderflow.
  mechanic: NR4 30-minute opening-range breakout with same-bar large-10 flow confirmation
    through 14:00 ET.
  timeframe_rationale: 5-minute bars reduce one-minute breakout noise while preserving
    completed-bar signal timing and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by requiring a completed
      prior-session NR4 compression state before any signal. The breakout is measured
      against the 30-minute opening range, and same completed-bar large10 aggregate
      flow must align with the breakout direction, so the orderflow filter is participation
      confirmation rather than a standalone timing rule.
    entry_logic_rationale: The entry waits for a completed 5-minute close beyond the
      30-minute opening range between 10:00:00 and 14:00:00 ET. Requiring aligned
      large10 flow on that completed breakout bar should reject weak stop probes and
      retain trades where aggressive participation supports volatility expansion.
    stop_loss_rationale: A percent-from-entry stop is simple, predeclared, and independent
      of future session range or post-entry orderflow. It rejects breakouts that cannot
      hold after the participation-confirmed signal.
    target_exit_rationale: A fixed-R target keeps the exit rule mechanical and comparable
      across reference-level variants. Forced flatten remains predeclared for trades
      that do not resolve intraday.
    profitability_rationale: The setup should be profitable only if narrow prior-session
      range creates deferred volatility expansion and aligned large10 flow identifies
      breakouts with real participation. Pre-PnL density showed 62.34 to 63.90 raw
      signals per year across the entry grid, so it is not intentionally sparse.
    known_failure_modes: The setup can fail if NR4 compression has no ES edge after
      costs, if aligned flow marks exhaustion rather than continuation, if profits
      are concentrated in a few trend days, or if same-bar pessimistic stop handling
      overwhelms short-horizon continuation.
    pre_test_decision: approve_for_testing
