research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014);
    CME market profile educational material.
  edge_thesis: Completed overnight high/low breakouts may continue when the AOI aligns with frozen prior-session
    true VAP levels and the breakout bar shows same-direction aggregate orderflow plus footprint imbalance.
  mechanic: Signed-volume breakout continuation through completed overnight extremes after the first few
    opening minutes.
  timeframe_rationale: The Sierra aggregate-flow, footprint, VAP, and overnight AOI fields are completed
    1-minute or completed-session fields, so the signal is evaluated only after bar close and enters no
    earlier than the next 1-minute open.
  mechanics_review:
    mechanic_expresses_edge: The completed overnight high and low define public breakout AOIs, prior true
      VAP levels supply profile confluence, and same-direction aggregate flow plus footprint imbalance
      supplies continuation pressure before any next-bar entry is allowed.
    entry_logic_rationale: Overnight levels are complete by 09:29 ET, prior VAP is shifted from completed
      sessions, and the breakout bar must trade beyond and close in the breakout direction before a next-bar
      entry can be generated.
    stop_loss_rationale: The sweep-extreme stop sits beyond the completed breakout bar plus a tunable
      tick offset, which keeps invalidation tied to the observed breakout bar rather than a fitted dollar
      amount.
    target_exit_rationale: The cost-adjusted fixed-R target uses only the known entry and stop distance
      plus configured ES tick value, slippage, and commission, so reward is declared before the trade
      outcome.
    profitability_rationale: If overnight high/low breaks near prior VAP levels attract same-direction
      flow, continuation should occur often enough and travel far enough to overcome one-tick slippage
      and commissions across neighboring parameters.
    known_failure_modes: Overnight breaks often fail and revert, same-direction flow may arrive late,
      Sierra large-flow fields are aggregate proxies, VAP confluence may be too common, and any apparent
      edge may concentrate in the widest distance setting.
    pre_test_decision: approve_for_testing
