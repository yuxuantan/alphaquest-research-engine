research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014)
  edge_thesis: Completed rolling intraday high/low sweeps in ES are more likely to
    reverse when the reclaim bar shows footprint absorption against the sweep and
    MES participation is crowded in the sweep direction.
  mechanic: Fade completed sweeps of a 45-minute rolling high/low when MES trade-share
    rank is high and footprint absorption confirms failed continuation at the swept
    edge.
  timeframe_rationale: A 45-minute rolling range is long enough to represent a locally
    visible intraday level while still producing enough completed-bar signals for
    WFA.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: Fade completed sweeps of a 45-minute rolling high/low
      when MES trade-share rank is high and footprint absorption confirms failed continuation
      at the swept edge. The rolling level is built from prior completed bars only,
      while footprint absorption and MES crowding confirm that the completed reclaim
      bar absorbed the failed sweep pressure.
    entry_logic_rationale: The signal evaluates only the completed one-minute bar
      and the prior rolling range maintained inside the entry module. Because the
      signal uses the bar close, the existing engine enters no earlier than the next
      bar open.
    stop_loss_rationale: The sweep-extreme stop is beyond the actual signal-bar high
      or low with an offset grid. If price trades beyond the failed sweep extreme
      after entry, the absorption/reversion thesis is invalid.
    target_exit_rationale: A fixed-R target with a 1.0R floor keeps exits independent
      of future highs/lows, future orderflow, or discretionary chart reading, and
      every position flattens before the configured cutoff.
    profitability_rationale: If local breakout traders chase the 45-minute extreme
      but absorbed footprint imbalance closes the bar back inside, the trapped-flow
      reversal should have enough room to pay costs.
    known_failure_modes: The setup may fail if MES crowding identifies informed continuation
      instead of weak-hand exhaustion, if footprint absorption proxies are too noisy,
      if rolling levels overfit micro noise, or if the reversal is too small after
      one-tick slippage and commissions.
    pre_test_decision: approve_for_testing
    rescue_attempt_rationale: Original large-trade rolling-45 variant was the strongest
      expression but still failed the 70 percent profitable-combo benchmark. Profitable
      runs clustered around 0.55 share rank and a two-tick stop, with both one- and
      two-tick sweeps viable. Rescue keeps the mechanic and TP grid unchanged while
      testing whether a lower-but-still-crowded 0.50 share-rank threshold and adjacent
      stop offsets create a broader profitable zone.
  rescue_attempt: parameter_space_rescue_1
  rescue_parent_run_id: run1
  rescue_type: parameter_space_only
  rescue_reason: Original large-trade rolling-45 variant was the strongest expression
    but still failed the 70 percent profitable-combo benchmark. Profitable runs clustered
    around 0.55 share rank and a two-tick stop, with both one- and two-tick sweeps
    viable. Rescue keeps the mechanic and TP grid unchanged while testing whether
    a lower-but-still-crowded 0.50 share-rank threshold and adjacent stop offsets
    create a broader profitable zone.
  rescue_constraints: Entry, stop, target modules, economic thesis, timeframe, data
    window, signal window, MES/footprint feature family, and flatten time are unchanged.
    Only existing entry-threshold and stop-offset parameter grids were adjusted. The
    TP fixed value and grid remain unchanged, and no target_r_multiple below 1.0 is
    allowed.
