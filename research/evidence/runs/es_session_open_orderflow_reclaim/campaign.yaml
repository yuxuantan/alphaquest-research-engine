campaign_id: es_session_open_orderflow_reclaim
title: ES Session Open Orderflow Reclaim
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: session_open_orderflow_reclaim
hypothesis: The current RTH open is the first regular-session auction-clearing price. After ES makes a
  completed excursion away from that price, a completed reclaim or rejection back through the open with
  aligned aggregate orderflow may identify trapped inventory and short-horizon price pressure.
sources:
- title: Support and Resistance Levels in the Foreign Exchange Market
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports the idea that widely observed price levels can condition short-horizon intraday
    reactions. This campaign treats the current RTH open as a known auction-anchor level rather than a
    future-derived level.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  doi: 10.1093/jjfinec/nbt003
  relevance: Motivates orderflow imbalance as short-horizon price-pressure evidence. This campaign uses
    completed-bar Sierra aggregate trade-side flow, not quote-level OFI.
- title: Intraday Patterns in the Cross-Section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, Ronnie Sadka
  year: 2010
  venue: Journal of Finance / working paper
  link: https://arxiv.org/abs/1005.3535
  relevance: Documents systematic intraday return patterns related to trading-flow timing and motivates
    testing whether a session-time anchor plus contemporaneous flow can produce repeatable same-day behavior.
rationale: This is a bounded price-action plus aggregate-orderflow edge. The price-action component is
  a prior completed excursion away from the current RTH open and a completed reclaim or rejection through
  that same open. The orderflow component requires aligned same-bar signed-flow imbalance at the reclaim/rejection.
  It is distinct from prior-close gap, opening-range, opening-drive, overnight-high/low, VWAP, prior-day-level,
  and round-number campaigns.
data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- 1-minute RTH OHLCV bars with completed-bar signed_volume, large10_signed_volume, large10_volume, large20_signed_volume,
  and large20_volume
- current RTH open from the first regular-session bar; this is known from the first completed/observed
  RTH bar and is not a future session statistic
lookahead_risks:
- The RTH open is fixed from the first RTH bar; no final session high, low, VWAP, range, or volume profile
  is used.
- The excursion must exist on a prior completed bar before the reclaim/rejection bar, avoiding same-bar
  extension/reclaim sequence assumptions.
- The reclaim/rejection and orderflow confirmation use only the completed signal bar; the engine enters
  at the next bar open or later.
- Same-bar stop/target conflicts are handled by the backtest engine with pessimistic OHLC ordering unless
  detail data is available.
failure_modes:
- The RTH open may be too obvious and arbitraged away after costs.
- A reclaim through the open may be a noisy cross rather than a true inventory trap.
- Aggregate Sierra signed flow may not capture quote-level OFI or hidden liquidity replenishment.
- The edge may be regime-specific and fail monkey tests when slippage, delay, or missed trades are stressed.
- Open-anchor reactions may be dominated by a few high-volatility sessions or by morning-only behavior.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_opening_gap_orderflow_absorption_fade
  - es_opening_drive_inventory_absorption
  - es_opening_range_orderflow_breakout
  - es_opening_range_failed_breakout_orderflow
  - es_opening_range_retest_orderflow
  - es_overnight_intraday_reversal
  - es_overnight_return_late_day_momentum
  - es_prior_level_delta_dislocation
  - es_round_number_orderflow_barrier
  - es_session_extreme_delta_divergence
  - es_vwap_orderflow_pullback_continuation
  conclusion: Eligible as a distinct active campaign because the reference level is the current session
    RTH open itself. Nearby active failures used prior RTH close gaps, overnight highs/lows, completed
    opening ranges, first-window opening-drive state, prior-day levels, round numbers, session extremes,
    or VWAP. This campaign does not use those reference levels.
