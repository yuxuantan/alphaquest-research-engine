research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Grossman and Miller (1988);
    Johnson (2016); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Completed intraday closes outside a rolling price envelope may mean-revert
    when same-bar aggregate orderflow is pressing into the extreme, because temporary
    immediacy demand is being supplied rather than repriced as durable information.
  mechanic: Afternoon 5-minute two-sided reversion after a completed close outside
    a 24-bar rolling close envelope with large-20 trade flow pressing into the extreme.
  timeframe_rationale: The two-hour 5-minute envelope gives a slower afternoon reference
    while testing whether larger-trade urgency at local statistical extremes is temporary.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: Afternoon 5-minute two-sided reversion after a completed
      close outside a 24-bar rolling close envelope with large-20 trade flow pressing
      into the extreme. The rolling envelope is computed from prior completed closes,
      so the signal is a statistical extension rather than a fixed level or post-hoc
      chart annotation. Same-side aggregate flow into the extension is required to
      express temporary liquidity demand being supplied at the extreme.
    entry_logic_rationale: The module records completed RTH closes, computes the rolling
      mean/std envelope before the signal bar is added, and only signals after the
      completed close is outside the band with same-side aggregate orderflow. Because
      the signal uses bar close and completed flow, the engine must enter at next-bar
      open or later.
    stop_loss_rationale: The sweep-extreme stop sits just beyond the completed signal-bar
      high/low. If price extends beyond the bar that represented the statistical extreme,
      the immediate reversion thesis is invalidated.
    target_exit_rationale: A fixed-R target avoids future VWAP, future range, final
      session levels, or discretionary mean targets. Forced flatten keeps the trade
      same-day and inside the configured prop cutoff.
    profitability_rationale: The setup should only be profitable if some intraday
      envelope breaks are liquidity-demand overshoots rather than informed repricing.
      Requiring completed same-side orderflow pressure into the extreme makes the
      trade a liquidity-supply/reversion test, while the rolling envelope keeps it
      dense enough to clear the 50 trades/year screen before PnL testing.
    known_failure_modes: Envelope breaks can be informed continuation; aggregate signed
      flow can be adverse selection; signal-bar-extreme stops can be too tight in
      volatility expansion; short fixed-R targets may not overcome ES costs; results
      can concentrate by side or time of day.
    pre_test_decision: approve_for_testing
    rescue_attempt: parameter_space_rescue_1
    rescue_scope: Parameter-space and fixed-parameter rescue only; entry module, stop
      module, target module, data, costs, sessions, and rolling-envelope reversion
      mechanic are unchanged.
    rescue_rationale: Original runs were dense but unprofitable across all 81 combinations.
      This rescue tests whether the same edge needs more statistically extreme completed
      closes, stronger same-side orderflow pressure, a larger signal-bar range, and
      wider stop/target expression. No direction flip, filter addition, data change,
      or stage-gate change is introduced.
    rescue_density_revision: Before rescue PnL, the first rescue density draft had
      several strict threshold corners below 50 signals/year. The orderflow-threshold
      grid was narrowed to density-valid stricter thresholds while preserving the
      same rescue mechanic and modules.
