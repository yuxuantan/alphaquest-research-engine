  conclusion: Not a duplicate of active failed campaigns. The active prior-day stop-run
    reclaim campaign faded failed prior-level sweeps; this campaign enters only with
    confirmed breaks/holds outside prior RTH high/low. Archived tests are ignored
    for duplicate checks and are not used for tuning.
