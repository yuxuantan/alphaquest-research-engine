campaign_id: es_prior_session_level_breakout_continuation
title: ES Prior-Session Level Breakout Continuation
decision: failed
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Confirmed ES breaks beyond the prior RTH high or low may continue intraday
  because widely watched support/resistance levels concentrate liquidity and stop
  orders; a completed close beyond the level can mark informed directional participation
  rather than a failed stop run.
rationale: This campaign tests prior-session support/resistance breakout continuation.
  It is distinct from the active prior-day stop-run reclaim campaign, which faded
  failed sweeps that closed back inside the level. These variants require a completed
  close or hold outside the prior RTH high/low and enter only on the next bar open.
sources:
- title: Simple Technical Trading Rules and the Stochastic Properties of Stock Returns
  authors: William Brock, Josef Lakonishok, and Blake LeBaron
  year: 1992
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1992.tb04681.x
  link: https://onlinelibrary.wiley.com/doi/10.1111/j.1540-6261.1992.tb04681.x
  relevance: Tests trading-range break rules based on support/resistance levels and
    motivates a strict prior-level breakout continuation test.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=315660
  relevance: Finds support/resistance levels can coincide with limit-order-book depth,
    giving a liquidity mechanism for reactions around prior-session reference levels.
- title: Stop-Loss Orders and Price Cascades in Currency Markets
  authors: Carol L. Osler
  year: 2005
  venue: Journal of International Money and Finance
  link: https://www.newyorkfed.org/research/staff_reports/sr150.html
  relevance: Documents stop-order cascades around levels; the campaign tests whether
    confirmed ES breaks beyond prior RTH levels continue after costs.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV/orderflow bars in America/New_York
- deterministic 5-minute aggregation from completed 1-minute bars
- previous RTH high and low available only after the prior RTH session is complete
- fresh-level flags so a prior high/low is not repeatedly traded after the first break
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- The Sierra cache is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use the pessimistic OHLC assumption.
- Breakout confirmation is bar-close based; actual stop-order cascades are only proxied
  by 5-minute OHLCV bars.
lookahead_risks:
- Prior RTH high/low are from the fully completed previous RTH session only.
- Fresh close-break and retest-hold signals use only completed 5-minute signal bars.
- Gap-hold variants use the RTH open plus completed hold bars; entries are next-bar
  open after the hold condition is known.
- No future session high/low, final VWAP, final current-session range, or future order-flow
  state is used.
- All variants flatten the same day before the configured prop cutoff.
failure_modes:
- Prior high/low breakouts may be false breaks that reverse after costs.
- The effect may be confined to a narrow volatility regime or a few crisis trend days.
- Gap-hold continuation may duplicate overnight information without same-day follow-through.
- Bar-level OHLC may overstate fills during fast cascades, so pessimistic same-bar
  ordering is required.
