research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Gould et al. (2013); Osler (2000)
  edge_thesis: Price-level imbalance that cannot keep ES beyond the RTH open can indicate
    absorption at the session's first public anchor followed by initiation back through
    that anchor.
  mechanic: Two-sided RTH-open reclaim/rejection. After the RTH open is known, the
    completed signal bar may probe below the open with sell absorption for a long,
    or probe above the open with buy absorption for a short. Entry is at the next
    1-minute bar open.
  timeframe_rationale: One-minute bars are required because the local footprint imbalance
    columns are generated at the source 1-minute timeframe and are not valid after
    generic multi-minute aggregation.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses footprint absorption at the RTH
      open, a level known immediately after the first regular-session print. A probe
      below the open with sell imbalance that closes back above it is long absorption;
      a probe above the open with buy imbalance that closes back below it is short
      absorption.
    entry_logic_rationale: The entry waits until after the session open exists, then
      requires a completed probe through that open, a completed footprint imbalance
      on the absorbed side, enough absorbed volume, and a close back through the open.
      The engine enters only at the next bar open.
    stop_loss_rationale: The signal-bar extreme is the invalidation point because
      a trade through that extreme means the session-open absorption read failed.
    target_exit_rationale: A fixed-R target tests whether reclaim/rejection of the
      session-open anchor has enough immediate follow-through without using future
      range, VWAP, or volume profile information.
    profitability_rationale: The RTH open is a simple public anchor used by both discretionary
      and systematic traders. If pressure through that anchor is absorbed and price
      closes back through it, trapped participants may create a tradable short-horizon
      move.
    known_failure_modes: Session-open probes can be noisy; the open may not matter
      after the first hour; footprint imbalance can reflect informed trading; and
      two-sided behavior may mask long/short asymmetry.
    pre_test_decision: approve_for_testing
