campaign_id: es_rth_intraday_risk_premium
variant_id: late_morning_1100_long
test_run_id: stop_widen_rescue1
strategy_name: calendar_session_bias
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Heston Korajczyk Sadka (2010); Lou Polk Skouras (2019); Urquhart et al. intraday timing evidence
  edge_thesis: ES may retain positive RTH intraday drift after late-morning volatility decays.
  mechanic: Fixed long entry after completed 11:00 ET bar; no tunable entry, stop, or target parameters.
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: This failed variant is receiving its one allowed per-variant rescue after the user clarified that every failed variant may be rescued once.
  rescue_constraints: Same core edge, entry module, setup mode, direction/time window, timeframe, stop module, target module, costs, data window, and stage criteria. Only existing fixed parameters or tunable parameter space are changed.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_rth_intraday_risk_premium/late_morning_1100_long entry mechanic: Fixed long entry after completed 11:00 ET bar; no tunable entry, stop, or target parameters..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_rth_intraday_risk_premium
    source_variant_id: late_morning_1100_long
    source_run_id: rescue1
    source_config_path: campaigns/es_rth_intraday_risk_premium/rescue_attempts/parameter_space_rescue_1/late_morning_1100_long/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.005
      new: 0.0075
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.003
      - 0.005
      - 0.007
      new: &id002
      - 0.0045
      - 0.0075
      - 0.0105
