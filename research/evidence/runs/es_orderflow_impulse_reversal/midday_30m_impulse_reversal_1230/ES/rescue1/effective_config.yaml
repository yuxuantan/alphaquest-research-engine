research_metadata:
  academic_source: Johnson (2016); Takahashi (2025); Chordia, Roll, and Subrahmanyam
    (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Extreme same-clock aggressive signed-flow plus same-direction price
    movement may be temporary inventory pressure that mean-reverts after the completed
    impulse.
  mechanic: At 12:30 ET, use the completed rolling 30-minute ES signed-flow rank and
    return. If flow rank and return point the same way, fade that impulse at the next
    1-minute bar open.
  timeframe_rationale: One-minute bars preserve the completed 30-minute signal window,
    next-bar execution, and pessimistic same-bar stop/target handling.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: "This variant expresses the edge as a larger completed\
      \ midday orderflow and price impulse. It requires both an extreme same-clock\
      \ signed-flow rank and a same-direction 30-minute return, then trades against\
      \ the impulse. That is the correct mechanical form if the academic inventory-pressure\
      \ channel creates temporary overshoot instead of durable continuation.\n Rescue\
      \ 1 keeps this exact impulse-reversal mechanic; it only changes the predeclared\
      \ parameter space after the original failed limited core."
    entry_logic_rationale: 'The 12:30 ET slot gives the market time to form a meaningful
      post-open inventory imbalance while still leaving enough same-day time for a
      retracement before the flatten cutoff. The entry uses only completed bars through
      the signal close and is filled at the next 1-minute open.

      '
    stop_loss_rationale: 'A reversal after a 30-minute impulse should fail if price
      extends beyond the completed signal-bar extreme. Using the signal high or low
      plus a small tick offset keeps the stop tied to the exact impulse being faded
      and avoids using future support/resistance or arbitrary percent distance.

      '
    target_exit_rationale: "The fixed-R target tests for a partial midday retracement\
      \ from the impulse extreme. The expected payoff is not a full-day reversal,\
      \ so modest target multiples are more faithful to the hypothesis and reduce\
      \ dependence on late-session path assumptions.\n Rescue 1 shifts the target\
      \ grid toward smaller retracements because the original formulation tested deeper\
      \ retracements and the same thesis can reasonably express as a faster micro-reversion."
    profitability_rationale: 'Midday liquidity is often thinner than the open, so
      a one-sided 30-minute orderflow impulse may produce price pressure that is later
      supplied against by liquidity providers. If that pressure partially unwinds,
      the next-bar fade can earn enough ticks to overcome ES costs while limiting
      risk at the impulse extreme.

      '
    known_failure_modes: 'A midday 30-minute flow impulse may represent real information
      or a persistent trend day, not inventory pressure. The larger window can also
      produce wide signal bars, making the sweep-extreme stop too large for acceptable
      MAR even if raw expectancy is positive.

      '
    pre_test_decision: approve_for_testing
