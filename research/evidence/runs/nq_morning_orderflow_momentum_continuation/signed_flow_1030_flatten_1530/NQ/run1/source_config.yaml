timeframe: 1m
research_metadata:
  academic_source: Gao et al. (2018) intraday momentum plus Cont, Kukanov, and Stoikov (2014) orderflow imbalance.
  edge_thesis: At the completed 10:30 ET first-hour close, trade NQ in the direction of the 09:30-10:30 return only when completed signed imbalance confirms that direction, then hold until 15:30 ET unless stop or target is hit.
  mechanic: Completed first-hour NQ return plus completed aggregate signed-volume confirmation, next-bar entry, fixed percent stop, fixed-R target, and 15:30 ET flatten.
  timeframe_rationale: One-minute bars preserve exact 10:30 ET signal timing, completed source-window aggregation, and stop/target ordering on the native bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: The signal uses only the completed 09:30-10:30 ET NQ source window and completed aggregate signed-volume imbalance before entry.
    entry_logic_rationale: The entry module emits a signal only at the 10:30 ET bar close; the engine handles next-bar execution.
    stop_loss_rationale: The fixed percent-from-entry stop is declared before testing and rounded to NQ tick size.
    target_exit_rationale: The fixed-R target is declared before testing; unresolved trades flatten at 15:30 ET.
    profitability_rationale: A real orderflow-confirmed intraday momentum effect should survive neighboring return, imbalance, stop, and target settings after costs.
    known_failure_modes: First-hour NQ moves can reverse sharply, Sierra aggregate signed-volume is an imperfect aggressor proxy, and a later flatten can add reversal exposure.
    pre_test_decision: approve_for_testing
