research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market profile educational material.
  edge_thesis: Two-sided prior-extreme breakouts may have stronger continuation when
    a prior high or low overlaps true prior-session volume-at-price and larger trade
    participation confirms.
  mechanic: Trade either prior high breakout longs or prior low breakdown shorts through
    15:00 ET with true VAP confluence, completed large10 aggregate flow, footprint
    imbalance, signal-bar stop, and fixed-R target.
  timeframe_rationale: The Sierra footprint and VAP profile fields are built at the
    completed 1-minute bar level, so this variant stays on 1-minute bars and enters
    no earlier than the next bar open.
  mechanics_review:
    mechanic_expresses_edge: The signal requires a prior RTH high or low AOI, proximity
      to a frozen previous-session true volume-at-price level, and same-direction
      large10 aggregate orderflow on the completed breakout bar.
    entry_logic_rationale: Prior VAP and prior high/low levels are available before
      the current session decision, while large10 flow and footprint imbalance are
      read only after the completed signal bar closes.
    stop_loss_rationale: The sweep-extreme stop uses the completed breakout bar high
      or low plus a tunable offset, which is the mechanical invalidation point for
      continuation through the AOI.
    target_exit_rationale: The cost-adjusted fixed-R target keeps reward and risk
      explicit after costs and avoids target selection from later bars, final profile,
      final VWAP, or current-session extremes.
    profitability_rationale: Larger trade participation at true profile confluence
      may identify breakouts with enough inventory support to continue beyond costs
      across adjacent confluence and orderflow thresholds.
    known_failure_modes: Prior extreme breaks can be false breaks, large10 Sierra
      fields are aggregate proxies rather than true large prints, and continuation
      may fail during range-bound or mean-reverting sessions.
    pre_test_decision: approve_for_testing
