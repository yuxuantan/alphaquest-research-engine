campaign_id: es_mes_aligned_flow_continuation
variant_id: late_day60_mes_large20_1500
test_run_id: run1
strategy_name: es_mes_aligned_flow_continuation
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Late-day ES continuation may improve when the prior hour ES move is confirmed by MES large-20 imbalance.
  mechanic: At the completed 15:00 ET signal, require 60-minute ES return and 60-minute MES large-20 imbalance to point in the same direction, then trade ES in that direction.
  timeframe_rationale: The ES/MES feature cache is built on completed 1-minute aligned bars, so the strategy stays on 1-minute bars to preserve feature semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-18"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant tests the strongest MES participation confirmation by
      requiring large-20 MES imbalance to agree with the prior hour ES move. It
      trades ES only after both completed features point in the same direction.
    entry_logic_rationale: >
      The 15:00 ET signal targets late-day continuation while still leaving time
      before the 15:55 flatten. It uses a completed 60-minute ES return and a
      completed 60-minute MES large-20 imbalance, avoiding all future session
      information.
    stop_loss_rationale: >
      The signal-bar extreme stop gives a concrete invalidation level tied to the
      completed bar that confirmed the edge. The offset is the only stop tunable,
      and it does not change the strategy mechanic.
    target_exit_rationale: >
      A fixed-R target tests whether late-day aligned flow can produce enough
      continuation before forced flatten. Exits are independent of later MES flow
      and do not use discretionary session assessment.
    profitability_rationale: >
      This variant should work only if large MES participants confirm late-day ES
      inventory pressure. The pre-PnL density audit showed the strict declared
      corner remains above 80 signals/year in the limited random window.
    known_failure_modes: >
      Late-day signals may be crowded, large-20 MES prints may be semantically
      unstable, and the short remaining holding window may make costs too large
      relative to attainable continuation.
    pre_test_decision: approve_for_testing
