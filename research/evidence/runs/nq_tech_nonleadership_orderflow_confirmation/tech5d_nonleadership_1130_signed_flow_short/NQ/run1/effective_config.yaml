dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Hong, Torous, and Valkanov (2007);
    Cont, Kukanov, and Stoikov (2014); local XLK/SPY Yahoo daily cache
  edge_thesis: When technology-sector relative strength is not in a leadership regime,
    NQ downside continuation should be more plausible only if the current RTH session
    also shows completed aggregate sell-flow confirmation.
  mechanic: At 11:30 ET, short NQ when lagged five-day XLK-minus-SPY rank is not in
    a leadership regime and completed same-session signed aggregate orderflow confirms
    non-accumulation.
  timeframe_rationale: One-minute bars preserve exact completed-bar signal timing,
    next-bar execution, and deterministic stop/target ordering on the native NQ bar
    stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: The variant only trades short when a lagged technology
      non-leadership state and completed same-session NQ orderflow confirmation point
      in the same downside direction.
    entry_logic_rationale: The 11:30 ET expression reuses the strongest state-only
      time window but requires completed NQ orderflow confirmation before entry.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to the
      NQ tick, and varied only through the declared stop_pct grid.
    target_exit_rationale: The fixed-R target is predeclared and unresolved positions
      flatten at the configured same-day time.
    profitability_rationale: If technology non-leadership matters for NQ, completed
      intraday sell-flow confirmation should reduce random-risk drawdowns relative
      to ETF-state-only entries.
    known_failure_modes: The ETF state may be stale, the broad non-leadership threshold
      may be weak, orderflow confirmation may be late, or the result may fail monkey/WFA
      robustness.
    pre_test_decision: approve_for_testing
