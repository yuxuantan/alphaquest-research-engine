timeframe: 1m
research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Campbell, Grossman, and Wang
    (1993); Bouchaud, Farmer, and Lillo (2009)
  edge_thesis: Late-session one-sided trade flow that fails to displace price may
    mark closing inventory absorption before the forced-flat window.
  mechanic: At 15:00 ET, use the completed rolling 30-minute orderflow window. If
    same-clock signed-flow rank is extreme and effort-vs-result rank is high but absolute
    return is small, fade the flow direction at the next 1-minute bar open; flatten
    at 15:45 ET unless stop or target is hit.
  timeframe_rationale: The signal depends on completed rolling 1-minute orderflow
    windows and prior same-clock ranks; 1-minute bars preserve the intended window
    length and next-bar-open execution.
