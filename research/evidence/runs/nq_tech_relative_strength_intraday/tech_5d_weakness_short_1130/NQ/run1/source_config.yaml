timeframe: 1m
research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Hong, Torous, and Valkanov (2007); local XLK/SPY Yahoo daily cache
  edge_thesis: Lagged technology-sector relative strength can proxy Nasdaq-specific risk appetite that may spill into same-day
    NQ RTH returns after the cash open.
  mechanic: At 11:30:00 ET, short NQ when the lagged five-day XLK-minus-SPY return rank is in the lower tail; entry is next
    bar open.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the ETF state
    is already from a prior daily close.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the NQ technology-relative-strength edge through lagged XLK/SPY ranks
      and fixed intraday NQ exposure.
    entry_logic_rationale: The ETF state is from the latest observation available by the prior business day; the signal uses
      the completed configured 1-minute bar and enters no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is declared before NQ PnL testing, rounded to the NQ tick, and varied
      only through the predeclared stop_pct grid.
    target_exit_rationale: The fixed-R target is declared before NQ PnL testing and kept at or above 1.5R in the grid, avoiding
      exits selected from future intraday highs/lows, final VWAP, or post-entry ETF data.
    profitability_rationale: A real technology-relative-strength spillover should survive neighboring ETF-rank, stop, and
      target settings after costs and robustness tests.
    known_failure_modes: The daily ETF state may be stale, may be absorbed by the NQ open, may invert during macro rotation
      regimes, or may fail monkey/WFA robustness.
    pre_test_decision: approve_for_testing
