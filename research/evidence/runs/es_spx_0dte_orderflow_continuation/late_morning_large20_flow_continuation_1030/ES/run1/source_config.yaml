research_metadata:
  academic_source: Brogaard, Han, and Won (2023); Cboe (2024); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: SPX 0DTE sessions may create directional ES hedging pressure when a completed intraday ES source window has both price movement and same-direction aggregate signed flow.
  mechanic: On non-standard-monthly SPX 0DTE sessions, enter in the direction of the completed 09:30-10:30 ES move only if large20 trade imbalance confirms that direction.
  timeframe_rationale: 1-minute bars preserve the completed first-hour source window and next-bar-open execution at 10:30 ET.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant gives 0DTE pressure a full first hour to reveal itself, then requires the largest trade-size bucket to align with the completed ES move. A trade can occur only when calendar pressure, price movement, and large20 participation agree before entry.
    entry_logic_rationale: The signal waits for the 09:30-10:30 ET source window to close and uses completed bars only. The large20 imbalance and open-to-signal move are known at the signal timestamp, so the engine enters no earlier than the next bar open.
    stop_loss_rationale: A predeclared fixed percent stop is used because the invalidation point is not a precise support/resistance level. It prevents the variant from selecting a post-result level or using future high/low path information.
    target_exit_rationale: The fixed-R target tests whether first-hour 0DTE pressure confirmed by large20 flow has enough same-day continuation to overcome ES costs before the configured flatten time.
    profitability_rationale: If dealer hedging or liquidity demand is strong, it should be visible in both a first-hour directional move and the large20 trade bucket. The density screen showed the strict corner remains above the trade-frequency floor.
    known_failure_modes: Large20 flow may lag price and arrive near exhaustion, later entry can reduce reward-to-risk, and 0DTE directional pressure may reverse into pinning after the first hour.
    pre_test_decision: approve_for_testing
