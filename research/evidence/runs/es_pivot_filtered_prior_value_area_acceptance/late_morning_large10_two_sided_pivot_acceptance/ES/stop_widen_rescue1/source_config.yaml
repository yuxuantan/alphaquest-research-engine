research_metadata:
  academic_source: Osler (2000); Cont, Kukanov, and Stoikov (2014); CME Group market-profile documentation; Lo, Mamaysky,
    and Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Prior-session value-area acceptance may continue when same-direction aggregate orderflow confirms the break
    and carried completed 5/15-minute pivot structure agrees with the acceptance direction.
  mechanic: From 10:00 through 12:30 ET, enter long above prior VAH or short below prior VAL after completed 5-minute acceptance
    with same-direction large10 imbalance, filtered by carried completed 5/15-minute pivot direction.
  timeframe_rationale: 5-minute bars reduce one-minute boundary flicker while preserving next-bar execution. The pivot filter
    builds completed 5/15-minute structure from completed 5-minute bars and carries prior completed pivots across RTH sessions
    without future data.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Late-morning large10 two-sided value-area acceptance with completed pivot bias. The base prior-value
      acceptance module must emit first; the pivot filter cannot create trades and only rejects signals that lack same-direction
      completed structure.
    entry_logic_rationale: From 10:00 through 12:30 ET, enter long above prior VAH or short below prior VAL after completed
      5-minute acceptance with same-direction large10 imbalance, filtered by carried completed 5/15-minute pivot direction.
      Prior VAH/VAL are known only after the prior RTH session, orderflow is read from the completed signal bar, and the engine
      enters at the next bar open or later.
    stop_loss_rationale: The stop remains a percent-from-entry stop rounded to ES tick size. It is tied to actual fill price
      and does not use future swing, future profile, or post-entry orderflow information.
    target_exit_rationale: The target remains a predeclared fixed-R exit with target_r_multiple at or above 1.0R. Unresolved
      positions flatten at the configured intraday cutoff.
    profitability_rationale: This should be profitable only if larger-trade aggregate participation confirms a real migration
      away from prior value after opening noise has settled and the last completed pivot structure supports continuation.
    known_failure_modes: The profile is an OHLCV approximation, value-boundary breaks can be stop probes, pivot structure
      can lag reversals, aggregate flow can mark exhaustion, and costs/slippage can overwhelm short-horizon continuation.
    pre_test_decision: approve_for_testing
    rescue_attempt: 'stop_widen_rescue_1: parameter-only rescue after original run failed staged validation. Entry mechanics,
      value-area approximation, orderflow condition, signal windows, pivot filter, data windows, costs, and target grid are
      unchanged; only stop_pct fixed value/grid is widened from 0.003/[0.002, 0.003, 0.0045] to 0.0045/[0.003, 0.0045, 0.006].'
  pre_pnl_density:
    artifact: research_artifacts/es_pivot_filtered_prior_value_area_acceptance_density_audit_20260620.md
    passed: true
