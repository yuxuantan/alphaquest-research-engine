research_metadata:
  academic_source: Gao et al. (2018) intraday momentum plus Cont, Kukanov, and Stoikov
    (2014) orderflow imbalance.
  edge_thesis: At the completed 10:30 ET first-hour close, trade ES in the direction
    of the 09:30-10:30 return only when completed signed_imbalance confirms that direction,
    then hold until 15:30:00 unless stop or target is hit.
  mechanic: At the completed 10:30 ET first-hour close, trade ES in the direction
    of the 09:30-10:30 return only when completed signed_imbalance confirms that direction,
    then hold until 15:30:00 unless stop or target is hit.
  timeframe_rationale: One-minute bars preserve the archived 10:30 ET signal timing,
    keep the source window completed before entry, and expose intraday stop/target
    conflicts to the engine.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-21'
  mechanics_review:
    mechanic_expresses_edge: At the completed 10:30 ET first-hour close, trade ES
      in the direction of the 09:30-10:30 return only when completed signed_imbalance
      confirms that direction, then hold until 15:30:00 unless stop or target is hit.
      The decision is made only after the source window has closed, so the signal
      expresses the archived edge without using future session highs, lows, VWAP,
      or final daily ranges.
    entry_logic_rationale: The entry module consumes completed bars only, emits a
      signal at the configured signal or breakout close, and leaves execution to the
      engine for the next eligible bar. Session times are explicit America/New_York
      values and the configured max-trades-per-day gate prevents multiple same-day
      attempts.
    stop_loss_rationale: The stop is declared before the run and is either a fixed
      percent-from-entry stop or the fixed archived slot stop carried in signal metadata.
      It is tick-rounded by the stop module and exposed to the engine's same-bar stop-target
      ordering assumptions.
    target_exit_rationale: The profit target is a fixed reward-risk multiple declared
      before testing, with no target below 1.0R. Hard intraday flattening remains
      configured independently so any open position is closed before the prop-rule
      cutoff.
    profitability_rationale: If the archived behavior is genuine rather than a historical
      artifact, neighboring thresholds should remain profitable after commission,
      one tick of slippage, pessimistic fill handling, and walk-forward selection
      from in-sample data only.
    known_failure_modes: The archived late-hold orderflow variant may have been a
      narrow period artifact; Sierra aggregate signed-volume proxies may differ from
      true aggressor-side labels, and late-session holding can concentrate losses
      during reversals.
    pre_test_decision: approve_for_testing
