research_metadata:
  academic_source: Johnson (2016); Takahashi (2025); Chordia, Roll, and Subrahmanyam
    (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Extreme same-clock aggressive signed-flow plus same-direction price
    movement may be temporary inventory pressure that mean-reverts after the completed
    impulse.
  mechanic: At 14:00 ET, use the completed rolling 60-minute NQ signed-flow rank and
    return. If flow rank and return point the same way, fade that impulse at the next
    1-minute bar open.
  timeframe_rationale: One-minute bars preserve the completed 60-minute signal window,
    next-bar execution, and pessimistic same-bar stop/target handling.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: 'This variant tests the impulse-reversal mechanism over
      a full completed hour, requiring the market to show both unusual same-clock
      signed-flow pressure and a same-direction price move. Fading that complete one-hour
      impulse is a direct expression of the inventory-pressure thesis, not a continuation
      or weak absorption setup.

      '
    entry_logic_rationale: 'The 14:00 ET entry point isolates afternoon inventory
      pressure after the morning and lunch periods have resolved. It uses only the
      completed 13:59-14:00 bar and earlier bars, then waits for next-bar execution,
      leaving enough time to observe a same-session correction before the 15:30 flatten.

      '
    stop_loss_rationale: 'The signal-bar extreme is a strict and observable invalidation
      point for a reversal of the completed hourly push. If price continues past that
      extreme after entry, the flow impulse is not being absorbed; the tick offset
      grid simply guards against one-tick noise around that known bar high or low.

      '
    target_exit_rationale: 'The target remains a modest fixed-R retracement because
      the hypothesis is afternoon inventory correction, not a full reversal to an
      unobservable final-session level. This avoids using future VWAP, final range,
      or discretionary level selection after the signal.

      '
    profitability_rationale: 'A one-hour same-direction flow and return impulse can
      create crowded short-term positioning. If liquidity providers or mean-reversion
      traders absorb that pressure, the next-bar fade can capture a retracement large
      enough to overcome costs while limiting risk to the completed impulse extreme.

      '
    known_failure_modes: 'Strong afternoon impulses can be trend-day continuation,
      index rebalance pressure, or macro repricing. The wider 60-minute signal may
      also create large stops and low MAR, and forced flatten may truncate otherwise
      valid reversals before they mature.

      '
    pre_test_decision: approve_for_testing
