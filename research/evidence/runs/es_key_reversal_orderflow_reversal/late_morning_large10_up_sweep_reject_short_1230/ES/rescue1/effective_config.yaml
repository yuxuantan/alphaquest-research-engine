research_metadata:
  academic_source: Lo, Mamaysky, and Wang (2000); Caginalp and Laurent (1998); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: 'Failed upside micro-breaks followed by large10 sell-flow may indicate
    larger participants rejected a local buy probe and initiated a fade.

    '
  mechanic: 'From 10:00 through 12:30 ET, enter short only after a completed 1-minute
    bar sweeps the prior completed 1-minute bar high, closes back below the prior
    close, has a negative body, closes in the lower part of its range, and has negative
    large10 trade-size imbalance.

    '
  timeframe_rationale: 'One-minute bars keep the failed-upside probe local and frequent
    enough for the trade-count gate while still enforcing next-minute execution.

    '
  mechanics_review_required: true
  mechanics_review_version: 2026-06-19-rescue1
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge because the completed
      signal bar must first create a failed local breakout through the immediately
      prior completed one-minute bar extreme and then close back through the prior
      completed close. Orderflow is only a confirmation of reversal participation
      on the same completed bar, so the core signal remains price-action first.

      '
    entry_logic_rationale: 'Short-only direction isolates the failed-upside variant.
      Price must first sweep and reject the prior completed bar high; large10 sell
      imbalance only confirms that the rejection had participation. The entry is fixed
      before testing and can be placed only after the signal bar closes, so next-minute
      execution prevents lookahead from the close, close-location, volume ratio, or
      aggregate flow fields.

      '
    stop_loss_rationale: 'The signal-bar high for shorts or low for longs is the natural
      invalidation point because a move beyond the failed-probe bar means the local
      rejection failed. The stop-offset grid is small, tick-based, and declared before
      testing.

      '
    target_exit_rationale: 'The fixed-R target is a short-horizon reversal payoff
      target tied to the predeclared stop distance. It does not use future session
      highs/lows, VWAP, profile levels, or realized trade path information.

      '
    profitability_rationale: 'It should be profitable only if a completed prior-bar
      sweep followed by close-back, reversal body, strong close location, and same-direction
      aggregate flow identifies liquidity exhaustion or failed breakout pressure often
      enough to overcome ES commission, slippage, next-minute entry, and pessimistic
      fill ordering.

      '
    known_failure_modes: 'The pattern may be random microstructure noise, aggregate
      flow may lag the price rejection, large trade buckets may not proxy informed
      participation, and any edge can disappear under one-tick-worse slippage, entry
      delay, WFA, or prop-rule Monte Carlo checks.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    reason: 'Original run1 had zero profitable limited-core combinations. This rescue
      keeps the same prior-bar key-reversal mechanic and modules, but raises fixed
      close-location and volume-ratio quality thresholds and shifts the stop/target
      grid wider before rerunning.

      '
    forbidden_changes_observed: false
  pre_pnl_density:
    full_history_min_signals_per_year: 136.20 across the rescue declared entry-grid
      corners
    limited_core_random_window_min_signals_per_year: 64.88 across the rescue declared
      entry-grid corners
    artifact: research_artifacts/es_key_reversal_orderflow_reversal_rescue1_density_audit_20260619.md
