test_run_id: run1
strategy_name: volatility_managed_intraday_premium
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Moreira and Muir (2017); Fleming, Kirby, and Ostdiek (2001); Cederburg,
    O Doherty, Wang, and Yan (2020)
  edge_thesis: NQ intraday long exposure may have better risk-adjusted performance
    when lagged realized volatility, range, absolute movement, or downside semivolatility
    is low or falling.
  mechanic: At 13:30 ET, enter long NQ only when the prior-session 20-day downside-semivolatility
    rank is at or below the configured threshold; flatten by 15:55 ET unless stop
    or target is hit.
  timeframe_rationale: The afternoon entry tests whether a low downside-volatility
    state supports positive intraday exposure without using the current session close.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant cannot trade unless the shifted prior-session
      NQ feature state satisfies the declared prior-session 20-day downside-semivolatility
      rank condition.
    entry_logic_rationale: The signal waits until the configured 13:30:00 ET bar is
      complete. The volatility feature row is shifted from completed prior sessions,
      and execution is no earlier than the next 1-minute bar open.
    stop_loss_rationale: Percent-from-entry stop is fixed before testing and rounded
      to the NQ tick. It rejects the long premium exposure if adverse movement exceeds
      the declared risk budget.
    target_exit_rationale: Fixed-R target is declared before testing with no target
      below 1.0R; unresolved trades flatten at 15:55 ET.
    profitability_rationale: A real NQ volatility-managed intraday premium should
      remain profitable across neighboring feature thresholds, stops, and targets
      after costs, random-entry monkey controls, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: Quiet states can reduce opportunity count, the fixed-contract
      intraday approximation may not capture volatility-managed portfolio effects,
      and any edge may concentrate in a few years.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    method: Entry-condition count only on shifted lagged-volatility features; no PnL,
      stop, target, monkey, WFA, Monte Carlo, prop simulation, or holdout result was
      inspected.
    feature_driver: prior-session 20-day downside-semivolatility rank
    density_note: NQ downside20_rank_252 <= 0.25/0.35/0.45 produced about 65/87/113
      candidate sessions per year before execution filters.
    decision: PASS
