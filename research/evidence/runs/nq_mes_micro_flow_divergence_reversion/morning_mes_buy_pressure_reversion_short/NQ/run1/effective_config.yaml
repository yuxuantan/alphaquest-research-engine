campaign_id: nq_mes_micro_flow_divergence_reversion
variant_id: morning_mes_buy_pressure_reversion_short
test_run_id: run1
strategy_name: trade_orderflow_pressure
symbol: NQ
dataset_id: nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); Kaniel, Saar, and Titman (2008); Barber, Odean,
    and Zhu (2009)
  edge_thesis: Completed MES-vs-NQ flow or price divergence may mark broad equity-index
    micro-flow pressure that NQ fades intraday.
  mechanic: At 10:00 ET, go short NQ when completed 09:30-09:59 MES-minus-NQ signed-flow
    imbalance exceeds the threshold, then flatten at 11:31 ET unless stop or target
    is hit.
  source_es_campaign: es_mes_micro_flow_divergence_reversion
  source_es_template: campaigns/es_mes_micro_flow_divergence_reversion/data_refresh_20260617/variants/morning_mes_buy_pressure_reversion_short/config.yaml
  source_selection_rule: Selected before NQ PnL from the strongest ES evidence available
    for this variant; midday uses the ES stop-distance rescue that reached WFA, the
    other variants use the refreshed original mechanics.
  data_caveat: MES is a cross-index micro-flow proxy for NQ; this is not native MNQ
    orderflow.
  no_lookahead_note: Flow features are rolling completed-bar values grouped by session
    date and consumed only at the configured signal time.
  pre_pnl_density_reform:
    reason: Initial NQ signal-density audit failed the >=50 signals/year floor for
      at least one declared grid corner before any NQ PnL was inspected.
    changed: entry.params.flow_threshold grid only; modules, direction, entry/flatten
      time, flow column, stop grid, target grid, costs, data window, and staged gates
      unchanged.
    new_grid: &id001
    - 0.005
    - 0.01
    - 0.015
    - 0.02
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: At 10:00 ET, go short NQ when completed 09:30-09:59 MES-minus-NQ
      signed-flow imbalance exceeds the threshold, then flatten at 11:31 ET unless
      stop or target is hit.
    entry_logic_rationale: The signal uses only completed same-session NQ/MES rolling
      flow or return-divergence features at the configured signal timestamp. The engine
      can enter no earlier than the next bar open.
    stop_loss_rationale: A fixed percent stop is declared before NQ PnL testing, tick-rounded
      by the engine, and evaluated under pessimistic same-bar stop/target ordering.
    target_exit_rationale: The fixed-R target and configured same-day flatten are
      declared before NQ PnL testing and do not use final VWAP, final range, future
      flow, or discretionary exits.
    profitability_rationale: If completed MES pressure is temporary cross-index micro-flow
      rather than durable NQ information, NQ may mean-revert after the flow divergence.
      The final pre-PnL density audit cleared every declared grid corner after threshold-only
      density reformulation.
    known_failure_modes: MES may proxy ES-specific activity, may be informed rather
      than crowded liquidity demand, or may not transfer to NQ after NQ costs and
      volatility. Monkey, WFA, Monte Carlo, incubation, and acceptance gates must
      reject unstable variants.
    pre_test_decision: approve_for_testing
    source_es_template: campaigns/es_mes_micro_flow_divergence_reversion/data_refresh_20260617/variants/morning_mes_buy_pressure_reversion_short/config.yaml
    ported_before_nq_pnl: true
    data_caveat: MES is a cross-index micro-flow proxy for NQ; this is not native
      MNQ orderflow.
  pre_pnl_density:
    initial_artifact: research_artifacts/nq_mes_micro_flow_divergence_reversion_density_audit_20260622.md
    final_artifact: research_artifacts/nq_mes_micro_flow_divergence_reversion_density_audit_final_20260622.md
    status: approved_for_testing
