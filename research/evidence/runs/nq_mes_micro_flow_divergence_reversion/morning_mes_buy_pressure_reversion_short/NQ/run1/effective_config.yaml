strategy:
  entry:
    module: trade_orderflow_pressure
    params:
      setup_mode: morning_mes_buy_pressure_reversion_short
      bar_interval_minutes: 1
      entry_time: '10:00:00'
      flatten_time: '11:31:00'
      flow_column: mes_minus_nq_imbalance_30
      flow_threshold: 0.02
      positive_flow_direction: short
      allow_long: false
      allow_short: true
      return_confirmation: none
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '11:31:00'
