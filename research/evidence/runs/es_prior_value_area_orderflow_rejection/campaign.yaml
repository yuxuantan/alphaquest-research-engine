campaign_id: es_prior_value_area_orderflow_rejection
title: ES Prior Value-Area Orderflow Rejection
decision: TEST
created_at: '2026-06-18'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
edge_family: prior_value_area_orderflow_rejection
hypothesis: Prior-session accepted-value boundaries can act as objective intraday
  support/resistance. A completed probe outside prior VAH/VAL that closes back inside
  the prior value area with counter-direction aggregate orderflow may indicate failed
  acceptance and a return-to-value reversal after next-bar execution.
rationale: This is the failed-break/rejection mirror of prior value-area acceptance,
  not another acceptance continuation test. Price action must first probe beyond a
  frozen prior-session value boundary and then close back inside value on the completed
  signal bar. Aggregate orderflow must point in the rejection direction, and the stop
  is the completed probe-bar extreme.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports intraday support/resistance levels as public reference points
    that can predict trend interruptions and level reactions.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=315660
  relevance: Links technical levels to liquidity provision, supporting a rejection/failed-acceptance
    mechanism around objective value-area boundaries.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  venue: Exchange market profile/liquidity analytics documentation
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supports market-profile style analysis of volume,
    market activity, and liquidity across historical intervals; this campaign adapts
    the completed-profile concept to ES RTH bars.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon pressure proxy. This
    campaign uses completed-bar Sierra aggregate trade-side flow, not quote-depth
    OFI.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline from that local 1-minute source
- prior-session approximate VAH, VAL, and POC computed only after the previous RTH
  session is complete
- signed, large-10, and large-20 aggregate flow columns for completed signal bars
data_quality_caveats:
- The prior value area is approximated by uniformly distributing completed 5-minute
  bar volume across each bar high-low tick range, not by true volume-at-price.
- Sierra aggregate orderflow is completed-bar research data, not LOB OFI or tick-path
  truth.
- Same-bar stop/target conflicts remain governed by pessimistic OHLC handling with
  1-minute detail when available.
lookahead_risks:
- Prior VAH, VAL, and POC are computed only from the previous completed RTH session
  and are frozen before current-session entries.
- The probe, close-back-inside rejection, and orderflow confirmation use only the
  completed 5-minute signal bar.
- Signals generated from a completed bar close are filled no earlier than the next
  bar open by the engine.
- No current-session final high/low, final VWAP, final volume profile, future orderflow,
  or post-entry bars are used.
failure_modes:
- Prior value-area rejection may be too noisy when approximated from OHLCV bars rather
  than true volume-at-price.
- A close back inside value can precede a second breakout rather than a real reversal.
- Aggregate counterflow may identify late capitulation after the reversal already
  happened.
- The effect may concentrate in one side, a volatility regime, or a small number of
  trend days.
- One-tick worse slippage or pessimistic same-bar ordering may erase a narrow return-to-value
  edge.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_prior_value_area_orderflow_acceptance
  - es_opening_range_failed_breakout_orderflow
  - es_prior_session_flip_retest_orderflow
  - es_prior_day_stop_run_reclaim
  - es_prior_level_delta_dislocation
  - es_session_extreme_delta_divergence
  - es_vwap_deviation_orderflow_reversion
  conclusion: 'Eligible as a distinct active campaign because the trigger is failed
    acceptance at frozen prior value-area boundaries: probe beyond VAH/VAL, close
    back inside value, and counterflow on the signal bar. Existing active campaigns
    tested value-area acceptance continuation, opening-range failed breaks, prior
    high/low flip retests, prior-day stop runs, fixed prior-level delta dislocation,
    session extremes, or VWAP deviations rather than prior value-area rejection.'
variants:
- morning_signed_vah_rejection_short
- morning_signed_val_rejection_long
- late_morning_signed_two_sided_rejection
- midday_large10_two_sided_rejection
- afternoon_large20_two_sided_rejection
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change core strategy mechanic
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change prior value-area approximation method
  - add or remove filters after seeing results
  - alter costs, fills, sessions, validation gates, or prop rules
