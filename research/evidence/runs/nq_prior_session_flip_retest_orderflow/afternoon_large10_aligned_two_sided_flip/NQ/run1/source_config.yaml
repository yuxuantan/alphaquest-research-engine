research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Brock, Lakonishok, and LeBaron (1992); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Prior-session highs/lows may flip from resistance to support, or support to resistance, after a completed break and later retest; retest-bar aggregate flow should help distinguish accepted continuation from a weak stop probe.
  mechanic: Afternoon two-sided prior-level flip retest; larger-trade flow must align with the held retest direction.
  timeframe_rationale: The afternoon variant tests whether accepted prior-level flips persist late enough for larger-trade participation to continue before flatten.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This two-sided variant expresses the S/R flip thesis by requiring a completed break beyond the prior RTH high or low, then a later completed retest that holds on the breakout side. The public prior level supplies the price-action boundary and large10 aggregate orderflow supplies retest-bar evidence of same-direction participation before any entry is allowed.
    entry_logic_rationale: The entry does not trade the initial breakout. It records the completed breakout, waits up to the predeclared retest-window parameter for price to return toward the prior level, and signals only after the completed retest bar closes on the accepted side with the predeclared aligned flow condition. Prior-level freshness is not required because S/R flip retests can occur after earlier probes of the same public level. Because the decision uses the retest bar close, the engine can only fill at the next bar open or later.
    stop_loss_rationale: 'The stop is placed beyond the flipped prior-session level using a predeclared tick offset. That is the natural invalidation point: a long retest should not trade back below former resistance, and a short retest should not trade back above former support. The stop module rejects impossible stops that would be on the wrong side of the next-bar entry.'
    target_exit_rationale: The target is fixed-R from the boundary stop distance. It tests whether the level flip produces enough continuation relative to its invalidation risk without using future highs/lows, post-entry orderflow, discretionary level selection, or final session statistics.
    profitability_rationale: If a prior-session level remains flipped into the afternoon, larger-trade aligned flow on the retest should show continuing sponsorship rather than exhausted morning activity. The setup should have enough opportunities because prior-session highs/lows are touched frequently, but the later retest requirement avoids chasing the first stop-run bar.
    known_failure_modes: The variant should fail if the retest is just noisy rotation, if aggregate flow is exhaustion rather than confirmation, if next-bar slippage removes the edge, if same-bar stop/target ordering dominates outcomes, or if profits concentrate in a small number of trend days.
    pre_test_decision: approve_for_testing
  nq_port_provenance:
    source_campaign_id: es_prior_session_flip_retest_orderflow
    source_config_path: campaigns/es_prior_session_flip_retest_orderflow/variants/afternoon_large10_aligned_two_sided_flip/config.yaml
    ported_before_nq_pnl: true
    nq_rescue_authorized: false
  pre_pnl_density:
    artifact: research_artifacts/nq_prior_session_flip_retest_orderflow_density_audit_20260630.md
    status: PASS
