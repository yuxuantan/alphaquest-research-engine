research_metadata:
  academic_source: Barndorff-Nielsen and Shephard (2002); Hollstein and Prokopczuk
    (2018); Huang, Schlag, Shaliastovich, and Thimme (2018)
  edge_thesis: Slow volatility-of-volatility regimes may condition the sign of intraday
    risk compensation, with high uncertainty earning a premium and low uncertainty
    offering less compensation.
  mechanic: 'At 13:30 ET, use the prior 20-session realized volatility-of-volatility
    rank: high rank enters long and low rank enters short; flatten by 15:55 ET unless
    stop or target is hit.'
  timeframe_rationale: 1-minute bars preserve the completed-bar decision time and
    next-bar-open execution while using lagged realized volatility-of-volatility state.
  rescue_status: none
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_realized_vol_of_vol_state_density_audit_20260630.md
    selected_grid_min_signals_per_year: 132.394219
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: 'At 13:30 ET, use the prior 20-session realized volatility-of-volatility
      rank: high rank enters long and low rank enters short. This tests a slow state
      variable without changing direction after seeing results.

      '
    entry_logic_rationale: The signal reads only the shifted prior-session 20-day
      volatility-of-volatility mean rank. The 13:29 completed bar is used as the decision
      clock for a 13:30 signal, and any fill occurs no earlier than the next bar open.
    stop_loss_rationale: A percent-from-entry stop is used because the edge is a lagged
      volatility state rather than a discrete chart level. The stop grid is declared
      before PnL, rounded to the NQ tick, and cannot reference future highs or lows.
    target_exit_rationale: A fixed-R target plus strict 15:55 ET flatten tests whether
      slow volatility-of-volatility regimes can monetize intraday without discretionary
      exits or overnight exposure.
    profitability_rationale: The variant can only work if the high-versus-low slow
      volatility-of-volatility state has asymmetric NQ compensation large enough to
      survive costs, same-bar pessimism, and parameter-neighbour tests.
    known_failure_modes: The ES source family failed; the NQ transfer can fail if
      slow volatility-of-volatility has no directional content, if both tails are
      noisy, if one side dominates and the other offsets it, or if results depend
      on a single threshold.
    pre_test_decision: approve_for_testing
strategy:
  entry:
    module: realized_vol_of_vol_state
    params:
