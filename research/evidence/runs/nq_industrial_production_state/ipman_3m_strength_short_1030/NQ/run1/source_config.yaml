campaign_id: nq_industrial_production_state
variant_id: ipman_3m_strength_short_1030
test_run_id: run1
strategy_name: nq_industrial_production_state
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Fama (1990); Fama and French (1989); FRED IPMAN/INDPRO/CUMFNS
  edge_thesis: Conservatively lagged industrial-production state may identify NQ business-cycle risk-premium or growth-momentum pressure after the cash open.
  mechanic: At 10:30 ET, short NQ when 45-day-lagged manufacturing industrial-production 3-month growth rank is in the upper tail.
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open NQ execution while the macro state is monthly and lagged by 45 calendar days.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  pre_pnl_density:
    artifact: research_artifacts/nq_industrial_production_state_density_audit_20260701.md
    density_basis: rank_min grid [0.55,0.60,0.65]
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: The variant expresses a strong manufacturing-production state as a possible lower expected-return or mean-reversion condition in NQ.
    entry_logic_rationale: The signal reads only FRED monthly observations at least 45 calendar days before the NQ session plus the completed 10:29 ET one-minute bar; same-month releases and post-entry bars are unavailable.
    stop_loss_rationale: A percent-from-entry stop is used because the macro state does not define an intraday structural price level, and only the predeclared stop_pct grid is varied.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten keeps the expression same-day, avoids overnight exposure, and varies only the predeclared target_r_multiple grid.
    profitability_rationale: A real strong-production pressure effect should survive neighboring rank, stop, and target settings after commission, one tick of slippage, and pessimistic same-bar ordering.
    known_failure_modes: The monthly state may be stale, high production can also be risk-on instead of bearish, and FRED current-vintage revisions may differ from point-in-time data.
    pre_test_decision: approve_for_testing
