research_metadata:
  academic_source: Holmberg et al. (2013); Gao et al. (2018); Huth and Abergel (2014);
    Schmidt et al. (2024); Cont et al. (2014)
  edge_thesis: ES opening-range breakout continuation should improve when NQ leads
    ES in the same direction and ES aggregate signed flow confirms the breakout.
  mechanic: rescue1 long-only fixed-parameter narrowing of 30-minute ES opening range
    breakout before 11:30 ET with matched 30-minute NQ leadership and ES signed-flow
    confirmation.
  timeframe_rationale: 1-minute bars preserve exact ES/NQ lead-lag feature timing
    and next-bar-open execution while keeping the opening-range boundary public and
    completed before signals.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the composite edge by first freezing
      the completed 30-minute ES opening range, then trading only a completed close
      outside that range when ES signed-volume imbalance supports the breakout and
      NQ has outpaced ES in the same direction over the completed 30-minute window.
    entry_logic_rationale: The opening-range boundary is unavailable until the first
      30 RTH minutes have completed. Each later completed 1-minute bar through 11:30:00
      ET can trigger at most one ES trade if price closes beyond the frozen boundary,
      ES orderflow is aligned, and the NQ return/gap leadership gate is satisfied.
      Entry is next-bar open, so the signal does not trade on the close it used.
    stop_loss_rationale: The stop uses the opposite opening-range edge with a tunable
      maximum stop cap. If an ES breakout cannot hold the opening auction range after
      NQ and orderflow confirmation, the continuation thesis is invalidated; the cap
      rejects unusually wide ranges with poor prop-style risk geometry.
    target_exit_rationale: The fixed-R target tests whether NQ-led ES breakout continuation
      can pay relative to OR-edge risk without discretionary exits. Forced flatten
      remains intraday and predeclared.
    profitability_rationale: A breakout beyond a public ES opening boundary may reflect
      repricing rather than a stop probe when aggressive ES flow agrees and NQ has
      already moved more strongly in that direction. If cross-index information transfer
      is not exhausted by the next ES bar, the combined confirmation should improve
      expectancy versus ES-only OR breakouts while still producing enough trades for
      WFA.
    known_failure_modes: NQ leadership may be simultaneous rather than predictive,
      ES signed flow can mark exhaustion, OR stops can be wide, and results can concentrate
      in technology-led or crisis sessions. The strategy should be rejected if core
      robustness or WFA does not survive realistic costs and perturbations.
    pre_test_decision: approve_for_testing
    rescue_rationale: 'Single allowed rescue for this failed variant. It preserves
      the same opening-range breakout plus NQ leadership plus ES aggregate orderflow
      continuation mechanic, modules, data, costs, fills, sessions, and validation
      gates. The only mechanic-facing fixed-parameter narrowing is long-only ES breakout
      continuation: original fixed-config evidence showed short breakouts were consistently
      weaker, while long breakouts better match the equity-index drift/continuation
      premise. Parameter grid dimensionality remains unchanged.'
  pre_pnl_density_audit:
    decision: PASS
    artifact: research_artifacts/es_opening_range_nq_orderflow_breakout_rescue1_density_audit_20260619.md
    csv: research_artifacts/es_opening_range_nq_orderflow_breakout_rescue1_density_audit_20260619.csv
    method: Vectorized entry-equivalent long-only signal-count audit over declared
      rescue entry grids; no PnL, stop, target, WFA, monkey, Monte Carlo, or holdout
      result was inspected.
    full_min_signals_per_year: 117.36475337118524
    limited_core_min_signals_per_year: 109.83496441281139
    limited_core_period: 2011-02-22 to 2012-09-06
