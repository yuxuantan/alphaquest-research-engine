campaign_id: es_consumer_sentiment_state_intraday
title: ES Consumer Sentiment State Intraday
decision: FAIL
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged University of Michigan consumer sentiment, used as a public investor-optimism
  proxy, may identify intraday ES risk-premium or over-optimism states after the cash
  open.
rationale: This campaign tests consumer sentiment / investor optimism, not economic
  policy uncertainty, OFR financial stress, Treasury-rate shocks, variance risk premium,
  VVIX tail risk, CFTC positioning, scheduled macro-release drift, ORB, VWAP, prior-level,
  or order-flow persistence.
sources:
- title: 'Consumer Confidence and Asset Prices: Some Empirical Evidence'
  authors: Michael Lemmon and Evgenia Portniaguina
  year: 2006
  venue: Review of Financial Studies 19(4):1499-1529
  link: https://academic.oup.com/rfs/article-abstract/19/4/1499/1580536
  doi: 10.1093/rfs/hhj038
  relevance: Uses consumer confidence as an investor-optimism proxy and studies its
    relationship with asset prices and stock-return premia.
- title: Consumer Confidence and Stock Returns
  authors: Meir Statman, Kenneth L. Fisher, and Deniz Anginer
  year: 2004
  venue: Journal of Portfolio Management 30(1):115-127
  link: https://www.pm-research.com/content/iijpormgmt/30/1/115
  relevance: Reports that high consumer confidence is followed by lower stock returns,
    motivating upper-tail short and lower-tail long variants.
- title: 'University of Michigan: Consumer Sentiment (UMCSENT)'
  authors: University of Michigan via FRED, Federal Reserve Bank of St. Louis
  year: 2026
  venue: FRED official data page
  link: https://fred.stlouisfed.org/series/UMCSENT
  relevance: Official public monthly consumer-sentiment series used for the lagged
    ES session features.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- free public University of Michigan Consumer Sentiment series from FRED
- derived session feature file using only observations at least 45 calendar days before
  each ES session
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- UMCSENT is a monthly survey index, not an intraday market microstructure feed.
- FRED notes the data is delayed by one month at the request of the source; this campaign
  uses a 45-calendar-day lag.
- Monthly values may be revised; using a 45-day lag reduces but does not fully replicate
  historical vintages.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using the current monthly survey value before publication would leak unavailable
  information; forbidden.
- Signals use only a completed ES bar at the configured timestamp and lagged sentiment
  state.
- Rolling ranks are computed on monthly observations before merging to ES sessions.
- No final session high/low, final VWAP, future returns, or post-entry sentiment values
  are used.
failure_modes:
- Consumer-sentiment asset-pricing evidence may be stronger for small stocks than
  broad ES futures.
- Monthly sentiment may be too slow for same-day intraday timing.
- Low sentiment can represent recession risk rather than an immediately tradable risk
  premium.
- High sentiment can persist in equity bull markets, making short variants unstable.
- Performance may concentrate in crisis or post-crisis windows.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_epu_policy_uncertainty_intraday
  - es_ofr_financial_stress_intraday
  - es_treasury_rate_shock_intraday
  - es_vvix_tail_risk_intraday
  - es_variance_risk_premium_intraday
  - es_volatility_managed_intraday_premium
  - es_bls_macro_release_day_drift
  - es_fomc_pre_announcement_drift
  conclusion: Not a duplicate of active failed campaigns. This tests consumer-confidence
    / investor-optimism state, not policy uncertainty, market stress, rate shocks,
    volatility-of-volatility, variance risk premium, realized volatility management,
    or scheduled event drift.
feature_construction:
  builder: tools/build_es_consumer_sentiment_features.py
  sentiment_source: https://fred.stlouisfed.org/graph/fredgraph.csv?id=UMCSENT
  sentiment_cache: data/external/fred_umcsent_consumer_sentiment_1952_2026.csv
  output: data/external/es_consumer_sentiment_features_20110103_20260609.csv
  rows: 3817
  valid_rank_rows: 3817
  lookahead_control: latest UMCSENT observation on or before session_date - 45 calendar
    days
session_assumptions:
  timezone: America/New_York
  rth_start: 09:30:00
  rth_end: '15:59:00'
  no_overnight_positions: true
  latest_variant_flatten: '15:55:00'
parameter_space:
  upper_tail_thresholds:
  - 0.55
  - 0.6
  - 0.65
  lower_tail_thresholds:
  - 0.45
  - 0.4
  - 0.35
  stop_pct:
  - 0.0015
  - 0.0025
  - 0.004
  target_r_multiple:
  - 1.0
  - 1.5
  - 2.0
  combinations_per_variant: 27
variants:
- low_sentiment_long_1000
- high_sentiment_short_1030
- rising_sentiment_long_1130
- falling_sentiment_short_1200
- low_sentiment_ma_long_1330
rescue_policy:
  rescue_scope: failed_variant
  max_rescue_attempts_per_failed_variant: 1
  allowed_changes:
  - fixed parameters inside existing strategy modules
  - tunable parameter space only
  forbidden_changes:
  - core strategy mechanic
  - UMCSENT availability lag rule
  - setup mode
  - direction
  - entry time
  - entry module
  - stop-loss module
  - take-profit or exit module
  - edge thesis
  - stage criteria
  - data window
  - timeframe
  - costs or fill assumptions
outcome:
  completed_at: '2026-06-16'
  decision: FAIL
  terminal_stage: limited_core_grid_test
  original_runs: 5
  rescue_runs: 5
  summary: All five original consumer-sentiment variants failed limited_core_grid_test.
    Each failed variant received exactly one parameter-space-only rescue, preserving
    the same 45-calendar-day UMCSENT availability lag, setup mode, direction, entry
    time, entry module, stop module, take-profit module, timeframe, data window, costs,
    and validation gates. All five rescues also failed limited_core_grid_test; the
    best rescue was high_sentiment_short_1030/rescue1 with profitable-combo rate 0.07407407407407407,
    zero benchmark-passing combinations, top net 140.0, PF 1.1454545454545455, and
    only 12 top-combo trades. No run reached monkey, WFA, WFA OOS monkey, Monte Carlo,
    simulated incubation, or frozen validation.
  aggregate_report: backtest-campaigns/es_consumer_sentiment_state_intraday/campaign_test_summary.json
