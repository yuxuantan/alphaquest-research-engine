timeframe: 5m
research_metadata:
  academic_source: Huang and Kilic (2019), Journal of Financial Economics; GC=F/PL=F daily futures closes
  edge_thesis: Strict-prior gold/platinum ratio states may proxy for tail-risk or disaster-risk premia that affect same-day
    NQ risk appetite.
  mechanic: At 11:30 ET, long NQ when the five-day gold/platinum ratio change rank is low and completed NQ RTH return since
    the open is strong.
  timeframe_rationale: Five-minute bars are sufficient for fixed daily external-state entries while keeping completed-bar
    next-bar execution auditable.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: At 11:30 ET, long NQ when the five-day gold/platinum ratio change rank is low and completed NQ
      RTH return since the open is strong.
    entry_logic_rationale: The gold/platinum state is known only from strict-prior daily futures closes; the configured NQ
      entry bar must be complete before a signal can emit.
    stop_loss_rationale: Percent-from-entry stop is used because a daily external risk state has no natural intraday NQ invalidation
      level.
    target_exit_rationale: Fixed-R target plus same-day flatten tests intraday expression while forbidding overnight exposure.
    profitability_rationale: A falling ratio plus NQ morning strength can express easing tail-risk pressure and risk-on continuation.
    known_failure_modes: The published gold/platinum effect is lower-frequency and may not survive intraday same-day testing
      after costs.
    pre_test_decision: approve_for_testing
