research_metadata:
  academic_source: Johnson (2016); Takahashi (2025); Chordia, Roll, and Subrahmanyam (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Extreme same-clock aggressive signed-flow plus same-direction price movement may be temporary inventory pressure that mean-reverts after the completed impulse.
  mechanic: At 14:00 ET, use the completed rolling 60-minute ES signed-flow rank and return. If flow rank and return point the same way, fade that impulse at the next 1-minute bar open.
  timeframe_rationale: One-minute bars preserve the completed 60-minute signal window, next-bar execution, and pessimistic same-bar stop/target handling.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: 'This variant tests the impulse-reversal mechanism over a full completed hour, requiring the market to show both unusual same-clock signed-flow pressure and a same-direction price move. Fading that complete one-hour impulse is a direct expression of the inventory-pressure thesis, not a continuation or weak absorption setup.

      '
    entry_logic_rationale: 'The 14:00 ET entry point isolates afternoon inventory pressure after the morning and lunch periods have resolved. It uses only the completed 13:59-14:00 bar and earlier bars, then waits for next-bar execution, leaving enough time to observe a same-session correction before the 15:30 flatten.

      '
    stop_loss_rationale: 'The signal-bar extreme is a strict and observable invalidation point for a reversal of the completed hourly push. If price continues past that extreme after entry, the flow impulse is not being absorbed; the tick offset grid simply guards against one-tick noise around that known bar high or low.

      '
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics are unchanged, while any existing target_r_multiple below 1.0R is raised to 1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: 'A one-hour same-direction flow and return impulse can create crowded short-term positioning. If liquidity providers or mean-reversion traders absorb that pressure, the next-bar fade can capture a retracement large enough to overcome costs while limiting risk to the completed impulse extreme.

      '
    known_failure_modes: 'Strong afternoon impulses can be trend-day continuation, index rebalance pressure, or macro repricing. The wider 60-minute signal may also create large stops and low MAR, and forced flatten may truncate otherwise valid reversals before they mature.

      '
    pre_test_decision: approve_for_testing
  mechanics_review_version: '2026-06-19'
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_orderflow_impulse_reversal
    source_variant_id: afternoon_60m_impulse_reversal_1400
    source_run_id: run1
    source_config_path: campaigns/es_orderflow_impulse_reversal/variants/afternoon_60m_impulse_reversal_1400/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.5
      - 0.75
      - 1.0
      target_grid_values_below_1r:
      - 0.5
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.0
      top_target_is_grid_max: true
      higher_target_net_slope: 545.6018518518522
      higher_target_pf_slope: 0.22552920367088725
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: strategy.tp.params.target_r_multiple
      old: 0.75
      new: 1.0
    - path: strategy.entry.params.target_r_multiple
      old: 0.75
      new: 1.0
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.5
      - 0.75
      - 1.0
      new: &id002
      - 1.0
