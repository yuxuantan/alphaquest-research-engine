campaign_id: nq_intraday_periodicity_persistence
title: NQ Intraday Periodicity Persistence
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Same-clock NQ half-hour return tendencies may persist across nearby sessions. If prior same-slot
  rolling mean return is sufficiently positive or negative, the next occurrence of that slot may continue
  in the same direction after costs.
rationale: This is a direct NQ transfer of the ES intraday periodicity persistence family before any NQ
  PnL inspection. It is distinct from unconditional RTH drift, opening-range setups, late-day momentum,
  signed-orderflow persistence, and daily reversal because it conditions only on prior sessions returns
  for the exact same half-hour clock slot.
sources:
- title: Intraday Patterns in the Cross-Section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: Journal of Finance, 65(4), 1369-1407
  doi: 10.1111/j.1540-6261.2010.01573.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2010.01573.x
  relevance: Documents intraday return continuation at exact same-clock intervals; this campaign tests
    whether a related same-slot effect transfers to NQ futures.
- title: Intraday Patterns in the Cross-Section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: SSRN working paper
  link: https://ssrn.com/abstract=1509466
  relevance: Public working-paper version describing same-clock intraday return continuation and related
    volume/imbalance patterns.
data_needs:
- NQ Sierra RTH 1-minute OHLCV bars in America/New_York
- NQ same-clock slot feature CSV built from prior-session-only rolling slot returns
- same-session slot-end flatten and next-bar-open execution
feature_construction:
  source_builder: tools/build_es_intraday_periodicity_features.py with NQ input/output paths
  source: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
  output: data/external/nq_intraday_periodicity_features_20110103_20260612.csv
  rows: 19065
  lookahead_control: shift(1) within each slot excludes the current session slot return
lookahead_risks:
- Current-session slot returns must never be used to form the signal.
- Rolling same-clock means are shifted one session inside each slot.
- Signals use the completed one-minute bar ending at the configured entry time and enter next bar open.
- The strategy flattens at the predeclared slot boundary and uses no final session high/low, VWAP, volume
  profile, or daily range.
