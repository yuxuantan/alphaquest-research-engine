  - es_intraday_periodicity_persistence
  conclusion: Eligible as a separate NQ campaign because it tests conditional prior same-clock slot return
    persistence, not unconditional fixed-time exposure, current-day momentum, orderflow persistence, or
    daily reversal. ES periodicity is prior cross-instrument evidence, not an NQ test.
