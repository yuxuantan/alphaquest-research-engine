research_metadata:
  academic_source: Heston, Korajczyk, and Sadka (2010)
  edge_thesis: Prior sessions' same-clock 10:30:00-11:00:00 NQ return mean may predict the next 10:30:00-11:00:00
    slot direction.
  mechanic: At 10:30 ET, trade NQ in the sign of the prior same-slot rolling mean return and flatten by
    11:00 ET.
  timeframe_rationale: 1-minute NQ bars enforce next-bar-open execution after the completed-bar slot signal
    and allow slot-boundary flattening.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses same-clock intraday return persistence: only prior
      occurrences of the same half-hour slot form the signed mean-return signal for the current slot.'
    entry_logic_rationale: Feature construction shifts same-slot returns by one session inside each slot,
      so the current slot return is excluded. The entry module checks the completed one-minute bar ending
      at the configured entry time and enters at the next bar open.
    stop_loss_rationale: A percent-from-entry stop is used because the edge is slot-return persistence
      rather than a structural level. The stop grid is identical across all five NQ variants.
    target_exit_rationale: Fixed-R targets and hard slot-end flattening test whether the same-clock tendency
      monetizes inside the intended half-hour window without overnight exposure.
    profitability_rationale: If recurring same-clock liquidity demand or inventory transfer persists in
      NQ, prior slot mean return should forecast the next slot direction often enough to overcome costs.
    known_failure_modes: The stock cross-sectional anomaly may not transfer to NQ futures, the effect
      may be too noisy after costs, or performance may concentrate in one slot/regime.
    pre_test_decision: approve_for_testing
  nq_port_provenance:
    source_campaign_id: es_intraday_periodicity_persistence
    source_config_path: campaigns/es_intraday_periodicity_persistence/variants/morning_1030_slot_persistence/config.yaml
    source_run_role: ES original variant config, ported before any NQ PnL inspection
    nq_feature_csv: data/external/nq_intraday_periodicity_features_20110103_20260612.csv
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
