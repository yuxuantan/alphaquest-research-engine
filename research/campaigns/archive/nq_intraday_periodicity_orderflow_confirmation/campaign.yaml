campaign_id: nq_intraday_periodicity_orderflow_confirmation
title: NQ Intraday Periodicity With Aggregate Orderflow Confirmation
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: nq_intraday_periodicity_orderflow_confirmation
hypothesis: Same-clock NQ intraday return tendencies may persist across nearby sessions
  when the immediately preceding completed NQ orderflow window confirms the prior-slot
  direction.
rationale: This is an NQ-specific expression of the Heston-Korajczyk-Sadka intraday
  periodicity anomaly with one ex-ante orderflow confirmation condition. It is not
  a generic weekday, overnight, opening gap, LETF rebalance, or raw orderflow momentum
  strategy.
sources:
- title: Intraday Patterns in the Cross-Section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2010.01573.x
  relevance: Documents same-clock intraday return continuation at half-hour intervals
    using only prior occurrences of the same intraday interval.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  relevance: Supports orderflow imbalance as a short-horizon price-pressure proxy.
    This campaign uses completed Sierra aggregate trade-side flow, not full-depth
    OFI.
data_needs:
- local Sierra NQ RTH one-minute OHLCV and aggregate orderflow bars
- prebuilt NQ intraday periodicity feature CSV with prior-session-only same-slot rolling
  means
- completed pre-entry source-window signed, large10, and large20 imbalances
lookahead_risks:
- Same-clock return means are shifted one occurrence within each slot; the current
  slot return is never used for its own signal.
- Orderflow confirmation uses only completed bars before the entry timestamp.
- Signals use bar close and engine execution must occur no earlier than the next bar
  open.
- No final session high/low, final VWAP, future orderflow, or future slot return is
  used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_morning_orderflow_momentum_continuation
  - nq_spx_0dte_orderflow_confirmation
  - nq_leveraged_etf_rebalance_pressure
  - nq_calendar_weekday_bias
  - es_intraday_periodicity_orderflow_confirmation
  conclusion: Eligible as an NQ-specific test because no active NQ campaign has tested
    prior-session-only same-clock slot persistence with a single completed NQ orderflow
    confirmation window.
feature_construction:
  builder: tools/build_es_intraday_periodicity_features.py
  source: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
  output: data/external/nq_intraday_periodicity_features_20110103_20260612.csv
  lookahead_control: shift(1) within each slot excludes the current session slot return
