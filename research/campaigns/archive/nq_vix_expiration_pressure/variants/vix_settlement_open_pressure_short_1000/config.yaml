campaign_id: nq_vix_expiration_pressure
variant_id: vix_settlement_open_pressure_short_1000
test_run_id: run1
strategy_name: vix_expiration_pressure
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Griffin and Shams (2018); Cboe VIX options specifications; Alexander and Korovilas (2012)
  edge_thesis: Monthly VIX futures/options settlement can create transitory SPX option demand, volatility-hedging
    pressure, and post-settlement unwind that may spill into NQ through broad equity-index risk hedging and Nasdaq
    beta exposure.
  mechanic: On the VIX settlement session, enter short NQ at 10:00:00 ET next-bar open and flatten by 15:55 ET.
  timeframe_rationale: A 1-minute completed-bar calendar signal preserves deterministic next-bar-open execution
    on predeclared VIX settlement calendar dates and avoids overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: 'This NQ port preserves the ES VIX settlement-pressure setup family: setup_mode=vix_settlement_open_pressure_short,
      signal_type=vix_expiration_session, direction=short, signal_time=10:00:00, and same-day flatten by 15:55 ET.
      The calendar dates are deterministic before the session and do not use NQ outcomes.'
    entry_logic_rationale: Entry logic is unchanged from the selected ES source config except for the NQ execution
      leg and NQ dataset/economics. No NQ PnL was inspected before authoring.
    stop_loss_rationale: The percent-from-entry stop grid is copied from the ES source family and declared before
      NQ PnL inspection; it tests event-day noise tolerance without changing calendar date, timing, direction, or
      entry module.
    target_exit_rationale: The fixed-R target grid is copied from the ES source family and declared before NQ PnL
      inspection; exits remain same-day with configured forced flatten.
    profitability_rationale: If VIX settlement creates equity-index hedging pressure or unwind effects, high-beta
      NQ may show a tradable intraday directional response after costs.
    known_failure_modes: The event count is low, direction may depend on unobserved VIX option/futures positioning,
      the spillover may be ES-specific, and any apparent profit may be concentrated in a few settlement cycles.
    pre_test_decision: approve_for_testing
  pre_pnl_event_density: PENDING; see research_artifacts/nq_vix_expiration_pressure_event_density_audit_20260630.md
    after audit.
  source_run_report: backtest-campaigns/es_vix_expiration_pressure/vix_settlement_open_pressure_short_1000/ES/run1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_vix_expiration_pressure
    source_config_path: campaigns/es_vix_expiration_pressure/variants/vix_settlement_open_pressure_short_1000/config.yaml
    ported_before_nq_pnl: true
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
