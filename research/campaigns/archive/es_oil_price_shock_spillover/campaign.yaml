campaign_id: es_oil_price_shock_spillover
title: ES Oil Price Shock Spillover
created_at: "2026-06-17"
decision: FAIL
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged crude-oil price shocks may spill into same-day ES RTH returns through inflation, real-income, production-cost, and risk-appetite channels.
rationale: This campaign tests free public EIA WTI and Brent daily spot prices mapped to ES sessions with a conservative two-business-day availability lag. It is not a Treasury-rate, credit-stress, option-volatility, put/call, consumer-sentiment, daily ES momentum, or local orderflow campaign.
sources:
  - title: Oil and the Stock Markets
    authors: Charles M. Jones and Gautam Kaul
    year: 1996
    venue: Journal of Finance 51(2), 463-491
    doi: 10.1111/j.1540-6261.1996.tb02691.x
    link: https://doi.org/10.1111/j.1540-6261.1996.tb02691.x
    relevance: Documents that oil-price shocks affect aggregate stock-market cash flows and returns, motivating a predeclared ES spillover test.
  - title: The Impact of Oil Price Shocks on the U.S. Stock Market
    authors: Lutz Kilian and Cheolbeom Park
    year: 2009
    venue: International Economic Review 50(4), 1267-1287
    doi: 10.1111/j.1468-2354.2009.00568.x
    link: https://doi.org/10.1111/j.1468-2354.2009.00568.x
    relevance: Shows U.S. stock-market response depends on the source and direction of oil shocks, supporting separate WTI, Brent, volatility, and spread variants.
  - title: Cushing, OK WTI Spot Price FOB
    authors: U.S. Energy Information Administration
    year: 2026
    venue: Official EIA XLS
    link: https://www.eia.gov/dnav/pet/hist_xls/RWTCd.xls
    relevance: Free public daily WTI spot-price source.
  - title: Europe Brent Spot Price FOB
    authors: U.S. Energy Information Administration
    year: 2026
    venue: Official EIA XLS
    link: https://www.eia.gov/dnav/pet/hist_xls/RBRTEd.xls
    relevance: Free public daily Brent spot-price source.
data_needs:
  - timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
  - free public EIA WTI and Brent daily spot-price files
  - derived session feature file using only oil observations on or before session date minus two business days
  - same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
  - EIA spot-price series are daily exogenous observations, not intraday crude futures prices.
  - The two-business-day availability lag is deliberately conservative and may understate information available from contemporaneous crude futures trading.
  - Sierra ES data is aggregated bar-level data, not tick-path data.
  - Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
  - Same-day oil observations are forbidden.
  - Feature construction maps each ES session to the latest EIA oil observation on or before the session date minus two business days.
  - Rolling ranks are computed over lagged session features only.
  - Signals use only a completed ES bar at the configured timestamp and enter at the next bar open.
  - No final session high/low, final VWAP, future oil value, future returns, or post-entry data is used.
failure_modes:
  - Oil-shock effects in the source literature may operate over daily or longer horizons, not intraday ES holds.
  - The response to oil shocks is regime-dependent and may flip between supply, demand, inflation, and growth interpretations.
  - EIA spot-price publication lag may make the signal stale relative to tradable crude futures prices.
  - Any apparent edge may be concentrated in crisis energy shocks or a few inflation regimes.
  - Oil-state signals may overlap with broad macro stress but still fail after ES costs, slippage, and WFA selection.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_treasury_rate_shock_intraday
    - es_ofr_financial_stress_intraday
    - es_variance_risk_premium_intraday
    - es_vvix_tail_risk_intraday
    - es_cboe_put_call_sentiment_intraday
    - es_consumer_sentiment_state_intraday
    - es_epu_policy_uncertainty_intraday
    - es_daily_time_series_momentum
    - es_signed_orderflow_persistence
    - es_nq_cross_index_lead_lag
  conclusion: Not a duplicate of active failed campaigns. This campaign uses lagged crude-oil price shocks from public EIA WTI/Brent spot series, not interest-rate shocks, credit stress, option sentiment/volatility, survey sentiment, policy uncertainty, ES own momentum, or local orderflow.
