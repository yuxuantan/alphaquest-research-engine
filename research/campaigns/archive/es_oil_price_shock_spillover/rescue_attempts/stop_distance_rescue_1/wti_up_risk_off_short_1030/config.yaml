research_metadata:
  academic_source: Jones and Kaul (1996); Kilian and Park (2009); EIA WTI/Brent spot prices
  edge_thesis: Lagged crude-oil price shocks may spill into same-day ES intraday risk appetite.
  mechanic: Rescue attempt 1 tests stricter upside WTI shock thresholds with wider stop/target space; the original short oil-spike mechanic is unchanged. At 10:30 ET, short ES when lagged WTI has an upside shock rank, testing risk-off or inflation-cost pressure from oil spikes.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the EIA oil state is already lagged by two business days.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_oil_price_shock_spillover/wti_up_risk_off_short_1030 entry mechanic: Rescue attempt 1 tests stricter upside WTI shock thresholds with wider stop/target space; the original short oil-spike mechanic is unchanged. At 10:30 ET, short ES when lagged WTI has an upside shock rank, testing risk-off or inflation-cost pressure from oil spikes..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_oil_price_shock_spillover
    source_variant_id: wti_up_risk_off_short_1030
    source_run_id: methodology_fix_rerun1
    source_config_path: /tmp/alphaquest_methodology_fix_reruns/es_oil_price_shock_spillover__wti_up_risk_off_short_1030__methodology_fix_rerun1.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0045
      new: 0.00675
    - path: strategy.entry.params.stop_pct
      old: 0.0045
      new: 0.00675
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.003
      - 0.0045
      - 0.006
      new: &id002
      - 0.0045
      - 0.00675
      - 0.009
