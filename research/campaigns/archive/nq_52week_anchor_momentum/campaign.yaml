campaign_id: nq_52week_anchor_momentum
title: NQ 52-Week Anchor Momentum
status: failed_limited_core_grid_test
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: 'NQ may inherit a futures-index version of 52-week-high anchoring: completed
  prior 252-session highs act as salient reference points, so near-high continuation
  may persist intraday after completed-bar confirmation.'
expected_mechanism: The 252-session high is computed only from completed prior RTH
  sessions. Intraday triggers test whether fresh completed-bar pressure releases anchoring/friction
  around that reference without using future daily highs/lows.
sources:
- title: The 52-Week High and Momentum Investing
  authors: Thomas J. George and Chuan-Yang Hwang
  year: 2004
  journal: Journal of Finance
  doi: 10.1111/j.1540-6261.2004.00695.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2004.00695.x
  working_paper_pdf: https://www.bauer.uh.edu/tgeorge/papers/gh4-paper.pdf
data_needs:
- NQ RTH 1-minute OHLCV/orderflow cache resampled to completed 5-minute bars.
- At least 252 completed prior RTH sessions before any signal is eligible.
lookahead_risks:
- The current session is excluded from the 252-session anchor calculation.
- Signals are emitted only after a completed 5-minute bar; entry is next bar open
  or later in the staged engine.
- No final session high, low, close, VWAP, volume profile, or future anchor value
  is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_daily_time_series_momentum
  - nq_daily_short_term_reversal
  - nq_chartfanatics_weekly_stage_breakout_bias
  - nq_market_structure_pivot_trend_bias
  - nq_prior_session_breakout_orderflow_confirmation
  - nq_round_number_orderflow_barrier
  conclusion: Proceed as a distinct edge before PnL because the explanatory state
    is nearness to the completed prior 252-session high, not a trailing return, weekly
    stage score, prior-session benchmark, or psychological round number.
variants:
- near_high_opening_drive_long_1000
