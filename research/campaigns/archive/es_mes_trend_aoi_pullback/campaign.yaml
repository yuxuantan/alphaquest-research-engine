data_needs:
- Derived local cache joining ES/MES participation-crowding features with true prior VAP, overnight, and footprint fields
  by timestamp.
- Prior RTH high/low computed by feature_set from completed sessions only.
- Opening range high/low available only after the opening range has closed.
- Prior ES trend window ending before the MES pullback window begins.
data_quality_caveats:
- MES participation is a smaller-contract crowding proxy, not account-classified retail data.
- Sierra signed-volume and footprint fields are completed-bar research features, not full depth-of-book or queue reconstruction.
- True VAP fields are prior-session cached levels and do not include current-session final profile information.
- Any passing result would remain a candidate requiring manual chart and independent data-source review.
lookahead_risks:
- Prior trend window ends before the pullback/MES lookback window begins.
- Prior VAP and prior RTH levels are shifted from completed sessions before current-session use.
- Opening-range levels are unavailable until all opening-range bars have closed.
- MES rank, ES return, signed volume, and footprint fields use completed bars only; entry is no earlier than the next one-minute
  open.
- No current-session final VWAP, final profile, future daily range, or future orderflow is used.
