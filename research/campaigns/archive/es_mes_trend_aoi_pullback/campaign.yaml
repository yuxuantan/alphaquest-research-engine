title: ES MES Trend AOI Pullback
decision: FAIL
created_at: '2026-06-22'
instrument: ES
timeframe: 1m
edge_family: trend_aligned_mes_crowding_pullbacks_at_market_generated_and_true_vap_aois
hypothesis: High MES smaller-contract participation during a countertrend ES pullback into a predefined market-generated or
  true volume-profile AOI may mark crowded weak-hand pressure; a completed reclaim/reject bar that rejoins the prior completed
  ES trend may produce short-horizon continuation in ES.
variant_count_decision: Five variants selected. Eight-variant expansion was rejected before PnL because standalone prior-extreme,
  LVN, and value-area-only mechanics were too sparse in the strict pre-PnL density screen.
