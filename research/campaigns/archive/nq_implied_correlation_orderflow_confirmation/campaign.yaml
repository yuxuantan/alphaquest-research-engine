campaign_id: nq_implied_correlation_orderflow_confirmation
title: NQ Implied Correlation With Completed Orderflow Confirmation
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: cboe_implied_correlation_nq_orderflow_confirmation
hypothesis: Lagged SPX implied-correlation stress states may transmit broad-index risk pressure into NQ only when completed same-session NQ orderflow confirms downside pressure.
rationale: This is a distinct composite after the state-only NQ implied-correlation campaign failed WFA. The new edge does not trade the Cboe state alone; every signal requires completed NQ aggregate or large-lot flow confirmation before entry.
sources:
- title: 'The Price of Correlation Risk: Evidence from Equity Options'
  authors: Joost Driessen, Pascal Maenhout, and Grigory Vilkov
  year: 2009
  venue: Journal of Finance
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2009.01467.x
  relevance: Motivates option-implied correlation as a priced marketwide risk state.
- title: Option-Implied Correlations and the Price of Correlation Risk
  authors: Joost Driessen, Pascal Maenhout, and Grigory Vilkov
  year: 2013
  venue: SSRN working paper
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2166829
  relevance: Documents option-implied correlation and correlation-risk premia distinct from variance risk.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as short-horizon pressure evidence; this campaign uses completed-bar Sierra aggregate flow, not quote-level OFI.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/nq_cboe_implied_correlation_features_20110103_20260612.csv
- completed NQ RTH one-minute aggregate signed-volume and large-lot fields
lookahead_risks:
- Cboe implied-correlation observations are strictly lagged before the NQ session date.
- The NQ flow confirmation gate uses only completed RTH bars through the signal bar close.
- Entry is emitted at the signal-bar close and filled no earlier than the next-bar boundary by the staged engine.
- No same-day Cboe close, final NQ session high/low, final VWAP, future orderflow, or post-entry return is used.
failure_modes:
- Daily implied-correlation states may be too slow for intraday NQ.
- High implied correlation can indicate stress but direction may invert without dealer-position sign information.
- Sierra aggregate flow may confirm exhaustion rather than informed pressure.
- The state may still fail WFA even if limited core and monkey improve.
