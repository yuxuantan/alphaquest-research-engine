research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market-profile documentation
  edge_thesis: Prior-session approximate POC can behave like an accepted-value liquidity magnet. When NQ remains below that POC after the open but a completed morning bar starts moving up with positive aggregate signed flow, the market may continue repricing back toward prior accepted value.
  mechanic: Long only from 09:35 through 11:30 ET. Use the completed prior RTH session to freeze approximate POC, require the current session to open below that POC, require the completed 5-minute signal bar to close below POC by the configured distance, move up by at least one tick, and show positive signed-volume imbalance.
  timeframe_rationale: Five-minute bars reduce one-minute flicker around an approximate profile level while still giving next-bar entry close to the initiation bar. The morning window targets the first reassessment of prior accepted value after the cash open.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the POC magnet edge by using only the prior completed RTH session to define the POC, then looking for price to remain below that level while the current completed bar begins moving back toward it. The level is the price-action anchor and signed_volume only confirms that buyers participated in the turn.
    entry_logic_rationale: The signal is evaluated only after a completed 5-minute bar close from 09:35 through 11:30 ET. It requires current-session open below prior POC, close still below prior POC by the configured minimum distance, at least one tick of upward movement during the signal bar, and positive signed-volume imbalance at or beyond the configured threshold. The engine enters at the next bar open, so the signal close is not filled retroactively.
    stop_loss_rationale: The sweep_extreme stop sits below the signal-bar low minus the configured tick offset. That invalidates the long thesis when price rejects the attempted move back toward POC and resumes the low-side auction instead of accepting the return toward prior value.
    target_exit_rationale: The cost-adjusted fixed-R target uses a declared reward-risk multiple of at least 1.0 after commission and slippage inputs. It avoids a sub-1R scalp that fees can dominate, while unresolved positions are force-flattened at 15:55 ET.
    profitability_rationale: This should be profitable only if morning displacement below prior POC often contains inventory or liquidity imbalance that is corrected once buyers initiate back toward prior accepted value. The full five-variant NQ campaign failed the pre-PnL density screen, so staged PnL was not run. This variant remains part of the declared family and cannot be promoted by dropping sparse sibling variants after seeing density results.
    known_failure_modes: Trend days can keep price below prior POC all session, the OHLCV profile approximation may misplace POC, signed-volume imbalance can lag price, and a tight signal-bar stop can be vulnerable to noisy retests or one-tick worse slippage.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: min_poc_distance_ticks=12 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/nq_prior_poc_orderflow_magnet_density_audit_20260630.md
