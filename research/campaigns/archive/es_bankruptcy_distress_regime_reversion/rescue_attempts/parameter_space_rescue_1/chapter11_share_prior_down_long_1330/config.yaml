research_metadata:
  academic_source: Campbell, Hilscher, and Szilagyi (2008); Vassalou and Xing (2004);
    U.S. Courts Table F-2 bankruptcy filings
  edge_thesis: Realized bankruptcy/default-distress regimes may condition short-horizon
    ES intraday reversal because aggregate distress changes risk appetite, dealer
    balance-sheet tolerance, and compensation demanded after prior-session directional
    moves.
  mechanic: Enter long at the completed 13:30 ET 5-minute bar when Chapter 11 share
    of filings is elevated and the prior ES RTH session closed down.
  timeframe_rationale: 5-minute RTH bars keep the quarterly distress feature aligned
    to completed-bar next-open execution and same-day forced flattening; entries are
    late morning or early afternoon to avoid open-only noise.
  feature_audit: research_artifacts/es_bankruptcy_distress_regime_reversion_feature_audit_20260616.json
  invalid_run1_reason: run1 limited-core first-window sample started before shared
    high-distress feature coverage; zero-trade artifacts are data-window checks, not
    economic evidence. Corrected run2 changes only start_date to first shared signal-coverage
    regime.
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: Only threshold and stop/target parameter space inside existing modules
    changed; mechanics, data window, timeframe, costs, and gates retained.
  rescue_rationale: Broaden to neighboring median-through-upper-tail bankruptcy feature
    thresholds and shifted stop/target values without changing the distress-regime
    thesis.
strategy:
  entry:
    module: bankruptcy_distress_reversion
    params:
      feature_file: data/external/uscourts_bankruptcy_f2_quarterly_features.csv
      feature_name: chapter11_share_pct
      operator: '>='
      threshold: 1.4143413485118217
      direction: long
      entry_time: '13:30:00'
      bar_interval_minutes: 5
      max_trades_per_day: 1
      prior_return_filter: down
      stale_after_days: 180
      stop_pct: 0.006
      target_r_multiple: 1.75
      flatten_time: '15:55:00'
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.006
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.75
  flatten_time: '15:55:00'
