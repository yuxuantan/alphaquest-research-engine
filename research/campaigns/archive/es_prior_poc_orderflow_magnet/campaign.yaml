campaign_id: es_prior_poc_orderflow_magnet
title: ES Prior POC Orderflow Magnet
decision: FAIL
created_at: '2026-06-20'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Prior-session point of control, approximated from completed RTH OHLCV profile data, can act as an objective intraday liquidity magnet. When ES remains on one side of that prior POC but a completed bar starts moving back toward it with same-direction aggregate orderflow, the next short-horizon move may continue toward prior accepted value.
rationale: This is a price-action-first aggregate-orderflow campaign. The prior RTH session creates a frozen POC before the current session starts; current-session price must still be meaningfully displaced from that POC, then show completed-bar initiation back toward it. Aggregate orderflow is a confirmation filter only, not the primary edge.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Shows intraday support/resistance levels can have statistically significant predictive content; this campaign uses the prior-session POC as an objective support/resistance-like accepted-value reference.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics, 12(1), 47-88
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Documents the price-impact role of order-flow imbalance; this campaign uses completed-bar Sierra signed-volume imbalance as a coarse aggregate participation proxy, not true LOB OFI.
- title: Do Investors Place Orders to Exploit Technical Analysis?
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Journal of Finance, 59(3), 1395-1427
  link: https://doi.org/10.1111/j.1540-6261.2004.00665.x
  relevance: Connects technical price levels with liquidity provision and order placement; this campaign tests whether a prior accepted-value level can attract intraday flow.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  venue: Exchange market profile/liquidity analytics documentation
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supports market-profile style analysis of volume, market activity, and liquidity across historical intervals; this campaign adapts the concept to ES completed RTH bars.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline from that local 1-minute source
- prior-session approximate POC computed only after the previous RTH session is complete
- signed, large-10, and large-20 aggregate flow columns for completed signal bars
data_quality_caveats:
- Sierra aggregate orderflow is completed-bar research data, not LOB OFI or tick-path truth.
- The POC is approximated by distributing each completed 5-minute bar volume uniformly across its high-low tick range; this is not true volume-at-price.
- Same-bar stop/target conflicts remain governed by pessimistic OHLC handling with 1-minute detail when available.
- large10 and large20 fields are Sierra aggregate proxies, not vendor-equivalent large-print truth.
lookahead_risks:
- Prior POC is computed only from the previous completed RTH session and is frozen before current-session entries.
- A signal uses the completed 5-minute bar close and the engine enters at the next bar open or later.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
- All variants flatten same-day before the configured cutoff and do not hold overnight.
failure_modes:
- Prior POC may be too imprecise when approximated from OHLCV bars instead of true volume-at-price.
- Price can remain displaced from prior POC during trend days, so the magnet thesis may repeatedly fade valid continuation.
- Aggregate signed flow may lag price or misclassify participation direction.
- Profits may concentrate in a small number of high-volatility sessions.
- One-tick worse slippage may erase any narrow mean-reversion edge.
