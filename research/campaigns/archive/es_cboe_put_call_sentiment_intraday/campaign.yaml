campaign_id: es_cboe_put_call_sentiment_intraday
title: ES Cboe Put/Call Sentiment Intraday
decision: FAIL
created_at: "2026-06-16"
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged public Cboe put/call volume imbalance can proxy option-market
  directional demand or sentiment pressure that may spill into same-day ES RTH
  returns after the cash open.
rationale: This campaign tests option-volume imbalance from completed prior Cboe
  sessions. It is not an implied-volatility/variance-risk-premium campaign, not
  VVIX volatility-of-volatility, not VIX settlement calendar pressure, not
  consumer survey sentiment, and not an ES price/action pattern.
sources:
  - title: The Information in Option Volume for Future Stock Prices
    authors: Jun Pan and Allen M. Poteshman
    year: 2006
    venue: Review of Financial Studies 19(3), 871-908
    link: https://doi.org/10.1093/rfs/hhj024
    relevance: Shows option volume put/call measures contain information about
      future equity returns, motivating a predeclared test of aggregate Cboe
      put/call imbalance as an ES directional state.
  - title: Cboe Equity Volume and Put/Call Ratios
    authors: Cboe Global Markets
    year: 2026
    venue: Official Cboe CSV
    link: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/equitypc.csv
    relevance: Free public daily equity-option volume and put/call ratio source.
  - title: Cboe Index Volume and Put/Call Ratios Archive
    authors: Cboe Global Markets
    year: 2026
    venue: Official Cboe CSV
    link: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/indexpcarchive.csv
    relevance: Free public daily index-option volume and put/call ratio source.
  - title: Cboe Total Volume and Put/Call Ratios
    authors: Cboe Global Markets
    year: 2026
    venue: Official Cboe CSV
    link: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/totalpc.csv
    relevance: Free public daily total Cboe option volume and put/call ratio source.
data_needs:
  - timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
  - free public Cboe equity/index/total put-call ratio CSVs
  - derived session feature file using only Cboe observations strictly before the ES session date
  - same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
  - Cboe states the volume and put/call ratio data is provided for convenience
    and may use preliminary volume.
  - Equity volume methodology changed in 2012 when exchange-traded products were
    excluded from equity option products.
  - Cboe put/call ratios are completed daily summaries, not intraday option-flow
    observations.
  - Sierra data is aggregated bar-level data, not tick-path data.
  - Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
  - Using same-day Cboe put/call volume would leak unavailable end-of-day data;
    this campaign forbids it.
  - Signals use only a completed ES bar at the configured timestamp plus lagged
    Cboe daily ratios from strictly prior Cboe trade dates.
  - Rolling ranks are computed over lagged session features only.
  - No final session high/low, final VWAP, future returns, or post-entry option
    volume is used.
failure_modes:
  - Single-name option-volume predictability may not transfer to aggregate ES
    futures returns.
  - Public put/call ratios may be too noisy versus buyer-initiated open-buy
    option volume used in the source paper.
  - Aggregate put/call extremes may behave contrarian in some regimes and
    directional in others, failing parameter stability.
  - Cboe methodology changes and preliminary-volume caveats may make results
    fragile or unsuitable for promotion.
  - The edge may require overnight exposure, which this intraday campaign forbids.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_variance_risk_premium_intraday
    - es_vvix_tail_risk_intraday
    - es_vix_expiration_pressure
    - es_consumer_sentiment_state_intraday
    - es_epu_policy_uncertainty_intraday
    - es_ofr_financial_stress_intraday
    - es_market_plumbing_liquidity_capacity
    - es_realized_skewness_reversal
    - es_realized_jump_variation_premium
  conclusion: Not a duplicate of active failed campaigns. This tests lagged
    Cboe option volume put/call imbalance, not option-implied variance, VVIX,
    deterministic VIX settlement dates, macro/survey sentiment, systemic stress,
    dealer-lending/VX OI plumbing proxies, or realized higher moments.
