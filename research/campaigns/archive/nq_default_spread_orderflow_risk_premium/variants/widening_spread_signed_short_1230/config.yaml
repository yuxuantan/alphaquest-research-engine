timeframe: 5m
research_metadata:
  academic_source: Fama and French (1989); Keim and Stambaugh (1986); FRED DAAA/DBAA; Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: Fresh widening in the lagged default spread can proxy deteriorating credit conditions;
    NQ shorts are only allowed when completed NQ movement and signed flow confirm risk-off pressure.
  mechanic: High default-spread-change rank gates short-only NQ continuation with negative signed-volume
    confirmation.
  timeframe_rationale: Five-minute bars let the credit-pressure state interact with morning NQ selling
    before a same-day flatten.
  pre_pnl_density: FAILED pre-PnL NQ density audit; min full-history density 7.1897 signals/year
    and min latest-252 count 4. See research_artifacts/nq_default_spread_orderflow_risk_premium_density_audit_20260623.md.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the risk-off side of the default-spread edge: the
      lagged one-day default-spread change rank must be high, NQ must be down from its RTH open, and cumulative
      signed volume must be negative before a next-bar short entry.

      '
    entry_logic_rationale: 'The entry does not assume every high spread is bullish. It isolates fresh
      widening as deteriorating credit pressure, then requires completed NQ price and orderflow confirmation
      at 10:00 through 12:30 ET.

      '
    stop_loss_rationale: The rescue tests wider percent stops because original top rows frequently sat
      at the widest tested stop, which suggests the declared signal may need more intraday noise tolerance
      without changing its economic trigger.
    target_exit_rationale: The fixed-R target logic and target grid are intentionally unchanged. All tested
      target_r_multiple values are at least 1.0R, so the corrected RR rule permits no TP widening; any
      rescue effect must come from entry-threshold and stop-distance robustness.
    profitability_rationale: If default-spread widening captures current credit deterioration, NQ sessions
      with aligned selling pressure should have negative intraday continuation after costs.
    known_failure_modes: Credit spreads can lag equity futures, widening may already be priced overnight,
      and short signals may be unstable in rebound regimes.
    pre_test_decision: reject_pre_pnl_density
  rescue_reason: Original best rows favored the upper credit-spread-change threshold with weak-to-moderate
    negative flow and failed on drawdown/concentration, so the rescue keeps the risk-off mechanic while
    testing adjacent threshold strictness and wider stops.
  rescue_constraints: Same default-spread/orderflow edge, entry module, setup mode, flow bucket, signal
    times, timeframe, data window, costs, stop module, target module, target grid, flatten rule, prop
    rules, and validation gates. Only existing credit threshold, orderflow threshold, and stop-distance
    fixed values/parameter grids are changed. TP is unchanged because all target_r_multiple values are
    already >= 1.0R.
  source_run_report: backtest-campaigns/es_default_spread_orderflow_risk_premium/widening_spread_signed_short_1230/ES/rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_default_spread_orderflow_risk_premium
    source_config_path: campaigns/es_default_spread_orderflow_risk_premium/rescue_attempts/parameter_space_rescue_1/widening_spread_signed_short_1230/config.yaml
    source_run_role: ES parameter-space rescue config, ported before any NQ PnL inspection
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
