  failure_reason: All five original variants failed. Each failed variant received exactly one parameter-space-only rescue that widened stop distance while preserving entry mechanics, macro thresholds, signal time, flow column, TP grid, data, costs, sessions, and gates. The best rescue, import_disinflation_large20_long_1200/rescue1, passed limited core with profitable-combo rate 0.9259259259259259 and 13 benchmark-passing combinations, but failed limited monkey/stress because the max-drawdown beat rate was 0.49333333333333335, below the required 0.90, despite net-profit beat rate 0.9066666666666666. No run reached WFA, WFA OOS monkey, Monte Carlo, simulated incubation, frozen validation, or candidate reporting. TP was not adjusted because all target_r_multiple values were already >= 1.0R.
