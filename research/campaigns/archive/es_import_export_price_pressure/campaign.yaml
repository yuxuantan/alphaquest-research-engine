  target_reward_risk_floor: 1.0
  paid_data_downloaded: false
variants:
- import_disinflation_signed_long_1030
- import_disinflation_large20_long_1200
- import_disinflation_large20_long_1430
- core_pressure_signed_short_1100
- core_pressure_large20_short_1200
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change core economic edge
  - change timeframe or data window
  - add or remove filters after seeing results
  - alter costs, fills, sessions, validation gates, or prop rules
  - use any target_r_multiple below 1.0
  - widen an already valid target_r_multiple at or above 1.0R as a rescue
  attempts:
  - id: parameter_space_rescue_1
    status: completed
    decision: FAIL
    scope: per_failed_variant
    reason: All five original variants failed. Each failed variant received one stop-distance-only parameter-space rescue. Four rescues failed limited core; import_disinflation_large20_long_1200/rescue1 passed limited core but failed limited monkey/stress. No run reached WFA or later.
    configs:
