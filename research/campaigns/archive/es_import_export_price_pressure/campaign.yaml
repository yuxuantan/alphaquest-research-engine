  source_cache_import_exfuel: data/external/fred_import_price_exfuel_irexfuels_2001_2026.csv
  source_cache_export_all: data/external/fred_export_price_all_iq_1983_2026.csv
  output: data/external/es_import_export_price_pressure_features_20110103_20260609.csv
  availability_rule: monthly observation date plus 51 calendar days
