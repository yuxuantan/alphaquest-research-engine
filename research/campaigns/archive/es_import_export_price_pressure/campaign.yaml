    - campaigns/es_import_export_price_pressure/rescue_attempts/parameter_space_rescue_1/core_pressure_signed_short_1100/config.yaml
    - campaigns/es_import_export_price_pressure/rescue_attempts/parameter_space_rescue_1/import_disinflation_large20_long_1200/config.yaml
    - campaigns/es_import_export_price_pressure/rescue_attempts/parameter_space_rescue_1/import_disinflation_large20_long_1430/config.yaml
    - campaigns/es_import_export_price_pressure/rescue_attempts/parameter_space_rescue_1/import_disinflation_signed_long_1030/config.yaml
    summary: backtest-campaigns/es_import_export_price_pressure/campaign_test_summary.json
