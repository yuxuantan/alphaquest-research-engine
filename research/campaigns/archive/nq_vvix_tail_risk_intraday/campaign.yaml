campaign_id: nq_vvix_tail_risk_intraday
title: NQ VVIX Tail Risk Intraday
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe VVIX and VVIX/VIX states may identify NQ intraday risk pressure
  or relief because volatility-of-volatility captures equity option tail-risk hedging
  demand that can spill into high-beta Nasdaq futures.
expected_mechanism: High or rising VVIX should reflect greater demand for convexity
  and tail protection, pressuring NQ intraday; low or falling VVIX should reflect
  relaxed tail-risk demand and allow NQ risk appetite. An elevated VVIX/VIX ratio
  tests vol-of-vol stress beyond VIX level alone.
why_it_may_apply_to_nq: VVIX is SPX-options based rather than Nasdaq-specific, so
  it is a broad-equity risk-state proxy. It may still apply to NQ because NQ has high
  broad-equity beta and typically reprices strongly when option hedging stress or
  volatility convexity demand changes.
rationale: This campaign is an NQ execution-leg port of the strongest remaining ES
  VVIX evidence. The source grids are selected from ES evidence before NQ PnL inspection,
  and no NQ rescue attempt is authorized unless the user explicitly allows one.
sources:
- title: Volatility-of-Volatility and Tail Risk Hedging Demand
  authors: Park and related VVIX tail-risk literature
  year: 2013
  venue: Practitioner and academic volatility-risk research
  link: https://www.cboe.com/us/indices/dashboard/vvix/
  relevance: Motivates VVIX as a volatility-of-volatility and tail-risk demand proxy.
- title: Cboe VVIX Index Historical Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe volatility-index data
  link: https://www.cboe.com/us/indices/dashboard/vvix/
  relevance: Official source for VVIX daily observations used in this campaign.
- title: Cboe VIX Index Historical Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe volatility-index data
  link: https://www.cboe.com/tradable-products/vix/
  relevance: Official source for VIX daily observations and the VVIX/VIX ratio state.
data_needs:
- timezone-aware NQ RTH 1-minute OHLCV bars in America/New_York
- official free Cboe VVIX and VIX daily historical CSVs
- derived session feature file using only Cboe observations strictly before the NQ
  session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- VVIX and VIX are daily closing SPX option-implied indices, not intraday option snapshots.
- Same-day Cboe closes are unavailable to intraday NQ signals and must not be used.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using the Cboe close from the same NQ session date would leak unavailable data and
  is forbidden.
- Signals use only a completed NQ bar at the configured timestamp and lagged Cboe
  daily VVIX/VIX state.
- Rolling ranks are computed over the lagged session feature sequence only.
- No final session high/low, final VWAP, future returns, or post-entry VVIX/VIX values
  are used.
failure_modes:
- VVIX literature may not transfer from option or volatility risk premia to same-day
  NQ futures direction.
- Tail-risk pressure may be priced before RTH or reverse intraday.
- Performance may concentrate in crisis windows and fail WFA.
- The signal may overlap with broad VIX-regime edges already rejected on NQ.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_cboe_vix_term_structure_intraday
  - nq_cboe_vxn_vix_dispersion_intraday
  - nq_cboe_implied_correlation_intraday
  - nq_volatility_managed_intraday_premium
  conclusion: Not a duplicate of active failed NQ campaigns. This tests VVIX volatility-of-volatility
    and VVIX/VIX ratio states, not VIX maturity term structure, VXN/VIX dispersion,
    implied correlation, or realized-volatility state.
