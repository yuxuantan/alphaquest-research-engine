research_metadata:
  academic_source: Baker, Bloom, Davis, Kost, Sammon, and Viratyosin (2020) infectious-disease
    EMV tracker; FRED INFECTDISEMVTRACKD daily series
  edge_thesis: Lagged infectious-disease equity-market-volatility news intensity may
    mark NQ risk-off pressure or post-shock risk-premium rebound behavior.
  mechanic: At 13:30 ET, buy NQ when the 7-calendar-day-lagged 21-day infectious-disease
    EMV rank is elevated, testing a same-day risk-premium rebound expression; flatten
    by 15:55 ET unless stop or target is hit.
  timeframe_rationale: One-minute bars provide deterministic completed-bar timing
    and next-bar-open execution while the infectious-disease EMV state is daily and
    conservatively lagged.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the same disease-uncertainty edge
      as a rebound/risk-premium branch after the morning cash-session adjustment rather
      than a morning risk-off branch.
    entry_logic_rationale: The infectious-disease EMV state comes from a feature table
      that requires a 7-calendar-day availability lag, and the intraday signal is
      emitted only on the completed one-minute bar ending at the configured entry
      time, so entry can occur no earlier than the next bar open.
    stop_loss_rationale: The percent stop is declared before any PnL inspection, rounded
      to the NQ tick by the engine, and evaluated under the existing pessimistic same-bar
      stop-target ordering.
    target_exit_rationale: The fixed-R target and 15:55 ET flatten are declared before
      testing and do not depend on final VWAP, final session range, future EMV values,
      or discretionary exits.
    profitability_rationale: If disease-news uncertainty raises intraday risk premia
      that partially mean-revert after the morning adjustment, long exposure later
      in the session should survive the staged gates.
    known_failure_modes: The signal may be stale under the conservative lag, may be
      absorbed before RTH, may overlap broader volatility regimes, or may concentrate
      in COVID-era windows and fail robustness.
    data_availability_caveat: FRED marks the daily series as updated daily; any pass
      requires manual review of real-time historical availability before promotion.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_infectious_disease_emv_state_density_audit_20260701.md
    status: passed_before_pnl
strategy:
  entry:
    module: infectious_disease_emv_state
    params:
      setup_mode: high_21d_emv_rebound_long
      feature_csv: data/external/nq_infectious_disease_emv_features_20110103_20260612.csv
      state_name: infectious-disease EMV 21-day level
      value_column: infect_emv_21d
      rank_column: infect_emv_21d_rank_252
      emv_rank_threshold: 0.45
      entry_time: '13:30:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '15:55:00'
rescue_policy:
  allowed: false
  reason: No rescue is authorized after staged results without explicit user approval.
