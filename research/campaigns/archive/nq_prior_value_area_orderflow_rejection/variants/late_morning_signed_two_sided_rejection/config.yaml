research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); CME market profile documentation; Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: Prior-session NQ accepted-value boundaries, approximated from completed RTH OHLCV, can
    reject failed probes when liquidity provision and completed aggregate counterflow push price back
    inside value.
  mechanic: late-morning two-sided rejection of prior value boundaries with signed aggregate counterflow
    between 10:30:00 and 12:30:00; enter at the next 5-minute bar open after the completed rejection bar.
  timeframe_rationale: Five-minute bars reduce one-minute noise around approximate value-area boundaries
    while retaining next-bar execution and using 1-minute detail for pessimistic same-bar stop/target
    ordering where available.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses NQ prior value-area rejection by requiring late-morning
      two-sided rejection of prior value boundaries with signed aggregate counterflow. The NQ prior VAH/VAL
      are frozen from the previous completed RTH session, and the trade only fires after the current completed
      bar probes outside value and closes back inside with counterflow, which is the actual failed-acceptance
      mechanism.
    entry_logic_rationale: The entry uses only completed 5-minute NQ bars. Prior VAH/VAL/POC are computed
      from the previous completed RTH session and frozen before the current session. A trade can only
      fire after the current completed bar probes outside value, closes back inside value, and shows counterflow;
      the engine then enters no earlier than the next bar open.
    stop_loss_rationale: The signal-bar high for VAH rejection shorts or signal-bar low for VAL rejection
      longs is the natural invalidation point because continuation beyond the completed probe means value
      rejection failed. The stop-offset grid is predeclared and tied to observable NQ ticks.
    target_exit_rationale: The fixed-R target and variant flatten time are predeclared. No final VWAP,
      final range, final volume profile, or discretionary post-entry exit is used.
    profitability_rationale: If frozen prior value-area boundaries attract liquidity and a failed outside
      probe traps breakout traders, completed counterflow back into value should produce a repeatable
      short-horizon NQ reversal after next-bar execution and costs.
    known_failure_modes: The value-area profile is an OHLCV approximation, not true volume-at-price; boundary
      probes can become second breakouts; aggregate orderflow can lag price; NQ may behave differently
      from ES; one-tick worse slippage or pessimistic same-bar ordering can erase a small reversal edge.
    pre_test_decision: approve_for_testing
    source_es_template: campaigns/es_prior_value_area_orderflow_rejection/variants/late_morning_signed_two_sided_rejection/config.yaml
    ported_before_nq_pnl: true
  mechanics_review_version: '2026-06-30'
  nq_port_provenance:
    source_campaign_id: es_prior_value_area_orderflow_rejection
    source_config_path: campaigns/es_prior_value_area_orderflow_rejection/variants/late_morning_signed_two_sided_rejection/config.yaml
    ported_before_nq_pnl: true
    nq_rescue_authorized: false
