timeframe: 5m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: ES may continue in the direction of completed multi-timeframe intraday trend structure when same-bar aggregate orderflow confirms direction.
  mechanic: At the 14:30 ET completed bar, require 30-minute and 60-minute HH/HL for longs or LH/LL for shorts, plus aligned large-10 signed-flow imbalance.
  timeframe_rationale: 5-minute bars keep the price-action state completed and auditable while preserving enough intraday observations for one daily signal and 1-minute detail conflict handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by using broad 30-minute and 60-minute completed price-action structure late in the session, then requiring large-10 aggregate flow to confirm that the trend still has participation. It is a late-day continuation test, not a closing imbalance or overnight exposure strategy.

      '
    entry_logic_rationale: 'The 14:30 ET signal leaves enough time for a same-day continuation leg while avoiding the final minutes where flatten constraints dominate fills. The completed 14:25-14:30 bar supplies the final trend and flow evidence, and the engine enters only on the next bar open.

      '
    stop_loss_rationale: 'A percent stop keeps the invalidation rule independent of any future swing and avoids introducing new level mechanics after the signal. The stop grid tests realistic ES intraday risk widths while preserving the declared trend-plus-flow trigger.

      '
    target_exit_rationale: 'The fixed-R target checks whether late-day trend/orderflow alignment can produce enough reward before the forced flatten. It avoids discretionary profit-taking and makes all exits auditable through the staged runner.

      '
    profitability_rationale: 'This should be profitable only if late-day broad trend alignment plus large-10 aggressive flow captures continuation pressure before the close. The pre-PnL density audit showed all declared entry corners above roughly 54 trades per year, satisfying the frequency gate before testing.

      '
    known_failure_modes: 'The setup can fail if late-day continuation is already crowded, if large-10 orderflow reflects urgent but exhausted liquidity demand, or if there is insufficient time left before 15:55 ET for the fixed-R target to resolve.

      '
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_trend_aligned_orderflow_continuation
    source_variant_id: late_day_30_60_large10_trend_flow_1430
    source_run_id: run1
    source_config_path: campaigns/es_trend_aligned_orderflow_continuation/variants/late_day_30_60_large10_trend_flow_1430/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0015
      - 0.0025
      - 0.0035
      new: &id002
      - 0.00225
      - 0.00375
      - 0.00525
