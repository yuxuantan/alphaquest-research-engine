campaign_id: es_market_structure_pivot_trend_bias
title: ES completed swing-pivot multi-timeframe market-structure trend bias
decision: FAIL
created_at: '2026-06-20'
instrument: ES
market_timezone: America/New_York
edge_family: market_structure_pivot_trend_bias
hypothesis: ES should show same-session continuation when the latest confirmed swing-pivot sequence across multiple intraday
  horizons shows a higher-high/higher-low uptrend or lower-high/lower-low downtrend. The signal is deliberately delayed until
  pivots are confirmed by right-side bars, then entered no earlier than the next bar open.
sources:
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: 'Uses algorithmic local extrema to define technical patterns and test whether price patterns contain information
    beyond random walks. This campaign uses a simpler extrema sequence: confirmed swing highs/lows forming HH/HL or LH/LL.'
- title: Simple Technical Trading Rules and the Stochastic Properties of Stock Returns
  authors: William Brock, Josef Lakonishok, and Blake LeBaron
  year: 1992
  venue: Journal of Finance
  link: https://doi.org/10.1111/j.1540-6261.1992.tb04681.x
  relevance: Documents that trading-range breakout rules have statistical content in equity-index data. This supports testing
    price-level structure rules, but does not by itself validate this ES intraday implementation.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Shows trend continuation across futures markets at longer horizons. This campaign tests whether a completed intraday
    pivot-state proxy is strong enough after ES costs and same-day flatten rules.
- title: A Century of Evidence on Trend-Following Investing
  authors: Brian Hurst, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2017
  venue: AQR white paper
  link: https://www.aqr.com/Insights/Research/Journal-Article/A-Century-of-Evidence-on-Trend-Following-Investing
  relevance: Provides robust practitioner evidence that trend-following has persisted across many markets. This is supporting
    context only; the campaign still must pass the local staged ES methodology.
rationale: The first fixed-time draft was rejected before PnL because signal density was below 50 trades/year. This reformulation
  still tests the same edge, but acts when a completed multi-timeframe pivot bias first appears inside a predeclared time
  window. A long is allowed only when the latest four alternating pivots imply higher high and higher low; a short is allowed
  only when they imply lower high and lower low. Ambiguous, mixed, or insufficient structure means no trade.
data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- 5-minute strategy bars aggregated from local 1-minute RTH Sierra bars
- 1-minute detail data for higher-timeframe stop/target conflict handling
lookahead_risks:
- A swing pivot is not usable until the configured right-side confirmation bars are complete.
- The current higher-timeframe bucket is used only after its close time has passed; incomplete buckets do not define pivots.
- Signals generated from completed bars are filled at the next bar open or later by the engine.
- No final session high, low, VWAP, volume profile, or future orderflow is used.
- Same-bar stop/target conflicts use 1-minute detail data when available and pessimistic fallback otherwise.
failure_modes:
- Confirmed pivots may lag so much that continuation is exhausted before entry.
- Intraday HH/HL and LH/LL states may be common but not predictive after ES commissions and slippage.
- The effect may exist only on high-volatility days and fail profit-concentration checks.
- Generic percent stops may not match swing-structure invalidation.
- The latest locked holdout may reject apparent trend persistence from earlier regimes.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_trend_aligned_orderflow_continuation
  - es_trend_filtered_mes_participation_crowding
  - es_trend_filtered_prior_session_breakout_orderflow
  - es_vwap_pullback_continuation
  - es_opening_range_orderflow_breakout
  conclusion: Eligible only as a reformulated market-structure edge because existing trend-aligned active campaigns used block
    high/low or return-trend proxies and/or orderflow confirmation. This campaign uses confirmed swing-pivot sequences as
    the primary and only entry edge.
