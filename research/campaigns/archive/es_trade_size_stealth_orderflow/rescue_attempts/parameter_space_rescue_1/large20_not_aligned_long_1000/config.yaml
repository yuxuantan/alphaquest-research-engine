campaign_id: es_trade_size_stealth_orderflow
variant_id: large20_not_aligned_long_1000
test_run_id: rescue1
strategy_name: trade_size_segment_orderflow
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Barclay and Warner (1993); Easley and O'Hara (1987); Chakravarty (2001)
  edge_thesis: Large/medium trade-size signed flow can carry more information than residual smaller-flow pressure when the two segments disagree.
  mechanic: Rescue attempt 1 keeps the original trade-size segmented orderflow mechanic, entry module, side/time/window/large-size/residual-mode, data window, costs, and validation gates unchanged. It only broadens the numeric large-flow, disagreement, stop, and target parameter spaces.
  timeframe_rationale: 1-minute bars preserve completed rolling orderflow windows, next-bar-open execution after close-based signals, and pessimistic same-bar stop/target handling.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 60
  rth_start: 09:30:00
  rth_end: '15:59:00'
  trade_orderflow_features:
    enabled: true
    windows:
    - 15
    - 30
    - 60
    large_trade_sizes:
    - 10
    - 20
    min_period_fraction: 1.0
    tick_size: 0.25
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: trade_size_segment_orderflow
    params:
      setup_mode: large20_not_aligned_long_1000
      entry_time: '10:00:00'
      flatten_time: '10:45:00'
      bar_interval_minutes: 1
      window_minutes: 15
      large_trade_size: 20
      direction: long
      residual_mode: not_aligned
      min_large_imbalance: 0.01
      min_disagreement: 0.02
      max_trades_per_day: 1
      stop_pct: 0.003
      target_r_multiple: 1.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.003
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '10:45:00'
