timeframe: 1m
research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); CME Micro E-mini documentation;
    Lo, Mamaysky, and Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: High MES participation during a completed ES move may mark temporary smaller-contract crowding only when the
    reversal direction agrees with the last completed multi-timeframe pivot market-structure pattern.
  mechanic: From 13:00 through 15:00 ET, use completed 1-minute bars to find the first high-MES-trade-share 30-minute ES move.
    Fade only in the direction supported by carried 15/30-minute completed pivot structure. Enter next bar and flatten by
    15:55.
  timeframe_rationale: 1-minute bars preserve completed ES/MES participation features and next-bar execution while the fixed
    pivot filter builds higher-timeframe structure only from completed 1-minute bars. Carrying completed pivots across RTH
    sessions implements the predeclared last-pattern-found bias without using any future bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: The afternoon variant tests whether high MES trade participation late in the day is vulnerable
      to reversion only when broader 15/30-minute completed structure supports the reversal direction. The base MES crowding
      condition must trigger first; the pivot filter cannot create a trade by itself.
    entry_logic_rationale: The entry uses completed rolling 30-minute ES return and prior-history MES participation rank on
      each completed 1-minute bar inside a fixed window. A signal is accepted only if the carried completed pivot bias has
      the same direction as the proposed fade. Engine execution remains next-bar open or later.
    stop_loss_rationale: The stop remains percent-from-entry, rounded to the ES tick, so the composite does not use a future
      swing or post-entry structure level for invalidation.
    target_exit_rationale: The fixed-R target remains predeclared and target_r_multiple is never below 1.0R. Any unresolved
      position flattens at the configured intraday cutoff.
    profitability_rationale: This is convincing enough to test because high smaller-contract participation can reflect crowded
      late reaction, while completed pivot structure should filter those fades to pullbacks in the prevailing intraday structure
      instead of opposing persistent repricing.
    known_failure_modes: MES participation may be informed rather than crowded; carried pivot structure may lag regime changes;
      the window may select weak first signals; costs and one-tick slippage may erase the mean-reversion effect.
    pre_test_decision: approve_for_testing
