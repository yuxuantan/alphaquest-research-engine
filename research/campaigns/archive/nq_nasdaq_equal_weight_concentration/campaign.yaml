campaign_id: nq_nasdaq_equal_weight_concentration
title: NQ Nasdaq Equal-Weight Concentration
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: nasdaq_equal_weight_concentration_state
hypothesis: Prior-business-day cap-weight Nasdaq-100 strength versus equal-weight Nasdaq-100 breadth may identify same-day
  NQ drift or fragility because NQ exposure is dominated by the market-cap-weighted Nasdaq leadership complex.
rationale: This campaign tests a Nasdaq-100 internal concentration state using QQQ versus QQQE, not XLK/SPY broad
  technology leadership, semiconductor leadership, small-cap IWM/QQQ rotation, broad sector ETF rotation, ES/NQ spread,
  or NQ own-price momentum. ETF observations are joined with a one-business-day availability lag, and entries occur only
  after completed NQ RTH bars.
research_sources:
- title: When Are Contrarian Profits Due to Stock Market Overreaction?
  authors: Andrew W. Lo and A. Craig MacKinlay
  year: 1990
  venue: Review of Financial Studies
  link_or_doi: https://doi.org/10.1093/rfs/3.2.175
  expected_mechanism: Documents lead-lag and cross-autocorrelation effects across related equity portfolios, supporting a
    lagged internal-leadership state as a hypothesis to test rather than assume.
- title: Nasdaq-100 Equal Weighted Index Methodology
  authors: Nasdaq, Inc.
  year: 2026
  venue: Nasdaq Index Methodology
  link_or_doi: https://indexes.nasdaqomx.com/docs/methodology_ndxe.pdf
  expected_mechanism: Defines the equal-weight Nasdaq-100 construction used to separate broad constituent breadth from
    market-cap-weighted Nasdaq-100 leadership.
- title: Invesco QQQ Equal Weight ETF
  authors: Invesco
  year: 2026
  venue: ETF sponsor documentation
  link_or_doi: https://www.invesco.com/us/en/financial-products/etfs/invesco-qqq-equal-weight-etf.html
  expected_mechanism: Identifies QQQE as the tradable equal-weight Nasdaq-100 proxy used for the local daily feature cache.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York.
- Yahoo daily adjusted-close and volume histories for QQQ and QQQE cached under data/external/yahoo_nasdaq_equal_weight.
- Derived strict-lag feature CSV data/external/nq_nasdaq_equal_weight_features_20110103_20260612.csv.
duplicate_edge_check:
  checked_edges:
  - nq_tech_relative_strength_intraday
  - nq_tech_nonleadership_orderflow_confirmation
  - nq_semiconductor_leadership_risk_sentiment
  - nq_sector_rotation_risk_appetite
  - nq_sector_dispersion_state
  - nq_small_cap_relative_rotation
  - nq_es_relative_value_orderflow_absorption_reversion
  - nq_daily_time_series_momentum
  conclusion: Eligible as a distinct NQ test because the driver is Nasdaq-100 cap-weight versus equal-weight internal
    concentration, not broad technology versus SPY, semiconductor leadership, IWM size rotation, broad sector dispersion,
    cross-index futures relative value, or NQ own trend.
lookahead_risks:
- A session dated D can only use QQQ/QQQE observations on or before D minus one business day.
- Rolling ranks are computed in the daily feature table before the session-level as-of join.
- Signals use a completed NQ bar and enter no earlier than the next bar open.
- No same-day ETF close, final NQ session high/low, final VWAP, future ETF return, or post-entry path is used.
failure_modes:
- QQQ/QQQE relative performance may be stale by the NQ RTH session.
- Equal-weight outperformance can be broad risk appetite rather than bearish NQ deconcentration pressure.
- Cap-weight leadership may already be priced into overnight or opening NQ movement.
- Yahoo adjusted-close histories require vendor verification before any promotion beyond candidate review.
