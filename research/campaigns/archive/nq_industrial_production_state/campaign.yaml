campaign_id: nq_industrial_production_state
title: NQ Industrial Production State
status: completed_failed
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Conservatively lagged Federal Reserve industrial-production and capacity-utilization states may proxy business-cycle risk premia or growth momentum that affects same-day NQ intraday drift after the cash open.
rationale: This campaign tests a specific real-activity state edge using FRED IPMAN, INDPRO, and CUMFNS observations at least 45 calendar days old. It is distinct from CFNAI, consumer sentiment, EMV, EPU, BLS release-day drift, credit-spread, real-yield, and orderflow campaigns because it uses direct industrial-production and capacity-utilization state variables, not composite activity, survey sentiment, scheduled-event calendars, or intraday flow.
research_sources:
- title: Stock Returns, Expected Returns, and Real Activity
  author: Eugene F. Fama
  year: 1990
  link_or_doi: https://doi.org/10.1111/j.1540-6261.1990.tb02428.x
  expected_mechanism: Stock returns and expected returns are related to real activity and production-growth information.
- title: Business Conditions and Expected Returns on Stocks and Bonds
  author: Eugene F. Fama and Kenneth R. French
  year: 1989
  link_or_doi: https://doi.org/10.1016/0304-405X(89)90095-0
  expected_mechanism: Expected returns vary with business conditions, motivating weak-activity risk-premium and strong-activity lower-premium variants.
- title: Industrial Production, Manufacturing (NAICS), Total Index, and Capacity Utilization
  author: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/IPMAN
  expected_mechanism: Public monthly real-activity and utilization series used for strictly lagged NQ session features.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fred_industrial_production/fred_ipman_monthly.csv
- data/external/fred_industrial_production/fred_indpro_monthly.csv
- data/external/fred_industrial_production/fred_cumfns_monthly.csv
- data/external/nq_industrial_production_state_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_nq_industrial_production_state_features.py
  output: data/external/nq_industrial_production_state_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  availability_lag_days: 45
  lookahead_control: Each NQ session uses only the latest monthly IPMAN/INDPRO/CUMFNS observation on or before session_date minus 45 calendar days.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-07-01'
  existing_nq_campaign_id: none
  not_duplicate_of:
  - nq_chicagofed_cfnai_activity_pullback
  - nq_consumer_sentiment_state_intraday
  - nq_emv_macro_news_intraday
  - nq_epu_policy_uncertainty_intraday
  - nq_bls_macro_release_day_drift
  - nq_real_yield_breakeven_state
  conclusion: Eligible as a bounded industrial-production state edge; it does not reuse CFNAI composite activity, survey sentiment, macro-news uncertainty, release-day calendars, real-yield state, or intraday orderflow mechanics.
