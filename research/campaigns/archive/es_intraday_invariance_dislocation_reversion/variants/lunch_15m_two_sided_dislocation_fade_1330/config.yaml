research_metadata:
  academic_source: Andersen, Bondarenko, Kyle, and Obizhaeva (2018); Kyle and Obizhaeva (2016); Ane and Geman (2000)
  edge_thesis: Completed ES bars with unusually large price movement per transaction, scaled by average trade size and ranked against prior same-clock observations, may identify temporary liquidity dislocations that mean-revert when aggregate signed flow does not strongly sponsor the move.
  mechanic: From 12:00 through 13:30 ET, fade completed 15-minute high-dislocation moves when the same-clock invariance rank is elevated and aggregate signed flow is not strongly aligned.
  timeframe_rationale: One-minute bars are required because the edge uses completed-bar trade count, volume, signed volume, and price displacement. The strategy does not use print sequencing or intra-minute fills.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: From 12:00 through 13:30 ET, fade completed 15-minute high-dislocation moves when the same-clock invariance rank is elevated and aggregate signed flow is not strongly aligned.
    entry_logic_rationale: The entry computes a completed rolling return, completed rolling trade count, completed rolling volume, completed average trade size, and completed signed-flow imbalance. The invariance dislocation score is ranked against prior same-clock observations only; the current score is appended after the decision, so the rank is not lookahead. The trade fades the move only when signed flow is not strongly aligned with the move.
    stop_loss_rationale: A fixed percent stop is used because the edge is a statistical liquidity-dislocation state rather than a discrete chart level. The stop is predeclared, tick-rounded by the engine, and subject to pessimistic same-bar target/stop handling.
    target_exit_rationale: A fixed-R target at 1.0R or greater plus same-day forced flatten tests whether the dislocation reverts enough to survive ES costs without sub-1R profit taking or discretionary exits.
    profitability_rationale: Lunch-period liquidity can be shallow; a high movement-per-transaction score without flow sponsorship should be a plausible temporary dislocation rather than a trend signal.
    known_failure_modes: The dislocation may be informed price discovery, signed flow may be too noisy, high-rank scores may cluster in crisis regimes, and one-tick slippage plus commissions can erase short-horizon reversion.
    pre_test_decision: approve_for_testing
