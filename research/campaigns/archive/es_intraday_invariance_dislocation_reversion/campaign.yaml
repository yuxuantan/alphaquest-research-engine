campaign_id: es_intraday_invariance_dislocation_reversion
title: ES Intraday Trading-Invariance Dislocation Reversion
decision: FAIL
created_at: '2026-06-20'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Completed ES bars with unusually large price movement per transaction, scaled by average trade size and ranked against prior same-clock observations, may identify temporary liquidity dislocations that mean-revert when aggregate signed flow does not strongly sponsor the move.
rationale: This campaign tests intraday trading-invariance dislocation, not raw trade-count fragmentation, average trade-size segmentation, Amihud daily illiquidity, variance-ratio serial dependence, or signed-flow persistence. The signal combines completed price displacement, completed trades, completed volume, and completed signed volume; entries occur no earlier than the next bar open.
sources:
- title: Intraday Trading Invariance in the E-mini S&P 500 Futures Market
  authors: Torben G. Andersen, Oleg Bondarenko, Albert S. Kyle, and Anna A. Obizhaeva
  year: 2018
  link: https://pages.nes.ru/aobizhaeva/ABKO-intradayinv.pdf
  relevance: Directly studies intraday trading invariance in E-mini S&P 500 futures and motivates combining transaction count, trade size, and price variation instead of using volume alone.
- title: 'Market Microstructure Invariance: Empirical Hypotheses'
  authors: Albert S. Kyle and Anna A. Obizhaeva
  year: 2016
  venue: Econometrica
  doi: 10.3982/ECTA10486
  relevance: Provides the microstructure-invariance framework linking bet/trade arrival, size, and risk transfer. This campaign treats abnormal intraday departures as a liquidity-state proxy, not as a fill-quality assumption.
- title: Order Flow, Transaction Clock, and Normality of Asset Returns
  authors: Thierry Ane and Helyette Geman
  year: 2000
  venue: Journal of Finance
  doi: 10.1111/0022-1082.00268
  relevance: Motivates using transaction-clock information when interpreting short-horizon returns.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- Sierra completed-bar aggregate volume, signed_volume, and trades fields
- prior same-clock rank history computed online from earlier sessions only
- next-bar execution, ES tick size/point value, commissions, slippage, pessimistic same-bar ordering, and forced flatten from config
data_quality_caveats:
- Sierra signed_volume is an aggregate bid/ask-volume proxy, not quote-level OFI.
- Sierra trades is a completed-bar aggregate and is not used for print sequencing, queue position, or intra-minute fill truth.
- The invariance score is a bar-level proxy, not the exact bet-size object in the theory.
lookahead_risks:
- Rolling price, volume, signed_volume, and trades use only completed bars ending at the signal bar close.
- Same-clock ranks compare the current completed score only with prior same-clock observations; the current score is appended after the signal decision.
- A signal at HH:MM uses the bar that closed at HH:MM and can enter only at the next bar open.
- No final current-session range, final VWAP, future orderflow, future trades, or future session totals are used.
- All variants flatten same day before configured prop cutoff.
failure_modes:
- High invariance dislocation may identify informed price discovery rather than temporary liquidity pressure.
- Aggregate signed flow may be too noisy to distinguish sponsored from unsponsored moves.
- The score may overlap generic volatility/liquidity states and fail after costs.
- The edge may exist only in specific crisis periods or a narrow time of day, causing profit concentration.
- One-minute bars cannot resolve same-bar stop/target order without pessimistic handling.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_trade_fragmentation_liquidity_reversion
  - es_trade_size_stealth_orderflow
  - es_amihud_illiquidity_price_impact
  - es_variance_ratio_orderflow_regime
  - es_signed_orderflow_persistence
  - es_volume_shock_liquidity_reversal
  - es_orderflow_absorption_exhaustion_reversal
  - es_vpin_toxicity_continuation
  conclusion: Eligible as a distinct active campaign. Fragmentation used high trade-count plus low average trade-size ranks; trade-size stealth used large/residual signed-flow disagreement; Amihud used daily illiquidity; variance-ratio used serial-dependence states. This campaign uses a same-clock ranked intraday invariance dislocation score combining price variation per transaction and average trade size, then fades only when aggregate signed flow does not strongly align with the move.
