research_metadata:
  academic_source: Campbell, Hilscher, and Szilagyi (2008); Vassalou and Xing (2004); U.S. Courts Table
    F-2 bankruptcy filings
  edge_thesis: Realized bankruptcy/default-distress regimes may condition short-horizon NQ intraday reversal
    because aggregate distress changes risk appetite, equity-index risk compensation, and dealer balance-sheet
    tolerance after prior-session directional moves.
  mechanic: Enter long at the completed 11:30 ET 5-minute bar when total Chapter 11 filing YoY growth
    is elevated and the prior NQ RTH session closed down, testing distress-regime rebound compensation.
  timeframe_rationale: 5-minute NQ RTH bars keep the quarterly distress feature aligned to completed-bar
    next-open execution and same-day forced flattening; entries are late morning or early afternoon to
    avoid open-only noise.
  feature_audit: research_artifacts/es_bankruptcy_distress_regime_reversion_feature_audit_20260616.json
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses the bankruptcy/default-distress regime edge by gating
      NQ reversal exposure on an official quarterly U.S. Courts feature that is effective before the session
      date and a prior RTH return direction filter.
    entry_logic_rationale: The bankruptcy feature is selected as-of session date using effective_date
      history. The signal uses a completed 5-minute RTH bar at the configured entry time and enters next
      bar open; prior-session return uses only recorded prior RTH closes.
    stop_loss_rationale: A percent-from-entry stop is used because the regime state is exogenous rather
      than anchored to an intraday structural level. The stop grid is predeclared and copied from the
      corrected ES source.
    target_exit_rationale: Fixed-R targets and 15:55 ET flatten test whether regime-conditioned reversal
      is monetizable intraday without overnight exposure.
    profitability_rationale: If distress-risk regimes alter equity-index risk compensation, NQ may show
      intraday rebound or fade behavior after prior-session moves when distress features are elevated.
    known_failure_modes: Quarterly legal-distress data may be too slow, the effect may not transfer to
      NQ, samples may cluster by regime, and costs may erase any intraday reversal.
    pre_test_decision: approve_for_testing
  nq_port_provenance:
    source_campaign_id: es_bankruptcy_distress_regime_reversion
    source_config_path: campaigns/es_bankruptcy_distress_regime_reversion/variants/total_ch11_growth_prior_down_long_1130/config.yaml
    source_run_role: corrected ES original run2 config, ported before any NQ PnL inspection
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
strategy:
  entry:
    module: bankruptcy_distress_reversion
    params:
      feature_file: data/external/uscourts_bankruptcy_f2_quarterly_features.csv
      feature_name: total_ch11_yoy_pct
      operator: '>='
      threshold: 22.94832826747721
      direction: long
      entry_time: '11:30:00'
      bar_interval_minutes: 5
      max_trades_per_day: 1
      prior_return_filter: down
      stale_after_days: 180
      stop_pct: 0.005
      target_r_multiple: 1.5
      flatten_time: '15:55:00'
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
