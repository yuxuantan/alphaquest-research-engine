campaign_id: nq_monthly_opex_pressure
variant_id: nonquarterly_opex_midday_long_1200
test_run_id: run1
strategy_name: monthly_opex_pressure
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Stoll and Whaley (1987); Ni, Pearson, and Poteshman (2005); Cboe
    expiration calendars
  edge_thesis: Monthly non-quarterly equity-option expiration may create predictable
    intraday NQ pressure through option-hedging, ETF/index basket hedging, and post-expiration
    inventory release.
  mechanic: On a non-quarterly monthly OPEX session, long NQ at 12:00 ET next-bar
    open and flatten by 15:55 ET.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open
    execution on a predeclared monthly OPEX calendar date.
  rescue_reason: Original OPEX-session noon long failed core with 2/9 profitable combinations
    and zero benchmark pass combinations; rescue keeps the same signal date, time,
    direction, and modules while testing one adjacent stop/target grid.
  rescue_scope: NQ port only; selected ES rescue source mechanics and grids reused
    before any NQ PnL inspection.
  rescue_attempt: es_source_port_before_nq_pnl
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: 'This NQ port preserves the ES monthly OPEX setup family:
      On a non-quarterly monthly OPEX session, long NQ at 12:00 ET next-bar open and
      flatten by 15:55 ET. The calendar dates are known before trading and do not
      use future NQ prices.'
    entry_logic_rationale: Entry logic is unchanged from the selected ES source config
      except for the NQ execution leg and refreshed OPEX calendar end date; no NQ
      PnL was inspected before authoring.
    stop_loss_rationale: The percent-from-entry stop grid is declared before NQ PnL
      inspection and tests event-day noise tolerance without changing the OPEX date,
      timing, direction, or execution rule.
    target_exit_rationale: The fixed-R target grid is declared before NQ PnL inspection
      to test payoff-distance robustness under the same calendar-event signal; exits
      remain same-day with configured forced flatten.
    profitability_rationale: If morning expiration pressure exhausts inventory, NQ
      may show a midday relief bid as hedges decay or are unwound before the close.
    known_failure_modes: The event count is low, edge direction may flip with option
      dealer positioning, any profit may be concentrated in a few expiration cycles,
      and ES source evidence failed WFA.
    pre_test_decision: approve_for_testing
  pre_pnl_event_density: PASS FOR STAGING; see research_artifacts/nq_monthly_opex_pressure_event_density_audit_20260623.md.
  source_run_report: backtest-campaigns/es_monthly_opex_pressure/nonquarterly_opex_midday_long_1200/ES/rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_monthly_opex_pressure
    source_config_path: campaigns/es_monthly_opex_pressure/rescue_attempts/parameter_space_rescue_1/nonquarterly_opex_midday_long_1200/config.yaml
    ported_before_nq_pnl: true
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
