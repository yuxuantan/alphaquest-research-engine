  - es_overnight_range_compression_orderflow_breakout
  conclusion: Eligible as a separate NQ edge because it conditions on pre-RTH ETH overnight compression and trades completed
    breakouts of the overnight high/low with same-direction orderflow. It does not use prior-RTH NR compression, opening-gap
    acceptance/fade, overnight level sweep-reclaim, or current-session lunch/opening ranges.
