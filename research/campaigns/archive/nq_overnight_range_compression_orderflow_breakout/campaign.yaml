campaign_id: nq_overnight_range_compression_orderflow_breakout
title: NQ Overnight Range Compression Orderflow Breakout
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: overnight_range_compression_breakout_with_aggregate_orderflow
hypothesis: A completed narrow NQ ETH overnight range can leave unresolved inventory around the overnight high/low. When RTH
  price closes beyond that pre-known boundary with same-direction aggregate orderflow, the breakout may continue intraday.
rationale: This is a direct NQ transfer of the ES overnight range compression orderflow breakout family before any NQ PnL
  inspection. It is distinct from NQ prior-session NR4/NR7 compression, opening-gap continuation/fade, and overnight sweep-reclaim
  reversion because the state is the completed ETH overnight range rank and the breakout boundary is the overnight high/low.
sources:
- title: A Simple Opening Range Breakout Trading Strategy on S&P 500 Index Futures
  authors: Ulf Holmberg, Carl Lonnback, and Carl Lundstrom
  year: 2012
  venue: Finance Research Letters
  doi: 10.1016/j.frl.2012.03.006
  relevance: Provides futures evidence that range breakouts can have state-dependent positive returns; this campaign uses
    overnight range compression rather than the opening range.
- title: Support for Resistance; Technical Analysis and Intraday Exchange Rates
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports the idea that pre-identified support/resistance levels can influence intraday price behavior; overnight
    high/low are fixed before the RTH decision window.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates completed aggregate orderflow imbalance as a short-horizon pressure proxy; this campaign uses Sierra
    trade-side aggregates, not quote-level OFI.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/nq_overnight_range_features_20110103_20260529.csv
- NQ Databento ETH/RTH one-minute cache used only to build overnight high/low/range features before RTH opens
lookahead_risks:
- The overnight range feature is computed from ETH bars ending no later than 09:29 ET and is fixed before RTH signal evaluation.
- The range rank uses the completed overnight range available at the RTH open, not final RTH range or future volatility.
- RTH breakout and orderflow confirmation use only completed 5-minute bars; the engine enters no earlier than next bar open.
- Stop placement uses completed signal-bar extremes, not future highs/lows.
