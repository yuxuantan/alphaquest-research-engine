research_metadata:
  academic_source: Holmberg, Lonnback, and Lundstrom (2013); Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014);
    Lo, Mamaysky, and Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Opening-range orderflow breakouts may continue more reliably when the breakout direction agrees with completed
    multi-timeframe swing-pivot structure.
  mechanic: 15-minute signed-flow opening-range breakout filtered by completed 5/15-minute pivot direction. The base opening-range
    breakout must emit first; the pivot filter cannot create trades by itself.
  timeframe_rationale: 5-minute bars define completed opening-range and breakout states while preserving 1-minute detail handling
    for same-bar stop/target conflicts. Pivot states are aggregated only from completed 5-minute bars.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 15-minute signed-flow opening-range breakout filtered by completed 5/15-minute pivot direction.
      This expresses the composite edge by requiring opening auction breakout, same-bar aggregate orderflow participation,
      and same-direction confirmed swing-pivot structure before any entry. Rescue keeps the same base breakout plus completed
      pivot-direction filter; it does not add a new condition.
    entry_logic_rationale: The opening range and orderflow conditions are inherited unchanged from the predeclared base variant.
      The wrapper updates pivot state from completed bars first, then accepts only a base signal whose direction matches the
      latest confirmed HH/HL or LH/LL structure with no opposing checked timeframe. Entry remains next-bar open or later.
    stop_loss_rationale: The stop module remains the base opening-range-edge stop with the same max-stop cap. If price returns
      through the opposite opening-range edge, the breakout-plus-structure continuation thesis is invalidated without using
      future swings.
    target_exit_rationale: The target remains a fixed-R exit with target_r_multiple at or above 1.0R, and unresolved positions
      flatten at the configured same-session cutoff.
    profitability_rationale: This should be profitable only if ORB signals aligned with already-confirmed intraday structure
      represent actual inventory continuation rather than isolated stop probes. The pivot condition is fixed before testing
      and is not selected from PnL. The rescue is justified only as a parameter-space neighborhood check because original
      profitable rows were too fragile to pass the core-grid robustness gate.
    known_failure_modes: The pivot filter can lag and admit exhausted breakouts, ORB can fail after liquidity sweeps, aggregate
      flow can mark capitulation, and the filter can reduce trade count below the required 50/year threshold.
    pre_test_decision: approve_for_testing
    rescue_pre_test_decision: approve_parameter_space_rescue_1
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: Parameter-space rescue only. Entry wrapper, base ORB module, pivot filter, stop module, target module, data,
    costs, sessions, fills, and validation gates are unchanged.
  rescue_rationale: Original limited-core results showed enough signals for most variants but weak robustness/concentration.
    This rescue tests a less strict predeclared neighborhood around breakout buffer and orderflow threshold, a wider stop-cap
    option, and target multiples at or above 1R without changing the composite mechanic.
