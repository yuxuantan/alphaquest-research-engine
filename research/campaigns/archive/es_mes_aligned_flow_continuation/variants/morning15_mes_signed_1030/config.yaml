research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES intraday price continuation may be more reliable when MES completed signed-flow imbalance confirms the same direction.
  mechanic: At the completed 10:30 ET signal, require 15-minute ES return and 15-minute MES signed imbalance to point in the same direction, then trade ES in that direction.
  timeframe_rationale: The ES/MES feature cache is built on completed 1-minute aligned bars, so the strategy stays on 1-minute bars to preserve feature semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-18"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge by requiring the early RTH ES move and the
      simultaneous 15-minute MES signed-flow imbalance to agree before a trade is
      allowed. MES is used as cross-contract confirmation of participation, not
      as a divergence or crowding fade signal.
    entry_logic_rationale: >
      The 10:30 ET timestamp gives the opening auction one full hour to settle
      while still leaving enough RTH time for continuation. A long requires ES
      return ticks and MES signed imbalance to be positive on completed windows;
      a short requires both to be negative.
    stop_loss_rationale: >
      The sweep-extreme stop sits beyond the completed signal bar. If price
      immediately breaks the bar that aligned ES direction and MES flow, the
      continuation thesis is invalidated without relying on future swing points.
    target_exit_rationale: >
      A fixed-R target tests whether the cross-contract confirmation has enough
      short-horizon follow-through to pay ES costs. Any unresolved position is
      flattened before the configured cutoff.
    profitability_rationale: >
      The setup should only make money if broad micro-contract participation
      confirms, rather than lags, ES directional pressure. The pre-PnL density
      audit showed the strict grid corner remains above 100 signals/year in the
      limited-core window and latest-year validation slice.
    known_failure_modes: >
      MES signed flow may simply follow ES after the opportunity is gone, early
      moves may mean-revert, and the signal-bar stop may be too tight on fast
      trend days or too loose on quiet failed moves.
    pre_test_decision: approve_for_testing
