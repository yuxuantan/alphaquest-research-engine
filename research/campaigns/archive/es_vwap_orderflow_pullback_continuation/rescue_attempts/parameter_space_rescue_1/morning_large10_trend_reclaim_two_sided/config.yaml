timeframe: 5m
research_metadata:
  academic_source: Bialkowski, Darolles, and Le Fol (2008); McCulloch and Kazakov (2007); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: VWAP-side ES pullbacks may continue when the completed reclaim bar has aligned large-10 aggregate orderflow.
  mechanic: From 09:45 through 12:00 ET, enter with the VWAP-side trend after a completed pullback/reclaim only when same-bar large-10 signed-flow imbalance confirms direction.
  timeframe_rationale: 5-minute bars reduce one-minute VWAP noise while preserving completed-bar signal timing and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-17"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge by requiring the price-action setup first:
      ES must already have a completed VWAP-side trend, then pull back to VWAP,
      and then close back on the trend side. The signed-volume filter is only a
      confirmation on that completed reclaim bar, so it does not become a pure
      orderflow timing strategy.
    entry_logic_rationale: >
      The 09:45-12:00 ET window gives the session enough history to form VWAP and
      trend state while keeping the test in the liquid morning auction. Requiring
      two to four completed trend closes plus positive or negative reclaim-bar
      large-10 signed flow should isolate continuation attempts that have both
      price and larger-trade participation evidence.
    stop_loss_rationale: >
      A percent-from-entry stop is simple and independent of post-entry orderflow.
      It rejects the trade if the reclaim cannot hold enough of the VWAP-side move
      to justify continuation after costs.
    target_exit_rationale: >
      A fixed-R target keeps the exit predeclared and lets the grid test whether
      VWAP reclaim continuation can produce enough reward relative to the initial
      stop before the same-day flatten.
    profitability_rationale: >
      The setup should only be profitable if VWAP acts as a benchmark value area
      and aligned larger-trade aggressive flow identifies reclaims with real
      inventory follow through. Pre-PnL density showed the full entry grid
      stayed above 50 signals per year, so the test is not dependent on rare
      events.
    known_failure_modes: >
      The edge can fail if VWAP reclaims are crowded, if large-10 buckets are
      noisy, if confirmation arrives after most of the move, or if profits are
      concentrated in a small set of high-volatility trend days.
    pre_test_decision: approve_for_testing
  rescue_attempt: >
    parameter_space_rescue_1: changed only fixed min_drive_points and the
    declared parameter grid. Entry module, stop module, target module, VWAP
    trend-reclaim mechanic, time window, flow mode, data, costs, sessions,
    fills, prop rules, and validation gates are unchanged.
