strategy_name: vwap_orderflow_pullback_continuation
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Bialkowski, Darolles, and Le Fol (2008); McCulloch and Kazakov (2007); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: VWAP-side ES pullbacks may continue during midday when the completed reclaim bar has aligned large-20 aggregate orderflow.
  mechanic: From 11:00 through 14:30 ET, enter with the VWAP-side trend after a completed pullback/reclaim only when same-bar large-20 signed-flow imbalance confirms direction.
  timeframe_rationale: 5-minute bars reduce one-minute VWAP noise while preserving completed-bar signal timing and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by requiring the price-action setup first: ES must already have a completed VWAP-side trend, then pull back to VWAP, and then close back on the trend side. The signed-volume filter is only a confirmation on that completed reclaim bar, so it does not become a pure orderflow timing strategy.

      '
    entry_logic_rationale: 'The 11:00-14:30 ET window gives the session enough history to form VWAP and trend state after the opening auction. Requiring two to four completed trend closes plus positive or negative reclaim-bar large-20 signed flow should isolate continuation attempts that have both price and stricter larger-trade participation evidence.

      '
    stop_loss_rationale: 'A percent-from-entry stop is simple and independent of post-entry orderflow. It rejects the trade if the reclaim cannot hold enough of the VWAP-side move to justify continuation after costs.

      '
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics are unchanged, while any existing target_r_multiple below 1.0R is raised to 1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: 'The setup should only be profitable if VWAP acts as a benchmark value area and aligned large-20 aggressive flow identifies reclaims with real inventory follow through. Pre-PnL density showed the full entry grid stayed above 50 signals per year, so the test is not dependent on rare events.

      '
    known_failure_modes: 'The edge can fail if VWAP reclaims are crowded, if large-20 buckets are noisy, if confirmation arrives after most of the move, or if profits are concentrated in a small set of high-volatility trend days.

      '
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_vwap_orderflow_pullback_continuation
    source_variant_id: midday_large20_trend_reclaim_two_sided
    source_run_id: run1
    source_config_path: campaigns/es_vwap_orderflow_pullback_continuation/variants/midday_large20_trend_reclaim_two_sided/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.5
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.5
      top_target_is_grid_max: true
      higher_target_net_slope: 336.3888888888887
      higher_target_pf_slope: 0.09060446287985569
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.5
      new: &id002
      - 1.0
      - 1.5
