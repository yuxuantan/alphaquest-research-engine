timeframe: 1m
research_metadata:
  academic_source: Cboe SPX Weeklys launch documentation; Brogaard, Han, and Won (2023); Fagerlid and
    Skarpnes (2024)
  edge_thesis: Ex-ante SPX 0DTE calendar regimes may create intraday NQ pressure through broad-index dealer
    hedging and liquidity demand, conditional on completed NQ open-to-signal movement.
  mechanic: At 10:00:00 ET on full_week SPX 0DTE sessions, fade_move with long direction after a completed
    NQ open-to-signal move threshold; flatten by 15:55.
  timeframe_rationale: A one-minute completed-bar signal preserves deterministic next-bar-open execution
    while calendar membership is known before the session.
  pre_pnl_density: research_artifacts/nq_spx_0dte_expiration_pressure_density_audit_20260622.md
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the SPX 0DTE calendar-pressure edge by trading NQ
      only on ex-ante 0DTE listing sessions after a completed NQ open-to-signal move reaches a predeclared
      threshold.
    entry_logic_rationale: The signal uses only current-session NQ open and the completed signal-bar close,
      plus deterministic calendar membership known before the session; entry is no earlier than the next
      bar open.
    stop_loss_rationale: The percent-from-entry stop is declared before NQ testing, rounded to the NQ
      tick, and varied only through sl.params.stop_pct so adverse 0DTE pressure failures are capped without
      using future highs, lows, or realized trade-path information.
    target_exit_rationale: The fixed-R target is declared before NQ testing and tied to the initial stop
      distance, avoiding future price, option-flow, volume, or discretionary exit information while keeping
      every target at or above 1.0R.
    profitability_rationale: If SPX 0DTE calendar pressure transmits to high-beta NQ futures, the fixed-time
      move-conditioned exposure should show after-cost performance that survives neighboring move thresholds
      and full staged validation.
    known_failure_modes: Calendar membership may not reveal dealer-gamma sign, the history is short after
      full-week 0DTE launch, and any apparent edge may collapse under WFA or monkey timing perturbations.
    pre_test_decision: approve_for_testing
  source_es_campaign: es_spx_0dte_expiration_pressure
  nq_port_note: NQ thresholds were fixed from pre-PnL density only and are not a rescue after NQ results.
