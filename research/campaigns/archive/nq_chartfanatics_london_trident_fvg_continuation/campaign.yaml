campaign_id: nq_chartfanatics_london_trident_fvg_continuation
title: NQ ChartFanatics London Trident FVG Continuation
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
market: CME E-mini Nasdaq-100 futures
dataset_id: nq_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll
timeframe: 30m
edge_family: chartfanatics_london_trident_fvg_continuation
hypothesis: >
  During the London-session transfer window, a 30-minute fair-value gap aligned
  with stacked intraday EMAs may continue after a small-body "Trident" pullback
  into the FVG midpoint and a completed confirmation close.
rationale: >
  ChartFanatics describes TG Capital's Unique High RR setup as a futures/Nasdaq
  playbook using a 30-minute FVG between 02:30 and 04:00 ET, stacked 5/9/13-or-15/21
  EMAs, 200 EMA bias, a doji/trident candle wicking into the FVG 50% level, and
  a confirmation candle before entry. This campaign converted that into a
  completed-bar NQ ETH test with no PnL inspection before density screening.
research_sources:
- title: Unique High RR
  author: TG Capital / ChartFanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/unique-high-rr
  expected_mechanism: >
    Practitioner source states that a London-window 30-minute FVG plus stacked
    EMAs and trident confirmation can produce high-R continuation trades on
    Nasdaq/futures.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  author: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  link_or_doi: https://doi.org/10.1111/0022-1082.00265
  expected_mechanism: >
    Supports converting visual chart patterns into deterministic rules before
    empirical testing.
- title: Time Series Momentum
  author: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse H. Pedersen
  year: 2012
  link_or_doi: https://doi.org/10.1016/j.jfineco.2011.11.003
  expected_mechanism: >
    Provides broad futures evidence for trend persistence; this campaign tests
    whether a London-session FVG pullback expresses a tradable intraday subset.
source_quality_note: >
  The primary rule is practitioner-originated. Academic sources support
  objective technical-pattern testing and generic futures trend persistence, not
  this exact NQ London FVG setup. The campaign therefore fails closed on density.
data_needs:
- data/cache/databento/nq_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll.parquet
- 30-minute completed ETH bars resampled from local NQ one-minute OHLCV
- completed EMA state using only prior/current closed 30-minute bars
lookahead_risks:
- FVG is known only after the third 30-minute candle closes.
- The doji/trident candle and confirmation candle must both close before a signal.
- EMA state uses only completed 30-minute closes through the confirmation candle.
- No final session high/low, future London range, final VWAP, future orderflow, or post-entry price path is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_chartfanatics_liquidity_inversion_fvg
  - nq_ema_pullback_orderflow_continuation
  - nq_overnight_drift_european_open
  - nq_overnight_range_compression_orderflow_breakout
  - nq_chartfanatics_measured_move_pullback
  conclusion: >
    Eligible for a pre-PnL density audit because it tests a London-window
    30-minute trident/FVG continuation pattern on ETH NQ, not RTH liquidity
    inversion, RTH EMA pullback with orderflow, fixed-time European-open drift,
    overnight-range breakout, or measured-pivot continuation.
