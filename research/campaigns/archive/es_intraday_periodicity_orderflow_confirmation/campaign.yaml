campaign_id: es_intraday_periodicity_orderflow_confirmation
title: ES Intraday Periodicity With Aggregate Orderflow Confirmation
created_at: '2026-06-18'
decision: FAIL
status: closed_failed_limited_core_grid
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
edge_type: composite_intraday_periodicity_orderflow_confirmation
hypothesis: Same-clock ES intraday return tendencies documented in the intraday periodicity literature
  may be tradable only when the immediately preceding completed ES orderflow window confirms the historical
  slot direction.
rationale: 'The failed base periodicity campaign used only prior same-clock slot returns. This bounded
  composite keeps the primary same-clock anomaly fixed and adds one secondary condition: completed aggregate
  orderflow before entry must align with the prior-slot direction. It is not an opening-range, VWAP, prior-level,
  raw signed-flow, or 0DTE campaign.'
sources:
- title: Intraday Patterns in the Cross-Section of Stock Returns
  authors: Steven L. Heston, Robert A. Korajczyk, and Ronnie Sadka
  year: 2010
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2010.01573.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2010.01573.x
  relevance: Documents same-clock intraday return continuation at half-hour intervals using only prior
    occurrences of the same intraday interval.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports orderflow imbalance as a short-horizon price-pressure proxy. This campaign uses
    completed Sierra aggregate trade-side flow, not full-depth OFI.
data_needs:
- local Sierra ES RTH 1-minute OHLCV and aggregate orderflow bars
- prebuilt intraday periodicity feature CSV with prior-session-only same-slot rolling means
- completed pre-entry source-window signed, large10, and large20 imbalances
- next-bar-open execution after completed entry-time signal
- same-day forced flatten at the slot end and no overnight exposure
lookahead_risks:
- Same-clock return means are shifted one occurrence within each slot; the current slot return is never
  used for its own signal.
- Orderflow confirmation uses only completed bars before the entry timestamp.
- Signals use bar close and engine execution must occur no earlier than the next bar open.
- No final session high/low, final VWAP, future orderflow, or future slot return is used.
failure_modes:
- The stock cross-sectional periodicity anomaly may not transfer to ES futures after costs.
- Current orderflow confirmation may identify exhaustion rather than confirmation.
- Slot effects may be unstable across regimes and fail WFA even if the shortlist window passes.
- Short slot holds may be erased by one-tick slippage and pessimistic same-bar stop/target ordering.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_intraday_periodicity_persistence
  - es_signed_orderflow_persistence
  - es_trend_aligned_orderflow_continuation
  - es_opening_range_orderflow_breakout
  - es_gao_last_half_hour_orderflow_confirmation
  - es_spx_0dte_orderflow_continuation
  conclusion: Eligible as one bounded composite for the failed intraday-periodicity primary edge. If this
    campaign fails, do not launch another local intraday-periodicity composite without materially new
    evidence or data.
composite_edge_policy:
  primary_edge: Heston-Korajczyk-Sadka same-clock intraday periodicity
  secondary_conditions:
  - Completed ES aggregate orderflow imbalance aligned with the prior same-clock direction.
  max_secondary_conditions: 1
  primary_edge_stop_rule: This is the only local orderflow-confirmed composite for intraday periodicity
    unless materially new evidence is approved before testing.
