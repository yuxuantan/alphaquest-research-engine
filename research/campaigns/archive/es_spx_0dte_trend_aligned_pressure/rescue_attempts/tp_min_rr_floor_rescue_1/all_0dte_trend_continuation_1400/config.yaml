research_metadata:
  academic_source: Cboe SPX Weeklys launch history; Brogaard, Han, and Won (SSRN 4426358); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: SPX 0DTE sessions may create intraday ES pressure; ES should be traded only when completed short and medium intraday trend structure agree.
  mechanic: 'Rescue attempt 1 keeps the 14:00 all-0DTE trend-continuation mechanic unchanged and tests smaller, faster stop/target geometry after the original 14:00 grid was uniformly negative. Original mechanic retained: Trade all known SPX 0DTE sessions from 2016 onward, excluding standard monthly OPEX, at 14:00 ET only when completed 30-minute and 120-minute ES high/low trend states align and the open-to-signal move is already in that same direction by the declared tick threshold.'
  timeframe_rationale: 1-minute bars preserve completed-bar signal timing and next-bar-open execution while allowing same-day flattening.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: The primary 0DTE edge is expressed through known same-day-expiration sessions, and the continuation threshold adds a predeclared requirement that the session is already moving with the aligned trend before entry.
    entry_logic_rationale: The entry waits until the 13:59 ES bar has closed, confirms the 30-minute and 120-minute trend state from completed bars, then requires the open-to-signal move to agree with that direction before the engine can enter on the next bar.
    stop_loss_rationale: 'A fixed percent-from-entry stop is appropriate because the hypothesis is an intraday pressure continuation, not a precise structural level. The stop caps failed trend alignment without using future range information.

      '
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics are unchanged, while any existing target_r_multiple below 1.0R is raised to 1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: This variant is convincing enough to test because 0DTE dealer hedging pressure could amplify already directional sessions, while the threshold grid remains small and all declared cells clear the 50 trades per year density screen.
    known_failure_modes: 'It should fail if 0DTE pressure is directionally irrelevant to ES, if the trend filter enters exhausted late moves, if costs dominate the average move, or if profits concentrate in a small number of volatility events.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt:
    attempt: 1
    scope: parameter_space_only
    mechanic_changed: false
    note: Rescue attempt 1 keeps the 14:00 all-0DTE trend-continuation mechanic unchanged and tests smaller, faster stop/target geometry after the original 14:00 grid was uniformly negative.
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_spx_0dte_trend_aligned_pressure
    source_variant_id: all_0dte_trend_continuation_1400
    source_run_id: rescue1
    source_config_path: campaigns/es_spx_0dte_trend_aligned_pressure/rescue_attempts/parameter_space_rescue_1/all_0dte_trend_continuation_1400/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.5
      - 0.75
      - 1.0
      target_grid_values_below_1r:
      - 0.5
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.0
      top_target_is_grid_max: true
      higher_target_net_slope: 268.75
      higher_target_pf_slope: 0.20104431758673458
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 4.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.5
      - 0.75
      - 1.0
      new: &id002
      - 1.0
    - path: wfa.parameters.tp.params.target_r_multiple
      old:
      - 0.5
      - 0.75
      - 1.0
      new: &id003
      - 1.0
