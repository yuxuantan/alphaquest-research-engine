campaign_id: nq_max_daily_return_lottery_reversal
title: NQ MAX Daily-Return Lottery Reversal
status: completed_failed_limited_core
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: >
  The largest single completed daily return over a recent lookback may act as a lottery-like salience
  proxy. If NQ inherits any index-level version of the MAX effect, high prior MAX states should
  underperform intraday while low-MAX states may retain a modest risk-premium/carry expression.
expected_mechanism: >
  The MAX state is computed from completed prior NQ RTH daily returns only. High-MAX states test
  post-spike overreaction or lottery-demand reversal; low-MAX states test the opposite quiet-premium side.
sources:
  - title: "Maxing Out: Stocks as Lotteries and the Cross-Section of Expected Returns"
    authors: Turan G. Bali, Nusret Cakici, and Robert F. Whitelaw
    year: 2011
    journal: Journal of Financial Economics
    doi: 10.1016/j.jfineco.2010.08.014
    link: https://econpapers.repec.org/RePEc:eee:jfinec:v:99:y:2011:i:2:p:427-446
    working_paper_pdf: https://pages.stern.nyu.edu/~rwhitela/papers/max%20jfe11.pdf
  - title: "Maxing Out: Stocks as Lotteries and the Cross-Section of Expected Returns"
    authors: Turan G. Bali, Nusret Cakici, and Robert F. Whitelaw
    year: 2010
    link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1262416
data_needs:
  - NQ RTH 1-minute OHLCV/orderflow cache for execution bars.
  - Derived strict-prior NQ daily-return MAX feature CSV.
feature_artifact: data/external/nq_max_daily_return_features_20110103_20260612.csv
lookahead_risks:
  - Current-session daily return is excluded from all tradable MAX features.
  - Rank features are calculated on shifted prior-session MAX series.
  - Entries occur only after a completed 1-minute bar at the configured decision clock.
  - No future daily high, low, close, VWAP, volume profile, or final session statistic is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
    - nq_realized_skewness_reversal
    - nq_realized_jump_variation_premium
    - nq_realized_vol_of_vol_state
    - nq_daily_short_term_reversal
    - nq_daily_time_series_momentum
    - nq_52week_anchor_momentum
    - nq_intraday_capitulation_mean_reversion
  conclusion: >
    Eligible as a distinct edge before PnL because the state variable is the maximum single completed
    prior daily return (or average of the five largest prior daily returns), not a realized moment,
    jump-variation premium, total trailing return, prior-session reversal, volatility state, or 52-week anchor.
variants:
  - high_5d_max_fade_short_1000
  - high_20d_max_fade_short_1130
  - high_63d_max_fade_short_1200
  - low_5d_max_carry_long_1030
  - high_avg_top5_20d_fade_short_1430
