campaign_id: es_pivot_filtered_prior_value_area_acceptance
title: ES prior value-area acceptance filtered by completed pivot market structure
decision: FAIL
created_at: '2026-06-20'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Prior-session value-area acceptance should be more robust when the acceptance direction agrees with carried completed
  5/15-minute swing-pivot market structure and is not opposed by either checked timeframe.
rationale: 'This is a bounded composite campaign: the primary edge is prior-session accepted-value boundary continuation with
  aggregate orderflow confirmation, and the fixed secondary condition is completed swing-pivot direction. Price must close
  beyond prior VAH/VAL using only the prior completed RTH profile approximation, same-direction aggregate flow must confirm,
  and carried 5/15-minute pivot structure must support the trade direction with no opposite checked timeframe.'
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports objective intraday support/resistance levels having predictive content; prior value-area boundaries
    are treated as accepted-value support/resistance.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates order-flow imbalance as a price-pressure proxy; this campaign uses Sierra completed-bar signed-volume
    imbalance, not quote-depth OFI.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  venue: Exchange market profile documentation
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supports profile-style historical volume/liquidity analysis; this campaign adapts the
    idea to ES completed RTH OHLCV.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: Supports deterministic local-extrema pattern definitions; the pivot filter uses completed swing pivots only.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Provides futures-market support for trend persistence; this campaign uses it only to motivate requiring value
    acceptance to align with completed intraday structure.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline
- prior-session approximate VAH/VAL/POC computed after the previous RTH session is complete
- completed 5/15-minute pivot-state construction from local ES OHLC bars
lookahead_risks:
- Prior value-area levels are computed only from the previous completed RTH session and frozen before current-session entries.
- Orderflow confirmation uses only the completed signal bar.
- Pivot structure confirms swing highs/lows only after right-side confirmation bars are complete.
- Signals generated from completed bars are filled no earlier than the next bar open by the engine.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
failure_modes:
- The prior value area is an OHLCV approximation rather than true volume-at-price.
- Breaks beyond prior value can be stop probes rather than acceptance.
- The pivot filter can lag fast reversals or select overextended continuation.
- Aggregate signed flow can mark exhaustion rather than informed participation.
- One-tick worse slippage can erase a short-horizon continuation effect.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_prior_value_area_orderflow_acceptance
  - es_trend_filtered_prior_value_area_acceptance_orderflow
  - es_market_structure_pivot_trend_bias
  - es_pivot_filtered_mes_participation_crowding_reversion
  - es_pivot_filtered_vwap_pullback_continuation
  conclusion: Eligible as a bounded composite campaign. Existing value-area acceptance did not require completed pivot direction;
    the active trend-filtered value-area sibling used rolling completed-bar higher-high/lower-low windows rather than carried
    four-pivot HH/HL or LH/LL structure.
