research_metadata:
  academic_source: Barndorff-Nielsen, Kinnebrock, and Shephard (2010); Patton and Sheppard (2015); Segal, Shaliastovich, and
    Yaron (2015)
  edge_thesis: Lagged NQ realized semivariance separates bad volatility from good volatility. NQ may either rebound after
    downside-volatility states or continue risk-off after downside-volatility dominance; upside semivariance may identify
    good-volatility states with weaker subsequent expected return.
  mechanic: At 13:30:00 ET, two-sided NQ exposure when the prior five-day semivariance balance rank is in either tail; entry
    is next bar open.
  timeframe_rationale: One-minute bars preserve deterministic completed-bar signal timing, next-bar-open execution, and stop/target
    ordering on the native NQ bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the semivariance edge using a single lagged NQ semivariance rank state
      and fixed intraday direction declared before testing.
    entry_logic_rationale: The semivariance state is shifted from completed prior RTH sessions. The signal uses the completed
      configured 1-minute bar and enters no earlier than the next bar open, with no current-session semivariance or future
      bar information.
    stop_loss_rationale: The percent-from-entry stop is declared before testing, rounded to the NQ tick, and varied only through
      the predeclared stop_pct grid. It is appropriate because the edge is a daily volatility-state proxy rather than a tradable
      price level, so adverse movement invalidates the fixed-horizon exposure without future-derived support, resistance,
      VWAP, or post-entry orderflow.
    target_exit_rationale: The fixed-R target is declared before testing and tied to the initial stop distance, avoiding future
      highs/lows, final VWAP, or post-entry discretion. Target values remain at or above 1.0R and unresolved trades flatten
      at 15:55 ET.
    profitability_rationale: A real NQ semivariance asymmetry effect should survive neighboring semivariance thresholds, stops,
      and targets after costs, monkey controls, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: Semivariance may forecast volatility rather than direction, bad-volatility rebound and continuation
      may cancel across regimes, and no-overnight intraday exposure may be too short for the academic horizon.
    pre_test_decision: approve_for_testing
