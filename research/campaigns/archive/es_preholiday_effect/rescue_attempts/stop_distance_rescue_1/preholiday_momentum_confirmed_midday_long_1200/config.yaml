timeframe: 1m
research_metadata:
  academic_source: Fabozzi Ma and Briley (1994); Ariel (1990); Lakonishok and Smidt (1988)
  edge_thesis: U.S. equity-index futures may earn abnormal positive returns on regular trading sessions immediately preceding full exchange holidays, reflecting documented pre-holiday return premia, lower risk bearing, or holiday-period liquidity/sentiment effects.
  mechanic: At 12:00 ET on the last regular RTH session before a full NYSE holiday, enter long ES only if the completed RTH return is at least the configured threshold; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar signal timing and next-bar-open execution on sparse pre-holiday calendar sessions while avoiding overnight exposure.
  rescue_reason: Original momentum-confirmed variant had only 7/27 profitable combinations and sparse best-row trades; rescue keeps the same momentum-confirmed pre-holiday mechanic and tests adjacent return-threshold plus stop/target parameter space.
  rescue_scope: parameter_space_or_fixed_parameters_only_no_mechanic_change
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_preholiday_effect/preholiday_momentum_confirmed_midday_long_1200 entry mechanic: At 12:00 ET on the last regular RTH session before a full NYSE holiday, enter long ES only if the completed RTH return is at least the configured threshold; flatten by 15:55 ET unless stop or target is hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_preholiday_effect
    source_variant_id: preholiday_momentum_confirmed_midday_long_1200
    source_run_id: rescue1
    source_config_path: campaigns/es_preholiday_effect/rescue_attempts/parameter_space_rescue_1/preholiday_momentum_confirmed_midday_long_1200/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0015
      new: 0.00225
    - path: strategy.entry.params.stop_pct
      old: 0.0015
      new: 0.00225
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.001
      - 0.0015
      - 0.002
      new: &id002
      - 0.0015
      - 0.00225
      - 0.003
