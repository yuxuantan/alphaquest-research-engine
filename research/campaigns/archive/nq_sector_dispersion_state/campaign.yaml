campaign_id: nq_sector_dispersion_state
title: NQ Sector Dispersion State
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged cross-sector return dispersion may proxy breadth stress, concentration risk, or breadth repair that has stronger intraday impact on growth-heavy NQ than ES.
rationale: This NQ port reuses the ES sector-dispersion family before any NQ PnL inspection. It keeps the one-business-day ETF-close availability lag and tests whether NQ has stronger transfer from breadth/dispersion states.
sources:
- title: Cross-Sectional Return Dispersion and Time-Variation in Value and Momentum Premia
  authors: Chris Stivers and Licheng Sun
  year: 2010
  venue: Journal of Financial and Quantitative Analysis
  relevance: Supports cross-sectional dispersion as a state variable related to market conditions and risk premia.
- title: 'Stock Returns and Volatility: A Firm-Level Analysis'
  authors: Gregory R. Duffee
  year: 2001
  venue: Journal of Financial Economics
  relevance: Supports links between return dispersion, volatility, and equity risk states.
- title: Cross-Sectional Dispersion and Expected Returns
  authors: Thanos Verousis and Nikolaos Voukelatos
  year: 2015
  venue: Journal of Banking and Finance
  relevance: Practitioner/academic support for dispersion as an expected-return/risk-state proxy.
data_needs:
- timezone-aware NQ RTH 1-minute Sierra OHLCV/orderflow cache in America/New_York
- cached adjusted daily ETF histories for SPY and sector ETFs
- derived sector-dispersion feature file with one-business-day availability lag
- next-bar execution with commission, slippage, same-day flatten, and no-overnight enforcement
data_quality_caveats:
- Sector ETF adjusted closes are daily state variables, not intraday breadth observations.
- ETF adjusted-close histories may include vendor adjustment conventions; the one-business-day lag avoids same-day close leakage.
- Same-bar stop/target conflicts must remain pessimistic because no tick path is used.
lookahead_risks:
- A session dated D may only use sector ETF closes observed on or before D minus one business day.
- Signals use completed one-minute bars and enter next bar open or later.
- No final session high/low, final VWAP, same-day ETF close, future sector return, or post-entry path information is used.
failure_modes:
- Sector dispersion may be too slow for same-day NQ RTH returns.
- Direction can flip between risk-off breadth deterioration and compensating risk-premium effects.
- Profits may concentrate in crisis regimes or narrow rank thresholds.
- The strongest ES pocket still failed the 70% profitable-combo core gate, so NQ transfer must be broadly robust to continue.
