campaign_id: nq_treasury_rate_orderflow_confirmation
title: NQ Treasury Rate Orderflow Confirmation
decision: FAIL
status: completed_failed
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: Lagged U.S. Treasury yield and curve-shape tail moves condition same-day NQ direction only when completed RTH NQ price movement and aggregate signed orderflow confirm the discount-rate repricing direction before next-bar entry.
rationale: This is a bounded composite edge. The prior Treasury-rate state supplies the exogenous macro/discount-rate pressure using observations strictly before the NQ session. NQ then must confirm direction with completed RTH movement from the session open and cumulative signed or large-trade orderflow. It is distinct from the prior fixed-time Treasury-rate campaign because the macro state alone is not tradable here.
sources:
- title: What Explains the Stock Market's Reaction to Federal Reserve Policy?
  authors: Ben S. Bernanke and Kenneth N. Kuttner
  year: 2005
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2005.00760.x
  link: https://doi.org/10.1111/j.1540-6261.2005.00760.x
  relevance: Documents equity-market sensitivity to interest-rate and discount-rate news.
- title: Measuring the Reaction of Monetary Policy to the Stock Market
  authors: Roberto Rigobon and Brian Sack
  year: 2003
  venue: Quarterly Journal of Economics
  doi: 10.1162/003355303322552810
  link: https://doi.org/10.1162/003355303322552810
  relevance: Supports the macro link between interest-rate movements and equity prices.
- title: Daily Treasury Rates
  authors: U.S. Department of the Treasury
  year: 2026
  venue: Treasury Resource Center
  link: https://home.treasury.gov/resource-center/data-chart-center/interest-rates
  relevance: Free official source for the daily 2-year and 10-year Treasury yield observations used in the local feature file.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article/12/1/47/816163
  relevance: Supports requiring contemporaneous orderflow imbalance confirmation instead of trading the daily rate state alone.
data_needs:
- timezone-aware NQ RTH 1-minute Sierra OHLCV/orderflow cache in America/New_York
- existing local Treasury yield feature file built from free official daily Treasury rates
- 5-minute completed-bar NQ aggregation with cumulative orderflow confirmation
- same-day stop, target, forced-flatten, and no-overnight enforcement
data_quality_caveats:
- Treasury yields are daily observations, not intraday tick data.
- The feature file intentionally excludes same-session Treasury observations, which is conservative if values were published earlier.
- Sierra signed-volume fields are aggregate bar-level proxies, not print-level aggressor truth.
- The full-day decision schedule is used to preserve 50/year feasibility and should be manually reviewed if anything passes.
lookahead_risks:
- An NQ session dated D may only use Treasury observations strictly before D.
- Rolling ranks use only Treasury observations through the mapped observation date.
- Signals use completed NQ bars only; entries must occur at the next bar open or later.
- No final NQ session high/low, final VWAP, future return, or same-day/future Treasury value is used.
failure_modes:
- Lagged daily rate shocks may be fully incorporated before NQ RTH opens.
- Rate-equity sign can switch across inflation, growth, policy, and crisis regimes.
- NQ confirmation may enter after the tradable rate repricing move has already occurred.
- Results may concentrate in 2020 or 2022 rate-volatility regimes.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_treasury_rate_shock_intraday
  - nq_treasury_auction_pressure
  - nq_default_spread_orderflow_risk_premium
  - nq_ofr_financial_stress_intraday
  - nq_dollar_risk_appetite_intraday
  - nq_credit_etf_orderflow_risk_appetite
  - nq_vix_pressure_orderflow_confirmation
  - nq_signed_orderflow_persistence
  conclusion: Eligible as a distinct bounded composite before NQ PnL inspection. The existing NQ Treasury-rate campaign traded lagged Treasury state at fixed bars and failed limited core. This campaign keeps the lagged Treasury state but requires same-session completed NQ price movement plus aggregate orderflow confirmation before next-bar entry. It is not a pure orderflow-persistence, credit-spread, OFR-stress, dollar-risk, VIX-pressure, or Treasury-auction event edge.
