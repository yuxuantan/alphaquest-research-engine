  - 0.0025
  - 0.004
  target_r_multiple:
  - 1.0
  - 1.5
  - 2.0
  combinations_per_variant: 27
variants:
- high_macro_news_short_1030
- high_macro_news_rebound_long_1130
- rising_macro_news_short_1000
- high_interest_news_short_1200
- high_labor_news_short_1330
rescue_policy:
