research_metadata:
  academic_source: Li, Chen, and Liu (2025); Michael, Cucuringu, and Howison (2024);
    Huth and Abergel (2014)
  edge_thesis: Confirmed two-sided afternoon spread-feedback reversion in front NQ.
  mechanic: At 14:00 ET, trade front NQ against a completed 30-minute dislocation
    only when the next contract moved in the same direction but less strongly. Entry
    would be no earlier than the next 1-minute bar open after the completed signal
    bar.
  timeframe_rationale: The derived feature cache is 1-minute RTH data so the signal
    can use completed intraday front-vs-next return windows and next-bar front-contract
    execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: At 14:00 ET, trade front NQ against a completed 30-minute
      dislocation only when the next contract moved in the same direction but less
      strongly.
    entry_logic_rationale: The signal uses front_return_bps, deferred_return_bps,
      and return-gap columns computed from completed current-or-prior bars only. The
      configured entry time is matched to the close of the signal bar, so execution
      cannot occur before the next bar.
    stop_loss_rationale: The stop is a predeclared percent-from-entry distance rounded
      to NQ tick size. It does not use future highs, lows, daily range, or optimized
      per-trade structure.
    target_exit_rationale: The target is a predeclared fixed-R multiple. It avoids
      future-derived levels while allowing a basic spread-feedback reversion payoff
      test if the density gate ever passes under an authorized rerun.
    profitability_rationale: The setup would be profitable only if front-vs-next NQ
      dislocations occur often enough and revert enough after commissions, slippage,
      one-contract sizing, and forced flattening.
    known_failure_modes: Deferred-contract overlap is sparse near roll, the front
      and next contracts may be too synchronized, and the effect may be consumed by
      NQ tick size, spread, slippage, and commission.
    pre_test_decision: approve_for_testing
  source_campaign_id: es_term_structure_lead_lag_feedback
