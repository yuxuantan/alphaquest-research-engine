data_needs:
- data/cache/orderflow/nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny.csv
- data/external/nq_lagged_volatility_features_20110103_20260612.csv
- completed NQ RTH 1-minute OHLCV/orderflow bars
- aligned MES completed-bar volume/trade counts used only as a cross-index micro-participation proxy
lookahead_risks:
- Entry uses completed one-minute bars and enters no earlier than the next bar open.
- MES participation ranks are same-clock prior-session ranks; current value is ranked only against prior
  same-clock history.
- The NQ trend window ends before the pullback/crowding lookback, so the trend filter does not see the
  pullback or future bars.
- The volatility gate is loaded from prior-session lagged NQ features and cannot use current-session high,
  low, close, range, or realized volatility.
- No future NQ return, final daily high/low, final VWAP, post-entry MES/NQ data, or post-entry orderflow
  is used.
failure_modes:
- MES may not proxy MNQ or NQ-specific retail/micro crowding.
- Cross-index MES crowding may be ES-specific and fail to transmit to NQ after costs.
- Lagged volatility gates can remove winners as well as losses.
- Fixed 10:30 NQ reversals may be too noisy or too small after NQ costs.
- The edge may fail prop-style path tests even if core/WFA aggregate metrics look acceptable.
