campaign_id: nq_mes_crowding_vol_filtered_trend_pullback_reversion
title: NQ MES-Crowding Volatility-Filtered Trend-Pullback Reversion
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny
timeframe: 1m
edge_family: mes_cross_index_participation_crowding_trend_pullback_extreme_volatility_veto
hypothesis: MES smaller-contract participation can proxy broad equity-index retail/micro crowding; when
  NQ completes a trend-pullback against a prior trend and lagged NQ volatility is not extreme, crowded
  MES participation may mark temporary pressure that mean-reverts on the NQ execution leg.
rationale: This is an NQ execution-leg port of the strongest ES MES-crowding volatility-veto evidence.
  Because no MNQ participation cache exists locally, MES is explicitly treated as a cross-index micro-participation
  proxy rather than a native NQ crowding measure, and the campaign must fail closed if the full staged
  pipeline does not validate that proxy.
sources:
- title: Resolving a Paradox - Retail Trades Positively Predict Returns but Are Not Profitable
  authors: Brad M. Barber, Ching-Chi Lin, and Terrance Odean
  year: 2024
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.cambridge.org/core/journals/journal-of-financial-and-quantitative-analysis/article/resolving-a-paradox-retail-trades-positively-predict-returns-but-are-not-profitable/6AAA9078F50C2597F44D73FA6A8E3F0D
  relevance: Motivates conditioning on retail-like or smaller-ticket participation intensity.
