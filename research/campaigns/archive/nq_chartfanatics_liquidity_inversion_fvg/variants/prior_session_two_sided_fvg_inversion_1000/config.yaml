research_metadata:
  academic_source: Chart Fanatics Liquidity Inversion Model; Lo, Mamaysky, and Wang (2000); Osler (2003)
  edge_thesis: The prior RTH high/low pair defines the cleanest RTH-only liquidity draw when the full monthly/daily/ETH context
    is unavailable locally.
  mechanic: 'Two-sided prior-session liquidity variant: prior-high sweeps can short after bullish FVG inversion and prior-low
    sweeps can long after bearish FVG inversion.'
  timeframe_rationale: Five-minute bars are the coarsest local RTH approximation that still supports completed three-bar FVG
    detection, New York 10:00 timing, next-bar execution, and enough observations for a density screen.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: 'Two-sided prior-session liquidity variant: prior-high sweeps can short after bullish FVG inversion
      and prior-low sweeps can long after bearish FVG inversion.'
    entry_logic_rationale: The entry module first observes a prior/session liquidity sweep, then waits for a completed three-bar
      FVG in the swept direction, and emits only after a later completed bar closes through the gap boundary. The signal timestamp
      is the next five-minute bar boundary.
    stop_loss_rationale: The sweep-extreme stop is beyond the protected high for shorts or protected low for longs plus a
      predeclared tick offset, matching the source idea that the stop belongs where the chart is wrong.
    target_exit_rationale: The fixed-R target is predeclared and paired with same-day flattening. Local technical targets
      like future session lows/highs are not used because they would require post-entry or future-derived levels.
    profitability_rationale: The edge should work only if liquidity-sweep participants are trapped often enough after FVG
      inversion to overcome one-tick slippage, commissions, structural stops, and pessimistic OHLC fill ordering.
    known_failure_modes: The RTH-only OHLC proxy omits monthly/daily/four-hour and one-minute discretionary context; five-minute
      gaps may not represent true lower-timeframe imbalance; the pattern may duplicate generic stop-run reversal without edge.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/liquidity-inversion-model
  rescue_status: none
strategy:
