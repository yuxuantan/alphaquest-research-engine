research_metadata:
  academic_source: Caldara and Iacoviello (2022); Iacoviello and Tong (2026) AI-GPR
    daily index
  edge_thesis: Lagged high geopolitical-threat coverage may weigh on NQ through uncertainty
    and delayed risk reduction before realized acts occur.
  mechanic: At 11:30 ET, short NQ when the 30-calendar-day-lagged 21-day AI-GPR threats
    rank is in the upper tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: One-minute bars provide deterministic completed-bar timing
    and next-bar-open execution while the AI-GPR state is daily and conservatively
    lagged.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: The variant isolates the threats component of geopolitical
      risk and expresses it as risk-off NQ pressure.
    entry_logic_rationale: The AI-GPR state comes from a feature table that requires
      a 30-calendar-day availability lag, and the intraday signal is emitted only
      on the completed one-minute bar ending at the configured entry time, so entry
      can occur no earlier than the next bar open.
    stop_loss_rationale: The percent stop is declared before any PnL inspection, rounded
      to the NQ tick by the engine, and evaluated under the existing pessimistic same-bar
      stop-target ordering.
    target_exit_rationale: The fixed-R target and 15:55 ET flatten are declared before
      testing and do not depend on final VWAP, final session range, future GPR values,
      or discretionary exits.
    profitability_rationale: If threat coverage raises uncertainty and risk premia
      before realized events, short exposure should produce stable intraday expectancy
      across threat regimes.
    known_failure_modes: Threat coverage may be persistent but non-incremental, may
      already be priced, or may be swamped by rates and earnings news.
    data_availability_caveat: The historical AI-GPR daily file is tested with a conservative
      30-calendar-day lag; real-time publication cadence must be manually reviewed
      if this passes.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_ai_gpr_geopolitical_risk_state_density_audit_20260701.md
    status: passed_before_pnl
strategy:
  entry:
    module: ai_gpr_geopolitical_risk_state
    params:
      setup_mode: high_threats_gpr_short
      feature_csv: data/external/nq_ai_gpr_features_20110103_20260612.csv
      state_name: AI-GPR threats 21-day level
      value_column: threats_gpr_ai_21d
      rank_column: threats_gpr_ai_21d_rank_252
      gpr_rank_threshold: 0.3
      entry_time: '11:30:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.004
      target_r_multiple: 2.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.004
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '15:55:00'
rescue_policy:
  allowed: false
  reason: No rescue is authorized after staged results without explicit user approval.
