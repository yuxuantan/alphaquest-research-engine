research_metadata:
  academic_source: Osler (2000); Holmberg, Lonnback, and Lundstrom (2013); Cont, Kukanov, and Stoikov
    (2014)
  edge_thesis: NQ opening-range failed breakouts that reclaim the range with opposite aggregate orderflow
    may reverse back through the opening auction range.
  mechanic: Build the first 60-minute RTH opening range, wait for a completed close outside it, then trade
    the completed reclaim back inside before 12:00:00 only when the reclaim bar has opposite aggregate
    signed volume.
  timeframe_rationale: 5-minute bars reduce one-minute opening churn while the staged engine still uses
    local 1-minute detail data for same-bar stop/target conflict handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the opening-range failed-breakout edge by requiring
      price to first close outside the completed 60-minute RTH opening range, then close back through
      that same boundary within the declared reclaim window. The reclaim bar must show aggregate signed
      volume opposite the failed break, so price action defines the level and orderflow confirms the reversal
      pressure.
    entry_logic_rationale: The entry waits for a completed outside close and a separate completed reclaim
      close before any order can be placed. Using max_reclaim_bars [3, 4] avoids late fades that are no
      longer failed breakouts, while min_reclaim_orderflow_imbalance [0.02, 0.06, 0.1] requires observable
      pressure in the new direction without inspecting post-entry bars.
    stop_loss_rationale: The stop uses the reclaimed opening-range boundary plus a predeclared offset.
      If price retakes the failed-breakout side of the range after entry, the reclaim thesis is invalid.
      The fixed max_stop_points cap rejects very wide opening ranges where the level stop would create
      poor drawdown geometry.
    target_exit_rationale: The target is the opposite opening-range edge, which matches the hypothesis
      that a failed breakout should rotate back through the opening auction range. The target is fixed
      before testing and does not use final session range, final VWAP, or post-entry orderflow.
    profitability_rationale: The idea is convincing enough to test because the opening range is a public
      intraday reference, failed breaks can trap breakout participants, and opposite aggregate flow on
      the reclaim bar is a plausible sign that liquidity has shifted. The pre-PnL density screen kept
      only grids with enough events to plausibly reach the 50-trades/year benchmark; this variant's strict
      retained grid floor was about 53.3 raw signals/year.
    known_failure_modes: The setup should fail if opening-range reclaims are random chop, if signed-flow
      classification is too noisy, if the opposite-edge target is too ambitious, if losses cluster during
      trend days, or if results depend on a narrow volatility regime.
    pre_test_decision: approve_for_testing
  pre_pnl_port_note: This is a direct NQ port of the ES opening-range failed-breakout orderflow family
    before any NQ PnL inspection; the ES family failed limited-core and no NQ rescue is authorized.
  source_es_config_path: campaigns/es_opening_range_failed_breakout_orderflow/variants/or60_signed_failed_reclaim_1200/config.yaml
