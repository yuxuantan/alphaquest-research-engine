campaign_id: nq_treasury_rate_shock_intraday
title: NQ Treasury Rate Shock Intraday
status: completed
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged U.S. Treasury yield shocks and curve-shape changes may condition
  same-day NQ intraday returns because growth-stock futures can be sensitive to discount-rate
  news, risk-bearing capacity, and stock-bond allocation pressure after large rate
  moves.
rationale: This is a weak-prior NQ symbol-transfer from the failed ES Treasury-rate
  family. It is distinct from default-spread, OFR stress, variance-risk-premium, event-day
  drift, and orderflow campaigns because it uses lagged 2-year and 10-year Treasury
  daily yield states strictly before the NQ session date.
research_sources:
- title: What Explains the Stock Market's Reaction to Federal Reserve Policy?
  author: Ben S. Bernanke and Kenneth N. Kuttner
  year: 2005
  link_or_doi: 10.1111/j.1540-6261.2005.00760.x
  expected_mechanism: Equity markets are sensitive to interest-rate and discount-rate
    news; this tests lagged Treasury yield states rather than intraday surprises.
- title: Measuring the Reaction of Monetary Policy to the Stock Market
  author: Roberto Rigobon and Brian Sack
  year: 2003
  link_or_doi: 10.1162/003355303322552810
  expected_mechanism: Supports the macro link between interest-rate changes and equity
    prices, with rates treated as lagged state variables.
- title: Daily Treasury Rates
  author: U.S. Department of the Treasury
  year: 2026
  link_or_doi: https://home.treasury.gov/resource-center/data-chart-center/interest-rates
  expected_mechanism: Official daily 2-year and 10-year Treasury yield observations
    used for no-lookahead NQ rate-state features.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/us_treasury_daily_yield_curve_rates_2010_2026.csv
- data/external/nq_treasury_rate_state_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_es_treasury_rate_state_features.py
  output: data/external/nq_treasury_rate_state_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3754
  lookahead_control: Each NQ session receives the latest Treasury observation whose
    observation_date is strictly before the session date.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-06-30'
  existing_nq_campaign_id: none
  es_source_campaign: es_treasury_rate_shock_intraday
  es_source_decision: FAIL
  not_duplicate_of:
  - nq_default_spread_orderflow_risk_premium
  - nq_ofr_financial_stress_intraday
  - nq_variance_risk_premium_intraday
  - nq_fomc_pre_announcement_drift
  - nq_dollar_risk_appetite_intraday
  conclusion: This campaign uses lagged Treasury yield and curve movement. It is not
    credit/default spread, financial stress, variance risk premium, scheduled FOMC
    drift, or broad-dollar risk appetite.
parameter_space:
  combinations_per_variant:
    one_entry_parameter: 27
    two_entry_parameters: 81
  entry_parameters: source ES grids retained after NQ density audit
  stop_parameters:
    sl.params.stop_pct:
    - 0.0015
    - 0.0025
    - 0.004
  take_profit_parameters:
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
variants:
- rate_up_short_1000
- rate_down_long_1000
- rate_up_high_level_short_1030
- bear_steepening_short_1130
- bull_flattening_long_1130
density_audit:
  artifact: research_artifacts/nq_treasury_rate_shock_intraday_density_audit_20260630.md
  conclusion: Every declared source-grid threshold corner clears the 50 signals/year
    pre-PnL density gate on the NQ RTH cache.
rescue_policy:
