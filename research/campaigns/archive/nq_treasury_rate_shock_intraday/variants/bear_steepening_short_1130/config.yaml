timeframe: 1m
research_metadata:
  academic_source: Bernanke and Kuttner (2005); Rigobon and Sack (2003); U.S. Treasury
    Daily Treasury Rates
  edge_thesis: Lagged Treasury-rate shocks may condition NQ same-day returns. At 11:30
    ET, short NQ when prior 10-year yield-change rank and 10y-2y curve-change rank
    are both elevated.
  mechanic: At 11:30 ET, short NQ when prior 10-year yield-change rank and 10y-2y
    curve-change rank are both elevated.
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open
    NQ execution while Treasury yield state is lagged by requiring observation_date
    strictly before the NQ session date.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_treasury_rate_shock_intraday_density_audit_20260630.md
    density_basis: declared ES Treasury-rate threshold grids
    selected_grid_min_signals: 816
    selected_grid_min_signals_per_year: 52.854052
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 11:30 ET, short NQ when prior 10-year yield-change
      rank and 10y-2y curve-change rank are both elevated.
    entry_logic_rationale: The signal reads only Treasury yield and curve features
      built from observations strictly before the NQ session date plus the completed
      1-minute bar immediately before entry. Same-session Treasury values, current-session
      future bars, and post-entry returns are unavailable and unused.
    stop_loss_rationale: A percent-from-entry stop is used because the rate state
      is a daily macro condition, not a discrete intraday NQ price level with a natural
      invalidation tick.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten tests same-day NQ
      expression of the lagged rate state while forbidding overnight exposure and
      keeping prop-rule flatten enforcement explicit.
    profitability_rationale: The variant can only work if lagged Treasury-rate shocks
      condition enough same-day NQ drift to overcome commission, one tick of slippage,
      and pessimistic same-bar stop-target ordering.
    known_failure_modes: The ES source family failed original and rescue grids, so
      this NQ transfer is weak-prior. It can fail if rate news is incorporated before
      RTH, if rate-equity signs flip by inflation/growth regime, or if gains concentrate
      in a narrow macro regime.
    pre_test_decision: approve_for_testing
