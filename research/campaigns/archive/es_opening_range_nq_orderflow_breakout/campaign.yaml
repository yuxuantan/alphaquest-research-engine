created_at: '2026-06-19'
instrument: ES
market_timezone: America/New_York
edge_family: opening_range_nq_orderflow_breakout
hypothesis: ES opening-range breakouts may have better same-session continuation odds
  when the completed breakout bar is supported by ES aggregate signed flow and NQ
  is leading ES in the same direction over a completed lookback window. NQ leadership
  is treated as cross-index information transfer, while the opening range supplies
  the public ES price-action trigger.
rationale: 'This is a bounded composite edge. Price action is primary: ES must close
  outside a completed opening-range boundary. ES aggregate orderflow is a same-bar
  participation confirmation, and NQ leadership is a cross-index confirmation that
  related Nasdaq futures have already moved more strongly in the breakout direction.
  The trade is always ES, next-bar open, intraday only, and local data only.'
sources:
- title: Assessing the profitability of intraday opening range breakout strategies
  authors: Ulf Holmberg, Carl Lonnback, Christian Lundstrom
  year: 2013
  venue: Finance Research Letters
  link: https://ideas.repec.org/a/eee/finlet/v10y2013i1p27-33.html
  doi: 10.1016/j.frl.2012.09.001
  relevance: Supports mechanical opening-range breakouts as intraday rules; this campaign
    adds predeclared cross-index and flow confirmation.
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  link: https://ideas.repec.org/a/eee/jfinec/v129y2018i2p394-414.html
  doi: 10.1016/j.jfineco.2018.05.009
  relevance: Documents that early intraday market information can predict later market
    returns.
- title: High Frequency Lead/Lag Relationships - Empirical Facts
  authors: Nicolas Huth and Frederic Abergel
  year: 2014
  venue: Empirical market microstructure working paper
  link: https://ideas.repec.org/p/hal/wpaper/hal-00645685.html
  relevance: Motivates cross-market lead-lag propagation between related liquid instruments.
- title: Lead-Lag Relationships in Market Microstructure
  authors: Julian Schmidt, Tino Cestonaro, and Micha Bender
  year: 2024
  venue: SSRN
  link: https://doi.org/10.2139/ssrn.5043260
  relevance: Reviews predictive cross-market relationships in microstructure data.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports orderflow imbalance as short-horizon price-pressure evidence;
    this campaign uses completed Sierra aggregate flow, not quote-level OFI.
data_needs:
- data/cache/orderflow/es_nq_lead_lag_1m_20110103_20260609_full_rth_ny.parquet
- completed ES OHLCV and aggregate signed-volume fields
- completed ES/NQ rolling return-bps features for 5/15/30/60 minute windows
data_quality_caveats:
- The ES/NQ cache is built from local Sierra completed-bar aggregate data, not tick-path
  or LOB data.
- NQ leadership at one-minute resolution may already be arbitraged before next-bar
  ES entry.
- Same-bar stop/target conflicts remain pessimistic unless detail data resolves path.
lookahead_risks:
- Opening range high/low are frozen only after the configured opening window completes.
- NQ and ES return features are completed rolling-window features ending at the signal
  bar close.
- ES orderflow confirmation uses only the completed breakout bar or confirmation bars.
- A signal generated from bar close is filled no earlier than the next ES bar open.
- No final VWAP, final range, future ES/NQ bars, or post-entry orderflow is used.
failure_modes:
- NQ may lead only within the same minute, leaving no next-bar edge.
- ES aggregate orderflow can confirm late exhaustion rather than continuation.
- Opening-range breakouts can be stop probes and reverse after entry.
- Profits can concentrate in technology-led regimes, crisis sessions, or one side.
- The combined filters can still be too sparse or too sensitive to slippage and entry
  delay.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_opening_range_orderflow_breakout
