  - es_nq_cross_index_lead_lag
  - es_nq_relative_value_orderflow_absorption_reversion
  - es_trend_aligned_orderflow_continuation
  conclusion: Eligible as a bounded composite. Existing OR/orderflow campaigns did
    not require NQ leadership. Existing NQ lead-lag campaigns used fixed-time NQ/ES
    return propagation or relative-value reversion without requiring a completed ES
    opening-range breakout plus same-bar ES orderflow confirmation.
