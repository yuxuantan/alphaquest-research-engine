campaign_id: nq_round_number_orderflow_barrier
title: NQ Round-Number Orderflow Barrier
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: NQ futures may react around fixed psychological handles when completed aggregate orderflow separates absorbed
  failed probes from participated breakouts.
rationale: This is the NQ port of the ES round-number orderflow composite, not the price-only NQ round-number campaign. Levels
  are fixed ex ante and every signal requires completed-bar aggregate flow confirmation before next-bar entry.
sources:
- title: Price Barriers in the Dow Jones Industrial Average
  authors: R. Glen Donaldson and Harold Y. Kim
  year: 1993
  link: https://ideas.repec.org/a/cup/jfinqa/v28y1993i03p313-330_00.html
  relevance: Documents support/resistance and continuation behavior around salient index barriers.
- title: Currency Orders and Exchange-Rate Dynamics
  authors: Carol L. Osler
  year: 2003
  link: https://www.newyorkfed.org/research/staff_reports/sr125.html
  relevance: Documents order clustering around round-number support and resistance levels.
- title: Stop-Loss Orders and Price Cascades in Currency Markets
  authors: Carol L. Osler
  year: 2005
  link: https://ideas.repec.org/a/eee/jimfin/v24y2005i2p219-241.html
  relevance: Supports the continuation mechanism after clustered stops are triggered.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates completed-bar orderflow imbalance as a fragile short-horizon confirmation proxy.
data_needs:
- NQ one-minute RTH OHLCV and aggregate orderflow cache in America/New_York
- Deterministic 5-minute aggregation with signed, large10, and large20 fields summed from completed one-minute bars
- Next-bar execution, NQ tick size, point value, commission, slippage, and config-driven forced flatten
lookahead_risks:
- Round-number barriers are fixed before the session and do not use future session highs/lows, VWAP, profile, or orderflow-derived
  levels.
- Orderflow confirmation uses only the completed signal bar.
- Signals using a bar close can fill only at the next 5-minute bar open or later.
- All variants flatten before the configured prop-firm cutoff and hold no overnight positions.
duplicate_edge_check:
  active_scope_only: true
  active_rejected_edges_checked:
  - nq_round_number_barrier_reaction
  - nq_20_80_price_ending_barrier
  - es_round_number_orderflow_barrier
  - nq_key_reversal_orderflow_reversal
  - nq_signed_orderflow_persistence
  conclusion: Eligible as a distinct NQ composite because the existing NQ round-number campaign is price-only and the ChartFanatics
    20/80 campaign is a different modulo-100 ending rule. This campaign tests fixed 25/50 handles only when completed aggregate
    flow confirms absorption or participation.
