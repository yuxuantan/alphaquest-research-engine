campaign_id: nq_volatility_filtered_intraday_momentum_priority
title: NQ Volatility-Filtered Intraday Momentum Priority
decision: FAIL
created_at: '2026-06-22'
instrument: NQ
market_timezone: America/New_York
edge_family: volatility_conditioned_nq_intraday_momentum
hypothesis: >
  NQ first-hour upside momentum should have stronger same-day continuation value
  when prior-session realized volatility or range conditions are not already
  extreme. The volatility state is computed from completed prior RTH sessions
  and is available before the 10:30 ET signal decision.
rationale: >
  This campaign starts from the strongest current NQ price-only shape observed
  in the repo, the 10:30 ET long-only strength-efficiency slot, and adds a
  predeclared NQ lagged-volatility filter rather than post-result tuning. NQ is
  structurally more growth/technology weighted than ES, so volatility expansion
  and crowding may more often turn morning continuation into exhaustion; the
  variants test distinct lagged volatility proxies for that same mechanism.
sources:
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  link: https://ideas.repec.org/a/eee/jfinec/v129y2018i2p394-414.html
  doi: 10.1016/j.jfineco.2018.05.009
  relevance: Supports testing whether completed intraday index-market returns forecast later same-day direction.
- title: Volatility-Managed Portfolios
  authors: Alan Moreira, Tyler Muir
  year: 2017
  venue: Journal of Finance
  link: https://doi.org/10.1111/jofi.12513
  doi: 10.1111/jofi.12513
  relevance: Motivates conditioning risk-taking on lagged realized volatility when expected returns do not rise one-for-one with volatility.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2011.11.003
  relevance: Provides broader futures momentum context while this campaign tests only same-day NQ continuation.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/nq_lagged_volatility_features_20110103_20260612.csv
- America/New_York session labels, completed RTH bars, fixed NQ tick economics, and forced intraday flatten handling
lookahead_risks:
- The 10:30 ET signal uses only completed NQ RTH bars from 09:30 ET through the signal close.
- The volatility feature CSV is generated by shifting daily features to the next session; a row dated 2020-01-03 contains only information available after 2020-01-02 RTH.
- Entry can occur only after the completed signal bar through the engine's next-bar execution.
- No final session high, low, VWAP, volume profile, daily range, or post-entry data is used.
duplicate_edge_check:
  active_scope_only: true
  existing_results_checked:
  - nq_archive_intraday_momentum_retest
  - nq_archive_range_compression_retest
  - nq_morning_orderflow_momentum_continuation
  conclusion: >
    This is not a duplicate of the ES-to-NQ orderflow port. It is a bounded
    NQ-specific continuation hypothesis using lagged NQ volatility state on top
    of the existing NQ morning momentum shape.
variants:
- low_range10_1030_long_strength_efficiency
- low_vol20_1030_long_strength_efficiency
- low_absret5_1030_long_strength_efficiency
- low_downside20_1030_long_strength_efficiency
- vol_downshift_1030_long_strength_efficiency
rescue_policy:
  allowed: false
  reason: >
    The volatility proxy, threshold grid, 10:30 ET long-only mechanics, stop
    grid, and target grid are declared before testing. If this campaign fails,
    do not rescue it without explicit user authorization.
testing_plan:
  methodology: current staged research pipeline including acceptance_oos_test
  fixed_core_trade_log_required: true
  costs:
    commission_per_contract: 2.5
    slippage_ticks: 1
    tick_size: 0.25
    point_value: 20.0
result_summary:
  decision: FAIL
  report_root: backtest-campaigns/nq_volatility_filtered_intraday_momentum_priority
  variants_tested: 5
  variants_passed: 0
  corrected_config_runs:
    low_range10_1030_long_strength_efficiency:
      run1: unsupported data.feature_set metadata; corrected in run2 without changing strategy mechanics
  terminal_stages:
    limited_monkey_test: 4
    walk_forward_analysis: 1
  failure_reason: >
    All five predeclared volatility-filtered NQ morning momentum variants failed
    before full-stage completion. low_range10 passed limited core and monkey but
    failed WFA by early exit with zero stitched OOS trades. low_vol20, low_absret5,
    low_downside20, and vol_downshift failed limited_monkey_test on randomized
    baseline gates. No variant reached WFA OOS monkey, Monte Carlo, simulated
    incubation, or acceptance.
  rescue_used: false
