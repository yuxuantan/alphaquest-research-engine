campaign_id: es_gao_last_half_hour_orderflow_confirmation
title: ES Gao last-half-hour continuation with aggregate orderflow confirmation
decision: FAIL
created_at: '2026-06-17'
instrument: ES
market_timezone: America/New_York
edge_family: last_half_hour_orderflow_confirmed_intraday_momentum
hypothesis: The first RTH window return may predict last-half-hour ES direction when
  completed aggregate orderflow in the first window confirms that the early move had
  aggressive participation.
sources:
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  link: https://ideas.repec.org/a/eee/jfinec/v129y2018i2p394-414.html
  doi: 10.1016/j.jfineco.2018.05.009
  relevance: Documents first-half-hour market return predicting last-half-hour returns;
    this campaign adds completed aggregate orderflow confirmation.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  doi: 10.1093/jjfinec/nbt003
  relevance: Supports orderflow imbalance as a short-horizon price-pressure proxy;
    this campaign uses completed Sierra aggregate trade-side flow.
rationale: 'This is a bounded composite edge: Gao-style first-window price action
  predicts late-day continuation only when completed aggregate orderflow confirms
  the first-window direction. It is distinct from the failed active late-day momentum
  campaign because price return alone cannot trigger a trade, and distinct from signed-flow
  persistence because the last-half-hour entry is anchored to the published first-window-to-last-window
  anomaly.'
data_needs:
- local Sierra ES RTH 1-minute aggregate orderflow cache
- 5-minute completed strategy bars
- signed_volume, volume, large20_signed_volume, large20_volume
lookahead_risks:
- The first-window return and aggregate flow are complete long before the 15:30 ET
  signal.
- The signal is generated at the completed 15:25-15:30 bar and enters no earlier than
  the next bar open.
- No final session close, last-half-hour return, future VWAP, or future high/low is
  used.
- Forced flatten is configured for 15:55 ET.
failure_modes:
- The published ETF/index effect may not survive ES futures costs and slippage.
- Orderflow confirmation may identify exhausted early pressure instead of informed
  participation.
- The last-half-hour window may be too short for fixed-R exits after realistic costs.
- Results may concentrate in crisis or macro-event sessions.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_late_day_intraday_momentum
  - es_signed_orderflow_persistence
  - es_trend_aligned_orderflow_continuation
  - es_opening_range_orderflow_breakout
  - es_opening_drive_inventory_absorption
  conclusion: 'Eligible as a composite campaign: the trigger requires both the Gao
    first-window price-action predictor and first-window aggregate orderflow confirmation.
    Existing active failures tested price-only late-day momentum, standalone flow
    persistence, general trend-flow, or opening-range/orderflow mechanics.'
variants:
- first30_signed_flow_two_sided_1530
- first30_large20_flow_two_sided_1530
- first60_signed_flow_two_sided_1530
- first60_large20_flow_two_sided_1530
- first30_broad_large_alignment_1530
