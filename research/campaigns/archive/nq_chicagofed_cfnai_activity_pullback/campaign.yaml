campaign_id: nq_chicagofed_cfnai_activity_pullback
title: NQ Chicago Fed CFNAI Activity Pullback
decision: FAIL
status: completed
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged broad U.S. real-activity weakness, measured by the Chicago Fed
  National Activity Index and its major components, can identify sessions where an
  NQ RTH pullback earns a higher same-day rebound premium after realistic costs.
rationale: This campaign tests a symbol-specific NQ transfer of a lagged real-activity
  state conditioned by a completed same-session pullback. It is not an NQ OFR stress,
  Cboe volatility, sector rotation, SPX 0DTE, order-flow periodicity, opening-range,
  seasonality, overnight drift, or MES-crowding campaign. The ES CFNAI family failed
  its staged tests, so this NQ transfer carries a weak prior and must pass the full
  NQ staged workflow on its own.
sources:
- title: 'Chicago Fed National Activity Index: Current Data'
  authors: Federal Reserve Bank of Chicago
  year: 2026
  venue: Official CFNAI data release
  link: https://www.chicagofed.org/research/data/cfnai/current-data
  relevance: Official monthly CFNAI source and release timing; CFNAI is designed to
    gauge overall economic activity and related inflationary pressure.
- title: Background on the Chicago Fed National Activity Index
  authors: Federal Reserve Bank of Chicago
  year: 2026
  venue: Chicago Fed CFNAI background note
  link: https://www.chicagofed.org/~/media/publications/cfnai/background/cfnai-background-pdf.pdf
  relevance: Documents CFNAI as a weighted average of monthly national activity indicators
    and describes the production, employment, consumption, and sales/orders components.
- title: Business Conditions and Expected Returns on Stocks and Bonds
  authors: Eugene F. Fama and Kenneth R. French
  year: 1989
  venue: Journal of Financial Economics 25, 23-49
  link: https://ideas.repec.org/a/eee/jfinec/v25y1989i1p23-49.html
  relevance: Documents time variation in expected stock returns across business conditions,
    motivating a test of weak activity states as an equity risk-premium conditioner.
- title: Forecasting Inflation
  authors: James H. Stock and Mark W. Watson
  year: 1999
  venue: Journal of Monetary Economics 44, 293-335
  link: https://doi.org/10.1016/S0304-3932(99)00027-6
  relevance: The Chicago Fed describes CFNAI as methodologically related to the Stock-Watson
    common-factor activity index framework.
data_needs:
- timezone-aware NQ RTH 1-minute OHLC bars in America/New_York
- local Chicago Fed CFNAI monthly feature cache derived from official public CFNAI
  data
- session feature file assigning only the latest CFNAI observation whose eligible
  date is on or before the NQ session
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- CFNAI is monthly and can be revised; this campaign uses a conservative eligible-date
  feature cache rather than real-time vintage files.
- The feature is a lagged macro state, not a high-frequency causal signal; any pass
  still requires manual chart review and paper incubation.
- NQ Sierra data is aggregated bar-level data, not tick-path data; same-bar stop/target
  conflicts must remain pessimistic.
- The source ES CFNAI campaign failed; this NQ transfer is tested only because NQ
  may respond differently to broad real-activity states.
lookahead_risks:
- Using a CFNAI observation before its conservative eligible date would leak future
  macro data and is forbidden.
- Signals use only completed RTH bars through the configured signal time; close-based
  signals must enter at the next bar open or later.
- No final session high/low, final VWAP, final range, future CFNAI revisions, or post-entry
  price data are used for entry.
failure_modes:
- A monthly activity state may be too slow to predict same-day NQ intraday returns
  after costs.
- Weak activity may be bearish rather than a higher expected-return state, causing
  pullbacks to continue rather than revert.
- Results may concentrate in crisis or post-crisis years, isolated macro regimes,
  or one large trade per year.
- A same-session pullback filter may just select volatile selloff days with poor fill
  quality and unfavorable same-bar stop handling.
- The ES family already failed limited-core robustness, so a similar NQ failure would
  close this transfer quickly.
