campaign_id: nq_20_80_price_ending_barrier
title: NQ 20/80 terminal price-ending reactions filtered by completed pivot market structure
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: nq_20_80_price_ending_barrier
hypothesis: NQ may show repeatable intraday reactions at price levels whose final two digits are 20 or 80, but only when completed
  5/15-minute pivot market structure agrees with the reaction direction.
rationale: Chart Fanatics describes the 80/20 Nasdaq model as an NQ-specific terminal-price reaction playbook using levels
  ending in 20 and 80 plus clear structure. This campaign makes that idea objective with modulo-100 20/80 levels, completed-bar
  reactions, and a fixed completed-pivot structure filter.
research_sources:
- title: 80/20 Nasdaq Strategy
  author: Okala / Chart Fanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/80-20-nasdaq-strategy
  expected_mechanism: Practitioner playbook states that NQ reacts around price endings 20 and 80 and requires market structure
    confirmation before entry.
- title: Price Barriers in the Dow Jones Industrial Average
  author: R. Glen Donaldson and Harold Y. Kim
  year: 1993
  link_or_doi: https://ideas.repec.org/a/cup/jfinqa/v28y1993i03p313-330_00.html
  expected_mechanism: Documents support/resistance and break behavior around salient index price barriers; used as external
    support for price-level clustering, not as direct evidence for NQ 20/80 endings.
- title: Currency Orders and Exchange-Rate Dynamics
  author: Carol L. Osler
  year: 2003
  link_or_doi: https://www.newyorkfed.org/research/staff_reports/sr125.html
  expected_mechanism: Documents clustered orders near round-number support and resistance; supports a general stop/take-profit
    clustering channel.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  author: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  link_or_doi: https://doi.org/10.1111/0022-1082.00265
  expected_mechanism: Supports deterministic local-extrema pattern definitions; this campaign uses completed pivot structure
    as the objective structure filter.
source_quality_note: The 20/80 rule itself is practitioner-originated. Academic sources only support the broader price-barrier
  and deterministic-pattern framing, so this campaign must fail closed if robustness is weak.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- 5-minute NQ bars generated deterministically from completed 1-minute RTH Sierra bars
- fixed modulo-100 terminal price levels ending in 20 or 80, known before each bar
- completed 5/15-minute pivot-state construction from local NQ OHLC bars
lookahead_risks:
- The 20/80 levels are ex-ante fixed from price arithmetic and do not use future highs/lows, VWAP, or volume profile.
- The signal uses only the completed 5-minute OHLC bar and enters no earlier than the next bar open.
- Pivot structure confirms swing highs/lows only after right-side confirmation bars are complete.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
failure_modes:
- Practitioner 20/80 behavior may not survive objective rules, costs, and long-history testing.
- The effect may be a dressed-up round-number/handle effect already arbitraged by faster participants.
- A 5-minute bar may hide tick-path sequencing around fast level probes, so pessimistic same-bar stop/target handling is required.
- Market-structure confirmation can lag and enter after the level reaction is already exhausted.
- Profit may concentrate in a few high-volatility sessions or directional regimes.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  checked_edges:
  - nq_round_number_barrier_reaction
  - es_round_number_barrier_reaction
  - es_round_number_orderflow_barrier
  - nq_prior_session_level_breakout_continuation
  - nq_pivot_mes_orderflow_confirmation
  - nq_pivot_filtered_prior_value_area_acceptance
  conclusion: Eligible as a distinct Chart Fanatics-derived NQ terminal-price campaign. Prior round-number campaigns tested
    25/50/100-point handles or ES orderflow barriers; this campaign freezes Nasdaq-specific modulo-100 endings 20 and 80 and
    requires completed 5/15-minute pivot structure confirmation.
