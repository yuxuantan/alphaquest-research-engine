campaign_id: es_vwap_pullback_continuation
title: ES VWAP Pullback Continuation
decision: failed
created_at: '2026-06-15'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: ES may continue in the direction of an established intraday move after
  a completed pullback to session VWAP reclaims or rejects the VWAP side of value.
rationale: This campaign tests VWAP as an intraday institutional benchmark and dynamic
  value reference. It is not VWAP-extreme mean reversion, prior-day stop-run reclaim,
  prior-session IBS, range compression, fixed-time RTH premium, overnight gap reversal,
  calendar seasonality, late-day momentum, volume-shock reversal, or signed-orderflow
  persistence.
sources:
- title: 'Improving VWAP Strategies: A Dynamical Volume Approach'
  authors: Jedrzej Bialkowski, Serge Darolles, Gaelle Le Fol
  year: 2008
  venue: Journal of Banking and Finance / working-paper version
  link: https://ideas.repec.org/p/eve/wpaper/06-08.html
  relevance: Treats VWAP as a central institutional execution benchmark and models
    intraday volume dynamics around VWAP execution.
- title: Optimal VWAP Trading Strategy and Relative Volume
  authors: James McCulloch and Vladimir Kazakov
  year: 2007
  venue: Quantitative Finance Research Centre research paper
  link: https://ideas.repec.org/p/uts/rpaper/201.html
  relevance: Describes VWAP as a popular institutional execution-quality benchmark
    and links it to market-impact-aware trading.
- title: Volume Weighted Average Price Optimal Execution
  authors: "Olivier Gu\xE9ant and Jiang Pu"
  year: 2015
  venue: arXiv / Stanford mirror
  link: https://stanford.edu/~boyd/papers/vwap_opt_exec
  relevance: Frames VWAP benchmark execution under transaction costs and intraday
    information, motivating VWAP as a liquidity-aware reference level.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- deterministic 5-minute aggregation from completed 1-minute bars
- session VWAP computed only from completed intraday bars
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- The Sierra cache is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use the pessimistic OHLC assumption.
- Session VWAP is a bar-level proxy for benchmark pressure and cannot observe institutional
  child-order intent directly.
lookahead_risks:
- VWAP uses only current and prior completed intraday bars at signal time.
- Opening-drive state uses only completed early RTH bars.
- All signal variants use completed-bar conditions and enter next bar open or later.
- No future session high/low, final VWAP, final volume profile, or future return is
  used.
failure_modes:
- VWAP pullbacks may mean-revert rather than continue after ES costs.
- The edge may be concentrated in high-volatility regimes or one side only.
- A VWAP reclaim signal may be too late after slippage and commissions.
- Opening-drive variants may have too few trades for WFA density gates.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_mes_micro_flow_divergence_reversion
  - es_prior_session_ibs_reversion
  - es_connors_rsi2_mean_reversion
  - es_range_compression_breakout
  - es_rth_intraday_risk_premium
  - es_overnight_intraday_reversal
  - es_signed_orderflow_persistence
  - es_opening_drive_inventory_absorption
  - es_turn_of_month_seasonality
  - es_daily_time_series_momentum
  - es_late_day_intraday_momentum
  - es_volume_shock_liquidity_reversal
  - es_prior_day_stop_run_reclaim
  conclusion: Not a duplicate of active failed campaigns. This campaign tests VWAP
    pullback continuation after an established intraday VWAP-side move, not VWAP-extreme
    mean reversion or a fixed-time/session/calendar/gap/level-sweep edge.
variants:
- morning_trend_reclaim_two_sided
- morning_opening_drive_pullback_long
- morning_opening_drive_pullback_short
- midday_trend_reclaim_two_sided
- failed_vwap_break_two_sided
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change core economic edge
  - change timeframe or data window
  - add or remove filters after seeing results
