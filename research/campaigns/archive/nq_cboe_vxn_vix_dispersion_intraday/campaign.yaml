  builder: tools/build_es_cboe_vxn_vix_dispersion_features.py with NQ bars input
  vix_cache: data/external/cboe_vix_history.csv
  vxn_cache: data/external/cboe_vxn_history.csv
  output: data/external/nq_cboe_vxn_vix_dispersion_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  lookahead_control: latest Cboe VIX and VXN closes strictly before NQ session_date
  pre_pnl_density_audit: research_artifacts/nq_cboe_vxn_vix_dispersion_intraday_density_audit_20260622.md
variants:
