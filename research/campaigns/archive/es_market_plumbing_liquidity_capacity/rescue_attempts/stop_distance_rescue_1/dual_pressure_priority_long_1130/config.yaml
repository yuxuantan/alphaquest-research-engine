research_metadata:
  academic_source: Brunnermeier and Pedersen (2009); Federal Reserve Bank of New York Primary Dealer Statistics; Cboe CFE Daily Market Statistics
  edge_thesis: Tail states in market-plumbing and funding-liquidity capacity proxies may condition same-day ES intraday risk premia because liquidity providers require compensation when funding or volatility-risk intermediation is constrained.
  mechanic: Enter long at the completed 11:30 ET 5-minute bar when either lagged dealer-lending pressure or lagged low VX open-interest state is active, selecting the dealer-lending leg first when both are present.
  timeframe_rationale: The priority version tests whether two predeclared market-plumbing state proxies are redundant or complementary at the first availability-safe late-morning decision point.
  feature_lag_audit: research_artifacts/es_market_plumbing_liquidity_capacity_feature_lag_audit_20260616.json
  invalid_run1_reason: run1 used unsupported descriptive data.feature_set label; corrected to feature_set none without changing mechanics, parameters, timeframe, or data window.
  rescue_attempt: parameter_space_rescue_1
  rescue_rationale: Same two-leg priority mechanic with neighboring thresholds and shifted risk values; max two entry tunables retained.
  rescue_scope: Only fixed parameters and parameter grids inside existing market_plumbing_priority, percent_from_entry, and fixed_r modules changed.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_market_plumbing_liquidity_capacity/dual_pressure_priority_long_1130 entry mechanic: Enter long at the completed 11:30 ET 5-minute bar when either lagged dealer-lending pressure or lagged low VX open-interest state is active, selecting the dealer-lending leg first when both are present..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_market_plumbing_liquidity_capacity
    source_variant_id: dual_pressure_priority_long_1130
    source_run_id: methodology_fix_rerun1
    source_config_path: /tmp/alphaquest_methodology_fix_reruns/es_market_plumbing_liquidity_capacity__dual_pressure_priority_long_1130__methodology_fix_rerun1.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.006
      new: 0.009
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.004
      - 0.006
      - 0.008
      new: *id001
strategy:
  entry:
    module: market_plumbing_priority
    params:
      feature_file: data/external/market_plumbing_priority_features_lag1_no_lookahead.csv
      direction: long
      bar_interval_minutes: 5
      max_trades_per_day: 1
      academic_source_key: brunnermeier_pedersen_2009_market_liquidity_funding_liquidity
      external_dataset: nyfed_primary_dealer_statistics_cboe_cfe_vx_activity_lag1
      priority_order:
      - primary_dealer_lending_pressure
      - cboe_vx_oi_stress
      legs:
      - key: primary_dealer_lending_pressure
        source: nyfed_primary_dealer_statistics
        feature_name: sl_treasury_excluding_tips_overnight_open_diff1_rank52
        operator: <=
        threshold: 0.25
        entry_time: '11:30:00'
        flatten_time: '15:55:00'
        stop_pct: 0.006
        target_r_multiple: 1.75
        availability_rule: Campaign feature file lags every source row by one listed trade_date; entries occur 11:30 ET or later.
      - key: cboe_vx_oi_stress
        source: cboe_cfe_vx_activity
        feature_name: vx_total_oi_z42
        operator: <=
        threshold: -1.1583033389307238
        entry_time: '11:30:00'
        flatten_time: '15:55:00'
        stop_pct: 0.006
        target_r_multiple: 1.75
        availability_rule: Campaign feature file lags every source row by one listed trade_date; CFE states data becomes available around 10:00 CT the following day.
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.009
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.75
  flatten_time: '15:55:00'
