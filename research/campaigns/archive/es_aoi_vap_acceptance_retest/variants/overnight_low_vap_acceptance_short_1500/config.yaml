research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  academic_source: Osler (2000) Support for Resistance; Kavajecz and Odders-White
    (2004) Technical Analysis and Liquidity Provision; Cont, Kukanov, and Stoikov
    (2014) The Price Impact of Order Book Events; CME Market Profile educational material.
  edge_thesis: Completed acceptance retests at market-generated ES levels may continue
    when the level aligns with frozen prior true VAP and same-direction orderflow
    confirms the retest.
  mechanic: Short-only acceptance below completed overnight low when the low aligns
    with frozen prior VAP.
  timeframe_rationale: The Sierra aggregate orderflow, footprint imbalance, overnight
    AOI, and prior true VAP fields are completed-bar or completed-session fields;
    the signal is evaluated at 1-minute bar close and enters no earlier than the next
    1-minute open.
  mechanics_review:
    mechanic_expresses_edge: The entry requires a market-generated AOI to align with
      a frozen prior-session true VAP level, then demands completed-bar breakout evidence
      and a later completed-bar retest hold with same-direction orderflow.
    entry_logic_rationale: Prior RTH and VAP levels are known before the session,
      overnight levels are complete before RTH, the opening range is available only
      after its configured minutes, and entry is delayed until the bar after retest
      confirmation.
    stop_loss_rationale: The retest-boundary stop sits beyond the accepted AOI plus
      a tunable tick offset, keeping invalidation tied to the public level rather
      than future price movement.
    target_exit_rationale: The cost-adjusted fixed-R target is computed from the known
      entry and stop distance after ES slippage and commission assumptions, with no
      use of future session range or final profile.
    profitability_rationale: If accepted AOI breaks near profile structure attract
      continuation flow after retest, the follow-through should persist enough to
      overcome one-tick slippage and commissions across neighboring parameters.
    known_failure_modes: Accepted breaks can still fail, VAP confluence may be too
      common, footprint imbalance can be late, same-direction aggregate flow is not
      print sequencing, and any edge may be one-sided or regime-specific.
    pre_test_decision: approve_for_testing
