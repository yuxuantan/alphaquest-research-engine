campaign_id: es_orderflow_absorption_exhaustion_reversal
title: ES Orderflow Absorption Exhaustion Reversal
decision: failed
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Extreme same-clock ES signed-flow rank with high effort-vs-result but
  weak completed-window price displacement may identify liquidity absorption or exhausted
  aggressive flow, making a same-day fade plausible after costs.
rationale: This campaign tests orderflow absorption/exhaustion, not signed-flow persistence.
  Active signed-flow persistence required flow and price return to agree and traded
  continuation. Here the signal requires extreme flow/effort rank with weak price
  movement and fades the flow direction. It is not prior-level dislocation, opening-drive
  inventory, VPIN toxicity, volume-shock OHLC reversal, or ES/MES divergence.
sources:
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates order-flow imbalance as a price-pressure proxy and the importance
    of realized price response to order-flow events.
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, and Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Models how liquidity-trader pressure and market-maker inventory risk
    can create reversal after high-volume pressure.
- title: How Markets Slowly Digest Changes in Supply and Demand
  authors: Jean-Philippe Bouchaud, J. Doyne Farmer, and Fabrizio Lillo
  year: 2009
  venue: Handbook of Financial Markets
  link: https://arxiv.org/abs/0809.0822
  relevance: Reviews persistent order flow and market impact, supporting explicit
    tests of when flow pressure is absorbed rather than followed.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV/orderflow bars in America/New_York
- Sierra signed_volume and volume fields
- rolling trade_orderflow imbalance, return, and effort-vs-result features from completed
  bars
- same-clock prior ranks computed only from prior sessions at the same clock time
- exchange session labels and same-day prop-rule flatten checks
data_quality_caveats:
- The Sierra cache is aggregated bar-level trade-side flow, not full depth order-book
  OFI.
- Same-bar stop/target conflicts must use pessimistic OHLC handling.
- Same-clock ranks are historical distribution features and can be sparse early in
  the sample.
lookahead_risks:
- Rolling orderflow and return windows use only completed 1-minute bars ending at
  the signal timestamp.
- Same-clock ranks use prior observations at that clock time only; the current observation
  is ranked against prior history.
- Signals use bar close and the engine enters at the next bar open or later.
- No final session VWAP, final daily range, future orderflow, or future volume profile
  is used.
- All variants flatten the same day before the configured prop cutoff.
failure_modes:
- Extreme orderflow with weak displacement may be genuine hidden continuation rather
  than exhaustion.
- The effect may be too sparse or dominated by specific volatility regimes.
- Aggregated signed-volume may not reliably identify aggressor-side pressure.
- Fade variants can be highly sensitive to slippage and same-bar stop/target ordering.
