  conclusion: Not a duplicate in active scope. This campaign fades high same-clock
    orderflow effort with weak price displacement. Active signed-flow persistence
    followed same-sign flow and return; active opening-drive inventory is anchored
    to the opening drive; active prior-level dislocation requires prior RTH extremes;
    active VPIN uses toxicity proxy ranks.
