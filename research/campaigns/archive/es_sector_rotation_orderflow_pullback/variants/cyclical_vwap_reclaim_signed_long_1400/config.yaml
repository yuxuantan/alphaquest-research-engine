research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Lagged cyclical-minus-defensive leadership should indicate broad risk-on appetite; the trade waits for ES VWAP pullback continuation with positive aggregate signed flow.
  mechanic: Cyclical sector leadership gates long-only VWAP reclaim continuation entries confirmed by completed-bar signed volume.
  timeframe_rationale: Five-minute bars keep enough intraday opportunities for the 50 trades/year floor while smoothing very noisy one-minute signed flow.
  pre_pnl_density: 1322 full-sample pre-PnL signals, about 85.67 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Cyclical sector leadership gates long-only VWAP reclaim continuation entries confirmed by completed-bar signed volume. The sector feature is lagged by one business day, so it acts as a pre-session directional state, while the VWAP/EMA pullback and orderflow confirmation require current ES participation before the next-bar entry.
    entry_logic_rationale: The broader 10:00-14:00 ET window lets the risk-on state express through more than the first morning impulse. Signed-volume confirmation is intentionally broader than large-trade filtering so this variant tests whether the sector prior only needs general directional pressure to improve VWAP reclaims.
    stop_loss_rationale: A percent-from-entry stop is deliberately simple and predeclared. It rejects the thesis if the sector-gated ES pullback cannot hold enough distance from the entry after costs, without looking at post-entry orderflow or future session structure.
    target_exit_rationale: A fixed-R target keeps payoff distance tied to the initial risk and avoids optimizing exits around future intraday levels. The grid starts at 1.0R because sub-1R targets are now invalid under the methodology.
    profitability_rationale: The setup should be profitable only if lagged sector rotation improves the base rate of ES pullback continuation and if same-bar aggregate orderflow identifies the subset with current participation. Pre-PnL density was 1322 full-sample pre-PnL signals, about 85.67 per year.
    known_failure_modes: The sector state may be stale, the ES pullback may be a crowded continuation pattern, aggregate signed volume may confirm too late, and the apparent edge may concentrate in a small number of high-volatility regimes or one directional side.
    pre_test_decision: approve_for_testing
