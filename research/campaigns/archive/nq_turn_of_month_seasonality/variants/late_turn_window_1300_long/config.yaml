campaign_id: nq_turn_of_month_seasonality
variant_id: late_turn_window_1300_long
test_run_id: run1
strategy_name: turn_of_month_bias
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Carchano and Pardo (2011); Lakonishok and Smidt (1988); Ariel (1987)
  edge_thesis: NQ may retain the turn-of-month premium into the afternoon after morning liquidity has
    settled.
  mechanic: Use only known calendar date information. At the completed 13:00 ET 5-minute bar, go long
    if the session date is inside the configured first-days or last-days calendar window; flatten at 15:55
    ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars keep the calendar signal auditable while preserving next-bar-open
    execution and pessimistic OHLC stop/target handling.
  nq_transfer_note: Active NQ duplicate review found no turn-of-month campaign. This is distinct from
    nq_calendar_weekday_bias and nq_halloween_seasonal_premium because it uses deterministic month-end/early-month
    windows.
  pre_pnl_density:
    artifact: research_artifacts/nq_turn_of_month_seasonality_density_audit_20260630.md
    detail_csv: research_artifacts/nq_turn_of_month_seasonality_density_audit_20260630.csv
data:
  dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 10
  rth_start: 09:30:00
  rth_end: '15:59:00'
  validation: data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.validation.json
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: turn_of_month_bias
    params:
      setup_mode: turn_window
      signal_time: '13:00:00'
      bar_interval_minutes: 5
      first_calendar_days: 4
      last_calendar_days: 4
      direction: long
      max_trades_per_day: 1
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
