research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Lagged sector ETF leadership may define an NQ risk-appetite state; NQ VWAP/EMA pullback-continuation entries
    should only have value when the sector-implied direction and completed-bar NQ orderflow confirmation align.
  mechanic: Defensive sector leadership gates short-only morning VWAP rejection continuation entries confirmed by large-10
    aggregate sell flow.
  timeframe_rationale: Five-minute completed bars preserve VWAP/EMA pullback structure, aggregate orderflow confirmation,
    and next-bar-open execution without reacting to one-minute churn.
  pre_pnl_density:
    status: failed_screen_before_pnl
    artifact: research_artifacts/nq_sector_rotation_orderflow_pullback_density_audit_20260630.md
    detail_csv: research_artifacts/nq_sector_rotation_orderflow_pullback_density_audit_20260630.csv
    decision: FAIL
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant gates NQ pullback-continuation entries with lagged sector ETF leadership and requires
      completed-bar NQ orderflow confirmation before next-bar entry.
    entry_logic_rationale: Sector features are known before the NQ session with a one-business-day lag. VWAP/EMA pullback
      state and signed/large-trade flow are computed from completed NQ bars only.
    stop_loss_rationale: A predeclared percent-from-entry stop rejects the continuation thesis if the pullback fails after
      costs; it does not use post-entry orderflow.
    target_exit_rationale: A fixed-R target keeps exit distance tied to initial risk; target R is predeclared and never below
      1.0.
    profitability_rationale: The setup should monetize only if lagged sector rotation improves the base rate of NQ pullback
      continuation and same-bar orderflow identifies active participation.
    known_failure_modes: Sector state may be stale, the ES source failed limited core, orderflow can confirm too late, and
      the effect can concentrate in one side or volatility regime.
    pre_test_decision: approve_for_testing
