timeframe: 5m
research_metadata:
  academic_source: Barndorff-Nielsen, Kinnebrock, and Shephard (2010); Patton and Sheppard (2015); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: Lagged realized semivariance state should be tradable intraday only when same-session price
    action and completed aggregate orderflow confirm the direction before entry.
  mechanic: On low prior downside-semivariance days, go long only after the current RTH session is above
    its open and completed rolling signed flow confirms buy pressure at a fixed decision time.
  timeframe_rationale: The variant uses 5-minute bars and fixed decision times at 10:30, 11:30, 13:00,
    and 14:30 ET. Each decision uses only the completed signal bar, the known RTH open, and completed
    rolling aggregate orderflow. The multiple decision times are fixed before PnL inspection to give the
    edge enough trade density without changing the one-trade-per-day rule.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: On low prior downside-semivariance days, go long only after the current RTH
      session is above its open and completed rolling signed flow confirms buy pressure at a fixed decision
      time. The lagged semivariance state still cannot trigger alone; price direction from the RTH open
      and completed aggregate orderflow must agree before a signal is emitted.
    entry_logic_rationale: The entry uses only completed 5-minute bars. Semivariance features are shifted
      by one completed RTH session. The current RTH open is known from the first session bar, each decision
      uses the completed signal bar close, and the rolling orderflow feature ends at that same close.
      Because the signal is emitted on bar close, the engine can enter no earlier than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, rounded to the ES tick,
      and independent of future volatility or orderflow. It rejects the signal if a confirmed semivariance
      state cannot tolerate ordinary adverse movement after costs and slippage.
    target_exit_rationale: A fixed-R target keeps the exit predeclared and avoids final VWAP, final range,
      or discretionary chart-reading exits. Same-day flattening prevents overnight exposure despite the
      source literature often discussing longer volatility horizons.
    profitability_rationale: Low downside semivariance should represent a calmer risk-on state. Price
      above the RTH open plus positive completed signed flow attempts to trade only when that state is
      actively confirmed by intraday participation.
    known_failure_modes: The state may forecast volatility rather than direction, intraday confirmation
      may arrive after most of the move, aggregate signed flow may identify exhaustion instead of continuation,
      and the WFA gate may reject the idea if the effect is regime-specific.
    pre_test_decision: approve_for_testing
  pre_pnl_density_reformulation:
    original_density_artifact: research_artifacts/es_semivariance_orderflow_confirmation_density_audit_20260618.md
    reason: The first one-time-checkpoint variants produced fewer than 50 limited-core signals/year before
      any PnL was inspected.
    changes_made_before_pnl:
    - use four fixed intraday decision times instead of one fixed checkpoint
    - make semivariance rank threshold a declared entry tunable over 0.45 and 0.50
    - fix min_session_move_ticks at 1 to require direction without starving signal density
    - keep same entry module, stop module, target module, costs, sessions, and validation gates
