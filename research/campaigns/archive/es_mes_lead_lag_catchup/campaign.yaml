campaign_id: es_mes_lead_lag_catchup
title: ES/MES lead-lag catch-up
decision: FAIL
created_at: '2026-06-18'
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
hypothesis: 'Because ES and MES represent the same S&P 500 futures exposure but differ
  in participant mix and contract size, completed MES price movement and aggregate
  orderflow can occasionally lead ES over short intraday windows. If MES moves materially
  and ES has not fully followed, ES may catch up in the MES direction.

  '
rationale: 'This is a linked-market price-discovery campaign, not a MES fade. It follows
  MES only when three conditions are present before entry: MES has a material completed-window
  price move, ES lags that move by a predeclared tick gap, and MES aggregate orderflow
  confirms the MES direction. It is distinct from active MES divergence reversion,
  MES participation crowding reversion, and ES/MES aligned-flow continuation because
  ES does not need to confirm the move; it must lag it.

  '
sources:
- title: One Security, Many Markets
  authors: Joel Hasbrouck
  year: 1995
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1995.tb04054.x
  relevance: Supports the possibility that economically linked trading venues can
    contribute to price discovery at different speeds.
- title: Retail Traders in Futures Markets
  authors: CFTC Office of the Chief Economist
  year: 2024
  venue: CFTC staff research report
  link: https://www.cftc.gov/sites/default/files/2024-11/Retail_Traders_Futures_V2_new_ada.pdf
  relevance: Documents retail futures participation and Micro E-mini examples, motivating
    MES as a different participation lens from ES.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  relevance: Motivates orderflow imbalance as a short-horizon pressure proxy. This
    campaign uses completed Sierra aggregate trade-side bars, not quote-level OFI.
data_needs:
- data/cache/orderflow/es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny.csv
- completed ES and MES 1-minute RTH bars aligned by timestamp in America/New_York
- rolling completed-window ES and MES return ticks
- rolling completed-window MES aggregate signed, large10, and large20 imbalance fields
- ES tick size, point value, commission, slippage, session, and forced-flatten rules
  from config
data_quality_caveats:
- Sierra orderflow is completed-bar aggregate trade-side flow, not quote-level LOB
  OFI.
- MES is a participation and price-discovery proxy, not account-classified retail
  data.
- Same-bar stop/target conflicts must use pessimistic OHLC ordering when no lower-timeframe
  truth is available.
lookahead_risks:
- ES and MES return windows include only completed bars ending at the signal bar close.
- MES aggregate-flow confirmation uses only the completed flow window ending at the
  signal bar close.
- Signal timestamps are completed-bar close times; the engine enters ES no earlier
  than the next bar open.
- No final session high/low, final VWAP, final volume profile, future MES/ES data,
  or future orderflow is used.
- The latest holdout remains locked until simulated incubation and acceptance stages.
failure_modes:
- MES may not actually lead ES at 1-minute resolution; the catch-up may already occur
  within the signal bar.
- MES flow may be noisy or dominated by smaller-contract participants who lag ES rather
  than lead it.
- Same-underlying ES/MES dislocations may be too small to overcome one-tick slippage
  and commissions.
- The effect may work in only one direction or one volatility regime, which should
  fail robustness gates.
- A one-contract ES system may pass WFA but still fail the prop-style Monte Carlo
  payout-before-drawdown gate.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_mes_micro_flow_divergence_reversion
  - es_mes_participation_crowding_reversion
  - es_trend_filtered_mes_participation_crowding
  - es_mes_aligned_flow_continuation
  - es_nq_cross_index_lead_lag
  - es_nq_relative_value_reversion
  - es_signed_orderflow_persistence
  conclusion: 'Eligible in active scope. This campaign is same-underlying MES-to-ES
    catch-up: it follows MES direction only when ES lags. Existing ES/MES divergence
    campaigns faded disagreement; participation campaigns used MES share rather than
    direction; aligned-flow continuation required ES and MES to agree; NQ lead-lag
    used a different cross-index leader.

    '
