campaign_id: es_cboe_vxn_vix_dispersion_intraday
title: ES Cboe VXN/VIX Dispersion Intraday
decision: FAIL
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged relative Nasdaq-versus-S&P implied-volatility stress, measured
  by VXN/VIX and VXN-minus-VIX states, may identify ES intraday risk-off continuation
  or risk-appetite rebound because technology-led volatility shocks can spill into
  broader index futures.
rationale: This campaign tests cross-index option-implied volatility dispersion,
  not standalone VIX level, VIX term structure, VVIX volatility-of-volatility, SKEW
  tail risk, implied SPX component correlation, variance risk premium, ES/NQ price
  lead-lag, or realized volatility state.
sources:
- title: Relationships Between Implied Volatility Indexes and Stock Index Returns
  authors: Pierre Giot
  year: 2005
  venue: Journal of Portfolio Management, 31(3), 92-100
  link: https://www.pm-research.com/content/iijpormgmt/31/3/92
  doi: 10.3905/jpm.2005.500363
  relevance: Studies VIX/VXN relationships with stock-index returns and motivates
    testing relative implied-volatility states.
- title: Relationships among US S&P500 Stock Index, its Futures and Nasdaq Index Futures
  authors: M. Kablan, S. Emiroglu, and S. Danisoglu
  year: 2021
  venue: Borsa Istanbul Review / Risk Market Journals
  link: https://ideas.repec.org/a/rmk/rmkbae/v8y2021i1p121-148.html
  relevance: Documents cross-market relationships and volatility spillovers among
    S&P 500 cash/futures and Nasdaq futures markets.
- title: VIX and VXN Historical Price Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe daily historical CSV endpoints
  link: https://www.cboe.com/us/indices/dashboard/VXN/
  relevance: Provides free official daily VIX and VXN histories used to construct
    strictly lagged dispersion features.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- free official Cboe VIX and VXN daily historical CSVs or local cached copies
- derived session feature file using only Cboe observations strictly before the ES
  session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- VIX and VXN are daily closes, not intraday option snapshots.
- Same-day Cboe closes are unavailable to intraday ES signals and must not be used.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using VIX or VXN closes from the same ES session date would leak unavailable data
  and is forbidden.
- Signals use only a completed ES bar at the configured timestamp and lagged Cboe
  daily state.
- Rolling ranks are computed on Cboe observations and then mapped with an as-of merge
  using strictly prior observation dates.
- No final session high/low, final VWAP, future returns, or post-entry Cboe values
  are used.
failure_modes:
- Relative VXN/VIX states may proxy broad volatility level and fail to add information
  beyond rejected VIX-state families.
- Nasdaq implied-volatility shocks may not transmit into same-day ES directional
  returns after realistic costs.
- High relative tech volatility may mark either continuing risk-off pressure or a
  rebound/risk-premium state; variants predeclare fixed directions only.
- Performance may concentrate in crisis periods or single technology-sector shock
  years.
- One-tick-worse slippage or missed trades may eliminate any small edge.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_cboe_vix_level_state_intraday
  - es_cboe_vix_term_structure_intraday
  - es_vvix_tail_risk_intraday
  - es_cboe_skew_tail_risk_intraday
  - es_cboe_implied_correlation_intraday
  - es_variance_risk_premium_intraday
  - es_nq_cross_index_lead_lag
  - es_volatility_managed_intraday_premium
  - es_realized_vol_of_vol_state
  conclusion: Not a duplicate of active failed campaigns. This tests relative VXN/VIX
    and VXN-minus-VIX dispersion states, not standalone VIX level/change, VIX maturity
    slope, VVIX, SKEW, implied SPX component correlation, VIX-minus-realized variance,
    ES/NQ price lead-lag, or realized volatility state.
