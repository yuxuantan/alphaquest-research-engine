research_metadata:
  academic_source: Steidlmayer and Koy (1986); Harris (2003)
  edge_thesis: A completed upside failed auction at developing TPO VAH near the opening-range high may trap buyers and rotate downward to VAL.
  mechanic: Build developing 70% TPO value from prior completed one-minute bars; require stable range and middle-third POC; take only completed VAH/ORH short rejections; enter next bar, target frozen VAL, and flatten at 11:00 ET.
  timeframe_rationale: One-minute bars preserve morning auction structure without using unreliable event payloads.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-14'
  mechanics_review:
    mechanic_expresses_edge: Short-only VAH buyer-trap expression of the completed-bar range/value-edge rejection thesis.
    entry_logic_rationale: The VAH/ORH AOI is known before the rejection bar; an upside probe and close back toward value trigger next-bar short entry.
    stop_loss_rationale: Stop is 2 or 4 ticks beyond the outer AOI boundary and rejected if wider than 5 points from entry.
    target_exit_rationale: Target is the opposite developing TPO edge frozen at signal; midpoint activates entry plus/minus 1.25-point stop; flatten at 11:00.
    profitability_rationale: A balanced auction should rotate after failed price discovery at an accepted value boundary.
    known_failure_modes: Sparse OR confluence, bar-path ambiguity, missing news calendar, and removal of order-flow edge.
    pre_test_decision: approve_for_testing
