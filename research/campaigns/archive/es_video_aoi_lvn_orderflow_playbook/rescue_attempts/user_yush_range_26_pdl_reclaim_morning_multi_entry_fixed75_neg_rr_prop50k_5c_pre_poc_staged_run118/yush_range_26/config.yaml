research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption mechanics supplied by user, PDL reclaim-failure morning multi-entry negative-RR
    funded-account diagnostic
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and
    Stoikov (2014); CME market profile educational material.
  edge_thesis: Failed upside retests of the previous RTH low may trap aggressive buyers below prior-day value. This branch
    tests whether the liquidation impulse can repeat during the same morning session while the account is flat, improving
    funded-account payout-day distribution without changing the underlying PDL reclaim-failure signal.
  mechanic: Multi-entry morning negative-RR funded-account branch from yush_range_23. It keeps short-only PDL sweep/reclaim-failure
    continuation, positive 1-point delta bucket >=300, maintained three-second hold below the bucket, entry within 2 ATR of
    PDL, known bucket-edge signal-risk grid <=3.0/4.0 ES points, five ES contracts, a fixed $75 per-contract target, and fixed-dollar
    wider stops. The morning entry cutoff is fixed at 12:00:00 ET. The new test dimension is allowing one, two, or three flat-to-flat
    signals per session through entry.params.max_trades_per_day.
  timeframe_rationale: The strategy uses 3-minute bars for ATR and PDL sweep context while entering at SCID-record timestamp
    granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: 'Prior yush_range_23/yush_range_24 rows met the narrow payout-day profile but failed random-entry
      separation. This branch tests a predeclared same-mechanic extension: whether repeated flat-to-flat PDL reclaim-failure
      signals in the morning add enough independent payout days or net profit to survive staged controls.'
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the decision timestamp before 12:00:00 ET. It
      enters short when PDL has been swept, trapped-buyer positive delta remains above threshold, price has held below the
      triggering bucket for three seconds, and entry-to-bucket stop distance is within the selected 3.0/4.0 point signal-risk
      cap. Unlike yush_range_23, it may emit up to the selected daily cap after a prior position has closed.
    stop_loss_rationale: The tested stop is a fixed-dollar per-contract stop, rounded to ES ticks, deliberately wider than
      the fixed target. The original bucket-edge signal stop remains logged and capped only as an entry-quality/risk-awareness
      filter.
    target_exit_rationale: The target remains fixed at $75 per contract because five ES contracts generate a $287.50 net target
      day after modeled commission/slippage, clearing the user-requested $250 payout-day threshold while keeping every tested
      stop wider than the target.
    profitability_rationale: This can pass only if extra same-morning flat-to-flat signals increase the robust payout-day
      sample without adding tail losses, concentration, random-entry comparability, WFA decay, Monte Carlo fragility, or 50k
      funded-account rule failures.
    known_failure_modes: Sierra SCID records are not exchange MBO sequencing. Reusing the same PDL level multiple times may
      overcount one market event and can increase daily loss concentration; reject if any staged gate fails, if losses breach
      50k constraints, if profit is concentrated, or if monkey/WFA/acceptance evidence does not separate from random entries.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 3
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days are >= $250 net PnL, best profitable
      day is more than 50% of total net profit, validation is not clean, daily loss exceeds the configured 50k limit, or any
      official staged gate fails. Treat any pass as a candidate strategy requiring manual review because this is a multi-entry
