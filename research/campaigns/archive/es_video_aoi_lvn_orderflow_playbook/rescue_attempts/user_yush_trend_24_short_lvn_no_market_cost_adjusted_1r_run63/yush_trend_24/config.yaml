research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    Short-trend pullbacks into developing LVN pockets may continue lower when buy-side countertrend absorption
    fails. The prior no-market structural-target branch had unstable large-winner dependence, so this branch tests
    whether the same signal has a cleaner cost-aware 1R scalp profile.
  mechanic: >-
    yush_trend_24 keeps the frozen yush_trend_21 entry mechanics: risk-capped Model 2 short LVN pullback entry,
    min_trend_move_ticks=8, max_signal_risk_points=6.0, sweep-extreme stop, and rejection of any AOI confluence
    set containing market_level. The only mechanics change is take-profit: replace signal_price structural target
    with cost_adjusted_fixed_r target_r_multiple=1.0 using configured ES tick size, tick value, commission, and
    slippage.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record timestamp granularity inside
    the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: >-
      This branch tests whether the no-market short-LVN continuation signal is viable as a cost-aware scalp rather
      than relying on occasional structural target winners.
    entry_logic_rationale: >-
      Entry uses only prior completed 3-minute profile/context plus sequential SCID records seen up to the decision
      timestamp. It rejects any candidate whose AOI confluence includes market_level and rejects candidates whose
      known stop distance exceeds 6.0 ES points.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar rejection path high with a fixed two-tick offset. The entry filter only
      prevents opening positions whose known stop distance is already too wide.
    target_exit_rationale: >-
      The target is placed far enough from entry to cover the configured round-trip commission and slippage while
      still targeting 1R after costs. This should increase win-rate pressure and reduce large-winner concentration
      if the entry has a real short-LVN scalp edge.
    profitability_rationale: >-
      This should fail if the yush_trend_21 positive windows were driven only by rare structural targets. It should
      only pass if the same no-market LVN entry produces stable net expectancy after realistic cost-aware target
      placement.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price absorption are approximations. This branch is result-informed from yush_trend_21 failure
      modes and must be rejected unless it survives unseen windows with robust economics and clean validation.
    pre_test_decision: approve_for_testing
