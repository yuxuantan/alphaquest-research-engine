research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 3
  source_video: https://www.youtube.com/watch?v=hvyf6frvCcA
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market profile educational material
  edge_thesis: Run5 midpoint exits were frequently too close to entry after costs; this branch tests whether midpoint
    is viable only when the value-area midpoint provides usable reward/risk.
  mechanic: Two-sided Model 1 value-edge false-break range trade using midpoint only when it has enough target distance;
    otherwise explicit fixed-R fallback.
  timeframe_rationale: The video states Yush uses 3-minute ES structure. This branch uses native 3-minute Sierra
    footprint/VAP rows and enters only on the next 3-minute open after a completed signal bar.
  mechanics_review:
    mechanic_expresses_edge: This run6 branch is a result-informed quality-filter test after run5 failed. It keeps
      the video AOI/LVN/orderflow edge family, but requires higher AOI quality and avoids unusably close structural
      targets through a predeclared minimum-R fallback.
    entry_logic_rationale: Entry still uses completed current-session developing VAP, prior RTH levels, overnight
      levels, large-200 aggregate records, and delta. The improvement is to require stronger AOI evidence than the
      minimum exact-video two-confluence gate, because run5 showed two-confluence signals were frequent and unprofitable.
    stop_loss_rationale: The stop is beyond the signal bar wick with a tunable tick offset, matching the video examples
      that risk beyond the wick/AOI invalidation rather than using a final-session or future-derived level.
    target_exit_rationale: The video uses partial trims and trailing, which the staged engine cannot express. This
      branch keeps structural targets when they have enough distance from entry; otherwise it uses a predeclared
      fixed-R fallback so trades are not dominated by costs.
    profitability_rationale: The candidate should only improve if higher-confluence AOIs identify genuinely trapped
      traders and the available target distance is large enough to offset ES slippage and commission.
    known_failure_modes: This is no longer the pure exact-video proxy; it is a quality-filter rescue generated after
      run5 failed. It can still fail if the apparent short-side improvement in run5 was slice-specific, or if fixed-R
      fallback overstates what a discretionary structural-target trader would actually hold for.
    pre_test_decision: approve_for_testing
  video_transcript_mechanics:
    aoi_rule: At least two of market-generated levels, volume profile, big trades, and delta activity must align
      before waiting for price to return.
    market_levels: PDH/PDL RTH, overnight high/low from 21:00-09:29 ET, and 30-second ORB high/low. This cache includes
      PDH/PDL and overnight high/low; exact 30-second ORB is unavailable and not approximated.
    volume_profile: Current RTH developing volume profile, including value area and LVN/low-volume pockets.
    model1_range: In balance/chop, wait for price at value-area edge, false break/look above-or-below and fail,
      absorption/trapped aggressive traders, then target midpoint or opposite value edge.
    model2_trend: In trend, wait for pullback into low-volume pocket/LVN, look for absorption/trapped traders and
      delta/large-record confirmation, then target highs/lows and trail remainder when discretionary trading allows.
    unsupported_in_engine:
    - live tape speed
    - DOM queue behavior
    - partial trim
    - dynamic trailing stop
    - average-up add-on entries
  supersedes_test_run_ids:
  - run5
  supersession_reason: 'Run5 exact-video proxy produced 0/405 profitable limited-core combinations. Run6 tests predeclared
    quality filters based on failure diagnostics: low-quality two-confluence signals and too-close structural targets.'
