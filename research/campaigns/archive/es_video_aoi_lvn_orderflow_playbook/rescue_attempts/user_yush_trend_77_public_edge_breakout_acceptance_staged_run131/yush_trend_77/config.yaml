research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush orderflow level-break mechanics supplied by user/video checklist, restricted here to
    outside public-edge breakout acceptance with orderflow confirmation.
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: Public outside levels may attract stop flow and momentum continuation when price accepts beyond the
    prior-session high, overnight high, or opening-range high for longs, and beyond the corresponding lower boundaries
    for shorts. This tests boundary expansion, not generic crossing of any market level.
  mechanic: >
    Two-sided SCID-record outside-edge breakout acceptance. A long setup can only break above PDH, ONH, or ORH by at
    least two ticks, hold on the far side, and confirm positive initiation delta. A short setup can only break below PDL,
    ONL, or ORL with mirrored negative initiation. PDC and wrong-side crossings such as long-through-PDL are excluded
    before a pending breakout can form. Stops are two ticks back through the broken level, and targets use a fixed-R
    continuation grid.
  timeframe_rationale: Three-minute bars provide the session context while SCID records provide the sequential break,
    hold, and orderflow confirmation path before entry.
  mechanics_review:
    mechanic_expresses_edge: This is not another yush_trend_75 rescue. It removes PDC and directionally incompatible
      level crossings from the broad yush_trend_74 branch, testing outside public-edge expansion rather than all visible
      level acceptance.
    entry_logic_rationale: >
      The only levels used are known before or during the decision: prior RTH high/low, overnight high/low, and the
      first 32 seconds of RTH for ORH/ORL. Breakout, hold, initiation, and risk cap are evaluated from SCID records in
      timestamp order.
    stop_loss_rationale: The stop is the broken outside level plus/minus two ticks, encoded as signal_stop_price and
      applied by the signal_price stop module.
    target_exit_rationale: Fixed-R targets in {1.5, 2.0} require continuation beyond the public edge. The 1.0R branch is
      intentionally excluded because the declared edge is directional expansion rather than quick mean-reversion payout.
    profitability_rationale: Passing requires staged core stability and monkey separation. Strong isolated trend days or
      high concentration are rejection evidence, not a candidate.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than exchange MBO sequencing. ORH/ORL from
      32 seconds can be noisy. Reject if profit is concentrated, risk exceeds the configured cap, or any staged gate
      fails.
    pre_test_decision: approve_for_testing
