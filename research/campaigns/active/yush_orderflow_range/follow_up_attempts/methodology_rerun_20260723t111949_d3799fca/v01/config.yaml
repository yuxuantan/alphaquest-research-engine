  mechanics_review:
    mechanic_expresses_edge: Build a causal AOI around developing VAL or VAH plus the strongest available market, local-delta,
      and large-trade categories; reset eligibility whenever the exact AOI price envelope or selected confluence identity
      changes, then require a prior reversal, a fresh directed tap, and a new post-tap trigger.
    entry_logic_rationale: A two-tick stop entry beyond the AOI demands observable movement away from the tested boundary,
      while neither the tap nor its post-tap trigger can be the event that created or materially changed the exact AOI; a
      tapped AOI is frozen until its developing-value anchor leaves the box.
    stop_loss_rationale: The stop sits two ticks beyond the opposite AOI edge but is widened to at least two points so tiny
      confluence envelopes do not create suffocating risk; entries above five points are rejected.
    target_exit_rationale: The developing value midpoint is the first objective; after it trades, the stop protects 1.25 points
      and the opposite developing value edge becomes the final target, with an 11:00 hard flatten.
    profitability_rationale: Repeated rejection at a developing value boundary suggests passive liquidity is absorbing aggressive
      flow; a fresh delta or large-trade event after the tap supplies causal confirmation for reversion. Build a causal AOI
      around developing VAL or VAH plus the strongest available market, local-delta, and large-trade categories; reset eligibility
      whenever the exact AOI price envelope or selected confluence identity changes, then require a prior reversal, a fresh
      directed tap, and a new post-tap trigger.
    known_failure_modes: Moving developing-value anchors can invalidate pending AOIs, and local delta prominence can be sensitive
      to neighboring buckets when activity is sparse or distributed across nearby prices. Gap-through stop orders receive
      adverse event-price fills plus one tick, so actual risk may exceed the planned structural distance and cause otherwise
      attractive signals to be rejected.
    pre_test_decision: approve_for_testing
  timeframe_rationale: Trade messages are replayed in causal order from 09:30 to 11:00 New York; the three-minute delta bubble
    clock and 100 millisecond large-trade aggregation match the frozen chart interpretation.
