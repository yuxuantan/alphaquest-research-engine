  rationales:
    mechanic: Build a causal AOI around developing VAL or VAH plus the strongest available market, local-delta, and large-trade
      categories; reset eligibility whenever the exact AOI price envelope or selected confluence identity changes, then require
      a prior reversal, a fresh directed tap, and a new post-tap trigger.
    entry: A two-tick stop entry beyond the AOI demands observable movement away from the tested boundary, while neither the
      tap nor its post-tap trigger can be the event that created or materially changed the exact AOI; a tapped AOI is frozen
      until its developing-value anchor leaves the box.
    stop: The stop sits two ticks beyond the opposite AOI edge but is widened to at least two points so tiny confluence envelopes
      do not create suffocating risk; entries above five points are rejected.
    target: The developing value midpoint is the first objective; after it trades, the stop protects 1.25 points and the opposite
      developing value edge becomes the final target, with an 11:00 hard flatten.
    timeframe_session: Trade messages are replayed in causal order from 09:30 to 11:00 New York; the three-minute delta bubble
      clock and 100 millisecond large-trade aggregation match the frozen chart interpretation.
