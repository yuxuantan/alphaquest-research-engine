hypothesis: During balanced ES morning auctions, a retest of a developing value-area edge that overlaps a prior liquidity
  reference and then attracts fresh one-sided trade activity may reverse toward fair value.
expected_mechanism: Repeated rejection at a developing value boundary suggests passive liquidity is absorbing aggressive flow;
  a fresh delta or large-trade event after the tap supplies causal confirmation for reversion.
holding_horizon: Intraday only, from a post-tap stop entry between 09:30 and 10:59:59 New York until 11:00.
known_failure_modes:
- A developing profile can move while an order is pending, apparent one-sided delta can be continuation rather than absorption,
  and sparse trade prints can make a narrow AOI or local prominence unstable.
- Trade-message aggressor classification, contract rolls, gap-through fills, and platform aggregation differences may cause
  mechanical entries to disagree with a MotiveWave/Rithmic chart.
