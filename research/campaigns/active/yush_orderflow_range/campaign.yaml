hypothesis: During balanced ES morning auctions, a retest of a developing value-area edge that overlaps a prior liquidity
  reference and then attracts fresh one-sided trade activity may reverse toward fair value.
economic_edge_fingerprint:
  market_behavior: Morning ES price repeatedly rejects a developing value-area boundary inside a balanced auction.
  causal_mechanism: Passive liquidity absorbs one-sided aggressive trading near a known reference and price reverts toward
    fair value.
  signal_inputs: causal developing volume profile, prior-session and overnight price references, local four-tick signed-delta
    prominence, same-price same-side 100 millisecond large-trade aggregation
  market_context: ES regular trading hours from 09:30 to 11:00 New York after a 16:00-to-09:30 overnight session.
  holding_period: Minutes to at most the 11:00 New York forced flatten; no overnight exposure.
