campaign_id: nq_opening_range_breakout
variant_id: fifteen_min_close_breakout_1559
strategy_name: nq_opening_range_breakout
symbol: NQ
dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
timeframe: 5m
research_metadata:
  alpha_family: Opening range breakout / 15-minute ORB continuation
  classification: source_backed_new_nq_variant
  source_url: https://www.tradingview.com/script/ZOd0TyEg-15-Min-ORB-Strategy-for-NQ-w-5-min-Confirmation/
  source_support: 'The referenced NQ ORB script describes a 09:30-09:45 opening range
    and a subsequent 5-minute confirmation before entering in the breakout direction.

    '
  independence_note: 'NQ-specific 15-minute ORB implementation. It avoids prior ES-only
    ORB evidence and uses a different source translation.

    '
  edge_thesis: 'A confirmed 15-minute NQ range break should capture stronger institutional
    opening-drive continuation than the noisier first 5-minute range, so this variant
    allows the trade to hold until the RTH close.

    '
  mechanic: 'Build the first 15-minute RTH range, require a confirming 5-minute close
    outside the range before 11:00 ET, stop at the opposite range edge, and target
    cost-adjusted fixed R.

    '
  apex_compatibility: RTH-only next-bar entries, one trade per session, no overnight
    positions.
data:
  dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/NQ/GLBX-20260601-RTF938NJSN
  cache_dir: data/cache/databento/GLBX-20260601-RTF938NJSN
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: dominant_session_volume
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 20
  rth_start: 09:30:00
  rth_end: '16:00:00'
  eth_start: '16:00:00'
  eth_end: 09:29:00
  rolling_volume_window: 20
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: opening_range_filtered_breakout
    params:
      setup_mode: continuation
      vwap_filter: none
      rth_start: 09:30:00
      opening_range_minutes: 15
      confirmation_minutes: 5
      bar_interval_minutes: 5
      max_opening_range_pct_of_open: 0.0075
      breakout_buffer_ticks: 0
      vwap_buffer_ticks: 0
      min_volume_ratio: 0.0
      last_entry_time: '11:00:00'
      max_trades_per_day: 1
      skip_tuesday_longs: false
      allow_long: true
      allow_short: true
      tick_size: 0.25
  tp:
    module: cost_adjusted_fixed_r
    params:
      target_r_multiple: 1.5
      tick_size: 0.25
      tick_value: 5.0
      commission_per_contract: 2.5
      slippage_ticks: 1
  sl:
    module: opening_range_edge
    params:
      max_stop_points: 90
      stop_offset_ticks: 0
  flatten_time: '15:59:00'
core:
  data_subset:
    start_date: '2011-01-03'
    end_date: '2026-05-29'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 5.0
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:59:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.4
  min_total_net_profit: 0
  min_expectancy_r: 0.2
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_best_day_concentration: 0.5
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  objective: MAR
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &id002
    entry.params.max_opening_range_pct_of_open:
    - 0.005
    - 0.0075
    - 0.01
    entry.params.breakout_buffer_ticks:
    - 0
    - 4
    - 8
    sl.params.max_stop_points:
    - 60
    - 90
    - 120
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
    - 2.5
monkey:
  data_subset: *id001
  runs: 500
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_profit_factor: 1.0
  early_exit_min_train_profit_factor: 1.0
  early_exit_require_train_profitable: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: *id002
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
campaign_tests:
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      min: 100
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: summary.windows
      min: 10
    - metric: stitched_oos_metrics.profit_factor
      min: 1.2
    - metric: stitched_oos_metrics.mar
      min: 0.4
    - metric: stitched_oos_metrics.total_trades
      min: 500
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.total_trades
      min: 75
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  acceptance_oos_test:
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.total_trades
      min: 25
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 24
    test_months: 6
