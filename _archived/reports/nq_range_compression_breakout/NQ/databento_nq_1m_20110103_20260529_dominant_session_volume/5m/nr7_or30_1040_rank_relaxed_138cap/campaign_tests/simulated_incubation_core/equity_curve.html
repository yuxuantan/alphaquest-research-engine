<html lang="en">
<head>
  <meta charset="utf-8">

  <title>nq_range_compression_breakout / nr7_or30_1040_rank_relaxed_138cap incubation equity curve</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #697386;
      --line: #2563eb;
      --loss: #dc2626;
      --grid: #e5e7eb;
      --border: #d5dae3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
    }
    .control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    select {
      min-width: 160px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 7px 10px;
      font-size: 14px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .chart-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 460px;
      cursor: crosshair;
    }
    .note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }
    @media (max-width: 760px) {
      main { padding: 16px; }
      header { display: block; }
      .control { margin-top: 12px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      canvas { height: 360px; }
    }
    @media (min-width: 761px) and (max-width: 1100px) {
      .summary { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>nq_range_compression_breakout / nr7_or30_1040_rank_relaxed_138cap incubation equity curve</h1>
      <label class="control" id="runControl">Run <select id="runSelect"></select></label>
    </header>
    <section class="summary" aria-label="Equity summary">
      <div class="metric"><span>Trades</span><strong id="trades">0</strong></div>
      <div class="metric"><span>Start</span><strong id="start">$0</strong></div>
      <div class="metric"><span>End</span><strong id="end">$0</strong></div>
      <div class="metric"><span>Net PnL</span><strong id="net">$0</strong></div>
      <div class="metric"><span>Max Drawdown</span><strong id="drawdown">$0</strong></div>
      <div class="metric"><span>Win Rate</span><strong id="winRate">0%</strong></div>
      <div class="metric"><span>PF</span><strong id="profitFactor">0.00</strong></div>
      <div class="metric"><span>MAR</span><strong id="mar">0.00</strong></div>
    </section>
    <section class="chart-panel">
      <canvas id="chart" aria-label="Equity curve chart"></canvas>
      <div class="note" id="note"></div>
    </section>
  </main>
  <script id="equity-data" type="application/json">{"runs":[{"id":"__all__","label":"All trades","points":[{"point":0,"timestamp":"2025-02-18 10:20:00-05:00","equity":150000.0,"drawdown":0.0,"drawdownPct":0.0},{"point":1,"timestamp":"2025-02-18 15:55:00-05:00","equity":148660.0,"drawdown":1340.0,"drawdownPct":0.008933333333333333},{"point":2,"timestamp":"2025-02-19 10:45:00-05:00","equity":147320.0,"drawdown":2680.0,"drawdownPct":0.017866666666666666},{"point":3,"timestamp":"2025-03-26 12:50:00-04:00","equity":149780.0,"drawdown":220.0,"drawdownPct":0.0014666666666666667},{"point":4,"timestamp":"2025-05-27 14:00:00-04:00","equity":152370.0,"drawdown":0.0,"drawdownPct":0.0},{"point":5,"timestamp":"2025-06-20 10:45:00-04:00","equity":155030.0,"drawdown":0.0,"drawdownPct":0.0},{"point":6,"timestamp":"2025-08-19 12:45:00-04:00","equity":157890.0,"drawdown":0.0,"drawdownPct":0.0},{"point":7,"timestamp":"2025-09-09 12:15:00-04:00","equity":156450.0,"drawdown":1440.0,"drawdownPct":0.009120273608208246},{"point":8,"timestamp":"2025-09-12 16:00:00-04:00","equity":157220.0,"drawdown":670.0,"drawdownPct":0.004243460637152448},{"point":9,"timestamp":"2025-09-18 16:00:00-04:00","equity":156190.0,"drawdown":1700.0,"drawdownPct":0.010766989676356958},{"point":10,"timestamp":"2025-12-26 16:00:00-05:00","equity":155685.0,"drawdown":2205.0,"drawdownPct":0.013965418962568877},{"point":11,"timestamp":"2025-12-31 16:00:00-05:00","equity":158150.0,"drawdown":0.0,"drawdownPct":0.0},{"point":12,"timestamp":"2026-01-02 10:50:00-05:00","equity":161250.0,"drawdown":0.0,"drawdownPct":0.0},{"point":13,"timestamp":"2026-02-17 10:45:00-05:00","equity":159770.0,"drawdown":1480.0,"drawdownPct":0.00917829457364341},{"point":14,"timestamp":"2026-05-26 11:50:00-04:00","equity":157955.0,"drawdown":3295.0,"drawdownPct":0.020434108527131782}],"summary":{"trades":14,"start":150000.0,"end":157955.0,"net":7955.0,"maxDrawdown":3295.0,"maxDrawdownPct":0.020434108527131782,"winRate":0.5,"profitFactor":1.8888268156424581,"mar":2.0405794511041577,"note":"14 closed trades from 2025-02-18 10:20:00-05:00 to 2026-05-26 11:50:00-04:00."}}]}</script>
  <script>
    const payload = JSON.parse(document.getElementById("equity-data").textContent);
    const runs = payload.runs;
    const select = document.getElementById("runSelect");
    const control = document.getElementById("runControl");
    const chart = document.getElementById("chart");
    const ctx = chart.getContext("2d");
    const ids = runs.map((run) => run.id);
    const chartMargin = { left: 72, right: 20, top: 22, bottom: 42 };
    let hoverIndex = null;

    for (const run of runs) {
      const option = document.createElement("option");
      option.value = run.id;
      option.textContent = run.label;
      select.appendChild(option);
    }
    if (runs.length <= 1) {
      control.style.display = "none";
    }

    const money = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });
    const percent = new Intl.NumberFormat("en-US", {
      style: "percent",
      maximumFractionDigits: 2
    });

    function activeRun() {
      return runs.find((item) => item.id === select.value) || runs[0];
    }

    function formatRatio(value) {
      if (value === "Infinity") return "∞";
      if (value === "-Infinity") return "-∞";
      return Number(value || 0).toFixed(2);
    }

    function resizeCanvas() {
      const rect = chart.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      chart.width = Math.max(1, Math.floor(rect.width * scale));
      chart.height = Math.max(1, Math.floor(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
    }

    function draw() {
      const run = activeRun();
      if (!run) return;
      resizeCanvas();
      const rect = chart.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      document.getElementById("trades").textContent = run.summary.trades.toLocaleString("en-US");
      document.getElementById("start").textContent = money.format(run.summary.start);
      document.getElementById("end").textContent = money.format(run.summary.end);
      document.getElementById("net").textContent = money.format(run.summary.net);
      document.getElementById("drawdown").textContent =
        `${money.format(run.summary.maxDrawdown)} (${percent.format(run.summary.maxDrawdownPct)})`;
      document.getElementById("winRate").textContent = percent.format(run.summary.winRate);
      document.getElementById("profitFactor").textContent = formatRatio(run.summary.profitFactor);
      document.getElementById("mar").textContent = formatRatio(run.summary.mar);
      document.getElementById("note").textContent = run.summary.note;

      const data = run.points;
      if (!data.length) return;
      const margin = chartMargin;
      const plotW = Math.max(1, width - margin.left - margin.right);
      const plotH = Math.max(1, height - margin.top - margin.bottom);
      const values = data.map((point) => point.equity);
      let minY = Math.min(...values);
      let maxY = Math.max(...values);
      if (minY === maxY) {
        minY -= Math.max(100, Math.abs(minY) * 0.01);
        maxY += Math.max(100, Math.abs(maxY) * 0.01);
      }
      const pad = (maxY - minY) * 0.08;
      minY -= pad;
      maxY += pad;

      function xAt(index) {
        return margin.left + (data.length === 1 ? 0 : (index / (data.length - 1)) * plotW);
      }
      function yAt(value) {
        return margin.top + ((maxY - value) / (maxY - minY)) * plotH;
      }

      ctx.lineWidth = 1;
      ctx.strokeStyle = "#e5e7eb";
      ctx.fillStyle = "#697386";
      ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i++) {
        const value = minY + ((maxY - minY) * i) / 4;
        const y = yAt(value);
        ctx.beginPath();
        ctx.moveTo(margin.left, y);
        ctx.lineTo(width - margin.right, y);
        ctx.stroke();
        ctx.fillText(money.format(value), margin.left - 10, y);
      }

      const startY = yAt(run.summary.start);
      ctx.strokeStyle = "#94a3b8";
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(margin.left, startY);
      ctx.lineTo(width - margin.right, startY);
      ctx.stroke();
      ctx.setLineDash([]);

      const gradient = ctx.createLinearGradient(0, margin.top, 0, height - margin.bottom);
      gradient.addColorStop(0, "rgba(37, 99, 235, 0.16)");
      gradient.addColorStop(1, "rgba(37, 99, 235, 0.00)");
      ctx.beginPath();
      data.forEach((point, index) => {
        const x = xAt(index);
        const y = yAt(point.equity);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.lineTo(xAt(data.length - 1), height - margin.bottom);
      ctx.lineTo(xAt(0), height - margin.bottom);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.beginPath();
      data.forEach((point, index) => {
        const x = xAt(index);
        const y = yAt(point.equity);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2.4;
      ctx.stroke();

      const end = data[data.length - 1];
      ctx.fillStyle = end.equity >= run.summary.start ? "#16a34a" : "#dc2626";
      ctx.beginPath();
      ctx.arc(xAt(data.length - 1), yAt(end.equity), 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#697386";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.fillText(data[0].timestamp || "start", margin.left, height - margin.bottom + 14);
      ctx.textAlign = "right";
      ctx.fillText(end.timestamp || `trade ${end.point}`, width - margin.right, height - margin.bottom + 14);

      if (hoverIndex !== null) {
        const index = Math.max(0, Math.min(data.length - 1, hoverIndex));
        const point = data[index];
        const hoverX = xAt(index);
        const hoverY = yAt(point.equity);
        drawHoverMarker(point, hoverX, hoverY, margin, width, height);
      }
    }

    function drawHoverMarker(point, x, y, margin, width, height) {
      ctx.save();
      ctx.strokeStyle = "rgba(23, 32, 42, 0.35)";
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(x, margin.top);
      ctx.lineTo(x, height - margin.bottom);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      const rows = [
        ["Date", point.timestamp || `trade ${point.point}`],
        ["Net liq", money.format(point.equity)],
        ["Curr DD", percent.format(point.drawdownPct || 0)]
      ];
      drawTooltip(rows, x, y, margin, width, height);
      ctx.restore();
    }

    function drawTooltip(rows, x, y, margin, width, height) {
      const padX = 10;
      const padY = 8;
      const lineHeight = 18;
      const gap = 12;
      ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const labelWidth = Math.max(...rows.map((row) => ctx.measureText(row[0]).width));
      ctx.font = "600 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const valueWidth = Math.max(...rows.map((row) => ctx.measureText(row[1]).width));
      const boxWidth = Math.ceil(labelWidth + gap + valueWidth + padX * 2);
      const boxHeight = padY * 2 + lineHeight * rows.length;
      let boxX = x + 12;
      let boxY = y - boxHeight - 12;
      if (boxX + boxWidth > width - margin.right) boxX = x - boxWidth - 12;
      if (boxX < margin.left) boxX = margin.left;
      if (boxY < margin.top) boxY = y + 12;
      if (boxY + boxHeight > height - margin.bottom) boxY = height - margin.bottom - boxHeight;

      ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
      ctx.strokeStyle = "#d5dae3";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(boxX, boxY, boxWidth, boxHeight);
      ctx.fill();
      ctx.stroke();

      rows.forEach((row, index) => {
        const textY = boxY + padY + index * lineHeight + lineHeight / 2;
        ctx.textBaseline = "middle";
        ctx.textAlign = "left";
        ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        ctx.fillStyle = "#697386";
        ctx.fillText(row[0], boxX + padX, textY);
        ctx.font = "600 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        ctx.fillStyle = "#17202a";
        ctx.fillText(row[1], boxX + padX + labelWidth + gap, textY);
      });
    }

    function updateHover(event) {
      const run = activeRun();
      const data = run ? run.points : [];
      if (!data.length) {
        clearHover();
        return;
      }
      const rect = chart.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const margin = chartMargin;
      if (
        x < margin.left ||
        x > width - margin.right ||
        y < margin.top ||
        y > height - margin.bottom
      ) {
        clearHover();
        return;
      }
      const plotW = Math.max(1, width - margin.left - margin.right);
      const rawIndex = data.length === 1 ? 0 : ((x - margin.left) / plotW) * (data.length - 1);
      const nextIndex = Math.max(0, Math.min(data.length - 1, Math.round(rawIndex)));
      if (hoverIndex !== nextIndex) {
        hoverIndex = nextIndex;
        draw();
      }
    }

    function clearHover() {
      if (hoverIndex !== null) {
        hoverIndex = null;
        draw();
      }
    }

    select.addEventListener("change", () => {
      hoverIndex = null;
      draw();
    });
    chart.addEventListener("mousemove", updateHover);
    chart.addEventListener("mouseleave", clearHover);
    window.addEventListener("resize", draw);
    select.value = ids[0] || "";
    draw();
  </script>
