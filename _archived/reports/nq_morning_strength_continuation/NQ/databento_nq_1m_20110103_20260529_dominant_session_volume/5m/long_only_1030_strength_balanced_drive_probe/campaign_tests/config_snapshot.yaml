research_metadata:
  alpha_family: NQ morning strength continuation / intraday momentum
  classification: source_screened_candidate
  academic_sources:
  - title: Market Intraday Momentum
    authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
    year: 2018
    venue: Journal of Financial Economics, 129(2), 394-414
    doi: 10.1016/j.jfineco.2018.05.009
    url: https://www.sciencedirect.com/science/article/abs/pii/S0304405X18301351
    finding_used: Opening-period market returns can predict later same-day market
      returns; this variant tests long-only NQ continuation after completed morning
      strength.
  edge_thesis: A fuller first-hour NQ strength window can identify more persistent
    same-day continuation when the opening drive closes in the upper half of its range,
    is moderately directionally efficient, and avoids extreme first-hour range shock.
  mechanic: 'Long-only NQ continuation: measure RTH-open-to-10:30:00 return; enter
    long only if the completed window exceeds the tuned strength threshold, closes
    at least 50% up its range, has at least 40% directional efficiency, and stays
    below a 200 bps opening-window range cap; flatten 15:59 ET.'
  evidence_directness: Moderate. The paper supports market intraday momentum, while
    this is an instrument-specific futures translation selected for staged validation.
  source_data: Databento NQ 1-minute OHLCV, dominant-session-volume continuous contract,
    RTH-only decisions.
  screen_reference: /private/tmp/nq_intraday_priority_slot_screen.py
