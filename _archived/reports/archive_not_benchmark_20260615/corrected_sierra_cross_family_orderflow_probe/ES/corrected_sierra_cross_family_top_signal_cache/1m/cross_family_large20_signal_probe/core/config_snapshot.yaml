campaign_id: corrected_sierra_cross_family_orderflow_probe
variant_id: cross_family_large20_signal_probe
strategy_name: orderflow_recent_pocket_combo
symbol: ES
dataset_id: corrected_sierra_cross_family_top_signal_cache
timeframe: 1m

research_metadata:
  academic_source: Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and Liquidity in a High-frequency World, Review of Financial Studies; Admati and Pfleiderer (1988), A Theory of Intraday Patterns, Review of Financial Studies
  doi: 10.1093/rfs/hhs053;10.1093/rfs/1.1.3
  edge_thesis: >
    Corrected Sierra bar-level orderflow near-misses may diversify when high
    relative volume/trade-count pressure and large20 participation composition
    are combined into non-overlapping intraday slots.
  mechanic: >
    Seven OR-compressed boolean signals generated from completed 1-minute bars:
    10:00 short large20 continuation/VWAP-stretch fade, 10:30 short large20
    composition continuation, 13:30 large20 no-price follow/positive-flow
    continuation, 14:30 high-trade-count flow continuation, and 15:00
    high-average-size flow continuation. Signals are evaluated on the prior
    1-minute bar close and entered at the next bar open.
  timeframe_rationale: >
    One-minute bars are required to preserve next-bar timing and aggregate
    BidVolume/AskVolume/NumberOfTrades features from Sierra.
  evidence_directness: >
    Moderate. The source papers motivate intraday volume clustering and
    order-flow toxicity; this config is an ES-specific mechanical translation
    using corrected local Sierra aggregate orderflow.

data:
  dataset_id: corrected_sierra_cross_family_top_signal_cache
  source_timeframe: 1m
  source: parquet
  raw_parquet: /private/tmp/corrected_sierra_cross_family_top_signal_cache.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: "09:30:00"
  rth_end: "15:59:00"
  trade_orderflow_features:
    enabled: false
    windows: []
    large_trade_sizes: []

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: orderflow_recent_pocket_combo
    params:
      setup_mode: corrected_sierra_cross_family_large20_combo
      bar_interval_minutes: 1
      stop_pct: 0.01
      target_r_multiple: 4.0
      max_trades_per_day: 3
      slots:
        - slot_id: xfam_1000_short_180
          signal_column: of_xfam_1000_short_180
          entry_time: "10:00:00"
          flatten_time: "13:00:00"
          direction: short
        - slot_id: xfam_1030_short_120
          signal_column: of_xfam_1030_short_120
          entry_time: "10:30:00"
          flatten_time: "12:30:00"
          direction: short
        - slot_id: xfam_1330_long_120
          signal_column: of_xfam_1330_long_120
          entry_time: "13:30:00"
          flatten_time: "15:30:00"
          direction: long
        - slot_id: xfam_1330_short_120
          signal_column: of_xfam_1330_short_120
          entry_time: "13:30:00"
          flatten_time: "15:30:00"
          direction: short
        - slot_id: xfam_1430_long_60
          signal_column: of_xfam_1430_long_60
          entry_time: "14:30:00"
          flatten_time: "15:30:00"
          direction: long
        - slot_id: xfam_1430_short_60
          signal_column: of_xfam_1430_short_60
          entry_time: "14:30:00"
          flatten_time: "15:30:00"
          direction: short
        - slot_id: xfam_1500_long_60
          signal_column: of_xfam_1500_long_60
          entry_time: "15:00:00"
          flatten_time: "16:00:00"
          direction: long
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 4.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.01
      round_to_tick: true
  flatten_time: "16:00:00"

core:
