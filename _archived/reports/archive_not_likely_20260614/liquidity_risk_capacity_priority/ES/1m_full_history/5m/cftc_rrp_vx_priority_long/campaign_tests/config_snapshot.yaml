campaign_id: liquidity_risk_capacity_priority
variant_id: cftc_rrp_vx_priority_long
strategy_name: liquidity_risk_capacity_priority
symbol: ES
dataset_id: 1m_full_history
timeframe: 5m

research_metadata:
  academic_source: "Brunnermeier and Pedersen (2009), Market Liquidity and Funding Liquidity"
  doi: "10.1093/rfs/hhn098"
  edge_thesis: "Funding-liquidity and market-liquidity spirals imply that public proxies for risk-bearing capacity, dealer/funding balance-sheet pressure, and volatility-market participation can condition ES intraday risk premia."
  mechanic: "Select exactly one daily long state by priority: CFTC S&P open-interest expansion, NY Fed RRP liquidity drain, broader CFTC expansion, then low VX open-interest activity."
  timeframe_rationale: "5m bars align the 09:35, 11:00, 13:30, and 14:30 ET entries to completed bar closes while using 1-minute detail for stop/target conflict checks."
  apex_compatibility: "RTH-only entries before 16:45 ET, leg-specific same-day flattening no later than 15:45 ET, and Apex guardrails enabled."

data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 20
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 20

external_data:
  liquidity_risk_capacity_features:
    path: data/external/liquidity_risk_capacity_features.csv
    point_in_time: true
    sources:
      cftc_tff:
        source: "https://www.cftc.gov/files/dea/history/com_fin_txt_YYYY.zip"
        availability_rule: "Report_Date_as_YYYY-MM-DD plus 6 calendar days; trade no earlier than following Monday RTH."
      nyfed_rrp:
        source: "https://markets.newyorkfed.org/api/rp/reverserepo/propositions/search.csv"
        availability_rule: "Operation results shifted one business day before ES eligibility."
      cboe_cfe_vx:
        source: "https://cdn.cboe.com/data/us/futures/market_statistics/historical_data/cfevoloi.csv"
        availability_rule: "Daily CFE futures activity shifted one ES session before eligibility."

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: liquidity_risk_capacity_priority
    params:
      feature_file: data/external/liquidity_risk_capacity_features.csv
      priority_order: [cftc_high, nyfed_rrp, cftc_broad, cboe_vx]
      direction: long
      cftc_feature_name: SPX_open_interest_chg13
      rrp_feature_name: reverserepo_total_bil_diff5_z504
      vx_feature_name: vx_z63
      cftc_high_threshold: 98748
      rrp_threshold: 0.5
      cftc_broad_threshold: 47442
      vx_threshold: -1.275
      cftc_high_entry_time: "09:35:00"
      cftc_broad_entry_time: "11:00:00"
      rrp_entry_time: "14:30:00"
      vx_entry_time: "13:30:00"
      cftc_high_flatten_time: "15:30:00"
      cftc_broad_flatten_time: "15:30:00"
      rrp_flatten_time: "15:30:00"
      vx_flatten_time: "15:45:00"
      cftc_high_stop_pct: 0.008
      rrp_stop_pct: 0.012
      cftc_broad_stop_pct: 0.006
      vx_stop_pct: 0.012
      cftc_high_target_r_multiple: 2.0
      rrp_target_r_multiple: 1.5
      cftc_broad_target_r_multiple: 4.0
      vx_target_r_multiple: 3.0
      max_trades_per_day: 1
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 2.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.008
      round_to_tick: true
  flatten_time: "15:45:00"

core:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.50
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.01
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: "15:45:00"

benchmarks:
  min_trades_per_year: 60
  preferred_min_total_trades: 500
  min_profit_factor: 1.25
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.04
  min_mar: 1.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.40
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50

core_grid:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  objective: MAR
  min_profitable_iteration_rate: 0.70
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.cftc_high_threshold: [75000, 98748, 125000]
    entry.params.rrp_threshold: [0.4, 0.5, 0.6]
    entry.params.cftc_broad_threshold: [25000, 47442, 65000]
    entry.params.vx_threshold: [-1.35, -1.275, -1.2, -1.125]

monkey:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  runs: 8000
  seed: 7
  beat_threshold: 0.90
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  mode: unanchored
  train_months: 36
  test_months: 6
  step_months: 6
  objective: MAR
  selection_min_trades_per_year: 60
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.cftc_high_threshold: [75000, 98748, 125000]
    entry.params.rrp_threshold: [0.4, 0.5, 0.6]
    entry.params.cftc_broad_threshold: [25000, 47442, 65000]
    entry.params.vx_threshold: [-1.35, -1.275, -1.2, -1.125]

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267

monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
