campaign_id: positive_delta_dislocation
variant_id: pdh_negative_hour_positive_delta_long_10000_bracket
strategy_name: positive_delta_dislocation
symbol: ES
dataset_id: sierra_trade_orderflow_1m_20101229_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  source: User-supplied screenshot rule set.
  edge_thesis: 'Go long when ES is above the previous RTH high while the latest completed
    RTH-aligned one-hour candle is price-negative but signed trade delta is positive
    by at least 500 contracts.

    '
  mechanic: 'At 10:30, 11:30, 12:30, 13:30, 14:30, and 15:30 ET, require current close
    above previous RTH high, 60-minute return below zero, and 60-minute signed volume
    delta >= 500; enter long on the next one-minute bar.

    '
  exit_rule: 'First to trigger: +10000 dollars per ES contract, -10000 dollars per
    ES contract, otherwise flatten at 16:00 ET RTH close.

    '
  timeframe_rationale: 'Use 1-minute strategy bars so prior-session-high features
    and next-bar execution remain native to the repo, while the entry module evaluates
    only completed RTH-aligned 60-minute windows.

    '
data:
  dataset_id: sierra_trade_orderflow_1m_20101229_20260609_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: full
  warmup_days: 10
  rth_start: 09:30:00
  rth_end: '15:59:00'
  rolling_volume_window: 20
  trade_orderflow_features:
    enabled: true
    windows:
    - 60
    large_trade_sizes: []
    min_period_fraction: 1.0
    tick_size: 0.25
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: positive_delta_dislocation
    params:
      setup_mode: pdh_negative_hour_positive_delta_long
      rth_start: 09:30:00
      signal_start: '10:30:00'
      signal_end: '15:30:00'
      flatten_time: '16:00:00'
      bar_interval_minutes: 1
      hour_window_minutes: 60
      tick_size: 0.25
      min_close_above_prev_high_ticks: 1
      min_negative_hour_ticks: 1
      min_hour_delta: 500
      max_trades_per_day: 1
      require_fresh_prev_high: false
  tp:
    module: fixed_dollar_per_contract
    params:
      dollars_per_contract: 10000
      tick_size: 0.25
      tick_value: 12.5
      round_to_tick: true
  sl:
    module: fixed_dollar_per_contract
    params:
      dollars_per_contract: 10000
      tick_value: 12.5
      round_to_tick: true
  flatten_time: '16:00:00'
core:
  data_subset:
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 1000000000
  daily_profit_stop: 1000000000
  flatten_time: '16:00:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_best_day_concentration: 0.5
  min_positive_month_rate: 0.5
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  objective: MAR
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &id002
    entry.params.min_close_above_prev_high_ticks:
    - 1
    - 2
    - 4
    - 8
    - 12
    entry.params.min_negative_hour_ticks:
    - 1
    - 2
    - 4
    - 8
    - 12
    entry.params.min_hour_delta:
    - 500
    - 750
    - 1000
    - 1500
    - 2000
monkey:
  data_subset: *id001
  runs: 500
  seed: 7
  beat_threshold: 0.8
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: true
wfa:
  data_subset: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  early_exit_require_train_profitable: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: *id002
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 10000
  trailing_drawdown: 10000
  max_contracts: 1
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 5000
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0667
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
campaign_tests:
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      min: 100
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: summary.windows
      min: 10
    - metric: stitched_oos_metrics.profit_factor
      exclusive_min: 1.5
    - metric: stitched_oos_metrics.mar
      exclusive_min: 0.5
    - metric: stitched_oos_metrics.expectancy_r
      exclusive_min: 0.2
    - metric: stitched_oos_metrics.total_trades
      exclusive_min: 500
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 75
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  acceptance_oos_test:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 25
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 24
    test_months: 6
