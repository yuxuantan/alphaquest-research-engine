campaign_id: bankruptcy_distress_reversion
variant_id: chapter11_yoy_prior_down_long
strategy_name: bankruptcy_distress_reversion
symbol: ES
dataset_id: 1m_full_history
timeframe: 1m
research_metadata:
  academic_source: Campbell, Hilscher, and Szilagyi (2008), In Search of Distress
    Risk; Vassalou and Xing (2004), Default Risk in Equity Returns
  doi: 10.1111/j.1540-6261.2008.01372.x; 10.1111/j.1540-6261.2004.00650.x
  edge_thesis: Public growth in U.S. Chapter 11 filings proxies a realized distress-risk
    state; after a prior ES down session, the campaign tests afternoon mean reversion
    rather than trend continuation.
  mechanic: At 11:00 ET, go long ES only when the latest point-in-time U.S. Courts
    F-2 total Chapter 11 YoY growth is at or above the diagnostic threshold and the
    prior ES RTH close-to-close return is negative; flatten at 15:30 ET.
  timeframe_rationale: 1m bars preserve the fixed 11:00 entry and 15:30 exit used
    in the diagnostic screen.
  apex_compatibility: One RTH-only ES trade, same-day flatten before the futures daily
    close, no overnight exposure.
data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 20
  rth_start: 09:30:00
  rth_end: '16:00:00'
  eth_start: '16:00:00'
  eth_end: 09:29:00
  rolling_volume_window: 20
external_data:
  uscourts_bankruptcy_f2_features:
    path: data/external/uscourts_bankruptcy_f2_quarterly_features.csv
    source: https://www.uscourts.gov/data-news/data-tables
    source_manifest: research_artifacts/uscourts_bankruptcy_f2_quarterly_manifest_20260614.json
    availability_rule: Quarter end plus 45 calendar days; if that lands on a weekend,
      use the next weekday.
    point_in_time: true
    known_gap: 2015-12-31 official Excel link was not found by the unattended scrape;
      no synthetic repair was applied.
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: bankruptcy_distress_reversion
    params:
      feature_file: data/external/uscourts_bankruptcy_f2_quarterly_features.csv
      feature_name: total_ch11_yoy_pct
      operator: '>='
      threshold: 14.780168
      direction: long
      prior_return_filter: down
      entry_time: '11:00:00'
      flatten_time: '15:30:00'
      stale_after_days: 180
      stop_pct: 0.03
      target_r_multiple: 10.0
      max_trades_per_day: 1
      bar_interval_minutes: 1
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 10.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.03
      round_to_tick: true
  flatten_time: '15:30:00'
core:
  data_subset:
    start_date: '2022-01-01'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 1000000000
  flatten_time: '15:30:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 40
  preferred_min_total_trades: 300
  min_profit_factor: 1.25
  min_total_net_profit: 0
  min_expectancy_r: 0.02
  min_win_rate: 0.45
  max_drawdown_pct: 0.08
  min_cagr: 0.02
  min_mar: 1.0
  max_daily_loss: 1500
  max_consecutive_losses: 10
  max_best_day_concentration: 0.45
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset:
    start_date: '2022-01-01'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.threshold:
    - 11.876485
    - 14.780168
    - 29.60373
    - 31.841652
    entry.params.entry_time:
    - '10:30:00'
    - '11:00:00'
    - '13:30:00'
    entry.params.stop_pct:
    - 0.02
    - 0.03
    - 0.05
    entry.params.target_r_multiple:
    - 5.0
    - 10.0
    - 20.0
monkey:
  data_subset:
    start_date: '2022-01-01'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  runs: 8000
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: true
wfa:
  data_subset:
    start_date: '2013-04-15'
    end_date: '2026-05-29'
    session_labels:
    - RTH
  mode: unanchored
  train_months: 36
  test_months: 6
  step_months: 6
  objective: MAR
  selection_min_trades_per_year: 40
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.threshold:
    - 11.876485
    - 14.780168
    entry.params.entry_time:
    - '11:00:00'
    entry.params.stop_pct:
    - 0.03
    - 0.05
    entry.params.target_r_multiple:
    - 5.0
    - 10.0
    - 20.0
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
campaign_tests:
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      min: 100
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: summary.windows
      min: 10
    - metric: stitched_oos_metrics.profit_factor
      exclusive_min: 1.5
    - metric: stitched_oos_metrics.mar
      exclusive_min: 0.5
    - metric: stitched_oos_metrics.expectancy_r
      exclusive_min: 0.2
    - metric: stitched_oos_metrics.total_trades
      exclusive_min: 500
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 75
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  acceptance_oos_test:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 25
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 24
    test_months: 6
