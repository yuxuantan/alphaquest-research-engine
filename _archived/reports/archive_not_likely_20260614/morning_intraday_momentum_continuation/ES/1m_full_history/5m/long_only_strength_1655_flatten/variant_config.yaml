campaign_id: morning_intraday_momentum_continuation
variant_id: long_only_strength_1655_flatten
strategy_name: morning_intraday_momentum_continuation
symbol: ES
dataset_id: 1m_full_history
timeframe: 5m

research_metadata:
  academic_source: "Gao, Han, Li, and Zhou (2018), Market Intraday Momentum, Journal of Financial Economics"
  doi: "10.1016/j.jfineco.2018.05.009"
  edge_thesis: "A strong completed RTH morning return can continue into the afternoon."
  mechanic: "Enter long at the next bar after the 10:30 completed source window when the RTH-open-to-10:30 return is positive and above threshold, then flatten before the 16:59:59 ET futures close."
  timeframe_rationale: "A 5-minute bar closely preserves the screened 10:30 next-bar execution and exits safely on the 16:50 bar close timestamped 16:55 ET."
  evidence_directness: "Indirect for ES; the paper tests SPY/ETFs and this campaign uses ES as the liquid S&P 500 futures proxy."
  close_compliance: "Flattening at 16:55 ET exits before the user-defined 16:59:59 ET futures market close."

data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 10
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 20

strategy:
  entry:
    module: morning_intraday_momentum
    params:
      setup_mode: long_only_strength
      rth_start: "09:30:00"
      signal_time: "10:30:00"
      bar_interval_minutes: 5
      min_signal_return_ticks: 32
      max_trades_per_day: 1
      allow_long: true
      allow_short: false
      tick_size: 0.25
  tp:
    module: percent_from_entry
    params:
      target_pct: 0.008
      tick_size: 0.25
      round_to_tick: true
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0045
      round_to_tick: true
  flatten_time: "16:55:00"

core:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.50
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.01
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: "16:55:00"

benchmarks:
  min_trades_per_year: 100
  preferred_min_total_trades: 500
  min_profit_factor: 1.30
  min_total_net_profit: 0
  min_expectancy_r: 0.0
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.06
  min_mar: 1.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.40
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50

core_grid:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  objective: MAR
  min_profitable_iteration_rate: 0.70
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.min_signal_return_ticks: [20, 24, 28, 32, 36]
    sl.params.stop_pct: [0.0035, 0.004, 0.0045, 0.005, 0.0055]
    tp.params.target_pct: [0.004, 0.005, 0.006, 0.008]

monkey:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  runs: 8000
  seed: 7
  beat_threshold: 0.90
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  data_subset:
    start_date: "2011-01-01"
    end_date: "2026-05-29"
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.min_signal_return_ticks: [20, 24, 28, 32, 36]
    sl.params.stop_pct: [0.0035, 0.004, 0.0045, 0.005, 0.0055]
    tp.params.target_pct: [0.004, 0.005, 0.006, 0.008]

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267

monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
