campaign_id: overnight_inventory_reversion
variant_id: on_extreme_reclaim_fixed_r
strategy_name: overnight_inventory_reversion
symbol: ES
dataset_id: 1m_full_history
timeframe: 1m

data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 10
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 20

strategy:
  entry:
    module: overnight_inventory_reversion
    params:
      start_time: "09:30:00"
      end_time: "11:30:00"
      bar_interval_minutes: 1
      confirmation_mode: extreme_reclaim
      vwap_filter: none
      min_extension_points: 0.5
      reclaim_window_bars: 2
      min_overnight_range_points: 5.0
      max_overnight_range_points: 90.0
      reclaim_buffer_ticks: 0
      require_open_outside_range: false
      max_trades_per_day: 1
      allow_long: true
      allow_short: true
      tick_size: 0.25
  tp:
    module: cost_adjusted_fixed_r
    params:
      target_r_multiple: 1.0
      tick_size: 0.25
      tick_value: 12.50
      commission_per_contract: 2.50
      slippage_ticks: 1
  sl:
    module: sweep_extreme
    params:
      stop_offset_ticks: 2
  flatten_time: "12:30:00"

core:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.50
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.005
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: "12:30:00"

benchmarks:
  min_trades_per_year: 80
  preferred_min_total_trades: 500
  min_profit_factor: 1.25
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.04
  min_mar: 1.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.40
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50

core_grid:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  objective: MAR
  min_profitable_iteration_rate: 0.70
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.min_extension_points: [0.25, 0.5, 1.0]
    entry.params.reclaim_window_bars: [1, 2, 4]
    tp.params.target_r_multiple: [0.75, 1.0, 1.25, 1.5]
    sl.params.stop_offset_ticks: [1, 2, 4]

monkey:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  runs: 8000
  seed: 7
  beat_threshold: 0.90
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  data_subset:
    start_date: "2011-01-01"
    end_date: "2026-05-29"
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 52
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.min_extension_points: [0.25, 0.5, 1.0]
    entry.params.reclaim_window_bars: [1, 2, 4]
    tp.params.target_r_multiple: [0.75, 1.0, 1.25, 1.5]
    sl.params.stop_offset_ticks: [1, 2, 4]

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267

monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: true
    workers: 6
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.005
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
