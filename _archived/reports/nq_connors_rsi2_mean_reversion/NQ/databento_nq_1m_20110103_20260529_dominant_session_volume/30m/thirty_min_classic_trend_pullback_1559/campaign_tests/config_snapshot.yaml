campaign_id: nq_connors_rsi2_mean_reversion
variant_id: thirty_min_classic_trend_pullback_1559
strategy_name: nq_connors_rsi2_mean_reversion
symbol: NQ
dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
timeframe: 30m
research_metadata:
  alpha_family: Connors RSI2 mean reversion / 30-minute day-trading adaptation
  classification: source_backed_new_nq_variant
  source_url: https://www.mql5.com/en/articles/17636
  source_support: 'The cited day-trading adaptation describes using 2-period RSI over
    two 30-minute bars to identify temporary intraday oversold/overbought conditions.

    '
  independence_note: 'Distinct from fixed-clock intraday momentum because entry is
    based on a rolling RSI2 extreme and moving-average trend context.

    '
  edge_thesis: 'Thirty-minute bars reduce microstructure noise while retaining enough
    NQ intraday observations to test Connors-style pullback reversion.

    '
  mechanic: 'Compute RSI2 on 30-minute RTH bars, trade oversold/overbought reversions
    in the direction allowed by a moving-average trend filter, and flatten by the
    RTH close.

    '
  apex_compatibility: RTH-only next-bar entries, one trade per session, no overnight
    positions.
data:
  dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/NQ/GLBX-20260601-RTF938NJSN
  cache_dir: data/cache/databento/GLBX-20260601-RTF938NJSN
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: dominant_session_volume
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 60
  rth_start: 09:30:00
  rth_end: '16:00:00'
  eth_start: '16:00:00'
  eth_end: 09:29:00
  rolling_volume_window: 20
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: connors_rsi2_mean_reversion
    params:
      setup_mode: two_sided_trend_reversion
      trend_filter: ma
      rsi_period: 2
      moving_average_period: 100
      oversold_rsi: 10
      overbought_rsi: 90
      min_vwap_extension_ticks: 0
      earliest_entry_time: '10:00:00'
      latest_entry_time: '15:00:00'
      flatten_time: '15:59:00'
      bar_interval_minutes: 30
      tick_size: 0.25
      stop_pct: 0.004
      target_r_multiple: 1.5
      max_trades_per_day: 1
      allow_long: true
      allow_short: true
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 1.5
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.004
      round_to_tick: true
  flatten_time: '15:59:00'
core:
  data_subset:
    start_date: '2011-01-03'
    end_date: '2026-05-29'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 5.0
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:59:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.4
  min_total_net_profit: 0
  min_expectancy_r: 0.2
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_best_day_concentration: 0.5
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  objective: MAR
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &id002
    entry.params.moving_average_period:
    - 50
    - 100
    - 200
    entry.params.oversold_rsi:
    - 5
    - 10
    - 15
    entry.params.overbought_rsi:
    - 85
    - 90
    - 95
    entry.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
    - 3.0
monkey:
  data_subset: *id001
  runs: 500
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_profit_factor: 1.0
  early_exit_min_train_profit_factor: 1.0
  early_exit_require_train_profitable: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: *id002
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
campaign_tests:
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      min: 100
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: summary.windows
      min: 10
    - metric: stitched_oos_metrics.profit_factor
      min: 1.2
    - metric: stitched_oos_metrics.mar
      min: 0.4
    - metric: stitched_oos_metrics.total_trades
      min: 500
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.total_trades
      min: 75
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  acceptance_oos_test:
    criteria:
    - metric: metrics.profit_factor
      min: 1.0
    - metric: metrics.mar
      min: 1.0
    - metric: metrics.total_trades
      min: 25
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 24
    test_months: 6
