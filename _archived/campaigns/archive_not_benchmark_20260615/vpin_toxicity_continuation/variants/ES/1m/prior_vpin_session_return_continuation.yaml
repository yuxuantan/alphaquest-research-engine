campaign_id: vpin_toxicity_continuation
variant_id: prior_vpin_session_return_continuation
strategy_name: vpin_toxicity_continuation
symbol: ES
dataset_id: 1m_full_history
timeframe: 1m

research_metadata:
  academic_source: "Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and Liquidity in a High-frequency World, Review of Financial Studies"
  doi: "10.1093/rfs/hhs053"
  edge_thesis: "Prior-session high VPIN-style toxicity can condition same-day afternoon ES continuation when the current RTH session is already positive."
  mechanic: "Enter long at the 13:30 ET next-bar open when prior-session 13:30 VPIN proxy rank is high, prior-session 13:30 drawdown rank is above threshold, and current session return into 13:30 is positive."
  timeframe_rationale: "The screened edge was discovered on existing 1-minute OHLCV data and uses 1-minute next-bar execution."
  evidence_directness: "Indirect; the paper defines VPIN using classified trade flow, while this config uses an OHLCV signed-volume proxy shifted by one completed session."

data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: none
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 90
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 20
  vpin_toxicity_features:
    enabled: true
    entry_time: "13:30:00"
    bucket_fraction: 0.01
    bucket_lookback: 5
    bucket_min_periods: 3
    vpin_rank_window: 21
    vpin_rank_min_periods: 10
    drawdown_rank_window: 63
    drawdown_rank_min_periods: 31

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: vpin_toxicity_continuation
    params:
      setup_mode: prior_vpin_session_return_continuation
      entry_time: "13:30:00"
      flatten_time: "15:31:00"
      bar_interval_minutes: 1
      vpin_rank_column: vpin_prior_rank21_at_1330
      drawdown_rank_column: vpin_prior_drawdown_rank63_at_1330
      session_return_column: vpin_session_ret
      vpin_proxy_column: vpin_proxy_b010_l5
      vpin_rank_cutoff: 0.45
      drawdown_rank_cutoff: 0.30
      min_session_return: 0.0005
      stop_pct: 0.020
      target_r_multiple: 1.0
      max_trades_per_day: 1
      allow_long: true
      tick_size: 0.25
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 1.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.020
      round_to_tick: true
  flatten_time: "15:31:00"

