campaign_id: orderflow_reversal_inventory
variant_id: prior_session_inventory_reversion
strategy_name: orderflow_regime
symbol: ES
dataset_id: sierra_trade_orderflow_1m_20101229_20260609_full_rth_ny
timeframe: 2m
research_metadata:
  academic_source: Order-flow inventory and price-pressure literature
  edge_thesis: Fade prior-session aggressive-flow inventory extremes on the next RTH
    session.
data:
  dataset_id: sierra_trade_orderflow_1m_20101229_20260609_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 420
  rth_start: 09:30:00
  rth_end: '15:59:00'
  trade_orderflow_features:
    enabled: true
    windows:
    - 3
    large_trade_sizes: []
    min_period_fraction: 1.0
    tick_size: 0.25
    prior_session_inventory:
      enabled: true
      rank_windows:
      - 252
      rank_min_periods:
        '252': 84
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: orderflow_regime
    params:
      mode: prior_inventory_reversion
      setup_mode: prior_session_inventory_reversion
      bar_interval_minutes: 2
      pressure_rank_threshold: 0.8
      stop_pct: 0.005
      target_r_multiple: 1.5
      max_trades_per_day: 1
      slots:
      - slot_id: prior_inventory_reversion
        entry_time: '10:30:00'
        flatten_time: '15:30:00'
        pressure_rank_column: trade_orderflow_prior_session_imbalance_rank252
        pressure_value_column: trade_orderflow_prior_session_imbalance
        return_column: trade_orderflow_return_ticks_3
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 1.5
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.005
      round_to_tick: true
  flatten_time: '15:30:00'
core:
  data_subset:
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 1000000000
  flatten_time: '15:30:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_best_day_concentration: 0.5
  min_positive_month_rate: 0.5
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2024-12-31'
    session_labels:
    - RTH
  objective: MAR
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &id002
    entry.params.pressure_rank_threshold:
    - 0.7
    - 0.8
    - 0.9
    entry.params.slots.0.entry_time:
    - 09:46:00
    - '10:30:00'
    - '13:30:00'
    entry.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.5
    - 4.0
    entry.params.stop_pct:
    - 0.0035
    - 0.005
    - 0.0075
    - 0.01
monkey:
  data_subset: *id001
  runs: 500
  seed: 7
  beat_threshold: 0.8
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset: *id001
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 50
  early_exit_min_train_profit_factor: 1.0
  early_exit_require_train_profitable: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: *id002
campaign_tests:
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    criteria:
    - metric: summary.total_combinations_tested
      min: 100
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
  limited_monkey_test:
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  walk_forward_analysis:
    data_subset:
      start_date: '2011-01-03'
      end_date: '2024-12-31'
      session_labels:
      - RTH
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: summary.windows
      min: 10
    - metric: stitched_oos_metrics.profit_factor
      exclusive_min: 1.5
    - metric: stitched_oos_metrics.mar
      exclusive_min: 0.5
    - metric: stitched_oos_metrics.expectancy_r
      exclusive_min: 0.2
    - metric: stitched_oos_metrics.total_trades
      exclusive_min: 500
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
  simulated_incubation_core:
    data_subset:
      start_date: '2025-01-01'
      end_date: '2026-06-09'
      session_labels:
      - RTH
    train_selection:
      enabled: true
      data_subset:
        start_date: '2021-01-01'
        end_date: '2024-12-31'
        session_labels:
        - RTH
      objective: MAR
      selection_min_trades_per_year: 50
      retain_iteration_reports: false
      parallel:
        enabled: true
        workers: 6
        scope: grid
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 75
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  acceptance_oos_test:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 25
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 24
    test_months: 6
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 10000
  trailing_drawdown: 10000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 50000
  profit_target_pct: 0.3333333333
  drawdown_limit_pct: 0.0666666667
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
