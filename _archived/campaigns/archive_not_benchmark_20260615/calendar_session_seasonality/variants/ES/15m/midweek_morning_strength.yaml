campaign_id: calendar_session_seasonality
variant_id: midweek_morning_strength
strategy_name: calendar_session_seasonality
symbol: ES
dataset_id: 1m_full_history
timeframe: 15m

research_metadata:
  academic_source: "Floros and Salvador (2014), Calendar anomalies in cash and stock index futures: International evidence, Economic Modelling"
  doi: "10.1016/j.econmod.2013.10.036"
  edge_thesis: "Midweek RTH morning windows may capture positive calendar/session flow in S&P 500 futures."
  mechanic: "Trade selected midweek weekday profiles from the first completed RTH bar toward midday."
  timeframe_rationale: "Balances execution timing with lower bar noise for intraday calendar windows."
  evidence_directness: "Direct for S&P 500 futures calendar effects; intraday session-window translation."

data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 10
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 20

strategy:
  entry:
    module: calendar_session_bias
    params:
      setup_mode: midweek_morning_strength
      signal_time: "09:45:00"
      bar_interval_minutes: 15
      weekday_directions: {2: long, 3: long}
      max_trades_per_day: 1
  tp:
    module: percent_from_entry
    params:
      target_pct: 0.05
      tick_size: 0.25
      round_to_tick: true
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  flatten_time: "12:00:00"

core:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.50
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.01
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: "12:00:00"

benchmarks:
  min_trades_per_year: 100
  preferred_min_total_trades: 500
  min_profit_factor: 1.30
  min_total_net_profit: 0
  min_expectancy_r: 0.0
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.06
  min_mar: 1.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.40
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50

core_grid:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  objective: MAR
  min_profitable_iteration_rate: 0.70
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.weekday_directions:
      - {2: long, 3: long}
      - {2: long, 3: long, 4: long}
      - {1: short, 2: long, 3: long}
      - {1: short, 2: long, 3: long, 4: long}
      - {0: long, 2: long, 3: long}
    entry.params.signal_time: ["09:45:00", "10:00:00", "10:30:00", "11:00:00"]
    sl.params.stop_pct: [0.0025, 0.005, 0.0075]
    tp.params.target_pct: [0.025, 0.05]

monkey:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  runs: 8000
  seed: 7
  beat_threshold: 0.90
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  data_subset:
    start_date: "2011-01-01"
    end_date: "2026-05-29"
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 100
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.weekday_directions:
      - {2: long, 3: long}
      - {2: long, 3: long, 4: long}
      - {1: short, 2: long, 3: long}
      - {1: short, 2: long, 3: long, 4: long}
      - {0: long, 2: long, 3: long}
    entry.params.signal_time: ["09:45:00", "10:00:00", "10:30:00", "11:00:00"]
    sl.params.stop_pct: [0.0025, 0.005, 0.0075]
    tp.params.target_pct: [0.025, 0.05]

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267

monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
