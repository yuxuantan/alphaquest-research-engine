methodology_policy:
  version: "2026-07-11.1"
  description: "Authoritative fail-closed research policy for staged futures backtests."

research_policy:
  data_scope: local_only
  primary_instrument: ES
  market_timezone: America/New_York
  no_paid_downloads: true
  final_decision_values:
    - PASS
    - FAIL
    - NEEDS MANUAL REVIEW
  candidate_language: candidate strategy

execution_defaults:
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1

prop_flatten_rules:
  enabled: true
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  no_overnight_positions: true

random_seeds:
  core_random_months: 31
  monkey: 7
  monte_carlo: 11
  due_diligence_sample: 7

methodology_caps:
  max_entry_tunables: 2
  max_stop_loss_tunables: 1
  max_take_profit_tunables: 1
  min_parameter_combinations: 8
  max_parameter_combinations: 120

stage_defaults:
  acceptance_stage: acceptance_oos_test
  pre_acceptance_stage_order:
    - limited_core_grid_test
    - limited_monkey_test
    - walk_forward_analysis
    - wfa_oos_monkey_test
    - wfa_oos_monte_carlo
    - simulated_incubation_core
    - simulated_incubation_monkey
  monkey_runs: 8000
  shortlist_data_window:
    mode: random_fraction
    fraction: 0.10
    avoid_last_fraction: 0.10
    seed: 31
    avoid_ranges:
      - start_date: "2020-02-01"
        end_date: "2021-06-30"
  wfa_data_window:
    mode: first_fraction
    fraction: 0.90
  simulated_incubation:
    train_months: 48
    test_months: 12
  acceptance_oos:
    train_months: 24
    test_months: 6

stage_gates:
  limited_core_grid_test:
    criteria:
      - metric: summary.total_combinations_tested
        valid_parameter_combination_count: true
      - metric: summary.percentage_profitable_iterations
        min: 0.70
      - metric: summary.apex_rule_violating_iterations
        max: 0
  limited_monkey_test:
    criteria:
      - metric: summary.core_beats_monkey_net_profit_rate
        min: 0.90
      - metric: summary.core_beats_monkey_max_drawdown_rate
        min: 0.90
      - metric: summary.core_metrics.apex_rule_violations
        max: 0
  walk_forward_analysis:
    criteria:
      - metric: summary.early_exit
        equals: false
      - metric: stitched_oos_metrics.profit_factor
        min: 1.20
      - metric: stitched_oos_metrics.mar
        min: 0.40
      - metric: stitched_oos_metrics.trades_per_year
        min: 50
      - metric: stitched_oos_metrics.apex_rule_violations
        max: 0
  wfa_oos_monkey_test:
    criteria:
      - metric: summary.core_beats_monkey_net_profit_rate
        min: 0.80
      - metric: summary.core_beats_monkey_max_drawdown_rate
        min: 0.80
      - metric: summary.core_metrics.apex_rule_violations
        max: 0
  wfa_oos_monte_carlo:
    criteria:
      - metric: summary.mean_net_pnl
        exclusive_min: 0.0
  simulated_incubation_core:
    criteria:
      - metric: metrics.profit_factor
        min: 1.00
      - metric: metrics.mar
        min: 1.00
      - metric: metrics.trades_per_year
        min: 50
      - metric: metrics.apex_rule_violations
        max: 0
  simulated_incubation_monkey:
    criteria:
      - metric: summary.core_beats_monkey_net_profit_rate
        min: 0.80
      - metric: summary.core_beats_monkey_max_drawdown_rate
        min: 0.80
      - metric: summary.core_metrics.apex_rule_violations
        max: 0
  acceptance_oos_test:
    criteria:
      - metric: metrics.profit_factor
        min: 1.00
      - metric: metrics.mar
        min: 1.00
      - metric: metrics.trades_per_year
        min: 50
      - metric: metrics.apex_rule_violations
        max: 0
