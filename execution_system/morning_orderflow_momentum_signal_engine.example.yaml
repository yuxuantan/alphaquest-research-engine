project_root: ..

engine:
  symbol: ES
  timezone: America/New_York
  max_source_bars: 120000
  count_historical_signals: false
  max_entry_lag_seconds: 120
  entry_contract_match_required: true
  entry_contract_mismatch_alert_repeat_seconds: 120
  replay_seed_bars: 0
  fail_on_insufficient_warmup: false
  alert_prefix: ENTRY_SIGNAL
  console:
    debug: false
    live_stream:
      enabled: true
      print_trade_ticks: true
      print_completed_bars: true
      print_session_metrics: true
      tick_throttle_seconds: 1.0
  process_lock:
    enabled: true
    path: data/runtime/morning_orderflow_momentum_signal_engine.lock
    stale_after_seconds: 86400
    fail_if_locked: true
  output_path_readiness:
    enabled: true
    create_parent_dirs: true
    fail_on_error: true
    require_fail_closed_sinks: true
  alerts_path: data/runtime/alerts/morning_orderflow_entry_signals.jsonl
  alert_file:
    fsync: true
    fail_on_write_error: true
    suppress_duplicate_alert_ids: true
  setup_alerts:
    enabled: true
    path: data/runtime/alerts/morning_orderflow_trade_setups.jsonl
    fsync: true
    fail_on_write_error: true
    suppress_duplicate_setup_ids: true
  execution_intents:
    enabled: true
    path: data/runtime/alerts/morning_orderflow_execution_intents.jsonl
    fsync: true
    fail_on_write_error: true
    suppress_duplicate_alert_ids: true
    suppress_duplicate_setup_ids: true
    intent_ttl_seconds: 30
    enforce_freshness: true
    freshness_grace_seconds: 0
    fail_on_freshness_error: true
  data_quality:
    enabled: true
    fail_on_error: false
    allow_zero_volume: false
    warn_on_time_gaps: true
    max_bar_gap_minutes: 5
    max_reported_issues: 10
    alert_repeat_seconds: 120
    delta_unclassified:
      enabled: true
      delta_methods: [price_vs_quote]
      max_selected_unclassified_fraction: 0.25
      min_checked_volume: 1
      require_diagnostic: true
      severity: error
  feature_quality:
    enabled: true
    fail_on_missing_columns: true
    alert_repeat_seconds: 120
    max_reported_columns: 20
  strategy_errors:
    fail_fast: false
    disable_strategy_on_error: true
    max_errors_per_strategy: 1
    fail_when_all_strategies_disabled: true
  trade_sanity:
    enabled: true
    max_stop_points: 75
    max_take_profit_points: 300
    max_stop_fraction_of_entry: 0.02
    max_take_profit_fraction_of_entry: 0.06
    max_risk_dollars: 5000
    max_reward_dollars: 15000
  operator:
    print_human_readable: true
    print_warning_readable: true
    print_setup_readable: true
    print_rejection_readable: true
    sound:
      enabled: true
      bell: false
      on_setup: true
      on_entry: true
      on_system: true
      max_active_commands: 3
      cleanup_on_exit: true
      fail_on_error: false
      setup_command: /usr/bin/afplay /System/Library/Sounds/Ping.aiff
      entry_command: /usr/bin/afplay /System/Library/Sounds/Glass.aiff
      system_command: /usr/bin/afplay /System/Library/Sounds/Basso.aiff
      command: /usr/bin/afplay /System/Library/Sounds/Glass.aiff
  account:
    net_liq: 150000
    min_contracts: 1
    max_contracts: 1
    slippage_ticks: 1

databento:
  api_key_env: DATABENTO_API_KEY
  dataset: GLBX.MDP3
  schema: trades
  symbols: ES.FUT
  stype_in: parent
  stype_out: instrument_id
  root_symbol: ES
  timezone: America/New_York
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  contract_symbol_regex: "^ES[HMUZ]\\d$"
  large_trade_sizes: []
  active_contract_mode: highest_session_volume
  delta_method: aggressor_side
  historical:
    enabled: true
    seed_bars_path: ../data/cache/orderflow/es_trade_orderflow_1m_20250609_20260608.csv
    refresh: false
    allow_contract_symbol_regex_relaxation: false
    cache_metadata:
      enabled: false
    current_session_backfill:
      enabled: true
      fail_on_missing: true
      startup_mode: defer_until_complete
      retry_interval_seconds: 30
      max_wait_seconds: 0
      max_reported_missing_bars: 20
    cost_guard:
      enabled: true
      allow_paid_downloads: false
      require_zero_cost: true
      max_cost_usd: 0.0
      fail_if_estimate_unavailable: true
  live:
    enabled: true
    cost_guard:
      enabled: true
      allow_live_subscription: true
      acknowledge_live_data_may_be_billable: true
    metadata_preflight: true
    allow_live_without_metadata_preflight: false
    require_fail_closed_safety_stops: true
    symbology_stype_out: instrument_id
    resolve_instrument_symbols: true
    fail_without_live_symbol_map: true
    subscribe_resolved_raw_symbols: true
    max_resolved_raw_symbols: 2
    reconnect_policy: reconnect
    heartbeat_interval_s: 30
    startup_grace_seconds: 3
    shutdown_grace_seconds: 3
    state_lock_timeout_seconds: 5
    maintenance_interval_seconds: 1
    status_interval_seconds: 60
    alert_repeat_seconds: 120
    no_records_alert_seconds: 30
    no_trade_ticks_alert_seconds: 60
    no_completed_bar_alert_seconds: 180
    max_trade_tick_lag_seconds: 10
    max_trade_tick_future_seconds: 2
    session_aware_stale_alerts: true
    stale_alert_session_start: "09:30:00"
    stale_alert_session_end: "16:00:00"
    stale_alert_session_timezone: America/New_York
    stale_alert_weekdays: [0, 1, 2, 3, 4]
    stop_on_disconnect: true
    stop_on_no_records: true
    stop_on_no_trade_ticks: true
    stop_on_no_completed_bars: true
    stop_on_no_evaluable_strategies: true
    stop_on_partial_unevaluable_strategies: true
    stop_on_stale_trade_tick: true
    stop_on_future_trade_tick: true
    stop_on_unmatched_contract_symbol: true
    stop_on_state_lock_timeout: false
    drop_partial_first_live_bar: true
    flush_completed_bars_on_heartbeat: true
    bar_flush_delay_seconds: 2

strategies:
  - id: morning_orderflow_momentum_two_sided_signed_flow_continuation_live
    enabled: true
    config: strategies/morning_orderflow_momentum_two_sided_signed_flow_continuation_live.yaml
