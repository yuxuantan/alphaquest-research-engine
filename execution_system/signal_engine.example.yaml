project_root: ..

engine:
  symbol: ES
  timezone: America/New_York
  max_source_bars: 50000
  count_historical_signals: true
  max_entry_lag_seconds: 120
  replay_seed_bars: 25000
  alert_prefix: ENTRY_SIGNAL
  alerts_path: data/alerts/entry_signals.jsonl
  account:
    net_liq: 150000
    min_contracts: 1
    max_contracts: 10
    slippage_ticks: 1

databento:
  api_key_env: DATABENTO_API_KEY
  dataset: GLBX.MDP3
  schema: trades
  symbols: ES.FUT
  stype_in: parent
  stype_out: raw_symbol
  root_symbol: ES
  timezone: America/New_York
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  contract_symbol_regex: "^ES[HMUZ]\\d$"
  large_trade_sizes: []
  active_contract_mode: highest_session_volume
  historical:
    enabled: true
    lookback_days: 70
    max_seed_bars: 30000
    complete_session_end: null
    cache_path: data/databento/es_trade_orderflow_seed_1m.csv
    refresh: false
  live:
    enabled: false
    reconnect_policy: reconnect
    heartbeat_interval_s: 30

strategies:
  - id: dense_rank_value_priority_ensemble_full_sierra
    enabled: true
    config: configs/campaigns/bar_orderflow_participation_state/variants/ES/1m/dense_rank_value_priority_ensemble_full_sierra.yaml
