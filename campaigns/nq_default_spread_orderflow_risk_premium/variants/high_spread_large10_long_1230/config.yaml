timeframe: 5m
research_metadata:
  academic_source: Fama and French (1989); Keim and Stambaugh (1986); FRED DAAA/DBAA; Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: A high lagged default-spread rank may indicate elevated equity risk premium; NQ longs require
    large-trade buying confirmation to avoid weak broad-flow signals.
  mechanic: High default-spread rank gates long-only NQ continuation with large-10 aggregate orderflow
    confirmation.
  timeframe_rationale: Five-minute bars provide completed NQ movement and larger-print confirmation after
    the cash open without using current-day credit data.
  pre_pnl_density: FAILED pre-PnL NQ density audit; min full-history density 29.4713 signals/year
    and min latest-252 count 0. See research_artifacts/nq_default_spread_orderflow_risk_premium_density_audit_20260623.md.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant keeps the high default-spread risk-premium thesis but requires
      larger NQ prints to align with the long direction. It should only trigger when the slow credit-risk
      state, NQ price movement, and large-10 orderflow all point to upside continuation.

      '
    entry_logic_rationale: 'The signal uses the same conservative lagged credit state as the campaign,
      plus completed NQ bars at 10:00 through 12:30 ET. Large-10 flow is a stricter participation proxy
      than total signed volume.

      '
    stop_loss_rationale: The rescue tests wider percent stops because original top rows frequently sat
      at the widest tested stop, which suggests the declared signal may need more intraday noise tolerance
      without changing its economic trigger.
    target_exit_rationale: The fixed-R target logic and target grid are intentionally unchanged. All tested
      target_r_multiple values are at least 1.0R, so the corrected RR rule permits no TP widening; any
      rescue effect must come from entry-threshold and stop-distance robustness.
    profitability_rationale: If high default spreads imply excess risk compensation, larger-print buying
      confirmation should filter for sessions where that compensation is being expressed intraday.
    known_failure_modes: Large-10 Sierra aggregation is only a proxy, high-spread states can mark stress
      rather than risk premium, and the setup may be too sparse in some WFA windows.
    pre_test_decision: reject_pre_pnl_density
  rescue_reason: Original best rows needed larger-print buying confirmation and the widest tested stop,
    suggesting the edge should be expressed as cleaner institutional participation rather than broad signed-volume
    noise.
  rescue_constraints: Same default-spread/orderflow edge, entry module, setup mode, flow bucket, signal
    times, timeframe, data window, costs, stop module, target module, target grid, flatten rule, prop
    rules, and validation gates. Only existing credit threshold, orderflow threshold, and stop-distance
    fixed values/parameter grids are changed. TP is unchanged because all target_r_multiple values are
    already >= 1.0R.
  source_run_report: backtest-campaigns/es_default_spread_orderflow_risk_premium/high_spread_large10_long_1230/ES/rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_default_spread_orderflow_risk_premium
    source_config_path: campaigns/es_default_spread_orderflow_risk_premium/rescue_attempts/parameter_space_rescue_1/high_spread_large10_long_1230/config.yaml
    source_run_role: ES parameter-space rescue config, ported before any NQ PnL inspection
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
