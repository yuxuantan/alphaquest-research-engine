timeframe: 5m
research_metadata:
  academic_source: Fama and French (1989); Keim and Stambaugh (1986); FRED DAAA/DBAA; Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: Default-spread tightening may proxy credit relief; NQ longs require completed upside movement
    and positive signed orderflow confirmation.
  mechanic: Lower-tail default-spread-change rank gates long-only NQ continuation with signed-volume confirmation.
  timeframe_rationale: The 10:00-11:30 ET window keeps relief entries in the morning while requiring completed
    NQ confirmation.
  pre_pnl_density: FAILED pre-PnL NQ density audit; min full-history density 11.7885 signals/year
    and min latest-252 count 6. See research_artifacts/nq_default_spread_orderflow_risk_premium_density_audit_20260623.md.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses default-spread relief: the lagged one-day spread
      change rank must be in the lower tail, NQ must be up from its RTH open, and cumulative signed volume
      must confirm buying before the long entry.

      '
    entry_logic_rationale: 'The setup uses a completed NQ confirmation window at 10:00, 10:30, or 11:30
      ET. It avoids same-day credit data and tests whether credit-spread tightening maps to intraday NQ
      upside only when NQ itself agrees.

      '
    stop_loss_rationale: The rescue tests wider percent stops because original top rows frequently sat
      at the widest tested stop, which suggests the declared signal may need more intraday noise tolerance
      without changing its economic trigger.
    target_exit_rationale: The fixed-R target logic and target grid are intentionally unchanged. All tested
      target_r_multiple values are at least 1.0R, so the corrected RR rule permits no TP widening; any
      rescue effect must come from entry-threshold and stop-distance robustness.
    profitability_rationale: If spread tightening marks relief from credit pressure, NQ should be more
      likely to continue higher when signed orderflow confirms morning buying.
    known_failure_modes: Spread tightening can lag equity gains, the relief effect may be overnight rather
      than intraday, and upside continuation may be crowded.
    pre_test_decision: reject_pre_pnl_density
  rescue_reason: Original profitable rows were too sparse, so the rescue keeps the tightening-spread risk-on
    mechanic but broadens the rank threshold enough to preserve annual trade density while testing wider
    stops.
  rescue_constraints: Same default-spread/orderflow edge, entry module, setup mode, flow bucket, signal
    times, timeframe, data window, costs, stop module, target module, target grid, flatten rule, prop
    rules, and validation gates. Only existing credit threshold, orderflow threshold, and stop-distance
    fixed values/parameter grids are changed. TP is unchanged because all target_r_multiple values are
    already >= 1.0R.
  source_run_report: backtest-campaigns/es_default_spread_orderflow_risk_premium/tightening_spread_signed_long_1130/ES/rescue1/variant_test_summary.json
  nq_port_provenance:
    source_campaign_id: es_default_spread_orderflow_risk_premium
    source_config_path: campaigns/es_default_spread_orderflow_risk_premium/rescue_attempts/parameter_space_rescue_1/tightening_spread_signed_long_1130/config.yaml
    source_run_role: ES parameter-space rescue config, ported before any NQ PnL inspection
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
