campaign_id: nq_mes_flow_price_extension_reversion
title: NQ MES flow plus NQ price-extension reversion
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny
timeframe: 1m
edge_family: cross_index_mes_flow_price_extension_reversion
hypothesis: >
  Completed MES-vs-NQ flow pressure should be more likely to mean-revert when
  NQ has already extended in the same direction by the signal close. The edge
  fades a completed micro-flow/price extension rather than trading raw MES flow
  divergence alone.
rationale: >
  The prior NQ MES micro-flow divergence campaign failed monkey robustness
  before WFA. This is not a stop/target rescue of that campaign. It is a
  distinct predeclared expression that requires the same-session NQ price move
  to confirm an extension before fading the MES/NQ flow pressure. The
  additional completed-price condition is available at the signal close and was
  density-screened before any PnL for this campaign was inspected.
sources:
- title: One Security, Many Markets
  authors: Joel Hasbrouck
  year: 1995
  doi: 10.1111/j.1540-6261.1995.tb04054.x
  relevance: Motivates temporary price-discovery differences across linked index markets.
- title: Individual Investor Trading and Stock Returns
  authors: Ron Kaniel, Gideon Saar, and Sheridan Titman
  year: 2008
  doi: 10.1111/j.1540-6261.2008.01316.x
  relevance: Motivates liquidity-demand flow as a possible short-horizon reversal pressure.
- title: Do Retail Trades Move Markets?
  authors: Brad M. Barber, Terrance Odean, and Ning Zhu
  year: 2009
  doi: 10.1093/rfs/hhn035
  relevance: Supports testing whether small-trade-like flow pressure can be transitory after costs.
data_needs:
- data/cache/orderflow/nq_mes_flow_divergence_1m_20190506_20260612_full_rth_ny.csv
- completed NQ and MES RTH one-minute trade-orderflow bars with rolling imbalance and return features
lookahead_risks:
- Signals use only rolling completed same-session features at the configured signal close.
- Entry can occur only after the completed signal bar through next-bar execution.
- No final session high, low, VWAP, daily range, future return, or post-entry flow is used.
- MES is a cross-index micro-flow proxy for NQ, not native MNQ orderflow.
duplicate_edge_check:
  active_scope_only: true
  active_rejected_edges_checked:
  - nq_mes_micro_flow_divergence_reversion
  - nq_mes_crowding_native_orderflow_confirmation
  - nq_pivot_filtered_mes_participation_crowding_reversion
  - nq_pivot_mes_orderflow_confirmation
  conclusion: >
    Eligible as a distinct NQ test because every signal requires completed NQ
    price extension in addition to MES/NQ flow pressure. Prior campaigns traded
    flow divergence, participation crowding, or pivot-confirmed crowding without
    this explicit price-extension reversion gate.
