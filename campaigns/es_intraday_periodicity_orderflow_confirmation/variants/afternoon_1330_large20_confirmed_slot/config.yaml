research_metadata:
  academic_source: Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov
    (2014)
  edge_thesis: Prior same-clock ES slot return tendency may continue when completed
    aggregate ES orderflow immediately before the slot confirms the predicted direction.
  mechanic: 13:30 ET slot with prior same-clock return persistence confirmed by completed
    13:00-13:30 large20 imbalance.
  timeframe_rationale: 1-minute bars preserve the completed pre-entry source window
    and next-bar-open execution at the slot entry time.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the Heston-Korajczyk-Sadka same-clock
      persistence edge by using only prior occurrences of slot_1330_1400 to select
      direction, then requiring the completed 13:00:00-13:30:00 ES orderflow window
      to confirm that direction before any trade can occur.
    entry_logic_rationale: The signal is evaluated at the completed bar close for
      13:30:00 ET. The prior-slot feature is shifted by construction, and the orderflow
      window ends exactly at the signal timestamp, so execution can only occur at
      the next bar open.
    stop_loss_rationale: A fixed percent stop is used because the edge is a time-slot
      pressure effect rather than a discrete chart boundary. The stop is predeclared,
      tick-rounded by the engine, and does not reference future highs or lows.
    target_exit_rationale: A fixed-R target with forced flatten at 14:00:00 ET tests
      whether the same-clock plus orderflow pressure can monetize inside the intended
      slot without overnight exposure or discretionary close handling.
    profitability_rationale: If same-clock return persistence reflects recurring liquidity
      demand or institutional scheduling, current aligned orderflow before the slot
      should identify days when that historical tendency is active rather than stale.
      The entry grid was density-checked before PnL.
    known_failure_modes: The same-clock tendency can be noise in ES, orderflow can
      confirm exhaustion instead of continuation, and the short holding window may
      leave too little room after commissions, slippage, and pessimistic same-bar
      ordering.
    pre_test_decision: approve_for_testing
