campaign_id: nq_es_relative_value_orderflow_absorption_reversion
title: NQ/ES Relative-Value Reversion With NQ Orderflow Absorption
decision: FAIL
created_at: '2026-06-22'
instrument: NQ
market_timezone: America/New_York
edge_family: cross_index_relative_value_orderflow_absorption_reversion
hypothesis: NQ/ES return divergences are more likely to mean-revert on the NQ leg when completed NQ aggregate signed flow
  is counter to the NQ price move, indicating absorption rather than continuation pressure.
rationale: This ports the ES/NQ relative-value absorption family to the NQ execution leg using the dedicated NQ/ES lead-lag
  cache. NQ must be the dislocated leg versus ES, and NQ orderflow absorption must confirm before entry.
sources:
- title: 'Pairs Trading: Performance of a Relative-Value Arbitrage Rule'
  authors: Evan Gatev, William N. Goetzmann, and K. Geert Rouwenhorst
  year: 2006
  venue: Review of Financial Studies
  link: https://academic.oup.com/rfs/article-abstract/19/3/797/1585302
  relevance: Relative-value foundation for temporary divergence and convergence between related instruments.
- title: High Frequency Lead/Lag Relationships - Empirical Facts
  authors: Nicolas Huth and Frederic Abergel
  year: 2014
  venue: Empirical market microstructure working paper
  link: https://ideas.repec.org/p/hal/wpaper/hal-00645685.html
  relevance: Motivates high-frequency dependencies between related equity-index futures.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports imbalance as a short-horizon pressure proxy; this campaign uses completed aggregate signed trade flow,
    not quote-depth OFI.
- title: Lead-Lag Relationships in Market Microstructure
  authors: Julian Schmidt, Tino Cestonaro, and Micha Bender
  year: 2024
  venue: SSRN
  link: https://doi.org/10.2139/ssrn.5043260
  relevance: Reviews predictive cross-market relationships in microstructure data.
data_needs:
- data/cache/orderflow/nq_es_lead_lag_1m_20110103_20260609_full_rth_ny.parquet
- completed ES/NQ rolling return-spread columns
- completed NQ signed-imbalance columns over 15/30/60 minute windows
lookahead_risks:
- Rolling return and signed-imbalance features must use completed bars only.
- Signal inside the declared window enters no earlier than the next one-minute bar open.
- No future ES/NQ bars, final VWAP, final daily range, or future orderflow is used.
- All variants flatten intraday before their configured cutoff.
failure_modes:
- Divergence may be information-driven rather than temporary.
- Signed flow can be noisy or mark late capitulation.
- Trading only NQ may not monetize true pair convergence.
- The effect can concentrate in one side, volatility regime, or small number of dates.
duplicate_edge_check:
