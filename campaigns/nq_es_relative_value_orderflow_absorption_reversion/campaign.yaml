  - nq_morning_orderflow_momentum_continuation
  conclusion: Eligible as an NQ execution-leg mirror of the ES/NQ absorption family. It is not an opening-range, opening-gap,
    or standalone NQ momentum campaign; the trigger requires NQ/ES relative-value divergence plus NQ signed-flow absorption.
