timeframe: 1m
research_metadata:
  academic_source: Osler (2000); Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: The current RTH open can act as a visible auction-anchor level; reclaim or rejection through
    that level after a prior completed excursion may identify trapped inventory when confirmed by completed
    aggregate orderflow.
  mechanic: After ES has traded at least the configured distance above the current RTH open on a prior
    completed bar, sell a completed rejection back below the RTH open when same-bar aggregate signed flow
    is negative enough.
  timeframe_rationale: The morning window tests whether the first rejection of a rally back through the
    opening auction price creates enough inventory pressure before midday liquidity changes. The module
    uses one-minute completed bars so the prior excursion and the reclaim/rejection bar are sequenced
    without intrabar assumptions.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the session-open auction-anchor edge because it cannot
      trade until ES has already made a completed excursion away from the current RTH open and then closes
      back through that exact open with aligned aggregate orderflow. The open is known at the start of
      the RTH session and is not a future-derived level.
    entry_logic_rationale: The entry waits from 09:45:00 to 12:00:00 ET and requires the excursion to
      exist on a prior completed one-minute bar before the signal bar. That sequencing avoids same-bar
      path assumptions and makes the reclaim/rejection a visible failed excursion through the session-open
      anchor.
    stop_loss_rationale: The percent-from-entry stop is simple and independent of post-entry information.
      It rejects the setup if the open-anchor reclaim/rejection cannot withstand ordinary ES adverse movement
      after costs and one tick of configured slippage.
    target_exit_rationale: A fixed-R target keeps the reward rule predeclared across all parameter combinations.
      Same-day flattening prevents overnight exposure and tests whether the completed-bar orderflow confirmation
      creates enough short-horizon follow-through.
    profitability_rationale: 'The setup should be profitable only if reclaiming or rejecting the RTH open
      after a prior excursion reveals trapped short-horizon inventory and the large10 imbalance identifies
      participation in the reclaim/rejection. Pre-PnL density for the declared entry grid was 72.8 to
      150.1 benchmark-window signals/year and 111.2 to 162.3 full-history signals/year before any PnL
      was inspected. Rescue rationale before running rescue1: the original grid traded frequently but
      lost broadly, so the single allowed rescue tests stricter away-from-open extension and orderflow-confirmation
      thresholds plus wider stop/target geometry to reduce noisy open crosses while preserving the same
      edge.'
    known_failure_modes: The RTH open may be too noisy as a reference level, orderflow confirmation may
      lag the move, stronger trends may cut through the open without reversal, and profitability may concentrate
      in a few volatility regimes or event days.
    pre_test_decision: approve_for_testing
  rescue_attempt: 'parameter_space_rescue_1: changed only declared parameter space and fixed defaults
    inside the existing session_open_orderflow_reclaim entry, percent_from_entry stop, and fixed_r target
    modules. The session-open auction-anchor mechanic, direction, flow bucket, time window, timeframe,
    data, costs, fills, prop rules, and validation gates are unchanged.'
