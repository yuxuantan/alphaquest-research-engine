campaign_id: es_overnight_inventory_sweep_reversion
variant_id: morning_overnight_high_reject_short
test_run_id: rescue1
strategy_name: overnight_inventory_sweep_reversion
symbol: ES
dataset_id: es_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll
timeframe: 5m
research_metadata:
  academic_source: Osler (2003, 2005); Kavajecz and Odders-White (2004)
  edge_thesis: An upside sweep above the completed overnight high followed by a close back below that
    high may represent a failed buy-stop run and liquidity absorption.
  mechanic: From 09:30 through 11:30 ET, watch for a completed 5-minute bar that sweeps above the completed
    overnight high by the configured extension and then closes back below the overnight high. Enter short
    at the next bar open; flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars reduce open-noise false positives while preserving completed-bar
    signal timing, next-bar-open execution, and 1-minute detail handling for same-bar stop/target conflicts.
  rescue_attempt:
    id: parameter_space_rescue_1
    allowed_scope: parameter-space-only rescue for a failed variant
    mechanic_changed: false
    changed_fields:
    - entry.params.min_overnight_range_points grid/default
    - entry.params.reclaim_buffer_ticks grid/default
    - sl.params.stop_pct grid/default
    - tp.params.target_r_multiple grid/default
