campaign_id: es_cboe_vix_term_structure_intraday
title: ES Cboe VIX Term Structure Intraday
decision: FAIL
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe VIX term-structure slope states may identify ES intraday risk-off
  pressure or risk-on recovery because SPX option-implied volatility across maturities
  embeds changing hedging demand and variance risk premia.
rationale: This campaign tests VIX maturity-slope information from VIX9D, VIX, VIX3M,
  and VIX6M. It is distinct from active failed VVIX volatility-of-volatility, SKEW
  implied-tail asymmetry, implied correlation, variance-risk-premium, VIX expiration,
  realized-volatility, and order-flow campaigns.
sources:
- title: The Implied Volatility Term Structure of Stock Index Options
  authors: Scott Mixon
  year: 2007
  venue: Journal of Empirical Finance, 14(3), 333-354
  link: https://ideas.repec.org/a/eee/empfin/v14y2007i3p333-354.html
  relevance: Tests term-structure information in stock-index option implied volatility
    across maturities.
- title: Risk Premia and the VIX Term Structure
  authors: Travis L. Johnson
  year: 2017
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.travislakejohnson.com/pdfs/Johnson%20VIXTS%202017%20%28JFQA%29.pdf
  relevance: Shows that the VIX term-structure slope summarizes variance-risk-premium
    information and predicts returns of volatility-related assets.
- title: VIX Term Structure and VIX3M Historical Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe VIX term-structure and volatility-index pages
  link: https://www.cboe.com/tradable-products/vix/term-structure/
  relevance: Official free source and definition for VIX maturity-term-structure indices
    used in this campaign.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- official free Cboe VIX9D, VIX, VIX3M, and VIX6M daily historical CSVs
- derived session feature file using only Cboe observations strictly before the ES
  session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- VIX maturity indices are daily closing SPX option-implied values, not intraday option
  snapshots.
- Same-day Cboe closes are unavailable to intraday ES signals and must not be used.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using the Cboe close from the same ES session date would leak unavailable data and
  is forbidden.
- Signals use only a completed ES bar at the configured timestamp and lagged Cboe
  daily term-structure state.
- Rolling ranks are computed over the lagged session feature sequence only.
- No final session high/low, final VWAP, future returns, or post-entry VIX values
  are used.
failure_modes:
- VIX term-structure literature may target option or variance-asset returns rather
  than same-day ES futures direction.
- High backwardation may indicate ongoing sell pressure or a subsequent risk premium
  rebound; variants predeclare fixed directions only.
- Daily term-structure states may be too slow for intraday ES timing.
- Performance may concentrate in crisis windows or volatility shocks.
- The signal may overlap with broad volatility regimes and fail WFA stability.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_vvix_tail_risk_intraday
  - es_cboe_skew_tail_risk_intraday
  - es_cboe_implied_correlation_intraday
  - es_variance_risk_premium_intraday
  - es_vix_expiration_pressure
  - es_volatility_managed_intraday_premium
  - es_realized_vol_of_vol_state
  conclusion: Not a duplicate of active failed campaigns. This tests lagged VIX maturity-slope
    and front/back term-structure ratios, not volatility-of-volatility, option-implied
    skew, implied correlation, VIX-minus-realized variance, VIX settlement calendar
    pressure, or realized volatility state.
