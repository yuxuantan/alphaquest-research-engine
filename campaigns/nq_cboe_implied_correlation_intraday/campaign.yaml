campaign_id: nq_cboe_implied_correlation_intraday
title: NQ Cboe Implied Correlation Intraday
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe SPX implied-correlation states may identify NQ intraday risk-on or risk-off pressure
  because high expected component co-movement proxies marketwide no-place-to-hide stress, while low or
  falling correlation may proxy healthier dispersion and risk appetite.
rationale: This is a marketwide option-implied correlation state test ported to the NQ execution leg.
  It is not the NQ VXN/VIX dispersion, put/call sentiment, realized-volatility, or ES-lead-lag edge already
  rejected in this search.
sources:
- title: 'The Price of Correlation Risk: Evidence from Equity Options'
  authors: Joost Driessen, Pascal Maenhout, and Grigory Vilkov
  year: 2009
  venue: Journal of Finance
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.2009.01467.x
  relevance: Shows marketwide correlation risk is priced using equity index and component options.
- title: Option-Implied Correlations and the Price of Correlation Risk
  authors: Joost Driessen, Pascal Maenhout, and Grigory Vilkov
  year: 2013
  venue: SSRN working paper
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2166829
  relevance: Documents option-implied correlations and correlation risk premia as distinct from variance
    risk alone.
- title: EOD Implied Correlation Index
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe index page and daily historical CSV endpoints
  link: https://www.cboe.com/us/indices/implied/
  relevance: Official source and definition for COR1M/COR3M implied-correlation histories.
data_needs:
- NQ RTH 1-minute Sierra OHLCV/orderflow cache
- official free Cboe COR1M and COR3M daily histories
- NQ session feature file using only Cboe observations strictly before the NQ session date
lookahead_risks:
- Signals use only a completed NQ bar at the configured timestamp and a lagged prior Cboe daily state.
- Using same-session Cboe implied-correlation closes is forbidden because they are unavailable intraday.
- Rolling ranks are computed over the lagged session feature sequence only.
- No final NQ session high/low, final VWAP, future returns, or post-entry implied-correlation values are
  used.
failure_modes:
- Correlation risk premia may apply to option returns or longer horizons rather than same-day NQ futures.
- High implied correlation can mean risk-off pressure or a compensated equity risk premium, making directional
  signs unstable.
- Daily implied-correlation states may be too slow for intraday NQ timing.
- Any performance may concentrate in crisis windows or overlap with broad volatility regimes already rejected.
