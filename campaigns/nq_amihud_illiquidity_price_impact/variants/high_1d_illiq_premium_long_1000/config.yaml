research_metadata:
  academic_source: Amihud (2002); Acharya and Pedersen (2005); Amihud, Mendelson,
    and Pedersen (2005)
  edge_thesis: High lagged NQ price impact may require an intraday liquidity premium
    after the opening transfer of risk.
  mechanic: At 10:00 ET, long NQ when the prior completed RTH session's Amihud illiquidity
    rank is in the high tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar timing and next-bar-open
    NQ execution while using only prior-completed-session NQ illiquidity state.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_amihud_illiquidity_price_impact_density_audit_20260630.md
    density_basis: illiq_rank_threshold grid [0.30, 0.35, 0.45]
    selected_grid_min_signals: 850
    selected_grid_min_signals_per_year: 55.056304
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 10:00 ET, long NQ when the prior completed RTH session's
      Amihud illiquidity rank is in the high tail; flatten by 15:55 ET unless stop
      or target is hit.
    entry_logic_rationale: The signal reads only the Amihud price-impact state computed
      from completed prior NQ RTH sessions plus the completed 1-minute bar immediately
      before the configured entry time. Current-session high, low, close, volume,
      and post-entry returns are unavailable and unused.
    stop_loss_rationale: A percent-from-entry stop is used because the edge is a broad
      lagged liquidity-state effect, not a discrete intraday price level with a natural
      invalidation tick.
    target_exit_rationale: A fixed-R target plus 15:55 ET flatten tests a same-day
      NQ expression of the lagged liquidity state while forbidding overnight exposure
      and leaving prop-rule flatten enforcement explicit.
    profitability_rationale: The variant can only work if lagged NQ return-per-notional-volume
      price impact predicts enough same-day directional pressure to overcome commission,
      one tick of slippage, and pessimistic same-bar stop-target ordering.
    known_failure_modes: The ES source family failed, so this NQ transfer is weak-prior.
      It can fail if Amihud illiquidity mostly proxies volatility, if liquidity premium
      and stress effects cancel, or if any effect requires multi-day holding periods
      that this methodology forbids.
    pre_test_decision: approve_for_testing
strategy:
  entry:
    module: amihud_illiquidity_state
    params:
      setup_mode: high_1d_illiq_premium_long
      direction_mode: high_long
      feature_csv: data/external/nq_amihud_illiquidity_features_20110103_20260612.csv
      value_column: prior_amihud_illiq_1d
      rank_column: illiq1_rank_252
      illiq_rank_threshold: 0.35
      entry_time: '10:00:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.0025
      target_r_multiple: 1.5
  sl:
