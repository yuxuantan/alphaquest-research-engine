campaign_id: nq_midday_range_orderflow_breakout
title: NQ Midday Range Breakout With Aggregate Orderflow Confirmation
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
hypothesis: NQ may expand after a completed low-liquidity midday range when the first completed post-range breakout is confirmed by aligned aggregate trade-side orderflow.
rationale: This is an NQ transfer of the ES midday range orderflow breakout family. It is distinct from NQ range-compression breakout because the reference level is the current-session completed lunch/late-lunch range, not a prior-session narrow-range state. It is distinct from NQ opening-range/orderflow breakouts because no entry can use the opening range as the boundary.
sources:
- title: 'A Theory of Intraday Patterns: Volume and Price Variability'
  authors: Anat R. Admati and Paul Pfleiderer
  year: 1988
  venue: Review of Financial Studies
  doi: 10.1093/rfs/1.1.3
  link: https://academic.oup.com/rfs/article-abstract/1/1/3/1601212
  relevance: Supports predictable intraday liquidity/participation timing as a source of range and expansion behavior.
- title: A transaction data study of weekly and intradaily patterns in stock returns
  authors: Lawrence Harris
  year: 1986
  venue: Journal of Financial Economics
  link: https://ideas.repec.org/a/eee/jfinec/v16y1986i1p99-117.html
  relevance: Documents intraday return patterns using transaction data, motivating explicit lunch-session segmentation.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a price-pressure proxy; this campaign uses completed Sierra aggregate trade-side flow, not quote-level OFI.
data_needs:
- NQ Sierra RTH one-minute OHLCV and aggregate orderflow bars
- 5-minute strategy bars aggregated from completed one-minute bars
- same-day forced flatten and pessimistic same-bar conflict handling
lookahead_risks:
- Midday range high/low are unavailable until the configured lunch window is complete.
- Breakout and orderflow confirmation use only the completed confirmation bar.
- Signals generated at bar close must be filled no earlier than next bar open.
- No final session high/low, final VWAP, future range, or post-entry orderflow is used.
