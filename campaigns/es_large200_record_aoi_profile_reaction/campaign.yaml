data_needs:
- Merged local Sierra ES 1-minute footprint cache with strict large200 SCID-record
  proxy columns in America/New_York.
- Prior RTH high/low features shifted from completed prior RTH session only.
- Prior-session approximate POC, VAH, VAL, and LVNs built inside the entry module
  from completed prior RTH bars only.
- Opening-range high/low available only after the first 30 completed RTH one-minute bars.
data_quality_caveats:
- This campaign does not have vendor-equivalent ES print data. `large200_record_*`
  fields are a strict Sierra SCID record proxy filtered to records with volume >= 200,
  `num_trades == 1`, and exact side-volume coverage.
- Sierra SCID records are not guaranteed to equal individual exchange prints across
  the full archive. Any passing result is at most a candidate requiring manual review
  and independent print-source verification.
- Prior profile levels are approximated by distributing each completed 1-minute bar
  volume uniformly across its high-low tick range; this is not true volume-at-price.
- The local cache is RTH-only, so overnight high/low variants are not tested here.
lookahead_risks:
- Prior profile, VAH, VAL, POC, LVNs, prior RTH high, and prior RTH low are computed
  only after the previous RTH session is complete.
- Opening-range levels are unavailable until the first 30 RTH bars have closed.
- Signals use only the completed signal bar; entry is no earlier than the next
  1-minute open.
- No final current-session VWAP, final profile, final daily range, future high/low,
  future footprint, or future orderflow is used.
