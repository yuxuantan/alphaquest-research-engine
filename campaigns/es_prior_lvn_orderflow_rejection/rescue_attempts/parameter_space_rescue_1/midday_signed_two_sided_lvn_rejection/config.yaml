research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014); CME market-profile documentation
  edge_thesis: Prior-session low-volume nodes approximate prices where the prior RTH auction found little acceptance. If the current session sweeps through one of those prices but the completed signal bar closes back on the opposite side with aligned aggregate orderflow, the failed auction should have a higher chance of moving away from the LVN before costs.
  mechanic: Midday Signed Two-Sided LVN Rejection freezes approximate LVNs from the completed prior RTH session, then trades a two-sided failed-auction rejection from 12:00:00 to 14:00:00 ET. The signal bar must sweep at least two ticks beyond a prior LVN, close back through the LVN, and show signed_volume imbalance in the direction of the rejection. Because the signal uses the completed bar close, the engine enters at the next bar open; stops use the signal-bar sweep extreme plus a predeclared offset and targets are cost-adjusted fixed-R with no sub-1R values.
  timeframe_rationale: Five-minute bars reduce one-minute noise around an approximate profile level while preserving next-bar execution close to the rejection bar. The configured intraday window is part of the variant definition, not selected from results.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Midday Signed Two-Sided LVN Rejection freezes approximate LVNs from the completed prior RTH session, then trades a two-sided failed-auction rejection from 12:00:00 to 14:00:00 ET. The signal bar must sweep at least two ticks beyond a prior LVN, close back through the LVN, and show signed_volume imbalance in the direction of the rejection. Because the signal uses the completed bar close, the engine enters at the next bar open; stops use the signal-bar sweep extreme plus a predeclared offset and targets are cost-adjusted fixed-R with no sub-1R values.
    entry_logic_rationale: Entry is evaluated only after a completed 5-minute bar close from 12:00:00 through 14:00:00 ET. The prior-session LVN list is built before the current session from completed prior RTH bars only. A long requires a downside sweep below an LVN and close back above it with positive flow; a short requires an upside sweep above an LVN and close back below it with negative flow. This directly expresses failed auction rejection rather than a breakout chase.
    stop_loss_rationale: The sweep_extreme stop is placed beyond the signal bar's sweep high for shorts or sweep low for longs plus a fixed tick offset. That invalidates the thesis when price resumes through the swept LVN instead of accepting the rejection away from the low-volume node.
    target_exit_rationale: 'The target is a cost-adjusted fixed-R exit with target_r_multiple values of 1.0R, 1.5R, and 2.0R only. No sub-1R target is allowed, so fees and slippage cannot dominate a tiny gross target by construction; unresolved trades flatten at 15:55 ET. Rescue note: target values are deliberately unchanged under the 1.0R floor policy; this rescue does not widen TP.'
    profitability_rationale: 'This variant is convincing enough to test because The midday variant tests whether lower-liquidity lunch auctions still reject prior low-volume prices when signed aggregate flow aligns with the reclaim/reject bar. The strict pre-PnL density corner cleared at least 50 signals per year on both full history and the seeded limited-core window, so the result will not rely on rare-event cherry picking. Rescue note: the parameter space is refocused around the strongest original core-grid neighborhood before any rescue result is known.'
    known_failure_modes: The LVN is approximated from OHLCV rather than true volume-at-price, so some levels may be wrong. Trend days can continue through LVNs, aggregate orderflow can confirm too late, and the sweep-extreme stop can be vulnerable to noisy retests or one-tick-worse slippage.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    strict_corner: lvn_quantile=0.10 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_prior_lvn_orderflow_rejection_density_audit_20260620.md
  rescue_attempt:
    id: parameter_space_rescue_1
    created: '2026-06-20'
    source_variant: midday_signed_two_sided_lvn_rejection
    source_run_id: run1
    allowed_change_scope: parameter_space_and_fixed_parameters_only
    mechanic_changed: false
    tp_changed: false
    tp_policy: No target_r_multiple was changed because the original target grid already used only 1.0R or higher.
    rationale: All original combinations lost money, but the least-bad row used stricter LVNs, zero flow threshold, and a tight stop. Rescue only tests neighboring stricter LVN definitions and a small stop neighborhood; this is a final falsification attempt, not a mechanic change.
