timeframe: 5m
research_metadata:
  academic_source: Osler (2003); Kavajecz and Odders-White (2004); Osler (2005)
  edge_thesis: NQ prior RTH highs can attract clustered buy stops; a completed morning rejection may mark failed
    upside continuation and temporary liquidity exhaustion.
  mechanic: From 09:35 through 11:30 ET, enter short only after a completed 5-minute sweep above the prior RTH high
    closes back below the level.
  timeframe_rationale: 5-minute bars preserve completed-bar signal timing while avoiding one-minute false positives
    around prior RTH levels and still allowing next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: From 09:35 through 11:30 ET, enter short only after a completed 5-minute sweep above
      the prior RTH high closes back below the level. The trade can only occur after interaction with the prior
      completed RTH high or low, so it directly expresses the failed stop-run/reclaim thesis.
    entry_logic_rationale: Prior RTH high/low and fresh flags are built from completed previous RTH sessions. The
      sweep/reclaim signal is evaluated only on completed 5-minute bars, and the engine enters no earlier than the
      next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing and rounded to the NQ tick. It rejects
      the failed-sweep thesis when price moves far enough against the next-bar entry after costs and pessimistic
      OHLC sequencing.
    target_exit_rationale: The fixed-R target is declared before testing, never below 1.0R, and tests whether post-reclaim
      reversion is large enough to survive NQ commission and one-tick slippage. Unresolved trades flatten at 15:55
      ET.
    profitability_rationale: If prior RTH high/low stop-run reclaims are a real NQ liquidity effect, results should
      persist across neighboring reclaim-window, volume-ratio, stop, and target settings through monkey, WFA, Monte
      Carlo, incubation, and prop-rule simulation.
    known_failure_modes: Sweeps can be informed breakouts, 5-minute bars can hide adverse tick path, the effect
      may be side/window specific, and profits may concentrate in a small number of event or crisis sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    artifact: research_artifacts/nq_prior_day_stop_run_reclaim_density_audit_20260630.md
    detail_csv: research_artifacts/nq_prior_day_stop_run_reclaim_density_audit_20260630.csv
    status: failed_before_pnl
    completed_at: '2026-06-30T12:45:00+08:00'
