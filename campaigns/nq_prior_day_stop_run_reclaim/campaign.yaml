campaign_id: nq_prior_day_stop_run_reclaim
title: NQ Prior-Day Stop-Run Reclaim
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: prior_day_stop_run_reclaim
hypothesis: NQ may mean-revert after a completed 5-minute bar sweeps the prior RTH high or low and then closes back
  inside that level, because the sweep can trigger clustered stop orders while the reclaim/rejection indicates failed
  continuation and liquidity absorption.
rationale: This is an NQ execution-leg port of the ES prior-day stop-run reclaim edge. It differs from the existing
  NQ prior-session breakout campaigns because it rejects continuation and requires a close back inside the prior
  RTH level. It differs from the NQ overnight-inventory sweep campaign because the reference levels are previous
  RTH high/low, not pre-RTH ETH extremes.
sources:
- title: Currency Orders and Exchange Rate Dynamics
  authors: Carol L. Osler
  year: 2003
  venue: Journal of Finance
  link: https://www.newyorkfed.org/research/staff_reports/sr125.html
  relevance: Documents clustered stop-loss and take-profit orders around technical support/resistance levels and
    links order clustering to reversals or momentum once levels are crossed.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=315660
  relevance: Finds that support and resistance levels can coincide with limit-order-book depth, supporting prior
    high/low levels as public liquidity boundaries.
- title: Stop-Loss Orders and Price Cascades in Currency Markets
  authors: Carol L. Osler
  year: 2005
  venue: Journal of International Money and Finance
  link: https://ideas.repec.org/a/eee/jimfin/v24y2005i2p219-241.html
  relevance: Shows clustered stop-loss orders can produce rapid price moves around known levels, motivating a strict
    failed-sweep versus true-breakout distinction.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- timezone-aware NQ RTH 1-minute OHLCV/orderflow bars in America/New_York
- deterministic 5-minute aggregation from completed 1-minute bars
- previous RTH high and low available only after that RTH session is complete
- fresh-level flags so a prior high/low is only traded once per session side
- exchange session labels and no-overnight prop-rule flatten checks
lookahead_risks:
- Prior RTH high/low are from the fully completed previous RTH session only.
- Sweep and reclaim conditions use only the completed 5-minute signal bar.
- Entry is next-bar open or later because the entry signal uses bar close.
- No future high/low, final VWAP, final session return, future volume profile, or future session state is used.
- All variants flatten the same day before the configured prop cutoff.
failure_modes:
- A sweep through the prior RTH high/low may be informed breakout continuation, not failed liquidity taking.
- NQ may respond differently from ES around prior RTH levels, especially during high-volatility technology-sector
  sessions.
- Bar-level reclaims may overstate fills during fast stop-run moves even with pessimistic same-bar stop/target assumptions.
- Apparent profits may concentrate in a small number of crisis or event days.
- The edge may be side-specific or window-specific; narrow isolated parameter success must be rejected or flagged.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_prior_session_level_breakout_continuation
  - nq_prior_session_breakout_orderflow_confirmation
  - nq_overnight_inventory_sweep_reversion
  - nq_prior_session_ibs_reversion
  - nq_opening_gap_orderflow_continuation
  - nq_opening_gap_orderflow_absorption_fade
  - nq_intraday_capitulation_mean_reversion
  - nq_20_80_price_ending_barrier
  conclusion: Eligible as a distinct NQ test. Existing NQ prior-session campaigns tested breakout continuation or
    signed-flow-confirmed acceptance outside prior RTH levels; this campaign tests failed sweeps that close back
    inside the prior RTH high/low. Existing overnight-inventory sweep work uses ETH overnight extremes rather than
    previous RTH high/low. Chart Fanatics price-ending variants use modulo-100 levels, not prior session levels.
