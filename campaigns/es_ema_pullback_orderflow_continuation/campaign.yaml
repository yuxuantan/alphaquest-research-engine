campaign_id: es_ema_pullback_orderflow_continuation
title: ES EMA Pullback Continuation With Aggregate Orderflow
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: ema_pullback_orderflow_continuation
hypothesis: A same-session ES trend defined by completed intraday EMAs can resume
  after a controlled pullback to the prior fast EMA when the completed signal bar
  reclaims/rejects that EMA and completed aggregate orderflow confirms the trend direction.
sources:
- title: Simple Technical Trading Rules and the Stochastic Properties of Stock Returns
  authors: William Brock, Josef Lakonishok, and Blake LeBaron
  year: 1992
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1992.tb04681.x
  link: https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1540-6261.1992.tb04681.x
  relevance: Provides academic support for moving-average and trading-range technical
    rules as non-random price-structure signals, while not by itself proving ES intraday
    profitability.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse H. Pedersen
  year: 2012
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2011.11.003
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2089463
  relevance: Documents trend-following persistence across liquid futures, including
    equity index futures, motivating continuation after an intraday pullback rather
    than a pure fade.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Supports order-flow imbalance as a short-horizon pressure proxy. This
    campaign uses completed Sierra aggregate trade-side flow, not quote-depth LOB
    OFI.
- title: Profits from Technical Trading Rules
  authors: Mark J. Ready
  year: 2002
  venue: Financial Management
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=64168
  relevance: 'Execution caution: technical-rule profits can disappear when signal
    measurement and executable prices are separated. This campaign therefore uses
    next-bar execution with costs and slippage.'
rationale: This is a price-action plus aggregate-orderflow continuation edge. Price
  must first establish an intraday EMA trend using only prior completed closes, then
  pull back to the prior fast EMA and close back in the trend direction. Aggregate
  signed flow must agree with that continuation before the engine enters at the next
  5-minute open.
data_needs:
- local Sierra ES completed 1-minute RTH OHLCV and aggregate signed-volume cache
- 5-minute bars generated by the repo pipeline
- completed-bar signed and large-10 aggregate flow columns
- same-session flatten rules from config
data_quality_caveats:
- Sierra signed volume is completed-bar aggregate bid/ask-volume flow, not LOB OFI
  or print-level aggressor truth.
- The strategy uses completed 5-minute bars and next-bar execution; intra-bar stop/target
  ordering remains pessimistic with 1-minute detail when available.
- The EMA state resets by RTH session and is not a multi-day trend model.
lookahead_risks:
- EMA trend state uses only prior completed closes before the signal bar close is
  incorporated.
- The signal bar low/high, close, body direction, and orderflow confirmation are known
  only after the completed signal bar.
- Signals using bar close are filled no earlier than the next bar open by the engine.
- No final session high/low, final VWAP, future range, future orderflow, or post-entry
  bar is used.
failure_modes:
- EMA pullbacks can be a crowded visual pattern with poor forward edge after costs.
- A pullback through the fast EMA may be early trend failure rather than continuation.
- Aggregate signed flow may lag price and confirm after the move has exhausted.
- The effect may be regime-specific and fail the random limited-core window or WFA
  trade-density gate.
- The stop at the signal-bar extreme may be too tight in volatile regimes or too wide
  to support positive expectancy.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_trend_aligned_orderflow_continuation
  - es_vwap_orderflow_pullback_continuation
  - es_opening_drive_vwap_orderflow_pullback
  - es_prior_session_breakout_orderflow_confirmation
  - es_opening_range_trend_orderflow_breakout
  - es_morning_trend_lunch_reversal_orderflow
  conclusion: Eligible as a distinct active campaign because the level is a same-session
    prior fast EMA and the mechanic requires a completed pullback/reclaim against
    that dynamic level. It is not a VWAP pullback, opening-range breakout, prior-session
    level breakout, pure trend filter, or lunch reversal edge.
variant_count_required: 5
variants:
- late_morning_signed_two_sided_ema_pullback_1130
- lunch_signed_two_sided_ema_pullback_1300
- afternoon_large10_two_sided_ema_pullback_1430
- late_morning_signed_long_ema_pullback_1200
- late_morning_signed_short_ema_pullback_1200
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change core strategy mechanic
  - change entry module
  - change stop-loss module
  - change take-profit module
  - add or remove filters after seeing results
  - alter costs, fills, sessions, validation gates, or prop rules
