  conclusion: 'Eligible for the NQ goal as an ES-derived transfer because this campaign tests failed acceptance
    at frozen prior value-area boundaries: probe beyond VAH/VAL, close back inside value, and counterflow
    on the completed signal bar. It is not the acceptance-continuation, POC magnet, prior high/low breakout,
    stop-run, session-extreme, or VWAP-deviation edge. It is not launched as a new ChartFanatics profile
    campaign.'
