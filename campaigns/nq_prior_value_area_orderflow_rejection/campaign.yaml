timeframe: 5m
edge_family: prior_value_area_orderflow_rejection
hypothesis: Prior-session accepted-value boundaries in NQ, approximated from completed RTH OHLCV, can
  act as objective support/resistance. A completed probe outside prior VAH/VAL that closes back inside
  prior value with counter-direction aggregate orderflow may indicate failed acceptance and a return-to-value
  reversal after next-bar execution.
rationale: 'This is the NQ transfer of the ES prior value-area rejection edge before NQ PnL inspection.
  It is the failed-acceptance/rejection mirror of prior value-area acceptance continuation: price must
  probe beyond a frozen prior-session value boundary, close back inside value, and show counterflow on
  the completed signal bar.'
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports objective intraday support/resistance levels as public reference points.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=315660
  relevance: Links technical levels to liquidity provision around public reference prices.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  venue: Exchange market profile/liquidity analytics documentation
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supporting historical market-profile style analysis of volume and
    activity intervals.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates completed aggregate orderflow imbalance as a short-horizon pressure proxy.
data_needs:
- NQ Sierra completed 1-minute RTH OHLCV/orderflow cache in America/New_York
- 5-minute bars generated from the local 1-minute source
- prior-session approximate VAH, VAL, and POC computed only after the previous RTH session is complete
- signed, large-10, and large-20 aggregate flow columns for completed signal bars
lookahead_risks:
- Prior VAH, VAL, and POC are computed only from the previous completed RTH session and frozen before
  current-session entries.
- The probe, close-back-inside rejection, and orderflow confirmation use only the completed 5-minute signal
  bar.
- Signals generated from a completed bar close are filled no earlier than the next bar open by the engine.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry
  bars are used.
failure_modes:
- Prior value-area rejection may be too noisy when approximated from OHLCV bars rather than true volume-at-price.
- A close back inside value can precede a second breakout rather than a real reversal.
- Aggregate counterflow may identify late capitulation after the reversal already happened.
- The effect may concentrate in one side, a volatility regime, or a small number of trend days.
