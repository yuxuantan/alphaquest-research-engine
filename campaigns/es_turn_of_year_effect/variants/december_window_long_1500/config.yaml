campaign_id: es_turn_of_year_effect
variant_id: december_window_long_1500
test_run_id: run1
strategy_name: turn_of_year_effect
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Szakmary and Kiefer (2004); Lakonishok and Smidt (1988); Ariel (1990)
  edge_thesis: ES may earn abnormal positive intraday returns around the turn of the year, especially during the Santa-rally window of the last five regular December sessions and first two regular January sessions.
  mechanic: At 15:00 ET during the last five regular December sessions, enter long ES at next bar open and flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar signal timing and next-bar-open execution on sparse turn-of-year calendar sessions while avoiding overnight exposure.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  exchange_timezone: America/New_York
  feature_set: none
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  rth_end: '15:59:00'
  rth_start: 09:30:00
  source: parquet
  source_timeframe: 1m
  symbol: ES
  timezone: America/New_York
  warmup_days: 0
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: turn_of_year_effect
    params:
      setup_mode: december_window_long
      event_calendar_csv: data/external/nyse_turn_of_year_sessions_20110103_20260609.csv
      entry_time: '15:00:00'
      flatten_time: '15:55:00'
      bar_interval_minutes: 1
      max_trades_per_day: 1
      stop_pct: 0.0015
      target_r_multiple: 1.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0015
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
