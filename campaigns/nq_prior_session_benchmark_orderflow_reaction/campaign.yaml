  - nq_signed_orderflow_persistence
  conclusion: Eligible as a distinct NQ campaign. Existing NQ prior-level campaigns use prior highs/lows, IBS, value-area boundaries, round numbers, VWAP, opening ranges, or generic orderflow. This campaign uses previous RTH open/close as benchmark auction references and requires completed-bar counterflow rejection at those levels.
