campaign_id: nq_prior_session_benchmark_orderflow_reaction
title: NQ Prior-Session Benchmark Open/Close Orderflow Reaction
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: prior_session_benchmark_orderflow_reaction
source_es_campaign: es_prior_session_benchmark_orderflow_reaction
hypothesis: NQ may reject completed previous RTH open and close benchmark levels intraday when a completed bar probes through the level, closes back across it, and carries aggregate trade-side counterflow in the rejection direction.
rationale: This is an ES-to-NQ transfer selected before NQ PnL inspection. It is distinct from NQ prior-session high/low breakout/reclaim, prior-session IBS, prior value-area acceptance, VWAP deviation, round-number barriers, opening-range retests, and standalone signed-flow persistence because the frozen levels are the prior RTH open/close benchmarks and every signal requires a completed probe-and-reclaim/reject bar with counterflow.
research_sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  author: Carol L. Osler
  year: 2000
  link_or_doi: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  expected_mechanism: Visible support/resistance levels can predict intraday trend interruptions.
- title: Technical Analysis and Liquidity Provision
  author: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  link_or_doi: https://ideas.repec.org/a/oup/rfinst/v17y2004i4p1043-1071.html
  expected_mechanism: Technical levels can align with liquidity provision and depth.
- title: The Price Impact of Order Book Events
  author: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  link_or_doi: 10.1093/jjfinec/nbt003
  expected_mechanism: Order-flow imbalance is a short-horizon pressure proxy; this implementation uses completed Sierra aggregate trade-side flow.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- completed NQ 5-minute RTH OHLCV/orderflow bars from the repo pipeline
- previous RTH open and close shifted from completed sessions only
- completed signed_volume, large10, and large20 aggregate orderflow buckets
lookahead_risks:
- Previous RTH open/close are known only after the prior RTH session completes.
- Probe/reclaim/reject and orderflow use only the completed signal bar.
- Signals are filled no earlier than next bar open by the engine.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or future session return is used.
failure_modes:
- Prior open/close probes may be true acceptance through the benchmark rather than failed breakouts.
- Completed-bar counterflow may arrive too late after most of the rejection has occurred.
- Large-trade bucket evidence may be noisy on NQ.
- Performance may be side-specific, regime-specific, or too cost-sensitive after one-tick slippage.
