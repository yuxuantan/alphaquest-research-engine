campaign_id: nq_cboe_put_call_sentiment_intraday
title: NQ Cboe Put/Call Sentiment Intraday
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged public Cboe put/call volume imbalance can proxy option-market directional demand or sentiment pressure
  that may spill into same-day NQ RTH returns after the cash open.
rationale: This is a direct NQ port of the ES Cboe put/call sentiment campaign. NQ may be more sensitive to option-market
  sentiment because of technology/growth concentration, but the campaign remains fail-closed because Cboe ratios are broad
  daily summaries rather than intraday buyer-initiated option flow.
sources:
- title: The Information in Option Volume for Future Stock Prices
  authors: Jun Pan and Allen M. Poteshman
  year: 2006
  venue: Review of Financial Studies 19(3), 871-908
  link: https://doi.org/10.1093/rfs/hhj024
  relevance: Shows option volume put/call measures contain information about future equity returns.
- title: Cboe Equity Volume and Put/Call Ratios
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe CSV
  link: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/equitypc.csv
  relevance: Free public daily equity-option volume and put/call ratio source.
- title: Cboe Index Volume and Put/Call Ratios Archive
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe CSV
  link: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/indexpcarchive.csv
  relevance: Free public daily index-option volume and put/call ratio source.
- title: Cboe Total Volume and Put/Call Ratios
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe CSV
  link: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/totalpc.csv
  relevance: Free public daily total Cboe option volume and put/call ratio source.
data_needs:
- timezone-aware NQ RTH 1-minute OHLCV/orderflow bars in America/New_York
- free public Cboe equity/index/total put-call ratio CSVs
- derived session feature file using only Cboe observations strictly before the NQ session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- Cboe states the volume and put/call ratio data is provided for convenience and may use preliminary volume.
- Equity volume methodology changed in 2012 when exchange-traded products were excluded from equity option products.
- Cboe put/call ratios are completed daily summaries, not intraday option-flow observations.
- Sierra data is aggregated bar-level data, not tick-path data.
lookahead_risks:
- Using same-day Cboe put/call volume would leak unavailable end-of-day data; this campaign forbids it.
- Signals use only a completed NQ bar at the configured timestamp plus lagged Cboe daily ratios from strictly prior Cboe trade
  dates.
- Rolling ranks are computed over lagged session features only.
- No final session high/low, final VWAP, future returns, or post-entry option volume is used.
failure_modes:
- Single-name option-volume predictability may not transfer to aggregate NQ futures returns.
- Public put/call ratios may be too noisy versus buyer-initiated open-buy option volume used in the source paper.
- Aggregate put/call extremes may behave contrarian in some regimes and directional in others, failing parameter stability.
- Cboe methodology changes and preliminary-volume caveats may make results fragile or unsuitable for promotion.
- The edge may require overnight exposure, which this intraday campaign forbids.
