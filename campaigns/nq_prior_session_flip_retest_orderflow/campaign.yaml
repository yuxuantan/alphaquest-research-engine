  conclusion: Eligible for an NQ density screen as a bounded composite transfer because it requires a prior-session high/low breakout followed by a later retest-hold and retest-bar aggregate orderflow confirmation. Existing NQ campaigns tested price-only prior-level retests, immediate breakout plus orderflow, failed stop-run reclaim, price-flow dislocation, prior open/close benchmark reactions, opening-range retests, round-number barriers, or value-area acceptance/rejection rather than prior-session S/R flip retest with retest-bar flow.
