edge_family: prior_session_sr_flip_retest_orderflow
source_es_campaign: es_prior_session_flip_retest_orderflow
hypothesis: Prior RTH highs/lows in NQ may flip from resistance to support, or support to resistance, after a completed break and later retest; completed retest-bar aggregate orderflow may distinguish accepted continuation from a weak stop probe.
rationale: This is the NQ transfer of the ES prior-session S/R flip retest orderflow campaign before NQ PnL inspection. Every variant requires a prior RTH high/low breakout, a later completed retest that holds on the breakout side, and completed-bar signed or large-trade orderflow confirmation on that retest bar.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports intraday support/resistance levels as public reference points where trend interruptions and level reactions can be systematically tested.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=315660
  relevance: Links technical levels to liquidity supply; a broken prior-session high/low can become a public liquidity boundary on retest.
- title: Simple Technical Trading Rules and the Stochastic Properties of Stock Returns
  authors: William Brock, Josef Lakonishok, and Blake LeBaron
  year: 1992
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1992.tb04681.x
  link: https://onlinelibrary.wiley.com/doi/10.1111/j.1540-6261.1992.tb04681.x
  relevance: Motivates mechanical tests of break and support/resistance style technical trading rules rather than discretionary chart interpretation.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon pressure proxy; this campaign uses completed Sierra aggregate trade-side flow, not quote-depth OFI.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- 5-minute strategy bars aggregated from local 1-minute RTH Sierra bars
- previous RTH high/low features computed from completed sessions only
- completed-bar signed_volume, volume, large10_signed_volume, and large10_volume
lookahead_risks:
- Prior RTH high and low are known only after the prior RTH session is complete.
- The breakout is recognized only after a completed close beyond the prior RTH level.
- The retest hold and aggregate orderflow confirmation use only the completed retest bar.
- Signals generated from a completed bar are filled no earlier than the next bar open by the engine.
- The boundary stop is computed from the already-known prior level and next-bar entry price; no post-entry excursion is used.
- All variants flatten before the configured cutoff and disallow overnight exposure.
failure_modes:
- A retest may hold briefly and still fail after next-bar slippage and pessimistic same-bar stop/target ordering.
- Absorbed counter-flow may indicate hidden adverse pressure rather than true defense of the flipped level.
- Aligned aggregate flow may represent late exhaustion after the initial breakout.
- The edge may only work in narrow trend regimes or be dominated by a few large sessions.
- The boundary stop can be too tight for NQ noise around prior-session levels.
