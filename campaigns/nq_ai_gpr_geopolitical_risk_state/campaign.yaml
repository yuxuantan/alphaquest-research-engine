timeframe: 1m
edge_family: ai_gpr_geopolitical_risk_state
hypothesis: Strict-lag daily geopolitical-risk states may identify risk-off pressure or post-shock risk-premium rebound behavior in the growth-heavy Nasdaq-100 futures contract.
rationale: This campaign tests geopolitical-risk news intensity from the AI-GPR index, not economic policy uncertainty, EMV macro-news, OFR financial stress, VIX/VVIX volatility state, oil-price returns, credit stress, sector breadth, or NQ own-price momentum.
research_sources:
- title: Measuring Geopolitical Risk
  authors: Dario Caldara and Matteo Iacoviello
  year: 2022
  venue: American Economic Review
  link_or_doi: https://doi.org/10.1257/aer.20191823
  expected_mechanism: Documents a news-based geopolitical-risk index and finds that higher geopolitical risk is associated with adverse macro and market outcomes.
- title: The AI-GPR Index
  authors: Matteo Iacoviello and Jonathan Tong
  year: 2026
  venue: Federal Reserve Board working paper and public data page
  link_or_doi: https://www.matteoiacoviello.com/ai_gpr.html
  expected_mechanism: Provides daily AI-GPR, threats, and acts series constructed from newspaper article scoring, enabling a lagged daily geopolitical-risk state.
- title: Geopolitical Risk Index
  authors: Economic Policy Uncertainty project hosting Caldara-Iacoviello data
  year: 2026
  venue: policyuncertainty.com
  link_or_doi: https://www.policyuncertainty.com/gpr.html
  expected_mechanism: Documents the original GPR methodology and threat/act decomposition that motivates the variant split.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York.
- Public AI-GPR daily CSV cached under data/external/ai_gpr.
- Derived strict-lag feature CSV data/external/nq_ai_gpr_features_20110103_20260612.csv.
duplicate_edge_check:
  checked_edges:
  - nq_epu_policy_uncertainty_intraday
  - nq_emv_macro_news_intraday
  - nq_ofr_financial_stress_intraday
  - nq_cboe_vvix_tail_risk_intraday
  - nq_cboe_vix_level_state_intraday
  - nq_oil_price_shock_spillover
  - nq_default_spread_orderflow_risk_premium
  - nq_fama_french_style_factor_rotation
  caveat: research_artifacts/es_other_campaigns_continuation_audit_20260629.md grouped news/GPR into rejected duplicate or data-gated ES source families. This NQ campaign proceeds only because the AI-GPR page provides a concrete daily public CSV and the edge is geopolitical-risk intensity, not macro-news or policy uncertainty.
  conclusion: Eligible for an NQ source test as a distinct geopolitical-risk news state with strict lag and explicit publication-cadence caveat.
lookahead_risks:
- A session dated D can only use the latest AI-GPR daily observation on or before D minus 30 calendar days.
- Rolling ranks are computed in the AI-GPR table before the session-level as-of join.
- Signals use a completed NQ RTH bar and enter no earlier than the next bar open.
- No same-day GPR row, final NQ session high/low, final VWAP, future GPR value, or post-entry path is used.
- Historical AI-GPR real-time publication cadence is not proven by the data page; any pass requires manual review of real-time availability before promotion.
failure_modes:
- Geopolitical risk may be absorbed before the NQ RTH session or may matter only across multi-day horizons.
- AI-GPR is a historical news index; its historical real-time release cadence may be unsuitable for live-like intraday testing.
- Effects may overlap crisis regimes, volatility states, EPU, or oil shocks and fail monkey or WFA robustness.
