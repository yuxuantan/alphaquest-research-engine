research_metadata:
  academic_source: Liu, Liu, Wang, Zhou, and Zhu (2016); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: ES opening gaps may mean-revert when completed post-open large-20 aggregate orderflow shows absorption against the gap.
  mechanic: >
    If ES opens 1-3 points away from the prior RTH close, aggregate large-20
    signed flow from 11:30 through 12:00 ET must be against the gap direction.
    The strategy then fades the gap and flattens same day.
  timeframe_rationale: 5-minute bars preserve completed-bar timing for the 11:30-12:00 absorption window while leaving several hours before the flatten.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-17"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge by requiring the opening gap to remain the
      reference price-action dislocation while using later completed large-20
      aggregate flow to decide whether the market is absorbing the gap.
    entry_logic_rationale: >
      The 11:30-12:00 ET window tests a slower absorption path after the opening
      auction and first-hour repositioning have passed. It remains early enough
      to leave a realistic same-day exit window.
    stop_loss_rationale: >
      A percent stop keeps risk simple and rejects trades where the gap continues
      strongly after the absorption signal.
    target_exit_rationale: >
      A fixed-R target avoids discretionary exit fitting and lets the staged
      tests judge whether the slower fade can still realize enough reward.
    profitability_rationale: >
      The setup should be profitable only if midday large-trade pressure against
      the original gap marks unresolved overnight inventory being unwound.
      Pre-PnL density showed 60.59 to 105.57 raw signals per year across the
      entry grid.
    known_failure_modes: >
      Midday flow can be weak or liquidity-driven, the opening gap may no longer
      matter by noon, and stops may be hit before reversal becomes measurable.
    pre_test_decision: approve_for_testing
