campaign_id: es_rolling_stat_envelope_orderflow_reversion
title: ES Rolling Statistical Envelope Orderflow Reversion
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: rolling_stat_envelope_orderflow_reversion
hypothesis: Completed intraday closes outside a rolling price envelope may mean-revert
  when same-bar aggregate orderflow is pressing into the extreme, because temporary
  immediacy demand is being supplied rather than repriced as durable information.
rationale: This campaign tests rolling statistical price-extension reversion with
  aggregate orderflow pressure. It is not VWAP deviation, prior/session level reaction,
  rolling high/low sweep-reclaim, ORB, round-number, same-clock flow rank, or pure
  orderflow impulse reversal. The reference level is a rolling mean/std envelope computed
  only from prior completed closes.
sources:
- title: Trading Volume and Serial Correlation in Stock Returns
  authors: John Y. Campbell, Sanford J. Grossman, and Jiang Wang
  year: 1993
  venue: Quarterly Journal of Economics
  link: https://campbell.scholars.harvard.edu/publications/trading-volume-and-serial-correlation-stock-returns
  relevance: Models how liquidity trading and market-maker inventory risk can produce
    short-horizon reversal after volume pressure.
- title: Liquidity and Market Structure
  authors: Sanford J. Grossman and Merton H. Miller
  year: 1988
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.1988.tb04594.x
  link: https://doi.org/10.1111/j.1540-6261.1988.tb04594.x
  relevance: Provides the liquidity-supplier mechanism for temporary price pressure
    and inventory-risk compensation.
- title: Rethinking reversals
  authors: Timothy C. Johnson
  year: 2016
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2016.01.026
  link: https://ideas.repec.org/a/eee/jfinec/v120y2016i2p211-228.html
  relevance: Supports a disciplined test of short-horizon reversal rather than assuming
    intraday extension is continuation.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon pressure proxy. This
    campaign uses completed Sierra aggregate signed volume, not quote-level OFI.
data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- timezone-aware ES RTH OHLCV and aggregate signed-volume bars in America/New_York
- completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume,
  and large20_volume
lookahead_risks:
- Rolling mean/std envelope is computed from prior completed closes only and excludes
  the signal bar from the envelope statistics.
- Same-bar orderflow is used only after the signal bar has closed, so entry must occur
  no earlier than next-bar open.
- The signal-bar high/low stop uses an already-completed bar extreme, not future price
  action.
- No final session high/low, final VWAP, final volume profile, future orderflow, or
  future returns are used.
failure_modes:
- A close outside the rolling envelope may be informed continuation rather than temporary
  liquidity demand.
- Aggregate signed flow may not reliably separate liquidity demand from informed pressure.
- Stops just beyond the signal bar can be too tight during volatility expansion.
- The effect may be dominated by one side, one time of day, or high-volatility regimes.
- Short fixed-R reversion targets may not overcome ES costs and one-tick slippage.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_vwap_deviation_orderflow_reversion
  - es_rolling_range_orderflow_sweep_reversal
  - es_orderflow_absorption_exhaustion_reversal
  - es_orderflow_impulse_reversal
  - es_intraday_capitulation_orderflow_reversion
  - es_volume_shock_liquidity_reversal
  - es_session_extreme_delta_divergence
  - es_signed_orderflow_persistence
  conclusion: Eligible as a distinct bounded campaign. The trigger is a rolling mean/std
    close envelope built from prior completed bars, not VWAP distance, rolling high/low
    sweep-reclaim, same-clock flow rank, volume shock, session extreme, or standalone
    signed-flow continuation/reversal.
variants:
