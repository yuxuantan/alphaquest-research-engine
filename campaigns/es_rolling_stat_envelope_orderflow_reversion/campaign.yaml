rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change the core rolling-envelope statistical reversion plus same-side orderflow-pressure
    mechanic
  - add or remove filters after seeing results
  - alter costs, fills, sessions, data windows, or validation gates
  attempts:
  - id: parameter_space_rescue_1
    status: completed_failed
    scope: per_failed_variant
    variants:
    - morning_5m_signed_6bar_reversion_1130
    - late_morning_5m_large10_12bar_reversion_1230
    - midday_5m_signed_18bar_reversion_1400
    - afternoon_5m_large20_24bar_reversion_1500
    - all_day_1m_signed_30bar_reversion_1530
    density_audit: research_artifacts/es_rolling_stat_envelope_orderflow_reversion_rescue_attempt_1_density_audit_20260618.md
    density_summary_csv: research_artifacts/es_rolling_stat_envelope_orderflow_reversion_rescue_attempt_1_density_summary_20260618.csv
    rationale: Original runs were dense but all 81 combinations were unprofitable
      for every variant. This one allowed rescue preserves the same entry, stop,
      target, data, sessions, fills, costs, and rolling-envelope reversion mechanic,
      while testing more statistically extreme completed closes, stronger same-side
      orderflow pressure, larger fixed signal-bar range, and wider stop/target spaces.
      A first rescue density draft was rejected before rescue PnL because several
      strict corners fell below 50 signals/year; the retained rescue grid passed
      density in both full and limited-core windows before staged testing.
