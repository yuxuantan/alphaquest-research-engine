research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Grossman and Miller (1988); Johnson (2016); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Completed intraday closes outside a rolling price envelope may mean-revert when same-bar aggregate orderflow is pressing into the extreme, because temporary immediacy demand is being supplied rather than repriced as durable information.
  mechanic: All-day 1-minute two-sided reversion after a completed close outside a 30-bar rolling close envelope with signed aggregate flow pressing into the extreme.
  timeframe_rationale: A 30-minute 1-minute envelope tests the same rolling statistical-extreme mechanism at higher resolution while the one-trade-per-day rule prevents hyperactive churn.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: All-day 1-minute two-sided reversion after a completed close outside a 30-bar rolling close envelope with signed aggregate flow pressing into the extreme. The rolling envelope is computed from prior completed closes, so the signal is a statistical extension rather than a fixed level or post-hoc chart annotation. Same-side aggregate flow into the extension is required to express temporary liquidity demand being supplied at the extreme.
    entry_logic_rationale: The module records completed RTH closes, computes the rolling mean/std envelope before the signal bar is added, and only signals after the completed close is outside the band with same-side aggregate orderflow. Because the signal uses bar close and completed flow, the engine must enter at next-bar open or later.
    stop_loss_rationale: The sweep-extreme stop sits just beyond the completed signal-bar high/low. If price extends beyond the bar that represented the statistical extreme, the immediate reversion thesis is invalidated.
    target_exit_rationale: 'User-authorized minimum-RR rescue: entry and stop mechanics are unchanged, while any existing target_r_multiple below 1.0R is raised to 1.0R. Targets already at or above 1.0R are not changed.'
    profitability_rationale: The setup should only be profitable if some intraday envelope breaks are liquidity-demand overshoots rather than informed repricing. Requiring completed same-side orderflow pressure into the extreme makes the trade a liquidity-supply/reversion test, while the rolling envelope keeps it dense enough to clear the 50 trades/year screen before PnL testing.
    known_failure_modes: Envelope breaks can be informed continuation; aggregate signed flow can be adverse selection; signal-bar-extreme stops can be too tight in volatility expansion; short fixed-R targets may not overcome ES costs; results can concentrate by side or time of day.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_rolling_stat_envelope_orderflow_reversion
    source_variant_id: all_day_1m_signed_30bar_reversion_1530
    source_run_id: run1
    source_config_path: campaigns/es_rolling_stat_envelope_orderflow_reversion/variants/all_day_1m_signed_30bar_reversion_1530/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.25
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.0
      top_target_is_grid_max: false
      higher_target_net_slope: -15.277777777777374
      higher_target_pf_slope: 0.09815475275934443
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 2.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.25
      new: &id002
