timeframe: 1m
edge_family: lagged_import_export_price_pressure_orderflow_confirmation
hypothesis: Lagged import/export price-index pressure may alter NQ intraday continuation probabilities only when
  completed RTH price action and aggregate NQ orderflow confirm the macro direction before next-bar entry.
rationale: This is a pre-PnL NQ port of the ES import/export price-pressure campaign. Import prices proxy inflation
  pressure, input-cost pressure, purchasing-power effects, and policy-rate expectations; NQ may be especially sensitive
  through duration/growth-equity channels, but the signal still requires same-session NQ price and orderflow confirmation.
sources:
- title: Economic Forces and the Stock Market
  authors: Nai-Fu Chen, Richard Roll, and Stephen A. Ross
  year: 1986
  venue: Journal of Business
  doi: 10.1086/296344
  link: https://doi.org/10.1086/296344
  relevance: Supports the premise that macroeconomic state variables, including inflation-related forces, can be
    priced in equity returns.
- title: Asset Returns and Inflation
  authors: Eugene F. Fama and G. William Schwert
  year: 1977
  venue: Journal of Financial Economics
  doi: 10.1016/0304-405X(77)90014-9
  link: https://doi.org/10.1016/0304-405X(77)90014-9
  relevance: Documents the relationship between inflation and asset returns, motivating import-price inflation as
    an equity-index risk-state proxy.
- title: What Drives U.S. Import Price Inflation?
  authors: Mary Amiti, Oleg Itskhoki, and David E. Weinstein
  year: 2024
  venue: NBER Working Paper 32133
  link: https://www.nber.org/papers/w32133
  relevance: Supports treating import prices as a meaningful inflation-pressure channel rather than a random monthly
    series.
- title: Import and Export Price Indexes
  authors: U.S. Bureau of Labor Statistics
  year: 2026
  venue: Official BLS data program
  link: https://www.bls.gov/mxp/
  relevance: Official source family for the import/export price indexes mirrored by FRED and used in the feature
    file.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://doi.org/10.1093/jjfinec/nbt003
  relevance: Supports requiring contemporaneous orderflow confirmation rather than trading the macro state alone.
data_needs:
- timezone-aware NQ RTH 1-minute Sierra OHLCV/orderflow cache in America/New_York
- free public FRED/BLS monthly import/export price-index feature file built with conservative availability lag
- completed-bar NQ price movement and cumulative aggregate signed-flow fields before next-bar entry
- same-day stop, target, forced-flatten, and no-overnight enforcement
feature_construction:
  builder: tools/build_es_import_export_price_pressure_features.py
  source_cache_import_all: data/external/fred_import_price_all_ir_1982_2026.csv
  source_cache_import_exfuel: data/external/fred_import_price_exfuel_irexfuels_2001_2026.csv
  source_cache_export_all: data/external/fred_export_price_all_iq_1983_2026.csv
  output: data/external/nq_import_export_price_pressure_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  availability_rule: monthly observation date plus 51 calendar days
  paid_data_downloaded: false
data_quality_caveats:
- FRED/BLS observations are monthly, not intraday.
- The feature builder uses observation date plus a conservative 51-calendar-day availability lag, which may be slower
  than actual BLS publication but prevents release-date lookahead.
- Sierra signed-volume fields are aggregate bar-level proxies, not print-level aggressor truth.
- The edge is a slow macro-regime plus intraday confirmation composite; any pass needs manual chart review to ensure
  the macro filter is not incidental.
lookahead_risks:
- A session may only use the latest monthly observation whose conservative availability date is on or before the
  NQ session date.
- Rolling ranks use only monthly data through the mapped available observation.
- Signals use completed NQ bars only; entries must occur at the next bar open or later.
- No final session high/low, final VWAP, final daily return, future price-index revision, or future NQ orderflow
  is used.
failure_modes:
- Monthly import/export price states may be too slow or already incorporated before the RTH session.
- NQ reaction to inflation pressure may flip across growth, policy, and crisis regimes.
- Orderflow confirmation may simply identify generic intraday continuation already tested elsewhere.
- Results may concentrate in high-inflation years such as 2021-2022 or in a small number of trend days.
- Low-frequency macro states may not provide enough independent yearly trades after strict OOS gates.
