campaign_id: nq_retail_inventory_demand
title: NQ Retail Inventory Demand State
status: completed_failed
decision: FAIL
created_at: '2026-07-01'
completed_at: '2026-07-01T05:29:46+08:00'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Conservatively lagged retail-sales and inventory/sales states may proxy
  consumer demand, inventory imbalance, and goods-market friction that affect same-day
  NQ intraday drift after the cash open.
rationale: This campaign tests a consumer-demand and inventory-imbalance state edge
  using FRED RSAFS, RSXFS, ISRATIO, and BUSINV observations at least 45 calendar days
  old. It is distinct from consumer sentiment, industrial production, import/export
  price pressure, CFNAI, EPU, EMV, and orderflow campaigns because it uses realized
  retail sales and inventory/sales balance, not survey sentiment, production output,
  trade prices, composite activity, uncertainty, or intraday flow.
research_sources:
- title: Consumption, Aggregate Wealth, and Expected Stock Returns
  author: Martin Lettau and Sydney Ludvigson
  year: 2001
  link_or_doi: https://doi.org/10.1111/0022-1082.00347
  expected_mechanism: Consumption-linked state variables can forecast equity returns,
    supporting consumer-demand state tests.
- title: What Inventory Behavior Tells Us About Business Cycles
  author: Mark Bils and James A. Kahn
  year: 2000
  link_or_doi: https://www.newyorkfed.org/research/staff_reports/research_papers/9817
  expected_mechanism: Inventory-sales ratios are business-cycle state variables tied
    to demand, markups, and expected changes in marginal cost.
- title: Retail Sales, Ex Auto Retail Sales, Inventories/Sales Ratio, and Business
    Inventories
  author: U.S. Census Bureau via FRED, Federal Reserve Bank of St. Louis
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/RSXFS
  expected_mechanism: Public monthly retail demand and inventory/sales series used
    for strictly lagged NQ session features.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fred_retail_inventory_demand/fred_rsafs_monthly.csv
- data/external/fred_retail_inventory_demand/fred_rsxfs_monthly.csv
- data/external/fred_retail_inventory_demand/fred_isratio_monthly.csv
- data/external/fred_retail_inventory_demand/fred_businv_monthly.csv
- data/external/nq_retail_inventory_demand_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_nq_retail_inventory_demand_features.py
  output: data/external/nq_retail_inventory_demand_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  availability_lag_days: 45
  lookahead_control: Each NQ session uses only the latest monthly RSAFS/RSXFS/ISRATIO/BUSINV
    observation on or before session_date minus 45 calendar days.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-07-01'
  existing_nq_campaign_id: none
  not_duplicate_of:
  - nq_consumer_sentiment_state_intraday
  - nq_industrial_production_state
  - nq_import_export_price_pressure
  - nq_chicagofed_cfnai_activity_pullback
  - nq_epu_policy_uncertainty_intraday
  - nq_emv_macro_news_intraday
  conclusion: Eligible as a bounded retail-demand and inventory/sales imbalance edge;
    it does not reuse survey sentiment, industrial output, import/export prices, composite
    activity, policy uncertainty, macro-news uncertainty, or intraday orderflow mechanics.
