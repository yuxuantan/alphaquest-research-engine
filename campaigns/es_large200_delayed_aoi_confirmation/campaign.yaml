  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports trader-visible support and resistance levels affecting intraday behavior.
- title: Do Investors Place Orders to Exploit Technical Analysis?
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2004.00665.x
  link: https://doi.org/10.1111/j.1540-6261.2004.00665.x
  relevance: Links technical reference levels with order placement and liquidity provision.
- title: CME Market Profile educational material
  authors: CME Group
  year: n.d.
  venue: Exchange practitioner research
  link: https://www.cmegroup.com/education.html
  relevance: Motivates POC, value-area, and auction-market context.
data_needs:
- Derived local cache joining ES true VAP/overnight/footprint fields with strict large200 SCID record proxy fields by timestamp.
- Prior RTH high/low computed by feature set from completed sessions only.
- Opening range high/low available only after the opening range has closed.
- Completed one-minute confirmation bar after the large200 event bar.
data_quality_caveats:
- large200_record fields are strict Sierra SCID record proxies, not exchange print sequencing or quote-depth data.
- The strategy waits for a completed confirmation bar, so it intentionally sacrifices immediacy for lower lookahead and less
  intrabar ambiguity.
- Any passing result would remain a candidate requiring manual chart and independent data-source review.
lookahead_risks:
- Prior VAP and prior RTH levels are shifted from completed sessions before current-session use.
- Opening-range levels are unavailable until all opening-range bars have closed.
- Large200 event and confirmation conditions use completed bars only; entry is no earlier than the next one-minute open after
  the confirmation bar.
- No current-session final VWAP, final profile, future daily range, or future orderflow is used.
