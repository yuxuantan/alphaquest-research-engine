campaign_id: es_large200_delayed_aoi_confirmation
title: ES Large200 Delayed AOI Confirmation
decision: FAIL
created_at: '2026-06-22'
instrument: ES
timeframe: 1m
edge_family: large_record_delayed_confirmation_at_market_generated_and_true_vap_aois
hypothesis: 'Large 200+ Sierra SCID record proxies at prior RTH, overnight, opening-range, or true VAP value boundaries may
  be more informative after a one-bar confirmation delay: failed initiative pressure should reclaim/reject the AOI on the
  next completed bar, while accepted initiative pressure should continue beyond it.'
variant_expansion_rationale: 'Eight variants are justified before PnL because the prior immediate large200 campaign failed
  and this delayed-confirmation edge has materially different mechanics worth testing in one controlled campaign: all-AOI
  traps, market-AOI traps, opening-only traps, overnight-only traps, true-value traps, all-AOI continuations, market-AOI continuations,
  and true-value continuations. These variants share the same two-entry-parameter grid and differ only by fixed AOI/reaction
  mechanics.'
