timeframe: 5m
research_metadata:
  academic_source: "Holmberg, L\xF6nnbark, and Lundstr\xF6m (2012); Osler (2000); Cont, Kukanov, and Stoikov (2014)"
  edge_thesis: Compressed overnight ranges can leave unresolved inventory around known overnight boundaries; a completed RTH close through the boundary with aligned aggregate flow should be more likely to continue than a boundary touch without pressure confirmation.
  mechanic: Afternoon two-sided breakout through the completed overnight high or low after overnight compression, confirmed by large20 aggregate flow.
  timeframe_rationale: A 5-minute afternoon window tests whether major-trade participation near old overnight boundaries can still trigger same-day expansion without overnight holding.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The variant preserves the same compressed overnight range state and boundary breakout mechanic but requires large20 flow in the breakout direction. It is a selective participation filter, not a new edge.
    entry_logic_rationale: The overnight levels and range rank are pre-known; the afternoon breakout close and large20 flow are completed-bar observations; the engine enters on the next bar open and must flatten before the configured cutoff.
    stop_loss_rationale: The completed signal bar is the local evidence of breakout pressure, so the opposite extreme plus offset is the objective failure point.
    target_exit_rationale: Fixed-R exits and forced flatten keep the trade auditable and avoid using future session settlement or final range.
    profitability_rationale: If larger traders initiate late-day continuation away from a compressed overnight range, the move may persist enough to produce positive expectancy despite fewer but cleaner signals.
    known_failure_modes: Large20 flow can be sparse; late-day reversals can be violent; compressed overnight levels may be stale by afternoon; the signal may miss the required 50 trades/year density.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    trigger: original run failed limited_core_grid_test before monkey, WFA, Monte Carlo, or validation
    allowed_scope: parameter_space_and_fixed_parameters_only
    pnl_seen_before_rescue: true
    mechanics_changed: false
    entry_module_unchanged: true
    stop_module_unchanged: true
    target_module_unchanged: true
    changes:
    - max_overnight_range_rank grid changed to [0.5, 0.6, 0.7]
    - min_orderflow_imbalance grid changed to [0.0, 0.05, 0.15]
    - stop_offset_ticks grid changed to [1, 2, 3]
    - target_r_multiple grid changed to [0.5, 0.75, 1.0]
    rationale: Original grids had adequate signal density but no profitable combinations. The one allowed rescue keeps the completed overnight compression breakout with aggregate orderflow confirmation intact and tests whether the edge, if present, is shorter-horizon follow-through that needs quicker fixed-R exits and a less extreme lower-to-middle overnight range state.
