timeframe: 5m
research_metadata:
  academic_source: Holmberg, Lönnbark, and Lundström (2012); Osler (2000);
    Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Compressed overnight ranges can leave unresolved inventory around
    known overnight boundaries; a completed RTH close through the boundary with
    aligned aggregate flow should be more likely to continue than a boundary touch
    without pressure confirmation.
  mechanic: Morning two-sided breakout outside the completed overnight high/low
    after overnight compression, confirmed by large10 aggregate flow.
  timeframe_rationale: A 5-minute bar reduces one-minute boundary noise while the
    09:45 to 11:00 window gives the market a short opening digest period without
    turning the setup into a midday strategy.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The variant waits for the overnight range state to be
      known before RTH, then trades either direction after a completed 5-minute close
      outside the overnight boundary with same-direction large10 flow. This keeps
      the same compression expansion mechanic while asking whether larger trades
      confirm the move.
    entry_logic_rationale: The overnight low and range rank are known before the
      decision window. The signal requires a completed close outside the boundary
      and completed aggregate large10 pressure; execution is deferred to the next
      bar open.
    stop_loss_rationale: The signal-bar high plus offset is the invalidation point,
      because a reversal through the breakout bar rejects the continuation premise.
    target_exit_rationale: Fixed-R exits keep the target observable from entry and
      stop only, avoiding future session levels. Forced flatten prevents overnight
      exposure.
    profitability_rationale: If larger trades participate in morning expansion out
      of a lower-range overnight state, follow-through should offset one-tick slippage
      and commissions often enough across neighboring thresholds.
    known_failure_modes: Large-trade pressure can arrive late; boundary breaks can
      still fail; two-sided logic can hide asymmetric weakness; stops can be clipped
      before continuation.
    pre_test_decision: approve_for_testing
