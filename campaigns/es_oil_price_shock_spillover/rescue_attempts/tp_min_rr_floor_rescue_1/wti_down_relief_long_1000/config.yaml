research_metadata:
  academic_source: Jones and Kaul (1996); Kilian and Park (2009); EIA WTI/Brent spot prices
  edge_thesis: Lagged crude-oil price shocks may spill into same-day ES intraday risk appetite.
  mechanic: Rescue attempt 1 tests stricter downside WTI shock thresholds with wider stop space and lower R exits; the original long oil-relief mechanic is unchanged. At 10:00 ET, long ES when lagged WTI has a downside shock rank, testing whether oil-price relief improves equity-index risk appetite.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the EIA oil state is already lagged by two business days.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized minimum-RR rescue preserves the existing es_oil_price_shock_spillover/wti_down_relief_long_1000 entry mechanic: Rescue attempt 1 tests stricter downside WTI shock thresholds with wider stop space and lower R exits; the original long oil-relief mechanic is unchanged. At 10:00 ET, long ES when lagged WTI has a downside shock rank, testing whether oil-price relief improves equity-index risk appetite..'
    entry_logic_rationale: Entry logic is unchanged from the selected tested source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Stop-loss logic and parameter space are unchanged. This rescue is isolated to a take-profit RR floor so the failure/success attribution remains auditable.
    target_exit_rationale: Only target_r_multiple values below 1.0R are raised to 1.0R. Sub-1R variants can have their gross edge consumed by slippage, commissions, and exchange fees; this tests whether the same signal needs at least 1R payoff distance to survive costs.
    profitability_rationale: If the original edge produces directional follow-through beyond a sub-1R target, a 1R floor should improve average win size without changing signal causality.
    known_failure_modes: A 1R floor may reduce win rate, increase holding time, miss too many exits, or simply expose that the signal has no sustained follow-through; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: tp_min_rr_floor_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_oil_price_shock_spillover
    source_variant_id: wti_down_relief_long_1000
    source_run_id: rescue1
    source_config_path: campaigns/es_oil_price_shock_spillover/rescue_attempts/parameter_space_rescue_1/wti_down_relief_long_1000/config.yaml
    selection_rule: one existing tested run per campaign, preferring variants whose limited-core target grid used sub-1R target values and showed stronger performance at larger targets; candidates without any sub-1R target_r_multiple are skipped
    allowed_change_scope: target_r_multiple_floor_only
    minimum_target_r_multiple: 1.0
    target_selection_metrics:
      target_key: tp.params.target_r_multiple
      target_grid_values:
      - 0.75
      - 1.0
      - 1.25
      target_grid_values_below_1r:
      - 0.75
      target_grid_has_below_1r: true
      top_target_value: 1.0
      top_target_is_grid_max: false
      higher_target_net_slope: -1364.2361111111109
      higher_target_pf_slope: -0.019456648716664304
      higher_target_profitable_rate_slope: 0.0
      higher_target_evidence_score: 1.0
      target_grid_note: target_grid_evaluated
    normal_rescue_policy_override: true
    target_changes:
    - path: core_grid.parameters.tp.params.target_r_multiple
      old:
      - 0.75
      - 1.0
      - 1.25
      new: &id002
      - 1.0
      - 1.25
