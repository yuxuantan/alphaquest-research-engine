timeframe: 5m
research_metadata:
  academic_source: Lehmann (1990); Nagel (2012); Dai, Medhat, Novy-Marx, and Rizova (2023)
  edge_thesis: Recent one-session NQ losses can include liquidity-pressure compensation that partially reverses
    intraday.
  mechanic: At 10:00 ET, long NQ after a completed one-session RTH loss exceeds the configured threshold; flatten
    by 15:55 ET unless stop or target is hit.
  timeframe_rationale: Five-minute bars provide completed-bar signaling, next-bar-open execution, and enough intraday
    holding time while avoiding overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  pre_pnl_density:
    artifact: research_artifacts/nq_daily_short_term_reversal_density_audit_20260622.md
    screen: research_artifacts/nq_daily_short_term_reversal_density_audit_20260622.csv
    nq_grid_fixed_before_pnl: true
    note: Density audit shows 455-740 qualifying completed one-day loss signals across 2011-2026 before PnL.
  source_es_campaign: es_daily_short_term_reversal
  nq_port_note: Uses the audited daily short-term reversal mechanics from ES, but NQ thresholds were chosen only
    from pre-PnL signal density on completed NQ RTH closes.
  mechanics_review:
    mechanic_expresses_edge: At 10:00 ET, long NQ after a completed one-session RTH loss exceeds the configured
      threshold; flatten by 15:55 ET unless stop or target is hit.
    entry_logic_rationale: The signal uses only completed prior RTH closes recorded before the signal session; the
      current session close, high/low, VWAP, or future return is not used.
    stop_loss_rationale: The percent stop is predeclared, rounded to NQ tick size, and rejects the reversal thesis
      when price pressure continues after entry.
    target_exit_rationale: The fixed-R target monetizes intraday mean reversion without using future session range,
      VWAP, or discretionary exits.
    profitability_rationale: NQ has larger short-horizon index moves than ES and may exhibit sharper liquidity-demand
      reversal, but the effect must survive the full staged workflow after costs.
    known_failure_modes: Short-horizon returns may trend rather than reverse; results may be side-dependent, regime-dependent,
      or fail monkey/WFA robustness.
    pre_test_decision: approve_for_testing
