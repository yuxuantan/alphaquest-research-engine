timeframe: 5m
research_metadata:
  academic_source: Donaldson and Kim (1993); Osler (2003, 2005); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: NQ may react around fixed psychological price handles when completed aggregate orderflow distinguishes absorbed
    failed probes from participated breakouts.
  mechanic: Two-sided midday reclaim/reject at fixed 25-point NQ handles requiring opposite-side large10 bucket absorption
    on the completed signal bar.
  timeframe_rationale: Five-minute bars reduce one-minute noise around NQ handles while preserving completed-bar, next-open
    execution and enough density for staged validation.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  source_es_campaign: es_round_number_orderflow_barrier
  source_nq_related_campaign: nq_round_number_barrier_reaction
  pre_pnl_density:
    artifact: research_artifacts/nq_round_number_orderflow_barrier_density_audit_20260630.md
    detail_csv: research_artifacts/nq_round_number_orderflow_barrier_density_audit_20260630.csv
    summary_csv: research_artifacts/nq_round_number_orderflow_barrier_density_summary_20260630.csv
    declared_grid_passed: true
  duplicate_edge_review:
    conclusion: Eligible as a distinct NQ composite because the prior NQ round-number campaign used price-only handles, while
      this campaign requires completed-bar aggregate orderflow absorption or participation. It is not a new price-only barrier
      or 20/80 ending test.
  mechanics_review:
    mechanic_expresses_edge: Tests whether larger NQ trade buckets identify failed initiative pressure around round handles
      after opening-auction noise has passed.
    entry_logic_rationale: The round-number level is fixed before the session. The signal uses only the completed 5-minute
      bar OHLC and completed aggregate orderflow fields, and the engine can enter no earlier than the next bar open.
    stop_loss_rationale: A fixed percent-from-entry stop rejects the premise if the handle interaction fails after entry.
      The stop grid is declared before PnL and same-bar conflicts remain pessimistic.
    target_exit_rationale: A fixed-R target tests whether the handle interaction resolves before the 15:55 forced flatten
      without using future session highs/lows, final VWAP, final profile, or post-entry orderflow.
    profitability_rationale: A real round-number/orderflow interaction should survive neighboring barrier, buffer or imbalance
      settings plus stop and target variation, then pass monkey, WFA, Monte Carlo, prop-rule, and acceptance gates.
    known_failure_modes: The effect may be obvious and arbitraged, aggregate signed-volume may misclassify initiative flow,
      NQ handle behavior may change across volatility regimes, and strong top rows can fail neighboring-parameter or best-day-concentration
      checks.
    pre_test_decision: approve_for_testing
