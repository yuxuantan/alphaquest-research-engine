data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- 5-minute strategy bars aggregated from local one-minute RTH Sierra bars
- one-minute detail data for stop/target conflict handling and same-day flatten checks
lookahead_risks:
- A swing pivot is not usable until the configured right-side confirmation bars are complete.
- The current higher-timeframe bucket is used only after its close time has passed; incomplete buckets do not define pivots.
- Signals generated from completed bars are filled at the next bar open or later by the engine.
- No final session high, final session low, final VWAP, final volume profile, or future orderflow is used.
- Same-bar stop/target conflicts use one-minute detail data when available and pessimistic fallback otherwise.
