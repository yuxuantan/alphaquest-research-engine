campaign_id: nq_market_structure_pivot_trend_bias
title: NQ completed swing-pivot multi-timeframe market-structure trend bias
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: market_structure_pivot_trend_bias
hypothesis: NQ may show same-session continuation when the latest confirmed swing-pivot sequence across multiple intraday
  horizons shows a higher-high/higher-low uptrend or lower-high/lower-low downtrend. Signals are deliberately delayed until
  pivots are confirmed by right-side bars and entries occur no earlier than the next bar open.
rationale: This is a direct NQ transfer of the standalone ES market-structure pivot trend-bias family before any NQ PnL inspection.
  It is distinct from NQ pivot-filtered MES/orderflow composites because the primary and only edge here is the completed NQ
  swing-pivot sequence, not a filter layered on MES crowding, orderflow, opening range, VWAP, or prior value-area mechanics.
