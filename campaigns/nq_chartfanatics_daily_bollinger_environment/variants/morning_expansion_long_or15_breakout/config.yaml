research_metadata:
  academic_source: Chart Fanatics Futures Trading Strategy; Bollinger (2001); Brock, Lakonishok, and LeBaron (1992)
  edge_thesis: Daily Bollinger upward expansion may identify one-directional NQ trend days; first-session continuation
    should only be tested after completed OR confirmation.
  mechanic: When completed prior-session daily 20/3 Bollinger state is expanding upward, buy a completed 15-minute
    opening-range breakout.
  timeframe_rationale: Five-minute bars keep intraday execution on completed bars while the daily Bollinger state
    is fixed from completed prior RTH sessions.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: When completed prior-session daily 20/3 Bollinger state is expanding upward, buy a
      completed 15-minute opening-range breakout.
    entry_logic_rationale: The entry module computes daily 20/3 Bollinger environment from completed prior RTH sessions
      only. Intraday confirmation uses completed 5-minute bars and the engine enters no earlier than the next bar
      open.
    stop_loss_rationale: The sweep-extreme stop anchors invalidation to the completed signal bar extreme plus a
      predeclared tick offset. No future swing is used.
    target_exit_rationale: A fixed-R target keeps the discretionary Chart Fanatics target language auditable under
      the existing staged framework.
    profitability_rationale: The edge should work only if daily Bollinger environment state changes the distribution
      of same-day NQ follow-through or edge reversion enough to overcome NQ costs.
    known_failure_modes: Daily Bollinger states can be late; intraday confirmation can chase exhausted moves; consolidation
      fades can fail on trend days; fixed-R exits may not match the source discretionary management.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/futures-trading-strategy
  rescue_status: none
  pre_pnl_density:
    status: FAIL
    artifact: research_artifacts/nq_chartfanatics_daily_bollinger_environment_density_audit_20260630.md
    summary_csv: research_artifacts/nq_chartfanatics_daily_bollinger_environment_density_summary_20260630.csv
    entry_combos: 9
    combos_passing_all_windows: 0
    min_limited_core_signals_per_year: 0.0
