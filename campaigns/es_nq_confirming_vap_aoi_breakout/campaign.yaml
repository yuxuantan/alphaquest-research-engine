campaign_id: es_nq_confirming_vap_aoi_breakout
title: ES NQ-Confirming VAP AOI Breakout Continuation
decision: FAIL
created_at: '2026-06-23'
instrument: ES
timeframe: 1m
edge_family: cross_index_confirmation_vap_aoi_breakout_continuation
hypothesis: ES acceptance through market-generated or frozen prior VAP AOI levels should have better continuation odds when
  same-direction ES completed-bar orderflow is confirmed by NQ return and signed-volume pressure over a completed rolling
  window.
variant_expansion_rationale: 'Eight variants are justified before PnL because this edge has materially distinct mechanics
  that cannot be represented by one parameter grid alone: broad all-market AOIs, combined prior/opening AOIs, a faster 15-minute
  confirmation horizon, prior RTH extremes, opening-range-only morning acceptance, overnight-extreme acceptance, direct value-area
  VAH/VAL breakout, and LVN breakout through thin prior auction areas. Variants 6-8 are not extra parameter sweeps; they are
  predeclared AOI families inside the same ES/NQ-confirmed continuation thesis.'
sources:
- title: 'Pairs Trading: Performance of a Relative-Value Arbitrage Rule'
  authors: Evan Gatev, William N. Goetzmann, and K. Geert Rouwenhorst
  year: 2006
  venue: Review of Financial Studies
  link: https://academic.oup.com/rfs/article-abstract/19/3/797/1585302
  relevance: Supports cross-asset relative-value relationships among related instruments, while this campaign tests confirmation
    rather than convergence trading.
- title: High Frequency Lead/Lag Relationships - Empirical Facts
  authors: Nicolas Huth and Frederic Abergel
  year: 2014
  venue: Empirical market microstructure working paper
  link: https://ideas.repec.org/p/hal/wpaper/hal-00645685.html
  relevance: Motivates short-horizon dependency checks between related equity-index futures returns and orderflow proxies.
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports the premise that visible support and resistance reference levels can influence intraday order placement.
- title: Do Investors Place Orders to Exploit Technical Analysis?
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Journal of Finance
  doi: 10.1111/j.1540-6261.2004.00665.x
  link: https://doi.org/10.1111/j.1540-6261.2004.00665.x
  relevance: Links technical levels with liquidity provision and order placement around visible reference prices.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates same-direction orderflow confirmation, while the Sierra signed-volume fields remain completed-bar proxies
    rather than LOB OFI.
- title: CME Market Profile educational material
  authors: CME Group
  year: n.d.
  venue: Exchange practitioner research
  link: https://www.cmegroup.com/education.html
  relevance: Motivates prior-session POC, value area, and low-volume-node auction context for ES reference levels.
data_needs:
- Derived local cache joining ES Sierra footprint and true VAP fields with completed ES/NQ rolling lead-lag fields by timestamp.
- Prior VAP POC/VAH/VAL/LVN fields frozen from completed prior RTH sessions only.
- Prior RTH high/low generated by the pdh_pdl_sweep feature set from completed prior sessions.
- Opening range high/low available only after the first 30 completed RTH minutes.
- Completed-bar NQ return and NQ signed-imbalance fields for 15-minute and 30-minute rolling windows.
data_quality_caveats:
- The joined cache drops unmatched ES minutes where NQ lead-lag rows were absent; the validation sidecar belongs to the cache
  build.
- Sierra signed-volume and footprint fields are completed-bar research proxies, not exchange print sequencing or quote-depth
  reconstruction.
- NQ confirmation can reduce but not eliminate information-event risk during broad equity-index trend days.
- Any passing result remains a candidate strategy requiring manual chart review, source review, and incubation.
lookahead_risks:
- Prior VAP and prior RTH levels are shifted from completed sessions before current-session use.
- Opening-range levels are unavailable until the configured opening range has fully closed.
- ES breakout, ES orderflow, NQ return, and NQ signed-imbalance tests use completed bars only; entry is no earlier than the
  next one-minute open.
- No current-session final profile, final VWAP, future high/low, future orderflow, or post-entry bars are used.
duplicate_edge_check:
  active_rejected_edges_checked:
  - es_true_vap_aoi_breakout_continuation
  - es_nq_nonconfirming_vap_aoi_trap
  - es_true_vap_value_area_orderflow_acceptance
  - es_low_toxicity_aoi_false_breakout
  - es_mes_trend_aoi_pullback
  conclusion: 'Eligible as a distinct continuation campaign: it is not a rescue of failed ES-only VAP breakouts and not the
    opposite-direction NQ nonconfirmation trap. The edge specifically requires NQ same-direction confirmation before ES continuation
    entry.'
