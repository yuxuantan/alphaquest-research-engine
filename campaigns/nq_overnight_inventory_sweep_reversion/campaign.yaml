campaign_id: nq_overnight_inventory_sweep_reversion
title: NQ Overnight Inventory Sweep Reversion
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll
timeframe: 5m
edge_type: overnight_extreme_sweep_reclaim_reversion
hypothesis: NQ may mean-revert after completed RTH sweeps and reclaims of the fully known overnight high
  or low because those levels concentrate stops, liquidity provision, and stale overnight inventory reference
  points.
rationale: This is an NQ-specific test of failed overnight-extreme sweeps using a newly generated explicit-roll
  NQ ETH/RTH Databento cache. It is distinct from prior NQ overnight return reversal and RTH-only orderflow
  campaigns because it trades only completed sweeps of pre-known overnight highs/lows and requires next-bar
  execution plus same-day flattening.
sources:
- title: Currency Orders and Exchange Rate Dynamics
  authors: Carol L. Osler
  year: 2003
  venue: Journal of Finance / NY Fed Staff Report 125
  link: https://www.newyorkfed.org/research/staff_reports/sr125.html
  relevance: Documents order clustering around technical levels, motivating strict tests around overnight
    highs/lows as public reference levels.
- title: Technical Analysis and Liquidity Provision
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Review of Financial Studies
  link: https://ideas.repec.org/a/oup/rfinst/v17y2004i4p1043-1071.html
  relevance: Supports the idea that support/resistance levels can align with liquidity supply and may
    produce reversals or breakouts.
- title: Stop-loss Orders and Price Cascades in Currency Markets
  authors: Carol L. Osler
  year: 2005
  venue: Journal of International Money and Finance
  link: https://ideas.repec.org/a/eee/jimfin/v24y2005i2p219-241.html
  relevance: Motivates distinguishing stop cascades from failed sweeps that reverse after liquidity is
    consumed.
data_needs:
- timezone-aware NQ ETH and RTH 1-minute OHLCV bars in America/New_York
- explicit NQ roll-calendar selection with no same-day volume lookahead
- completed ETH overnight high/low mapped to RTH bars only after the overnight session is complete
- deterministic 5-minute aggregation and 1-minute detail data for same-bar stop/target conflict handling
- same-day forced flatten and no-overnight prop-rule checks
data_quality_caveats:
- The NQ explicit-roll calendar was derived by translating the ES MotiveWave/Rithmic CME equity-index
  quarterly roll dates to NQ contract symbols and requires manual review before promotion.
- The local Databento cache is OHLCV bar data, not tick path or order book data.
- Same-bar stop/target conflicts must use 1-minute detail where available and pessimistic fallback otherwise.
lookahead_risks:
- Overnight high/low are computed from ETH bars assigned to the current RTH session and are only used
  on RTH bars after the ETH session is complete.
- Sweep and reclaim conditions use only completed 5-minute bars; entries are next-bar open or later.
- No final RTH high/low, final VWAP, future session return, future volume profile, or future orderflow
  information is used.
- Roll selection uses a fixed translated calendar, not same-day realized volume or future price action.
- All variants flatten before the configured prop cutoff and disallow overnight positions.
failure_modes:
- Overnight high/low sweeps may be informed breakouts rather than failed stop runs.
- Bar-level OHLC may overstate fill quality during fast RTH open moves.
- The NQ roll-calendar translation may introduce contract-boundary issues that require manual review.
- The effect may concentrate in crisis sessions or roll weeks.
