campaign_id: nq_corporate_equity_supply_state
title: NQ Corporate Equity Supply State
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: corporate_equity_supply_state
hypothesis: Strict-lag quarterly corporate equity issuance and financing-mix states may identify
  equity-supply pressure in growth-heavy Nasdaq-100 futures.
rationale: This campaign tests aggregate corporate financing supply from Federal Reserve Z.1/FRED
  data, distinct from buyback blackout calendars, investor sentiment, credit spreads, equity
  breadth, or rates/volatility state campaigns.
research_sources:
- title: The Equity Share in New Issues and Aggregate Stock Returns
  authors: Malcolm Baker and Jeffrey Wurgler
  year: 2000
  venue: Journal of Finance 55(5), 2219-2257
  link_or_doi: https://www.hbs.edu/faculty/Pages/item.aspx?num=9176
  expected_mechanism: Finds that a higher equity share in new issues predicts lower subsequent
    aggregate stock returns, motivating a corporate supply-pressure state.
- title: Corporate Equities; Liability, Transactions
  authors: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  venue: FRED series NCBCEBQ027S
  link_or_doi: https://fred.stlouisfed.org/series/NCBCEBQ027S
  expected_mechanism: Quarterly Z.1 net corporate equity transactions proxy aggregate equity
    supply or repurchase pressure.
- title: Nonfinancial Corporate Business; Debt Securities and Loans; Liability, Transactions
  authors: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  venue: FRED series BOGZ1FA104104005Q
  link_or_doi: https://fred.stlouisfed.org/series/BOGZ1FA104104005Q
  expected_mechanism: Quarterly debt financing transactions allow an equity-versus-debt financing
    mix proxy.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York.
- Public FRED quarterly NCBCEBQ027S, BOGZ1FA104104005Q, and NCBEILQ027S CSVs cached under
  data/external/fred_corporate_equity_supply.
- Derived strict-lag feature CSV data/external/nq_corporate_equity_supply_features_20110103_20260612.csv.
duplicate_edge_check:
  checked_edges:
  - pre_campaign_buyback_blackout_orderflow_density
  - nq_finra_margin_leverage
  - nq_nasdaq_equal_weight_concentration
  - nq_credit_etf_orderflow_risk_appetite
  - nq_default_spread_orderflow_risk_premium
  - nq_fama_french_style_factor_rotation
  - nq_naaim_exposure_sentiment
  caveat: A prior ES scratch screen mentioned corporate equity supply but no authored NQ five-variant
    campaign or staged NQ ledger row exists. This is not a buyback blackout calendar, credit-spread,
    margin leverage, or investor-exposure campaign.
  conclusion: Eligible as a distinct aggregate corporate financing supply edge for NQ source
    testing.
lookahead_risks:
- A session dated D can only use the latest quarterly FRED observation on or before D minus
  180 calendar days.
- Quarterly observation dates are treated conservatively because Z.1 release dates lag quarter
  dates.
- Rolling ranks are computed in the quarterly feature table before the session-level as-of
  join.
- Signals use a completed NQ RTH bar and enter no earlier than the next bar open.
- No same-quarter release, final NQ session range, final VWAP, or post-entry path is used.
failure_modes:
- Corporate financing supply may operate at multi-month horizons rather than same-day NQ intraday
  horizons.
- The 180-calendar-day lag may be too stale for intraday prediction.
- The signal may proxy broad valuation, sentiment, or credit regimes and fail robustness.
- If the edge only survives one issuance regime or narrow threshold, it must be rejected.
