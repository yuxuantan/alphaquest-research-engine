campaign_id: nq_emv_macro_news_intraday
title: NQ EMV Macro-News Intraday
status: completed
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged monthly newspaper-based equity-market-volatility macro-news states
  may identify same-day NQ RTH risk-off pressure or compensating equity risk-premium
  states after the cash open.
rationale: This is a weak-prior NQ transfer from the failed ES EMV macro-news family.
  It is distinct from daily EPU, OFR stress, VIX/VVIX states, realized-volatility
  shape, scheduled event drift, and orderflow campaigns because it uses monthly Baker-Bloom-Davis/FRED
  EMV macro-news categories with a conservative 21-calendar-day lag.
research_sources:
- title: Policy News and Stock Market Volatility
  author: Scott R. Baker, Nicholas Bloom, Steven J. Davis, and Kyle Kost
  year: 2019
  link_or_doi: https://www.nber.org/papers/w25720
  expected_mechanism: Introduces newspaper-based EMV trackers and documents their
    relationship with VIX and realized S&P 500 volatility.
- title: 'Equity Market Volatility Tracker: Macroeconomic News And Outlook'
  author: Scott R. Baker, Nicholas Bloom, and Steven J. Davis via FRED
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/EMVMACRONEWS
  expected_mechanism: Monthly EMV macro-news series used as the primary lagged feature.
- title: Equity Market Volatility Tracker monthly data
  author: Economic Policy Uncertainty project
  year: 2026
  link_or_doi: https://www.policyuncertainty.com/EMV_monthly.html
  expected_mechanism: Project documentation for the EMV tracker family and category-specific
    monthly trackers.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fred_emv_macro_news
- data/external/nq_emv_macro_news_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_es_emv_macro_news_features.py
  output: data/external/nq_emv_macro_news_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  release_lag_days: 21
  lookahead_control: Each NQ session uses monthly EMV observations available after
    observation month-end plus 21 calendar days.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-06-30'
  existing_nq_campaign_id: none
  es_source_campaign: es_emv_macro_news_intraday
  es_source_decision: FAIL
  not_duplicate_of:
  - nq_epu_policy_uncertainty_intraday
  - nq_ofr_financial_stress_intraday
  - nq_cboe_vix_level_state_intraday
  - nq_vvix_tail_risk_intraday
  - nq_realized_vol_of_vol_state
  - nq_fomc_pre_announcement_drift
  conclusion: This campaign uses monthly newspaper-based EMV macro-news categories.
    It is not daily EPU, OFR stress, option-implied volatility/tail risk, realized
    volatility, or scheduled event drift.
parameter_space:
