  entry_parameters: one EMV rank threshold per variant
  stop_parameters:
    sl.params.stop_pct:
    - 0.0015
    - 0.0025
    - 0.004
  take_profit_parameters:
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
variants:
- high_macro_news_short_1030
- high_macro_news_rebound_long_1130
- rising_macro_news_short_1000
- high_interest_news_short_1200
- high_labor_news_short_1330
density_audit:
  artifact: research_artifacts/nq_emv_macro_news_intraday_density_audit_20260630.md
  conclusion: Every declared EMV threshold corner clears the 50 signals/year pre-PnL
    density gate on the NQ RTH cache.
