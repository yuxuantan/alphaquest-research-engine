campaign_id: nq_fiscal_deficit_treasury_supply_state
title: NQ Fiscal Deficit Treasury Supply State
status: completed_failed_limited_core
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Strictly lagged Monthly Treasury Statement fiscal-balance, receipts, and outlays states may proxy Treasury financing pressure, fiscal-risk discounting, and nominal income strength that influence same-day NQ RTH risk appetite.
rationale: The campaign uses U.S. Treasury/FRED monthly MTS surplus/deficit, receipts, and outlays with a conservative 60-calendar-day lag. It is distinct from Treasury-rate, Treasury auction, RRP liquidity, market-plumbing, credit-spread, consumer-credit, productivity, inflation, and policy-uncertainty campaigns because it tests federal fiscal-balance and financing-pressure state rather than rates, auction calendar, Fed facility usage, credit risk, household credit, labor-cost productivity, price inflation, or news uncertainty.
sources:
- title: Implications of Government Deficits for Interest Rates, Equity Returns, and Corporate Financing
  authors: Benjamin M. Friedman
  year: 1984
  venue: NBER Working Paper 1520
  link: https://ideas.repec.org/p/nbr/nberwo/1520.html
  relevance: Motivates government deficit financing as an asset-pricing and equity-return channel.
- title: Federal Surplus or Deficit [-] (MTSDS133FMS)
  authors: U.S. Department of the Treasury Fiscal Service via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/MTSDS133FMS
  relevance: Monthly federal surplus/deficit state used for deficit and fiscal-balance features.
- title: Total Federal Receipts (MTSR133FMS)
  authors: U.S. Department of the Treasury Fiscal Service via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/MTSR133FMS
  relevance: Monthly federal receipts used for receipts-growth and fiscal-impulse features.
- title: Total Federal Outlays (MTSO133FMS)
  authors: U.S. Department of the Treasury Fiscal Service via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/MTSO133FMS
  relevance: Monthly federal outlays used for outlay-growth and fiscal-impulse features.
- title: Monthly Treasury Statement
  authors: U.S. Department of the Treasury FiscalData
  year: 2026
  venue: FiscalData.Treasury.gov
  link: https://fiscaldata.treasury.gov/datasets/monthly-treasury-statement/
  relevance: Official source dataset for federal receipts and outlays.
behavioural_or_microstructure_rationale: Large or worsening deficits may pressure equity-index futures through expected Treasury supply, rates, and fiscal-risk premia, while strong receipts or low outlay growth may proxy healthier income and lower financing pressure. Any real edge must survive next-bar execution, NQ costs, pessimistic same-bar ordering, neighboring parameters, monkey robustness, WFA, Monte Carlo, prop-rule simulation, and acceptance OOS.
expected_failure_modes:
- Monthly fiscal data may be too stale after a 60-day lag for intraday futures trading.
- MTS series are highly seasonal and may encode fiscal calendar effects rather than tradable risk state.
- NQ may price fiscal pressure through rates before RTH.
- Effects may be regime-specific and fail neighboring parameter or monkey robustness.
data_needs:
- timezone-aware NQ RTH 1-minute bars in America/New_York
- FRED MTSDS133FMS/MTSR133FMS/MTSO133FMS monthly data cached under data/external/fred_fiscal_deficit_treasury_supply
- 60-calendar-day as-of join from NQ sessions to monthly MTS observations
lookahead_risks:
- A session dated D may only use the latest monthly MTS observation on or before D minus 60 calendar days.
- Rolling ranks are computed on completed monthly observations before the NQ as-of join.
- Signals use completed one-minute bars and enter next bar open or later.
- No future NQ bar, final session range, final VWAP, final volume profile, or post-entry market state is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_treasury_rate_orderflow_confirmation
  - nq_treasury_term_premium_state
  - nq_treasury_auction_pressure
  - nq_nyfed_rrp_liquidity_state
  - nq_market_plumbing_liquidity_capacity
  - nq_default_spread_orderflow_risk_premium
  - nq_consumer_credit_state
  - nq_productivity_unit_labor_cost_state
  - nq_inflation_pressure_state
  - nq_epu_policy_uncertainty_intraday
  conclusion: Eligible before PnL as a distinct federal fiscal-balance and Treasury-supply-pressure state edge; no prior NQ federal deficit/MTS receipts-outlays campaign was found in the ledger or campaign tree.
