research_metadata:
  academic_source: Admati and Pfleiderer (1988); Harris (1986); Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: The completed low-liquidity midday range may act as a temporary inventory
    boundary. A post-lunch close outside that range with aligned aggregate orderflow
    may identify real inventory expansion rather than random lunch-time drift.
  mechanic: 'Rescue attempt 1 changes only existing fixed parameters and declared
    parameter space. Original mechanic retained: completed 11:30-13:00 ET lunch range
    breakout with large-20 signed-flow confirmation through 14:30 ET; enter on the
    next 5-minute bar open and flatten at 15:55 ET unless stop or target is hit.'
  timeframe_rationale: 5-minute bars match the lunch-range auction horizon while preserving
    enough intraday observations. The engine uses local 1-minute detail data for same-bar
    stop/target conflict resolution when available.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: Rescue attempt 1 keeps the same completed midday/lunch
      range breakout plus aligned aggregate orderflow-confirmation mechanic. Only
      the existing range-width, flow-threshold, stop-offset, and fixed-R target parameter
      values are moved toward a tighter-compression and larger-payoff expression of
      the same edge.
    entry_logic_rationale: The 11:30:00-13:00:00 ET window is fully known only after
      13:00:00 ET, so the entry cannot use future highs or lows. A completed post-range
      close through the high or low, plus predeclared orderflow confirmation, tests
      whether the market re-accelerates after the midday liquidity trough. Entry remains
      next-bar open, so the breakout close is not filled retroactively.
    stop_loss_rationale: The stop is placed just back through the broken range boundary.
      If price cannot hold the boundary after a confirmed expansion, the range-break
      thesis is wrong. The fixed max-stop cap rejects outsized lunch ranges where
      boundary risk is not compatible with prop-style drawdown geometry.
    target_exit_rationale: The fixed-R target tests whether post-lunch expansion can
      travel far enough beyond the frozen range boundary to pay for commissions, slippage,
      and stop risk. A fixed 15:55 ET flatten handles unresolved trades without using
      future session information.
    profitability_rationale: The original runs were liquid enough but unprofitable.
      This rescue remains predeclared and tests whether the same edge needs a tighter
      lunch range and larger post-breakout excursion to overcome costs. The rescue
      density check showed every declared entry corner remains above roughly 50 raw
      signals per year.
    known_failure_modes: The edge can fail if lunch-range breaks are mostly stop probes,
      if Sierra aggregate signed flow is too noisy as a participation proxy, if post-lunch
      continuation is fully arbitraged after costs, or if profits concentrate in a
      small number of high-volatility trend sessions.
    pre_test_decision: approve_for_testing
