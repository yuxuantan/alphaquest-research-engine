research_metadata:
  mechanics_review_required: true
  academic_source: Lown and Morgan (2006); Federal Reserve Senior Loan Officer Opinion Survey on Bank Lending Practices; FRED release 191
  edge_thesis: Strictly lagged SLOOS C&I loan-demand strength may proxy business credit demand, growth expectations, and NQ RTH risk appetite.
  mechanic: At 10:30 ET, buy NQ when the 75-day-lagged small-firm C&I loan-demand rank is in the upper half/tail. Flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: A 1-minute completed-bar signal preserves deterministic next-bar-open execution while the quarterly SLOOS state is fixed by a 75-calendar-day availability lag.
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: At 10:30 ET, buy NQ when the 75-day-lagged small-firm C&I loan-demand rank is in the upper half/tail.
    entry_logic_rationale: The signal reads only quarterly Federal Reserve/FRED SLOOS observations available at least 75 calendar days before the NQ session plus the completed one-minute bar before the configured decision time.
    stop_loss_rationale: The percent-from-entry stop is declared before testing and varied only through the stop_pct grid.
    target_exit_rationale: The fixed-R target is declared before testing and does not use future intraday highs/lows or final session levels.
    profitability_rationale: A real C&I loan-demand state edge should survive neighboring rank, stop, and target settings after costs.
    known_failure_modes: SLOOS data may be too stale, C&I loan demand may proxy broad beta rather than timing, or the effect may be regime-specific and fail robustness gates.
    pre_test_decision: approve_for_testing
