  variants_passed: 0
  rescue_attempts_used: 0
  failure_reason: >
    All eight predeclared true-VAP value-area orderflow acceptance variants failed
    limited_core_grid_test. No variant reached monkey, WFA, Monte Carlo,
    simulated incubation, frozen validation, or candidate reporting.
  best_variant: morning_inside_value_escape_signed_two_sided_1130
  best_variant_note: >
    The only positive pocket was 4/81 profitable combinations with zero
