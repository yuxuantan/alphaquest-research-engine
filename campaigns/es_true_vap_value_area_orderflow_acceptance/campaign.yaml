  tested_at: '2026-06-22'
  campaign_summary: backtest-campaigns/es_true_vap_value_area_orderflow_acceptance/campaign_test_summary.json
  methodology_audit: backtest-campaigns/es_true_vap_value_area_orderflow_acceptance/methodology_audit.md
