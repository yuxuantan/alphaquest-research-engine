campaign_name: es_round_number_orderflow_barrier
campaign_id: es_round_number_orderflow_barrier
instrument: ES
decision: FAIL
reason_for_decision: >
  Active-only duplicate review found an already failed standalone round-number
  barrier campaign and multiple standalone orderflow campaigns. This campaign is
  eligible under the user's 2026-06-17 composite-edge allowance because it tests a
  predeclared interaction: fixed psychological price barriers are traded only when
  completed aggregate orderflow confirms absorption at failed probes or
  participation on breaks. It is not a parameter rescue of the failed standalone
  round-number campaign.
edge_hypothesis: >
  ES may react around ex-ante round-number price barriers because stops,
  discretionary orders, and liquidity cluster near salient index handles.
  Completed-bar aggregate orderflow should distinguish failed probes absorbed by
  passive liquidity from breaks supported by aggressive participation.
why_it_may_apply_to_es_futures: >
  ES trades in visible index handles and has deep enough volume for 5-minute
  aggregate signed-flow measures. The price barrier is known before the session,
  while the flow condition is observed only on the completed signal bar before
  next-bar execution.
research_sources:
- title: Price Barriers in the Dow Jones Industrial Average
  author: R. Glen Donaldson and Harold Y. Kim
  year: 1993
  link_or_doi: https://ideas.repec.org/a/cup/jfinqa/v28y1993i03p313-330_00.html
  expected_mechanism: Salient index levels can behave as support/resistance and
    may produce continuation once crossed.
- title: Currency Orders and Exchange-Rate Dynamics
  author: Carol L. Osler
  year: 2003
  link_or_doi: https://www.newyorkfed.org/research/staff_reports/sr125.html
  expected_mechanism: Stop-loss and take-profit order clustering around round
    numbers can create both reversals and momentum after level interaction.
- title: The Price Impact of Order Book Events
  author: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  link_or_doi: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  expected_mechanism: Order-flow imbalance is linked to short-horizon price
    changes; here it is used as completed-bar confirmation, not as tick-level LOB
    data.
behavioural_or_microstructure_rationale: >
  Reclaim variants require price to probe a fixed barrier and close back through
  it while the completed bar shows opposite-side aggressive flow, consistent with
  absorption. Breakout variants require a completed close through the barrier and
  same-direction aggressive flow, consistent with stop-order continuation.
expected_failure_modes:
- Round-number clustering may be too visible and arbitraged in ES futures.
- Aggregate signed-flow classification may be too noisy to identify absorption.
- Bar-level OHLC cannot prove the intra-bar queue path, so pessimistic same-bar
  stop/target handling remains required.
- The orderflow filter may remove too many trades in some regimes or select
  adverse liquidation flow instead of informed participation.
- The effect may concentrate in a few volatility regimes or trend days.
data_requirements:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- Deterministic 5-minute aggregation from completed 1-minute RTH bars
session_assumptions:
  timezone: America/New_York
  rth_start: "09:30:00"
  rth_end: "15:59:00"
  no_overnight_positions: true
  latest_variant_flatten: "15:55:00"
forbidden_forms_of_lookahead:
- Use of future session highs/lows, final VWAP, final volume profile, or future
  orderflow to define a barrier.
- Entry on the same bar close that creates the signal; signal fills must occur at
  the next bar open or later.
- Changing barrier interval, flow mode, flow confirmation, time window, stop, or
  target after seeing results.
- Using archived result performance for duplicate or parameter decisions.
duplicate_edge_review:
  active_scope_only: true
  archived_tests_ignored: true
  known_related_active_campaigns:
  - es_round_number_barrier_reaction
  - es_signed_orderflow_persistence
  - es_orderflow_absorption_exhaustion_reversal
  - es_opening_range_orderflow_breakout
  conclusion: >
    This is a bounded composite of fixed psychological barriers and completed-bar
    aggregate orderflow. The standalone round-number edge remains failed; this
    campaign tests whether the interaction of barrier reaction with absorption or
    participation is materially different.
variants:
- morning_support_sell_absorption_long
- morning_resistance_buy_absorption_short
- midday_two_sided_large10_absorption_reclaim
- round_number_upside_flow_breakout_long
- round_number_downside_flow_breakout_short
parameter_space:
  total_combinations_per_variant: 54
  entry_tunables:
  - buffer_ticks or barrier_interval_points
  - min_orderflow_imbalance
  stop_tunables:
  - stop_pct
  target_tunables:
  - target_r_multiple
  density_screen: research_artifacts/es_round_number_orderflow_barrier_density_audit_20260617.md
rescue_policy:
  rescue_scope: failed_variant
  max_rescue_attempts_per_failed_variant: 1
  allowed_changes:
  - fixed parameters inside existing strategy modules
  - tunable parameter space inside existing strategy modules
  forbidden_changes:
  - rescue the same failed variant more than once
  - core strategy mechanic
  - entry module
  - stop-loss module
  - take-profit or exit module
  - edge thesis
  - stage criteria
  - data window
  - timeframe
  - costs or fill assumptions
  predeclared_rescue_parameter_space:
