campaign_id: es_fomc_pre_announcement_drift
variant_id: decision_day_low_range_long_1130
test_run_id: run1
strategy_name: fomc_pre_announcement_drift
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Lucca and Moench (2015); Federal Reserve scheduled FOMC calendars
  edge_thesis: Scheduled FOMC decisions may carry a positive ES pre-announcement drift
    that is tradable intraday before the statement window.
  mechanic: At 11:30 ET on scheduled FOMC decision dates, enter long ES only if completed
    RTH range is no wider than the configured threshold; flatten before noon unless
    stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed-bar event timing and next-bar-open
    ES execution while allowing deterministic pre-noon flattening on decision days.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  exchange_timezone: America/New_York
  feature_set: none
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  rth_end: '15:59:00'
  rth_start: 09:30:00
  source: parquet
  source_timeframe: 1m
  symbol: ES
  timezone: America/New_York
  warmup_days: 0
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: fomc_pre_announcement_drift
    params:
      setup_mode: announcement_day_low_range_long
      event_calendar_csv: data/external/fomc_scheduled_decision_dates_20110101_20260609.csv
      entry_time: '11:30:00'
      flatten_time: '12:00:00'
      bar_interval_minutes: 1
      event_day_offset: 0
      max_trades_per_day: 1
      min_session_return_bps: -1000000
      max_session_range_bps: 25
      stop_pct: 0.0015
      target_r_multiple: 1.0
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0015
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '12:00:00'
