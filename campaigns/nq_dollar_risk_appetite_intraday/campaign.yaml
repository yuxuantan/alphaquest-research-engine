campaign_id: nq_dollar_risk_appetite_intraday
title: NQ Dollar Risk-Appetite Intraday Spillover
status: completed
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged broad U.S. dollar strength may proxy global risk-capacity contraction
  and risk-off pressure. When the dollar strengthens sharply, NQ may have negative
  same-day intraday drift; when the dollar weakens sharply, NQ may have positive same-day
  intraday drift.
rationale: This is a weak-prior NQ symbol-transfer from the failed ES broad-dollar
  family. It is distinct from USDJPY safe-haven spillover, Treasury-rate, OFR stress,
  option-sentiment, variance-risk-premium, and sector/tech leadership campaigns because
  it uses the Fed nominal broad dollar index with a conservative prior-business-day
  availability lag.
research_sources:
- title: The Dollar, Bank Leverage, and Deviations from Covered Interest Parity
  author: Stefan Avdjiev, Wenxin Du, Catherine Koch, Hyun Song Shin
  year: 2019
  link_or_doi: 10.1257/aeri.20180322
  expected_mechanism: The dollar is a barometer of global risk-taking capacity; broad
    dollar strength can reflect tighter risk capacity.
- title: Common Risk Factors in Currency Markets
  author: Hanno Lustig, Nikolai Roussanov, Adrien Verdelhan
  year: 2011
  link_or_doi: 10.1093/rfs/hhr068
  expected_mechanism: Common currency risk factors motivate treating broad dollar
    moves as risk-state information rather than isolated FX noise.
- title: Nominal Broad U.S. Dollar Index [DTWEXBGS]
  author: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/DTWEXBGS
  expected_mechanism: Daily public broad-dollar index used to build strictly lagged
    NQ session features.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fred_dtwexbgs_nominal_broad_dollar_2006_2026.csv
- data/external/nq_dollar_risk_appetite_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_es_dollar_risk_appetite_features.py
  output: data/external/nq_dollar_risk_appetite_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3754
  availability_lag_business_days: 1
  lookahead_control: Each NQ session uses the latest FRED DTWEXBGS observation on
    or before session date minus one business day; no same-session or same-date dollar
    observation is used.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-06-30'
  existing_nq_campaign_id: none
  es_source_campaign: es_dollar_risk_appetite_intraday
  es_source_decision: FAIL
  not_duplicate_of:
  - nq_usdjpy_safe_haven_spillover
  - nq_treasury_rate_shock_intraday
  - nq_ofr_financial_stress_intraday
  - nq_cboe_put_call_sentiment_intraday
  - nq_vvix_tail_risk_intraday
  - nq_variance_risk_premium_intraday
  - nq_tech_relative_strength_intraday
  conclusion: This campaign uses lagged broad-dollar risk-appetite information. It
    is not a single USDJPY safe-haven cross, Treasury-rate state, financial-stress
    index, option sentiment, volatility risk premium, or NQ tech-leadership campaign.
