campaign_id: nq_realized_jump_variation_premium
title: NQ Realized Jump Variation Premium
decision: FAIL
status: completed
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Lagged discontinuous NQ realized jump variation, separated from continuous
  variation using bipower variation, may predict same-day NQ intraday compensation
  or reversal after realistic costs.
rationale: This campaign tests prior-session NQ jump-risk state, not realized semivariance,
  VIX/VXN, Cboe sentiment, sector rotation, opening-range, orderflow periodicity,
  or MES-crowding. The ES realized-jump family failed, so this NQ transfer is a weak-prior
  symbol test and must pass the full NQ staged workflow on its own.
sources:
- title: Power and Bipower Variation with Stochastic Volatility and Jumps
  authors: Ole E. Barndorff-Nielsen and Neil Shephard
  year: 2004
  link_or_doi: https://doi.org/10.1093/jjfinec/nbh001
  relevance: Bipower variation separates continuous variation from jump variation,
    giving a no-lookahead prior-session jump-state feature.
- title: Threshold Bipower Variation and the Impact of Jumps on Volatility Forecasting
  authors: Fulvio Corsi, Davide Pirino, and Roberto Reno
  year: 2010
  link_or_doi: https://doi.org/10.1016/j.jeconom.2010.07.008
  relevance: Realized jumps contain information distinct from continuous volatility
    and can affect subsequent short-horizon risk forecasts.
- title: Tail Risk Premia and Return Predictability
  authors: Tim Bollerslev, Viktor Todorov, and Lai Xu
  year: 2015
  link_or_doi: https://doi.org/10.1016/j.jfineco.2015.02.010
  relevance: Tail and jump-risk compensation can predict aggregate equity returns;
    this campaign tests a no-overnight NQ intraday approximation.
data_needs:
- timezone-aware NQ RTH 1-minute OHLC bars in America/New_York
- NQ realized jump-variation feature file shifted one completed RTH session before
  use
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- Bipower jump variation estimated from one-minute OHLC closes is an approximation
  and not tick-realized jump truth.
- The feature is lagged daily state, not a high-frequency causal signal.
- The ES realized-jump family failed, so this transfer carries weak prior evidence.
lookahead_risks:
- Using current-session jump variation, high, low, close, or realized variance in
  the signal would leak future information and is forbidden.
- Rolling ranks must use only prior completed sessions.
- Signals use fixed completed-bar decision times and must enter no earlier than next
  bar open.
failure_modes:
- Jump-risk premia may require overnight or multi-day exposure rather than a same-day
  NQ hold.
- Jump estimates from one-minute OHLC bars may be too noisy.
- Results may concentrate in crisis windows or a few large sessions.
- The edge may overlap economically with rejected realized-volatility, semivariance,
  VIX/VXN, or tail-risk state families.
- NQ may simply continue in the direction of prior jumps rather than revert or earn
  a stable premium.
duplicate_edge_check:
  active_scope_only: false
  archived_tests_ignored: false
  checked:
  - nq_realized_semivariance_asymmetry
  - nq_semivariance_orderflow_confirmation
  - nq_vvix_tail_risk_intraday
  - nq_cboe_vxn_vix_dispersion_intraday
  - nq_volatility_managed_intraday_premium
  - nq_intraday_invariance_dislocation_reversion
  - es_realized_jump_variation_premium
  conclusion: Eligible only as an NQ symbol-transfer campaign because no NQ realized
    jump-variation campaign or staged result exists. It is not an independent edge
    relative to the failed ES realized-jump family, and any NQ failure closes this
    transfer rather than spawning renamed duplicates.
