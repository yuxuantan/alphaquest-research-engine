campaign_name: nq_aqr_bab_factor_state
campaign_id: nq_aqr_bab_factor_state
instrument: NQ
decision: FAIL
created_at: '2026-06-22'
reason_for_decision: Ported from the strongest remaining ES-derived campaign after prior NQ rejections. The edge
  uses public lagged AQR BAB state data and does not depend on ES-specific orderflow.
edge_hypothesis: Lagged U.S. Betting Against Beta factor weakness may identify leverage-constraint or defensive-factor
  stress states that condition same-day NQ intraday risk appetite after a conservative public-data availability
  lag.
why_it_may_apply_to_nq_futures: NQ is more growth- and high-beta-sensitive than ES, so lagged BAB stress may condition
  technology-heavy index futures risk demand more strongly than broad-market ES. The test must still survive NQ
  costs, next-bar execution, WFA, monkey robustness, and prop-style drawdown rules.
research_sources:
- title: Betting Against Beta
  author: Andrea Frazzini and Lasse H. Pedersen
  year: 2014
  link_or_doi: https://doi.org/10.1016/j.jfineco.2013.10.005
  expected_mechanism: Documents the BAB anomaly and its link to leverage constraints, high-beta demand, and funding-liquidity
    pressure.
- title: 'Betting Against Beta: Equity Factors, Daily'
  author: AQR Capital Management
  year: 2026
  link_or_doi: https://www.aqr.com/Insights/Datasets/Betting-Against-Beta-Equity-Factors-Daily
  expected_mechanism: Provides free public daily long/short BAB equity factor returns for U.S. equities and international
    markets, updated monthly.
behavioural_or_microstructure_rationale: A poor lagged BAB state may reflect recent pressure in low-beta-versus-high-beta
  relative value and leverage-constrained positioning. NQ trades test whether that state carries into same-day technology-index
  futures risk demand without requiring overnight exposure.
expected_failure_modes:
- The BAB anomaly is cross-sectional and may not predict NQ direction.
- AQR daily factor values are updated monthly, so the 45-calendar-day lag may make the state too stale.
- The effect may be concentrated in a few crisis or tech-beta unwind periods.
- Costs, one-tick-worse slippage, WFA selection, or prop-style drawdown rules may erase any apparent edge.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/aqr_bab_equity_factors_daily.xlsx
- data/external/nq_aqr_bab_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_es_aqr_bab_features.py
  output: data/external/nq_aqr_bab_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  lookahead_control: Each NQ session uses only the latest AQR BAB observation at least 45 calendar days old; no
    same-day or prior-day AQR values are used because the public file is updated monthly.
session_assumptions:
  timezone: America/New_York
  rth_start: 09:30:00
  rth_end: '15:59:00'
  no_overnight_positions: true
  latest_variant_flatten: '15:55:00'
forbidden_forms_of_lookahead:
- Using an AQR BAB observation that is not at least 45 calendar days old on the NQ session date.
- Using current-session NQ OHLCV, final RTH close, or post-entry data to form the signal.
- Changing BAB feature columns, entry times, direction, threshold grids, stop grids, or target grids after seeing
  NQ results.
duplicate_edge_review:
