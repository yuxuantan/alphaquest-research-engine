research_metadata:
  academic_source: Johnson (2016); Takahashi (2025); Chordia, Roll, and Subrahmanyam
    (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Extreme same-clock aggressive signed-flow plus same-direction price
    movement may be temporary inventory pressure that mean-reverts after the completed
    impulse.
  mechanic: At 11:30 ET, use the completed rolling 15-minute ES signed-flow rank and
    return. If flow rank and return point the same way, fade that impulse at the next
    1-minute bar open.
  timeframe_rationale: One-minute bars preserve the completed 15-minute signal window,
    next-bar execution, and pessimistic same-bar stop/target handling.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: "This variant expresses the same impulse-reversal edge\
      \ on a longer 15-minute window. It requires an extreme same-clock signed-flow\
      \ rank and a same-direction completed return, so the trade only occurs after\
      \ both liquidity-taking pressure and price displacement are visible. The entry\
      \ fades that impulse, which is the expected behavior if inventory-bearing liquidity\
      \ providers force partial correction.\n Rescue 1 keeps this exact impulse-reversal\
      \ mechanic; it only changes the predeclared parameter space after the original\
      \ failed limited core."
    entry_logic_rationale: 'The 11:30 ET slot avoids the most chaotic first-hour auction
      while retaining active late-morning liquidity. All inputs are known only after
      the 11:29-11:30 bar closes, and the engine enters at the next 1-minute open,
      so the signal cannot benefit from the subsequent reversal path.

      '
    stop_loss_rationale: 'The signal-bar extreme is the correct invalidation point
      because a reversal thesis is wrong if price keeps extending beyond the completed
      impulse. The stop-offset grid is intentionally small and discrete, preserving
      a price-action stop while allowing a one- to four-tick buffer around the signal
      high or low.

      '
    target_exit_rationale: "A fixed-R retracement target matches the hypothesis that\
      \ the impulse partially unwinds after inventory pressure is absorbed. It does\
      \ not require identifying a future VWAP, final range, or discretionary level,\
      \ and the target multiples remain modest to avoid demanding a trend reversal.\n\
      \ Rescue 1 shifts the target grid toward smaller retracements because the original\
      \ formulation tested deeper retracements and the same thesis can reasonably\
      \ express as a faster micro-reversion."
    profitability_rationale: 'If late-morning signed-flow impulses often overshoot
      because liquidity providers are compensated to take the other side, fading the
      completed impulse can capture a short retracement with controlled risk. The
      same-clock rank threshold should keep signals frequent enough while still focusing
      on unusual pressure.

      '
    known_failure_modes: 'The flow impulse may be genuinely informed and continue
      after entry, especially around news or broad index repricing. The longer 15-minute
      window may also enter late after most of the reversal has already occurred,
      and ES costs can overwhelm small retracement targets.

      '
    pre_test_decision: approve_for_testing
