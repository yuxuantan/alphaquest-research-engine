research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Campbell, Grossman, and Wang (1993); Bouchaud, Farmer, and Lillo (2009)
  edge_thesis: Extreme same-clock NQ signed-flow rank with high effort-vs-result but weak completed-window price displacement
    may identify absorption or exhausted aggressive flow; fading that flow may capture same-day reversal after costs.
  mechanic: At 12:30 ET, use the completed rolling 30-minute orderflow window. If same-clock signed-flow rank is extreme and
    effort-vs-result rank is high but absolute return is small, fade the flow direction at the next 1-minute bar open; flatten
    at 13:30 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve completed rolling orderflow windows, same-clock ranks, exact slot timing, and
    next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    status: failed_screen_before_pnl
    artifact: research_artifacts/nq_orderflow_absorption_exhaustion_reversal_density_audit_20260630.md
    detail_csv: research_artifacts/nq_orderflow_absorption_exhaustion_reversal_density_audit_20260630.csv
    decision: FAIL
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by measuring a fixed completed rolling NQ orderflow window at
      one predeclared time slot. It requires an extreme same-clock signed-flow rank, high effort-vs-result rank, and small
      absolute price displacement, then fades the flow direction.
    entry_logic_rationale: The signal uses the completed 1-minute bar whose close equals the configured slot time. Rolling
      orderflow features and same-clock ranks are available only at that completed bar close, and the engine enters no earlier
      than the next bar open.
    stop_loss_rationale: The percent-from-entry stop is predeclared and rounded to tick; it rejects the absorption thesis
      when price continues against the fade after costs.
    target_exit_rationale: The fixed-R target tests whether the post-absorption reversal has enough magnitude before the same-day
      flatten time. There is no post-entry orderflow filter or discretionary exit.
    profitability_rationale: If aggressive flow is absorbed without proportional displacement, late liquidity demand may be
      exhausted. Fading that pressure should only survive if the reversal is frequent enough and large enough to overcome
      NQ slippage and commission.
    known_failure_modes: High effort with weak price movement may be hidden accumulation/distribution that later continues;
      same-clock ranks may be unstable; the ES source failed before WFA; the signal can be too sparse after strict effort
      and displacement filters.
    pre_test_decision: approve_for_testing
