instrument: ES
timeframe: 1m
edge_family: video_aoi_volume_profile_orderflow_range_and_trend_playbook
hypothesis: The video playbook claims orderflow at predefined auction-market areas of interest
  can identify trapped traders. This campaign converts that discretionary idea into completed-bar
  ES rules using prior value-area edges for the range model and prior LVN pullbacks for the
  trend model.
