  mechanics_summary:
  - LVNs are derived from current-session Sierra price-level bid/ask volume aggregated through
    the completed signal bar, using the lower 20% volume quantile and the LVN nearest the signal close.
  - Trend state requires the completed bar to be beyond the 30 elapsed-minute opening range and
    beyond developing VAH/VAL in the trade direction.
  - Price reaches the AOI when the completed pullback bar's low/high is within the configured
    profile-distance band around that Sierra developing LVN, followed by completed-bar absorption
    and next-3-minute-open entry.
