campaign_id: es_video_aoi_lvn_orderflow_playbook
title: ES Video AOI LVN Orderflow Playbook
decision: FAIL
created_at: '2026-06-21'
instrument: ES
timeframe: 1m
edge_family: video_aoi_volume_profile_orderflow_range_and_trend_playbook
hypothesis: The video playbook claims orderflow at predefined auction-market areas of interest
  can identify trapped traders. This campaign converts that discretionary idea into completed-bar
  ES rules using prior value-area edges for the range model and prior LVN pullbacks for the
  trend model.
sources:
- title: 74% Win Rate Trader Shares His EXACT OrderFlow Strategy ($2M+ Payouts)
  authors: Chart Fanatics / Trader Yush
  year: n.d.
  venue: Practitioner video notes supplied by user
  link: not available in attached notes
  relevance: 'Defines the tested process: build AOIs from market-generated levels and volume
    profile, then require absorption, delta, and trapped-trader confirmation.'
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  venue: Federal Reserve Bank of New York Economic Policy Review
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports public support/resistance levels as short-horizon reference prices.
- title: Do Investors Place Orders to Exploit Technical Analysis?
  authors: Kenneth A. Kavajecz and Elizabeth R. Odders-White
  year: 2004
  venue: Journal of Finance
  link: https://doi.org/10.1111/j.1540-6261.2004.00665.x
  relevance: Links technical levels to order placement and liquidity behavior.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates order-flow imbalance and pressure, while this campaign uses completed
    Sierra footprint fields rather than full depth-of-book OFI.
- title: CME Market Profile educational material
  authors: CME Group
  year: n.d.
  venue: Exchange practitioner research
  link: https://www.cmegroup.com/education.html
  relevance: Motivates value area, POC, and LVN auction-market context.
data_needs:
- Validated local Sierra ES 1-minute footprint imbalance cache in America/New_York.
- Prior RTH high/low features shifted from completed prior RTH session only.
- Prior-session approximate POC, VAH, VAL, and LVNs built inside the entry module from completed
  prior RTH bars only.
- Opening range high/low available only after the first 30 completed RTH one-minute bars.
- User-requested corrected 3-minute branch uses a generated Sierra developing VAP cache built
  from current-session price-level bid/ask volume through each completed native 3-minute bar.
data_quality_caveats:
- The supplied video discusses large trades above 200 ES lots, but the validated full-history
  local cache has no vendor-equivalent >200-lot print field. That branch is data-gated and
  not claimed here.
- The local cache is RTH-only for this footprint file, so overnight high/low variants are
  not tested in this campaign.
- Prior profile levels are approximated by distributing each completed 1-minute bar volume
  uniformly across its high-low tick range; this is not true volume-at-price.
- Corrected run4 replaces the OHLCV profile approximation for the 3-minute trend branch with
  Sierra SCID-derived developing volume-at-price fields. This is materially better for LVN
  identification, but it is still not MBO/queue reconstruction or full DOM sequencing.
- Sierra footprint imbalance and absorption fields are completed-bar research fields, not
  full queue reconstruction.
lookahead_risks:
- Prior profile, VAH, VAL, POC, LVNs, prior RTH high, and prior RTH low are computed only
  after the previous RTH session is complete.
- Opening-range levels are unavailable until the first 30 RTH bars have closed.
- Signals use only the completed signal bar; entry is no earlier than the next 1-minute open.
- Corrected run4 developing VAP fields are blank until 10 completed 3-minute RTH bars exist,
  then each row uses only current-session price-level volume through that completed bar.
- No final current-session VWAP, final profile, final daily range, future high/low, future
  footprint, or future orderflow is used.
