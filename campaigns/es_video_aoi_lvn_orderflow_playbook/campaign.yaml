  configured_full_subset:
    start_date: '2012-01-03'
    end_date: '2026-05-29'
    session_labels:
    - RTH
  resolved_limited_core_subset:
    start_date: '2012-02-22'
    end_date: '2013-07-31'
    session_labels:
    - RTH
  total_combinations: 405
  profitable_combinations: 0
  benchmark_passing_combinations: 0
  apex_rule_violating_iterations: 0
  failure_reason: All five exact-video proxy variants failed limited_core_grid_test on the
    repo's seeded shortlist slice; no variant reached monkey, WFA, Monte Carlo, simulated
    incubation, or acceptance OOS.
  mechanics_summary:
  - >-
    AOI requires at least two of the video's four criteria: market-generated levels, current-session
    developing volume profile/LVN, ES large-200 aggregate activity, and delta activity.
  - >-
    Market-generated levels include prior RTH high/low, overnight high/low, and only data-present
    ORB fields. Exact 30-second ORB is unavailable and is not approximated.
  - >-
    Volume profile/LVNs use current-session Sierra price-level VAP through the completed 3-minute
    signal bar, never the final session profile.
  - >-
    Model 1 range variants trade false breaks at developing VAH/VAL with absorption/trapped-flow
    confirmation and structural targets at midpoint or the opposite value edge.
  - >-
    Model 2 trend variants wait for acceptance above/below developing value, pullback into an LVN,
    absorption/trapped-flow confirmation, and trend-direction delta shift, then target prior structural
    highs/lows when valid.
  - >-
    Entry is next 3-minute open after the completed signal bar. Stops sit beyond the signal-bar
    wick/AOI invalidation using `sweep_extreme`. Targets use `signal_price` with fixed-R fallback.
  data_gates:
  - >-
    Historical cache has no exact 30-second ORB columns, so that confluence remains disabled.
  - >-
    Live tape speed, DOM queue behavior, and MBO bubble sequencing are unavailable in the cache.
  - >-
    Partial trims, discretionary add-ons, and dynamic trailing remainder are not represented by
    the single-target staged backtest engine.
