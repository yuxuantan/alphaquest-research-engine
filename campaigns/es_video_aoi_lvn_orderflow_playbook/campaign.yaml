data_needs:
- Validated local Sierra ES 1-minute footprint imbalance cache in America/New_York.
- Prior RTH high/low features shifted from completed prior RTH session only.
- Prior-session approximate POC, VAH, VAL, and LVNs built inside the entry module from completed
  prior RTH bars only.
- Opening range high/low available only after the first 30 completed RTH one-minute bars.
data_quality_caveats:
- The supplied video discusses large trades above 200 ES lots, but the validated full-history
  local cache has no vendor-equivalent >200-lot print field. That branch is data-gated and
  not claimed here.
- The local cache is RTH-only for this footprint file, so overnight high/low variants are
  not tested in this campaign.
- Prior profile levels are approximated by distributing each completed 1-minute bar volume
  uniformly across its high-low tick range; this is not true volume-at-price.
- Sierra footprint imbalance and absorption fields are completed-bar research fields, not
  full queue reconstruction.
lookahead_risks:
- Prior profile, VAH, VAL, POC, LVNs, prior RTH high, and prior RTH low are computed only
  after the previous RTH session is complete.
- Opening-range levels are unavailable until the first 30 RTH bars have closed.
- Signals use only the completed signal bar; entry is no earlier than the next 1-minute open.
- No final current-session VWAP, final profile, final daily range, future high/low, future
  footprint, or future orderflow is used.
