    VAP, but did not yet implement the transcript's explicit four-criterion AOI gate with
    overnight levels and ES 200-lot big-trade aggregate proxy.
  failure_reason: The corrected native 3-minute Sierra developing VAP branch failed limited_core_grid_test;
