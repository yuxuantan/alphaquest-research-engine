research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 4
  source_video: https://www.youtube.com/watch?v=hvyf6frvCcA
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov, and
    Stoikov (2014); CME market profile educational material
  edge_thesis: Result-informed but predeclared search for video-grounded ES AOI/LVN orderflow variants after run9 found profitable
    core pockets that failed losing-streak, sample-size, and best-day concentration gates.
  mechanic: Short-only Model 2 trend LVN pullback with tighter AOI-reach and absorption variants, up to two AOI confirmations
    per session, and a one-contract first-target proxy.
  timeframe_rationale: The video states Yush uses 3-minute ES structure. Run9 keeps native 3-minute Sierra footprint/VAP rows,
    exact raw 30-second ORB market levels, and next-bar-open execution.
  mechanics_review:
    mechanic_expresses_edge: Short-only Model 2 trend LVN pullback with tighter AOI-reach and absorption variants, up to two
      AOI confirmations per session, and a one-contract first-target proxy.
    entry_logic_rationale: 'Run10 keeps the same completed-bar video AOI framework as run9: current-session developing VAP/LVN,
      RTH PDH/PDL, overnight high/low, exact 30-second ORB, large-200 aggregate proxy, delta activity, absorption/trapped
      traders, and next 3-minute open entry.'
    stop_loss_rationale: Stop remains beyond the completed signal-bar wick/AOI invalidation with a small predeclared tick
      offset grid.
    target_exit_rationale: 'The video targets highs/lows and trails a remainder. Because the engine is one-position/all-out,
      run10 uses a conservative first-target proxy: structural high/low can be used once it is at least 1R away; otherwise
      the fallback target is predeclared over 1.5R, 2R, and 3R.'
    profitability_rationale: The strategy should only work if repeated same-session LVN pullbacks into confluenced AOIs identify
      trapped buyers whose exits continue the downtrend.
    known_failure_modes: This is a result-informed variation search and may overfit. It still lacks live tape speed, DOM sequencing,
      vendor bubble sequencing, partial exits, and true dynamic trailing.
    pre_test_decision: approve_for_testing
  video_transcript_mechanics:
    aoi_rule: At least two of market-generated levels, volume profile, big trades, and delta activity must align before waiting
      for price to return.
    market_levels: PDH/PDL RTH, overnight high/low from 21:00-09:29 ET, and 30-second ORB high/low. This cache includes PDH/PDL,
      overnight high/low, and exact raw Sierra 30-second ORB high/low.
    volume_profile: Current RTH developing volume profile, including value area and LVN/low-volume pockets.
    model1_range: In balance/chop, wait for price at value-area edge, false break/look above-or-below and fail, absorption/trapped
      aggressive traders, then target midpoint or opposite value edge.
    model2_trend: In trend, wait for pullback into low-volume pocket/LVN, look for absorption/trapped traders and delta/large-record
      confirmation, then target highs/lows and trail remainder when discretionary trading allows.
    unsupported_in_engine:
    - live tape speed
    - DOM queue behavior
    - partial trim
    - dynamic trailing stop
    - average-up add-on entries
  supersedes_test_run_ids:
  - run9
  supersession_reason: Run10 is explicitly user-authorized after run9 found profitable but benchmark-failing core pockets;
    it tests the video-aligned exit approximation rather than adding a new filter.
