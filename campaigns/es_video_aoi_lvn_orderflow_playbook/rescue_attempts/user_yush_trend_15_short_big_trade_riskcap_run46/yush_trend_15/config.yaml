research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    Short-trend pullbacks into developing LVN pockets may continue lower when buy-side countertrend absorption
    fails and a large-record selling proxy confirms participation, but the setup should be rejected when the
    intrabar path has already made the modeled stop too wide.
  mechanic: >-
    yush_trend_15 keeps the normalized short LVN entry, fixed 1R target, and 6.0-point maximum known signal risk,
    but requires big_trades AOI confluence. Market-level confluence is allowed rather than forbidden; this tests
    whether large-record confirmation, not public-level exclusion, is the relevant participation filter.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record timestamp granularity inside
    the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: >-
      This variant tests whether the short LVN reaction is only viable when the failed pullback has both compact
      invalidation distance and large-record confluence. It is result-informed by yush_trend_8 and yush_trend_14
      failures and must be treated as a diagnostic branch.
    entry_logic_rationale: >-
      Entry uses only the prior completed 3-minute profile/context plus sequential SCID records seen up to the
      decision timestamp. A confirmed short rejection is rejected unless big_trades is in the AOI confluence list
      and unless the modeled stop distance is <= 6.0 ES points.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar rejection path high with a fixed tick offset. The entry filter only
      prevents opening positions whose known stop distance is already too wide.
    target_exit_rationale: >-
      The target remains fixed at 1R from actual entry and modeled stop to isolate whether risk-capping improves
      the same short scalp mechanics rather than changing both entry and exit simultaneously.
    profitability_rationale: >-
      This should only improve the branch if short LVN continuation needs a large-record participation proxy while
      still accepting market-level confluence. It should fail if the short LVN signal itself lacks positive
      expectancy after costs.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price absorption are approximations. Large-trade confluence is a Sierra record-volume proxy.
      The 6-point risk cap and big-trade requirement are result-informed and can reduce density.
    pre_test_decision: approve_for_testing
