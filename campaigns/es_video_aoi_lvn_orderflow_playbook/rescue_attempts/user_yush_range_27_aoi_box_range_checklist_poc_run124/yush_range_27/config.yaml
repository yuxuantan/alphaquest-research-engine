research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range AOI-box checklist supplied by user in screenshots on 2026-07-09, latest-one-month POC
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: In a balanced ES auction, compact confluence zones that combine public reference levels with developing
    value-area/LVN levels may produce stop-entry reversals when a delta-profile or large-trade bubble forms in or past
    the box and price then escapes two ticks outside the box.
  mechanic: Fixed-mechanics latest-one-month POC replication of the user's screenshot checklist. The evaluator requires a range state
    with stable 30-minute session range, centered POC, at most one LVN inside value, failed-breakout evidence, and repeated
    reversals near similar levels. AOI boxes must contain at least one market level and one developing volume-profile level,
    be no wider than 3 ES points, and be tapped or exceeded before a qualifying delta-profile or 100ms big-trade bubble
    forms in or past the box. Entry uses a stop-entry trigger two ticks outside the AOI box, maximum three flat-to-flat
    entries per day, and an 09:00-11:00 ET trade window.
  timeframe_rationale: The strategy uses 3-minute bars for session context and completed-bar range evidence while entering
    at Sierra SCID-record timestamp granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: This is a direct implementation of the screenshot checklist rather than a parameter rescue.
      It combines compact market-level/profile-level AOI confluence, range-bound auction state, bubble confirmation, and
      stop-entry breakout out of the AOI box.
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the decision timestamp. It does not wait for
      the 3-minute bar close. AOI tap/bubble state can be stored intrabar, but the range state must pass at the entry tick
      before any signal is emitted.
    stop_loss_rationale: Stop is two ES ticks outside the opposite side of the AOI box and is rejected if the resulting
      risk exceeds 5 ES points. After price reaches the midpoint of the developing value area, the backtest moves the stop
      to entry plus/minus 1.25 points using ordered SCID detail when available.
    target_exit_rationale: Target is the opposite edge of the developing value area from the entry side. Signal-price
      target fallback is fixed at 2R only if the signal target is unavailable or invalid.
    profitability_rationale: The mechanism should only work if compact AOI boxes define a local failed-auction boundary
      and the stop-entry escape out of the box catches repeated movement back across value before the 11:00 flatten.
    known_failure_modes: Red USD news filtering is represented only by configurable no-trade windows; no durable red-news
      calendar was found or added for this run. Sierra SCID records are not exchange MBO sequencing. The 09:00-09:30
      requested guardrail can only build context from the available RTH cache plus existing overnight/previous-day level
      fields; actual entries still require is_rth=true in the engine. Switch-account-after-trade is execution governance,
      not a single-account historical backtest feature.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 1
    max_entries_per_day: 3
    verdict_policy: FAIL if the POC is non-positive, if trade count is too sparse for robustness, if the 50k prop constraints
      fail, or if the result relies on concentration. A positive one-month POC is not a staged pass and still requires full
      staged validation before candidate promotion.
