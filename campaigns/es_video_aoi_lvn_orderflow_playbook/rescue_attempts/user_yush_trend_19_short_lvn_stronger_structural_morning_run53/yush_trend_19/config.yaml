research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    Short-trend pullbacks into developing LVN pockets may continue lower when the session trend is already strong,
    buy-side countertrend absorption fails, and the first structural downside target is far enough to pay for the
    modeled risk.
  mechanic: >-
    yush_trend_19 is a frozen timing diagnostic of yush_trend_18. It keeps the same SCID intrabar short-LVN
    pullback/risk-cap mechanics, stronger-trend settings, sweep-extreme stop, and structural signal target, but
    only allows entries from 10:00:00 through 11:59:59 America/New_York. The timing filter is result-informed from
    yush_trend_18 and is tested here on a separate older six-month window.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record timestamp granularity inside
    the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: >-
      This branch tests whether the short LVN setup only has economic support in the first two post-open hours,
      when liquidity discovery and public-level continuation pressure are more active.
    entry_logic_rationale: >-
      Entry uses only prior completed 3-minute profile/context plus sequential SCID records seen up to the decision
      timestamp. A confirmed short LVN pullback rejection is rejected when the modeled stop distance exceeds 6.0 ES
      points, and entries outside 10:00:00 through 11:59:59 ET are ignored.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar rejection path high with a fixed two-tick offset. The entry filter only
      prevents opening positions whose known stop distance is already too wide.
    target_exit_rationale: >-
      The target reads the signal's structural downside target when it is at least 1R away; otherwise it falls back
      to 3R. This mirrors the completed-bar first-target proxy while remaining deterministic.
    profitability_rationale: >-
      This should only survive if the yush_trend_18 morning split reflects a persistent session-time edge rather
      than a sample-specific artifact. It should fail if the older window does not show similar economic quality.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price absorption are approximations. The 10:00-11:59 timing filter is explicitly result-informed
      and must be treated as a diagnostic branch, not as an independently discovered rule.
    pre_test_decision: approve_for_testing
