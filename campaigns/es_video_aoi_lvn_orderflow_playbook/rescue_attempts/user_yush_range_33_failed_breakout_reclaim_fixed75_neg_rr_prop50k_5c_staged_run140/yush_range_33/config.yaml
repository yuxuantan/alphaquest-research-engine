research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range AOI/failed-breakout mechanics supplied by user/video checklist, recast as a
    funded-account negative-RR fixed-dollar management test.
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont,
    Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: Failed stop-runs through visible prior-session/opening levels may revert after a fast reclaim when
    intrabar orderflow confirms the reclaim direction. This branch tests whether the same entry event has enough
    small-target hit rate and payout-day distribution under five-contract 50k funded-account constraints.
  mechanic: Two-sided SCID-record failed-breakout reclaim around PDH/PDL/PDC/ONH/ONL/ORH/ORL. A long setup requires
    the developing 3-minute record path to sweep below a level, reclaim it, hold above it, and confirm orderflow in the
    reclaim direction; shorts mirror above the level. Entry timing and orderflow are frozen from yush_range_28. Trade
    management changes to five ES contracts, fixed $75 per-contract target, and a fixed-dollar wider stop grid.
  timeframe_rationale: Three-minute bars provide session context and known visible levels while Sierra SCID records
    provide sequential intrabar sweep/reclaim/confirmation timing before entry.
  mechanics_review:
    mechanic_expresses_edge: >
      This is not a new level-selection search. It freezes the yush_range_28 failed-breakout reclaim entry and tests a
      predeclared negative-RR payout profile requested for prop-style consistency. The branch is rejected if it only
      produces isolated lucky payout days or fails staged random-entry controls.
    entry_logic_rationale: >-
      Entry uses only levels known at decision time: prior RTH high/low/close, overnight high/low,
      and the first 32 seconds of RTH for ORH/ORL. Sweep, reclaim hold, and orderflow confirmation are evaluated from
      sequential SCID records before the signal timestamp.
    stop_loss_rationale: The stop is a fixed-dollar per-contract stop rounded to ES ticks and deliberately wider than
      the fixed target. It tests whether the reclaim event can hit the small target often enough without unacceptable
      tail losses or payout concentration.
    target_exit_rationale: The target is fixed at $75 per contract because five ES contracts generate a roughly $287.50
      net target day after modeled costs, matching the requested $250 funded-payout day threshold.
    profitability_rationale: The branch must pass staged core, monkey, WFA, Monte Carlo, incubation, and acceptance
      controls. Sparse winners or rows selected only after seeing results are not acceptable evidence.
    known_failure_modes: Sierra SCID records are close-only aggregates rather than exchange MBO sequencing. A
      negative-RR profile can look attractive on win rate while failing net expectancy, drawdown, random-entry
      separation, or best-day concentration. Reject if any staged gate fails.
    pre_test_decision: approve_for_testing
