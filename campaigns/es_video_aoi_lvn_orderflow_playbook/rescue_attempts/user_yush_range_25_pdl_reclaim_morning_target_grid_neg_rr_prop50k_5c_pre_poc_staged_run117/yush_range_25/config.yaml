research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush range / absorption mechanics supplied by user, PDL reclaim-failure morning target-grid
    negative-RR diagnostic
  academic_source: Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004); Cont, Kukanov,
    and Stoikov (2014); CME market profile educational material.
  edge_thesis: Failed upside retests of the previous RTH low may trap aggressive buyers below prior-day value. This
    branch tests whether the morning PDL reclaim impulse can support a larger negative-RR target, increasing net
    per trade enough to separate from random entries.
  mechanic: Morning target-grid negative-RR branch from yush_range_24. It keeps short-only PDL sweep/reclaim-failure
    continuation, morning cutoff grid 11:30/12:00 ET, absorption_delta_threshold fixed at 300, known bucket-edge
    signal risk <=4.0 ES points, one trade/day, five ES contracts, and tests fixed $75/$100/$125 targets against
    $150/$200 stop choices. Every target remains below every stop.
  timeframe_rationale: The strategy uses 3-minute bars for ATR and PDL sweep context while entering at SCID-record
    timestamp granularity inside the developing 3-minute bar.
  mechanics_review:
    mechanic_expresses_edge: This branch tests whether the core morning PDL reclaim entries have enough follow-through
      beyond the minimum payout-day target to overcome the random-entry net-profit gate.
    entry_logic_rationale: Entry uses only sequential SCID records seen up to the decision timestamp before the
      selected morning cutoff. It enters short when PDL has been swept, positive delta in the 1-point bucket reaches
      300, price has held below the bucket for three seconds, and logged bucket-edge signal risk is <=4.0 points.
    stop_loss_rationale: The tested stop is a fixed-dollar per-contract stop, rounded to ES ticks. Stop choices
      remain wider than all tested target choices.
    target_exit_rationale: The target grid tests whether the morning PDL reclaim impulse has enough follow-through
      for $100/$125 targets, rather than only the minimum $75 payout-day target that failed monkey separation.
    profitability_rationale: This can pass only if the morning PDL reclaim short impulse reaches larger negative-RR
      targets often enough to raise core net profit above random-entry timing, then survive WFA, Monte Carlo, and
      50k funded-account consistency gates.
    known_failure_modes: Higher targets may convert the clean core hit rate into stops or still fail monkey separation
      if random morning entries share the same favorable path. Sierra SCID records are not exchange MBO sequencing.
      Reject if any staged gate fails.
    pre_test_decision: approve_for_testing
  prop_consistency_target:
    account_size: 50000
    min_winning_days: 5
    min_winning_day_net_pnl: 250
    max_best_day_profit_share: 0.5
    contracts: 5
    max_entries_per_day: 1
    verdict_policy: FAIL if net profit is non-positive, fewer than five session days are >= $250 net PnL, best profitable
      day is more than 50% of total net profit, validation is not clean, daily loss exceeds the configured 50k limit,
      or any official staged gate fails. Treat any pass as a candidate strategy requiring manual review because
      this is a target-grid negative-RR funded-account branch after prior failures.
    entry_end_time_grid: &id001
