    - '12:00:00'
    absorption_delta_threshold: 300
    target_dollars_per_contract_grid: &id002
    - 75.0
    - 100.0
    - 125.0
    stop_dollars_per_contract_grid: &id003
    - 150.0
    - 200.0
    max_signal_risk_points: 4.0
