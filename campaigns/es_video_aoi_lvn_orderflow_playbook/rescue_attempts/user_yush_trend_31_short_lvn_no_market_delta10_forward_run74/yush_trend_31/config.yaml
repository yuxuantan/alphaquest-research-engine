research_metadata:
  mechanics_review_required: true
  mechanics_review_version: 1
  source_video: Trader Yush Model 2 trend LVN pullback mechanics supplied by user/video transcript
  academic_source: >-
    Chart Fanatics / Trader Yush video; Osler (2000); Kavajecz and Odders-White (2004);
    Cont, Kukanov, and Stoikov (2014); CME market profile educational material.
  edge_thesis: >-
    Short-trend pullbacks into developing LVN pockets may continue lower when buy-side countertrend absorption
    fails and the developing 3-minute SCID record replay also shows materially negative same-bar delta ratio.
  mechanic: >-
    Frozen forward-window rerun of yush_trend_31. It keeps the no-market
    risk-capped Model 2 short LVN pullback entry, min_trend_move_ticks=8, max_signal_risk_points=6.0,
    forbidden_aoi_criteria=[market_level], sweep_extreme stop, one signal per session, and minimum 1.5R structural
    target with 3R fallback. The only entry change is requiring cumulative same-bar signed volume divided by total
    same-bar volume to be <= -0.10 at the intrabar decision tick for shorts.
  timeframe_rationale: >-
    The strategy uses 3-minute bars for trend/LVN context and enters at SCID-record timestamp granularity inside
    the developing 3-minute bar when the pullback rejection is confirmed.
  mechanics_review:
    mechanic_expresses_edge: >-
      This run tests whether the yush_trend_31 delta-ratio short-LVN signal survives a separate forward six-month
      window without changing entry, stop, target, or session mechanics.
    entry_logic_rationale: >-
      Entry uses only prior completed 3-minute profile/context plus sequential SCID records seen up to the decision
      timestamp. It rejects any candidate whose AOI confluence includes market_level, rejects candidates whose
      known stop distance exceeds 6.0 ES points, and requires same-bar signed-volume ratio to be directionally
      aligned by at least 10% of cumulative same-bar volume at the decision tick.
    stop_loss_rationale: >-
      The stop remains beyond the intrabar rejection path high with a fixed two-tick offset. The entry filter only
      prevents opening positions whose known stop distance is already too wide.
    target_exit_rationale: >-
      Structural targets below 1.5R are treated as insufficient reward for the modeled stop and are replaced by the
      3R fallback. This keeps the yush_trend_26 target-quality rule frozen.
    profitability_rationale: >-
      This should only hold up if the stronger delta-ratio subset reflects persistent continuation pressure rather
      than a sample-specific filter from the latest positive-but-failed holdout.
    known_failure_modes: >-
      Sierra SCID records are not exchange MBO sequencing, so print ordering, queue behavior, and true
      footprint-at-price absorption are approximations. The mechanics are frozen from run73 and must be rejected
      unless this separate window shows robust economics and clean validation.
    pre_test_decision: approve_for_testing
