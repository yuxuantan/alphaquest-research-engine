research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: ES may continue in the direction of completed multi-timeframe intraday trend structure when same-bar aggregate orderflow confirms direction.
  mechanic: At the 12:30 ET completed bar, require 15-minute and 30-minute HH/HL for longs or LH/LL for shorts, plus aligned large-10 signed-flow imbalance.
  timeframe_rationale: 5-minute bars keep the price-action state completed and auditable while preserving enough intraday observations for one daily signal and 1-minute detail conflict handling.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-17"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge after the morning auction has matured but
      before late-day positioning dominates. It requires completed 15-minute and
      30-minute price-action trend alignment, then confirms that large-10 trade
      signed flow on the completed signal bar is pressing in the same direction.
    entry_logic_rationale: >
      The 12:30 ET signal tests whether trend and orderflow alignment persists
      through midday rather than only around the open. The trade is entered only
      after the completed 12:25-12:30 bar is known, so neither the final day range
      nor any future orderflow can affect the signal.
    stop_loss_rationale: >
      A percent stop is a conservative generic invalidation for a trend-state
      entry with no single structural price level. The grid varies only this risk
      width and does not alter the underlying price-action or orderflow trigger
      after results are observed.
    target_exit_rationale: >
      The fixed-R target asks whether the continuation state has enough follow
      through to pay for a mechanical risk unit after commissions and slippage.
      Any unresolved position is flattened at 15:55 ET, keeping exposure intraday.
    profitability_rationale: >
      This should be profitable if large-10 aggressive flow during an already
      aligned trend identifies institutional participation that continues beyond
      the signal bar. The pre-PnL density audit showed all declared entry corners
      above roughly 52 trades per year.
    known_failure_modes: >
      The setup can fail if midday ES trends are mostly liquidity drift that
      reverses, if large-10 prints are not a stable participation proxy, or if
      stop/target outcomes are dominated by a few high-volatility sessions.
    pre_test_decision: approve_for_testing
