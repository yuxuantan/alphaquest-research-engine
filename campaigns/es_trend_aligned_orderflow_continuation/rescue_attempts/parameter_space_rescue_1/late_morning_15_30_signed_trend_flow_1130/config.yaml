campaign_id: es_trend_aligned_orderflow_continuation
variant_id: late_morning_15_30_signed_trend_flow_1130
test_run_id: rescue1
strategy_name: trend_aligned_orderflow_continuation
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014); Moskowitz, Ooi, and Pedersen
    (2012)
  edge_thesis: ES may continue in the direction of completed multi-timeframe intraday trend structure when same-bar
    aggregate orderflow confirms direction.
  mechanic: At the 11:30 ET completed bar, require 15-minute and 30-minute HH/HL for longs or LH/LL for shorts,
    plus aligned total signed-volume imbalance.
  timeframe_rationale: 5-minute bars keep the price-action state completed and auditable while preserving enough
    intraday observations for one daily signal and 1-minute detail conflict handling.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by waiting until late morning, then requiring completed
      15-minute and 30-minute trend structure to agree. Unlike a raw signed-flow continuation rule, the total signed-volume
      imbalance can only trigger a trade when completed price action already shows directional persistence through
      HH/HL or LH/LL behavior.

      '
    entry_logic_rationale: 'The 11:30 ET signal gives the market time to move beyond the initial opening churn while
      leaving enough RTH time for continuation to play out. The entry uses the completed 11:25-11:30 bar for both
      orderflow and final trend state, and the engine can enter only on the next bar open.

      '
    stop_loss_rationale: 'A percent-from-entry stop avoids relying on an ex-post swing point and keeps risk tied
      to the actual fill. The grid is broad enough to test whether the trend-orderflow state needs a tight invalidation
      or a wider noise allowance without changing the underlying mechanic.

      '
    target_exit_rationale: 'A fixed-R target is matched to the percent stop so the payoff test remains mechanical
      and comparable across parameter combinations. Trades that do not resolve by target or stop are flattened at
      15:55 ET with no overnight exposure.

      '
    profitability_rationale: 'This should be profitable if broad aggregate aggressive flow after the opening hour
      confirms that the established price-action trend is still being pressed by liquidity takers. The pre-PnL density
      audit showed all declared entry corners above roughly 52 trades per year.

      '
    known_failure_modes: 'The setup can fail if total signed volume is noisier than large-trade flow, if late-morning
      trends are mean-reverting in ES after costs, or if the signal selects days where the easy continuation already
      occurred before entry.

      '
    pre_test_decision: approve_for_testing
    rescue_attempt: 'parameter_space_rescue_1: changed only fixed min_trend_move_ticks and the declared parameter
      grid; entry module, stop module, target module, data, costs, sessions, signal time, trend horizons, and flow
      mode are unchanged.'
