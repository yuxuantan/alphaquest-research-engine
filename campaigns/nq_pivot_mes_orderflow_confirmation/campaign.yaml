campaign_id: nq_pivot_mes_orderflow_confirmation
title: NQ Pivot-Filtered MES Crowding With Native Large-Trade Orderflow Confirmation
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny
timeframe: 1m
edge_family: nq_pivot_mes_crowding_native_large_trade_confirmation
hypothesis: MES participation crowding fades are more robust on NQ when completed swing-pivot structure supports the fade
  and completed native NQ large-trade signed flow confirms the fade direction before entry.
rationale: This is a distinct NQ composite derived from the strongest failed pivot-filtered MES crowding family. The prior
  NQ pivot/MES branch had strong core evidence but failed monkey robustness; this campaign adds a fixed completed native NQ
  large-trade orderflow confirmation and waits for the first confirmed pivot/MES candidate inside the predeclared window.
sources:
- title: Resolving a Paradox - Retail Trades Positively Predict Returns but Are Not Profitable
  authors: Brad M. Barber, Ching-Chi Lin, and Terrance Odean
  year: 2024
  venue: Journal of Financial and Quantitative Analysis
  link: https://www.cambridge.org/core/journals/journal-of-financial-and-quantitative-analysis/article/resolving-a-paradox-retail-trades-positively-predict-returns-but-are-not-profitable/6AAA9078F50C2597F44D73FA6A8E3F0D
  relevance: Motivates smaller-participant crowding as a temporary pressure source.
- title: Retail Traders in Futures Markets
  authors: CFTC Office of the Chief Economist
  year: 2024
  venue: CFTC staff research report
  link: https://www.cftc.gov/sites/default/files/2024-11/Retail_Traders_Futures_V2_new_ada.pdf
  relevance: Documents retail and Micro E-mini participation relevant to MES participation proxies.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: Supports fixed completed-pivot swing-state filters.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Motivates requiring the fade direction to align with a completed intraday structure state rather than fighting
    persistent repricing.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as short-horizon pressure evidence; this campaign uses completed aggregate NQ trade-flow
    fields, not quote-level OFI.
data_needs:
- data/cache/orderflow/nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny.csv
- NQ completed-bar OHLCV and aggregate native signed-volume fields
- MES notional and trade-share rank252 fields
- completed pivot state derived only from RTH bars
lookahead_risks:
- MES participation ranks use prior same-clock history and completed current bars only.
- NQ returns, pivot states, and orderflow windows are evaluated only after the signal bar close.
- Pivot highs/lows become usable only after right-side confirmation bars are complete.
- The orderflow veto uses completed rolling bars through the signal close and does not inspect post-signal bars.
- Entries are generated at signal close and filled no earlier than the next bar boundary by the staged engine.
failure_modes:
- Large-trade flow can indicate informed persistence rather than exhaustion.
- Waiting for a confirmed signal may select late entries after the reversal has already occurred.
- The MES participation proxy may still be informed activity rather than crowded weak-hand flow.
- NQ trend days may continue through pivot-aligned fade signals.
- The added orderflow gate may improve core results but still fail monkey, WFA, Monte Carlo, or prop-rule simulation.
