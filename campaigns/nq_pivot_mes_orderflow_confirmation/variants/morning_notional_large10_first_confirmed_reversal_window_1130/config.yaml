research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); Lo, Mamaysky, and Wang (2000);
    Moskowitz, Ooi, and Pedersen (2012); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: MES participation crowding fades are more robust on NQ when completed swing-pivot structure supports the fade
    and completed native NQ large-trade signed flow confirms the fade direction before entry.
  mechanic: From 10:30 through 11:30 ET, fade the first pivot-aligned MES notional-share crowding signal whose completed 30-minute
    native NQ large-10 signed flow agrees with the fade direction; flatten by 12:30 ET.
  timeframe_rationale: One-minute bars preserve completed NQ/MES participation ranks, native NQ aggregate orderflow fields,
    completed pivot state construction, next-bar execution, and deterministic intrabar stop/target pessimism.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-23'
  mechanics_review:
    mechanic_expresses_edge: From 10:30 through 11:30 ET, fade the first pivot-aligned MES notional-share crowding signal
      whose completed 30-minute native NQ large-10 signed flow agrees with the fade direction; flatten by 12:30 ET.
    entry_logic_rationale: The base pivot-filtered MES crowding signal is evaluated on completed NQ return and prior-history
      MES participation rank. The variant waits for the first such signal in the predeclared window whose completed 30-minute
      native NQ large-trade signed-flow imbalance agrees with the proposed fade direction.
    stop_loss_rationale: The percent-from-entry stop is declared before testing, rounded to the NQ tick, and varied only through
      the stop grid.
    target_exit_rationale: The fixed-R target and intraday flatten are predeclared; target_r_multiple is never below 1.0R.
    profitability_rationale: The source NQ pivot/MES branch had strong limited-core evidence but weak random-timing robustness.
      Requiring completed native large-trade confirmation is intended to reduce entries where pivot/MES crowding is not supported
      by same-market NQ flow.
    known_failure_modes: Large-trade flow can indicate continuation, first-confirmed entries can be late, and the campaign
      may still fail monkey, WFA, Monte Carlo, or prop-rule simulation.
    pre_test_decision: approve_for_testing
    source_nq_template: campaigns/nq_pivot_filtered_mes_participation_crowding_reversion/variants/morning_notional_two_sided_reversal_window_1130/config.yaml
    ported_before_new_pnl: true
  pre_pnl_density:
    artifact: research_artifacts/nq_pivot_mes_orderflow_confirmation_density_audit_20260623.md
    csv: research_artifacts/nq_pivot_mes_orderflow_confirmation_density_audit_20260623.csv
    variant_min_signals_per_year: 66.71618497109826
    variant_median_signals_per_year: 79.10231213872832
    variant_max_signals_per_year: 90.36242774566473
    nq_grid_fixed_before_pnl: true
