campaign_id: nq_mes_crowding_native_orderflow_confirmation
title: NQ MES Crowding With Native Orderflow Window Confirmation
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny
timeframe: 1m
edge_family: nq_mes_crowding_native_orderflow_confirmed_pullback_reversion
hypothesis: MES micro-participation crowding during an NQ trend-pullback is more informative for NQ when native completed-window
  NQ orderflow confirms pressure in the pullback direction before the fade entry.
rationale: This is a distinct NQ-specific expression of the strongest ES MES-crowding volatility-veto family. The prior NQ
  cross-index port failed monkey robustness; this campaign keeps the pre-existing crowding/volatility thesis but requires
  native NQ completed-window signed-flow pressure, targeting the random-timing weakness without using future bars.
