data_needs:
- data/cache/orderflow/nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny.csv
- data/external/nq_lagged_volatility_features_20110103_20260612.csv
- completed native NQ signed-volume fields embedded in the NQ/MES crowding cache
lookahead_risks:
- MES crowding ranks use same-clock prior-session history and completed current NQ pullback fields only.
- The NQ trend window ends before the pullback/crowding/orderflow confirmation window.
- Lagged NQ volatility gates are shifted to prior-session feature rows.
- Native NQ orderflow confirmation uses only completed bars in the configured window ending at the signal close.
- Entry is emitted at the signal-bar close and filled no earlier than the next-bar boundary by the staged engine.
failure_modes:
- MES may remain an ES-specific proxy and fail to capture NQ/MNQ crowding.
- Native NQ signed flow can confirm exhaustion rather than tradable reversal pressure.
- The orderflow gate can remove winners and keep losers if pressure persists after entry.
- The 10:30 reversal may remain vulnerable to randomized-timing monkey tests.
