research_metadata:
  academic_source: Gervais, Kaniel, and Mingelgrin (2001); Llorente, Michaely, Saar, and Wang (2002); Barber and Odean (2008); Cont,
    Kukanov, and Stoikov (2014); free local Yahoo SPY daily data
  edge_thesis: A one-week SPY directional move during abnormal volume may represent persistent broad index attention; ES trades only
    when intraday price and flow agree.
  mechanic: Two-sided ES continuation using prior SPY 5-day return direction and 63-day relative-volume attention rank.
  timeframe_rationale: Five-minute bars provide completed ES movement and aggregate signed-flow confirmation after the cash open while
    preserving next-bar execution and enough observations for 50+ trades/year.
  pre_pnl_density: 882 full-sample signals, about 57.16/year; limited-core reference about 58.49/year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the SPY turnover-attention edge by using the lagged volume_63 SPY attention rank
      and spy_5d SPY return direction as the broad-market attention state, then requiring completed ES price movement plus signed aggregate
      orderflow before entry.
    entry_logic_rationale: The SPY state is frozen from the latest daily close and volume strictly before the ES session. The intraday
      trigger uses only completed ES 5-minute bars at declared decision times, so it avoids same-day SPY lookahead and requires current
      ES participation to agree with the lagged attention state.
    stop_loss_rationale: A fixed percent stop is used because the edge thesis is directional attention/continuation, not a future-derived
      level. The stop is declared before testing and keeps risk comparable across attention thresholds.
    target_exit_rationale: A fixed-R target ties payoff to initial stop distance, enforces the 1.0R minimum, and avoids optimizing exits
      from future intraday levels or post-entry orderflow.
    profitability_rationale: If abnormal SPY turnover marks an attention or information event, then ES sessions where price and signed
      flow already continue in the same direction should have a better after-cost continuation distribution than unfiltered ES movement.
    known_failure_modes: High SPY volume can be risk-sharing rather than information, SPY may lag ES, same-day ES confirmation can enter
      late, and results may concentrate in volatility-regime dates.
    pre_test_decision: approve_for_testing
    rescue_change_summary: 'Parameter-space-only rescue: attention_rank_threshold grid, min_orderflow_imbalance grid, and stop_pct grid
      changed; target_r_multiple grid unchanged at [1.0, 1.5, 2.0].'
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_rationale: One allowed parameter-space-only rescue after limited-core failure. It preserves the SPY attention mechanic, entry/stop/target
    modules, signal schedule, data, timeframe, costs, sessions, fills, and validation gates. It only broadens attention-rank thresholds
    around the best original area, lowers signed-flow threshold granularity, and increases stop-distance candidates. TP remains unchanged
    because all target_r_multiple values are already at least 1.0R.
