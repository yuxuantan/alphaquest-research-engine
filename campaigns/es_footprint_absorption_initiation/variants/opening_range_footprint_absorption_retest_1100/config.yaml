research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Gould et al. (2013); Osler
    (2000)
  edge_thesis: Absorption at the completed opening range boundary can identify a
    failed early breakout and initiation back into the range or away from the boundary.
  mechanic: Two-sided 30-minute opening-range boundary retest. After the opening
    range is complete, low-side sell absorption and reclaim permits a long; high-side
    buy absorption and rejection permits a short. Entry is at the next 1-minute bar
    open.
  timeframe_rationale: One-minute bars preserve the local footprint feature semantics
    and allow the opening range to be defined by completed 1-minute bars.
  mechanics_review_required: true
  mechanics_review:
    mechanic_expresses_edge: This variant expresses absorption at the first major
      intraday reference range. A push outside the opening range that prints aggressive
      orderflow imbalance but closes back through the boundary is evidence of failed
      breakout pressure and initiation in the opposite direction.
    entry_logic_rationale: The first 30 completed RTH bars define the AOI before
      any signal is allowed. The signal bar must probe beyond the relevant boundary,
      show the correct absorbed footprint side, and close back through the boundary
      before the engine enters on the next bar.
    stop_loss_rationale: The signal-bar extreme is the point where the failed-breakout
      interpretation is invalidated. A small tick offset avoids placing the stop
      exactly at a crowded extreme.
    target_exit_rationale: A fixed-R exit tests whether the failed opening-range
      pressure has enough immediate reversal follow-through without needing future
      range information.
    profitability_rationale: Opening-range boundaries are widely watched and can
      concentrate early breakout orders. If footprint imbalance at the boundary is
      absorbed, trapped breakout participants can drive a short-horizon reversal.
    known_failure_modes: True trend days can break and continue; the first range can
      be too narrow; and two-sided tests can blend asymmetric long/short behavior.
    pre_test_decision: approve_for_testing
