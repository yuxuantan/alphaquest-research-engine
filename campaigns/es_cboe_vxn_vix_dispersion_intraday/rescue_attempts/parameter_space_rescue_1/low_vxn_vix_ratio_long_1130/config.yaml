campaign_id: es_cboe_vxn_vix_dispersion_intraday
variant_id: low_vxn_vix_ratio_long_1130
test_run_id: rescue1
strategy_name: cboe_vxn_vix_dispersion
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Giot (2005); Kablan, Emiroglu, and Danisoglu (2021); official Cboe VIX/VXN histories
  edge_thesis: Lagged Nasdaq-versus-S&P implied-volatility dispersion may identify same-day ES intraday risk-off pressure or rebound.
  mechanic: At 11:30 ET, buy ES when the latest prior Cboe VXN/VIX ratio rank is in the lower tail; flatten by 15:55.
  rescue_attempt: 1
  rescue_scope: parameter_space_only
  rescue_reason: Original low VXN/VIX ratio long failed limited core with zero profitable combinations; rescue preserves the same signal, direction, time, modules, data, costs, and gates while testing a lower-rank tail and wider stop/lower target neighborhood.
  timeframe_rationale: Low relative Nasdaq volatility can proxy broad risk appetite known before the session; the 11:30 completed-bar signal tests a late-morning expression while preserving next-bar execution.
