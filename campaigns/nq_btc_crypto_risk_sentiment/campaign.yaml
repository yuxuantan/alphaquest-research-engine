campaign_id: nq_btc_crypto_risk_sentiment
title: NQ BTC Crypto Risk Sentiment
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: btc_crypto_risk_sentiment_spillover
hypothesis: Lagged Bitcoin returns and volatility may proxy speculative risk appetite
  or crypto-market stress that spills into same-day NQ intraday drift.
rationale: This campaign tests a crypto risk-sentiment channel, distinct from the
  already rejected small-cap rotation, European/Tokyo international equity spillovers,
  dollar/JPY/oil shock, VIX/VVIX/variance, sector, ES/NQ relative-value, and NQ own-momentum
  families.
research_sources:
- title: New Evidence on Spillovers Between Crypto Assets and Financial Markets
  authors: Roshan Iyer and Adina Popescu
  year: 2023
  venue: IMF Working Paper WP/23/213
  link_or_doi: https://www.imf.org/-/media/files/publications/wp/2023/english/wpiea2023213-print-pdf.pdf
  expected_mechanism: Finds increasing return and volatility spillovers between crypto
    assets and global financial markets, with crypto assets often transmitting spillovers
    to financial markets.
- title: Crypto Prices Move More in Sync With Stocks, Posing New Risks
  authors: Tobias Adrian, Tara Iyer, and Mahvash S. Qureshi
  year: 2022
  venue: IMF Blog
  link_or_doi: https://www.imf.org/en/blogs/articles/2022/01/11/crypto-prices-move-more-in-sync-with-stocks-posing-new-risks
  expected_mechanism: Summarizes IMF evidence that Bitcoin return and volatility spillovers
    to stock markets increased as crypto became more connected to traditional risk
    assets.
- title: Why Bitcoin's Relationship with Equities Has Changed
  authors: CME Group OpenMarkets
  year: 2025
  venue: CME Group OpenMarkets
  link_or_doi: https://www.cmegroup.com/openmarkets/economics/2025/Why-Bitcoins-Relationship-with-Equities-Has-Changed.html
  expected_mechanism: Practitioner exchange research notes the post-2020 positive
    relationship between Bitcoin and Nasdaq-100/equity indices.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York
- Yahoo daily adjusted close and volume history for BTC-USD cached under data/external/yahoo_crypto_assets
- Derived lagged feature CSV data/external/nq_btc_crypto_risk_sentiment_features_20150115_20260612.csv
duplicate_edge_check:
  checked_edges:
  - nq_small_cap_relative_rotation
  - nq_europe_equity_close_spillover
  - nq_nikkei225_close_spillover
  - nq_dollar_risk_appetite_intraday
  - nq_usdjpy_safe_haven_spillover
  - nq_oil_price_shock_spillover
  - nq_cboe_vix_level_state_intraday
  - nq_vvix_tail_risk_intraday
  - nq_variance_risk_premium_intraday
  - nq_es_relative_value_orderflow_absorption_reversion
  - nq_daily_time_series_momentum
  conclusion: Eligible as a distinct NQ test because no local ledger/source campaign
    uses crypto/BTC returns or volatility as the edge input; the source state is lagged
    BTC, not equity-sector rotation, international cash equity close, FX/oil shock,
    volatility-index state, ES/NQ spread, or NQ-only momentum.
lookahead_risks:
- A session dated D can only use BTC-USD observations on or before D minus one calendar
  day.
- Rolling ranks are computed before the session-level as-of join.
- Signals use a completed NQ bar and enter no earlier than the next bar open.
- No same-day BTC close, final NQ session high/low, final VWAP, future BTC return,
  or post-entry path is used.
failure_modes:
- BTC/NQ correlation may be unstable by regime and may not forecast intraday NQ after
  costs.
- BTC may react to the same macro conditions as NQ rather than lead NQ.
- Yahoo crypto daily candles require vendor and timestamp convention verification
  before any promotion beyond candidate review.
