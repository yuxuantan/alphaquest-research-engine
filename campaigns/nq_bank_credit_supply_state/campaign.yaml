campaign_id: nq_bank_credit_supply_state
title: NQ Bank Credit Supply State
status: completed_failed_limited_monkey
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Strictly lagged Federal Reserve H.8 commercial-bank balance-sheet expansion may proxy credit creation, lending-channel risk appetite, and funding availability that influence same-day NQ RTH risk appetite.
rationale: The campaign uses weekly H.8/FRED commercial-bank credit, loans and leases, C&I loans, deposits, and total assets with a conservative 14-calendar-day lag. It is distinct from credit-spread, credit-ETF, OFR stress, consumer-credit, Treasury-rate, RRP/liquidity, and M2 campaigns because it tests commercial-bank quantity balance-sheet expansion rather than credit-price spreads, market stress indexes, household borrowing, rates, Fed facility usage, or broad money aggregates.
sources:
- title: Credit, Money, and Aggregate Demand
  authors: Ben S. Bernanke and Alan S. Blinder
  year: 1988
  venue: American Economic Review / NBER Working Paper 2534
  link: https://ideas.repec.org/p/nbr/nberwo/2534.html
  relevance: Motivates separate money and credit supply/demand shocks as aggregate-demand and asset-pricing state variables.
- title: What Do a Million Observations on Banks Say about the Transmission of Monetary Policy?
  authors: Anil K. Kashyap and Jeremy C. Stein
  year: 2000
  venue: American Economic Review
  link: https://www.aeaweb.org/articles?id=10.1257/aer.90.3.407
  relevance: Supports the bank-lending channel and the relevance of bank balance-sheet quantities to risk transmission.
- title: Assets and Liabilities of Commercial Banks in the United States - H.8
  authors: Board of Governors of the Federal Reserve System
  year: 2026
  venue: Federal Reserve Statistical Release H.8
  link: https://www.federalreserve.gov/releases/h8/current/default.htm
  relevance: Official weekly source family for bank credit, loans, deposits, and total assets.
- title: H.8 Assets and Liabilities of Commercial Banks in the United States
  authors: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/release?rid=22
  relevance: FRED release family used by the feature builder for reproducible CSV downloads.
behavioural_or_microstructure_rationale: Expanding commercial-bank balance sheets can reflect easier loan supply, improving credit creation, and stronger funding availability. For NQ, that may support growth-equity risk appetite, but any usable edge must survive costs, neighboring thresholds, monkey robustness, WFA, Monte Carlo, prop-rule simulation, and acceptance OOS.
expected_failure_modes:
- H.8 aggregate quantities may be too slow or already incorporated before RTH.
- Bank balance-sheet expansion may proxy broad macro regime rather than a same-day futures timing edge.
- The five long-only expressions may collapse into market beta and fail monkey or WFA robustness.
- Release revisions and aggregation changes may weaken real-time interpretability despite the 14-day lag.
data_needs:
- timezone-aware NQ RTH 1-minute bars in America/New_York
- FRED/Federal Reserve H.8 weekly TOTBKCR/TOTLL/TOTCI/DPSACBW027SBOG/TLAACBW027SBOG data cached under data/external/fred_bank_credit_supply_state
- 14-calendar-day as-of join from NQ sessions to weekly H.8 observations
lookahead_risks:
- A session dated D may only use the latest weekly H.8 observation on or before D minus 14 calendar days.
- Rolling ranks are computed on completed weekly observations before the NQ as-of join.
- Signals use completed one-minute bars and enter next bar open or later.
- No future NQ bar, final session range, final VWAP, final volume profile, or post-entry market state is used.
