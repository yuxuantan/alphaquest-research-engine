  checked_edges:
  - nq_default_spread_orderflow_risk_premium
  - nq_credit_etf_orderflow_risk_appetite
  - nq_ofr_financial_stress_intraday
  - nq_consumer_credit_state
  - nq_m2_monetary_aggregate_state
  - nq_treasury_rate_orderflow_confirmation
  - nq_nyfed_rrp_liquidity_state
  conclusion: Eligible before PnL as a distinct commercial-bank credit-supply quantity edge; no prior NQ H.8 bank-credit or bank-lending supply campaign was found in the ledger or campaign tree.
