campaign_id: es_cboe_skew_tail_risk_intraday
title: ES Cboe SKEW Tail Risk Intraday
decision: FAIL
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged Cboe SKEW states, measuring SPX option-implied downside-tail asymmetry, may identify
  ES intraday risk-off or risk-on pressure after the cash open.
rationale: This campaign tests option-implied skew/tail-risk state from Cboe SKEW. It is distinct from
  realized ES skewness, VVIX volatility-of-volatility, VIX-minus-realized variance risk premium, VIX expiration
  calendar pressure, put/call volume sentiment, OFR stress, Treasury shocks, ORB, VWAP, prior-level, and
  aggregate order-flow campaigns.
sources:
- title: 'Risk-Neutral Skewness: Evidence from Stock Options'
  authors: Patrick Dennis and Stewart Mayhew
  year: 2002
  venue: Journal of Financial and Quantitative Analysis, 37(3), 471-493
  link: https://ideas.repec.org/a/cup/jfinqa/v37y2002i03p471-493_00.html
  relevance: Documents option-implied risk-neutral skewness from Cboe options and connects negative skewness
    to market risk pricing.
- title: 'The Cboe SKEW Index: Extracting What Has Been Left'
  authors: Liuren Wu and related Cboe SKEW literature
  year: 2020
  venue: SSRN working paper on Cboe SKEW decomposition
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3121027
  relevance: Studies the Cboe SKEW index as SPX option-implied skewness and separates downside-tail information
    from other skew components.
- title: Cboe SKEW Index Dashboard and Historical Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe index page and daily historical CSV endpoint
  link: https://www.cboe.com/us/indices/dashboard/skew/
  relevance: Official free source and definition for SKEW, which estimates skewness of S&P 500 returns
    at a 30-day horizon.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- official free Cboe SKEW daily historical CSV
- derived session feature file using only Cboe observations strictly before the ES session date
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- SKEW is a daily closing SPX option-implied index, not an intraday options snapshot.
- Same-day Cboe closes are unavailable to intraday ES signals and must not be used.
- Sierra data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Using the Cboe close from the same ES session date would leak unavailable data and is forbidden.
- Signals use only a completed ES bar at the configured timestamp and lagged Cboe daily state.
- Rolling ranks are computed over the lagged session feature sequence only.
- No final session high/low, final VWAP, future returns, or post-entry SKEW values are used.
failure_modes:
- Option-implied skewness may price longer-horizon tail insurance rather than same-day ES futures direction.
- High SKEW may imply either bearish pressure or a compensated risk premium; the predeclared variants
  test only the stated directions.
- Daily SKEW states may be too slow for intraday ES timing.
- Performance may concentrate in crisis windows, single years, or isolated volatility events.
- The signal may overlap with broad volatility regimes and fail WFA stability.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_realized_skewness_reversal
  - es_vvix_tail_risk_intraday
  - es_variance_risk_premium_intraday
  - es_cboe_put_call_sentiment_intraday
  - es_volatility_managed_intraday_premium
  - es_vix_expiration_pressure
  - es_realized_jump_variation_premium
  conclusion: Not a duplicate of active failed campaigns. This tests lagged Cboe SKEW option-implied SPX
    return skew/tail asymmetry, not realized ES return skewness, VVIX volatility-of-volatility, VIX-minus-realized
    variance premium, option-volume put/call sentiment, or VIX settlement calendar pressure.
