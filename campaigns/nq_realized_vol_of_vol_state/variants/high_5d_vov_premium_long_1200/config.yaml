research_metadata:
  academic_source: Barndorff-Nielsen and Shephard (2002); Hollstein and Prokopczuk
    (2018); Huang, Schlag, Shaliastovich, and Thimme (2018)
  edge_thesis: A persistent high realized volatility-of-volatility state may command
    an intraday uncertainty premium without using same-day future information.
  mechanic: At 12:00 ET, long NQ when the prior 5-session average realized volatility-of-volatility
    rank is in the high tail; flatten by 15:55 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve the completed-bar decision time and
    next-bar-open execution while using lagged realized volatility-of-volatility state.
  rescue_status: none
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  pre_pnl_density:
    artifact: research_artifacts/nq_realized_vol_of_vol_state_density_audit_20260630.md
    selected_grid_min_signals_per_year: 69.500488
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: At 12:00 ET, enter long NQ when the prior 5-session
      average realized volatility-of-volatility rank is in the high tail. This tests
      a persistent uncertainty-premium state without using same-day volatility paths.
    entry_logic_rationale: The signal reads only the shifted prior-session 5-day
      volatility-of-volatility mean rank. The 11:59 completed bar is used as the
      decision clock for a 12:00 signal, and any fill occurs no earlier than the
      next bar open.
    stop_loss_rationale: A percent-from-entry stop is used because the edge is a lagged
      volatility state rather than a discrete chart level. The stop grid is declared
      before PnL, rounded to the NQ tick, and cannot reference future highs or lows.
    target_exit_rationale: A fixed-R target plus strict 15:55 ET flatten tests whether
      persistent volatility uncertainty can monetize intraday without discretionary
      exits or overnight exposure.
    profitability_rationale: The variant can only work if multi-session high volatility-of-volatility
      commands a robust NQ long premium after costs and realistic fill ordering.
    known_failure_modes: The ES source family failed; the NQ transfer can fail if
      the premium horizon is overnight, if persistent high uncertainty is bearish,
      if NQ has no symbol-specific response, or if profits are concentrated in one
      market regime.
    pre_test_decision: approve_for_testing
strategy:
  entry:
