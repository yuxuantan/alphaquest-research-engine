campaign_id: nq_manufacturing_orders_state
title: NQ Manufacturing Orders State
status: completed_failed
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Conservatively lagged manufacturing new-orders states may proxy forward production commitments, capital-spending demand, and cyclical growth pressure that affect same-day NQ intraday drift after the cash open.
rationale: This campaign tests a manufacturing new-orders state edge using FRED/Census AMTMNO, DGORDER, NEWORDER, and AMXTNO observations at least 45 calendar days old. It is distinct from industrial production, retail inventory demand, BLS release-day drift, CFNAI, EMV, EPU, and orderflow campaigns because it uses forward orders and production-commitment data, not realized output, consumer retail/inventory data, scheduled event drift, composite activity, uncertainty, or intraday flow.
research_sources:
- title: New Indexes of Coincident and Leading Economic Indicators
  author: James H. Stock and Mark W. Watson
  year: 1989
  link_or_doi: https://www.nber.org/books-and-chapters/nber-macroeconomics-annual-1989-volume-4/new-indexes-coincident-and-leading-economic-indicators
  expected_mechanism: Leading and coincident economic indicators motivate tests of forward-looking manufacturing orders as cyclical state variables.
- title: Manufacturers' Shipments, Inventories, and Orders (M3) Survey
  author: U.S. Census Bureau
  year: 2026
  link_or_doi: https://www.census.gov/manufacturing/m3
  expected_mechanism: The M3 survey measures current industrial activity and provides an indication of future business trends through shipments, inventories, and orders.
- title: 'Manufacturers'' New Orders: Total Manufacturing and related M3 series'
  author: U.S. Census Bureau via FRED, Federal Reserve Bank of St. Louis
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/AMTMNO
  expected_mechanism: Public monthly manufacturing-order series are used for strictly lagged NQ session state features.
