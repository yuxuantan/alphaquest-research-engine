research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Kavajecz and Odders-White (2004); Campbell, Grossman,
    and Wang (1993)
  edge_thesis: Fresh ES RTH highs or lows that are not confirmed by cumulative aggregate signed-volume
    progress may represent exhausted liquidity-taking pressure or absorption at the new extreme, making
    same-session mean reversion plausible after costs.
  mechanic: From 10:00 through 12:00 ET, use only completed RTH bars. If the signal bar makes a fresh
    session high by at least the grid threshold, closes no more than 8 ticks above the prior completed
    session high, and cumulative signed-volume progress since that prior high is below the grid threshold,
    enter short at the next 1-minute open. Flatten by 15:55 ET unless the stop or target is hit.
  timeframe_rationale: Morning extremes are frequent enough for the 50/year gate while avoiding the first
    20 minutes of opening noise. One-minute bars preserve the completed-bar extreme and cumulative-delta
    timing.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: The variant starts with a fresh current-session price extreme. The aggregate-orderflow
      condition asks whether cumulative signed-volume progress from the prior completed extreme confirms
      that extension. A weak progress ratio means price stretched without proportional aggressive flow,
      which is the intended absorption/exhaustion expression.
    entry_logic_rationale: From 10:00 through 12:00 ET, use only completed RTH bars. If the signal bar
      makes a fresh session high by at least the grid threshold, closes no more than 8 ticks above the
      prior completed session high, and cumulative signed-volume progress since that prior high is below
      the grid threshold, enter short at the next 1-minute open. Flatten by 15:55 ET unless the stop or
      target is hit. Rescue attempt 1 keeps the same fade of non-confirmed fresh session extremes but
      requires a cleaner failed-extension structure before entry.
    stop_loss_rationale: A percent-from-entry stop is observable at entry and does not depend on future
      highs/lows. It tests whether the non-confirmed extreme can reverse before adverse continuation overwhelms
      the setup.
    target_exit_rationale: A fixed-R target keeps exits independent of future session levels and lets
      the grid test modest mean-reversion payoffs without changing the entry edge.
    profitability_rationale: If fresh extremes without cumulative signed-volume confirmation mark failed
      liquidity-taking attempts, the next bars should revert often enough that modest fixed-R exits overcome
      ES commission, one-tick slippage, and pessimistic same-bar stop/target handling. The pre-PnL density
      audit confirms the declared grid is not relying on rare events.
    known_failure_modes: The apparent divergence may be hidden continuation, signed-volume may be too
      noisy, directional days may run through the fade, or costs and pessimistic fills may dominate.
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameters and declared grids inside existing modules: tightened
    close-to-prior-extreme tolerance, shifted fresh-extreme break grid away from 1-tick probes, and shifted
    stop grid wider. Entry module, stop module, target module, direction, timeframe, data window, costs,
    fills, and validation gates are unchanged.'
