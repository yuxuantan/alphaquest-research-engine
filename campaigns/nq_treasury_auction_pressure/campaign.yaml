  max_rescue_attempts_without_user_approval: 0
  reason: This is a frozen NQ transfer. After NQ testing begins, allow only rejection or candidate/manual-review
    promotion unless the user explicitly authorizes a rescue.
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change auction scope, direction, signal time, timeframe, data window, or core economic edge
  - add or remove filters after seeing results
  - alter costs, fills, sessions, validation gates, or prop rules
  - use auction outcome fields or same-day Treasury-yield information
