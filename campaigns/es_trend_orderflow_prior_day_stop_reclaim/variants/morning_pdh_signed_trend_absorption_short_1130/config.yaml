research_metadata:
  academic_source: Osler (2003, 2005); Kavajecz and Odders-White (2004); Cont, Kukanov, and Stoikov (2014);
    Lo, Mamaysky, and Wang (2000)
  edge_thesis: Prior RTH high/low stop-runs should mean-revert more reliably when the sweep fails in the
    direction of an already established completed-bar trend and the completed reclaim bar shows aggregate
    trade pressure absorbed into the failed sweep.
  mechanic: From 10:00 through 11:30 ET, trade only a prior-day-high sweep that rejects back below PDH
    while signed aggregate flow on the completed reclaim bar is buy-pressure absorbed into an already
    established downtrend.
  timeframe_rationale: The morning window targets the most common stop-run/liquidity-probe period after
    the opening auction while avoiding the first 30 minutes needed to form the pre-sweep trend state.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: From 10:00 through 11:30 ET, trade only a prior-day-high sweep that rejects
      back below PDH while signed aggregate flow on the completed reclaim bar is buy-pressure absorbed
      into an already established downtrend. Price alone cannot trigger; the signal needs a completed
      prior-day level sweep-reclaim, absorbed aggregate flow, and a pre-sweep trend snapshot that supports
      the reversal direction.
    entry_logic_rationale: The prior RTH level is fixed before the session. The module records completed
      bars before the sweep for trend state, records the completed sweep through PDH/PDL, then waits for
      a completed reclaim/rejection bar within the configured window. Because the signal uses the reclaim
      bar close and completed orderflow, the engine can only enter on the next bar open or later.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, tick-rounded by the engine,
      and evaluated with pessimistic same-bar stop/target ordering. It invalidates the thesis if a supposedly
      absorbed stop-run immediately extends beyond ordinary adverse movement.
    target_exit_rationale: A fixed-R target keeps the exit independent of future VWAP, future session
      extremes, final volume profile, or discretionary chart review. The fixed flatten time forces same-day
      risk removal before the configured prop cutoff.
    profitability_rationale: If stop-runs harvest clustered liquidity but fail to attract continuation,
      then the best reversion candidates should occur when aggressive pressure into the sweep is absorbed
      and the larger completed-bar trend already favors a reversal back through the level. The mechanics
      are narrow enough to express that behavior yet broad enough to be density-checked before any PnL
      inspection.
    known_failure_modes: The sweep can be informed breakout continuation, not absorption; the trend snapshot
      can be stale or overextended; aggregate signed flow may misclassify true aggressor pressure; and
      the setup may fail after ES costs or concentrate in a few high-volatility sessions.
    pre_test_decision: approve_for_testing
