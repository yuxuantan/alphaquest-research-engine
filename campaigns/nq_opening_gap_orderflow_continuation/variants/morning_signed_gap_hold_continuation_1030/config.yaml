research_metadata:
  academic_source: Gao et al. (2018); Liu et al. (2016); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: NQ opening gaps may continue when price accepts the prior-close dislocation and completed signed-volume remains aligned with the gap direction.
  mechanic: 10:15:00-10:30:00 ET accepted-gap continuation using signed-volume confirmation, prior-close boundary stop, fixed-R target, and same-day flatten.
  timeframe_rationale: Five-minute bars preserve completed source-window timing while reducing one-minute orderflow noise and leaving execution to the engine's next eligible bar.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant cannot trade unless NQ opens away from the prior RTH close, the completed source window holds on the gap side of that prior close, and signed-volume is aligned with the gap direction.
    entry_logic_rationale: The entry waits until the configured 10:15:00 to 10:30:00 ET source window is complete. The prior close, current open, gap-hold state, and aggregate flow are known before the signal; the engine handles next-bar execution.
    stop_loss_rationale: The opening-gap boundary stop uses the known prior RTH close with a predeclared max-stop cap and fixed tick offset. It invalidates continuation if the gap fills back through the prior close.
    target_exit_rationale: The fixed-R target is declared before testing and varied only through tp.params.target_r_multiple, with no target below 1.0R.
    profitability_rationale: A real NQ accepted-gap continuation effect should survive neighboring gap, flow, stop-cap, and target settings after costs, random-entry monkey controls, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: Gap acceptance can still reverse, aligned flow can be exhaustion, boundary stops can be too wide, and results may concentrate in volatile event sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    decision: PASS_WITH_SPARSE_STRICT_CORNERS
    method: Entry-condition count only; no PnL, stop, target, WFA, monkey, Monte Carlo, prop simulation, or holdout result was inspected.
    note: morning signed broad/mid corners 52-79 signals/year; strict g60/i0.02 about 40/year before stop cap
