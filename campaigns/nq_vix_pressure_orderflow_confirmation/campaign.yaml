campaign_id: nq_vix_pressure_orderflow_confirmation
title: NQ VIX Pressure With Completed Orderflow Confirmation
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: lagged_vix_pressure_nq_orderflow_confirmation
hypothesis: Lagged broad-equity volatility pressure should only be tradable on NQ
  when the current RTH session confirms downside pressure through completed price
  action and aggregate orderflow before entry.
rationale: 'This is a new NQ-specific formulation after the simple NQ VIX-level state
  campaign failed monkey drawdown robustness. It is not a stop/target rescue of that
  campaign: every signal must pass a same-session completed NQ price/orderflow confirmation
  gate before any PnL test is run.'
sources:
- title: The Investor Fear Gauge
  authors: Robert E. Whaley
  year: 2000
  venue: Journal of Portfolio Management
  link: https://www.pm-research.com/content/iijinvest/26/3/12
  relevance: Interprets VIX as a broad investor fear and risk-state proxy.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as short-horizon price-pressure evidence;
    this campaign uses Sierra completed-bar aggregate flow, not quote-level OFI.
- title: Cboe VIX Index Historical Data
  authors: Cboe Global Markets
  year: 2026
  venue: Official Cboe volatility-index data
  link: https://www.cboe.com/tradable-products/vix/
  relevance: Official source for lagged VIX closes used to construct the prior-session
    VIX change rank.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/nq_cboe_vix_level_features_20110103_20260612.csv
- completed NQ RTH one-minute aggregate signed-volume and large-lot fields
data_quality_caveats:
- VIX is an SPX-option implied index rather than a Nasdaq-specific volatility index.
- Sierra orderflow fields are completed-bar aggregates, not tick-path or quote-level
  OFI.
- The VIX-change threshold is a broad pressure veto, not a rare VIX-spike definition,
  because rare-spike confirmations were too sparse before PnL testing.
lookahead_risks:
- The VIX feature file uses the latest Cboe VIX observation strictly before the NQ
  session date.
- The NQ confirmation gate uses only completed RTH bars through the signal bar close.
- Entry is emitted at the signal-bar close and filled no earlier than the next-bar
  boundary by the staged engine.
- No same-day VIX close, final session high/low, final VWAP, future orderflow, or
  post-entry return is used.
failure_modes:
- Broad VIX pressure may already be priced overnight.
- Orderflow confirmation may arrive after the move has exhausted.
- The broad VIX-change filter may be too weak after costs.
- Aggregate Sierra flow may not represent informed pressure.
- Drawdown robustness may still fail even if net-profit robustness improves.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_cboe_vix_level_state_intraday
