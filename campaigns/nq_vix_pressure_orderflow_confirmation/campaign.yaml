  - nq_vvix_tail_risk_intraday
  - nq_cboe_vxn_vix_dispersion_intraday
  - nq_morning_orderflow_momentum_continuation
  conclusion: Eligible as a distinct NQ-only composite. The prior VIX campaign traded
    lagged VIX state alone; this campaign requires completed NQ price and aggregate
    orderflow confirmation before any signal.
