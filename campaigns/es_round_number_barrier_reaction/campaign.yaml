campaign_name: es_round_number_barrier_reaction
campaign_id: es_round_number_barrier_reaction
instrument: ES
decision: FAIL
initial_decision: TEST
reason_for_decision: Active-only duplicate review found no non-archived ES campaign
  testing fixed psychological round-number price barriers. This is distinct from prior-session
  highs/lows, overnight highs/lows, VWAP, range compression, and orderflow campaigns
  because the traded reference levels are ex-ante fixed price handles rather than
  data-mined historical levels.
edge_hypothesis: ES may react predictably around fixed round-number price barriers
  because stop-loss, take-profit, and discretionary liquidity cluster around salient
  handles. Failed probes may reverse, while completed breaks may continue as stop-order
  pressure is triggered.
why_it_may_apply_to_es_futures: ES trades in visible index handles and is widely watched
  by discretionary and systematic participants. Fixed 25/50/100-handle barriers are
  known before the session and require no future high/low, volume profile, or order-book
  data.
research_sources:
- title: Price Barriers in the Dow Jones Industrial Average
  author: R. Glen Donaldson and Harold Y. Kim
  year: 1993
  link_or_doi: https://ideas.repec.org/a/cup/jfinqa/v28y1993i03p313-330_00.html
  expected_mechanism: Documents support/resistance behavior and continuation after
    breaks around salient 100-point index barriers.
- title: Currency Orders and Exchange-Rate Dynamics
  author: Carol L. Osler
  year: 2003
  link_or_doi: https://www.newyorkfed.org/research/staff_reports/sr125.html
  expected_mechanism: Documents order clustering at round-number support/resistance
    levels and links reversals and momentum to clustered stop/take-profit orders.
- title: Stop-Loss Orders and Price Cascades in Currency Markets
  author: Carol L. Osler
  year: 2005
  link_or_doi: https://ideas.repec.org/a/eee/jimfin/v24y2005i2p219-241.html
  expected_mechanism: Supports the continuation failure mode where stop-loss clustering
    can create self-reinforcing moves after a level is crossed.
behavioural_or_microstructure_rationale: The campaign treats round-number barriers
  as fixed ex-ante levels. Reclaim variants test liquidity provision after failed
  probes; breakout variants test stop-order continuation after completed crosses.
  The mechanism is frozen before results.
expected_failure_modes:
- Round-number behavior documented in equities and FX may not survive in ES futures
  after costs.
- Fixed handles may be too obvious and arbitraged by faster participants.
- Bar-level OHLC may not capture tick-path sequencing around a fast barrier touch,
  so pessimistic same-bar stop/target handling is required.
- The edge may be concentrated in crisis sessions or a few large trend days.
- Breakout and rejection interpretations may cancel across regimes or sides.
data_requirements:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- 5-minute bars aggregated deterministically from local 1-minute RTH data
session_assumptions:
  timezone: America/New_York
  rth_start: 09:30:00
  rth_end: '15:59:00'
  no_overnight_positions: true
  latest_variant_flatten: '15:55:00'
forbidden_forms_of_lookahead:
- Use of future session highs/lows, final VWAP, final volume profile, or future orderflow
  to define a barrier.
- Entry on the same bar close that creates the signal; signal fills must be next-bar
  open or later.
- Changing barrier interval, buffer, time window, direction, stop, or target after
  seeing results.
- Using archived result performance for duplicate or parameter decisions.
duplicate_edge_review:
  active_scope_only: true
  archived_tests_ignored: true
  active_campaign_count_checked: 51
  not_duplicate_of:
  - es_prior_day_stop_run_reclaim
  - es_prior_session_level_breakout_continuation
  - es_overnight_inventory_sweep_reversion
  - es_vwap_pullback_continuation
  - es_range_compression_breakout
  - es_signed_orderflow_persistence
  conclusion: This campaign tests fixed psychological price barriers known before
    the session. It does not use prior-session levels, overnight levels, opening ranges,
    VWAP, range compression, or orderflow-derived levels.
variants:
- morning_round_support_reclaim_long
- morning_round_resistance_reject_short
- midday_two_sided_round_reclaim
- round_number_upside_breakout_long
- round_number_downside_breakout_short
parameter_space:
  total_combinations_per_variant: 36
  entry_tunables:
  - barrier_interval_points
  - buffer_ticks
  stop_tunables:
  - stop_pct
  target_tunables:
  - target_r_multiple
  parameters:
    entry.params.barrier_interval_points:
    - 25.0
    - 50.0
    entry.params.buffer_ticks:
    - 0
    - 1
    sl.params.stop_pct:
    - 0.0015
    - 0.0025
    - 0.004
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
  pretest_density_adjustment: Removed 2-tick buffer from the original grid before
    any performance test because one downside-breakout combination was below the 50
    trades/year density requirement.
rescue_policy:
