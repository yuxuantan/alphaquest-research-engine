  failure_reason: All five original round-number barrier variants failed limited_core_grid_test
    because the profitable-combination rate was far below the required 0.70. Each
    failed variant received exactly one parameter-space-only rescue preserving the
    same fixed round-number barrier mechanic, setup mode, direction, time window,
    entry module, stop module, take-profit module, timeframe, data window, costs,
    fill rules, session rules, prop rules, and validation gates. All five rescues
    also failed limited_core_grid_test. Some individual breakout/rejection parameter
    combinations were profitable and benchmark-passing, but the grid was not robust
    enough. No run reached monkey, WFA, WFA OOS monkey, Monte Carlo, simulated incubation,
    frozen validation, or candidate reporting.
  best_original: round_number_downside_breakout_short/run1 top_net=6137.5 profitable_combo_rate=0.2777777777777778
