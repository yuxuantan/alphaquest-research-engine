- title: SMT Divergence+PO3
  author: Trader Kane / Chart Fanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/smt-divergence-po3
  expected_mechanism: Practitioner playbook targets quick returns to the 50% level after manipulation, PO3 structure, and
    SMT divergence between NQ and ES.
