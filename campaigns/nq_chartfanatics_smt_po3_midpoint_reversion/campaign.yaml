source_quality_note: The PO3/SMT rule is practitioner-originated. This test is an RTH-only approximation using prior-session
  range, not full daily/4H/1H discretionary PO3 context.
data_needs:
- generated local NQ-primary/ES-secondary aligned one-minute RTH cache
- prior NQ and ES RTH high/low known only after session rollover
- NQ next-bar execution with structural sweep stop and signal midpoint target
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_es_cross_index_lead_lag
  - nq_es_relative_value_orderflow_absorption_reversion
  - nq_prior_day_stop_run_reclaim
  - nq_chartfanatics_liquidity_inversion_fvg
  conclusion: Eligible as a distinct Chart Fanatics-derived campaign because it tests NQ/ES SMT non-confirmation plus prior-range
    50% reversion. Existing cross-index lead-lag follows ES returns; relative-value campaigns fade dispersion with orderflow;
    prior stop-run campaigns do not require ES non-confirmation or midpoint targeting.
chart_fanatics_review:
  selected_after: Liquidity Inversion FVG campaign failed pre-PnL density.
  selected_reason: SMT+PO3 is currently visible on Chart Fanatics and is not represented as a tested local NQ/ES midpoint-reversion
    campaign.
lookahead_risks:
- Prior-session NQ/ES highs, lows, and NQ midpoint become available only after the previous RTH close.
- SMT non-confirmation is evaluated only through the completed signal bar.
- Entry occurs no earlier than the next one-minute bar open after NQ closes back inside the range.
- No future session high/low, future midpoint, final VWAP, future ES move, or post-entry path is used.
failure_modes:
- The RTH-only approximation may not capture true daily/4H/1H PO3 context.
- ES non-confirmation may be too common or too weak after costs.
- The 50% midpoint target may be too close relative to structural sweep risk.
- Payoff may concentrate in isolated volatility regimes or one side.
