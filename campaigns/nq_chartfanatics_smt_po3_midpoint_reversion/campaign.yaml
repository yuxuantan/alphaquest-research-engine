hypothesis: When NQ manipulates a prior-session high or low but ES does not confirm the same-side sweep, NQ may revert toward
  the prior-session 50% midpoint.
rationale: Chart Fanatics describes SMT+PO3 as manipulation of a key range, SMT divergence between NQ and ES, and delivery
  back toward the 50% level. This campaign makes the RTH-only version objective using prior RTH range, NQ/ES non-confirmation,
  close-back-inside confirmation, and a signal-emitted midpoint target.
