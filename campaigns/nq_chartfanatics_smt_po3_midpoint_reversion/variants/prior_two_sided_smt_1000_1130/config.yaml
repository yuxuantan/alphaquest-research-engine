research_metadata:
  academic_source: Chart Fanatics SMT Divergence+PO3; Huth and Abergel (2014); Lo, Mamaysky, and Wang (2000)
  edge_thesis: A two-sided non-confirmed prior-range manipulation should capture the core SMT+PO3 50% reversion idea without
    side selection.
  mechanic: 'Two-sided 10:00-11:30 ET SMT/PO3 variant: NQ prior-high non-confirmed sweeps can short and NQ prior-low non-confirmed
    sweeps can long back toward the prior-session midpoint.'
  timeframe_rationale: One-minute bars preserve the aligned NQ/ES sweep/non-confirmation sequence and the Chart Fanatics timing
    around the New York 10:00 window.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: 'Two-sided 10:00-11:30 ET SMT/PO3 variant: NQ prior-high non-confirmed sweeps can short and NQ
      prior-low non-confirmed sweeps can long back toward the prior-session midpoint.'
    entry_logic_rationale: The signal uses only prior-session NQ/ES highs and lows plus the completed current NQ/ES bar. It
      emits after NQ closes back inside the prior range with ES non-confirmation still intact.
    stop_loss_rationale: The sweep-extreme stop sits beyond the protected manipulation high or low plus a predeclared tick
      offset.
    target_exit_rationale: The primary target is the signal-emitted prior-session NQ midpoint only when it is at least the
      predeclared minimum R multiple; otherwise the signal_price module falls back to a fixed-R target at or above the repository
      1R floor.
    profitability_rationale: The edge should work only if SMT non-confirmed manipulations revert toward the 50% level often
      enough to overcome slippage, commissions, and structural stop distance.
    known_failure_modes: RTH-only midpoint reversion may miss higher-timeframe PO3 context; NQ and ES may both sweep too often;
      the midpoint target can be too close relative to stop risk.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/smt-divergence-po3
  rescue_status: none
strategy:
  entry:
    module: nq_es_smt_po3_midpoint_reversion
    params:
      setup_mode: prior_two_sided
      setup_start_time: 09:30:00
      start_time: '10:00:00'
      end_time: '11:30:00'
      flatten_time: '15:55:00'
      max_trades_per_day: 1
