campaign_id: es_usdjpy_safe_haven_spillover
title: ES USD/JPY Safe-Haven Spillover
decision: FAIL
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: Lagged yen safe-haven/carry-unwind states, measured by USD/JPY level and return ranks, may identify ES intraday risk-off pressure or risk-on continuation because the Japanese yen tends to strengthen during funding-liquidity stress and carry-trade unwinds.
rationale: This campaign tests JPY-specific safe-haven/carry-unwind information, not broad U.S. dollar strength, Treasury-rate shocks, oil shocks, option-volatility state, OFR financial stress, or ES-only momentum/orderflow.
sources:
- title: Safe Haven Currencies
  authors: Angelo Ranaldo and Paul Soderlind
  year: 2010
  venue: Review of Finance, 14(3), 385-407
  link: https://academic.oup.com/rof/article-abstract/14/3/385/1592162
  doi: 10.1093/rof/rfq007
  relevance: Identifies the Japanese yen as a safe-haven currency and motivates using yen strength as a market-stress proxy.
- title: Carry Trades and Currency Crashes
  authors: Markus K. Brunnermeier, Stefan Nagel, and Lasse H. Pedersen
  year: 2008
  venue: NBER Macroeconomics Annual / NBER Working Paper 14473
  link: https://www.nber.org/papers/w14473
  relevance: Links carry-trade unwind risk to falling risk appetite and funding liquidity, supporting a yen/carry stress spillover test.
- title: Japanese Yen to U.S. Dollar Spot Exchange Rate [DEXJPUS]
  authors: Board of Governors of the Federal Reserve System via FRED
  year: 2026
  venue: Federal Reserve Bank of St. Louis FRED
  link: https://fred.stlouisfed.org/series/DEXJPUS
  relevance: Free daily USD/JPY series used to build strictly lagged ES session features.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV bars in America/New_York
- free FRED DEXJPUS daily USD/JPY CSV or local cached copy
- deterministic session-date merge using only observations available no later than one business day before the ES session
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- DEXJPUS is a daily noon-buying-rate-style FX series, not an intraday executable FX quote.
- Same-day FX observations are unavailable to the ES intraday signal by design; a one-business-day lag is enforced.
- Sierra ES data is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
lookahead_risks:
- Signals never use same-date USD/JPY observations.
- Rolling ranks are computed after applying the one-business-day availability lag to ES session dates.
- Signals use a completed 1-minute bar and enter at the next bar open or later.
- No final ES session close/high/low, future FX observation, final VWAP, or future orderflow is used.
failure_modes:
- Yen safe-haven effects may be contemporaneous rather than predictive after a one-business-day lag.
- USD/JPY can move for Japan-specific policy reasons unrelated to U.S. equity risk appetite.
- The effect may be regime-dependent or dominated by crisis periods.
- Fixed intraday ES exits may be too noisy after costs and slippage.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_dollar_risk_appetite_intraday
  - es_treasury_rate_shock_intraday
  - es_oil_price_shock_spillover
  - es_ofr_financial_stress_intraday
  - es_cboe_put_call_sentiment_intraday
  - es_vvix_tail_risk_intraday
  - es_variance_risk_premium_intraday
  - es_market_plumbing_liquidity_capacity
  - es_daily_time_series_momentum
  conclusion: Not a duplicate in active scope. This tests JPY-specific safe-haven/carry-unwind state using USD/JPY, while the active failed dollar campaign used broad U.S. dollar index risk-capacity state and did not test yen-specific carry stress.
