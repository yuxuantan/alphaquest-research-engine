- yen_appreciation_short_1000
- yen_depreciation_long_1030
- strong_yen_short_1130
- weak_yen_long_1200
- five_day_yen_appreciation_short_1330
rescue_policy:
  rescue_scope: failed_variant
  max_rescue_attempts_per_failed_variant: 1
  allowed_changes:
  - fixed parameters inside existing strategy modules
  - tunable parameter space only
  forbidden_changes:
