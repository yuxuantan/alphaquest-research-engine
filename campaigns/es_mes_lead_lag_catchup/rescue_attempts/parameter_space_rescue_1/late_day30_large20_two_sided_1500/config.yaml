campaign_id: es_mes_lead_lag_catchup
variant_id: late_day30_large20_two_sided_1500
test_run_id: rescue1
strategy_name: es_mes_lead_lag_catchup
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: ES may catch up late in the session when completed MES price movement
    and MES large20 flow lead ES.
  mechanic: From 14:00 through 15:30 ET, use completed rolling 30-minute MES and ES
    windows. Trade ES in the MES direction only if MES moved materially, ES lags MES
    by the configured gap, and MES large20 flow confirms the MES direction.
  timeframe_rationale: The ES/MES feature cache is built on completed aligned 1-minute
    RTH bars, so the strategy stays on 1-minute bars to preserve the lead-lag window
    semantics and next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: 'This late-day variant expresses MES-to-ES catch-up through
      larger MES flow. A completed 30-minute MES price lead, an ES lag gap, and same-direction
      MES large20 aggregate flow must all be present before the ES trade is allowed.

      '
    entry_logic_rationale: 'The 14:00-15:30 ET window tests whether late-session ES
      still catches up to MES-led same-underlying pressure before the close. The large20
      flow mode is fixed to require stronger MES participation than a noisy signed-flow-only
      signal.

      '
    stop_loss_rationale: 'The sweep-extreme stop is fixed from the completed signal
      bar and offset by a small number of ticks. It is available before entry and
      avoids using any future late-day high or low.

      '
    target_exit_rationale: 'A fixed-R target and 15:55 ET forced flatten are appropriate
      because the remaining session is short. The exit tests immediate catch-up only
      and does not allow overnight exposure.

      '
    profitability_rationale: 'If large MES participants reveal pressure that ES still
      has not incorporated late in the day, the move should follow through quickly.
      Otherwise the variant should fail because there is not enough time or edge after
      costs.

      '
    known_failure_modes: 'Late-day MES large20 flow may be sparse, institutional ES
      flow may dominate MES, and the shortened runway before flatten may create many
      small losses even if the direction is sometimes right.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameters and declared parameter grids inside
    existing modules: increased the required MES-vs-ES lag grid, used a quicker fixed-R
    target grid, and modestly strengthened fixed MES flow confirmation where applicable.
    Entry module, stop module, target module, data, timeframe, direction logic, costs,
    fill assumptions, stage criteria, and prop rules are unchanged.'
