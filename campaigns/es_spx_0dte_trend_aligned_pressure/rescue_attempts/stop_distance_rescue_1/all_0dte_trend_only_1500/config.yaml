timeframe: 1m
research_metadata:
  academic_source: Cboe SPX Weeklys launch history; Brogaard, Han, and Won (SSRN 4426358); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: SPX 0DTE sessions may create intraday ES pressure; ES should be traded only when completed short and medium intraday trend structure agree.
  mechanic: 'Rescue attempt 1 keeps the 15:00 all-0DTE trend-only mechanic unchanged and tests smaller late-day targets around the only profitable original pocket. Original mechanic retained: Trade all known SPX 0DTE sessions from 2016 onward, excluding standard monthly OPEX, at 15:00 ET only when completed 30-minute and 120-minute ES high/low trend states align. Long requires higher highs and higher lows in both windows; short requires lower highs and lower lows in both windows.'
  timeframe_rationale: 1-minute bars preserve completed-bar signal timing and next-bar-open execution while allowing same-day flattening.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: The primary 0DTE edge is expressed through known SPX same-day-expiration sessions, while the later fixed ES trend filter tests whether pressure persists into the final trading hour when both completed trend windows agree.
    entry_logic_rationale: The entry waits until the 14:59 ES bar has closed, then uses only the completed bar history ending at 15:00 ET and the pre-known SPX 0DTE calendar. The engine must execute no earlier than the next bar open.
    stop_loss_rationale: 'A fixed percent-from-entry stop is appropriate because the hypothesis is an intraday pressure continuation, not a precise structural level. The stop caps failed trend alignment without using future range information.

      '
    target_exit_rationale: 'The fixed-R target keeps reward linked to the predeclared stop distance and avoids optimizing exits around observed session highs, lows, VWAP, option strikes, or other future-derived levels.

      '
    profitability_rationale: This variant is convincing enough to test because late-day 0DTE hedging and trend persistence could reinforce each other, and the density audit shows more than 50 expected signals per year before costs are examined.
    known_failure_modes: 'It should fail if 0DTE pressure is directionally irrelevant to ES, if the trend filter enters exhausted late moves, if costs dominate the average move, or if profits concentrate in a small number of volatility events.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt:
    attempt: 1
    scope: parameter_space_only
    mechanic_changed: false
    note: Rescue attempt 1 keeps the 15:00 all-0DTE trend-only mechanic unchanged and tests smaller late-day targets around the only profitable original pocket.
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_spx_0dte_trend_aligned_pressure
    source_variant_id: all_0dte_trend_only_1500
    source_run_id: rescue1
    source_config_path: campaigns/es_spx_0dte_trend_aligned_pressure/rescue_attempts/parameter_space_rescue_1/all_0dte_trend_only_1500/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.0025
      new: 0.00375
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.002
      - 0.0025
      - 0.003
      new: &id002
      - 0.003
      - 0.00375
      - 0.0045
