research_metadata:
  academic_source: Toby Crabel (1990); Raschke and Connors (1995); StockCharts NR7
  edge_thesis: NR7 prior-session compression can precede downside NQ opening-range breakout continuation.
  mechanic: Use completed prior RTH sessions only. After NR7 compression, trade short breakouts of the completed 15-minute
    opening range on completed 5-minute bars, then flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: Five-minute bars keep the compression/breakout timing auditable while using one-minute execution detail
    for fills.
  source_es_config: campaigns/es_range_compression_breakout/variants/nr7_opening_range_15_short_breakout/config.yaml
  nq_range_cap_grid_basis: NQ RTH session-range distribution before PnL; median about 84 points and 60th percentile about
    130 points over 2011-01-03..2026-06-12.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: Use completed prior RTH sessions only. After NR7 compression, trade short breakouts of the completed
      15-minute opening range on completed 5-minute bars, then flatten at 15:55 ET unless stop or target is hit. Compression
      state uses completed prior sessions only; breakout uses a completed 5-minute close and trades NQ next bar.
    entry_logic_rationale: Prior-session range compression is known before the current RTH open. Opening range references
      are built only after the configured opening window completes. A breakout signal uses a completed 5-minute bar close
      and cannot enter before the next bar open.
    stop_loss_rationale: The percent-from-entry stop is fixed before NQ PnL testing, rounded to the NQ tick, and tuned only
      through the predeclared grid.
    target_exit_rationale: The fixed-R target and same-day flatten are predeclared and do not use final VWAP, final session
      range, future highs/lows, or discretionary chart levels.
    profitability_rationale: NQ can show volatility expansion after narrow prior RTH ranges; a completed breakout may capture
      directional repricing before the same-day flatten.
    known_failure_modes: Compression breakouts may be over-arbitraged, may fail after NQ costs and pessimistic same-bar fills,
      may be concentrated in high-volatility regimes, or may fail monkey/WFA robustness.
    pre_test_decision: approve_for_density_screen
    source_es_template: campaigns/es_range_compression_breakout/variants/nr7_opening_range_15_short_breakout/config.yaml
    ported_before_nq_pnl: true
