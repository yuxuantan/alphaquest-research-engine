campaign_id: es_vwap_pullback_continuation
variant_id: morning_opening_drive_pullback_short
test_run_id: run1
strategy_name: vwap_pullback_continuation
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Bialkowski, Darolles, and Le Fol (2008); McCulloch and Kazakov
    (2007); Gueant and Pu (2015)
  edge_thesis: A bearish opening drive that remains below VWAP may attract continuation
    supply when a pullback to VWAP is rejected.
  mechanic: From 09:30 through 12:00 ET, build opening-drive state and enter short
    only after a bearish opening drive is followed by a completed VWAP pullback rejection;
    flatten at 15:55 ET unless stop or target is hit.
  timeframe_rationale: 5-minute bars preserve completed-bar signal timing and next-bar-open
    execution while reducing one-minute VWAP noise.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: intraday_capitulation_mr
  warmup_days: 30
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: vwap_pullback_continuation
    params:
      setup_mode: opening_drive_pullback
      start_time: 09:30:00
      end_time: '12:00:00'
      opening_drive_minutes: 30
      min_drive_points: 2.0
      min_drive_close_location: 0.65
      pullback_tolerance_ticks: 1
      reclaim_buffer_ticks: 0
      reclaim_window_bars: 3
      allow_long: false
      allow_short: true
      bar_interval_minutes: 5
      tick_size: 0.25
      max_trades_per_day: 1
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.0025
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.0
  flatten_time: '15:55:00'
core:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
