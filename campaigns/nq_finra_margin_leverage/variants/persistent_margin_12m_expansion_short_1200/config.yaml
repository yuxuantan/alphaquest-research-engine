timeframe: 1m
research_metadata:
  academic_source: Brunnermeier and Pedersen (2009); Adrian and Shin (2010); FINRA margin statistics
  edge_thesis: Persistent twelve-month margin-debt growth may mark mature speculative leverage vulnerable to downside pressure.
  mechanic: At 12:00 ET, short NQ when twelve-month FINRA margin-debt growth ranks in the upper tail of its 120-month history.
  timeframe_rationale: 1-minute bars preserve next-bar-open execution while using only lagged monthly leverage state.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-30"
  pre_pnl_density:
    artifact: research_artifacts/nq_finra_margin_leverage_density_audit_20260630.md
    selected_grid_min_signals_per_year: 64.570982
    p_n_l_inspected: false
  data_availability_adjustment:
    configured_start_date: "2014-03-07"
    reason: first session where all official 120-month FINRA rank features are non-null
    p_n_l_inspected: false
  mechanics_review:
    mechanic_expresses_edge: >
      The variant maps a public FINRA customer-margin leverage state, lagged by at
      least 35 calendar days and started only after all official rank features are
      available, into a fixed-time NQ intraday trade.
    entry_logic_rationale: >
      The signal reads only the latest eligible monthly FINRA observation and the
      completed 1-minute decision bar. Any fill occurs no earlier than the next
      bar open, and no current-month or future margin observation is used.
    stop_loss_rationale: >
      A percent-from-entry stop is used because the edge is a slow leverage/funding
      state rather than a discrete intraday chart level. The stop grid is declared
      before PnL and rounded to the NQ tick.
    target_exit_rationale: >
      A fixed-R target plus strict 15:55 ET flatten tests same-day monetization
      without discretionary exits or overnight exposure.
    profitability_rationale: >
      The variant can only work if the lagged margin-leverage state predicts NQ
      intraday pressure or rebound strongly enough to survive commission, one tick
      of slippage, and pessimistic same-bar ordering.
    known_failure_modes: >
      The ES source family failed; this NQ transfer can fail if monthly margin data
      is too stale, if margin follows rather than leads prices, if the effect is
      crisis-specific, or if the signal is just a hidden trend/volatility proxy.
    pre_test_decision: approve_for_testing
