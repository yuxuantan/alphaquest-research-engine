timeframe: 1m
research_metadata:
  academic_source: ChartFanatics AMD Model; Lucca and Moench (2015); Andersen, Bollerslev, Diebold, and Vega (2007)
  edge_thesis: On scheduled FOMC decision days, NQ may form a pre-release accumulation range, sweep liquidity around
    the 14:00 ET decision, and then distribute directionally after completed displacement confirms trapped wrong-side
    flow.
  mechanic: On scheduled FOMC decision dates, build the 13:30-14:00 ET accumulation range, require a completed sell-side
    sweep below that range and bullish displacement back through the opposite edge, then enter long next bar and
    flatten by 15:55 ET.
  timeframe_rationale: One-minute completed RTH bars are required to freeze the pre-FOMC accumulation range and
    enter only after completed sweep/displacement confirmation without same-bar execution.
  mechanics_review_required: true
  mechanics_review_version: '2026-07-01'
  mechanics_review:
    mechanic_expresses_edge: The variant expresses AMD as scheduled FOMC event day, pre-release accumulation range,
      liquidity manipulation sweep, completed displacement, next-bar entry, and same-day flatten.
    entry_logic_rationale: Event dates are known before the session. The accumulation range is built only from completed
      bars ending at or before 14:00 ET. Sweep and displacement are evaluated only after that range is frozen.
    stop_loss_rationale: The sweep-extreme stop sits beyond the manipulation extreme with a predeclared tick offset,
      directly matching the AMD invalidation point.
    target_exit_rationale: The fixed-R target grid is declared before PnL and tests whether the distribution phase
      pays enough reward relative to the sweep-extreme risk.
    profitability_rationale: If FOMC liquidity sweeps trap wrong-side participants and post-release displacement
      begins a distribution leg, next-bar entries may capture directional follow-through after costs.
    known_failure_modes: The FOMC move may already be complete by the confirmation close, one-sided sweeps may be
      too sparse, same-minute volatility may cause pessimistic stop/target conflicts, and results may concentrate
      in a few crisis meetings.
    pre_test_decision: approve_for_pre_pnl_density_audit
  duplicate_edge_check:
    active_scope_only: true
    checked_edges:
    - nq_fomc_pre_announcement_drift
    - nq_bls_macro_release_day_drift
    - nq_opening_range_failed_breakout_orderflow
    - nq_opening_range_retest_orderflow
    - nq_chartfanatics_liquidity_inversion_fvg
    - nq_chartfanatics_smt_po3_midpoint_reversion
    conclusion: Eligible as a distinct bounded composite because it requires a scheduled FOMC event day plus a pre-release
      accumulation range, liquidity sweep, and completed displacement. Existing FOMC/BLS campaigns are fixed-time
      drift tests; opening-range and liquidity-sweep campaigns are not event-gated by scheduled FOMC sessions.
  source_url: https://www.chartfanatics.com/strategies/amd-model
