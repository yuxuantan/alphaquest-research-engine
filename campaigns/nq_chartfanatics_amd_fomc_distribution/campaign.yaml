campaign_id: nq_chartfanatics_amd_fomc_distribution
title: NQ ChartFanatics AMD FOMC Distribution
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
market: CME E-mini Nasdaq-100 futures
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: chartfanatics_amd_fomc_distribution
hypothesis: On scheduled FOMC decision days, NQ may form a pre-release accumulation range, sweep liquidity around
  the 14:00 ET decision, and then distribute directionally after completed displacement confirms trapped wrong-side
  flow.
rationale: ChartFanatics describes the AMD Model as Accumulation, Manipulation, and Distribution around major news
  events such as FOMC, CPI, and NFP. This campaign tests only scheduled FOMC sessions because the local NQ FOMC
  event-date coverage is complete, while the existing NQ BLS release calendar audit failed closed on missing holiday/session
  bars. The strategy uses event dates only, never statement text, decision outcome, surprise, or future price path.
research_sources:
- title: AMD Model
  author: Tanja Trades / ChartFanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/amd-model
  expected_mechanism: Practitioner playbook states that high-probability AMD setups appear around major news after
    liquidity is swept and displacement confirms the distribution phase.
- title: The Pre-FOMC Announcement Drift
  author: David O. Lucca and Emanuel Moench
  year: 2015
  link_or_doi: https://doi.org/10.1111/jofi.12196
  expected_mechanism: Supports scheduled FOMC meetings as recurring equity-index risk events; this campaign does
    not reuse the fixed-time long drift mechanic.
- title: Real-Time Price Discovery in Stock, Bond and Foreign Exchange Markets
  author: Torben G. Andersen, Tim Bollerslev, Francis X. Diebold, and Clara Vega
  year: 2007
  link_or_doi: https://doi.org/10.1016/j.jinteco.2006.10.004
  expected_mechanism: Documents high-frequency price discovery around macro announcements, motivating a completed-bar
    post-event displacement test.
source_quality_note: The AMD rule is practitioner-originated. Academic sources support FOMC as a real scheduled
  macro event and technical-rule objectification, not this exact NQ AMD implementation. The campaign must fail closed
  on density or staged robustness weakness.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fomc_scheduled_decision_dates_20110101_20260609.csv
- completed one-minute NQ RTH bars only
lookahead_risks:
- FOMC event dates are public scheduled dates; no decision, statement, surprise, minutes, or press conference content
  is used.
- The accumulation range is frozen before any sweep/displacement signal is evaluated.
- Signals use completed bars and enter no earlier than the next bar open.
- No final session high/low, future VWAP, future range, or post-entry orderflow is used.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_fomc_pre_announcement_drift
  - nq_bls_macro_release_day_drift
  - nq_opening_range_failed_breakout_orderflow
  - nq_opening_range_retest_orderflow
  - nq_chartfanatics_liquidity_inversion_fvg
  - nq_chartfanatics_smt_po3_midpoint_reversion
  conclusion: Eligible as a distinct bounded composite because it requires a scheduled FOMC event day plus a pre-release
    accumulation range, liquidity sweep, and completed displacement. Existing FOMC/BLS campaigns are fixed-time
    drift tests; opening-range and liquidity-sweep campaigns are not event-gated by scheduled FOMC sessions.
