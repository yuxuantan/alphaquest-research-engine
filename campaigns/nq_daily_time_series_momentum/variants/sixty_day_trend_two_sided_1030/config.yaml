timeframe: 5m
research_metadata:
  academic_source: Moskowitz, Ooi, and Pedersen (2012); Hurst, Ooi, and Pedersen (2017)
  edge_thesis: Completed NQ RTH trends may continue intraday after the cash open due to trend-following demand and delayed
    information diffusion.
  mechanic: At 10:30 ET, follow the sign of the completed 60-session NQ RTH close-to-close trend when its absolute return
    exceeds the configured threshold; entry is next bar open.
  timeframe_rationale: Five-minute bars provide completed-bar signaling, next-bar-open execution, and enough intraday holding
    time while avoiding overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  pre_pnl_density:
    artifact: research_artifacts/nq_daily_time_series_momentum_density_audit_20260622.md
    screen: research_artifacts/nq_daily_time_series_momentum_density_audit_20260622.csv
    nq_grid_fixed_before_pnl: true
  source_es_campaign: es_daily_time_series_momentum
  mechanics_review:
    mechanic_expresses_edge: At 10:30 ET, follow the sign of the completed 60-session NQ RTH close-to-close trend when its
      absolute return exceeds the configured threshold; entry is next bar open.
    entry_logic_rationale: The signal uses only completed prior RTH closes recorded before the signal session; the current
      session final close, high/low, VWAP, or future return is not used.
    stop_loss_rationale: The percent stop is predeclared, rounded to NQ tick size, and rejects the trend-continuation thesis
      when price moves adversely after entry.
    target_exit_rationale: The fixed-R target monetizes intraday continuation without using future session range, VWAP, or
      discretionary exits.
    profitability_rationale: NQ can trend strongly over multi-session windows, but the effect must survive core breadth, monkey,
      WFA, Monte Carlo, incubation, and acceptance after costs.
    known_failure_modes: Completed daily trends may be stale, may reverse intraday, may be side-dependent, or may fail monkey/WFA
      robustness.
    pre_test_decision: approve_for_testing
