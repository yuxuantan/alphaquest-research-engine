research_metadata:
  academic_source: Huth and Abergel (2014); Schmidt, Cestonaro, and Bender (2024); Michael, Cucuringu,
    and Howison (2024)
  edge_thesis: Completed ES return leadership can predict short-horizon NQ continuation when NQ has not
    fully followed the ES move.
  mechanic: At 11:30 ET, trade NQ in the ES direction when completed 60-minute ES movement leads NQ by
    the declared return gap.
  timeframe_rationale: One-minute bars preserve the precomputed completed ES/NQ lead-lag columns and ensure
    next-bar-open NQ execution after the signal bar close.
  pre_pnl_density: research_artifacts/nq_es_cross_index_lead_lag_density_audit_20260622.md
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the cross-index lead-lag edge by trading NQ only after
      completed ES movement leads completed NQ movement by a predeclared return gap.
    entry_logic_rationale: The signal uses only completed ES and NQ rolling-return features at the configured
      bar close, and the engine may enter no earlier than the next NQ bar open.
    stop_loss_rationale: The percent-from-entry stop is declared before NQ testing, rounded to the NQ
      tick, and varied only through sl.params.stop_pct so adverse catch-up failures are capped without
      using future highs, lows, or realized trade-path information.
    target_exit_rationale: The fixed-R target is declared before NQ testing and tied to initial stop distance,
      avoiding future price, volume, orderflow, or discretionary exit information while keeping every
      target at or above 1.0R.
    profitability_rationale: If ES temporarily incorporates broad-index information before NQ fully follows,
      the NQ catch-up leg should show after-cost continuation that survives neighboring thresholds and
      full staged validation.
    known_failure_modes: The apparent lead-lag may already be arbitraged at one-minute resolution, may
      be generic momentum, or may fail after NQ slippage, commission, and pessimistic same-bar stop-target
      ordering.
    pre_test_decision: approve_for_testing
  source_es_campaign: es_nq_cross_index_lead_lag
  nq_port_note: This is the mirrored NQ execution-leg variant family, fixed before NQ PnL inspection and
    not a rescue after NQ results.
