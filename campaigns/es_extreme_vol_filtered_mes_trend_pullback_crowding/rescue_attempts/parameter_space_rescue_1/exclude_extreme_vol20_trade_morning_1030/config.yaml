timeframe: 1m
variant_id: exclude_extreme_vol20_trade_morning_1030
research_metadata:
  academic_source: Barber, Lin, and Odean (2024); CFTC Retail Traders in Futures Markets (2024); Moskowitz, Ooi,
    and Pedersen (2012); Moreira and Muir (2017); Fleming, Kirby, and Ostdiek (2001)
  edge_thesis: Elevated MES smaller-contract participation during a completed ES pullback may mark crowded temporary
    pressure; lagged volatility gates should reject extreme path-risk states before entry.
  mechanic: 'At 10:30 ET, take a two-sided ES trend-pullback fade only when MES trade participation is elevated
    over the completed 15-minute pullback, the prior completed 30-minute ES trend points opposite the pullback,
    and the lagged volatility filter passes: exclude top 5% prior 20-day realized-volatility rank. Entry is next
    bar open.'
  timeframe_rationale: One-minute bars preserve completed ES/MES participation ranks, exact 10:30 ET signal timing,
    next-bar-open execution, and stop/target ordering on the native bar stream.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the edge by requiring the same completed-bar MES trade-crowding
      pullback condition as the prior trend-filtered MES branch, then vetoing sessions where the lagged risk-state
      filter fails: exclude top 5% prior 20-day realized-volatility rank.'
    entry_logic_rationale: The signal is evaluated on the completed 10:29-10:30 ET bar. MES trade-share rank and
      ES 15-minute pullback return are completed-bar features; the prior 30-minute trend window ends before the
      pullback window starts; the volatility feature is shifted one prior session. Entry is therefore next bar open
      without current-session volatility lookahead.
    stop_loss_rationale: A fixed percent-from-entry stop is declared before testing, rounded to the ES tick, and
      tested with pessimistic same-bar stop/target ordering. It invalidates the pullback-reversal thesis if the
      crowded move keeps extending.
    target_exit_rationale: A fixed-R target with target reward:risk >= 1.0 monetizes the expected snapback without
      using future orderflow, VWAP, or discretionary levels. Any unresolved trade is force-flattened at 12:00 ET.
    profitability_rationale: This is convincing enough to test because the prior MES trend-pullback branch reached
      WFA and WFA monkey but failed path-risk Monte Carlo; the volatility gate directly targets that failure mode
      by excluding extreme lagged volatility/path-risk states while keeping signal density above 50 trades/year
      before PnL inspection.
    known_failure_modes: The gate can remove winners as well as losses, lagged volatility may not predict same-day
      path risk, MES participation can be noise rather than crowding, and 10:30 reversals may remain too small after
      ES costs.
    pre_test_decision: approve_for_testing
    rescue_decision: approve_parameter_space_rescue_1
    rescue_changes: sl.params.stop_pct grid changed to [0.002, 0.003, 0.004]; tp.params.target_r_multiple grid changed
      to [2.0, 2.5, 3.0]; fixed config stop_pct=0.003 and target_r_multiple=2.5. Entry tunables and volatility gate
      are unchanged.
  pre_pnl_density:
    artifact: research_artifacts/es_extreme_vol_filtered_mes_trend_pullback_crowding_density_summary_20260620.csv
    entry_combo_count: 9
    passing_entry_combos: 9
    full_min_trades_per_year: 54.13199536858355
    limited_core_min_trades_per_year: 71.64519230769231
    wfa90_min_trades_per_year: 51.64839119390347
    latest_one_year_min_trades_per_year: 66.22664835164835
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: parameter_space_only_no_mechanic_change
  rescue_rationale: Original run failed path-risk robustness. Rescue preserves entry module, volatility gate, MES/trend-pullback
    mechanic, data, costs, session, fills, and validation gates; only stop and target parameter space is narrowed/raised
    to reduce drawdown exposure and improve reward per ES cost.
