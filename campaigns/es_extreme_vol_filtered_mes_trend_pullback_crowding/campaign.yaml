data_needs:
- data/cache/orderflow/es_mes_participation_crowding_1m_20190506_20260609_full_rth_ny.csv
- data/external/es_lagged_volatility_features_20110103_20260609.csv
- completed ES/MES RTH 1-minute bars and same-clock MES trade-share ranks
- lagged prior-session volatility/range/absolute-return/downside-volatility features available before the current
  RTH session
lookahead_risks:
- Entry uses completed 1-minute bars only and enters no earlier than the next bar open.
- MES participation ranks are same-clock historical ranks already present in the local cache.
- The ES trend window ends before the pullback/crowding lookback, so the trend filter does not see the pullback
  or future bars.
- The volatility gate is loaded from prior-session lagged features and cannot use current-session high, low, close,
  range, or realized volatility.
- No future ES return, final daily high/low, final VWAP, post-entry MES/ES data, or post-entry orderflow is used.
failure_modes:
- MES participation may not isolate retail or less-informed crowding.
- Extreme-volatility exclusion can remove both large losses and the largest winners, causing fragile or underpowered
  results.
- Lagged volatility regimes can be unstable across market structure changes and may not map cleanly to intraday
  path risk.
- Fixed 10:30 signals may be too sparse or too small after ES commission, slippage, and pessimistic stop-target
  sequencing.
- The effect may still fail prop-style path tests even if WFA aggregate metrics look acceptable.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_mes_participation_crowding_reversion
  - es_trend_filtered_mes_participation_crowding
  - es_high_semivariance_mes_trend_pullback_crowding
  - es_volatility_managed_intraday_premium
  - es_pivot_filtered_mes_participation_crowding_reversion
  conclusion: 'Eligible as a bounded composite. The standalone volatility-managed premium campaign tested long-only
    exposure by volatility state; the prior MES trend-pullback campaign had no lagged-volatility veto; the high-semivariance
    branch required high downside risk. This campaign tests the opposite risk-control proposition: keep the dense
    MES trend-pullback entry but reject extreme lagged volatility/path-risk states.'
