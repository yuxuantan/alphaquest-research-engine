  - change stop-loss module
  - change take-profit module
  - change MES participation feature definition
  - change prior-trend-before-pullback mechanic
  - remove or retune the lagged-volatility gate after seeing results
  - change timeframe or data window
  - alter costs, fills, sessions, validation gates, or prop rules
  - allow target reward:risk below 1.0
