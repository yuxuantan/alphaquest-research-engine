research_metadata:
  academic_source: Brogaard, Han, and Won (2023); Cboe (2024); Cont, Kukanov, and
    Stoikov (2014)
  edge_thesis: SPX 0DTE sessions may create directional ES hedging pressure when a
    completed intraday ES source window has both price movement and same-direction
    aggregate signed flow.
  mechanic: On non-standard-monthly SPX 0DTE sessions, enter in the direction of the
    completed 09:30-14:30 ES move only if large20 trade imbalance confirms that direction.
  timeframe_rationale: 1-minute bars preserve the completed day-so-far source window
    and next-bar-open execution at 14:30 ET.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant targets late-session 0DTE pressure, when
      hedging and expiry-related liquidity demand should be most visible. It trades
      only when the completed day-so-far ES move and large20 imbalance agree before
      the late-day entry.
    entry_logic_rationale: The source window is complete at 14:30 ET, and all price
      and orderflow inputs are from completed bars ending before entry. No final close,
      final VWAP, closing auction, or post-entry option information is available to
      the signal.
    stop_loss_rationale: A fixed percent stop is used because a late-day pressure
      continuation has no stable predeclared chart boundary. The stop is defined before
      testing and does not move based on post-entry behavior.
    target_exit_rationale: A fixed-R target with same-day flatten tests whether late
      0DTE pressure can monetize quickly enough before the configured cutoff. It does
      not rely on overnight exposure or discretionary close handling.
    profitability_rationale: If 0DTE dealer hedging creates directional pressure into
      expiration, the late-day window should have the clearest cumulative large20
      participation. Density remains adequate at the strict declared corner despite
      the later entry.
    known_failure_modes: There may be too little time left for targets, late flow
      can reflect crowded exhaustion, and closing pinning can overwhelm directional
      continuation even when cumulative flow is aligned.
    pre_test_decision: approve_for_testing
    rescue_pre_test_decision: approve_for_rescue_testing
    rescue_profitability_rationale: Rescue keeps the late-day cumulative large20 pressure
      entry grid and tests a moderate target band with slightly wider stop coverage
      to reduce reliance on one large late-session day. The entry module, calendar,
      signal time, flow mode, data window, costs, and validation gates are unchanged.
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: Rescue keeps the late-day cumulative large20 pressure entry grid
    and tests a moderate target band with slightly wider stop coverage to reduce reliance
    on one large late-session day. The entry module, calendar, signal time, flow mode,
    data window, costs, and validation gates are unchanged.
