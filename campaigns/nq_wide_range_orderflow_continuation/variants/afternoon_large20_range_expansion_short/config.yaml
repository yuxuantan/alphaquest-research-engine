research_metadata:
  academic_source: Llorente, Michaely, Saar, and Wang (2002); Cont, Kukanov, and Stoikov
    (2014); Bouchaud, Farmer, and Lillo (2009)
  edge_thesis: Afternoon downside range expansion with aligned large-20 flow may continue
    before the same-day flatten.
  mechanic: From 13:00 through 15:15 ET, enter short only after a completed wide-range
    5-minute bar closes near its low and has aligned large-20 signed-volume imbalance.
  timeframe_rationale: Five-minute bars keep the signal auditable while leaving a
    realistic window before the 15:55 forced flatten.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge by requiring completed
      downside price expansion first and using large-20 selling pressure only as confirmation
      that the bar reflects meaningful participation.
    entry_logic_rationale: Afternoon downside pressure can be persistent when larger
      participants are reducing risk. Short-only direction isolates that behavior
      and prevents a long-side result from masking a failed sell-pressure mechanic.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, independent
      of future levels, and invalidates continuation when the post-entry move cannot
      withstand ordinary NQ noise.
    target_exit_rationale: A fixed-R target is predeclared, avoids fitting to future
      session highs or lows, and lets WFA and monkey tests decide whether the continuation
      impulse has enough payoff after costs.
    profitability_rationale: It should be profitable only if late-session downside
      expansion with large-20 sell participation continues after next-bar execution
      and is not immediately reversed by liquidity provision.
    known_failure_modes: The bar may be exhaustion rather than continuation, the aggregate
      flow proxy may lag price, the effect may concentrate in volatile regimes, and
      one-tick worse slippage can erase a narrow edge.
    pre_test_decision: approve_for_testing
  pre_pnl_density:
    full_history_min_signals_per_year: '>=140.62 across the strictest declared corners'
    limited_core_random_window_min_signals_per_year: '>=134.29 across the strictest declared corners'
    latest_window_min_signals: '>=118 across the strictest declared corners'
    artifact: research_artifacts/nq_wide_range_orderflow_continuation_density_audit_20260630.md
