campaign_id: es_prior_session_flip_retest_orderflow
variant_id: late_morning_large10_absorbed_two_sided_flip
test_run_id: run1
strategy_name: prior_session_flip_retest_orderflow
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Osler (2000); Kavajecz and Odders-White (2004); Brock, Lakonishok,
    and LeBaron (1992); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Prior-session highs/lows may flip from resistance to support, or support
    to resistance, after a completed break and later retest; retest-bar aggregate
    flow should help distinguish accepted continuation from a weak stop probe.
  mechanic: Late-morning two-sided prior-level flip retest; larger-trade counter-pressure
    must be absorbed at the retest.
  timeframe_rationale: Late morning gives the initial break time to form and focuses
    on whether larger prints fail to push price back through the flipped level.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This two-sided variant expresses the S/R flip thesis
      by requiring a completed break beyond the prior RTH high or low, then a later
      completed retest that holds on the breakout side. The public prior level supplies
      the price-action boundary and large10 aggregate orderflow supplies retest-bar
      evidence of counter-pressure absorption before any entry is allowed.
    entry_logic_rationale: The entry does not trade the initial breakout. It records
      the completed breakout, waits up to the predeclared retest-window parameter
      for price to return toward the prior level, and signals only after the completed
      retest bar closes on the accepted side with the predeclared absorbed flow condition.
      Prior-level freshness is not required because S/R flip retests can occur after
      earlier probes of the same public level. Because the decision uses the retest
      bar close, the engine can only fill at the next bar open or later.
    stop_loss_rationale: 'The stop is placed beyond the flipped prior-session level
      using a predeclared tick offset. That is the natural invalidation point: a long
      retest should not trade back below former resistance, and a short retest should
      not trade back above former support. The stop module rejects impossible stops
      that would be on the wrong side of the next-bar entry.'
    target_exit_rationale: The target is fixed-R from the boundary stop distance.
      It tests whether the level flip produces enough continuation relative to its
      invalidation risk without using future highs/lows, post-entry orderflow, discretionary
      level selection, or final session statistics.
    profitability_rationale: Absorption of larger-trade counter-flow at a retested
      public level should indicate liquidity defending the flip and potential continuation
      away from the level. The setup should have enough opportunities because prior-session
      highs/lows are touched frequently, but the later retest requirement avoids chasing
      the first stop-run bar.
    known_failure_modes: The variant should fail if the retest is just noisy rotation,
      if aggregate flow is exhaustion rather than confirmation, if next-bar slippage
      removes the edge, if same-bar stop/target ordering dominates outcomes, or if
      profits concentrate in a small number of trend days.
    pre_test_decision: approve_for_testing
