timeframe: 5m
research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: A completed first-hour NQ move may carry more institutional information than the first 30 minutes and still predict last-half-hour continuation.
  mechanic: Two-sided 15:30 ET continuation from completed first-hour price return plus same-direction signed-volume imbalance.
  timeframe_rationale: Five-minute bars make the completed first-window aggregation auditable while preserving an exact 15:30 ET signal close and same-bar stop/target conflict handling in the runner.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant tests whether the same intraday-momentum/orderflow mechanism is stronger when the predictor window is the completed first hour rather than the first half-hour.
    entry_logic_rationale: The signal is evaluated at 15:30 ET, after the declared first-window aggregate is fully known. The entry is a last-half-hour continuation test, not a VWAP, prior-level, opening-range, or future-session-statistic rule.
    stop_loss_rationale: The percent-from-entry stop is declared before testing, rounded to NQ tick size, and varied only through sl.params.stop_pct.
    target_exit_rationale: The fixed-R target is declared before testing, varied only through tp.params.target_r_multiple, and contains no target below 1.0R.
    profitability_rationale: A real NQ first-window-to-last-half-hour effect should survive neighboring return, imbalance, stop, and target settings after commissions, slippage, WFA, Monte Carlo, and prop-rule simulation.
    known_failure_modes: The edge may be absent in NQ futures, orderflow confirmation may pick exhaustion instead of continuation, strict neighboring settings can be sparse, and results may concentrate in high-volatility sessions.
    pre_test_decision: approve_for_testing
  pre_pnl_density_audit:
    decision: PASS_WITH_SPARSE_NEIGHBORS
    method: Entry-condition count over raw NQ RTH sessions only; no PnL, stop, target, WFA, monkey, Monte Carlo, prop simulation, or holdout result was inspected.
    full_min_signals_per_year: 13.2
    note: Worst declared entry corner before PnL is about 13.2 signals/year; lower and middle corners keep trade density above 50/year.
