campaign_id: nq_vwap_pullback_continuation
title: NQ VWAP Pullback Continuation
decision: FAIL
created_at: '2026-06-22'
status: completed_failed
instrument: NQ
market_timezone: America/New_York
edge_family: nq_vwap_pullback_continuation
hypothesis: NQ may continue in the direction of an established intraday move after a completed pullback to session VWAP reclaims
  or rejects the VWAP side of value.
rationale: This is an NQ port of the ES VWAP pullback continuation family with min-drive thresholds scaled from local ES/NQ
  completed-session range ratios before any NQ PnL testing.
sources:
- title: 'Improving VWAP Strategies: A Dynamical Volume Approach'
  authors: Jedrzej Bialkowski, Serge Darolles, Gaelle Le Fol
  year: 2008
  link: https://ideas.repec.org/p/eve/wpaper/06-08.html
  relevance: Frames VWAP as an institutional execution benchmark and models intraday volume dynamics.
- title: Optimal VWAP Trading Strategy and Relative Volume
  authors: James McCulloch and Vladimir Kazakov
  year: 2007
  link: https://ideas.repec.org/p/uts/rpaper/201.html
  relevance: Describes VWAP as an institutional execution-quality benchmark.
- title: Volume Weighted Average Price Optimal Execution
  authors: Olivier Gueant and Jiang Pu
  year: 2015
  link: https://stanford.edu/~boyd/papers/vwap_opt_exec
  relevance: Frames VWAP benchmark execution under transaction costs and intraday information.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- completed NQ 5-minute RTH bars with session VWAP from completed bars
- one-minute execution detail for fills
lookahead_risks:
- VWAP uses only current and prior completed intraday bars at signal time.
- Opening-drive state uses only completed early RTH bars.
- Signals use completed-bar conditions and enter next bar open or later.
- No final session VWAP, final high/low, future return, or future volume profile is used.
failure_modes:
- NQ VWAP pullbacks may mean-revert instead of continue.
- A VWAP reclaim signal may arrive too late after slippage and commissions.
- Performance may concentrate in high-volatility regimes or one side only.
- Opening-drive variants may have too few trades for WFA density gates.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_opening_drive_inventory_orderflow
  - nq_morning_orderflow_momentum_continuation
  - nq_daily_time_series_momentum
  - nq_range_compression_breakout
  conclusion: Eligible as a distinct VWAP benchmark-pullback test, not opening-drive inventory, pure momentum, daily trend,
    or compression breakout.
