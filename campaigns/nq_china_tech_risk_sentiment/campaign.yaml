campaign_id: nq_china_tech_risk_sentiment
title: NQ China Tech Risk Sentiment
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: china_tech_risk_sentiment
hypothesis: Prior-day U.S.-listed China technology and broad-China ETF relative
  strength or stress may proxy China-specific policy, growth, and global tech-risk
  sentiment that spills into next-session NQ intraday drift.
rationale: This campaign tests CQQQ and FXI relative to QQQ using only completed
  prior-business-day ETF closes. It is distinct from same-day Nikkei/Tokyo close
  spillover, same-day European cash-close spillover, semiconductor leadership, copper
  growth sentiment, USDJPY safe-haven, and NQ own-momentum families.
research_sources:
- title: Do Bulls and Bears Move across Borders? International Transmission of Stock
    Returns and Volatility
  authors: Wen-Ling Lin, Robert F. Engle, and Takatoshi Ito
  year: 1994
  venue: Review of Financial Studies
  link_or_doi: https://doi.org/10.1093/rfs/7.3.507
  expected_mechanism: Motivates cross-border return and volatility transmission as
    trading moves through global markets.
- title: Volatility spillovers between Chinese and U.S. stock markets
  authors: Xiaoyang Liu and coauthors
  year: 2022
  venue: PLOS ONE
  link_or_doi: https://pmc.ncbi.nlm.nih.gov/articles/PMC9561434/
  expected_mechanism: Supports testing China-U.S. equity risk-state transmission,
    while this campaign uses only prior completed ETF closes rather than same-day
    realized U.S. outcomes.
- title: Invesco China Technology ETF
  authors: Invesco
  year: 2026
  venue: ETF product documentation
  link_or_doi: https://www.invesco.com/us/financial-products/etfs/product-detail?productId=ETF-CQQQ
  expected_mechanism: Defines the CQQQ China technology ETF proxy used for the China
    tech relative-risk state.
- title: iShares China Large-Cap ETF
  authors: BlackRock iShares
  year: 2026
  venue: ETF product documentation
  link_or_doi: https://www.ishares.com/us/products/239536/ishares-china-largecap-etf
  expected_mechanism: Defines the FXI broad China large-cap ETF proxy used as a separate
    broad-China risk-state expression.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York
- Yahoo daily adjusted close and volume histories for CQQQ, FXI, and QQQ cached under
  data/external/yahoo_china_tech_risk_sentiment
- Derived feature CSV data/external/nq_china_tech_risk_sentiment_features_20110103_20260612.csv
duplicate_edge_check:
  checked_edges:
  - nq_nikkei225_close_spillover
  - nq_europe_equity_close_spillover
  - nq_semiconductor_leadership_risk_sentiment
  - nq_copper_growth_risk_sentiment
  - nq_small_cap_relative_rotation
  - nq_usdjpy_safe_haven_spillover
  - nq_daily_time_series_momentum
  conclusion: Eligible as a bounded distinct NQ test because it uses prior-day U.S.-listed
    China technology and broad-China ETF relative states, not Asian cash-index same-day
    closes, European close transmission, U.S. semiconductor leadership, commodity growth
    risk, FX safe-haven, or NQ-only momentum.
lookahead_risks:
- A session dated D can use only CQQQ, FXI, and QQQ observations whose date is no
  later than one business day before D.
- Rolling ranks are computed on the daily ETF series before the session-level as-of
  join.
- Signals use a completed NQ bar and enter no earlier than the next bar open.
- No future NQ high/low, final VWAP, post-entry path, same-day ETF return, or future
  China/QQQ observation is used.
failure_modes:
- China ETF moves may be coincident risk sentiment rather than a leading NQ signal.
- CQQQ and FXI can reflect idiosyncratic China policy shocks that do not transfer
  to Nasdaq.
- Yahoo ETF histories require vendor verification before any promotion beyond candidate
  review.
