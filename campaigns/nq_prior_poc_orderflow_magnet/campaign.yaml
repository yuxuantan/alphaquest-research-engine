campaign_id: nq_prior_poc_orderflow_magnet
title: NQ Prior POC Orderflow Magnet
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
edge_family: nq_prior_poc_orderflow_magnet
hypothesis: Prior-session point of control, approximated from completed RTH OHLCV profile data, can act as an accepted-value
  liquidity magnet in NQ. When current-session price remains displaced from that POC but a completed bar starts moving back
  toward it with same-direction aggregate orderflow, the next short-horizon move may continue toward prior accepted value.
rationale: This is a ChartFanatics auction/profile NQ transfer of the already closed ES POC magnet family. It is not a new
  ES test and it is not the same NQ edge as VAH/VAL acceptance. The NQ test was rejected before PnL because the full five-variant
  family did not satisfy density requirements.
research_sources:
- title: Auction Market Theory Trading Strategy by Fabio
  author: Fabio Valentini / ChartFanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/auction-market-strategy
  hypothesis: Auction/profile state can separate balance from imbalance and use POC/LVN plus orderflow aggression as objective
    trade location.
  expected_mechanism: If price is displaced from accepted value but orderflow initiates back toward the POC, the market may
    rotate back toward prior value rather than continue away.
  why_it_may_apply_to_futures: The page is explicitly built for futures and notes New York-session NASDAQ and ES use cases.
- title: Volume Profile Trading Strategy By Forrest Knight
  author: Forrest Knight / ChartFanatics
  year: 2026
  link_or_doi: https://www.chartfanatics.com/strategies/volume-profile-strategy
  hypothesis: Volume-profile edges and auction levels such as PDH, PDL, ONH, and ONL can define objective intraday reaction
    zones in NQ.
  expected_mechanism: Prior accepted-value areas and thin-volume transitions may attract or reject price when completed signal
    candles confirm the reaction.
  why_it_may_apply_to_futures: The page names NQ futures as an applicable instrument and focuses on profile-based intraday
    execution.
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  author: Carol L. Osler
  year: 2000
  link_or_doi: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  hypothesis: Objective intraday levels can influence order placement and short-horizon price behavior.
  expected_mechanism: Prior POC is treated as an objective support/resistance-like accepted-value level.
  why_it_may_apply_to_futures: Centralized futures markets also concentrate liquidity around visible reference levels.
- title: The Price Impact of Order Book Events
  author: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  link_or_doi: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  hypothesis: Orderflow imbalance can explain short-horizon price impact.
  expected_mechanism: Completed-bar Sierra signed-volume imbalance is used as a coarse aggregate participation proxy.
  why_it_may_apply_to_futures: NQ futures have centralized trade data, but the local proxy is not LOB OFI.
source_quality_note: ChartFanatics is practitioner research, not peer-reviewed evidence. This campaign uses academic/exchange-adjacent
  support only for the broader support/resistance, profile, and orderflow mechanisms. The source does not by itself imply a
  tradable edge.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- 5-minute NQ RTH bars generated by the repo pipeline
- prior-session approximate POC computed only after the previous RTH session is complete
- signed, large-10, and large-20 aggregate flow columns for completed signal bars
data_quality_caveats:
- The POC is approximated by distributing each completed 5-minute bar volume uniformly across its high-low tick range; this
  is not true volume-at-price.
- Sierra aggregate orderflow is completed-bar research data, not depth, tape, or LOB OFI.
- Same-bar stop/target conflicts would use the existing pessimistic OHLC handling if PnL were run.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_prior_value_area_orderflow_acceptance
  - nq_pivot_filtered_prior_value_area_acceptance
  - nq_chartfanatics_liquidity_inversion_fvg
  - nq_chartfanatics_measured_move_pullback
  - nq_chartfanatics_smt_po3_midpoint_reversion
  - es_prior_poc_orderflow_magnet
  conclusion: Eligible for an NQ transfer check because no active NQ prior-POC magnet campaign existed. It remains related
    to the failed ES POC magnet family, but the active NQ edge tested here is prior-POC return-to-value, not NQ VAH/VAL acceptance
    or liquidity-sweep/FVG inversion.
lookahead_risks:
- Prior POC is computed only from the previous completed RTH session and is frozen before current-session entries.
- A signal uses the completed 5-minute bar close and would enter at the next bar open or later.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
- All variants would flatten same-day before the configured cutoff and do not hold overnight.
failure_modes:
- Prior POC may be too imprecise when approximated from OHLCV bars instead of true volume-at-price.
- Price can remain displaced from prior POC during trend days, causing the magnet thesis to fade valid continuation.
- Aggregate signed flow may lag price or misclassify participation direction.
- The five-variant family may be too sparse in recent NQ data, which is exactly what the density screen found.
variants:
- morning_above_poc_signed_magnet_short
- morning_below_poc_signed_magnet_long
- late_morning_large10_two_sided_magnet
- midday_signed_two_sided_magnet
- afternoon_large20_two_sided_magnet
parameter_space:
  total_combinations_per_variant: 81
  entry_tunables:
  - min_poc_distance_ticks
  - min_orderflow_imbalance
  stop_tunables:
  - stop_offset_ticks
  target_tunables:
  - target_r_multiple
  parameters:
    entry.params.min_poc_distance_ticks:
    - 4
    - 8
    - 12
    entry.params.min_orderflow_imbalance:
    - 0.0
    - 0.02
    - 0.04
    sl.params.stop_offset_ticks:
    - 1
    - 3
    - 5
    tp.params.target_r_multiple:
    - 1.0
    - 1.5
    - 2.0
