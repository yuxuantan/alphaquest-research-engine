symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
edge_family: fama_french_style_factor_rotation
hypothesis: Conservatively lagged Fama-French HML, RMW, and CMA style-factor states may identify broad equity style rotation that affects the growth-heavy Nasdaq-100 futures contract during the next RTH session.
rationale: This campaign tests public factor-library style-rotation states, not BAB leverage-constraint stress, XLK/SPY technology relative strength, SMH semiconductor leadership, QQQ/QQQE concentration, IWM/QQQ size rotation, VIX option stress, or NQ own-price momentum.
research_sources:
- title: Common Risk Factors in the Returns on Stocks and Bonds
  authors: Eugene F. Fama and Kenneth R. French
  year: 1993
  venue: Journal of Financial Economics
  link_or_doi: https://doi.org/10.1016/0304-405X(93)90023-5
  expected_mechanism: Introduces market, size, and value factors as common equity-return risk factors, motivating HML value-versus-growth state as a style-rotation proxy.
- title: A Five-Factor Asset Pricing Model
  authors: Eugene F. Fama and Kenneth R. French
  year: 2015
  venue: Journal of Financial Economics
  link_or_doi: https://doi.org/10.1016/j.jfineco.2014.10.010
  expected_mechanism: Adds profitability and investment factors, motivating tests of RMW and CMA style states as public risk-factor rotation measures.
- title: Fama/French 5 Factors (2x3) Daily
  authors: Kenneth R. French Data Library
  year: 2026
  venue: Dartmouth Tuck School of Business
  link_or_doi: https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html
  expected_mechanism: Provides the public daily factor-return series used to construct lagged HML, RMW, and CMA ranks.
data_needs:
- NQ Sierra RTH 1-minute OHLCV/orderflow cache in America/New_York.
- Public Kenneth French daily five-factor ZIP cached under data/external/fama_french.
- Derived strict-lag feature CSV data/external/nq_fama_french_style_features_20110103_20260612.csv.
duplicate_edge_check:
  checked_edges:
  - nq_aqr_bab_factor_state
  - nq_tech_relative_strength_intraday
  - nq_semiconductor_leadership_risk_sentiment
  - nq_nasdaq_equal_weight_concentration
  - nq_small_cap_relative_rotation
  - nq_daily_time_series_momentum
  - nq_variance_risk_premium_intraday
  conclusion: Eligible as a distinct factor-rotation test. The driver is public HML/RMW/CMA factor state with a conservative publication lag, not BAB, sector ETF leadership, equal-weight breadth, size ETF rotation, volatility risk premia, or NQ own trend.
lookahead_risks:
- A session dated D can only use the latest Fama-French daily factor observation on or before D minus 45 calendar days.
- Rolling ranks are computed in the factor table before the session-level as-of join.
- Signals use a completed NQ RTH bar and enter no earlier than the next bar open.
- No same-day factor row, final NQ session high/low, final VWAP, future factor return, or post-entry path is used.
failure_modes:
- Fama-French factors are cross-sectional equity factors and may not forecast NQ direction.
- The conservative 45-calendar-day lag can make any daily style signal stale for intraday futures.
- Style rotations may already be absorbed overnight or may only matter over multi-day holding horizons.
- Results may concentrate in growth/value shock regimes and fail WFA, monkey, or prop-rule robustness.
