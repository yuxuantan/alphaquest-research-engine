timeframe: 5m
research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002);
    Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Broad sector ETF risk-off opens may support NQ downside continuation
    when completed NQ price and signed flow confirm selling pressure.
  mechanic: Short NQ after broad sector-down cash opens, negative NQ morning movement,
    and negative aggregate signed-volume confirmation.
  timeframe_rationale: Five-minute bars let the cash ETF open settle and give NQ enough
    completed bars for cumulative price/orderflow confirmation without using same-day
    ETF closes.
  pre_pnl_density: research_artifacts/nq_sector_opening_breadth_orderflow_continuation_density_audit_20260622.md
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the sector-opening-breadth edge
      by requiring a declared sector ETF opening-breadth state, completed NQ movement
      from the RTH open, and aggregate orderflow confirmation before next-bar entry.
    entry_logic_rationale: The entry uses same-day ETF opens only after they are observable
      and waits for completed NQ 5-minute bars. It does not use ETF high, low, close,
      final NQ levels, or future orderflow.
    stop_loss_rationale: A percent-from-entry stop is simple, predeclared, and does
      not use future levels.
    target_exit_rationale: A fixed-R target keeps payoff tied to initial stop distance
      and preserves the 1.0R minimum.
    profitability_rationale: If same-day sector breadth captures cash-market risk
      appetite not fully priced into NQ, then sessions where NQ price and orderflow
      confirm that breadth should outperform unfiltered NQ movement after costs.
    known_failure_modes: Sector ETF opening breadth can be stale by the signal time,
      dividend gaps can contaminate breadth, NQ may already price the overnight news,
      and signed volume may confirm too late.
    pre_test_decision: approve_for_testing
  source_es_campaign: es_sector_opening_breadth_orderflow_continuation
  source_es_parameter_space: campaigns/es_sector_opening_breadth_orderflow_continuation/rescue_attempts/parameter_space_rescue_1/broad_down_morning_signed_short_1130/config.yaml
  nq_port_note: ES rescue parameter spaces were selected before this NQ test and are
    treated as the predeclared NQ baseline, not as a rescue after NQ results.
  nq_density_adjustment: 'Pre-PnL density audit only: sector-count grid widened before
    NQ staged testing so at least one declared corner can satisfy the configured trade-count
    opportunity gate.'
