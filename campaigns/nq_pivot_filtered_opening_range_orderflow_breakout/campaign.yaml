failure_reason: 'Rejected before staged NQ PnL: 21/45 declared entry-grid rows failed
  at least one 50 signals/year density gate. The OR15 large10 and OR15 signed variants
  cleared full-history, limited-core, and latest-252-session density, but OR30 large20
  and OR60 signed failed every entry row and OR30 signed failed three limited-core
  rows. Dropping the sparse variants, widening the entry windows, or removing the
  pivot/orderflow requirements would change the declared five-variant edge and duplicate
  broader ORB families. No NQ PnL was inspected.'
