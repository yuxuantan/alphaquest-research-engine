campaign_id: nq_pivot_filtered_opening_range_orderflow_breakout
title: NQ opening-range orderflow breakout filtered by completed pivot market structure
decision: FAIL
created_at: '2026-06-30'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
source_es_campaign: es_pivot_filtered_opening_range_orderflow_breakout
hypothesis: NQ opening-range breakouts with aligned completed-bar aggregate orderflow
  may continue more reliably when the breakout direction agrees with latest confirmed
  multi-timeframe swing-pivot market structure.
rationale: This is a bounded composite campaign. The primary edge is opening-range
  breakout with aggregate orderflow confirmation; the fixed secondary condition is
  completed swing-pivot trend direction. The pivot filter cannot create trades and
  only rejects base breakout signals lacking same-direction confirmed structure.
sources:
- title: Opening Range Breakout Strategy as Applied to Index Futures and Crude Oil
    Futures
  authors: Ulf Holmberg, Christian Lonnback, and Carl Lundstrom
  year: 2013
  venue: Finance Research Letters
  link: https://doi.org/10.1016/j.frl.2013.03.001
  relevance: Motivates opening-range breakouts in index futures as a testable intraday
    price-action edge.
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, and Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2018.05.009
  relevance: Supports the broader idea that intraday market information can continue
    inside the same session.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://doi.org/10.1093/jjfinec/nbt003
  relevance: Motivates order-flow imbalance as a short-horizon pressure proxy; this
    campaign uses completed-bar Sierra aggregate signed-volume proxies.
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical
    Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, and Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: Supports deterministic local-extrema pattern definitions; this campaign
    uses confirmed swing pivots only.
- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Provides futures-market support for trend persistence; here it motivates
    aligning breakouts with completed intraday structure.
data_needs:
- local Sierra NQ completed 1-minute RTH OHLCV and aggregate signed/large-trade volume
  cache
- 5-minute bars generated by the repo pipeline from the NQ 1-minute cache
- opening range computed only after the declared opening window is complete
- completed 5/15-minute pivot-state construction from local NQ OHLC bars
- 1-minute detail data for stop/target conflict handling
duplicate_edge_review:
  status: no_exact_active_nq_duplicate_found
  distinct_from:
  - 'nq_archive_range_compression_retest: prior-session compression plus OR/prior-session
    breakouts without the fixed pivot/orderflow composite used here'
  - 'nq_20_80_price_ending_barrier: ChartFanatics price-ending barrier breakout/pivot
    mechanics, rejected before PnL by density'
  - 'nq_prior_session_level_breakout_continuation: prior-session level breakout, not
    opening-range plus completed pivot/orderflow filter'
  - 'nq_range_compression_breakout: compression-state breakout family, not this pivot-filtered
    ORB orderflow composite'
lookahead_risks:
- Opening range is frozen only after the configured range window has completed.
- Orderflow confirmation uses only the completed breakout bar.
- Pivot structure confirms swing highs/lows only after right-side confirmation bars
  are complete.
- Signals generated from completed bars are filled no earlier than the next bar open
  by the engine.
- No final session high/low, final VWAP, final volume profile, future orderflow, or
  post-entry pivots are used.
failure_modes:
- The pivot filter may select late breakouts after the move is already exhausted.
- Opening-range breakouts can be liquidity sweeps that reverse after costs.
- Aggregate signed flow can mark exhaustion rather than informed participation.
- Strict structure filtering can reduce trade count below 50 per year in WFA or incubation.
- The stop geometry can remain too wide for average post-breakout continuation.
- The ES source campaign failed limited-core robustness even after one parameter-space
  rescue.
parameter_space:
  source: ported before NQ PnL inspection from the ES parameter_space_rescue_1 grids
  combinations_per_variant: 81
  entry_tunables:
  - entry.params.base_params.breakout_buffer_ticks
  - entry.params.base_params.min_orderflow_imbalance
  stop_tunable: sl.params.max_stop_points
  target_exit_tunable: tp.params.target_r_multiple
variants:
- or15_large10_pivot_flow_breakout_1030
- or15_signed_pivot_flow_breakout_1030
- or30_large20_pivot_flow_breakout_1100
- or30_signed_pivot_flow_breakout_1100
- or60_signed_pivot_flow_breakout_1200
rescue_policy:
  rescue_scope: not_authorized_for_nq_run
  max_rescue_attempts_per_failed_variant: 0
  allowed_changes: []
  forbidden_changes:
  - entry module
  - base opening-range module
  - pivot filter
  - stop-loss module
  - take-profit module
  - opening-range definition
  - post-result filters
  - stage criteria
  - data window
  - timeframe
  - costs or fill assumptions
  - parameter grid after NQ results
