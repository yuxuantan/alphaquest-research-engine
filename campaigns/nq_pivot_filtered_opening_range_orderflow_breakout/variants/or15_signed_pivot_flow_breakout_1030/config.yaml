research_metadata:
  academic_source: Holmberg, Lonnback, and Lundstrom (2013); Gao, Han, Li, and Zhou
    (2018); Cont, Kukanov, and Stoikov (2014); Lo, Mamaysky, and Wang (2000); Moskowitz,
    Ooi, and Pedersen (2012)
  edge_thesis: NQ opening-range orderflow breakouts may continue more reliably when
    the breakout direction agrees with completed multi-timeframe swing-pivot structure.
  mechanic: 15-minute signed-flow opening-range breakout filtered by completed 5/15-minute
    pivot direction. The base opening-range breakout must emit first; the pivot filter
    cannot create trades by itself.
  timeframe_rationale: Five-minute bars define completed opening-range and breakout
    states while preserving one-minute detail handling for same-bar stop/target conflicts.
    Pivot states are aggregated only from completed five-minute NQ bars.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    entry_logic_rationale: The opening range is frozen only after its configured completed
      window. The base breakout and orderflow confirmation are evaluated on completed
      five-minute NQ bars, the pivot filter uses confirmed right-side pivots only,
      and staged execution is next bar or later.
    stop_loss_rationale: The stop remains the predeclared opening-range-edge stop
      with a max-stop cap. It rejects the breakout-continuation thesis when price
      returns through the opposite opening-range edge without using any future pivots
      or post-entry orderflow.
    target_exit_rationale: The target is a fixed-R exit with target_r_multiple at
      or above 1.0R, and unresolved positions flatten at the same-session cutoff.
      Target distance is not altered after NQ outcomes are known.
    profitability_rationale: The setup should only work if NQ opening-range breakouts
      with aligned completed orderflow and confirmed pivot structure represent real
      inventory continuation rather than isolated stop probes or exhaustion moves.
    known_failure_modes: The pivot filter can lag, NQ opening breakouts can reverse
      violently, aggregate flow can be exhaustion rather than information, strict
      filters can reduce trade density, and the ES source campaign already failed
      robustness.
    pre_test_decision: approve_for_testing
    mechanic_expresses_edge: 15-minute signed-flow opening-range breakout filtered
      by completed 5/15-minute pivot direction. The base opening-range breakout must
      emit first; the pivot filter cannot create trades by itself. This expresses
      the composite edge by requiring opening auction breakout, same-bar aggregate
      orderflow participation, and same-direction confirmed swing-pivot structure
      before any entry. The pivot filter cannot create trades by itself.
  pre_pnl_port_note: This NQ port uses the ES parameter_space_rescue_1 grid before
    any NQ PnL inspection; no NQ rescue attempt is authorized.
  source_es_config_path: campaigns/es_pivot_filtered_opening_range_orderflow_breakout/rescue_attempts/parameter_space_rescue_1/or15_signed_pivot_flow_breakout_1030/config.yaml
  pre_pnl_density:
    status: variant_density_passed_campaign_failed
    decision: NEEDS MANUAL REVIEW
    artifact: research_artifacts/nq_pivot_filtered_opening_range_orderflow_breakout_density_audit_20260630.md
    detail_csv: research_artifacts/nq_pivot_filtered_opening_range_orderflow_breakout_density_audit_20260630.csv
    summary: min_full=60.356915; min_limited_core=63.465426; min_latest_252=57
