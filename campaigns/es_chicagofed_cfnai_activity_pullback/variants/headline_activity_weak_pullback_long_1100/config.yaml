research_metadata:
  academic_source: Chicago Fed CFNAI; Fama and French (1989); Stock and Watson (1999)
  edge_thesis: Lagged weak U.S. real-activity states may raise required ES equity
    risk compensation; an intraday pullback supplies the current-session discount
    needed for a same-day long test.
  mechanic: At 11:00 ET, long ES after a completed-bar RTH pullback when the lagged
    headline CFNAI value is at or below the predeclared weak-activity threshold. The
    signal uses the completed bar ending at the configured time and enters no earlier
    than the next bar open.
  timeframe_rationale: One-minute RTH bars allow deterministic completed-bar signal
    timing, next-bar execution, pessimistic OHLC same-bar stop/target handling, and
    forced same-day flattening.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-17'
  mechanics_review:
    mechanic_expresses_edge: At 11:00 ET, long ES after a completed-bar RTH pullback
      when the lagged headline CFNAI value is at or below the predeclared weak-activity
      threshold. This directly maps the business-conditions edge into a lagged macro
      state plus an observable intraday discount, without using the final session
      range or future CFNAI observations.
    entry_logic_rationale: The headline index aggregates the broad common factor across
      national activity indicators, which is less sector-specific than any one component.
      Pairing a weak broad activity state with a same-session pullback tests whether
      higher business-cycle risk premia are paid intraday after price pressure. The
      entry waits for the completed bar at the signal time, so the order is based
      only on the lagged CFNAI row and price action already printed in the RTH session.
    stop_loss_rationale: A percent-from-entry stop is used because this is a broad
      index-futures pullback, not a level-specific support or stop-run setup. The
      stop grid is wide enough for ES intraday noise but finite enough to reject variants
      that only work by tolerating uncontrolled trend continuation.
    target_exit_rationale: A fixed-R target expresses the expected same-day rebound
      premium in a mechanically auditable way. It avoids post-entry discretion, exits
      before the configured flatten time if the rebound occurs, and leaves losing
      pullbacks to the predefined stop or forced flatten.
    profitability_rationale: The setup has a plausible path to profitability only
      if weak business conditions raise short-horizon equity compensation and the
      current-session pullback improves entry price enough to overcome one tick of
      slippage, commission, and pessimistic same-bar ordering. The pre-test density
      audit shows every declared grid corner can exceed 50 signals per year, so the
      hypothesis is not dependent on rare macro states.
    known_failure_modes: The main failure modes are that weak activity is simply bearish
      intraday, the pullback continues through the stop, the stale monthly state has
      no same-day information, returns concentrate in recession/crisis windows, or
      the apparent edge disappears after next-bar execution and realistic costs.
    pre_test_decision: approve_for_testing
