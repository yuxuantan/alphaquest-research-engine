campaign_id: nq_calendar_weekday_bias
variant_id: thu_fri_lateweek_strength_1030
test_run_id: run1
strategy_name: calendar_session_bias
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: French (1980); Gibbons and Hess (1981); Floros (2014)
  edge_thesis: Pre-known weekday effects may create persistent NQ intraday return bias after the cash open.
  mechanic: At 10:30 ET, long NQ on Thursdays and Fridays, testing late-week strength in the day-of-week anomaly family; entry
    is next bar open.
  timeframe_rationale: Five-minute bars provide completed-bar signaling, next-bar-open execution, and enough intraday holding
    time while avoiding overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  pre_pnl_density:
    artifact: research_artifacts/nq_calendar_weekday_bias_density_audit_20260622.md
    screen: research_artifacts/nq_calendar_weekday_bias_density_audit_20260622.csv
    nq_grid_fixed_before_pnl: true
  mechanics_review:
    mechanic_expresses_edge: At 10:30 ET, long NQ on Thursdays and Fridays, testing late-week strength in the day-of-week
      anomaly family; entry is next bar open.
    entry_logic_rationale: Weekday is known before the session; the signal uses the completed configured 5-minute bar and
      enters no earlier than next bar open.
    stop_loss_rationale: The percent stop is predeclared, rounded to NQ tick size, and varied only through the stop_pct grid.
    target_exit_rationale: The fixed-R target is declared before PnL testing and avoids exits selected from future intraday
      highs/lows, final VWAP, or discretionary rules.
    profitability_rationale: A real weekday bias should survive neighboring stop and target settings after costs and robustness
      tests.
    known_failure_modes: Calendar effects can decay, invert, or concentrate in a few regimes and may fail monkey/WFA robustness.
    pre_test_decision: approve_for_testing
