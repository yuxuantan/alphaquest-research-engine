  - nq_prior_session_level_breakout_continuation
  - nq_prior_session_breakout_orderflow_confirmation
  - nq_archive_range_compression_retest
  - chartfanatics_remaining_strategy_source_gate_after_round_number
  conclusion: Eligible for the NQ ES-transfer search because this campaign requires same-day opening-range
    breakout first, then a later retest that holds the broken OR boundary outside the range with completed
    orderflow confirmation. It is not immediate OR breakout continuation, not failed-breakout reclaim
    back inside the range, not prior-session high/low breakout continuation, and not a ChartFanatics-sourced
    duplicate launch.
