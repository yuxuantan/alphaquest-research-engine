data_needs:
- data/cache/orderflow/nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny.csv
- data/external/nq_realized_semivariance_features_20110103_20260612.csv
- completed NQ/MES RTH 1-minute bars and same-clock MES participation ranks
- lagged prior-session NQ downside-semivariance ranks available before the current RTH session
lookahead_risks:
- Entry uses completed 1-minute bars only and enters no earlier than the next bar open.
- MES participation ranks are same-clock historical ranks already present in the local cache.
- The NQ trend window ends before the pullback/crowding lookback, so the trend filter does not see the pullback or future
  bars.
- The semivariance feature is a prior-session lagged NQ value and cannot use current-session returns.
- No future NQ return, final daily high/low, final VWAP, post-entry MES/NQ data, or post-entry orderflow is used.
failure_modes:
- MES participation may not isolate NQ-specific retail or less-informed crowding.
- High downside semivariance may indicate information-driven NQ continuation rather than temporary pullback pressure.
- The windowed first-signal design can increase trade count but may include weaker signals than fixed-time entries.
- High-volatility payoffs may also produce larger drawdowns and fail monkey or Monte Carlo prop-rule stress.
- Profits can concentrate in a small number of high-volatility sessions.
