campaign_id: nq_high_semivariance_mes_trend_pullback_crowding
title: NQ High-Semivariance MES Crowding Trend-Pullback Reversion
decision: FAIL
created_at: '2026-06-22'
instrument: NQ
market_timezone: America/New_York
edge_family: nq_mes_participation_crowding_trend_pullback_high_downside_semivariance
hypothesis: Elevated MES smaller-contract participation during a completed NQ pullback may proxy broad equity-index crowding.
  When the prior completed NQ RTH session had high downside semivariance, same-day unwind payoffs may be larger, but continuation
  risk should cause rejection if the effect is not robust.
rationale: 'This is a direct pre-PnL NQ port of the strongest local ES high-semivariance MES-crowding template. A trade requires
  all three predeclared components: MES participation intensity, completed NQ prior-trend/pullback structure, and lagged high
  NQ downside-semivariance rank.'
