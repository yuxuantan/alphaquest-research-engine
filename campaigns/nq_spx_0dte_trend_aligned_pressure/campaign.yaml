timeframe: 1m
edge_family: spx_0dte_calendar_pressure_trend_alignment
hypothesis: Known SPX same-day option-expiration sessions may transmit broad-index dealer-hedging or liquidity-demand
  pressure into NQ futures when completed NQ intraday structure agrees across 30-minute and 120-minute windows.
rationale: This is a pre-PnL NQ port of the ES 0DTE trend-aligned pressure campaign. The prior NQ 0DTE test used
  open-to-signal move fade/continuation variants; this campaign keeps the ES fixed multi-window trend-alignment
  mechanic and tests whether that pressure transfers to higher-beta NQ after costs.
sources:
- title: Does 0DTE Options Trading Increase Volatility?
  authors: Brogaard, Han, and Won
  year: 2023
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4426358
  relevance: Documents the market-impact question around 0DTE option activity.
- title: Volatility Insights - Evaluating the Market Impact of SPX 0 DTE Options
  authors: Cboe
  year: 2024
  link: https://www.cboe.com/insights/posts/volatility-insights-evaluating-the-market-impact-of-spx-0-dte-options/
  relevance: Provides exchange/practitioner context for SPX 0DTE mechanics and hedging concerns.
- title: Time Series Momentum
  authors: Moskowitz, Ooi, and Pedersen
  year: 2012
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2089463
  relevance: Supports the secondary trend-persistence direction filter.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/nq_spx_0dte_calendar_sessions_20110103_20260612.csv
lookahead_risks:
- SPX 0DTE calendar membership is ex-ante and must not encode realized outcomes.
- Trend windows use only completed NQ one-minute bars ending at the signal timestamp.
- Signals generated from a completed bar must execute no earlier than the next bar open through the engine.
- No option volume, dealer position, final VWAP, future high/low, or post-signal path is used.
failure_modes:
- SPX 0DTE pressure may affect ES more directly than NQ.
- NQ trend alignment may select late exhausted moves rather than persistent pressure.
- 0DTE calendar direction is ambiguous without dealer-position sign information.
- Positive results may concentrate in a few volatility regimes or large trend days.
