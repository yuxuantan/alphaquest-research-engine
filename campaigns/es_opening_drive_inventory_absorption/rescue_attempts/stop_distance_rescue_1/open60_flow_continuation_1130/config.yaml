research_metadata:
  academic_source: Gao, Han, Li, and Zhou (2018); Heston, Korajczyk, and Sadka (2010); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: High-volume first-60-minute downside opening drives with aligned aggressive sell flow may continue after the first hour if cumulative delta remains supportive.
  mechanic: Use only the completed 09:30-10:29 ET opening window. At 11:30 ET, go short when opening return, opening signed-flow imbalance, opening volume rank, and current cumulative delta remain aligned; flatten at 13:30 ET unless stop or target is hit.
  timeframe_rationale: 1-minute bars preserve next-bar-open execution and expose same-bar stop/target conflicts to the pessimistic OHLC handler.
  rescue_attempt: parameter_space_rescue_1
  rescue_rules: Changed only the declared parameter space; original opening-drive inventory/absorption mechanic retained.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-19'
  mechanics_review:
    mechanic_expresses_edge: 'This user-authorized stop-distance rescue preserves the existing es_opening_drive_inventory_absorption/open60_flow_continuation_1130 entry mechanic: Use only the completed 09:30-10:29 ET opening window. At 11:30 ET, go short when opening return, opening signed-flow imbalance, opening volume rank, and current cumulative delta remain aligned; flatten at 13:30 ET unless stop or target is hit..'
    entry_logic_rationale: Entry logic is unchanged from the selected best core-grid source run; no signal, direction, time-window, filter, data, or execution rule is altered.
    stop_loss_rationale: Only stop distance is widened by 1.5x to test whether the best existing core-grid variant was being rejected because the stop was too tight for ES noise. This is a user-authorized additional rescue and not a new edge.
    target_exit_rationale: Target/exit logic and parameter space are unchanged, so any improvement must come from stop-distance tolerance rather than post-result take-profit tuning.
    profitability_rationale: If the original edge has directional value but premature stop-outs dominated, a wider stop may allow the intended move to develop after next-bar execution and costs.
    known_failure_modes: A wider stop may increase drawdown, reduce expectancy, hide a non-existent edge, or pass only in a narrow core-grid pocket; all normal staged gates still apply.
    pre_test_decision: approve_for_testing
  user_authorized_additional_rescue:
    id: stop_distance_rescue_1
    created_at: '2026-06-19T00:00:00'
    source_campaign_id: es_opening_drive_inventory_absorption
    source_variant_id: open60_flow_continuation_1130
    source_run_id: rescue1
    source_config_path: campaigns/es_opening_drive_inventory_absorption/rescue_attempts/parameter_space_rescue_1/open60_flow_continuation_1130/config.yaml
    selection_rule: best existing limited core-grid run per campaign by core pass flag, benchmark-pass combos, profitable-combo rate, top net profit, PF, MAR, and trade density
    allowed_change_scope: stop_distance_only
    stop_distance_multiplier: 1.5
    normal_rescue_policy_override: true
    stop_changes:
    - path: strategy.sl.params.stop_pct
      old: 0.004
      new: 0.006
    - path: strategy.entry.params.stop_pct
      old: 0.004
      new: 0.006
    - path: core_grid.parameters.sl.params.stop_pct
      old:
      - 0.0035
      - 0.005
      - 0.0075
      new: &id002
      - 0.00525
      - 0.0075
      - 0.01125
