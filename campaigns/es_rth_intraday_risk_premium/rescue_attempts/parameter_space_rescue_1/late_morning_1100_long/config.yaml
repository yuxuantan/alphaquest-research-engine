campaign_id: es_rth_intraday_risk_premium
variant_id: late_morning_1100_long
test_run_id: rescue1
strategy_name: calendar_session_bias
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Heston Korajczyk Sadka (2010); Lou Polk Skouras (2019); Urquhart et al. intraday timing evidence
  edge_thesis: ES may retain positive RTH intraday drift after late-morning volatility decays.
  mechanic: Fixed long entry after completed 11:00 ET bar; no tunable entry, stop, or target parameters.
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: This failed variant is receiving its one allowed per-variant rescue after the user clarified that every failed
    variant may be rescued once.
  rescue_constraints: Same core edge, entry module, setup mode, direction/time window, timeframe, stop module, target module,
    costs, data window, and stage criteria. Only existing fixed parameters or tunable parameter space are changed.
data:
  dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
  source_timeframe: 1m
  source: parquet
  raw_parquet: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 10
  rth_start: 09:30:00
  rth_end: '15:59:00'
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: calendar_session_bias
    params:
      setup_mode: rth_intraday_risk_premium
      signal_time: '11:00:00'
      bar_interval_minutes: 5
      max_trades_per_day: 1
      weekday_directions:
        0: long
        1: long
        2: long
        3: long
        4: long
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 2.0
  flatten_time: '15:55:00'
core:
  data_subset: &id001
    start_date: '2011-01-03'
    end_date: '2026-06-09'
    session_labels:
    - RTH
  initial_balance: 150000
  tick_size: 0.25
  point_value: 50.0
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: '15:55:00'
  max_trades_per_day: 1
benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 12
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
