strategy_name: cboe_vxn_vix_dispersion
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Giot (2005); Kablan, Emiroglu, and Danisoglu (2021); official Cboe
    VIX/VXN histories
  edge_thesis: High relative Nasdaq implied volatility versus VIX may identify technology-led
    risk-off pressure in NQ.
  mechanic: At 10:00 ET, short NQ when the latest prior Cboe VXN/VIX ratio rank is
    in the upper tail.
  timeframe_rationale: One-minute bars preserve the fixed-time completed-bar signal
    and next-bar execution while using only prior Cboe daily VIX/VXN observations.
  pre_pnl_density: research_artifacts/nq_cboe_vxn_vix_dispersion_intraday_density_audit_20260622.md
  mechanics_review_required: true
  mechanics_review_version: '2026-06-22'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the NQ VXN/VIX dispersion edge
      by mapping a strictly lagged Cboe VXN/VIX state to a fixed-direction intraday
      NQ exposure at a predeclared time.
    entry_logic_rationale: The signal uses the latest completed Cboe VIX and VXN daily
      closes strictly before the NQ session date. It waits for the configured completed
      NQ bar and enters no earlier than the next bar open.
    stop_loss_rationale: Percent-from-entry stop is predeclared and rounded to the
      NQ tick; it uses no future-derived level.
    target_exit_rationale: Fixed-R target keeps payoff tied to initial stop distance
      and enforces the 1.0R minimum.
    profitability_rationale: If Nasdaq-specific implied-volatility stress or relief
      contains information about next-session NQ risk appetite, the fixed-time NQ
      exposure should survive neighboring thresholds, stops, targets, WFA, Monte Carlo,
      and prop-rule simulation.
    known_failure_modes: VXN/VIX daily states may lag NQ, high relative VXN can imply
      either risk-off continuation or mean reversion, and any apparent edge may concentrate
      in crisis regimes.
    pre_test_decision: approve_for_testing
  source_es_campaign: es_cboe_vxn_vix_dispersion_intraday
  source_es_parameter_space: campaigns/es_cboe_vxn_vix_dispersion_intraday/rescue_attempts/parameter_space_rescue_1/high_vxn_vix_ratio_short_1000/config.yaml
  nq_port_note: Selected ES rescue parameter spaces were fixed before this NQ test
    and are treated as predeclared NQ baselines, not as a rescue after NQ results.
