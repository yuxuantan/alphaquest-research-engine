research_metadata:
  academic_source: Bernanke and Kuttner (2005); Rigobon and Sack (2003); U.S. Treasury Daily Treasury Rates; Cont, Kukanov, and Stoikov
    (2014)
  edge_thesis: A prior-day 10-year shock should matter more when larger NQ prints confirm same-day repricing pressure; the large-10
    flow filter is the participation proxy.
  mechanic: Two-sided NQ confirmation after 1-day 10-year yield change rank with large-10 flow confirmation using large10 cumulative
    orderflow.
  timeframe_rationale: Five-minute bars provide completed NQ movement and cumulative aggregate orderflow after the cash open while preserving
    next-bar execution and enough observations for 50+ trades/year.
  pre_pnl_density: Failed NQ pre-PnL density audit; see research_artifacts/nq_treasury_rate_orderflow_confirmation_density_audit_20260630.md. No NQ PnL inspected.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the Treasury-rate/orderflow edge by using lagged 1-day 10-year yield change rank
      with large-10 flow confirmation as the macro rate state, then requiring completed NQ price movement plus cumulative large10 confirmation
      before entry.
    entry_logic_rationale: The Treasury state is frozen from the latest daily observation strictly before the NQ session. The intraday
      trigger uses only completed NQ 5-minute bars at declared decision times, so it avoids same-day Treasury lookahead and requires
      current NQ participation to agree with the lagged rate state.
    stop_loss_rationale: A fixed percent stop is used because the edge thesis is directional rate-pressure transmission, not a future-derived
      level. The stop grid is declared before testing and keeps risk comparable across rate thresholds.
    target_exit_rationale: A fixed-R target ties payoff to initial stop distance, enforces the 1.0R minimum, and avoids optimizing exits
      from future intraday levels or post-entry orderflow.
    profitability_rationale: If lagged rate/curve tail moves contain information about equity-index discount-rate repricing, then NQ
      sessions where price and aggregate flow confirm that state should have a better after-cost continuation distribution than unfiltered
      NQ movement.
    known_failure_modes: Rate-equity sign can flip by regime, Treasury observations can be stale by RTH, NQ confirmation can arrive
      too late, and profitable years may concentrate around rate-volatility regimes.
    pre_test_decision: approve_for_testing
