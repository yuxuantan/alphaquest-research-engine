campaign_id: es_opening_gap_orderflow_continuation
title: ES opening gap hold continuation with aggregate orderflow
decision: FAIL
created_at: '2026-06-18'
instrument: ES
market_timezone: America/New_York
edge_family: opening_gap_orderflow_continuation
hypothesis: ES RTH opening gaps from the prior RTH close may continue intraday when
  the post-open window holds on the gap side of the prior close and completed aggregate
  orderflow remains aligned with the gap direction.
sources:
- title: Market Intraday Momentum
  authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
  year: 2018
  venue: Journal of Financial Economics
  doi: 10.1016/j.jfineco.2018.05.009
  link: https://ideas.repec.org/a/eee/jfinec/v129y2018i2p394-414.html
  relevance: Documents predictable same-day intraday return continuation, motivating
    tests of whether post-open gap acceptance predicts later intraday continuation.
- title: Overnight-Intraday Reversal Everywhere
  authors: Chun Liu, Yang Liu, Tianyu Wang, Guofu Zhou, Yingzi Zhu
  year: 2016
  venue: SSRN working paper
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2730304
  relevance: Provides the competing overnight reversal benchmark; this campaign tests
    the opposite condition, where the RTH gap is accepted instead of faded.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon pressure proxy; this
    campaign uses completed Sierra aggregate trade-side flow.
rationale: This is a bounded composite edge. The price-action state is a prior-close-to-RTH-open
  gap that does not fill during the completed source window. Aggregate orderflow is
  only used after that completed window and must agree with the gap direction. It
  is distinct from the failed opening-gap absorption fade because it follows accepted
  gaps instead of fading counter-gap flow.
data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- 5-minute strategy bars aggregated from local 1-minute RTH Sierra bars
- previous RTH close from completed prior session
- completed source-window signed_volume, volume, large10_signed_volume, large10_volume
lookahead_risks:
- Prior RTH close is known only after the previous session completes.
- RTH open is known at the current open, but no signal is emitted until the configured
  source window closes.
- The gap-hold and orderflow checks use only completed bars ending at or before the
  signal timestamp.
- Signals generated from a completed source window are filled no earlier than the
  next bar open.
- The stop uses the known prior close boundary and next-bar entry price; no future
  session information is used.
- No final session high/low, final VWAP, volume profile, or future orderflow is used.
failure_modes:
- Most opening gaps may still mean-revert despite early acceptance.
- Aligned aggregate flow may mark exhaustion after the gap move rather than continuation
  sponsorship.
- Boundary stops at the prior close can be wide for larger gaps and reduce MAR.
- The edge may concentrate in a few macro-event sessions or volatility regimes.
- Small 1-3 point gaps may be too noisy after ES costs and slippage.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_opening_gap_orderflow_absorption_fade
  - es_overnight_intraday_reversal
  - es_overnight_return_late_day_momentum
  - es_opening_drive_inventory_absorption
  - es_prior_session_level_breakout_continuation
  - es_signed_orderflow_persistence
  conclusion: Eligible as a new bounded composite campaign because it requires an
    opening gap to hold outside the prior RTH close and then follows same-direction
    aggregate flow. Existing active campaigns faded gap absorption, faded overnight
    gaps, traded late-day overnight-return continuation, tested opening-drive state,
    or used prior-session high/low gap holds rather than prior-close gap acceptance
    with aligned orderflow.
