campaign_id: nq_overnight_drift_european_open
title: NQ Overnight Drift Around European Open
decision: FAIL
created_at: '2026-06-23'
symbol: NQ
market: CME E-mini Nasdaq-100 futures
dataset_id: nq_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll
timeframe: 5m
edge_family: overnight_drift_european_open
hypothesis: >
  NQ futures may carry a positive ETH-session drift around the European-open
  transfer window, especially after the prior U.S. RTH session declined,
  because global investors and intermediaries rebalance U.S. equity-index risk
  after the U.S. close and before European cash-market liquidity fully
  normalizes.
sources:
- title: The Overnight Drift
  authors: Nina Boyarchenko, Lars Larsen, and Paul Whelan
  year: 2020
  venue: Federal Reserve Bank of New York Staff Reports No. 917
  url: https://www.newyorkfed.org/medialibrary/media/research/staff_reports/sr917.pdf
  relevance: >
    The paper documents a concentrated positive overnight return component in
    U.S. equity-index futures around the 02:00-03:00 ET European-open window,
    with a mechanism linked to imbalances generated by prior U.S. trading.
rationale: >
  Existing ES transfer candidates and NQ RTH overnight/gap variants were
  exhausted or rejected under the staged workflow before this NQ-specific ETH
  branch was formulated. This campaign does not trade a later RTH gap,
  reversal, or lead-lag confirmation. It directly tests whether the published
  overnight drift window is stronger on NQ, using only completed ETH bars and
  prior completed RTH fields.
data_needs:
  primary: data/cache/databento/nq_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll.parquet
  validation: data/cache/databento/nq_databento_ohlcv_1m_20100606_20260531_eth_rth_explicit_roll.validation.json
  cost_policy: Uses already-local Databento OHLCV cache only; no paid data download is required.
  required_fields:
  - timestamp
  - open
  - high
  - low
  - close
  - volume
  - contract_symbol
  generated_fields:
  - session_date
  - session_label
  - is_eth
  - prev_rth_open
  - prev_rth_close
execution_and_risk_notes: >
  This is an ETH/overnight-session research branch. The configs explicitly keep
  prop-rule checks enabled with an ETH-specific 04:00 ET cutoff and allow
  non-RTH positions only because the trade is opened and flattened inside the
  same ETH session. Any pass is only a candidate strategy and still needs manual
  review for broker, liquidity, and prop-session eligibility.
lookahead_risks:
- Signals use only completed ETH bars through the declared signal clock.
- Prior RTH open and close are available before the ETH signal window.
- No future overnight high, future low, final session range, future VWAP, or future RTH information is used.
- Entry is next-bar open after the completed signal bar, handled by the engine.
- Stop/target conflicts use the existing pessimistic same-bar handling unless 1-minute detail resolves the path.
duplicate_edge_check:
  active_scope_only: true
  checked_edges:
  - nq_overnight_intraday_reversal
  - nq_overnight_inventory_sweep_reversion
  - nq_opening_gap_orderflow_continuation
  - nq_prior_session_breakout_orderflow_confirmation
  - es_overnight_drift_european_open
  conclusion: >
    Eligible as a distinct NQ test because it trades the ETH European-open drift
    window directly on NQ, not a later RTH gap/reversal, prior-session breakout,
    or orderflow-confirmed transfer of an ES result.
