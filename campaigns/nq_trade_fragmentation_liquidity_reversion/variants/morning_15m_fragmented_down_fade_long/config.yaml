test_run_id: run1
strategy_name: trade_fragmentation_liquidity_reversion
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hendershott, Jones, and Menkveld (2011); Hasbrouck and Saar (2013);
    Brogaard, Hendershott, and Riordan (2014)
  edge_thesis: High trade-count rank with low average-trade-size rank can proxy fragmented
    algorithmic liquidity activity; after a completed down move, the pressure may
    be transitory and mean revert.
  mechanic: Uses completed 15-minute rolling trade count, average trade size, and
    return at 10:00, 10:30, and 11:00 ET; enters long on the next 1-minute bar open
    only when fragmentation ranks and downward return confirmation are present.
  timeframe_rationale: 1-minute bars preserve completed rolling trade-count and average-trade-size
    windows while enforcing next-bar-open execution after close-based signals.
  pre_pnl_port_note: This NQ port uses the ES declared fragmentation mechanics and
    parameter grid before any NQ PnL inspection; no NQ rescue is authorized.
  source_es_config_path: campaigns/es_trade_fragmentation_liquidity_reversion/variants/morning_15m_fragmented_down_fade_long/config.yaml
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant requires high same-clock trade-count rank
      and low same-clock average-trade-size rank before fading a completed short-window
      NQ price move, directly expressing the fragmented liquidity-state reversion
      thesis.
    entry_logic_rationale: The entry module evaluates completed rolling 15-minute
      trade-count, average-trade-size, and return features at predeclared slots. Same-clock
      ranks use prior observations only; entry is no earlier than the next one-minute
      bar after the signal timestamp.
    stop_loss_rationale: The percent-from-entry stop is predeclared, rounded to the
      NQ tick, and independent of future highs/lows or future orderflow.
    target_exit_rationale: The fixed-R target is predeclared and unresolved positions
      flatten at the slot-specific same-session cutoff.
    profitability_rationale: The setup can only pass if fragmented small-trade activity
      after a completed move marks temporary liquidity pressure strongly enough to
      overcome NQ commission, one-tick slippage, and pessimistic same-bar fills.
    known_failure_modes: Fragmentation may improve liquidity rather than create reversion,
      the trade-count proxy may be too coarse, slot effects may be unstable, and short
      holds may be dominated by costs.
    pre_test_decision: approve_for_testing
