campaign_id: es_market_plumbing_liquidity_capacity
title: ES Market Plumbing Liquidity Capacity
decision: failed
created_at: '2026-06-16'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: Tail states in market-plumbing and funding-liquidity capacity proxies
  may condition same-day ES intraday risk premia because liquidity providers require
  compensation when funding or volatility-risk intermediation is constrained.
rationale: This is not an intraday price pattern, VWAP, prior-level sweep, CFTC/TFF
  positioning, calendar seasonality, or signed-orderflow edge. It tests exogenous
  daily/weekly market-plumbing state variables with next-bar RTH execution and a conservative
  lagged feature file.
sources:
- title: Market Liquidity and Funding Liquidity
  authors: Markus K. Brunnermeier and Lasse Heje Pedersen
  year: 2009
  venue: The Review of Financial Studies 22(6), 2201-2238
  doi: 10.1093/rfs/hhn098
  link: https://academic.oup.com/rfs/article-abstract/22/6/2201/1592184
  relevance: Provides the funding-liquidity and market-liquidity mechanism motivating
    a predeclared test of ES risk premia under constrained intermediation states.
- title: Primary Dealer Statistics
  authors: Federal Reserve Bank of New York
  year: 2026
  venue: New York Fed Markets Data
  link: https://www.newyorkfed.org/markets/counterparties/primary-dealers-statistics
  relevance: Official source family for weekly primary-dealer activity data; the campaign
    uses a lagged Treasury securities-lending derived feature as a market-plumbing
    pressure proxy.
- title: Cboe Futures Exchange Daily Market Statistics
  authors: Cboe Global Markets
  year: 2026
  venue: CFE Market Statistics
  link: https://www.cboe.com/markets/us/futures/market-statistics/daily/futures/
  relevance: Official CFE source family for VX futures volume/open-interest statistics;
    Cboe states the data is available around 10:00 CT the following trading day.
data_needs:
- timezone-aware ES RTH 1-minute OHLCV/orderflow bars in America/New_York
- 'lagged no-lookahead market-plumbing feature file: data/external/market_plumbing_priority_features_lag1_no_lookahead.csv'
- deterministic 5-minute aggregation from completed 1-minute bars
- next-bar-open entry when a completed 5-minute bar close emits a signal
- same-day flatten and no-overnight prop-rule checks
data_quality_caveats:
- The market-plumbing features are daily/weekly exogenous states, not tick-level liquidity
  observations.
- The campaign-generated feature file lags all source rows by one listed trade_date;
  this can understate timeliness but avoids same-row lookahead.
- The Sierra cache is aggregated bar-level data, not tick-path data.
- Same-bar stop/target conflicts must use the pessimistic OHLC assumption.
lookahead_risks:
- CFE daily statistics are not treated as tradable until after the next listed feature
  row and after 11:00 ET.
- Signals use only completed 5-minute bars plus lagged external feature rows keyed
  to the current session date.
- No future session return, final VWAP, final volume profile, future high/low, or
  same-row external feature value is used.
failure_modes:
- Market-plumbing state variables may be too slow or too indirect for same-day ES
  RTH execution after costs.
- The dealer-lending and VX open-interest proxies may measure activity rather than
  constrained risk-bearing capacity.
- Any apparent edge may require overnight exposure, which this campaign forbids.
- Tail thresholds may produce enough trades but no stable neighboring-parameter profitability.
