research_metadata:
  academic_source: Brunnermeier and Pedersen (2009); Federal Reserve Bank of New York
    Primary Dealer Statistics; Cboe CFE Daily Market Statistics
  edge_thesis: Tail states in market-plumbing and funding-liquidity capacity proxies
    may condition same-day ES intraday risk premia because liquidity providers require
    compensation when funding or volatility-risk intermediation is constrained.
  mechanic: Enter long at the completed 13:30 ET 5-minute bar when the lagged primary-dealer
    Treasury securities-lending pressure proxy is in its lower distribution tail.
  timeframe_rationale: 13:30 ET tests whether the same funding-liquidity state is
    expressed after the lunch liquidity lull rather than immediately after late-morning
    availability.
  feature_lag_audit: research_artifacts/es_market_plumbing_liquidity_capacity_feature_lag_audit_20260616.json
  invalid_run1_reason: run1 used unsupported descriptive data.feature_set label; corrected
    to feature_set none without changing mechanics, parameters, timeframe, or data
    window.
strategy:
  entry:
    module: market_plumbing_priority
    params:
      feature_file: data/external/market_plumbing_priority_features_lag1_no_lookahead.csv
      direction: long
      bar_interval_minutes: 5
      max_trades_per_day: 1
      academic_source_key: brunnermeier_pedersen_2009_market_liquidity_funding_liquidity
      external_dataset: nyfed_primary_dealer_statistics_cboe_cfe_vx_activity_lag1
      priority_order:
      - primary_dealer_lending_pressure
      legs:
      - key: primary_dealer_lending_pressure
        source: nyfed_primary_dealer_statistics
        feature_name: sl_treasury_excluding_tips_overnight_open_diff1_rank52
        operator: <=
        threshold: 0.25
        entry_time: '13:30:00'
        flatten_time: '15:55:00'
        stop_pct: 0.005
        target_r_multiple: 1.5
        availability_rule: Campaign feature file lags every source row by one listed
          trade_date; entries occur 11:30 ET or later.
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  tp:
    module: fixed_r
    params:
      target_r_multiple: 1.5
  flatten_time: '15:55:00'
core_grid:
  data_subset:
    start_date: '2015-07-13'
    end_date: '2026-05-29'
