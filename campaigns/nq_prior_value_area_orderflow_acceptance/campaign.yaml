campaign_id: nq_prior_value_area_orderflow_acceptance
title: NQ Prior Value-Area Orderflow Acceptance
decision: FAIL
created_at: '2026-06-22'
status: completed_failed
instrument: NQ
market_timezone: America/New_York
edge_family: nq_prior_value_area_orderflow_acceptance
hypothesis: Prior-session accepted-value boundaries in NQ, approximated from completed RTH volume profile levels, can identify
  intraday continuation when a completed close outside prior value is confirmed by aligned aggregate orderflow.
rationale: This is a direct pre-PnL NQ port of the ES prior value-area acceptance edge. The prior session defines VAH/VAL/POC
  before the current open; the current signal requires completed-bar acceptance outside prior value and same-direction aggregate
  orderflow.
sources:
- title: 'Support for Resistance: Technical Analysis and Intraday Exchange Rates'
  authors: Carol L. Osler
  year: 2000
  link: https://www.newyorkfed.org/research/epr/00v06n2/0007osle.html
  relevance: Supports testing objective support/resistance-like intraday levels.
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  relevance: Motivates orderflow imbalance as confirmation of price impact; this campaign uses completed-bar aggregate Sierra
    flow, not LOB OFI.
- title: CME FX Market Profile Tool
  authors: CME Group
  year: 2026
  link: https://www.cmegroup.com/trading/fx/cme-fx-market-profile-tool.html
  relevance: Exchange documentation supports market-profile style analysis of historical volume/activity intervals; this campaign
    adapts the concept to NQ completed bars.
data_needs:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- 5-minute NQ RTH bars generated by repo pipeline
- prior-session approximate VAH/VAL/POC computed only after the prior RTH session is complete
- signed, large-10, and large-20 aggregate flow columns for completed signal bars
lookahead_risks:
- Prior VAH, VAL, and POC are computed only from the previous completed RTH session and frozen before current-session entries.
- Signals use completed 5-minute bar close and enter at next bar open or later.
- No current-session final high/low, final VWAP, final volume profile, future orderflow, or post-entry bars are used.
- All variants flatten same-day before the configured cutoff and do not hold overnight.
failure_modes:
- Prior value-area boundaries are approximate because volume is distributed uniformly across each completed bar high-low tick
  range.
- Breaks beyond prior value can be stop probes or exhaustion rather than acceptance.
- Aggregate signed flow may lag price or misclassify participation direction.
- ES marginal WFA evidence may not transfer to NQ and may be regime-specific.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - nq_prior_session_breakout_orderflow_confirmation
  - nq_opening_drive_inventory_orderflow
  - nq_round_number_barrier_reaction
  conclusion: Eligible as a distinct prior accepted-value boundary test because it uses approximate prior volume-profile VAH/VAL,
    not prior high/low, opening range, or round-number levels.
