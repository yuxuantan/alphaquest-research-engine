campaign_name: es_term_structure_lead_lag_feedback
campaign_id: es_term_structure_lead_lag_feedback
instrument: ES
initial_decision: TEST
reason_for_decision: 'Active-only duplicate review found no ES front-vs-next-contract
  term-structure lead-lag campaign outside _archived. This is distinct from active
  ES/NQ cross-index lead-lag, ES/MES flow divergence, and quarterly-expiration calendar
  pressure because it uses actual front/deferred ES contract price dislocation over
  completed intraday windows.

  '
edge_hypothesis: 'Near roll, the front ES contract and next quarterly ES contract
  can temporarily diverge over short completed windows. If the front contract moves
  materially more than the next contract, the short-term calendar-spread feedback
  may predict reversion in the front contract after the signal bar closes.

  '
why_it_may_apply_to_es_futures: 'ES quarterly contracts share the same underlying
  index but differ in liquidity and maturity. Calendar-spread and outright traders
  link the contracts, but near-roll liquidity transfer and order-flow timing can create
  short-lived front-vs-deferred dislocations. The campaign trades only the front ES
  contract.

  '
research_sources:
- title: 'High-frequency lead-lag relationships in the Chinese stock index futures
    market: tick-by-tick dynamics of calendar spreads'
  author: Guanlin Li, Xiyan Chen, and Yingzheng Liu
  year: 2025
  link_or_doi: https://arxiv.org/abs/2501.03171
  expected_mechanism: Near-month and longer-dated stock-index futures can show maturity-based
    lead-lag and spread-feedback effects.
- title: A GCN-LSTM Approach for ES-mini and VX Futures Forecasting
  author: Nikolas Michael, Mihai Cucuringu, and Sam Howison
  year: 2024
  link_or_doi: https://arxiv.org/abs/2408.05659
  expected_mechanism: ES-mini futures across expirations have connected return, volatility,
    and volume structures that can support term-structure signal propagation.
- title: High Frequency Lead/Lag Relationships - Empirical Facts
  author: Nicolas Huth and Frederic Abergel
  year: 2014
  link_or_doi: https://ideas.repec.org/p/hal/wpaper/hal-00645685.html
  expected_mechanism: High-frequency lead-lag asymmetry is a documented market-microstructure
    effect, but naive market-order strategies can fail after spread and costs.
behavioural_or_microstructure_rationale: 'The variants do not assume the next contract
  always leads. They test whether completed front-vs-deferred return gaps express
  a short-term spread-feedback state in which the front contract is likely to revert
  after moving too far relative to the next contract.

  '
expected_failure_modes:
- Front and next ES contracts may be too synchronized at 1-minute resolution.
- Deferred-contract overlap is available only near roll, reducing trade count.
- The effect may be consumed by bid/ask spread, commission, and slippage.
- Profit may concentrate in a few roll weeks, crisis periods, or single days.
- The local data lacks ESU26, so the latest front period cannot be included.
