campaign_id: nq_pivot_filtered_mes_participation_crowding_reversion
title: NQ MES participation crowding reversion filtered by completed pivot market structure
decision: FAIL
created_at: '2026-06-22'
symbol: NQ
dataset_id: nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny
timeframe: 1m
hypothesis: High MES participation during a completed NQ move may mark smaller-contract crowding and temporary pressure when
  the reversal direction agrees with completed multi-timeframe swing-pivot structure.
rationale: This is an ES-derived composite edge. The primary edge is MES participation crowding reversion; the fixed secondary
  condition is completed swing-pivot market-structure direction. A fade is allowed only when carried multi-timeframe pivot
  structure supports the fade direction.
sources:
