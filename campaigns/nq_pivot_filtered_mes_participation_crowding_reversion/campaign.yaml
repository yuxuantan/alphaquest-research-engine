- title: Time Series Momentum
  authors: Tobias J. Moskowitz, Yao Hua Ooi, and Lasse Heje Pedersen
  year: 2012
  venue: Journal of Financial Economics
  link: https://doi.org/10.1016/j.jfineco.2011.11.003
  relevance: Motivates requiring the reversion direction to align with completed intraday structure.
data_needs:
- data/cache/orderflow/nq_mes_participation_crowding_1m_20190506_20260612_full_rth_ny.csv
- NQ return tick columns for completed 30-minute moves
- MES notional-equivalent and trade-share rank252 fields
- completed NQ OHLC bars for 5/10/15/30-minute pivot states depending on variant
lookahead_risks:
- MES participation ranks use only prior same-clock observations.
- Base NQ return and MES share use completed bars only.
- Pivot structure confirms swing highs/lows only after right-side confirmation bars are complete.
- Signals generated from completed bars are filled no earlier than next bar open.
- No final session high/low, final VWAP, post-entry MES data, or future pivot is used.
failure_modes:
- The pivot filter may lag regime changes.
- MES participation may be informed activity rather than crowding.
- NQ trend days may continue against the fade.
- Costs and NQ volatility may erase the smaller-contract crowding effect.
