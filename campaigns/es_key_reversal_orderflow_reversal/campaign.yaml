data_needs:
- data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
- 1-minute ES RTH strategy bars from local Sierra cache
- rolling volume ratio computed from prior completed 1-minute bars
- completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume,
  and large20_volume
data_quality_caveats:
- Sierra signed volume is completed-bar aggregate bid/ask-volume flow, not quote-level
  OFI.
- Signals use the just-completed 1-minute bar close, so entries must occur no earlier
  than the next minute open.
- The stop is the completed signal-bar extreme plus a tick offset; same-bar stop/target
  conflicts remain pessimistic.
lookahead_risks:
- Prior-bar high, low, and close are known before the signal bar begins.
- Signal-bar range, close, close-location, volume ratio, and orderflow are only available
  after the bar completes.
- No future session high, low, VWAP, final daily range, volume profile, or post-entry
  orderflow is used.
- One trade per day and configured flatten times are enforced by config and stage
  runner.
failure_modes:
- Prior-bar sweeps may be noise with no meaningful liquidity exhaustion.
- Aggregate orderflow can confirm late after price already reversed.
- Large10 and large20 buckets may proxy trade size poorly after Sierra aggregation.
- The edge may be side-specific, regime-specific, or too small for ES costs and one-tick-worse
  slippage.
- Profits may concentrate in a few volatility events or fail the WFA trade-density
  gate.
