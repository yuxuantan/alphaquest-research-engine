campaign_id: es_key_reversal_orderflow_reversal
title: ES prior-bar key reversal with aggregate orderflow confirmation
decision: FAIL
created_at: '2026-06-19'
instrument: ES
market_timezone: America/New_York
edge_family: key_reversal_orderflow_reversal
hypothesis: 'One-bar failed micro-breakouts may contain short-horizon reversal information
  when price sweeps the immediately prior completed bar''s extreme, closes back through
  the prior close, and aggregate completed-bar orderflow confirms the reversal direction.
  The campaign tests whether this local price-action rejection survives next-bar execution,
  costs, pessimistic same-bar TP/SL handling, WFA, monkey tests, and prop-style Monte
  Carlo.

  '
sources:
- title: 'Foundations of Technical Analysis: Computational Algorithms, Statistical
    Inference, and Empirical Implementation'
  authors: Andrew W. Lo, Harry Mamaysky, Jiang Wang
  year: 2000
  venue: Journal of Finance
  link: https://doi.org/10.1111/0022-1082.00265
  relevance: 'Supports testing mechanically defined technical patterns with statistical
    discipline instead of visual chart interpretation. This campaign translates a
    key-reversal pattern into deterministic completed-bar rules.

    '
- title: The Predictive Power of Price Patterns
  authors: Gunduz Caginalp, Henry Laurent
  year: 1998
  venue: Applied Mathematical Finance
  link: https://ideas.repec.org/a/taf/apmtfi/v5y1998i3-4p181-205.html
  relevance: 'Motivates testing reversal-oriented price patterns, while requiring
    this campaign to pass modern futures costs, robustness, WFA, and holdout gates
    rather than using pattern appearance alone.

    '
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
  doi: 10.1093/jjfinec/nbt003
  relevance: 'Supports orderflow imbalance as short-horizon price-pressure information.
    The available implementation uses completed Sierra aggregate trade-side flow,
    not quote-level OFI or intra-bar LOB sequencing.

    '
rationale: 'This is a price-action-first aggregate-orderflow campaign. A completed
  signal bar must sweep the prior completed bar high or low and then close back through
  the prior completed close with reversal body and close-location confirmation. Aggregate
  flow confirms that the rejection had participation. It is distinct from active rolling-range
  sweep campaigns because the only level is the immediately prior completed bar; it
  is distinct from opening-range/prior-day/VWAP campaigns because no fixed session
  level is used; and it is distinct from wide-range continuation because the direction
  fades the failed micro-break instead of following range expansion.

  '
