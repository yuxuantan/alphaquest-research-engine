research_metadata:
  academic_source: Osler (2000); Cont, Kukanov, and Stoikov (2014); CME Group market-profile/liquidity documentation
  edge_thesis: Afternoon acceptance beyond prior value with large-20 aligned flow may identify institutional participation or hedging pressure that persists into the close.
  mechanic: From 13:00 through 15:30 ET, enter long above prior VAH or short below prior VAL after a completed 5-minute close beyond the configured buffer, requiring same-direction large-20 signed-flow imbalance on the completed signal bar.
  timeframe_rationale: The window tests late-session value migration but still prohibits entries after 15:30 ET so positions can flatten at 15:55 ET without violating prop-style timing.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: This variant expresses the edge because the prior RTH session's approximate value area is frozen before the current session, then price must close beyond the relevant prior value boundary. The value-area boundary is the price-action level; the large20 condition is only the completed-bar participation confirmation.
    entry_logic_rationale: From 13:00 through 15:30 ET, enter long above prior VAH or short below prior VAL after a completed 5-minute close beyond the configured buffer, requiring same-direction large-20 signed-flow imbalance on the completed signal bar. The signal is evaluated only after the 5-minute bar closes, and the engine enters at the next bar open, so the breakout close is not filled retroactively. The entry buffer grid tests modest acceptance without making the strict corner sparse.
    stop_loss_rationale: A percent-from-entry stop is predeclared and independent of future session levels. It invalidates the continuation thesis when price cannot remain outside prior accepted value after the next-bar entry.
    target_exit_rationale: A fixed-R target is predeclared, does not use future highs/lows, and tests whether the value-migration impulse travels far enough after costs. Unresolved trades flatten at 15:55 ET.
    profitability_rationale: The variant should be profitable only if larger trade-size pressure confirms late-day value migration and the remaining session is long enough to monetize continuation after costs. The pre-PnL density audit cleared the strict parameter corner above 50 signals/year, so this is not relying on rare isolated events.
    known_failure_modes: The profile is only an OHLCV approximation, boundary breaks can be stop probes, orderflow can lag price, and continuation profits may be dominated by a small number of trend sessions or disappear under one-tick worse slippage.
    pre_test_decision: approve_for_testing
    rescue_pre_test_decision: approve_for_testing
    rescue_mechanic_integrity: The rescue preserves the prior-session value-area acceptance mechanic. It does not add filters, change direction logic, change timeframes, or alter the profile construction after seeing results.
  pre_pnl_density:
    strict_corner: breakout_buffer_ticks=2 and min_orderflow_imbalance=0.04
    artifact: research_artifacts/es_prior_value_area_orderflow_acceptance_density_audit_20260618.md
  rescue_attempt: parameter_space_rescue_1
  rescue_reason: Original afternoon best rows required the widest original stop and larger target; rescue keeps the same large-20 acceptance mechanic and tests adjacent wider-risk continuation geometry.
  rescue_constraints: Same entry module, setup mode, time window, flow mode, prior value-area approximation, stop module, target module, data, costs, session rules, prop rules, and validation gates. Only declared entry buffer/flow threshold and stop/target parameter spaces change.
