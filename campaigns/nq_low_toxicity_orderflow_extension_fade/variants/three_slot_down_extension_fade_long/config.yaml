research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Easley, Lopez de Prado, and
    O'Hara (2012); Madhavan, Richardson, and Roomans (1997)
  edge_thesis: Three long-only slots fade downside extensions when same-clock orderflow
    imbalance is unusually low.
  mechanic: Three long-only slots fade downside extensions when same-clock orderflow
    imbalance is unusually low.
  timeframe_rationale: Five-minute bars let the campaign form 15/30/60-minute completed
    orderflow-state windows while preserving next-bar execution, same-clock rank features,
    and enough yearly observations.
  pre_pnl_density: 2253 full-sample pre-PnL signals, about 146.01 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    entry_logic_rationale: Each slot uses only completed five-minute NQ bars. Same-clock
      rank columns are generated from prior sessions only, the price-extension condition
      uses completed rolling return ticks, and staged execution occurs at the next
      bar or later.
    stop_loss_rationale: The stop remains a predeclared percent-from-entry distance
      rounded to the NQ tick. The stop grid was selected from the ES rescue before
      any NQ outcome inspection and does not use future orderflow or future range
      information.
    target_exit_rationale: The target remains a fixed-R exit with target_r_multiple
      at or above 1.0R, with unresolved positions flattened at the same-session cutoff.
      The exit does not depend on future VWAP, future pivots, or final session levels.
    profitability_rationale: The setup should only be profitable if low same-clock
      absolute imbalance identifies NQ extensions with weak informed pressure and
      therefore better odds of reversion after realistic costs and slippage.
    known_failure_modes: Low imbalance may simply mean quiet continuation, same-clock
      ranks can fail in new regimes, slot timing can encode fragile seasonality, and
      costs can consume small fades even when direction is often right.
    pre_test_decision: approve_for_testing
    mechanic_expresses_edge: Three long-only slots fade downside extensions when same-clock
      orderflow imbalance is unusually low. Each slot requires low same-clock absolute
      orderflow imbalance plus a completed price extension, so the entry expresses
      weak-pressure extension fade rather than raw orderflow momentum.
  pre_pnl_port_note: This NQ port uses the ES parameter_space_rescue_1 grid before
    any NQ PnL inspection; no NQ rescue attempt is authorized.
  source_es_config_path: campaigns/es_low_toxicity_orderflow_extension_fade/rescue_attempts/parameter_space_rescue_1/three_slot_down_extension_fade_long/config.yaml
