campaign_id: es_mes_crowding_aoi_trap_reversion
title: ES MES Crowding AOI Trap Reversion
decision: FAIL
created_at: '2026-06-22'
instrument: ES
timeframe: 1m
edge_family: mes_smaller_contract_crowding_at_market_generated_and_true_vap_aois
hypothesis: When high MES smaller-contract participation coincides with a completed ES push into a predefined market-generated
  or true volume-profile AOI, a completed-bar rejection back away from that level may identify trapped crowded flow and short-horizon
  ES reversion.
variant_expansion_rationale: 'Eight variants are justified before PnL because the edge has materially distinct AOI mechanics
  worth separating: prior RTH extremes, opening range, overnight range, combined market AOIs, true value-area boundaries,
  true LVNs, true-profile AOIs with footprint absorption, and an all-AOI notional-participation variant. These variants share
  one entry module and the same two-entry-parameter grid.'
