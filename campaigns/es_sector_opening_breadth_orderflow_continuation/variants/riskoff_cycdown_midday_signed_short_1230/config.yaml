research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Cyclical sector weakness versus defensive sectors at the cash open should proxy risk-off allocation; ES short continuation is only tested after completed ES downside movement and negative signed flow.
  mechanic: Short ES after cyclical sectors open weak versus defensives, ES moves down from RTH open, and aggregate signed volume confirms selling pressure.
  timeframe_rationale: The short-side sector structure can unfold more slowly, so this variant allows signals through 12:30 while still requiring completed-bar confirmation and same-day flatten.
  pre_pnl_density: 780 full-sample pre-PnL signals, about 50.50 per year; limited-core reference 107 signals, about 69.54 per year.
  mechanics_review_required: true
  mechanics_review_version: "2026-06-20"
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge through a risk-off sector split: at least two
      cyclical ETFs open down, defensive average gap is stronger than cyclical average
      gap, ES is down from its RTH open, and cumulative signed volume is negative
      before short entry.
    entry_logic_rationale: The setup avoids a generic short-on-red-open rule by requiring a defensive-versus-cyclical opening spread plus ES downside confirmation at 10:00, 10:30, 11:30, or 12:30 ET. It uses no same-day ETF close or post-signal data.
    stop_loss_rationale: A fixed percent stop keeps losses bounded without referencing future support/resistance or final session range.
    target_exit_rationale: A fixed-R target gives the short enough payoff distance to overcome costs while enforcing the 1.0R minimum.
    profitability_rationale: If institutions de-risk from cyclicals into defensives after the cash open, ES should continue lower when cumulative signed volume confirms seller participation.
    known_failure_modes: Risk-off breadth can reverse into short squeezes, defensives can outperform for non-market reasons, and the noon extension may enter after the short continuation has already decayed.
    pre_test_decision: approve_for_testing
