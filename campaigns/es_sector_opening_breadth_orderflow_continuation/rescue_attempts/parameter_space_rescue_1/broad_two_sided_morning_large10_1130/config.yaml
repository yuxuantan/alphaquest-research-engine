campaign_id: es_sector_opening_breadth_orderflow_continuation
variant_id: broad_two_sided_morning_large10_1130
test_run_id: rescue1
strategy_name: sector_opening_breadth_orderflow
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
research_metadata:
  academic_source: Moskowitz and Grinblatt (1999); Chordia and Shivakumar (2002);
    Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Broad same-day sector ETF opening breadth should identify cash-market
    risk-on or risk-off direction; large-trade ES aggregate orderflow should help
    confirm whether stronger participants are still aligned.
  mechanic: Two-sided ES continuation after broad sector cash-open breadth, ES movement
    from RTH open, and same-direction large-10 aggregate orderflow confirmation.
  timeframe_rationale: The 10:00 through 11:30 ET window gives time for cash-market
    breadth and larger ES participation to align while staying early enough for same-day
    continuation.
  pre_pnl_density: 1789 full-sample pre-PnL signals, about 115.84 per year; limited-core
    reference 200 signals, about 129.98 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses the same edge on both sides:
      broad sector-up openings plus ES/large-10 buying allow longs, while broad sector-down
      openings plus ES/large-10 selling allow shorts. The large-10 filter asks whether
      bigger prints align with the cash breadth state.

      '
    entry_logic_rationale: The entry uses only same-day ETF opens, completed ES bars,
      and cumulative large-10 orderflow at 10:00, 10:30, or 11:30 ET. Direction is
      mechanically determined from breadth and ES confirmation before next-bar execution.
    stop_loss_rationale: A fixed percent stop treats long and short setups symmetrically
      and avoids using future intraday levels.
    target_exit_rationale: The fixed-R target module and target_r_multiple grid are
      unchanged from the original run, remain at [1.0, 1.5, 2.0], and never use sub-1R
      targets. The rescue isolates entry threshold and stop-distance parameter space
      without changing exit mechanics.
    profitability_rationale: 'If sector opening breadth captures real cash-market
      risk appetite and larger ES prints confirm institutional participation, the
      aligned sessions should have better continuation than mixed-breadth sessions.
      Rescue rationale: stricter breadth and wider-stop rescue after original large10
      surface favored stricter breadth and larger payoff distance; this is a predeclared
      parameter-space-only rescue and not a change to the core edge.'
    known_failure_modes: Two-sided logic may combine asymmetric long and short behavior,
      large-10 aggregation is only a Sierra proxy, and the higher signal count may
      include weaker marginal setups.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    created_at: '2026-06-20'
    scope: one rescue for failed variant
    allowed_change_scope: parameter_space_and_fixed_defaults_only
    source_config: campaigns/es_sector_opening_breadth_orderflow_continuation/variants/broad_two_sided_morning_large10_1130/config.yaml
    source_run: backtest-campaigns/es_sector_opening_breadth_orderflow_continuation/broad_two_sided_morning_large10_1130/ES/run1
    unchanged:
    - entry module sector_opening_breadth_orderflow
    - setup mode and signal time windows
    - sector opening breadth feature construction
    - ES aggregate orderflow data
    - stop module percent_from_entry
    - target module fixed_r
    - target_r_multiple grid remains [1.0, 1.5, 2.0]
    - costs, fills, sessions, and validation gates
    changed:
      entry.params.min_sector_count: &id001
      - 5
      - 6
      - 7
      entry.params.min_orderflow_imbalance: &id002
      - 0.0
      - 0.02
      - 0.04
      sl.params.stop_pct: &id003
      - 0.0025
      - 0.004
      - 0.0055
    rationale: stricter breadth and wider-stop rescue after original large10 surface
      favored stricter breadth and larger payoff distance
