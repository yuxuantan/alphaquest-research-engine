research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Llorente, Michaely, Saar, and Wang (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Broader 10-minute downside ES capitulation bars with completed aggregate selling pressure may mean-revert after temporary liquidity demand is absorbed.
  mechanic: Long-only 10-minute capitulation from 09:30 to 15:30 ET using close-near-low, below-VWAP, session-local RSI, elevated volume, and sell-imbalance filters.
  timeframe_rationale: The 10-minute bar reduces single-bar noise and asks whether a broader completed pressure window better captures capitulation.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the same capitulation-reversal edge with a broader 10-minute completed bar. The bar must close near its low and below completed VWAP, show session-local oversold RSI, show high volume versus prior completed 10-minute bars, and carry aggregate selling imbalance before the next-bar long entry is permitted.
    entry_logic_rationale: >
      All inputs are known only after the 10-minute bar closes, and the engine enters no earlier than the next 10-minute bar open. The all-day window is fixed before testing and uses no future session state.
    stop_loss_rationale: >
      The stop is beyond the completed capitulation bar low using a predeclared tick offset, matching the premise that the low should hold if selling pressure was exhausted.
    target_exit_rationale: >
      The fixed-R target measures rebound size against the realized stop distance and same-day flatten, without using final VWAP, final range, or later highs/lows to set the target.
    profitability_rationale: >
      A 10-minute selling-pressure bar can capture a more durable liquidity dislocation than a 5-minute bar while still maintaining trade frequency. The strict density audit produced 76.34 signals/year full-history and 83.19/year in the seeded limited-core window.
    known_failure_modes: >
      Broader bars may enter late after much of the rebound has already occurred, or they may identify informed sell programs rather than temporary liquidity pressure.
    pre_test_decision: approve_for_testing
