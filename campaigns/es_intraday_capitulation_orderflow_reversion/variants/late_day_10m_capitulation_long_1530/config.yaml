research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993); Llorente, Michaely, Saar, and Wang (2002); Cont, Kukanov, and Stoikov (2014)
  edge_thesis: Later-session 10-minute downside ES capitulation bars with completed aggregate selling pressure may mean-revert after temporary liquidity demand is absorbed.
  mechanic: Long-only 10-minute capitulation from 11:00 to 15:30 ET using close-near-low, below-VWAP, session-local RSI, elevated volume, and sell-imbalance filters.
  timeframe_rationale: The 10-minute late-day window avoids the opening auction and tests whether broader later-session pressure is a cleaner exhaustion state.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-18'
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the edge after 11:00 ET using a completed 10-minute downside bar. A long signal requires close-near-low capitulation, below-VWAP location, session-local oversold RSI, elevated same-session volume, and completed aggregate sell imbalance, all known before the next-bar order.
    entry_logic_rationale: >
      The entry waits for the 10-minute signal bar to close and does not use later bars. The fixed 11:00-15:30 ET window was chosen before PnL testing to keep frequency high while avoiding the opening auction.
    stop_loss_rationale: >
      The stop is below the capitulation bar low with a fixed tick offset. That low is the objective invalidation point for a long exhaustion trade.
    target_exit_rationale: >
      The target is a fixed-R exit based on predeclared stop distance and same-day flattening, without future-derived levels.
    profitability_rationale: >
      Later-session 10-minute sell pressure can reflect temporary liquidity demand or risk reduction. If the bar pushes ES below VWAP and closes near the low while sell imbalance is elevated, the next bar may benefit from pressure exhaustion. Strict density was 74.59 signals/year full-history and 75.39/year in the limited-core window.
    known_failure_modes: >
      A 10-minute signal may be too delayed, and sell pressure late in the day can persist into the close rather than reverse.
    pre_test_decision: approve_for_testing
