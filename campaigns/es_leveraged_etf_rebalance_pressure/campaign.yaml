      status: completed_failed
      changed_only:
        - entry.params.min_abs_day_return_bps parameter spaces and defaults
        - entry.params.min_recent_return_bps parameter space/default for late_acceleration_two_sided_1530
        - sl.params.stop_pct parameter spaces and defaults
        - tp.params.target_r_multiple parameter spaces and defaults
      unchanged:
        - edge thesis
        - entry module leveraged_etf_rebalance_pressure
        - setup mode per variant
        - signal time per variant
        - direction rule per variant
        - data source and data window
        - costs and fill assumptions
        - validation gates
        - prop rules
      decision: FAIL
      result: >
        All five rescue variants failed limited_core_grid_test. Best rescue was
        up_day_rebalance_long_1500/rescue1 with profitable-combo rate 0.0,
        top net -1522.5, top PF 0.8378594249201278, and 142 top-combo trades.
