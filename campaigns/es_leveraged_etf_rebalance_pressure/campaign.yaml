campaign_id: es_leveraged_etf_rebalance_pressure
title: ES Leveraged ETF Rebalance Pressure
decision: TEST
created_at: '2026-06-17'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 1m
hypothesis: >
  Leveraged and inverse ETFs rebalance mechanically near the close to restore
  daily leverage targets. After a sufficiently large completed same-day ES
  return from the prior RTH close, this positive-feedback demand may create
  same-direction late-day ES futures pressure.
rationale: >
  This campaign tests LETF rebalance pressure, not the Gao-Han-Li-Zhou first
  half-hour market intraday momentum effect and not same-clock return
  persistence. Each signal uses only prior RTH close plus the completed signal
  bar close; no final-session close, final VWAP, future high/low, or post-signal
  bar is used.
sources:
  - title: Are Leveraged and Inverse ETFs the New Portfolio Insurers?
    authors: Tugkan Tuzun
    year: 2013
    venue: Federal Reserve Finance and Economics Discussion Series 2013-48
    link: https://www.federalreserve.gov/econres/feds/are-leveraged-and-inverse-etfs-the-new-portfolio-insurers.htm
    relevance: >
      Documents mechanical positive-feedback LETF rebalancing and estimates
      broad stock-index rebalancing demand after index moves.
  - title: Are Leveraged and Inverse ETFs the New Portfolio Insurers?
    authors: Tugkan Tuzun
    year: 2014
    venue: SSRN / Paris December 2014 Finance Meeting EUROFIDAI-AFFI Paper
    link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2190708
    relevance: >
      Working-paper record for the LETF positive-feedback rebalancing mechanism.
  - title: Intraday Share Price Volatility and Leveraged ETF Rebalancing
    authors: Pauline Shum, Walid Hejazi, Edgar Haryanto, and Arthur Rodier
    year: 2016
    venue: Review of Finance
    link: https://doi.org/10.1093/rof/rfv053
    relevance: >
      Empirically studies intraday volatility effects around leveraged ETF
      rebalancing demand.
expected_mechanism: >
  LETF managers must adjust index exposure before the daily close after the
  underlying index moves. Because both leveraged long and inverse products can
  create same-direction rebalancing demand, large ES moves before the late-day
  rebalance window may continue briefly into the close.
data_needs:
  - data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  - previous RTH close feature from the local Sierra RTH cache
  - completed 1-minute ES bars in America/New_York
lookahead_risks:
  - A signal at HH:MM uses only the bar closing at HH:MM and enters no earlier than the next ES bar open.
  - Prior RTH close is known before the current RTH session opens.
  - No final current-session close, final high/low, final VWAP, future volume profile, or post-signal return is used.
  - Late-acceleration variant uses only the completed recent window ending at the signal timestamp.
failure_modes:
  - LETF rebalance demand may be too small relative to ES liquidity.
  - Futures may price the rebalance flow before the configured signal time.
  - The effect may be concentrated in high-volatility crisis years or a few large index moves.
  - Generic late-day momentum may dominate the mechanism and fail robustness tests.
  - One-sided variants may become unstable if upside and downside rebalance pressure is asymmetric.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_late_day_intraday_momentum
    - es_intraday_periodicity_persistence
    - es_daily_time_series_momentum
    - es_overnight_return_late_day_momentum
    - es_rth_intraday_risk_premium
    - es_volume_shock_liquidity_reversal
  conclusion: >
    Not a duplicate in active scope. The active late-day momentum campaign used
    the opening-window return to forecast the last-half-hour return. This
    campaign uses a different economic mechanism: same-day LETF rebalance demand
    proxied by the completed return from the prior RTH close into the late-day
    rebalance window.
density_check:
  artifact: research_artifacts/es_leveraged_etf_rebalance_pressure_density_audit_20260617.md
  conclusion: >
    Pre-test density check over 2011-01-03 through 2026-06-09 found every
    declared 20/30/40 bp one-sided and two-sided threshold at 14:30-15:30 ET
    clears 50 prospective signals per year before fills.
session_assumptions:
  timezone: America/New_York
  rth_start: '09:30:00'
  rth_end: '15:59:00'
  no_overnight_positions: true
  latest_variant_flatten: '15:55:00'
parameter_space:
