  min_recent_return_bps_for_acceleration: [0.0, 2.5, 5.0]
  stop_pct: [0.001, 0.0015, 0.0025]
  target_r_multiple: [0.75, 1.0, 1.25]
  combinations_per_standard_variant: 27
  combinations_for_late_acceleration_variant: 81
variants:
  - two_sided_day_move_1430
  - two_sided_day_move_1500
  - up_day_rebalance_long_1500
  - down_day_rebalance_short_1500
  - late_acceleration_two_sided_1530
