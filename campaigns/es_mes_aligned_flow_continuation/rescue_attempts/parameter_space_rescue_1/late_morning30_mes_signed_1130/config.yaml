campaign_id: es_mes_aligned_flow_continuation
variant_id: late_morning30_mes_signed_1130
test_run_id: rescue1
strategy_name: es_mes_aligned_flow_continuation
symbol: ES
dataset_id: es_mes_flow_divergence_1m_20190506_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: ES late-morning continuation may improve when MES completed signed-flow
    imbalance confirms the same 30-minute direction.
  mechanic: At the completed 11:30 ET signal, require 30-minute ES return and 30-minute
    MES signed imbalance to point in the same direction, then trade ES in that direction.
  timeframe_rationale: The ES/MES feature cache is built on completed 1-minute aligned
    bars, so the strategy stays on 1-minute bars to preserve feature semantics and
    next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: 2026-06-18-rescue1
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses cross-contract confirmation by
      using the same completed 30-minute horizon for ES direction and MES signed-flow
      pressure. It trades only when both contracts agree, separating it from the prior
      divergence-reversion campaign.

      '
    entry_logic_rationale: 'The 11:30 ET signal avoids the noisiest first hour and
      asks whether late-morning ES direction has MES participation behind it. The
      direction is determined strictly from completed rolling features available at
      the signal close.

      '
    stop_loss_rationale: 'The stop beyond the signal-bar extreme ties invalidation
      to the completed bar that created the signal. This is a price-action stop and
      does not use any future low, high, VWAP, or post-entry MES information.

      '
    target_exit_rationale: 'Fixed-R exits avoid tuning to post-signal MES or ES paths
      and keep the target comparable across long and short signals. The forced flatten
      exits all remaining exposure the same day.

      '
    profitability_rationale: 'The setup should work if aligned MES signed flow marks
      broad participation that continues beyond late morning. Density is sufficient
      before PnL: the declared grid keeps trade frequency above the methodology target
      outside extreme imbalance thresholds.

      '
    known_failure_modes: 'Signed MES flow may be too noisy, late-morning trend may
      already be crowded, and the same-direction signal may perform poorly in choppy
      lunch-session regimes.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameter defaults and declared grid values
    inside the existing entry, stop, and target modules: shifted ES return thresholds
    higher, shifted MES imbalance thresholds to stricter density-approved values,
    widened the signal-bar stop offset grid, and shortened the fixed-R target grid.
    Entry module, stop module, target module, data, timeframe, costs, fills, sessions,
    and staged validation gates are unchanged.'
