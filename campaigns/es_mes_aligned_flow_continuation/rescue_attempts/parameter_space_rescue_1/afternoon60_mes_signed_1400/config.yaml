timeframe: 1m
research_metadata:
  academic_source: Hasbrouck (1995); CFTC Office of the Chief Economist (2024); Cont,
    Kukanov, and Stoikov (2014)
  edge_thesis: ES afternoon continuation may improve when the prior hour ES move and
    prior hour MES signed imbalance align.
  mechanic: At the completed 14:00 ET signal, require 60-minute ES return and 60-minute
    MES signed imbalance to point in the same direction, then trade ES in that direction.
  timeframe_rationale: The ES/MES feature cache is built on completed 1-minute aligned
    bars, so the strategy stays on 1-minute bars to preserve feature semantics and
    next-bar-open execution.
  mechanics_review_required: true
  mechanics_review_version: 2026-06-18-rescue1
  mechanics_review:
    mechanic_expresses_edge: 'This variant asks whether a full hour of ES movement
      confirmed by a full hour of MES signed-flow pressure predicts continuation into
      the afternoon. It is deliberately confirmation-based and does not fade MES pressure.

      '
    entry_logic_rationale: 'The 14:00 ET signal waits until midday noise has passed
      and uses only the completed 13:00-14:00 style rolling state represented in the
      feature cache. Long and short signals require ES return and MES imbalance to
      agree.

      '
    stop_loss_rationale: 'A stop beyond the signal-bar extreme gives the aligned-flow
      state a simple price-action invalidation point. If the signal bar is immediately
      broken, the participation-confirmation premise is no longer intact.

      '
    target_exit_rationale: 'Fixed-R targets keep exits predeclared and prevent post-entry
      MES flow from influencing trade management. The 15:55 flatten prevents overnight
      or cutoff violations.

      '
    profitability_rationale: 'This should only pass if the slower ES/MES aligned state
      carries durable afternoon information. The selected imbalance grid avoids the
      extreme 0.10 threshold that the pre-PnL density audit showed would be too sparse.

      '
    known_failure_modes: 'Afternoon aligned flow may occur after the directional opportunity
      has already paid out, or the slower signal may be vulnerable to late-session
      mean reversion and liquidity changes.

      '
    pre_test_decision: approve_for_testing
  rescue_attempt: parameter_space_rescue_1
  rescue_scope: per_failed_variant
  rescue_changes: 'Changed only fixed parameter defaults and declared grid values
    inside the existing entry, stop, and target modules: shifted ES return thresholds
    higher, shifted MES imbalance thresholds to stricter density-approved values,
    widened the signal-bar stop offset grid, and shortened the fixed-R target grid.
    Entry module, stop module, target module, data, timeframe, costs, fills, sessions,
    and staged validation gates are unchanged.'
