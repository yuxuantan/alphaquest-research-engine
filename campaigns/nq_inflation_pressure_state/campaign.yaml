campaign_id: nq_inflation_pressure_state
title: NQ Inflation Pressure State
status: completed_failed
decision: FAIL
created_at: '2026-07-01'
symbol: NQ
dataset_id: nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny
timeframe: 1m
hypothesis: Conservatively lagged CPI and PCE inflation-pressure states may proxy
  discount-rate, policy-risk, and real-rate pressure that affects same-day NQ intraday
  drift after the cash open.
rationale: This campaign tests a monthly inflation-pressure state edge using BEA PCE
  and BLS CPI observations at least 45 calendar days old. It is distinct from BLS
  release-day drift, import/export price pressure, real-yield/breakeven, and Treasury-rate
  orderflow campaigns because it uses stale realized consumer-inflation state ranks
  rather than release-day event drift, trade-price inflation, market-implied inflation
  compensation, or intraday rate movement.
research_sources:
- title: Asset Returns and Inflation
  author: Eugene F. Fama and G. William Schwert
  year: 1977
  link_or_doi: https://www.billschwert.com/ari.htm
  expected_mechanism: Inflation and inflation expectations are linked to asset-return
    behavior, motivating tests of inflation-pressure states on equity-index futures.
- title: Personal Consumption Expenditures Price Index
  author: U.S. Bureau of Economic Analysis
  year: 2026
  link_or_doi: https://www.bea.gov/data/personal-consumption-expenditures-price-index
  expected_mechanism: The PCE price index measures prices paid by or on behalf of
    U.S. consumers and is central to policy-sensitive inflation monitoring.
- title: Consumer Price Index for All Urban Consumers and PCE series
  author: BLS and BEA via FRED, Federal Reserve Bank of St. Louis
  year: 2026
  link_or_doi: https://fred.stlouisfed.org/series/CPIAUCSL
  expected_mechanism: Public CPI and PCE index series provide strictly lagged realized
    inflation state features for NQ session ranking.
data_requirements:
- data/cache/orderflow/nq_sierra_trade_orderflow_1m_20110103_20260612_full_rth_ny.parquet
- data/external/fred_inflation_pressure_state/fred_pcepi_monthly.csv
- data/external/fred_inflation_pressure_state/fred_pcepilfe_monthly.csv
- data/external/fred_inflation_pressure_state/fred_cpiaucsl_monthly.csv
- data/external/fred_inflation_pressure_state/fred_cpilfesl_monthly.csv
- data/external/nq_inflation_pressure_state_features_20110103_20260612.csv
feature_construction:
  builder: tools/build_nq_inflation_pressure_state_features.py
  output: data/external/nq_inflation_pressure_state_features_20110103_20260612.csv
  rows: 3813
  valid_rank_rows: 3813
  availability_lag_days: 45
  lookahead_control: Each NQ session uses only the latest monthly PCEPI/PCEPILFE/CPIAUCSL/CPILFESL
    observation on or before session_date minus 45 calendar days.
duplicate_edge_review:
  active_scope_only: true
  reviewed_on: '2026-07-01'
  existing_nq_campaign_id: none
  not_duplicate_of:
  - nq_bls_macro_release_day_drift
  - nq_import_export_price_pressure
  - nq_real_yield_breakeven_state
  - nq_treasury_rate_shock_intraday
  - nq_industrial_production_state
  - nq_manufacturing_orders_state
  - nq_retail_inventory_demand
  - nq_housing_construction_state
  - nq_jobless_claims_state
  conclusion: Eligible as a bounded realized consumer-inflation state edge; it does
    not reuse release-day drift, import/export-price pressure, market-implied inflation
    compensation, intraday rate shocks, or prior macro state families.
