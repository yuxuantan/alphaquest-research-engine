research_metadata:
  academic_source: Llorente et al. (2002); Cont, Kukanov, and Stoikov (2014); Bouchaud, Farmer, and Lillo (2009);
    Lo, Mamaysky, and Wang (2000)
  edge_thesis: Completed impulse-pause-breakout sequences with aligned aggregate orderflow may continue intraday
    if order splitting or liquidity-taking pressure persists after the breakout close.
  mechanic: From 10:00:00 through 12:30:00 ET, wait for 4 completed 5-minute bars to move at least the declared
    impulse threshold, then require 2 completed pause bars whose retrace is no more than 55% of that impulse. A
    trade is signaled only when the next completed bar closes beyond the pause boundary with same-direction large10
    imbalance; direction is long and short.
  timeframe_rationale: Five-minute bars reduce one-minute noise but still keep the completed breakout close close
    enough to the pressure event for realistic next-bar execution and enough annual opportunities.
  pre_pnl_density:
    full_history_min_signals_per_year: '>=142.43 across the strictest declared corners'
    limited_core_random_window_min_signals_per_year: '>=129.33 across the strictest declared corners'
    latest_window_min_signals: '>=142 across the strictest declared corners'
    artifact: research_artifacts/nq_impulse_pause_orderflow_continuation_density_audit_20260630.md
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: 'This variant expresses impulse-pause continuation because it separates the setup into
      three completed phases: directional impulse, shallow pause, and breakout close. From 10:00:00 through 12:30:00
      ET, wait for 4 completed 5-minute bars to move at least the declared impulse threshold, then require 2 completed
      pause bars whose retrace is no more than 55% of that impulse. A trade is signaled only when the next completed
      bar closes beyond the pause boundary with same-direction large10 imbalance; direction is long and short.'
    entry_logic_rationale: The entry decision uses only completed 5-minute RTH bars. The impulse and pause are prior
      completed bars; the breakout and large10 confirmation are known only at the signal bar close, so execution
      is no earlier than the next bar open. The later morning version waits for a longer impulse and confirms the
      breakout with larger-trade participation, trying to avoid ordinary noisy continuation after the open.
    stop_loss_rationale: The percent-from-entry stop is fixed before testing, independent of future session levels,
      and invalidates the continuation premise if the post-breakout move cannot tolerate ordinary NQ noise. The
      stop is the only stop tunable.
    target_exit_rationale: The fixed-R target uses the initial stop distance and starts at exactly 1.0R, satisfying
      the hard rule that no target_r_multiple below 1.0 may be tested. It avoids fitting exits to future highs,
      lows, VWAP, or orderflow.
    profitability_rationale: The variant should be profitable only if a shallow pause after a real impulse marks
      absorption of counterflow and the breakout close with aligned aggregate flow captures unfinished order splitting
      or liquidity-taking pressure after costs.
    known_failure_modes: The breakout bar can be terminal exhaustion, the pause can be random noise rather than
      absorption, aggregate orderflow may lag price, and the edge can disappear under one-tick worse slippage, delayed
      entry, or low-volatility regimes.
    pre_test_decision: approve_for_testing
