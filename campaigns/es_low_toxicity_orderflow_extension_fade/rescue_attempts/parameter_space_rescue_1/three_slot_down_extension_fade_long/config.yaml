research_metadata:
  academic_source: Cont, Kukanov, and Stoikov (2014); Easley, Lopez de Prado, and O'Hara (2012); Madhavan, Richardson, and Roomans (1997)
  edge_thesis: Three long-only slots fade downside extensions when same-clock orderflow imbalance is unusually low.
  mechanic: Three long-only slots fade downside extensions when same-clock orderflow imbalance is unusually low.
  timeframe_rationale: Five-minute bars let the campaign form 15/30/60-minute completed orderflow-state windows while preserving next-bar execution and enough yearly observations.
  pre_pnl_density: 2253 full-sample pre-PnL signals, about 146.01 per year.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-20'
  mechanics_review:
    mechanic_expresses_edge: Three long-only slots fade downside extensions when same-clock orderflow imbalance is unusually low. Each slot requires low same-clock absolute orderflow imbalance plus a completed price extension, so the entry expresses weak-pressure extension fade rather than raw orderflow momentum.
    entry_logic_rationale: Parameter-space rescue 1 keeps the same completed-bar slot definitions and fade direction, but requires lower same-clock low-toxicity ranks and larger completed return extensions. This tests a stricter version of the same weak-pressure extension-fade thesis rather than changing the trigger mechanics.
    stop_loss_rationale: Parameter-space rescue 1 keeps the percent-from-entry stop model but widens the volatility budget. This is allowed because the original core rows usually selected the widest stop, suggesting normal ES noise may be too large for the initial stop grid.
    target_exit_rationale: A fixed-R target keeps the payoff tied to initial risk rather than future intraday levels. The target grid starts at 1.0R because sub-1R targets are invalid under the methodology.
    profitability_rationale: The setup should be profitable only if low same-clock imbalance identifies extensions with weak informed pressure and therefore better odds of reversion. Pre-PnL density was 2253 signals, about 146.01 per year, so this is not a rare-event thesis.
    known_failure_modes: Low imbalance may simply mean quiet continuation, same-clock ranks may fail in new regimes, fixed slots may encode intraday seasonality, and costs may consume small fades even when direction is often right.
    pre_test_decision: approve_for_testing
  rescue_attempt:
    id: parameter_space_rescue_1
    created_at: '2026-06-20T00:00:00'
    source_config_path: campaigns/es_low_toxicity_orderflow_extension_fade/variants/three_slot_down_extension_fade_long/config.yaml
    source_run_id: run1
    reason: Original surfaces failed before WFA; top rows tended to use stricter low-toxicity ranks, larger return extensions, and wider stops, so the one allowed rescue tests a stricter same-mechanic state/extension space with a wider volatility budget.
    allowed_change_scope: entry_threshold_and_stop_parameter_space_only
    changed:
      entry.params.rank_threshold: 0.35
      entry.params.min_return_ticks: 5
      strategy.sl.params.stop_pct: 0.006
      core_grid/wfa rank_threshold:
      - 0.25
      - 0.35
      - 0.45
      core_grid/wfa min_return_ticks:
      - 4
      - 5
      - 6
      core_grid/wfa stop_pct:
      - 0.004
      - 0.006
      - 0.008
    unchanged:
    - entry module
    - slot definitions
    - low-toxicity orderflow extension-fade mechanic
    - take-profit module and parameter grid
    - data source
    - timeframe
    - costs
    - fills
    - sessions
    - validation gates
    - target reward:risk floor
