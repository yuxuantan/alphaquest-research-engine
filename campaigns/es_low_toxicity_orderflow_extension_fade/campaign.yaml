  best_rescue: three_slot_up_extension_fade_short/rescue1
  failure_reason: All five original variants and all five one-time parameter-space rescues failed the limited_core_grid_test profitable-combination gate before monkey, WFA, Monte Carlo, simulated incubation, or frozen validation.
