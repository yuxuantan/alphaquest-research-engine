campaign_id: es_low_toxicity_orderflow_extension_fade
title: ES Low-Toxicity Orderflow Extension Fade
decision: TEST
created_at: '2026-06-20'
symbol: ES
dataset_id: es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny
timeframe: 5m
hypothesis: When ES makes a short-horizon price extension but same-clock absolute aggregate orderflow imbalance is unusually low, the move may be weakly informed or liquidity-driven rather than pressure-driven. Fading those extensions in fixed intraday slots may capture reversion after low-toxicity moves.
rationale: This campaign tests orderflow state, not raw signed-flow momentum. It ranks completed-bar absolute signed-volume imbalance against prior same-clock sessions to avoid intraday seasonality, requires a completed price extension in the direction being faded, then enters on the next bar in predeclared non-overlapping time slots.
sources:
- title: The Price Impact of Order Book Events
  authors: Rama Cont, Arseniy Kukanov, and Sasha Stoikov
  year: 2014
  venue: Journal of Financial Econometrics
  doi: 10.1093/jjfinec/nbt003
  link: https://academic.oup.com/jfec/article/12/1/47/816163
  relevance: Motivates orderflow imbalance as a short-horizon pressure state; this campaign uses low aggregate imbalance as the weak-pressure condition.
- title: Flow Toxicity and Liquidity in a High-frequency World
  authors: David Easley, Marcos M. Lopez de Prado, and Maureen O'Hara
  year: 2012
  venue: Review of Financial Studies
  doi: 10.1093/rfs/hhs053
  link: https://academic.oup.com/rfs/article/25/5/1457/1586220
  relevance: Supports the idea that toxicity/orderflow composition changes liquidity provision and short-horizon price behavior.
- title: Why Do Security Prices Change? A Transaction-Level Analysis of NYSE Stocks
  authors: Ananth Madhavan, Matthew Richardson, and Mark Roomans
  year: 1997
  venue: Review of Financial Studies
  doi: 10.1093/rfs/10.4.1035
  link: https://academic.oup.com/rfs/article-abstract/10/4/1035/1589322
  relevance: Links transaction flow, liquidity, and price changes, motivating a pressure-state interpretation rather than a pure chart pattern.
data_needs:
- timezone-aware ES RTH 1-minute Sierra OHLCV/orderflow cache in America/New_York
- 5-minute completed-bar aggregation
- rolling 15/30/60-minute aggregate signed-volume imbalance and return features
- same-clock rank features computed only from prior sessions
- same-day stop, target, forced-flatten, and no-overnight enforcement
lookahead_risks:
- Same-clock ranks must use only prior sessions at the same clock time.
- Signals use completed 5-minute bars and enter at the next bar open or later.
- No future bar, final session range, final VWAP, or post-entry orderflow is used.
data_quality_caveats:
- Sierra signed-volume fields are aggregate bar-level proxies, not print-level aggressor truth.
- Same-bar stop/target conflicts must use pessimistic OHLC fill ordering.
- The edge is invalid if same-clock ranks are accidentally computed using the current or future session.
failure_modes:
- Low imbalance may identify quiet continuation rather than reversion.
- Fixed slots may be intraday-seasonality artifacts.
- Trade count can be high but edge may disappear after costs.
- Results may concentrate in one volatility regime or one side.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
  - es_signed_orderflow_persistence
  - es_orderflow_impulse_reversal
  - es_intraday_periodicity_orderflow_confirmation
  - es_rolling_stat_envelope_orderflow_reversion
  - es_volume_shock_liquidity_reversal
  conclusion: Eligible as a fresh active campaign. It tests same-clock low-toxicity orderflow state plus price-extension fade, not raw signed-flow persistence, large-trade momentum, volume-shock reversal, or rolling price-envelope reversion.
feature_construction:
  orderflow_source: data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  features: trade_orderflow_features windows 3/6/12 on 5-minute bars with same-clock rank63
  pre_pnl_density_audit: research_artifacts/es_low_toxicity_orderflow_extension_fade_density_audit_20260620.md
  target_reward_risk_floor: 1.0
variants:
- two_slot_morning_balanced_extension_fade
- two_slot_midday_balanced_extension_fade
- two_slot_late_balanced_extension_fade
- three_slot_up_extension_fade_short
- three_slot_down_extension_fade_long
rescue_policy:
  allowed: true
  scope: per_failed_variant
  max_rescues_per_failed_variant: 1
  allowed_changes:
  - change fixed parameters inside existing strategy modules
  - change tunable parameter space inside existing strategy modules
  forbidden_changes:
  - change entry module
  - change stop-loss module
  - change take-profit module
  - change core economic edge
  - change timeframe or data window
  - add or remove filters after seeing results
  - alter costs, fills, sessions, validation gates, or prop rules
  - use any target_r_multiple below 1.0
  attempts:
  - id: parameter_space_rescue_1
    status: failed
    scope: per_failed_variant
    changed_only:
    - low-toxicity rank threshold parameter space
    - return-extension threshold parameter space
    - stop-loss parameter space
    unchanged:
    - entry module
    - slot definitions
    - take-profit module and parameter grid
    - data source and timeframe
    - costs, fills, sessions, validation gates, and prop rules
    audit: backtest-campaigns/es_low_toxicity_orderflow_extension_fade/campaign_test_summary.json
result_summary:
  decision: FAIL
  report: backtest-campaigns/es_low_toxicity_orderflow_extension_fade/campaign_test_summary.json
  results_csv: backtest-campaigns/es_low_toxicity_orderflow_extension_fade/campaign_results.csv
  density_audit: research_artifacts/es_low_toxicity_orderflow_extension_fade_density_audit_20260620.md
  original_runs: 5
  rescue_runs: 5
  monkey_reached: 0
