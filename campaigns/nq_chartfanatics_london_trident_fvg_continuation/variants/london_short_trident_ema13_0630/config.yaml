research_metadata:
  academic_source: ChartFanatics Unique High RR; Lo, Mamaysky, and Wang (2000); Moskowitz, Ooi, and Pedersen (2012)
  edge_thesis: Short NQ continuation after a London-session bearish 30-minute FVG, EMA13 reverse stack, midpoint trident pullback, and confirmation close.
  mechanic: Bearish FVG third candle starts 02:30-04:00 ET; doji wicks into the FVG midpoint; confirmation closes below the doji low; entry would be next 30-minute open.
  timeframe_rationale: The source specifies 30-minute candles and a London-window setup; NQ ETH bars are required.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: >
      This variant expresses the ChartFanatics Unique High RR idea as a short-only
      NQ London-session continuation setup: a completed bearish 30-minute FVG,
      reverse-stacked fast EMAs, 200 EMA trend bias, a completed midpoint
      trident/doji, and a completed confirmation close.
    entry_logic_rationale: >
      The entry waits until the FVG third candle, the doji pullback, and the
      confirmation candle have all closed. The signal timestamp is the next
      30-minute boundary, so the module does not enter on the same close that
      creates the confirmation and does not use any future London range.
    stop_loss_rationale: >
      The stop module uses the completed FVG/trident structural extreme plus a
      predeclared tick offset. This keeps invalidation tied to the source pattern
      rather than to future highs, lows, daily structure, or optimized dollar risk.
    target_exit_rationale: >
      The fixed-R target is a testable substitute for the source's discretionary
      daily-trend hold. It avoids future-derived daily targets while preserving
      the high-R continuation thesis through a predeclared reward multiple.
    profitability_rationale: >
      The setup would be profitable only if London-window FVG pullbacks in
      already stacked NQ downtrends continue often enough to overcome one-tick
      slippage, commissions, structural stops, and forced ETH flattening.
    known_failure_modes: >
      The pattern may be too rare for statistical inference, the source's daily
      discretionary bias and trade management may not translate to fixed rules,
      and 30-minute ETH bars may be too coarse for executable NQ fills.
    pre_test_decision: approve_for_testing
  source_url: https://www.chartfanatics.com/strategies/unique-high-rr
