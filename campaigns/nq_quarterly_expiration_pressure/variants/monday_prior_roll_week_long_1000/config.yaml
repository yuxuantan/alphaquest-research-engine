timeframe: 1m
research_metadata:
  academic_source: Stoll and Whaley (1987); Stoll and Whaley (1990); CME equity-index roll-date reference
  edge_thesis: Quarterly index futures/options expiration can produce abnormal program-trading, hedging,
    volume, and price-pressure effects around expiration and roll dates; this NQ transfer tests whether
    the effect spills into Nasdaq futures without using realized expiration outcomes.
  mechanic: On the Monday before quarterly index futures expiration, enter long NQ at 10:00 ET next bar
    open and flatten by 15:55 ET.
  timeframe_rationale: 1-minute NQ RTH bars preserve deterministic completed-bar calendar signals and
    next-bar-open execution while avoiding overnight exposure.
  mechanics_review_required: true
  mechanics_review_version: '2026-06-30'
  mechanics_review:
    mechanic_expresses_edge: The variant maps one predeclared quarterly expiration or roll-window date
      to one fixed NQ direction and signal time. The only economic claim is that deterministic expiration/roll
      pressure may create same-session directional pressure or reversal in NQ.
    entry_logic_rationale: The entry module checks only the public third-Friday quarterly expiration calendar,
      configured day offset, completed one-minute bar ending at the signal time, and RTH membership. Execution
      is next-bar open; no same-day high/low, settlement, volume spike, or future price information is
      used.
    stop_loss_rationale: A percent-from-entry stop is used because the event is calendar-based rather
      than tied to a structural swing. The stop grid is predeclared and identical across all five NQ variants.
    target_exit_rationale: The fixed-R target grid keeps reward/risk handling auditable and identical
      across variants. All targets are at least 1.0R and positions flatten by 15:55 ET if neither stop
      nor target fills.
    profitability_rationale: If hedging, program trading, settlement, or roll pressure creates repeatable
      intraday imbalance, the fixed event date/time/direction should show positive net expectancy after
      NQ costs without relying on post-event filtering.
    known_failure_modes: The effect can be mostly volume rather than directional return, can belong to
      ES/SPX rather than NQ, can be too sparse for stable inference, or can concentrate in a few crisis/roll
      sessions.
    pre_test_decision: approve_for_testing
  nq_port_provenance:
    source_campaign_id: es_quarterly_expiration_pressure
    source_config_path: /Users/yx/Desktop/alphaquest-research-engine/campaigns/es_quarterly_expiration_pressure/variants/monday_prior_roll_week_long_1000/config.yaml
    source_run_role: ES original variant config, ported before any NQ PnL inspection
    nq_mechanics_changed_after_results: false
    nq_rescue_authorized: false
