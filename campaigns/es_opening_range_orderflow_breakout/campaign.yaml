campaign_id: es_opening_range_orderflow_breakout
title: ES opening-range breakout with aggregate orderflow confirmation
decision: FAIL
created_at: 2026-06-17
instrument: ES
market_timezone: America/New_York
edge_family: opening_range_orderflow_breakout
hypothesis: >
  ES opening-range breakouts should have a better chance of same-day continuation
  when the completed breakout bar also carries aligned aggregate signed orderflow.
  The price-action component defines the public reference level; the orderflow
  component attempts to distinguish genuine aggressive participation from a
  low-conviction stop probe.
sources:
  - title: Assessing the profitability of intraday opening range breakout strategies
    authors: Ulf Holmberg, Carl Lonnback, Christian Lundstrom
    year: 2013
    venue: Finance Research Letters
    link: https://ideas.repec.org/a/eee/finlet/v10y2013i1p27-33.html
    doi: 10.1016/j.frl.2012.09.001
    relevance: >
      Tests opening-range breakout rules as mechanical intraday trading rules.
      This campaign keeps the same reference-level idea but adds a predeclared
      completed-bar orderflow confirmation.
  - title: Market Intraday Momentum
    authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
    year: 2018
    venue: Journal of Financial Economics
    link: https://ideas.repec.org/a/eee/jfinec/v129y2018i2p394-414.html
    doi: 10.1016/j.jfineco.2018.05.009
    relevance: >
      Documents same-day market continuation from early intraday information,
      especially in higher-volume and higher-volatility conditions.
  - title: The Price Impact of Order Book Events
    authors: Rama Cont, Arseniy Kukanov, Sasha Stoikov
    year: 2014
    venue: Journal of Financial Econometrics
    link: https://academic.oup.com/jfec/article-abstract/12/1/47/816163
    doi: 10.1093/jjfinec/nbt003
    relevance: >
      Supports the use of orderflow imbalance as a short-horizon price-pressure
      proxy. This campaign uses Sierra aggregate trade-side flow, not full-depth
      quote OFI.
rationale: >
  This is a deliberately bounded composite edge: a completed opening-range
  breakout supplies the price-action trigger, while the same completed
  confirmation bar must show aggressive flow in the breakout direction. It is
  not the prior range-compression breakout campaign because it does not require
  NR4/NR7 compression. It is not the opening-drive inventory campaign because it
  does not classify first-window inventory state. It is not the signed-flow
  persistence campaign because the trade is anchored to a public opening-range
  level instead of a rolling fixed-time flow impulse.
data_needs:
  - data/cache/orderflow/es_sierra_trade_orderflow_1m_20101214_20260610_full_rth_ny.parquet
  - 5-minute strategy bars aggregated from local 1-minute RTH Sierra bars
  - completed-bar signed_volume, volume, large10_signed_volume, large10_volume, large20_signed_volume, large20_volume
lookahead_risks:
  - Opening range high and low are not known until the configured opening window is complete.
  - Breakout and orderflow confirmation use only the completed confirmation bar.
  - A signal generated from a bar close is filled no earlier than the next bar open by the engine.
  - The final session high, low, VWAP, volume profile, and post-entry orderflow are not used.
  - Same-bar stop/target conflicts use 1-minute detail data when available and pessimistic fallback otherwise.
failure_modes:
  - Opening-range breakout continuation may be fully arbitraged in ES after costs.
  - Aggregate signed volume may be too noisy compared with true quote-level OFI.
  - The strategy may only work during crisis volatility or a small number of trend days.
  - OR-edge stops can be too wide in high-volatility opens and destroy MAR.
  - Tight flow thresholds may select stops being run rather than informed participation.
duplicate_edge_check:
  active_scope_only: true
  archived_tests_ignored: true
  active_rejected_edges_checked:
    - es_range_compression_breakout
    - es_opening_drive_inventory_absorption
    - es_signed_orderflow_persistence
    - es_orderflow_absorption_exhaustion_reversal
    - es_prior_session_level_breakout_continuation
    - es_prior_level_delta_dislocation
  conclusion: >
    Eligible as a new active campaign because the core mechanic is the
    conjunction of opening-range price-action breakout and same-bar aggregate
    orderflow confirmation. Existing active failures tested range compression,
    opening-drive inventory state, standalone signed-flow persistence,
    absorption/fade mechanics, prior-session levels, or prior-level delta
    dislocation.
