name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # Studio API and PDF-boundary tests are part of the governed baseline,
        # so CI must install the same local runtime extras those tests exercise.
        run: python -m pip install -e ".[dev,studio]"
      - name: Install browser for the no-code Studio flow
        run: python -m playwright install --with-deps chromium
      - name: Lint
        run: ruff check src research tests tools
      - name: CLI smoke
        run: alphaquest --help && make smoke
      - name: Documentation links
        run: make docs-check
      - name: Tests
        run: python -m pytest
