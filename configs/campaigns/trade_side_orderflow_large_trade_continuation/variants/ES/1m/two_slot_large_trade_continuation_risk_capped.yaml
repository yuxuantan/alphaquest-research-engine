campaign_id: trade_side_orderflow_large_trade_continuation
variant_id: two_slot_large_trade_continuation_risk_capped
strategy_name: trade_orderflow_multi_pressure
symbol: ES
dataset_id: databento_trades_20250609_20260608
timeframe: 1m

research_metadata:
  academic_source: "Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and Liquidity in a High-frequency World, Review of Financial Studies"
  doi: "10.1093/rfs/hhs053"
  edge_thesis: "Large aggressive trade imbalance can reveal short-horizon informed pressure that continues in ES intraday windows."
  mechanic: "Risk-capped version of the two-slot large-trade continuation candidate, centered on the staged core-grid row that kept worst daily loss within the $1,500 benchmark."
  timeframe_rationale: "Signals use completed 1-minute trade bars and enter on the next 1-minute bar open."
  evidence_directness: "Moderate; the strategy uses true trade-side classifications, but it is a simplified intraday continuation translation of flow-toxicity/order-imbalance evidence."

data:
  dataset_id: databento_trades_20250609_20260608
  source_timeframe: 1m
  source: csv
  raw_csv: data/cache/orderflow/es_trade_orderflow_1m_20250609_20260608.csv
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: "09:30:00"
  rth_end: "15:59:00"
  trade_orderflow_features:
    enabled: true
    windows: [5, 60]
    large_trade_sizes: [20]
    min_period_fraction: 1.0
    tick_size: 0.25

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: trade_orderflow_multi_pressure
    params:
      bar_interval_minutes: 1
      max_trades_per_day: 2
      positive_flow_direction: long
      allow_long: true
      allow_short: false
      return_confirmation: none
      slots:
        - slot_id: large20_1000_5m
          setup_mode: large20_1000_5m
          entry_time: "10:00:00"
          flatten_time: "10:31:00"
          flow_column: trade_orderflow_large20_imbalance_5
          flow_threshold: 0.10
          stop_pct: 0.004
          target_r_multiple: 1.0
        - slot_id: large20_1100_60m
          setup_mode: large20_1100_60m
          entry_time: "11:00:00"
          flatten_time: "15:31:00"
          flow_column: trade_orderflow_large20_imbalance_60
          flow_threshold: 0.05
          stop_pct: 0.003
          target_r_multiple: 2.0
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 1.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.004
      round_to_tick: true
  flatten_time: "15:31:00"

core:
  data_subset:
    start_date: "2025-06-09"
    end_date: "2026-06-08"
    session_labels: [RTH]
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.50
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: "15:31:00"
  max_trades_per_day: 2

benchmarks:
  min_trades_per_year: 60
  preferred_min_total_trades: 500
  min_profit_factor: 1.30
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.04
  min_mar: 0.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.40
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50

core_grid:
