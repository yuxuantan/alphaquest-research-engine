research_metadata:
  academic_source: Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and
    Liquidity in a High-frequency World, Review of Financial Studies
  doi: 10.1093/rfs/hhs053
  edge_thesis: >
    Aggregated orderflow participation state may identify a repeated sequence
    of lower-toxicity and exhaustion windows. This dense priority ensemble
    combines same-clock rank states and raw signed-volume imbalance thresholds
    using only Sierra-compatible completed bar fields.
  mechanic: >
    Run a deterministic non-overlapping priority stack of twelve completed-bar
    orderflow slots. Same-clock ranks use only prior sessions at the same clock
    time; two raw imbalance slots use completed 5- and 60-minute signed-volume
    thresholds. Each signal enters on the next 1-minute open and flattens at
    its slot-specific same-session deadline.
  timeframe_rationale: >
    Signals use completed 1-minute bars aggregated into 5-, 15-, and 60-minute
    orderflow state features, then enter on the next 1-minute bar open.
  evidence_directness: >
    Moderate. The academic source supports order-flow toxicity and liquidity
    state as informed-flow proxies; this variant tests a simplified ES
    implementation using only aggregated bar-level orderflow fields. This
    variant tests whether a denser non-overlapping priority stack can repair
    the one-year trade-density weakness seen in the sparse rank combos.
