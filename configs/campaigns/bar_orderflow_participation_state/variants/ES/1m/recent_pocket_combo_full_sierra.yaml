research_metadata:
  academic_source: Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and
    Liquidity in a High-frequency World, Review of Financial Studies
  doi: 10.1093/rfs/hhs053
  edge_thesis: >
    Bar-aggregated signed-volume imbalance, same-clock participation ranks, and
    prior-session orderflow inventory can identify repeatable intraday liquidity
    states where ES either continues recent pressure or reverts after crowded
    participation pockets.
  mechanic: >
    Combine four non-overlapping aggregate-orderflow pockets discovered on the
    full Sierra 1-minute RTH cache: same-clock negative-flow surprise short at
    11:30 ET, two-session negative-inventory continuation short at 11:30 ET,
    late VWAP-extension/positive-flow fade short at 13:30 ET, and late positive
    flow continuation long at 15:00 ET. All signals use completed 1-minute bars
    and prior-session same-clock ranks only.
  timeframe_rationale: >
    The strategy uses Sierra-compatible 1-minute bars, with 15-minute and
    30-minute rolling orderflow state computed from completed bars before the
    next-bar entry.
  evidence_directness: >
    Moderate. The paper establishes order-flow toxicity and informed-flow risk
    as liquidity-state drivers; this variant tests a mechanical ES translation
    using only aggregated bid/ask-volume bars available in real time.
