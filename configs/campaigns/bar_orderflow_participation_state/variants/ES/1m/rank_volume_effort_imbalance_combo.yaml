research_metadata:
  academic_source: Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and
    Liquidity in a High-frequency World, Review of Financial Studies
  doi: 10.1093/rfs/hhs053
  edge_thesis: >
    Aggregated orderflow participation state may identify intraday windows
    where liquidity is supportive rather than toxic. This variant combines
    high early participation, low midday effort-vs-result, and low afternoon
    signed-volume pressure ranks using only Sierra-compatible bar fields.
  mechanic: >
    Use prior-session same-clock ranks of completed 15-minute orderflow bars.
    Go long at 09:45 when 15-minute volume is in a high same-clock rank, go
    long at 12:15 when 15-minute effort-vs-result is in a low same-clock rank,
    and go long at 13:00 when 15-minute signed-volume imbalance is in a low
    same-clock rank if no earlier position is still open.
  timeframe_rationale: >
    Signals use completed 1-minute bars aggregated into 15-minute orderflow
    state features, then enter on the next 1-minute bar open.
  evidence_directness: >
    Moderate. The academic source supports order-flow toxicity and liquidity
    state as informed-flow proxies; this variant tests a simplified ES
    implementation using only aggregated bar-level orderflow fields.
