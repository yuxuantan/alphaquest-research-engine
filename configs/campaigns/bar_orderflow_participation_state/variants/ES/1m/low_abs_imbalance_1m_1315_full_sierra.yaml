timeframe: 1m
research_metadata:
  academic_source: Easley, Lopez de Prado, and O'Hara (2012), Flow Toxicity and
    Liquidity in a High-frequency World, Review of Financial Studies
  doi: 10.1093/rfs/hhs053
  edge_thesis: >
    Low one-minute bar-level signed-volume imbalance at a fixed intraday decision time can
    identify lower-toxicity, more balanced liquidity conditions where a simple
    afternoon ES long drift is less exposed to adverse informed flow.
  mechanic: >
    At 13:15 ET, rank the just-completed 1-minute absolute signed-volume
    imbalance against prior same-clock sessions. Go long only when the 42-session
    same-clock rank is in the low tail, then flatten at 14:15 ET.
  timeframe_rationale: >
    The signal uses the completed 13:14 one-minute bid/ask-volume bar, then
    enters on the 13:15 one-minute bar open.
  evidence_directness: >
    Moderate. The academic source supports order-flow toxicity and liquidity
    state as an informed-flow proxy; this config tests a simplified, bar-level ES
    implementation that should be portable to Sierra Chart bid/ask-volume bars.
