research_metadata:
  academic_source: Campbell, Grossman, and Wang (1993), Trading Volume and Serial
    Correlation in Stock Returns, Quarterly Journal of Economics
  doi: 10.2307/2118454
  edge_thesis: >
    High-participation return shocks can alter short-horizon serial correlation
    because orderflow inventory and liquidity provision change how price pressure
    is absorbed or continued. This variant tests whether completed ES opening
    drive return, signed-volume imbalance, and opening-volume rank identify
    later intraday continuation or divergence-fade pockets.
  mechanic: >
    Capture the completed first 30- and 60-minute RTH orderflow state, then
    enter six fixed later-session windows only when the opening return,
    signed-volume imbalance, prior-session opening-volume rank, session
    cumulative delta ratio, and VWAP distance match the predeclared branch rule.
    All features are completed before the next-bar entry and are available from
    Sierra-compatible 1-minute OHLCV plus bid/ask-volume aggregates.
  timeframe_rationale: >
    One-minute bars are required so the first 30/60 minute opening inventory can
    be captured exactly and entries can be placed on the next one-minute bar.
  evidence_directness: >
    Moderate. The paper is equity-market evidence on volume-conditioned serial
    correlation rather than ES-specific orderflow, but the implemented
    hypothesis directly tests its volume/return inventory mechanism with
    real-time reconstructable aggregate futures bars.
