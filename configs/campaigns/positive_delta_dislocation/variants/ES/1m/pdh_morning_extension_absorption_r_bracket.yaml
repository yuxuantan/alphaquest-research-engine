campaign_id: positive_delta_dislocation
variant_id: pdh_morning_extension_absorption_r_bracket
strategy_name: positive_delta_dislocation
symbol: ES
dataset_id: sierra_trade_orderflow_1m_20101229_20260609_full_rth_ny
timeframe: 1m
research_metadata:
  source: Follow-on variant from the user-supplied positive-delta-dislocation rule.
  edge_thesis: >
    The literal ES run only had positive average PnL in the 10:30 and 11:30
    signal slots, and the better quartiles were deeper negative hourly windows
    with larger raw positive delta. This variant tests that narrower absorption
    interpretation with realistic bracket risk.
  mechanic: >
    At 10:30 and 11:30 ET only, require the signal close to be materially above
    the previous RTH high, the completed 60-minute RTH window to be negative,
    and signed trade delta to be positive by the configured threshold. The
    optional delta-ratio cap keeps the setup closer to high-volume absorption
    than thin positive-delta imbalance.
  exit_rule: >
    Use a realistic percent-from-entry stop and fixed-R target selected by the
    grid, with unresolved trades flattened at 16:00 ET.
  timeframe_rationale: >
    This keeps the supplied one-hour rule intact but removes the weaker midday
    and late-day ES slots and replaces the inactive 10000 dollar bracket with
    a tradable intraday risk bracket.
