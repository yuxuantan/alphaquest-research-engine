campaign_id: five_min_orb_vol_filter
variant_id: fixed_rr_cost_adjusted
strategy_name: five_min_orb_vol_filter
symbol: ES
dataset_id: 1m_full_history

data:
  dataset_id: 1m_full_history
  source: databento_dbn
  feature_set: opening_range
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 7
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 3

strategy:
  entry:
    module: opening_range_breakout
    params:
      rth_start: "09:30:00"
      opening_range_minutes: 5
      confirmation_minutes: 1
      bar_interval_minutes: 1
      max_opening_range_pct_of_open: 0.0055
      last_entry_time: "12:00:00"
      max_trades_per_day: 1
      skip_tuesday_longs: true
      allow_long: true
      allow_short: true
  tp:
    module: cost_adjusted_fixed_r
    params:
      target_r_multiple: 1.0
      tick_size: 0.25
      tick_value: 12.50
      commission_per_contract: 2.50
      slippage_ticks: 1
  sl:
    module: opening_range_edge
    params:
      max_stop_points: 1000 # no max
      stop_offset_ticks: 0
  flatten_time: "15:45:00"

core:
  data_subset:
    start_date: "2015-01-01"
    end_date: "2016-12-31"
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.50
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.01
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: "15:45:00"

benchmarks:
  min_trades_per_year: 100
  preferred_min_total_trades: 500
  min_profit_factor: 1.30
  min_total_net_profit: 0
  min_expectancy_r: 0.0
  min_win_rate: 0.55
  max_drawdown_pct: 0.03
  min_cagr: 0.06
  min_mar: 2.0
  max_daily_loss: 1000
  max_consecutive_losses: 8
  max_best_day_concentration: 0.40
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50
  slippage_sensitivity:
    required_ticks_per_side: 1
    ideal_ticks_per_side: 2
    min_profit_factor: 1.30

core_grid:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  objective: net_profit
  min_profitable_iteration_rate: 0.70
  retain_iteration_reports: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.max_opening_range_pct_of_open: [0.003, 0.0035, 0.004, 0.0045, 0.005]
    entry.params.confirmation_minutes: [1]
    tp.params.target_r_multiple: [1.0, 1.25, 1.5, 1.75, 2.0]
    sl.params.max_stop_points: [10, 11, 12, 13, 14]
    sl.params.stop_offset_ticks: [0]
    entry.params.max_trades_per_day: [1]
    entry.params.skip_tuesday_longs: [false]
    entry.params.allow_long: [true]
    entry.params.allow_short: [true]

monkey:
  data_subset:
    start_date: "2021-01-01"
    end_date: "2022-12-31"
  runs: 8000
  seed: 7
  beat_threshold: 0.90
  retain_iteration_reports: true
  parallel:
    enabled: true
    workers: 6
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  data_subset:
    start_date: "2011-01-01"
    end_date: "2014-01-01"
  mode: unanchored
  # train_months: 48
  train_months: 24
  test_months: 12
  step_months: 12
  objective: MAR
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    # entry.params.max_opening_range_pct_of_open: [0.0035, 0.0055, 0.0075]
    entry.params.max_opening_range_pct_of_open: [0.0055]
    entry.params.confirmation_minutes: [1]
    tp.params.target_r_multiple: [1.0, 1.5, 2.0]
    # sl.params.max_stop_points: [9, 12, 15]
    sl.params.max_stop_points: [12]
    sl.params.stop_offset_ticks: [0]
    entry.params.max_trades_per_day: [1]
    entry.params.skip_tuesday_longs: [false]
    entry.params.allow_long: [true]
    entry.params.allow_short: [true]

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000 # set same as trailing dd = no daily loss limit
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 188.9 # set this as the challenge fee to know probability reaching breakeven payout. (assume no min payout threshold). then probability of BE is probability_profit_before_drawdown * probability_payout_eligible
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267

monte_carlo:
  trade_source: core
  runs: 100
  seed: 11
  parallel:
    enabled: true
    workers: 6
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.012
  cluster_losses: false
  retain_path_trades: true
  retain_path_events: true
