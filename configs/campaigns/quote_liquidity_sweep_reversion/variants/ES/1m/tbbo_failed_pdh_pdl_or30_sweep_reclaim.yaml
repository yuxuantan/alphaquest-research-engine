research_metadata:
  academic_source: "Cont, Kukanov, and Stoikov (2014); Hendershott and Menkveld (2014); Chordia, Roll, and Subrahmanyam (2002)"
  edge_thesis: "A known-level ES sweep that fails while top-of-book liquidity refills is a temporary price-pressure event, not a continuation signal."
  mechanic: "Use only completed 1-minute TBBO-derived bars. Track previous RTH high/low plus the 30-minute opening range. If price sweeps a level by the configured tick buffer, reclaims it within the configured bar window, and the TBBO side in the reclaim direction refills while quote imbalance flips supportive, fade back inside the level."
  timeframe_rationale: "The effect is a short-horizon book/liquidity event; 1-minute bars preserve the timing while remaining compatible with the existing staged engine."
  evidence_directness: "High for the book-depth thesis, pending for ES implementation; no local TBBO pilot data has been downloaded."
  data_status: "DATA_GATED. Build data/cache/orderflow/es_tbbo_liquidity_1m_20250609_20260609.csv with propstack.build_tbbo_liquidity_cache before running."
  live_status: "Not live eligible. This is a predeclared pilot config only."

