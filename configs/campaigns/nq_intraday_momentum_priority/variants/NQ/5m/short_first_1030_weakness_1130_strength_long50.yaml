campaign_id: nq_intraday_momentum_priority
variant_id: short_first_1030_weakness_1130_strength_long50
strategy_name: nq_intraday_momentum_priority
symbol: NQ
dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
timeframe: 5m

research_metadata:
  alpha_family: "NQ intraday price momentum priority"
  independence_note: "Independent from the accepted ES morning orderflow family: no signed-volume, large-trade, or Sierra orderflow inputs are used."
  edge_thesis: "NQ opening-session weakness can persist from 10:30 ET, while a later stronger RTH-open-to-11:30 move remains tradable if the earlier weakness leg did not fire."
  mechanic: "Causal priority rule: first test 10:30 short weakness from the RTH open; only when that slot does not fire, test 11:30 long strength from the RTH open with the long threshold fixed at 50 bps. One trade maximum per session."
  source_data: "Databento NQ 1-minute OHLCV, dominant-session-volume continuous contract, RTH-only strategy decisions."
  direct_screen_reference: "/private/tmp/nq_combined_momentum_stable_screen.csv"
  grid_audit_reference: "/private/tmp/nq_intraday_momentum_priority_long50_grid_audit"

data:
  dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
  source_timeframe: 1m
  source: databento_dbn
  feature_set: none
  raw_dir: data/raw/NQ/GLBX-20260601-RTF938NJSN
  cache_dir: data/cache/databento/GLBX-20260601-RTF938NJSN
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: dominant_session_volume
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 0
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: intraday_momentum_priority
    params:
      setup_mode: short_first_1030_weakness_1130_strength
      rth_start: "09:30:00"
      bar_interval_minutes: 5
      tick_size: 0.25
      max_trades_per_day: 1
      slots:
        - slot_id: nq_1030_short_weakness
          param_prefix: short
          direction: short
          source_start: "09:30:00"
          signal_time: "10:30:00"
          min_signal_return_bps: 40
          min_signal_return_ticks: 0
          stop_pct: 0.0035
          target_r_multiple: 3.0
          flatten_time: "15:59:00"
        - slot_id: nq_1130_long_strength
          param_prefix: long
          direction: long
          source_start: "09:30:00"
          signal_time: "11:30:00"
          min_signal_return_bps: 50
          min_signal_return_ticks: 0
          stop_pct: 0.0035
          target_r_multiple: 2.5
          flatten_time: "15:59:00"
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 3.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.0035
      round_to_tick: true
  flatten_time: "15:59:00"

core:
  data_subset:
    start_date: "2011-01-03"
    end_date: "2026-05-29"
    session_labels: [RTH]
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 5.00
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: "15:59:00"
  max_trades_per_day: 1

benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.40
  min_total_net_profit: 0
  min_expectancy_r: 0.20
  min_win_rate: 0.40
  max_drawdown_pct: 0.10
  min_cagr: 0.0
  min_mar: 0.50
  max_best_day_concentration: 0.50
  min_positive_month_rate: 0.50
  min_wfa_profitable_window_rate: 0.70
  min_monte_carlo_prop_pass_chance: 0.50

core_grid:
  data_subset: &pre_incubation_subset
    start_date: "2011-01-03"
    end_date: "2024-12-31"
    session_labels: [RTH]
  objective: MAR
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &nq_momentum_priority_params
    entry.params.short_min_signal_return_bps: [35, 40, 45]
    entry.params.short_stop_pct: [0.0030, 0.0035, 0.0040]
    entry.params.short_target_r_multiple: [3.0, 3.5]
    entry.params.long_min_signal_return_bps: [50]
    entry.params.long_stop_pct: [0.0035, 0.0040]
    entry.params.long_target_r_multiple: [2.5, 3.0, 4.0]

monkey:
  data_subset: *pre_incubation_subset
  runs: 500
  seed: 7
  beat_threshold: 0.80
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  data_subset: *pre_incubation_subset
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 50
  selection_min_profit_factor: 1.0
  early_exit_min_train_profit_factor: 1.0
  early_exit_require_train_profitable: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: *nq_momentum_priority_params

campaign_tests:
  stage_order:
    - limited_core_grid_test
    - limited_monkey_test
    - walk_forward_analysis
    - wfa_oos_monkey_test
    - wfa_oos_monte_carlo
    - simulated_incubation_core
    - simulated_incubation_monkey
  limited_core_grid_test:
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
        - {start_date: "2020-02-01", end_date: "2021-06-30"}
    criteria:
      - {metric: summary.total_combinations_tested, min: 100}
      - {metric: summary.percentage_profitable_iterations, min: 0.70}
      - {metric: summary.apex_rule_violating_iterations, max: 0}
  limited_monkey_test:
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
        - {start_date: "2020-02-01", end_date: "2021-06-30"}
    criteria:
      - {metric: summary.core_beats_monkey_net_profit_rate, min: 0.80}
      - {metric: summary.core_beats_monkey_max_drawdown_rate, min: 0.80}
      - {metric: summary.core_metrics.apex_rule_violations, max: 0}
  walk_forward_analysis:
    data_subset: *pre_incubation_subset
    criteria:
      - {metric: summary.early_exit, equals: false}
      - {metric: summary.windows, min: 10}
      - {metric: stitched_oos_metrics.profit_factor, min: 1.40}
      - {metric: stitched_oos_metrics.mar, min: 0.50}
      - {metric: stitched_oos_metrics.expectancy_r, min: 0.20}
      - {metric: stitched_oos_metrics.total_trades, min: 500}
      - {metric: stitched_oos_metrics.apex_rule_violations, max: 0}
  wfa_oos_monkey_test:
    criteria:
      - {metric: summary.core_beats_monkey_net_profit_rate, min: 0.90}
      - {metric: summary.core_beats_monkey_max_drawdown_rate, min: 0.90}
      - {metric: summary.core_metrics.apex_rule_violations, max: 0}
  wfa_oos_monte_carlo:
    criteria:
      - {metric: summary.probability_profit_before_drawdown, min: 0.50}
  simulated_incubation_core:
    data_subset:
      start_date: "2025-01-01"
      end_date: "2026-05-29"
      session_labels: [RTH]
    train_selection:
      enabled: true
      data_subset:
        start_date: "2021-01-01"
        end_date: "2024-12-31"
        session_labels: [RTH]
      objective: MAR
      selection_min_trades_per_year: 50
      retain_iteration_reports: false
      parallel:
        enabled: true
        workers: 6
        scope: grid
      parameters: *nq_momentum_priority_params
    criteria:
      - {metric: metrics.profit_factor, min: 1.10}
      - {metric: metrics.mar, min: 1.00}
      - {metric: metrics.expectancy_r, min: 0.15}
      - {metric: metrics.total_trades, min: 75}
      - {metric: metrics.apex_rule_violations, max: 0}
  simulated_incubation_monkey:
    criteria:
      - {metric: summary.core_beats_monkey_net_profit_rate, min: 0.80}
      - {metric: summary.core_beats_monkey_max_drawdown_rate, min: 0.80}
      - {metric: summary.core_metrics.apex_rule_violations, max: 0}

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 10000
  trailing_drawdown: 10000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 50000
  profit_target_pct: 0.3333333333
  drawdown_limit_pct: 0.0666666667

monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
