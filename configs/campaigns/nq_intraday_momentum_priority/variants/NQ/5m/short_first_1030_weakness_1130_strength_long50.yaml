campaign_id: nq_intraday_momentum_priority
variant_id: short_first_1030_weakness_1130_strength_long50
strategy_name: nq_intraday_momentum_priority
symbol: NQ
dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
timeframe: 5m
research_metadata:
  alpha_family: Intraday momentum / price continuation, NQ implementation
  classification: passed_full_stage_correlated_momentum_candidate
  academic_sources:
  - title: Market Intraday Momentum
    authors: Lei Gao, Yufeng Han, Sophia Zhengzi Li, Guofu Zhou
    year: 2018
    venue: Journal of Financial Economics, 129(2), 394-414
    doi: 10.1016/j.jfineco.2018.05.009
    url: https://www.sciencedirect.com/science/article/abs/pii/S0304405X18301351
    finding_used: Opening-period market returns can predict later same-day market
      returns; this motivates testing intraday continuation from completed RTH-open-to-signal
      returns.
  - title: Time Series Momentum
    authors: Tobias J. Moskowitz, Yao Hua Ooi, Lasse Heje Pedersen
    year: 2012
    venue: Journal of Financial Economics, 104(2), 228-250
    doi: 10.1016/j.jfineco.2011.11.003
    finding_used: Futures markets exhibit time-series return persistence; this is
      lower-frequency support for treating a market's own prior return as a directional
      signal.
  independence_note: 'Independent only at the instrument/data/feature level: NQ OHLCV,
    no signed-volume, large-trade, or Sierra orderflow inputs. Not independent at
    the broad alpha-premise level because the economic edge is still intraday momentum/continuation,
    overlapping the accepted ES morning momentum/orderflow family.'
  edge_thesis: NQ opening-session weakness can persist from 10:30 ET, while a later
    stronger RTH-open-to-11:30 move remains tradable if the earlier weakness leg did
    not fire.
  mechanic: 'Causal priority rule: first test 10:30 short weakness from the RTH open;
    only when that slot does not fire, test 11:30 long strength from the RTH open
    with the long threshold fixed at 50 bps. One trade maximum per session.'
  evidence_directness: Moderate. Gao et al. directly supports market-level intraday
    momentum, but their exact published specification is not this NQ 10:30 weakness
    / 11:30 strength priority rule. Moskowitz/Ooi/Pedersen supports futures time-series
    momentum at lower frequency. This variant is therefore a literature-motivated
    NQ implementation whose tradability comes from the repo's staged WFA, monkey,
    Monte Carlo, incubation, and Apex validation. It should not be counted as a new
    independent alpha family under a strict economic-premise definition.
  translation_risks: The edge may fail if NQ opening-session continuation decays,
    if 10:30 weakness becomes mean-reverting, if 11:30 strength stops carrying into
    the afternoon, or if live slippage materially exceeds the 1-tick backtest assumption.
  source_data: Databento NQ 1-minute OHLCV, dominant-session-volume continuous contract,
    RTH-only strategy decisions.
  direct_screen_reference: /private/tmp/nq_combined_momentum_stable_screen.csv
  grid_audit_reference: /private/tmp/nq_intraday_momentum_priority_long50_grid_audit
data:
  dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
  source_timeframe: 1m
  source: databento_dbn
  feature_set: none
  raw_dir: data/raw/NQ/GLBX-20260601-RTF938NJSN
  cache_dir: data/cache/databento/GLBX-20260601-RTF938NJSN
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: dominant_session_volume
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 0
  rth_start: 09:30:00
  rth_end: '16:00:00'
  eth_start: '16:00:00'
  eth_end: 09:29:00
apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: '16:59:59'
  force_flatten_enabled: true
  force_flatten_time: '16:58:30'
  latest_entry_time: '16:45:00'
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true
strategy:
  entry:
    module: intraday_momentum_priority
    params:
      setup_mode: short_first_1030_weakness_1130_strength
      rth_start: 09:30:00
      bar_interval_minutes: 5
      tick_size: 0.25
      max_trades_per_day: 1
      slots:
      - slot_id: nq_1030_short_weakness
        param_prefix: short
        direction: short
        source_start: 09:30:00
        signal_time: '10:30:00'
        min_signal_return_bps: 40
        min_signal_return_ticks: 0
        stop_pct: 0.0035
        target_r_multiple: 3.0
        flatten_time: '15:59:00'
      - slot_id: nq_1130_long_strength
        param_prefix: long
        direction: long
        source_start: 09:30:00
        signal_time: '11:30:00'
        min_signal_return_bps: 50
        min_signal_return_ticks: 0
        stop_pct: 0.0035
        target_r_multiple: 2.5
        flatten_time: '15:59:00'
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 3.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.0035
      round_to_tick: true
  flatten_time: '15:59:00'
