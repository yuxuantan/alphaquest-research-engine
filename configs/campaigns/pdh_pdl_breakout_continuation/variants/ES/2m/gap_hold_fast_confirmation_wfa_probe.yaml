campaign_id: pdh_pdl_breakout_continuation
variant_id: gap_hold_fast_confirmation_wfa_probe
strategy_name: pdh_pdl_breakout_continuation
symbol: ES
dataset_id: 1m_full_history
timeframe: 2m
research_metadata:
  academic_source: Hurst, Ooi, and Pedersen (2017), A Century of Evidence on Trend-Following
    Investing
  doi: 10.3905/jpm.2017.44.1.015
  edge_thesis: A confirmed opening gap beyond the prior RTH range can be a short-horizon
    trend-following expression of range expansion.
  mechanic: If the RTH open gaps beyond the prior RTH high or low and the market confirms
    by holding that level on the first eligible bar, enter in the breakout direction
    and flatten before the daily close.
  timeframe_rationale: A 2-minute bar preserves the prior screened gap-hold execution
    while using existing 1-minute detail for stop/target resolution.
  close_compliance: All exits are flattened at 15:30 ET, before the user-defined 16:59:59
    ET futures daily close.
data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 10
  rth_start: 09:30:00
  rth_end: '16:00:00'
  eth_start: '16:00:00'
  eth_end: 09:29:00
  rolling_volume_window: 20
strategy:
  entry:
    module: pdh_pdl_breakout_continuation
    params:
      setup_mode: gap_hold_continuation
      start_time: 09:30:00
      end_time: '10:30:00'
      bar_interval_minutes: 2
      close_buffer_ticks: 0
      retest_tolerance_ticks: 1
      retest_window_bars: 2
      min_volume_ratio: 0.0
      min_gap_points: 2.0
      gap_hold_bars: 1
      max_trades_per_day: 1
      allow_long: true
      allow_short: true
      tick_size: 0.25
  tp:
    module: cost_adjusted_fixed_r
    params:
      target_r_multiple: 1.25
      tick_size: 0.25
      tick_value: 12.5
      commission_per_contract: 2.5
      slippage_ticks: 1
  sl:
    module: sweep_extreme
    params:
      stop_offset_ticks: 2
  flatten_time: '15:30:00'
core:
  data_subset:
    start_date: '2021-01-01'
    end_date: '2022-12-31'
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.005
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: '15:30:00'
benchmarks:
  min_trades_per_year: 40
  preferred_min_total_trades: 500
  min_profit_factor: 1.25
  min_total_net_profit: 0
  min_expectancy_r: 0.05
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.04
  min_mar: 1.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset:
    start_date: '2021-01-01'
    end_date: '2022-12-31'
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.min_gap_points:
    - 0.5
    - 1.0
    - 1.5
    - 2.0
    - 2.5
    tp.params.target_r_multiple:
    - 1.0
    - 1.125
    - 1.25
    - 1.375
    - 1.5
    sl.params.stop_offset_ticks:
    - 1
    - 2
    - 3
    - 4
    - 5
monkey:
  data_subset:
    start_date: '2021-01-01'
    end_date: '2022-12-31'
  runs: 8000
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset:
    start_date: '2011-01-01'
    end_date: '2026-05-29'
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 40
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters:
    entry.params.min_gap_points:
    - 0.5
    - 1.0
    - 1.5
    - 2.0
    - 2.5
    tp.params.target_r_multiple:
    - 1.0
    - 1.125
    - 1.25
    - 1.375
    - 1.5
    sl.params.stop_offset_ticks:
    - 1
    - 2
    - 3
    - 4
    - 5
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.005
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
campaign_tests:
  stage_order:
  - limited_core_grid_test
  - limited_monkey_test
  - walk_forward_analysis
  - wfa_oos_monkey_test
  - wfa_oos_monte_carlo
  - simulated_incubation_core
  - simulated_incubation_monkey
  - acceptance_oos_test
  limited_core_grid_test:
    criteria:
    - metric: summary.total_combinations_tested
      min: 100
    - metric: summary.percentage_profitable_iterations
      min: 0.7
    - metric: summary.apex_rule_violating_iterations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  limited_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
    data_window:
      mode: random_months
      months: 18
      seed: 31
      avoid_ranges:
      - start_date: '2020-02-01'
        end_date: '2021-06-30'
  walk_forward_analysis:
    criteria:
    - metric: summary.early_exit
      equals: false
    - metric: summary.windows
      min: 10
    - metric: stitched_oos_metrics.profit_factor
      exclusive_min: 1.5
    - metric: stitched_oos_metrics.mar
      exclusive_min: 0.5
    - metric: stitched_oos_metrics.expectancy_r
      exclusive_min: 0.2
    - metric: stitched_oos_metrics.total_trades
      exclusive_min: 500
    - metric: stitched_oos_metrics.apex_rule_violations
      max: 0
  wfa_oos_monkey_test:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.9
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.9
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  wfa_oos_monte_carlo:
    criteria:
    - metric: summary.probability_profit_before_drawdown
      exclusive_min: 0.5
  simulated_incubation_core:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 75
    - metric: metrics.apex_rule_violations
      max: 0
  simulated_incubation_monkey:
    criteria:
    - metric: summary.core_beats_monkey_net_profit_rate
      min: 0.8
    - metric: summary.core_beats_monkey_max_drawdown_rate
      min: 0.8
    - metric: summary.core_metrics.apex_rule_violations
      max: 0
  acceptance_oos_test:
    criteria:
    - metric: metrics.profit_factor
      exclusive_min: 1.2
    - metric: metrics.mar
      exclusive_min: 1.2
    - metric: metrics.expectancy_r
      exclusive_min: 0.15
    - metric: metrics.total_trades
      exclusive_min: 25
    - metric: metrics.apex_rule_violations
      max: 0
    train_months: 24
    test_months: 6
