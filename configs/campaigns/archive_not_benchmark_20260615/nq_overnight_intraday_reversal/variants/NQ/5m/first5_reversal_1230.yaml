campaign_id: nq_overnight_intraday_reversal
variant_id: first5_reversal_1230
strategy_name: nq_overnight_intraday_reversal
symbol: NQ
dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
timeframe: 5m

research_metadata:
  academic_source: "Liu, Liu, Wang, Zhou, and Zhu, Overnight-Intraday Reversal Everywhere"
  source_url: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2730304"
  edge_thesis: "Fade large overnight/RTH-open NQ gaps after the first 5-minute RTH bar reverses, but use a shorter intraday hold."
  mechanic: "Same overnight-reversal confirmation as first5_reversal_1430, with the signal at 09:35 and flattening at 12:30."
  timeframe_rationale: "5-minute bars let the first RTH bar define the reversal and avoid same-minute entry."
  apex_compatibility: "RTH-only next-bar entries and same-session flattening at 12:30 ET."

data:
  dataset_id: databento_nq_1m_20110103_20260529_dominant_session_volume
  source_timeframe: 1m
  source: databento_dbn
  feature_set: pdh_pdl_sweep
  raw_dir: data/raw/NQ/GLBX-20260601-RTF938NJSN
  cache_dir: data/cache/databento/GLBX-20260601-RTF938NJSN
  symbol: NQ
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: dominant_session_volume
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 20
  rth_start: "09:30:00"
  rth_end: "16:00:00"
  eth_start: "16:00:00"
  eth_end: "09:29:00"
  rolling_volume_window: 20

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: overnight_intraday_reversal
    params:
      setup_mode: first5_reversal_1230
      direction_mode: two_sided
      rth_start: "09:30:00"
      entry_time: "09:35:00"
      flatten_time: "12:30:00"
      bar_interval_minutes: 5
      confirm_window_minutes: 5
      min_abs_overnight_bps: 25
      confirm_mode: confirm_reversal
      confirm_threshold_bps: 15
      stop_pct: 0.0035
      target_r_multiple: 3.0
      max_trades_per_day: 1
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 3.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.0035
      round_to_tick: true
  flatten_time: "12:30:00"

core:
  data_subset:
    start_date: "2011-01-03"
    end_date: "2026-05-29"
    session_labels: [RTH]
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 5.0
  commission_per_contract: 2.50
  slippage_ticks: 1
  position_sizing:
    mode: fixed_contracts
    contracts: 1
  daily_loss_limit: 4000
  daily_profit_stop: 1000000000
  flatten_time: "12:30:00"
  max_trades_per_day: 1

benchmarks:
  min_trades_per_year: 50
  preferred_min_total_trades: 500
  min_profit_factor: 1.4
  min_total_net_profit: 0
  min_expectancy_r: 0.2
  min_win_rate: 0.4
  max_drawdown_pct: 0.1
  min_cagr: 0.0
  min_mar: 0.5
  max_best_day_concentration: 0.5
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5

core_grid:
  data_subset: &research_window
    start_date: "2011-01-03"
    end_date: "2024-12-31"
    session_labels: [RTH]
  objective: MAR
  retain_iteration_reports: false
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: &parameter_grid
    entry.params.min_abs_overnight_bps: [5, 20, 25, 30]
    entry.params.confirm_threshold_bps: [5, 10, 15]
    entry.params.stop_pct: [0.003, 0.0035, 0.004]
    entry.params.target_r_multiple: [2.0, 3.0, 4.0]

monkey:
  data_subset: *research_window
  runs: 500
  seed: 7
  beat_threshold: 0.90
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.10
    duration_shape: 0.70
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false

wfa:
  data_subset: *research_window
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_profit_factor: 1.0
  early_exit_min_train_profit_factor: 1.0
  early_exit_require_train_profitable: true
  parallel:
    enabled: true
    workers: 6
    scope: grid
  parameters: *parameter_grid

prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.50
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267

monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
