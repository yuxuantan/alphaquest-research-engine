campaign_id: cftc_tff_hedging_pressure
campaign_name: CFTC TFF Hedging Pressure
status: research

academic_sources:
  - title: "Hedging Pressure Effects in Futures Markets"
    authors: "Frans A. de Roon, Theo E. Nijman, Chris Veld"
    year: 2000
    venue: "Journal of Finance"
    doi: "10.1111/0022-1082.00253"
    finding_used: "Futures risk premia vary with hedging pressure and market participant positioning."
    evidence_directness: "Indirect but operational for ES. The campaign uses official CFTC Traders in Financial Futures positioning and open-interest changes as a weekly hedging-pressure proxy for index futures."

edge_thesis: >
  Large increases in S&P 500 futures open interest reported in CFTC TFF data can
  indicate institutional hedging or risk-transfer demand. After the report is
  public, ES may earn a same-session long risk premium when this pressure state
  is elevated.

translation_notes:
  data_availability: "Tuesday CFTC TFF positions are released Friday afternoon; features are traded no earlier than the following Monday RTH session."
  why_es: "ES is the most liquid tradable implementation of S&P 500 index futures exposure."
  expected_working_regime: "Risk-transfer and hedging-demand regimes where expanded S&P futures participation supports positive intraday carry."
  expected_failure_regime: "Deleveraging, crisis, or crowded-position reversals where open-interest expansion reflects informed downside pressure."
  translation_risks: "Weekly public positioning is slower than intraday ES flow and may be state-dependent."

variants:
  - broad_spx_open_interest_expansion
  - confirmed_spx_open_interest_expansion
  - extended_spx_open_interest_expansion

timeframes:
  - 5m
  - 15m
  - 30m
