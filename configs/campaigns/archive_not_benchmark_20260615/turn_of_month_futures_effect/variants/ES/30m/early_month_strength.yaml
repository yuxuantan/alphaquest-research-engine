campaign_id: turn_of_month_futures_effect
variant_id: early_month_strength
strategy_name: turn_of_month_futures_effect
symbol: ES
dataset_id: 1m_full_history
timeframe: 30m
research_metadata:
  academic_source: Carchano and Pardo (2011), Calendar Anomalies in Stock Index Futures;
    Maberly and Waggoner (2000), Closing the Question on the Continuation of Turn-of-the-Month
    Effects
  doi: SSRN_ID1958587; SSRN_ID244085
  edge_thesis: S&P 500 futures may retain a positive turn-of-the-month return pocket.
  mechanic: Long ES during calendar-day windows around month start/end, entered intraday
    and flattened before or at the close.
  timeframe_rationale: Tests 30m, 15m, and 5m next-bar execution around the same calendar
    window.
  evidence_directness: Direct for S&P 500 futures calendar effects; implemented as
    a no-lookahead calendar-day proxy.
data:
  dataset_id: 1m_full_history
  source_timeframe: 1m
  source: databento_dbn
  feature_set: full
  raw_dir: data/raw/ES/GLBX-20260601-U6S3S4F4GM
  cache_dir: data/cache/databento/GLBX-20260601-U6S3S4F4GM
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  continuous_contract: explicit_roll_calendar
  roll_calendar: configs/data/ES/motivewave_rithmic_roll_calendar.csv
  price_adjustment: none
  roll_boundary_policy:
    reset_previous_day_levels: true
    skip_sessions_around_roll: 1
  include_spreads: false
  warmup_days: 10
  rth_start: 09:30:00
  rth_end: '16:00:00'
  eth_start: '16:00:00'
  eth_end: 09:29:00
  rolling_volume_window: 20
strategy:
  entry:
    module: turn_of_month_bias
    params:
      setup_mode: early_month_strength
      signal_time: '11:00:00'
      bar_interval_minutes: 30
      first_calendar_days: 5
      last_calendar_days: 0
      direction: long
      max_trades_per_day: 1
  tp:
    module: percent_from_entry
    params:
      target_pct: 0.05
      tick_size: 0.25
      round_to_tick: true
  sl:
    module: percent_from_entry
    params:
      stop_pct: 0.005
      round_to_tick: true
  flatten_time: '16:00:00'
core:
  data_subset:
    start_date: '2021-01-01'
    end_date: '2022-12-31'
  initial_balance: 150000
  tick_size: 0.25
  tick_value: 12.5
  commission_per_contract: 2.5
  slippage_ticks: 1
  position_sizing:
    mode: risk_percent_net_liq
    risk_pct: 0.01
    rounding: floor
    min_contracts: 1
  daily_loss_limit: 3000
  daily_profit_stop: 5000
  flatten_time: '16:00:00'
benchmarks:
  min_trades_per_year: 100
  preferred_min_total_trades: 500
  min_profit_factor: 1.3
  min_total_net_profit: 0
  min_expectancy_r: 0.0
  min_win_rate: 0.45
  max_drawdown_pct: 0.05
  min_cagr: 0.06
  min_mar: 1.5
  max_daily_loss: 1500
  max_consecutive_losses: 8
  max_best_day_concentration: 0.4
  min_positive_month_rate: 0.5
  min_wfa_profitable_window_rate: 0.7
  min_monte_carlo_prop_pass_chance: 0.5
core_grid:
  data_subset:
    start_date: '2021-01-01'
    end_date: '2022-12-31'
  objective: MAR
  min_profitable_iteration_rate: 0.7
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.first_calendar_days:
    - 3
    - 4
    - 5
    - 6
    - 7
    entry.params.signal_time:
    - '10:00:00'
    - '11:00:00'
    - '14:00:00'
    strategy.flatten_time:
    - '15:30:00'
    - '16:00:00'
    sl.params.stop_pct:
    - 0.005
    - 0.0075
    tp.params.target_pct:
    - 0.05
    - 0.1
monkey:
  data_subset:
    start_date: '2021-01-01'
    end_date: '2022-12-31'
  runs: 8000
  seed: 7
  beat_threshold: 0.9
  retain_iteration_reports: false
  parallel:
    enabled: false
    workers: 1
    scope: runs
  constraints:
    trade_count_tolerance_pct: 0.05
    trade_count_tolerance: 0
    long_short_ratio_tolerance: 0.05
    average_bars_tolerance_pct: 0.1
    duration_shape: 0.7
    rth_only: true
    enforce_non_overlapping: true
    enforce_max_trades_per_day: false
wfa:
  data_subset:
    start_date: '2011-01-01'
    end_date: '2026-05-29'
  mode: unanchored
  train_months: 48
  test_months: 12
  step_months: 12
  objective: MAR
  selection_min_trades_per_year: 100
  early_exit_min_train_profit_factor: 1.0
  parallel:
    enabled: false
    workers: 1
    scope: grid
  parameters:
    entry.params.first_calendar_days:
    - 3
    - 4
    - 5
    - 6
    - 7
    entry.params.signal_time:
    - '10:00:00'
    - '11:00:00'
    - '14:00:00'
    strategy.flatten_time:
    - '15:30:00'
    - '16:00:00'
    sl.params.stop_pct:
    - 0.005
    - 0.0075
    tp.params.target_pct:
    - 0.05
    - 0.1
prop_rules:
  starting_balance: 150000
  daily_loss_limit: 4000
  trailing_drawdown: 4000
  max_contracts: 10
  max_best_day_profit_percentage: 0.5
  min_trading_days: 2
  payout_threshold: 188.9
  profit_target_pct: 0.06
  drawdown_limit_pct: 0.0267
monte_carlo:
  trade_source: core
  runs: 500
  seed: 11
  parallel:
    enabled: false
    workers: 1
    scope: runs
  path_months: 1
  skip_trade_probability: 0.05
  skip_winning_trade_probability: 0.0
  adverse_slippage_per_trade: 0.0
  position_sizing:
    mode: risk_percent_initial_balance
    risk_pct: 0.01
  cluster_losses: false
  retain_path_trades: false
  retain_path_events: false
