campaign_id: pdh_pdl_breakout_continuation
campaign_name: Prior-Day Level Breakout Continuation
source:
  title:
  url:
status: researching

idea:
  summary: >
    Test whether fresh breaks, retests, and gap holds beyond the prior RTH high
    or low can express ES range expansion better than fading those same levels.
  entry_thesis: >
    Prior RTH highs/lows are visible references. When price accepts beyond a
    fresh prior-day extreme, continuation flow may enter after stops and
    breakout participants are triggered.
  exit_thesis: >
    Risk is invalidated by the breakout, retest, or gap-hold bar extreme.
    Targets are tested as cost-adjusted fixed R multiples from entry to stop.

mechanics:
  market_timezone: America/New_York
  session: RTH-only entries using previous RTH levels and rolling volume known at the signal bar close.
  variants:
    fresh_close_break: >
      Trade the first fresh close through the prior RTH high/low.
    break_retest_hold: >
      Require a break through the prior RTH level, then a retest that holds it.
    gap_hold_continuation: >
      Require an RTH gap beyond the prior RTH high/low and sustained closes
      outside the level.

notes:
  - Rationale is market-structure reasoning, not a cited paper.
  - This is materially different from the rejected prior-day sweep-reclaim fade.
