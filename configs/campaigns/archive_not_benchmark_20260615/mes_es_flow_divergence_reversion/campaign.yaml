  - title: "Individual Investor Trading and Stock Returns"
    authors: "Ron Kaniel, Gideon Saar, and Sheridan Titman"
    year: 2008
    venue: "The Journal of Finance, 63(1), 273-310"
    doi: "10.1111/j.1540-6261.2008.01316.x"
    url: "https://onlinelibrary.wiley.com/doi/10.1111/j.1540-6261.2008.01316.x"
    finding_used: "Individual-investor flow is linked to short-horizon liquidity provision and subsequent return behavior."
    evidence_directness: "Indirect; MES is used as a smaller-notional participant proxy, not as an identified retail account feed."
  - title: "Do Retail Trades Move Markets?"
    authors: "Brad M. Barber, Terrance Odean, and Ning Zhu"
    year: 2009
    venue: "The Review of Financial Studies, 22(1), 151-186"
    doi: "10.1093/rfs/hhn035"
    url: "https://academic.oup.com/rfs/article-abstract/22/1/151/1585397"
