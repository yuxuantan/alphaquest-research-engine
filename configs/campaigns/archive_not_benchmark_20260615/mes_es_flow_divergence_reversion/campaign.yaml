edge_thesis: >
  Trade ES against completed MES microstructure pressure when the smaller
  contract diverges from ES through either aggressive-flow imbalance or a
  short-window return dislocation. The economic premise is temporary liquidity
  demand from the smaller-notional contract rather than the trend-following
  signed-flow continuation family already accepted in ES.

translation_notes:
  why_es: "ES is the traded instrument; MES is used only as a completed-flow state variable."
  why_effect_may_survive_costs: "The one-year screens found positive train/Q1/Q2 split pockets after current ES one-contract costs."
  expected_working_regime: "MES shows forced or retail-like pressure that ES does not fully confirm, allowing ES to mean-revert after the dislocation."
  expected_failure_regime: "MES becomes the leading informed market, or the one-year sample is a regime-specific artifact."
  data_gate: "Only one year of local MES trade-side history is currently available. Full acceptance requires longer ES+MES trade-side data and a 2020-start validation protocol."

