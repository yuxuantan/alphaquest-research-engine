campaign_id: pdh_pdl_sweep
campaign_name: PDH/PDL Sweep Reclaim
source:
  title:
  url:
status: researching

idea:
  summary: >
    Test whether failed previous-day high/low sweeps that reclaim the level can
    produce a robust intraday futures strategy.
  entry_thesis: >
    A sweep through previous RTH high/low followed by a reclaim can indicate a
    failed breakout and reversal.
  exit_thesis: >
    Risk is invalidated beyond the sweep extreme. Targets are tested as R
    multiples from entry to stop.

notes:
  - Variants under this campaign may change parameters, entry/exit mechanics,
    symbol, timeframe, or dataset while preserving the same core idea.
