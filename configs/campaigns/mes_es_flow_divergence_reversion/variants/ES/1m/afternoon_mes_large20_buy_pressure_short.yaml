campaign_id: mes_es_flow_divergence_reversion
variant_id: afternoon_mes_large20_buy_pressure_short
strategy_name: trade_orderflow_pressure
symbol: ES
dataset_id: es_mes_trade_orderflow_1m_20250610_20260608
timeframe: 1m

research_metadata:
  academic_source: "Kaniel, Saar, and Titman (2008); Barber, Odean, and Zhu (2009); Hasbrouck (1995)"
  doi: "10.1111/j.1540-6261.2008.01316.x; 10.1093/rfs/hhn035; 10.1111/j.1540-6261.1995.tb04054.x"
  edge_thesis: "MES large-trade buy pressure without enough ES price follow-through can mark temporary liquidity demand in the smaller-notional contract; trade ES short for afternoon mean reversion."
  mechanic: "At 14:00 ET, use only completed 13:55-13:59 ES and MES trade-side bars. Go short ES when MES large-20-lot imbalance is above the configured threshold and ES 5-minute return is no more than the precomputed 16-tick cap, then flatten at 15:31 ET unless the signal percent stop or fixed-R target is hit first."
  timeframe_rationale: "Signals use completed 1-minute bars and enter on the next 1-minute bar open."
  evidence_directness: "Moderate/indirect; the signal uses true aggressor-side futures prints, but MES is a proxy for smaller-participant flow rather than an account-classified retail feed."
  data_status: "One-year local pre-purchase cache only; not live eligible until longer ES+MES history passes a predeclared validation protocol."

data:
  dataset_id: es_mes_trade_orderflow_1m_20250610_20260608
  source_timeframe: 1m
  source: csv
  raw_csv: data/cache/orderflow/es_mes_flow_divergence_1m_20250610_20260608.csv
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: "09:30:00"
  rth_end: "15:59:00"

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: trade_orderflow_pressure
    params:
      setup_mode: mes_large20_buy_pressure_short
      bar_interval_minutes: 1
      entry_time: "14:00:00"
      flatten_time: "15:31:00"
      flow_column: mes_large20_imbalance_es_return_lte_16_5
      flow_threshold: 0.15
      positive_flow_direction: short
      allow_long: false
      allow_short: true
      return_confirmation: none
      max_trades_per_day: 1
      stop_pct: 0.0035
      target_r_multiple: 1.5
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 1.5
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.0035
      round_to_tick: true
  flatten_time: "15:31:00"

