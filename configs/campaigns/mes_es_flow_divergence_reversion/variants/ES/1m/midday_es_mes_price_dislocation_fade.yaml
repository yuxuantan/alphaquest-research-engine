campaign_id: mes_es_flow_divergence_reversion
variant_id: midday_es_mes_price_dislocation_fade
strategy_name: trade_orderflow_pressure
symbol: ES
dataset_id: es_mes_price_flow_divergence_1m_20250610_20260608
timeframe: 1m

research_metadata:
  academic_source: "Hasbrouck (1995); Kaniel, Saar, and Titman (2008); Barber, Odean, and Zhu (2009)"
  doi: "10.1111/j.1540-6261.1995.tb04054.x; 10.1111/j.1540-6261.2008.01316.x; 10.1093/rfs/hhn035"
  edge_thesis: "ES and MES are tightly linked contracts, but the smaller-notional MES contract can temporarily move farther than ES around retail-like or liquidity-demand bursts. Fade completed MES-vs-ES return dislocations in ES for same-session mean reversion."
  mechanic: "At 11:00 ET, use only completed 10:57-10:59 ES and MES bars. Compute MES 3-minute return ticks minus ES 3-minute return ticks. If MES is at least the configured threshold richer than ES, short ES; if MES is at least the threshold cheaper than ES, go long ES. Use one trade maximum per session, a signal percent stop, a fixed-R target, and a 14:30 ET flat time."
  timeframe_rationale: "Signals use completed 1-minute bars and enter on the next 1-minute bar open."
  evidence_directness: "Moderate/indirect; this is a linked-market price-discovery/temporary-dislocation translation, not an account-classified retail or inventory feed."
  data_status: "One-year local ES+MES trade-side cache only; not live eligible until longer ES+MES history passes a predeclared 2020-start validation protocol."

data:
  dataset_id: es_mes_price_flow_divergence_1m_20250610_20260608
  source_timeframe: 1m
  source: csv
  raw_csv: data/cache/orderflow/es_mes_price_flow_divergence_1m_20250610_20260608.csv
  symbol: ES
  timezone: America/New_York
  exchange_timezone: America/New_York
  feature_set: none
  warmup_days: 0
  rth_start: "09:30:00"
  rth_end: "15:59:00"

apex_rules:
  enabled: true
  timezone: America/New_York
  latest_flat_time: "16:59:59"
  force_flatten_enabled: true
  force_flatten_time: "16:58:30"
  latest_entry_time: "16:45:00"
  cancel_pending_orders_before_flatten: true
  no_overnight_positions: true
  reject_if_position_after_flatten_deadline: true
  reject_if_pending_order_after_flatten_deadline: true
  reject_if_entry_after_latest_entry_time: true

strategy:
  entry:
    module: trade_orderflow_pressure
    params:
      setup_mode: es_mes_price_dislocation_fade
      bar_interval_minutes: 1
      entry_time: "11:00:00"
      flatten_time: "14:30:00"
      flow_column: mes_minus_es_return_ticks_3
      flow_threshold: 1.0
      positive_flow_direction: short
      allow_long: true
      allow_short: true
      return_confirmation: none
      max_trades_per_day: 1
      stop_pct: 0.010
      target_r_multiple: 4.0
  tp:
    module: signal_fixed_r
    params:
      default_target_r_multiple: 4.0
  sl:
    module: signal_percent_from_entry
    params:
      default_stop_pct: 0.010
      round_to_tick: true
  flatten_time: "14:30:00"

