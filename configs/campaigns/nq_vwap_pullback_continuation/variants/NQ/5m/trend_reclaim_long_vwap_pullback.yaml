timeframe: 5m
research_metadata:
  alpha_family: NQ VWAP pullback continuation
  classification: source_screened_candidate
  internet_sources:
  - title: Volume Weighted Average Price (VWAP) trading strategy overview
    source: Investopedia
    url: https://www.investopedia.com/ask/answers/031115/what-common-strategy-traders-implement-when-using-volume-weighted-average-price-vwap.asp
    finding_used: VWAP is commonly used by intraday traders as a trend, support, and
      resistance reference.
  - title: Anchored VWAP
    source: AlphaTrends / Brian Shannon
    url: https://alphatrends.net/anchored-vwap/
    finding_used: VWAP is treated as a dynamic institutional reference level; this
      campaign uses session VWAP only to avoid anchor discretion.
  - title: VWAP pullback trading strategy for day traders
    source: TradeMomentum
    url: https://www.trademomentum.org/blog/vwap-pullback-trading-strategy-for-day-traders
    finding_used: 'Practitioner setup: identify trend, wait for a pullback to VWAP,
      and enter on continuation/reclaim.'
  edge_thesis: 'In a strong intraday NQ trend, a pullback to session VWAP followed
    by a reclaim may identify temporary liquidity absorption before continuation.
    The variants differ by trend context: opening drive, multi-bar VWAP trend, and
    failed break below VWAP.'
  mechanic: After NQ sustains multiple closes above VWAP and remains above the RTH
    open by the drive threshold, buy a VWAP pullback reclaim.
  source_data: Databento NQ 1-minute OHLCV, dominant-session-volume continuous contract,
    RTH-only decisions.
  evidence_directness: Practitioner-source strategy translated into deterministic
    futures rules; acceptance depends entirely on staged validation.
